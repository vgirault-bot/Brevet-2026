tion par le même microbe, il augmente très vite. Explique cette différence.","min":"Lors de la première infection, le corps doit apprendre à fabriquer les anticorps : c'est lent. Il garde ensuite la mémoire. Lors de la seconde infection, il réagit beaucoup plus vite grâce à cette mémoire immunitaire.","solide":"Lors de la première infection, l'organisme rencontre le microbe pour la première fois : ses lymphocytes mettent du temps à reconnaître l'intrus et à fabriquer les anticorps adaptés. C'est pourquoi le taux d'anticorps monte lentement. Mais après cette première rencontre, l'organisme garde la mémoire du microbe. Lors d'une seconde infection par le même microbe, les lymphocytes le reconnaissent immédiatement et produisent très vite beaucoup d'anticorps : c'est la mémoire immunitaire. C'est aussi le principe de la vaccination.","mention":"Le graphique compare la réponse immunitaire lors d'une première et d'une seconde infection par le même microbe. La différence de rapidité s'explique par la mémoire immunitaire.\n\nLors de la première infection, l'organisme découvre le microbe. Ses globules blancs, les lymphocytes, doivent d'abord le reconnaître, puis fabriquer les anticorps spécifiquement dirigés contre lui. Cette mise en route demande du temps : c'est pourquoi le taux d'anticorps augmente lentement, et la maladie peut se déclarer.\n\nAprès cette première rencontre, l'organisme ne repart pas de zéro : il conserve des cellules capables de reconnaître ce microbe précis. C'est la mémoire immunitaire.\n\nLors d'une seconde infection par le même microbe, ces cellules-mémoire le reconnaissent immédiatement. Les lymphocytes produisent alors des anticorps beaucoup plus vite et en plus grande quantité : le taux d'anticorps augmente rapidement, et le microbe est neutralisé avant que la maladie ne se développe.\n\nConclusion : la réaction est plus rapide la seconde fois grâce à la mémoire immunitaire acquise lors de la première infection. C'est exactement ce principe qu'utilise la vaccination, qui provoque une première réaction sans danger pour préparer l'organisme."}],"parcours":{"mission":"À la fin, tu sais expliquer le trajet d'un message nerveux et comment l'organisme se défend contre les microbes.","froid":[{"q":"Quelle est la cellule de base du système nerveux ?","rep":"Le neurone."},{"q":"Sous quelle forme circule l'information dans les nerfs ?","rep":"Sous forme de message nerveux (un signal électrique)."},{"q":"Qu'est-ce qu'un réflexe (arc réflexe) ?","rep":"Une réaction automatique et rapide : récepteur → nerf sensitif → moelle épinière → nerf moteur → muscle, sans passer d'abord par la réflexion."},{"q":"Comment appelle-t-on les cellules du sang qui défendent l'organisme contre les microbes ?","rep":"Les globules blancs (leucocytes), notamment les lymphocytes."},{"q":"Comment un vaccin protège-t-il ?","rep":"Il entraîne le système immunitaire à fabriquer des anticorps, sans provoquer la maladie, pour être prêt en cas d'infection réelle."}],"coffre":[{"q":"La cellule de base du système nerveux est le ____.","rep":"Mot attendu : neurone"},{"q":"Dans les nerfs, l'information circule sous forme de ____ nerveux.","rep":"Mot attendu : message"},{"q":"Un réflexe est une réaction automatique qui passe par la ____ épinière.","rep":"Mot attendu : moelle"},{"q":"Les globules blancs qui défendent l'organisme sont les ____.","rep":"Mot attendu : lymphocytes"},{"q":"Un ____ entraîne le corps à fabriquer des anticorps sans donner la maladie.","rep":"Mot attendu : vaccin"}],"frise":[],"oral":"Explique en 90 secondes comment l'organisme se défend contre une infection.","oralRedige":"Quand des micro-organismes, comme des bactéries ou des virus, pénètrent dans le corps, l'organisme se défend grâce à son système immunitaire. La première ligne de défense est rapide : certains globules blancs, appelés phagocytes, encerclent et avalent les microbes, c'est la phagocytose. Si cela ne suffit pas, une défense plus spécifique se met en place : d'autres globules blancs, les lymphocytes, fabriquent des anticorps. Ces anticorps sont des protéines qui se fixent sur le microbe précis qui a déclenché l'infection et le neutralisent. Le grand avantage, c'est que l'organisme garde la mémoire de cette rencontre : il pourra réagir beaucoup plus vite la prochaine fois. C'est exactement sur ce principe que repose la vaccination : un vaccin présente au corps une forme inoffensive du microbe, ce qui entraîne le système immunitaire à fabriquer des anticorps et à mémoriser, sans provoquer la maladie. Ainsi, le jour d'une vraie infection, le corps est déjà prêt à se défendre.","ecrit":{"consigne":"Question type brevet. Explique comment un vaccin permet de protéger une personne contre une maladie, en utilisant les mots anticorps et lymphocytes.","min":"Un vaccin contient une forme inoffensive du microbe. Le corps fabrique des anticorps grâce aux lymphocytes. Plus tard, si le vrai microbe arrive, le corps sait déjà se défendre.","solide":"Un vaccin contient le microbe sous une forme inoffensive (affaibli ou inactivé), qui ne rend pas malade. En le recevant, l'organisme réagit comme face à une vraie infection : les lymphocytes fabriquent des anticorps dirigés spécifiquement contre ce microbe. Le corps garde ensuite la mémoire de cette défense. Ainsi, si la personne rencontre plus tard le vrai microbe, ses lymphocytes produisent très vite des anticorps et la maladie est évitée.","mention":"Un vaccin permet de protéger une personne en entraînant son système immunitaire à l'avance, sans la rendre malade.\n\nLe vaccin contient le microbe responsable de la maladie sous une forme inoffensive, par exemple affaibli ou inactivé. Lorsqu'on l'injecte, l'organisme réagit comme s'il faisait face à une véritable infection : des globules blancs particuliers, les lymphocytes, reconnaissent le microbe et fabriquent des anticorps, des protéines capables de neutraliser ce microbe précis.\n\nL'élément essentiel est que l'organisme conserve ensuite une mémoire de cette réaction. Il garde des cellules capables de reconnaître ce microbe.\n\nAinsi, si la personne rencontre plus tard le véritable microbe, ses lymphocytes réagissent beaucoup plus rapidement et fabriquent massivement les bons anticorps avant que la maladie ne se développe. La personne est donc protégée : c'est le principe de l'immunité acquise par la vaccination."},"ecritRedige":{"min":"Un vaccin contient une forme inoffensive du microbe. Le corps fabrique des anticorps grâce aux lymphocytes. Plus tard, si le vrai microbe arrive, le corps sait déjà se défendre.","solide":"Un vaccin contient le microbe sous une forme inoffensive (affaibli ou inactivé), qui ne rend pas malade. En le recevant, l'organisme réagit comme face à une vraie infection : les lymphocytes fabriquent des anticorps dirigés spécifiquement contre ce microbe. Le corps garde ensuite la mémoire de cette défense. Ainsi, si la personne rencontre plus tard le vrai microbe, ses lymphocytes produisent très vite des anticorps et la maladie est évitée.","mention":"Un vaccin permet de protéger une personne en entraînant son système immunitaire à l'avance, sans la rendre malade.\n\nLe vaccin contient le microbe responsable de la maladie sous une forme inoffensive, par exemple affaibli ou inactivé. Lorsqu'on l'injecte, l'organisme réagit comme s'il faisait face à une véritable infection : des globules blancs particuliers, les lymphocytes, reconnaissent le microbe et fabriquent des anticorps, des protéines capables de neutraliser ce microbe précis.\n\nL'élément essentiel est que l'organisme conserve ensuite une mémoire de cette réaction. Il garde des cellules capables de reconnaître ce microbe.\n\nAinsi, si la personne rencontre plus tard le véritable microbe, ses lymphocytes réagissent beaucoup plus rapidement et fabriquent massivement les bons anticorps avant que la maladie ne se développe. La personne est donc protégée : c'est le principe de l'immunité acquise par la vaccination."},"carte":"Carte mémoire : deux branches. NERVEUX : neurone, message nerveux, arc réflexe (récepteur → moelle → muscle). IMMUNITÉ : phagocytose, lymphocytes → anticorps, mémoire → vaccination.","motscles":"neurone, message nerveux, réflexe, moelle épinière, globules blancs, lymphocytes, phagocytose, anticorps, antigène, vaccination, mémoire immunitaire","vid":"","vidlab":""}},{"id":"S5","matiere":"svt","titre":"La Terre, le vivant et l'environnement","objectif":"À la fin, tu sais expliquer ce qu'est un écosystème, la biodiversité et l'impact de l'Homme sur l'environnement.","qcm":[{"q":"Dans la chaîne alimentaire « herbe → sauterelle → grenouille → serpent », que se passe-t-il si toutes les sauterelles disparaissent ?","good":"Les grenouilles diminuent, puis les serpents, et l'herbe se développe","choices":["Seule l'herbe disparaît","Les serpents augmentent","Les grenouilles diminuent, puis les serpents, et l'herbe se développe","Rien ne change pour les autres espèces"],"explain":"Sans sauterelles, les grenouilles manquent de nourriture et diminuent, donc les serpents aussi. L'herbe, moins consommée, se développe. Tout l'écosystème est lié.","verif":"Supprimer un maillon déséquilibre toute la chaîne alimentaire."},{"q":"Quelle activité humaine réduit la biodiversité en détruisant les milieux de vie ?","good":"La déforestation","choices":["La photosynthèse","La déforestation","La création de réserves naturelles","La pollinisation"],"explain":"La déforestation détruit l'habitat de nombreuses espèces, qui ne peuvent plus s'y nourrir ni s'abriter : la biodiversité diminue. La pollinisation et la photosynthèse, elles, sont bénéfiques.","verif":"Détruire un milieu (déforestation, pollution) fait chuter la biodiversité."},{"q":"Dans une chaîne alimentaire, par quoi commence toujours le premier maillon ?","good":"Un végétal (producteur), car il fabrique sa matière grâce à la lumière","choices":["Un végétal (producteur), car il fabrique sa matière grâce à la lumière","Un animal qui mange de la viande","Le soleil, qui est un être vivant","Un grand prédateur"],"explain":"Les chaînes alimentaires débutent par un végétal, qui produit sa propre matière par photosynthèse. Le soleil est une source d'énergie mais n'est pas un être vivant.","verif":"1er maillon = végétal producteur (le soleil est une source d'énergie, pas un maillon vivant)."},{"q":"Qu'est-ce que la biodiversité ?","good":"La diversité des espèces vivantes et de leurs milieux","choices":["La quantité d'eau d'un milieu","La diversité des espèces vivantes et de leurs milieux","La température moyenne d'une région","Le nombre de roches d'un sol"],"explain":"La biodiversité désigne la variété des êtres vivants (espèces) et de leurs milieux de vie. Elle est menacée par certaines activités humaines.","verif":"Biodiversité = variété du vivant (espèces et milieux)."}],"court":[],"paper":{"consigne":"Question type brevet. La disparition d'une espèce d'insecte pollinisateur (comme l'abeille) peut avoir des conséquences sur tout un écosystème. Explique pourquoi.","grille":["Les abeilles pollinisent les fleurs, ce qui permet aux plantes de se reproduire. Si elles disparaissent, beaucoup de plantes ne se reproduisent plus, et les animaux qui en dépendent sont touchés aussi.","Dans un écosystème, les êtres vivants sont reliés entre eux. Les abeilles jouent un rôle essentiel : en butinant, elles transportent le pollen d'une fleur à l'autre et permettent ainsi la reproduction de nombreuses plantes. Si les abeilles disparaissent, ces plantes ne peuvent plus se reproduire et se raréfient. Or beaucoup d'animaux se nourrissent de ces plantes ou de leurs fruits. Toute la chaîne alimentaire est donc perturbée, ce qui réduit la biodiversité de l'écosystème.","Dans un écosystème, tous les êtres vivants sont interdépendants : ils sont reliés par de nombreuses relations, notamment alimentaires. La disparition d'une seule espèce peut donc avoir des conséquences en chaîne.\n\nLes abeilles, et plus largement les insectes pollinisateurs, jouent un rôle clé : en se déplaçant de fleur en fleur pour se nourrir, elles transportent le pollen et permettent la pollinisation, c'est-à-dire la reproduction d'un très grand nombre de plantes à fleurs.\n\nSi les abeilles venaient à disparaître, ces plantes ne seraient plus pollinisées et ne pourraient plus produire de graines ni de fruits : elles se raréfieraient progressivement. Or de nombreux animaux herbivores dépendent de ces plantes pour se nourrir, et les prédateurs dépendent à leur tour de ces herbivores. La perturbation se propage donc tout au long des chaînes alimentaires.\n\nAu final, la disparition d'une seule espèce, parce qu'elle occupe une place centrale dans l'écosystème, peut entraîner une baisse importante de la biodiversité et déséquilibrer l'ensemble du milieu. Cet exemple illustre pourquoi la protection de la biodiversité est un enjeu majeur."],"type":"svtdoc","minutes":15,"vid":""},"exos":[{"consigne":"Question type brevet. La disparition d'une espèce d'insecte pollinisateur (comme l'abeille) peut avoir des conséquences sur tout un écosystème. Explique pourquoi.","min":"Les abeilles pollinisent les fleurs, ce qui permet aux plantes de se reproduire. Si elles disparaissent, beaucoup de plantes ne se reproduisent plus, et les animaux qui en dépendent sont touchés aussi.","solide":"Dans un écosystème, les êtres vivants sont reliés entre eux. Les abeilles jouent un rôle essentiel : en butinant, elles transportent le pollen d'une fleur à l'autre et permettent ainsi la reproduction de nombreuses plantes. Si les abeilles disparaissent, ces plantes ne peuvent plus se reproduire et se raréfient. Or beaucoup d'animaux se nourrissent de ces plantes ou de leurs fruits. Toute la chaîne alimentaire est donc perturbée, ce qui réduit la biodiversité de l'écosystème.","mention":"Dans un écosystème, tous les êtres vivants sont interdépendants : ils sont reliés par de nombreuses relations, notamment alimentaires. La disparition d'une seule espèce peut donc avoir des conséquences en chaîne.\n\nLes abeilles, et plus largement les insectes pollinisateurs, jouent un rôle clé : en se déplaçant de fleur en fleur pour se nourrir, elles transportent le pollen et permettent la pollinisation, c'est-à-dire la reproduction d'un très grand nombre de plantes à fleurs.\n\nSi les abeilles venaient à disparaître, ces plantes ne seraient plus pollinisées et ne pourraient plus produire de graines ni de fruits : elles se raréfieraient progressivement. Or de nombreux animaux herbivores dépendent de ces plantes pour se nourrir, et les prédateurs dépendent à leur tour de ces herbivores. La perturbation se propage donc tout au long des chaînes alimentaires.\n\nAu final, la disparition d'une seule espèce, parce qu'elle occupe une place centrale dans l'écosystème, peut entraîner une baisse importante de la biodiversité et déséquilibrer l'ensemble du milieu. Cet exemple illustre pourquoi la protection de la biodiversité est un enjeu majeur."},{"consigne":"Question type brevet. Dans la chaîne alimentaire « herbe → sauterelle → grenouille → serpent », explique ce qui se passe pour les autres êtres vivants si toutes les sauterelles disparaissent.","min":"Sans sauterelles, les grenouilles n'ont plus de quoi manger et diminuent. Les serpents, qui mangent les grenouilles, diminuent aussi. L'herbe, qui n'est plus mangée par les sauterelles, peut se développer davantage.","solide":"Dans cette chaîne alimentaire, chaque être vivant dépend du précédent. Si toutes les sauterelles disparaissent, les grenouilles perdent leur nourriture et leur nombre diminue. À leur tour, les serpents, qui se nourrissent de grenouilles, manquent de nourriture et diminuent aussi. À l'inverse, l'herbe n'est plus mangée par les sauterelles, donc elle peut se développer davantage. La disparition d'un seul maillon déséquilibre donc toute la chaîne.","mention":"La chaîne alimentaire proposée relie quatre êtres vivants : l'herbe est mangée par la sauterelle, la sauterelle par la grenouille, et la grenouille par le serpent. Chaque maillon dépend du précédent pour se nourrir. On étudie l'effet de la disparition des sauterelles.\n\nConséquence sur les grenouilles : les sauterelles sont la nourriture des grenouilles. Sans sauterelles, les grenouilles manquent de nourriture, donc leur nombre diminue.\n\nConséquence sur les serpents : les serpents se nourrissent de grenouilles. Comme les grenouilles se raréfient, les serpents manquent à leur tour de nourriture et diminuent aussi. L'effet se propage donc le long de la chaîne.\n\nConséquence sur l'herbe : l'herbe était mangée par les sauterelles. En l'absence de sauterelles, elle est moins consommée et peut se développer davantage.\n\nConclusion : la disparition des sauterelles entraîne une diminution des grenouilles puis des serpents, et une augmentation de l'herbe. Cet exemple montre que tous les êtres vivants d'un écosystème sont interdépendants : la disparition d'un seul maillon déséquilibre l'ensemble de la chaîne alimentaire."},{"consigne":"Question type brevet. Cite deux activités humaines qui réduisent la biodiversité et explique, pour l'une d'elles, comment elle agit sur les êtres vivants.","min":"Deux activités : la déforestation et la pollution. Par exemple, la déforestation détruit le milieu de vie de nombreuses espèces, qui ne peuvent plus se nourrir ni s'abriter et finissent par disparaître.","solide":"Deux activités humaines qui réduisent la biodiversité sont la déforestation et la pollution (on pourrait aussi citer la surpêche ou le réchauffement climatique). Par exemple, la déforestation consiste à détruire les forêts. Or beaucoup d'animaux et de végétaux y vivent. En détruisant leur milieu de vie, on les prive de nourriture et d'abri : ces espèces disparaissent peu à peu, ce qui fait baisser la biodiversité.","mention":"On demande deux activités humaines réduisant la biodiversité, puis l'explication détaillée de l'une d'elles.\n\nDeux activités humaines néfastes pour la biodiversité sont la déforestation et la pollution. On pourrait aussi mentionner la surexploitation des ressources (surpêche, chasse excessive) ou le réchauffement climatique d'origine humaine.\n\nExplication pour la déforestation. La déforestation consiste à abattre massivement les forêts, par exemple pour cultiver ou construire. Or une forêt est un milieu de vie pour de très nombreuses espèces, animales comme végétales : elles y trouvent leur nourriture, un abri et un lieu de reproduction.\n\nEn détruisant ce milieu, la déforestation prive ces espèces de ce dont elles ont besoin pour vivre. Beaucoup ne peuvent pas survivre ailleurs et finissent par disparaître localement, voire totalement. Comme ces espèces étaient reliées à d'autres par des chaînes alimentaires, leur disparition affecte aussi le reste de l'écosystème.\n\nConclusion : des activités comme la déforestation ou la pollution réduisent la biodiversité. La déforestation, en particulier, détruit le milieu de vie des espèces, ce qui entraîne leur disparition et appauvrit l'ensemble de l'écosystème. Préserver les milieux est donc essentiel pour protéger la biodiversité."}],"parcours":{"mission":"À la fin, tu sais expliquer ce qu'est un écosystème, la biodiversité et l'impact de l'Homme sur l'environnement.","froid":[{"q":"Qu'est-ce qu'un écosystème ?","rep":"L'ensemble formé par un milieu de vie, les êtres vivants qui y vivent et les relations entre eux."},{"q":"Qu'est-ce que la biodiversité ?","rep":"La diversité des êtres vivants (variété des espèces, des milieux et des gènes)."},{"q":"Qu'est-ce qu'une chaîne alimentaire ?","rep":"Une suite d'êtres vivants où chacun mange le précédent (ex. : herbe → lapin → renard)."},{"q":"Cite un risque naturel lié à l'activité interne de la Terre.","rep":"Un séisme (tremblement de terre) ou une éruption volcanique."},{"q":"Cite un impact humain négatif sur l'environnement.","rep":"La pollution, la déforestation, le réchauffement climatique, la disparition d'espèces (un suffit)."}],"coffre":[{"q":"Un ____ est formé par un milieu, les êtres vivants et leurs relations.","rep":"Mot attendu : écosystème"},{"q":"La ____ désigne la diversité des êtres vivants.","rep":"Mot attendu : biodiversité"},{"q":"Une ____ alimentaire est une suite où chaque être vivant mange le précédent.","rep":"Mot attendu : chaîne"},{"q":"Les séismes et les éruptions volcaniques sont des risques ____.","rep":"Mot attendu : naturels"},{"q":"La pollution et la déforestation sont des impacts ____ sur l'environnement.","rep":"Mot attendu : humains"}],"frise":[],"oral":"Explique en 90 secondes ce qu'est un écosystème et pourquoi l'activité humaine peut le menacer.","oralRedige":"Un écosystème, c'est l'ensemble formé par un milieu de vie, par exemple une forêt ou un étang, par tous les êtres vivants qui l'habitent, et par les relations qu'ils entretiennent entre eux et avec leur milieu. Au sein d'un écosystème, les êtres vivants sont reliés notamment par des chaînes alimentaires : chacun se nourrit d'un autre, comme l'herbe mangée par le lapin, lui-même mangé par le renard. La richesse d'un écosystème dépend de sa biodiversité, c'est-à-dire de la variété des espèces, des milieux et des gènes. Or l'activité humaine peut perturber cet équilibre fragile : la pollution, la déforestation, la surexploitation des ressources ou le réchauffement climatique détruisent des milieux et font disparaître des espèces. Comme tous les êtres vivants d'un écosystème sont interdépendants, la disparition d'une espèce peut déséquilibrer toute la chaîne. C'est pourquoi il est important de protéger l'environnement et d'adopter un développement durable.","ecrit":{"consigne":"Question type brevet. La disparition d'une espèce d'insecte pollinisateur (comme l'abeille) peut avoir des conséquences sur tout un écosystème. Explique pourquoi.","min":"Les abeilles pollinisent les fleurs, ce qui permet aux plantes de se reproduire. Si elles disparaissent, beaucoup de plantes ne se reproduisent plus, et les animaux qui en dépendent sont touchés aussi.","solide":"Dans un écosystème, les êtres vivants sont reliés entre eux. Les abeilles jouent un rôle essentiel : en butinant, elles transportent le pollen d'une fleur à l'autre et permettent ainsi la reproduction de nombreuses plantes. Si les abeilles disparaissent, ces plantes ne peuvent plus se reproduire et se raréfient. Or beaucoup d'animaux se nourrissent de ces plantes ou de leurs fruits. Toute la chaîne alimentaire est donc perturbée, ce qui réduit la biodiversité de l'écosystème.","mention":"Dans un écosystème, tous les êtres vivants sont interdépendants : ils sont reliés par de nombreuses relations, notamment alimentaires. La disparition d'une seule espèce peut donc avoir des conséquences en chaîne.\n\nLes abeilles, et plus largement les insectes pollinisateurs, jouent un rôle clé : en se déplaçant de fleur en fleur pour se nourrir, elles transportent le pollen et permettent la pollinisation, c'est-à-dire la reproduction d'un très grand nombre de plantes à fleurs.\n\nSi les abeilles venaient à disparaître, ces plantes ne seraient plus pollinisées et ne pourraient plus produire de graines ni de fruits : elles se raréfieraient progressivement. Or de nombreux animaux herbivores dépendent de ces plantes pour se nourrir, et les prédateurs dépendent à leur tour de ces herbivores. La perturbation se propage donc tout au long des chaînes alimentaires.\n\nAu final, la disparition d'une seule espèce, parce qu'elle occupe une place centrale dans l'écosystème, peut entraîner une baisse importante de la biodiversité et déséquilibrer l'ensemble du milieu. Cet exemple illustre pourquoi la protection de la biodiversité est un enjeu majeur."},"ecritRedige":{"min":"Les abeilles pollinisent les fleurs, ce qui permet aux plantes de se reproduire. Si elles disparaissent, beaucoup de plantes ne se reproduisent plus, et les animaux qui en dépendent sont touchés aussi.","solide":"Dans un écosystème, les êtres vivants sont reliés entre eux. Les abeilles jouent un rôle essentiel : en butinant, elles transportent le pollen d'une fleur à l'autre et permettent ainsi la reproduction de nombreuses plantes. Si les abeilles disparaissent, ces plantes ne peuvent plus se reproduire et se raréfient. Or beaucoup d'animaux se nourrissent de ces plantes ou de leurs fruits. Toute la chaîne alimentaire est donc perturbée, ce qui réduit la biodiversité de l'écosystème.","mention":"Dans un écosystème, tous les êtres vivants sont interdépendants : ils sont reliés par de nombreuses relations, notamment alimentaires. La disparition d'une seule espèce peut donc avoir des conséquences en chaîne.\n\nLes abeilles, et plus largement les insectes pollinisateurs, jouent un rôle clé : en se déplaçant de fleur en fleur pour se nourrir, elles transportent le pollen et permettent la pollinisation, c'est-à-dire la reproduction d'un très grand nombre de plantes à fleurs.\n\nSi les abeilles venaient à disparaître, ces plantes ne seraient plus pollinisées et ne pourraient plus produire de graines ni de fruits : elles se raréfieraient progressivement. Or de nombreux animaux herbivores dépendent de ces plantes pour se nourrir, et les prédateurs dépendent à leur tour de ces herbivores. La perturbation se propage donc tout au long des chaînes alimentaires.\n\nAu final, la disparition d'une seule espèce, parce qu'elle occupe une place centrale dans l'écosystème, peut entraîner une baisse importante de la biodiversité et déséquilibrer l'ensemble du milieu. Cet exemple illustre pourquoi la protection de la biodiversité est un enjeu majeur."},"carte":"Carte mémoire : au centre « ENVIRONNEMENT », branches : écosystème (milieu + vivants + relations), biodiversité, chaîne alimentaire, risques naturels (séismes, volcans), impacts humains (pollution, déforestation).","motscles":"écosystème, milieu, biodiversité, chaîne alimentaire, pollinisation, interdépendance, risque naturel, séisme, pollution, développement durable","vid":"","vidlab":""}}],"fr":[{"id":"F1","matiere":"fr","titre":"Se raconter, se représenter","objectif":"À la fin, tu sais reconnaître un texte autobiographique et expliquer ses caractéristiques (le « je », le pacte autobiographique).","qcm":[{"q":"Dans quelle phrase le récit est-il clairement autobiographique ?","good":"« Je me souviens du jour où ma grand-mère m'a appris à lire. »","choices":["« Je me souviens du jour où ma grand-mère m'a appris à lire. »","« Vous devez tourner à gauche après le pont. »","« Il était une fois un roi dans un château lointain. »","« Le héros découvrit alors le trésor caché. »"],"explain":"L'autobiographie se reconnaît au « je » qui renvoie à la vie réelle de l'auteur et à un souvenir personnel. Les autres phrases relèvent du conte, du récit de fiction ou d'une consigne.","verif":"Autobiographie : récit de sa propre vie, à la première personne."},{"q":"Dans un texte autobiographique, qui sont l'auteur, le narrateur et le personnage principal ?","good":"Une seule et même personne","choices":["Trois personnes toujours différentes","Le narrateur et le personnage, mais pas l'auteur","L'auteur et le narrateur seulement, pas le personnage","Une seule et même personne"],"explain":"C'est la définition même de l'autobiographie (le pacte autobiographique) : auteur = narrateur = personnage principal. C'est ce qui la distingue du roman.","verif":"Autobiographie : auteur = narrateur = personnage (le « je » réel)."},{"q":"Quel temps domine généralement dans le récit de souvenirs d'enfance ?","good":"L'imparfait et le passé composé (ou passé simple)","choices":["Le futur simple uniquement","Le conditionnel uniquement","Le présent de l'impératif","L'imparfait et le passé composé (ou passé simple)"],"explain":"On raconte des souvenirs au passé : l'imparfait pour le décor et les habitudes, le passé composé ou simple pour les actions. Le futur ou l'impératif ne conviennent pas à un souvenir.","verif":"Souvenirs = temps du passé (imparfait pour le décor, passé composé/simple pour les actions)."},{"q":"« À cette époque, nous habitions près de la mer et je jouais sur la plage. » Que raconte ce passage et à quel temps ?","good":"Une situation passée habituelle, à l'imparfait","choices":["Un ordre, à l'impératif","Un projet d'avenir, au futur","Une action unique et brève, au passé simple","Une situation passée habituelle, à l'imparfait"],"explain":"« habitions » et « jouais » sont à l'imparfait : ils décrivent un cadre et des habitudes passées, non une action ponctuelle. L'imparfait est le temps de la description et de l'habitude.","verif":"L'imparfait exprime le décor, la description et les habitudes du passé."}],"court":[],"paper":{"consigne":"En 8 à 10 lignes, raconte un souvenir d'enfance marquant à la première personne. Emploie le « je » et exprime ce que tu ressentais.","grille":["Quand j'étais petit, je suis tombé de vélo devant mes amis. J'ai eu très mal et j'étais gêné. Je m'en souviens encore aujourd'hui.","Je me souviens encore de mon premier jour à l'école primaire. Ce matin-là, je serrais la main de ma mère très fort, le ventre noué. La cour me paraissait immense et bruyante. Quand la cloche a sonné, j'ai dû lâcher sa main, et j'ai senti les larmes monter. Mais une fille s'est approchée et m'a proposé de jouer : d'un coup, la peur a laissé place à la curiosité. Aujourd'hui encore, je me rappelle ce mélange d'angoisse et de soulagement.","Je me souviens encore, avec une précision étonnante, de mon premier jour à l'école primaire. Ce matin-là, je serrais la main de ma mère si fort que mes doigts en étaient blancs, le ventre noué par une peur que je ne savais pas nommer. La cour me paraissait immense, traversée de cris et de courses, et je me sentais minuscule au milieu de ce monde inconnu. Lorsque la cloche a retenti, il a fallu lâcher cette main rassurante : j'ai senti les larmes me monter aux yeux et une boule se former dans ma gorge. C'est alors qu'une petite fille aux nattes brunes s'est approchée et m'a tendu une bille en me proposant de jouer. En un instant, l'angoisse a cédé la place à la curiosité, puis à une joie timide. Aujourd'hui encore, repenser à ce mélange de peur et de soulagement me rappelle combien les premières fois marquent durablement une vie."],"type":"devcons","minutes":15,"vid":""},"exos":[{"consigne":"En 8 à 10 lignes, raconte un souvenir d'enfance marquant à la première personne. Emploie le « je » et exprime ce que tu ressentais.","min":"Quand j'étais petit, je suis tombé de vélo devant mes amis. J'ai eu très mal et j'étais gêné. Je m'en souviens encore aujourd'hui.","solide":"Je me souviens encore de mon premier jour à l'école primaire. Ce matin-là, je serrais la main de ma mère très fort, le ventre noué. La cour me paraissait immense et bruyante. Quand la cloche a sonné, j'ai dû lâcher sa main, et j'ai senti les larmes monter. Mais une fille s'est approchée et m'a proposé de jouer : d'un coup, la peur a laissé place à la curiosité. Aujourd'hui encore, je me rappelle ce mélange d'angoisse et de soulagement.","mention":"Je me souviens encore, avec une précision étonnante, de mon premier jour à l'école primaire. Ce matin-là, je serrais la main de ma mère si fort que mes doigts en étaient blancs, le ventre noué par une peur que je ne savais pas nommer. La cour me paraissait immense, traversée de cris et de courses, et je me sentais minuscule au milieu de ce monde inconnu. Lorsque la cloche a retenti, il a fallu lâcher cette main rassurante : j'ai senti les larmes me monter aux yeux et une boule se former dans ma gorge. C'est alors qu'une petite fille aux nattes brunes s'est approchée et m'a tendu une bille en me proposant de jouer. En un instant, l'angoisse a cédé la place à la curiosité, puis à une joie timide. Aujourd'hui encore, repenser à ce mélange de peur et de soulagement me rappelle combien les premières fois marquent durablement une vie."},{"consigne":"En 8 à 10 lignes, raconte une rencontre qui t'a marqué, à la première personne. Emploie le passé composé et l'imparfait, et exprime au moins une émotion.","min":"Récit à la 1re personne, au passé, avec une émotion exprimée (« j'étais ému », « j'ai ressenti... »).","solide":"On attend un récit cohérent à la première personne (« je »), situé dans le passé. L'imparfait sert au décor et aux descriptions (« il faisait beau », « elle souriait »), le passé composé aux actions principales (« je l'ai rencontré », « nous avons parlé »). Au moins une émotion doit être nommée et reliée à la situation.","mention":"Cet exercice évalue l'écriture de soi (le récit autobiographique) et la maîtrise des temps du passé.\n\nAttendus de contenu : un récit cohérent à la première personne, centré sur une rencontre précise, avec un avant, un moment fort et un après. Une ou plusieurs émotions doivent être exprimées et justifiées par la situation, pas seulement nommées.\n\nAttendus de langue : l'alternance imparfait / passé composé doit être correcte. L'imparfait pose le décor et décrit (« la salle était pleine, il pleuvait »), tandis que le passé composé rapporte les actions de premier plan (« je suis entré, je l'ai aperçue »).\n\nExemple d'amorce possible : « Ce jour-là, il pleuvait et je m'ennuyais. Quand elle est entrée dans la classe, j'ai tout de suite senti que quelque chose allait changer... »\n\nConseil de relecture : vérifier la cohérence des temps, l'emploi du « je » du début à la fin, et la présence d'au moins une émotion clairement exprimée."},{"consigne":"En quelques lignes, fais ton autoportrait : décris-toi physiquement et moralement, en évitant les répétitions et en variant le vocabulaire.","min":"Quelques lignes à la 1re personne décrivant le physique et le caractère, avec un vocabulaire varié.","solide":"On attend un autoportrait à la première personne, organisé en deux temps : une partie physique (silhouette, traits, allure) et une partie morale (qualités, défauts, goûts). Le vocabulaire doit être précis et varié, sans répéter sans cesse les mêmes mots (« je suis... je suis... »).","mention":"L'exercice porte sur l'écriture de soi à travers l'autoportrait.\n\nAttendus de contenu : une description organisée, qui distingue le portrait physique (apparence, allure, un détail caractéristique) et le portrait moral (traits de caractère, qualités et défauts assumés, centres d'intérêt). L'ensemble doit donner une image cohérente et personnelle.\n\nAttendus de langue : un vocabulaire précis et varié. Pour éviter la répétition de « je suis », on peut utiliser d'autres tournures : « j'ai les cheveux... », « on me dit souvent... », « ce qui me caractérise, c'est... », « j'aime... ». Les adjectifs doivent être choisis avec soin (« réservé » plutôt que « pas bavard »).\n\nConseil de relecture : repérer les répétitions et les remplacer, vérifier que le portrait est à la fois physique et moral, et que les accords des adjectifs sont corrects."}],"parcours":{"mission":"À la fin, tu sais reconnaître un texte autobiographique et expliquer ses caractéristiques (le « je », le pacte autobiographique).","froid":[{"q":"Qu'est-ce qu'une autobiographie ?","rep":"Un récit dans lequel l'auteur raconte sa propre vie : l'auteur, le narrateur et le personnage principal sont la même personne."},{"q":"À quelle personne est généralement écrite une autobiographie ?","rep":"À la première personne du singulier (« je »)."},{"q":"Qu'est-ce que le « pacte autobiographique » ?","rep":"L'engagement implicite de l'auteur à dire la vérité sur sa propre vie au lecteur."},{"q":"Cite deux genres proches de l'autobiographie.","rep":"Les mémoires, le journal intime (on accepte aussi : l'autoportrait, la correspondance)."},{"q":"Quelle est la différence entre une autobiographie et un roman autobiographique ?","rep":"Dans l'autobiographie, l'auteur dit la vérité sur lui-même ; dans le roman autobiographique, il s'inspire de sa vie mais transforme et invente (le narrateur n'est pas exactement l'auteur)."}],"coffre":[{"q":"Dans une autobiographie, l'auteur, le ____ et le personnage principal sont une seule et même personne.","rep":"Mot attendu : narrateur"},{"q":"Une autobiographie est le plus souvent écrite à la ____ personne.","rep":"Mot attendu : première"},{"q":"Le pacte autobiographique est la promesse de dire la ____ au lecteur.","rep":"Mot attendu : vérité"},{"q":"Un journal ____ raconte les événements jour après jour, à la première personne.","rep":"Mot attendu : intime"},{"q":"Quand l'auteur s'inspire de sa vie mais invente, on parle de roman ____.","rep":"Mot attendu : autobiographique"}],"frise":[],"oral":"Explique en 90 secondes ce qu'est une autobiographie et comment on la reconnaît.","oralRedige":"Une autobiographie, c'est un texte dans lequel un auteur raconte sa propre vie. Ce qui la définit, c'est que l'auteur, le narrateur et le personnage principal ne font qu'une seule et même personne. On la reconnaît facilement parce qu'elle est écrite à la première personne, avec le pronom « je », et parce que l'auteur prend un engagement envers le lecteur : il promet de dire la vérité sur lui-même, c'est ce qu'on appelle le pacte autobiographique. Il existe des genres proches, comme les mémoires, qui insistent davantage sur les événements et l'époque traversée, ou le journal intime, écrit au jour le jour. Attention : si l'auteur s'inspire de sa vie mais invente et transforme, ce n'est plus une autobiographie mais un roman autobiographique.","ecrit":{"consigne":"En 8 à 10 lignes, raconte un souvenir d'enfance marquant à la première personne. Emploie le « je » et exprime ce que tu ressentais.","min":"Quand j'étais petit, je suis tombé de vélo devant mes amis. J'ai eu très mal et j'étais gêné. Je m'en souviens encore aujourd'hui.","solide":"Je me souviens encore de mon premier jour à l'école primaire. Ce matin-là, je serrais la main de ma mère très fort, le ventre noué. La cour me paraissait immense et bruyante. Quand la cloche a sonné, j'ai dû lâcher sa main, et j'ai senti les larmes monter. Mais une fille s'est approchée et m'a proposé de jouer : d'un coup, la peur a laissé place à la curiosité. Aujourd'hui encore, je me rappelle ce mélange d'angoisse et de soulagement.","mention":"Je me souviens encore, avec une précision étonnante, de mon premier jour à l'école primaire. Ce matin-là, je serrais la main de ma mère si fort que mes doigts en étaient blancs, le ventre noué par une peur que je ne savais pas nommer. La cour me paraissait immense, traversée de cris et de courses, et je me sentais minuscule au milieu de ce monde inconnu. Lorsque la cloche a retenti, il a fallu lâcher cette main rassurante : j'ai senti les larmes me monter aux yeux et une boule se former dans ma gorge. C'est alors qu'une petite fille aux nattes brunes s'est approchée et m'a tendu une bille en me proposant de jouer. En un instant, l'angoisse a cédé la place à la curiosité, puis à une joie timide. Aujourd'hui encore, repenser à ce mélange de peur et de soulagement me rappelle combien les premières fois marquent durablement une vie."},"ecritRedige":{"min":"Quand j'étais petit, je suis tombé de vélo devant mes amis. J'ai eu très mal et j'étais gêné. Je m'en souviens encore aujourd'hui.","solide":"Je me souviens encore de mon premier jour à l'école primaire. Ce matin-là, je serrais la main de ma mère très fort, le ventre noué. La cour me paraissait immense et bruyante. Quand la cloche a sonné, j'ai dû lâcher sa main, et j'ai senti les larmes monter. Mais une fille s'est approchée et m'a proposé de jouer : d'un coup, la peur a laissé place à la curiosité. Aujourd'hui encore, je me rappelle ce mélange d'angoisse et de soulagement.","mention":"Je me souviens encore, avec une précision étonnante, de mon premier jour à l'école primaire. Ce matin-là, je serrais la main de ma mère si fort que mes doigts en étaient blancs, le ventre noué par une peur que je ne savais pas nommer. La cour me paraissait immense, traversée de cris et de courses, et je me sentais minuscule au milieu de ce monde inconnu. Lorsque la cloche a retenti, il a fallu lâcher cette main rassurante : j'ai senti les larmes me monter aux yeux et une boule se former dans ma gorge. C'est alors qu'une petite fille aux nattes brunes s'est approchée et m'a tendu une bille en me proposant de jouer. En un instant, l'angoisse a cédé la place à la curiosité, puis à une joie timide. Aujourd'hui encore, repenser à ce mélange de peur et de soulagement me rappelle combien les premières fois marquent durablement une vie."},"carte":"Carte mémoire : au centre « SE RACONTER », 4 branches : autobiographie (auteur=narrateur=personnage), le « je », pacte autobiographique (vérité), genres proches (mémoires, journal).","motscles":"autobiographie, je, première personne, pacte autobiographique, narrateur, mémoires, journal intime, roman autobiographique","vid":"","vidlab":""}},{"id":"F2","matiere":"fr","titre":"Dénoncer les travers de la société","objectif":"À la fin, tu sais reconnaître un texte argumentatif et repérer comment un auteur critique la société (satire, ironie).","qcm":[{"q":"« Bravo, tu as encore tout cassé ! » dit-on à quelqu'un de maladroit. Quelle figure est employée ?","good":"L'ironie (dire le contraire de ce qu'on pense)","choices":["Une énumération","Une métaphore","L'ironie (dire le contraire de ce qu'on pense)","Une comparaison"],"explain":"On dit « Bravo » pour signifier le contraire et se moquer : c'est l'ironie. Elle ne compare rien et ne donne pas d'image.","verif":"Ironie = dire le contraire de sa pensée, souvent pour critiquer."},{"q":"Quelle phrase relève d'un texte argumentatif (et non d'un récit) ?","good":"« Il faut interdire le plastique car il pollue les océans. »","choices":["« Il faut interdire le plastique car il pollue les océans. »","« Le bateau s'éloigna lentement de la côte. »","« Elle ouvrit la porte et entra. »","« La forêt était sombre et silencieuse. »"],"explain":"La première phrase défend une opinion (« il faut ») appuyée par un argument (« car il pollue »). Les autres racontent ou décrivent.","verif":"Argumenter = défendre une opinion avec des arguments (souvent reliés par « car », « donc »)."},{"q":"Quelle est la différence entre convaincre et persuader ?","good":"Convaincre s'adresse à la raison, persuader aux émotions","choices":["Convaincre s'adresse à la raison, persuader aux émotions","Convaincre se fait à l'oral, persuader à l'écrit","Convaincre s'adresse aux émotions, persuader à la raison","Les deux sont exactement synonymes"],"explain":"Convaincre repose sur des arguments logiques (la raison) ; persuader cherche à toucher les sentiments (les émotions). Ne pas inverser les deux.","verif":"Convaincre = raison (arguments) ; persuader = émotions (sentiments)."},{"q":"« Ce projet est une véritable catastrophe pour la planète entière. » Quel procédé renforce la dénonciation ?","good":"L'exagération (hyperbole) pour frapper le lecteur","choices":["Une description neutre et objective","Une simple énumération de dates","L'exagération (hyperbole) pour frapper le lecteur","Une question de cours"],"explain":"« véritable catastrophe », « planète entière » exagèrent volontairement pour marquer les esprits : c'est une hyperbole, fréquente dans les textes qui dénoncent.","verif":"Pour dénoncer, on emploie souvent l'hyperbole et un vocabulaire fort."}],"court":[],"paper":{"consigne":"En 8 à 10 lignes, défends ton point de vue sur ce sujet : « Faut-il limiter le temps passé devant les écrans ? » Donne au moins deux arguments avec des exemples.","grille":["Je pense qu'il faut limiter les écrans. D'abord, trop d'écrans fatigue les yeux. Ensuite, on fait moins de sport et on voit moins ses amis. C'est pourquoi il vaut mieux les limiter.","Selon moi, il est nécessaire de limiter le temps passé devant les écrans. D'abord, un usage excessif nuit à la santé : passer des heures sur un téléphone fatigue les yeux et perturbe le sommeil, surtout le soir. Ensuite, les écrans réduisent les autres activités : un adolescent qui joue tout l'après-midi ne pratique plus de sport et voit moins ses amis. Enfin, ils peuvent isoler : on communique par messages plutôt qu'en personne. Pour toutes ces raisons, fixer des limites raisonnables me paraît une bonne chose.","À mon sens, limiter le temps passé devant les écrans est non seulement souhaitable, mais nécessaire, même si la question mérite d'être nuancée. Le premier argument est sanitaire : un usage excessif fatigue la vue, favorise la sédentarité et perturbe le sommeil, car la lumière des écrans le soir retarde l'endormissement. Le deuxième argument est social : un adolescent qui passe ses après-midi à jouer en ligne délaisse souvent le sport, la lecture et les rencontres réelles avec ses amis ; paradoxalement, ces outils censés relier peuvent isoler. On pourrait m'objecter que les écrans sont aussi des outils utiles pour apprendre, s'informer ou créer, et c'est vrai. C'est pourquoi je ne défends pas leur interdiction, mais une limitation raisonnable : il s'agit moins de supprimer les écrans que d'apprendre à en faire un usage maîtrisé. Trouver cet équilibre me semble être la véritable réponse au problème."],"type":"devcons","minutes":15,"vid":""},"exos":[{"consigne":"En 8 à 10 lignes, défends ton point de vue sur ce sujet : « Faut-il limiter le temps passé devant les écrans ? » Donne au moins deux arguments avec des exemples.","min":"Je pense qu'il faut limiter les écrans. D'abord, trop d'écrans fatigue les yeux. Ensuite, on fait moins de sport et on voit moins ses amis. C'est pourquoi il vaut mieux les limiter.","solide":"Selon moi, il est nécessaire de limiter le temps passé devant les écrans. D'abord, un usage excessif nuit à la santé : passer des heures sur un téléphone fatigue les yeux et perturbe le sommeil, surtout le soir. Ensuite, les écrans réduisent les autres activités : un adolescent qui joue tout l'après-midi ne pratique plus de sport et voit moins ses amis. Enfin, ils peuvent isoler : on communique par messages plutôt qu'en personne. Pour toutes ces raisons, fixer des limites raisonnables me paraît une bonne chose.","mention":"À mon sens, limiter le temps passé devant les écrans est non seulement souhaitable, mais nécessaire, même si la question mérite d'être nuancée. Le premier argument est sanitaire : un usage excessif fatigue la vue, favorise la sédentarité et perturbe le sommeil, car la lumière des écrans le soir retarde l'endormissement. Le deuxième argument est social : un adolescent qui passe ses après-midi à jouer en ligne délaisse souvent le sport, la lecture et les rencontres réelles avec ses amis ; paradoxalement, ces outils censés relier peuvent isoler. On pourrait m'objecter que les écrans sont aussi des outils utiles pour apprendre, s'informer ou créer, et c'est vrai. C'est pourquoi je ne défends pas leur interdiction, mais une limitation raisonnable : il s'agit moins de supprimer les écrans que d'apprendre à en faire un usage maîtrisé. Trouver cet équilibre me semble être la véritable réponse au problème."},{"consigne":"En 8 à 10 lignes, défends ton point de vue sur ce sujet : « Les réseaux sociaux sont-ils plutôt utiles ou dangereux pour les adolescents ? » Donne au moins deux arguments illustrés d'exemples.","min":"Une opinion claire, au moins deux arguments, chacun appuyé par un exemple, et des connecteurs logiques.","solide":"On attend une thèse annoncée clairement, puis au moins deux arguments distincts, chacun illustré par un exemple concret. Les arguments doivent être reliés par des connecteurs logiques (« d'abord », « de plus », « par exemple », « en revanche »). Une courte conclusion résume la position.","mention":"L'exercice évalue l'argumentation : défendre un point de vue de façon organisée et convaincante.\n\nAttendus de contenu : une thèse claire dès le début (utiles, dangereux, ou nuancé). Ensuite, au moins deux arguments différents, chacun appuyé par un exemple précis et crédible (par exemple : « les réseaux permettent de garder le lien avec ses amis, comme pendant les vacances » ; « mais ils exposent au harcèlement, par exemple via des messages anonymes »). Une conclusion brève rappelle la position.\n\nAttendus de langue : l'emploi de connecteurs logiques pour structurer le raisonnement (« tout d'abord », « ensuite », « de plus », « cependant », « c'est pourquoi »). Les phrases doivent être correctes et la position cohérente du début à la fin.\n\nConseil de relecture : vérifier que chaque argument est bien accompagné d'un exemple, que les connecteurs enchaînent logiquement les idées, et que la conclusion ne contredit pas la thèse de départ."},{"consigne":"En quelques lignes, rédige un court texte qui dénonce un comportement que tu trouves injuste (le gaspillage, les moqueries, etc.). Utilise au moins une question rhétorique pour interpeller le lecteur.","min":"Un texte qui dénonce un comportement, avec une prise de position et au moins une question rhétorique.","solide":"On attend un texte engagé qui dénonce clairement un comportement jugé injuste, en cherchant à convaincre le lecteur. Au moins une question rhétorique (une question dont la réponse est évidente) doit servir à l'interpeller (« Peut-on vraiment accepter cela ? »). Le ton doit rester correct et argumenté.","mention":"L'exercice porte sur le texte qui dénonce, en mobilisant des procédés d'argumentation et de persuasion.\n\nAttendus de contenu : le comportement dénoncé doit être identifiable et la prise de position nette. Le texte doit chercher à toucher le lecteur, par exemple en montrant les conséquences du comportement ou en s'adressant à lui.\n\nAttendus de langue et procédés : au moins une question rhétorique, c'est-à-dire une question qui n'attend pas de réponse car elle est évidente, destinée à faire réfléchir le lecteur (« Est-il normal de jeter autant de nourriture quand d'autres ont faim ? »). On peut renforcer l'effet avec d'autres procédés : adresse au lecteur, répétition, vocabulaire fort.\n\nConseil de relecture : vérifier la présence et la pertinence de la question rhétorique, la clarté de la dénonciation, et le maintien d'un registre correct (dénoncer n'est pas insulter)."}],"parcours":{"mission":"À la fin, tu sais reconnaître un texte argumentatif et repérer comment un auteur critique la société (satire, ironie).","froid":[{"q":"Qu'est-ce qu'argumenter ?","rep":"Défendre une opinion (une thèse) à l'aide d'arguments et d'exemples pour convaincre ou persuader le lecteur."},{"q":"Quelle est la différence entre convaincre et persuader ?","rep":"Convaincre s'adresse à la raison (logique, preuves) ; persuader s'adresse aux émotions et aux sentiments."},{"q":"Qu'est-ce que l'ironie ?","rep":"Dire le contraire de ce que l'on pense, pour se moquer ou critiquer. Le lecteur comprend qu'il faut entendre l'inverse."},{"q":"Qu'est-ce qu'une satire ?","rep":"Un texte qui critique en s'en moquant les défauts d'une personne, d'un groupe ou de la société."},{"q":"Cite un genre littéraire qui sert souvent à dénoncer.","rep":"La fable (ou l'apologue), le conte philosophique, l'essai, la fable de La Fontaine."}],"coffre":[{"q":"Argumenter, c'est défendre une ____ avec des arguments et des exemples.","rep":"Mot attendu : thèse"},{"q":"Convaincre s'adresse à la raison, persuader s'adresse aux ____.","rep":"Mot attendu : émotions"},{"q":"L'____ consiste à dire le contraire de ce que l'on pense pour critiquer.","rep":"Mot attendu : ironie"},{"q":"Une ____ se moque des défauts de la société pour les dénoncer.","rep":"Mot attendu : satire"},{"q":"Un argument est souvent appuyé par un ____ concret.","rep":"Mot attendu : exemple"}],"frise":[],"oral":"Explique en 90 secondes comment un auteur peut critiquer la société à travers un texte.","oralRedige":"Pour critiquer la société, un auteur ne dit pas toujours les choses directement : il utilise souvent l'argumentation et des procédés littéraires. Argumenter, c'est défendre une opinion, une thèse, à l'aide d'arguments appuyés par des exemples, dans le but de convaincre, c'est-à-dire de s'adresser à la raison, ou de persuader, c'est-à-dire de toucher les émotions. Mais pour dénoncer, les écrivains emploient aussi des armes plus subtiles. L'ironie, par exemple, consiste à dire le contraire de ce que l'on pense pour mieux se moquer : le lecteur comprend qu'il faut entendre l'inverse. La satire, elle, ridiculise ouvertement les défauts d'un groupe ou de la société. Des genres comme la fable, le conte philosophique ou l'essai sont très utilisés pour faire passer une critique de manière efficace et parfois amusante.","ecrit":{"consigne":"En 8 à 10 lignes, défends ton point de vue sur ce sujet : « Faut-il limiter le temps passé devant les écrans ? » Donne au moins deux arguments avec des exemples.","min":"Je pense qu'il faut limiter les écrans. D'abord, trop d'écrans fatigue les yeux. Ensuite, on fait moins de sport et on voit moins ses amis. C'est pourquoi il vaut mieux les limiter.","solide":"Selon moi, il est nécessaire de limiter le temps passé devant les écrans. D'abord, un usage excessif nuit à la santé : passer des heures sur un téléphone fatigue les yeux et perturbe le sommeil, surtout le soir. Ensuite, les écrans réduisent les autres activités : un adolescent qui joue tout l'après-midi ne pratique plus de sport et voit moins ses amis. Enfin, ils peuvent isoler : on communique par messages plutôt qu'en personne. Pour toutes ces raisons, fixer des limites raisonnables me paraît une bonne chose.","mention":"À mon sens, limiter le temps passé devant les écrans est non seulement souhaitable, mais nécessaire, même si la question mérite d'être nuancée. Le premier argument est sanitaire : un usage excessif fatigue la vue, favorise la sédentarité et perturbe le sommeil, car la lumière des écrans le soir retarde l'endormissement. Le deuxième argument est social : un adolescent qui passe ses après-midi à jouer en ligne délaisse souvent le sport, la lecture et les rencontres réelles avec ses amis ; paradoxalement, ces outils censés relier peuvent isoler. On pourrait m'objecter que les écrans sont aussi des outils utiles pour apprendre, s'informer ou créer, et c'est vrai. C'est pourquoi je ne défends pas leur interdiction, mais une limitation raisonnable : il s'agit moins de supprimer les écrans que d'apprendre à en faire un usage maîtrisé. Trouver cet équilibre me semble être la véritable réponse au problème."},"ecritRedige":{"min":"Je pense qu'il faut limiter les écrans. D'abord, trop d'écrans fatigue les yeux. Ensuite, on fait moins de sport et on voit moins ses amis. C'est pourquoi il vaut mieux les limiter.","solide":"Selon moi, il est nécessaire de limiter le temps passé devant les écrans. D'abord, un usage excessif nuit à la santé : passer des heures sur un téléphone fatigue les yeux et perturbe le sommeil, surtout le soir. Ensuite, les écrans réduisent les autres activités : un adolescent qui joue tout l'après-midi ne pratique plus de sport et voit moins ses amis. Enfin, ils peuvent isoler : on communique par messages plutôt qu'en personne. Pour toutes ces raisons, fixer des limites raisonnables me paraît une bonne chose.","mention":"À mon sens, limiter le temps passé devant les écrans est non seulement souhaitable, mais nécessaire, même si la question mérite d'être nuancée. Le premier argument est sanitaire : un usage excessif fatigue la vue, favorise la sédentarité et perturbe le sommeil, car la lumière des écrans le soir retarde l'endormissement. Le deuxième argument est social : un adolescent qui passe ses après-midi à jouer en ligne délaisse souvent le sport, la lecture et les rencontres réelles avec ses amis ; paradoxalement, ces outils censés relier peuvent isoler. On pourrait m'objecter que les écrans sont aussi des outils utiles pour apprendre, s'informer ou créer, et c'est vrai. C'est pourquoi je ne défends pas leur interdiction, mais une limitation raisonnable : il s'agit moins de supprimer les écrans que d'apprendre à en faire un usage maîtrisé. Trouver cet équilibre me semble être la véritable réponse au problème."},"carte":"Carte mémoire : au centre « DÉNONCER », branches : argumenter (thèse+arguments+exemples), convaincre vs persuader, ironie (dire le contraire), satire (se moquer), genres (fable, essai).","motscles":"argumenter, thèse, argument, exemple, convaincre, persuader, ironie, satire, dénoncer, fable, essai","vid":"","vidlab":""}},{"id":"F3","matiere":"fr","titre":"Visions poétiques du monde","objectif":"À la fin, tu sais reconnaître les caractéristiques d'un poème et nommer les principales figures de style.","qcm":[{"q":"Quelle phrase contient une métaphore (et non une comparaison) ?","good":"« Cet homme est un lion au combat. »","choices":["« Cet homme est courageux comme un lion. »","« Cet homme ressemble à un lion. »","« Cet homme est un lion au combat. »","« Cet homme est tel un lion. »"],"explain":"La métaphore rapproche deux éléments SANS outil de comparaison. « est un lion » est une métaphore ; les autres utilisent « comme », « tel », « ressemble à » (comparaisons).","verif":"Comparaison = avec outil (comme, tel...) ; métaphore = sans outil."},{"q":"« La ville dormait sous un manteau de neige. » Quelle(s) figure(s) reconnaît-on ?","good":"Une personnification (« la ville dormait ») et une métaphore (« manteau de neige »)","choices":["Une simple comparaison avec « comme »","Une personnification (« la ville dormait ») et une métaphore (« manteau de neige »)","Une hyperbole uniquement","Aucune figure de style"],"explain":"« la ville dormait » prête une action humaine à une chose (personnification) ; « manteau de neige » est une image sans outil de comparaison (métaphore).","verif":"Personnification = action humaine prêtée à une chose ; métaphore = image sans « comme »."},{"q":"Un vers de 12 syllabes s'appelle :","good":"Un alexandrin","choices":["Un alexandrin","Une rime","Un quatrain","Une strophe"],"explain":"L'alexandrin est le vers de 12 syllabes. Le quatrain et la strophe sont des groupes de vers, la rime est la répétition d'un son en fin de vers.","verif":"Alexandrin = 12 syllabes. Quatrain = strophe de 4 vers."},{"q":"Dans « Les sanglots longs des violons de l'automne », quel effet sonore est recherché ?","good":"La répétition de sons doux (allitération en « l » et assonance)","choices":["Une opposition de deux idées contraires","Une exagération comique","La répétition de sons doux (allitération en « l » et assonance)","Une rime suffisante en fin de vers"],"explain":"La reprise des sons « l » et « on » crée une musicalité douce et mélancolique (allitération et assonance), procédé typiquement poétique.","verif":"Allitération = répétition de consonnes ; assonance = répétition de voyelles."}],"court":[],"paper":{"consigne":"En quelques lignes, décris un paysage (la mer, la forêt, la nuit...) en employant au moins une comparaison et une métaphore. Soigne les images.","grille":["La mer est belle. Les vagues sont blanches comme du lait. Le soleil est un feu dans le ciel.","Au coucher du soleil, la mer s'étend, immense et calme. Les vagues roulent doucement, blanches comme de la dentelle, puis se retirent en murmurant. Le soleil, énorme boule de feu, descend lentement à l'horizon et incendie le ciel de rouge et d'or. Le soir tombe comme un voile sur l'eau.","Au crépuscule, la mer s'étend devant moi, immense et apaisée, telle une étoffe de soie froissée par la brise. Les vagues, blanches comme de la dentelle, viennent caresser le sable puis se retirent dans un murmure, comme si elles me confiaient un secret. À l'horizon, le soleil n'est plus qu'une énorme boule de feu qui agonise lentement, incendiant le ciel de pourpre et d'or. Peu à peu, le soir tombe sur l'eau comme un voile sombre, et la mer, devenue miroir, retient encore les dernières lueurs du jour. Dans ce silence, on dirait que la nature elle-même retient son souffle."],"type":"devcons","minutes":15,"vid":""},"exos":[{"consigne":"En quelques lignes, décris un paysage (la mer, la forêt, la nuit...) en employant au moins une comparaison et une métaphore. Soigne les images.","min":"La mer est belle. Les vagues sont blanches comme du lait. Le soleil est un feu dans le ciel.","solide":"Au coucher du soleil, la mer s'étend, immense et calme. Les vagues roulent doucement, blanches comme de la dentelle, puis se retirent en murmurant. Le soleil, énorme boule de feu, descend lentement à l'horizon et incendie le ciel de rouge et d'or. Le soir tombe comme un voile sur l'eau.","mention":"Au crépuscule, la mer s'étend devant moi, immense et apaisée, telle une étoffe de soie froissée par la brise. Les vagues, blanches comme de la dentelle, viennent caresser le sable puis se retirent dans un murmure, comme si elles me confiaient un secret. À l'horizon, le soleil n'est plus qu'une énorme boule de feu qui agonise lentement, incendiant le ciel de pourpre et d'or. Peu à peu, le soir tombe sur l'eau comme un voile sombre, et la mer, devenue miroir, retient encore les dernières lueurs du jour. Dans ce silence, on dirait que la nature elle-même retient son souffle."},{"consigne":"En quelques lignes, écris un court texte poétique sur un sentiment (la joie, la nostalgie, la peur...). Emploie au moins une comparaison et une métaphore.","min":"Un texte évoquant un sentiment, avec au moins une comparaison (« comme... ») et une métaphore.","solide":"On attend un texte court à visée poétique qui évoque un sentiment de façon imagée. Il doit contenir au moins une comparaison (avec un outil comme « comme », « tel », « pareil à ») et une métaphore (image sans outil de comparaison). Le travail sur les images et les sonorités est valorisé.","mention":"L'exercice porte sur l'écriture poétique et l'emploi des images.\n\nAttendus de contenu : un texte qui exprime un sentiment non pas en le nommant platement, mais en le faisant ressentir par des images. Le sentiment choisi doit rester perceptible tout au long du texte.\n\nAttendus de procédés : au moins une comparaison, qui rapproche deux éléments à l'aide d'un outil (« ma joie éclate comme un feu d'artifice ») ; et au moins une métaphore, qui rapproche deux éléments sans outil de comparaison (« mon cœur, brasier dans la nuit »). On valorise aussi le travail sur le rythme et les sonorités (allitérations, assonances).\n\nConseil de relecture : vérifier qu'il y a bien une comparaison ET une métaphore distinctes, que les images servent le sentiment choisi, et que le texte garde une unité."},{"consigne":"Lis ces deux vers et explique l'image employée : « La nature est un temple où de vivants piliers / Laissent parfois sortir de confuses paroles ». Quelle figure de style reconnais-tu ?","min":"La nature est comparée à un temple : c'est une métaphore. Les arbres sont les « piliers vivants ».","solide":"Les vers comparent la nature à un temple, sans outil de comparaison : c'est une métaphore. Les arbres deviennent des « piliers vivants », et la nature un lieu sacré qui semble parler (« confuses paroles »). L'image suggère que la nature est mystérieuse et porteuse d'un message, comme un lieu de culte.","mention":"L'exercice demande d'identifier et d'expliquer une image poétique.\n\nIdentification de la figure : la nature est assimilée à « un temple » sans mot-outil de comparaison (pas de « comme »). Il s'agit donc d'une métaphore. Les arbres sont désignés par l'expression « vivants piliers », ce qui prolonge l'image du temple.\n\nExplication du sens : en comparant la nature à un temple, le poète lui donne un caractère sacré et mystérieux. Les « confuses paroles » suggèrent que la nature s'adresse à l'homme, comme si elle délivrait un message difficile à comprendre. L'image invite à voir la nature autrement, comme un espace spirituel.\n\nConseil de méthode : pour analyser une image, on nomme la figure, on explique le rapprochement opéré (ici nature/temple, arbres/piliers), puis on dégage l'effet produit sur le lecteur ou le sens suggéré."}],"parcours":{"mission":"À la fin, tu sais reconnaître les caractéristiques d'un poème et nommer les principales figures de style.","froid":[{"q":"Comment s'appelle une ligne dans un poème ?","rep":"Un vers."},{"q":"Comment s'appelle un groupe de vers séparé des autres par un espace ?","rep":"Une strophe."},{"q":"Qu'est-ce qu'une rime ?","rep":"La répétition du même son à la fin de deux vers ou plus."},{"q":"Qu'est-ce qu'une comparaison ? Donne un exemple.","rep":"Rapprocher deux éléments à l'aide d'un mot de comparaison (comme, tel, pareil à). Ex. : « fort comme un lion »."},{"q":"Qu'est-ce qu'une métaphore ? En quoi diffère-t-elle de la comparaison ?","rep":"Une comparaison sans mot de comparaison : on dit directement que l'un est l'autre. Ex. : « cet homme est un lion » (pas de « comme »)."}],"coffre":[{"q":"Une ligne d'un poème s'appelle un ____.","rep":"Mot attendu : vers"},{"q":"Un groupe de vers s'appelle une ____.","rep":"Mot attendu : strophe"},{"q":"Une ____ est la répétition d'un même son à la fin des vers.","rep":"Mot attendu : rime"},{"q":"La comparaison utilise un mot de comparaison comme « ____ », la métaphore non.","rep":"Mot attendu : comme"},{"q":"Donner des sentiments humains à une chose, c'est une ____ (ex. : « le vent pleure »).","rep":"Mot attendu : personnification"}],"frise":[],"oral":"Explique en 90 secondes ce qui caractérise un poème et cite deux figures de style.","oralRedige":"Un poème se reconnaît d'abord à sa forme. Le texte est organisé en vers, c'est-à-dire en lignes, regroupées en strophes séparées par des espaces. Très souvent, les vers se terminent par des rimes, c'est-à-dire la répétition d'un même son. Mais la poésie, ce n'est pas seulement une forme : c'est aussi une manière particulière de voir et de dire le monde, grâce aux figures de style. Par exemple, la comparaison rapproche deux éléments avec un mot comme « comme » : « courageux comme un lion ». La métaphore fait la même chose mais sans mot de comparaison : on dit directement « cet homme est un lion ». Il existe aussi la personnification, qui donne des sentiments humains à une chose, comme « le vent pleure ». Ces images permettent au poète d'exprimer ses émotions et de nous faire voir le monde autrement.","ecrit":{"consigne":"En quelques lignes, décris un paysage (la mer, la forêt, la nuit...) en employant au moins une comparaison et une métaphore. Soigne les images.","min":"La mer est belle. Les vagues sont blanches comme du lait. Le soleil est un feu dans le ciel.","solide":"Au coucher du soleil, la mer s'étend, immense et calme. Les vagues roulent doucement, blanches comme de la dentelle, puis se retirent en murmurant. Le soleil, énorme boule de feu, descend lentement à l'horizon et incendie le ciel de rouge et d'or. Le soir tombe comme un voile sur l'eau.","mention":"Au crépuscule, la mer s'étend devant moi, immense et apaisée, telle une étoffe de soie froissée par la brise. Les vagues, blanches comme de la dentelle, viennent caresser le sable puis se retirent dans un murmure, comme si elles me confiaient un secret. À l'horizon, le soleil n'est plus qu'une énorme boule de feu qui agonise lentement, incendiant le ciel de pourpre et d'or. Peu à peu, le soir tombe sur l'eau comme un voile sombre, et la mer, devenue miroir, retient encore les dernières lueurs du jour. Dans ce silence, on dirait que la nature elle-même retient son souffle."},"ecritRedige":{"min":"La mer est belle. Les vagues sont blanches comme du lait. Le soleil est un feu dans le ciel.","solide":"Au coucher du soleil, la mer s'étend, immense et calme. Les vagues roulent doucement, blanches comme de la dentelle, puis se retirent en murmurant. Le soleil, énorme boule de feu, descend lentement à l'horizon et incendie le ciel de rouge et d'or. Le soir tombe comme un voile sur l'eau.","mention":"Au crépuscule, la mer s'étend devant moi, immense et apaisée, telle une étoffe de soie froissée par la brise. Les vagues, blanches comme de la dentelle, viennent caresser le sable puis se retirent dans un murmure, comme si elles me confiaient un secret. À l'horizon, le soleil n'est plus qu'une énorme boule de feu qui agonise lentement, incendiant le ciel de pourpre et d'or. Peu à peu, le soir tombe sur l'eau comme un voile sombre, et la mer, devenue miroir, retient encore les dernières lueurs du jour. Dans ce silence, on dirait que la nature elle-même retient son souffle."},"carte":"Carte mémoire : au centre « POÉSIE », branches forme (vers, strophe, rime) et figures (comparaison avec « comme », métaphore sans « comme », personnification).","motscles":"vers, strophe, rime, comparaison, métaphore, personnification, figures de style, lyrisme, image","vid":"","vidlab":""}},{"id":"F4","matiere":"fr","titre":"Agir dans la cité : individu et pouvoir","objectif":"À la fin, tu sais reconnaître un texte de théâtre et comprendre comment la littérature évoque l'engagement et la guerre.","qcm":[{"q":"Dans un texte de théâtre, « (Il se lève brusquement, furieux.) » est :","good":"Une didascalie (indication de jeu)","choices":["Une réplique","Un monologue","Une didascalie (indication de jeu)","Une tirade"],"explain":"Le texte entre parenthèses, en italique, qui indique un geste ou un ton, est une didascalie. Ce n'est pas prononcé par le personnage.","verif":"Didascalie = indication scénique, non prononcée par les personnages."},{"q":"Un personnage seul sur scène exprime ses pensées à voix haute. Comment appelle-t-on cette longue prise de parole ?","good":"Un monologue","choices":["Une stichomythie de répliques courtes","Un dialogue","Un monologue","Une didascalie"],"explain":"Quand un personnage parle seul, c'est un monologue. Le dialogue suppose au moins deux personnages qui échangent.","verif":"Monologue = un seul personnage parle ; dialogue = échange entre plusieurs."},{"q":"Quelle réplique relève d'un théâtre qui critique le pouvoir ?","good":"« Les puissants font les lois et les pauvres les subissent. »","choices":["« Les puissants font les lois et les pauvres les subissent. »","« Quel beau temps nous avons aujourd'hui ! »","« J'adore me promener au bord de l'eau. »","« Passe-moi le sel, je te prie. »"],"explain":"La première réplique dénonce une injustice liée au pouvoir : c'est du théâtre engagé. Les autres sont des propos ordinaires sans portée critique.","verif":"Théâtre engagé : le dialogue sert à défendre une cause ou dénoncer une injustice."},{"q":"Au théâtre, une longue réplique ininterrompue d'un personnage qui développe ses idées s'appelle :","good":"Une tirade","choices":["Une didascalie","Une tirade","Une strophe","Une rime"],"explain":"Une tirade est une longue réplique dite d'un seul trait. La strophe et la rime appartiennent à la poésie, la didascalie est une indication scénique.","verif":"Tirade = longue réplique d'un seul personnage."}],"court":[],"paper":{"consigne":"En 8 à 10 lignes, écris un court dialogue de théâtre entre deux personnages qui ne sont pas d'accord sur une décision importante. N'oublie pas les noms et au moins une didascalie.","grille":["LÉA. Il faut partir maintenant.\nTOM, inquiet. Non, c'est trop dangereux.\nLÉA. Si on reste, on sera pris.\nTOM. Alors d'accord, on y va.","LÉA, à voix basse. Il faut partir maintenant, pendant qu'ils dorment.\nTOM, inquiet. Non, c'est trop risqué. S'ils nous entendent, c'est fini.\nLÉA. Et si on reste, tu crois qu'on a une chance ? Demain, ils nous trouveront.\nTOM, hésitant. Tu as peut-être raison... Mais j'ai peur, Léa.\nLÉA, lui prenant la main. Moi aussi. Mais la peur ne doit pas décider à notre place. Viens.","La scène se passe la nuit, dans une cave éclairée par une bougie.\n\nLÉA, à voix basse, jetant un regard vers la porte. Il faut partir maintenant, Tom, pendant qu'ils dorment. C'est notre seule chance.\nTOM, reculant, la voix tremblante. Non. C'est de la folie. S'ils nous entendent dans l'escalier, c'est fini pour nous deux.\nLÉA. Et si on reste là, recroquevillés dans cette cave ? Tu crois vraiment qu'on a une chance ? Demain matin, ils fouilleront la maison et ils nous trouveront.\nTOM, se passant la main sur le visage. Tu as peut-être raison... Mais j'ai peur, Léa. Je n'ai jamais eu aussi peur.\nLÉA, s'approchant et lui prenant la main avec douceur. Moi aussi, j'ai peur. Mais la peur ne doit pas décider à notre place, sinon nous ne ferons jamais rien. Lève-toi. On part ensemble.\nTOM, après un long silence, se redressant. Ensemble, alors."],"type":"devcons","minutes":15,"vid":""},"exos":[{"consigne":"En 8 à 10 lignes, écris un court dialogue de théâtre entre deux personnages qui ne sont pas d'accord sur une décision importante. N'oublie pas les noms et au moins une didascalie.","min":"LÉA. Il faut partir maintenant.\nTOM, inquiet. Non, c'est trop dangereux.\nLÉA. Si on reste, on sera pris.\nTOM. Alors d'accord, on y va.","solide":"LÉA, à voix basse. Il faut partir maintenant, pendant qu'ils dorment.\nTOM, inquiet. Non, c'est trop risqué. S'ils nous entendent, c'est fini.\nLÉA. Et si on reste, tu crois qu'on a une chance ? Demain, ils nous trouveront.\nTOM, hésitant. Tu as peut-être raison... Mais j'ai peur, Léa.\nLÉA, lui prenant la main. Moi aussi. Mais la peur ne doit pas décider à notre place. Viens.","mention":"La scène se passe la nuit, dans une cave éclairée par une bougie.\n\nLÉA, à voix basse, jetant un regard vers la porte. Il faut partir maintenant, Tom, pendant qu'ils dorment. C'est notre seule chance.\nTOM, reculant, la voix tremblante. Non. C'est de la folie. S'ils nous entendent dans l'escalier, c'est fini pour nous deux.\nLÉA. Et si on reste là, recroquevillés dans cette cave ? Tu crois vraiment qu'on a une chance ? Demain matin, ils fouilleront la maison et ils nous trouveront.\nTOM, se passant la main sur le visage. Tu as peut-être raison... Mais j'ai peur, Léa. Je n'ai jamais eu aussi peur.\nLÉA, s'approchant et lui prenant la main avec douceur. Moi aussi, j'ai peur. Mais la peur ne doit pas décider à notre place, sinon nous ne ferons jamais rien. Lève-toi. On part ensemble.\nTOM, après un long silence, se redressant. Ensemble, alors."},{"consigne":"En 8 à 10 lignes, écris une scène de théâtre où un personnage essaie de convaincre un autre de changer d'avis. Indique les noms des personnages et au moins une didascalie.","min":"Un dialogue de théâtre avec noms des personnages devant les répliques et au moins une didascalie (indication entre parenthèses ou en italique).","solide":"On attend un court dialogue théâtral présenté correctement : le nom du personnage devant chaque réplique, suivi de ses paroles. Au moins une didascalie (indication de jeu, de ton ou de geste) doit figurer, souvent entre parenthèses. Le dialogue doit montrer un personnage qui argumente pour faire changer l'autre d'avis.","mention":"L'exercice porte sur l'écriture théâtrale et l'argumentation dans le dialogue.\n\nAttendus de présentation : la forme du texte de théâtre doit être respectée. Le nom du personnage est placé devant chaque réplique (par exemple « LÉA : »), suivi de ses paroles. Au moins une didascalie, c'est-à-dire une indication scénique (ton, geste, déplacement), doit apparaître, généralement entre parenthèses et en italique (« (elle se lève, agacée) »).\n\nAttendus de contenu : un personnage cherche à convaincre l'autre. On doit percevoir une stratégie : arguments, exemples, appel aux émotions, et la résistance ou l'évolution de l'autre personnage.\n\nConseil de relecture : vérifier que chaque réplique est bien attribuée à un personnage nommé, qu'il y a au moins une didascalie, et que l'échange progresse (l'un tente de convaincre, l'autre réagit)."},{"consigne":"Explique la différence entre une réplique, une tirade et une didascalie au théâtre. Donne un exemple court de didascalie.","min":"Réplique : ce que dit un personnage. Tirade : une longue réplique. Didascalie : indication de mise en scène (ex. : « (à voix basse) »).","solide":"Une réplique est ce que dit un personnage quand c'est son tour de parler. Une tirade est une longue réplique dite d'un seul trait par un même personnage. Une didascalie est une indication scénique donnée par l'auteur (ton, geste, décor), qui n'est pas prononcée par les personnages. Exemple de didascalie : « (il sort en claquant la porte) ».","mention":"L'exercice vérifie la connaissance du vocabulaire du théâtre.\n\nLa réplique : c'est la prise de parole d'un personnage dans le dialogue, ce qu'il dit lorsque c'est son tour. Un dialogue est une succession de répliques.\n\nLa tirade : c'est une réplique particulièrement longue, prononcée sans interruption par un seul personnage. Elle sert souvent à exposer des idées, des sentiments ou à convaincre.\n\nLa didascalie : c'est une indication scénique écrite par l'auteur, qui ne se dit pas sur scène mais guide le jeu des acteurs et la mise en scène (gestes, ton, déplacements, décor). On la repère souvent à l'italique ou aux parenthèses. Exemple : « (à voix basse, en se rapprochant) ».\n\nConclusion : réplique, tirade et didascalie se distinguent par leur fonction. Les deux premières sont prononcées par les personnages (la tirade étant une longue réplique), tandis que la didascalie est une consigne de l'auteur, non dite."}],"parcours":{"mission":"À la fin, tu sais reconnaître un texte de théâtre et comprendre comment la littérature évoque l'engagement et la guerre.","froid":[{"q":"Au théâtre, comment appelle-t-on le texte prononcé par un seul personnage qui parle seul ?","rep":"Un monologue."},{"q":"Comment appelle-t-on les indications de mise en scène, en italique, qui ne sont pas dites par les personnages ?","rep":"Les didascalies."},{"q":"Qu'est-ce qu'un dialogue au théâtre ?","rep":"L'échange de paroles entre deux personnages ou plus (les répliques)."},{"q":"Qu'est-ce qu'un texte engagé ?","rep":"Un texte par lequel l'auteur défend une cause ou dénonce une injustice (la guerre, le racisme, l'oppression...)."},{"q":"Cite un thème souvent traité par la littérature de l'engagement.","rep":"La guerre, la Résistance, la liberté, les droits de l'homme, la lutte contre l'injustice."}],"coffre":[{"q":"Quand un personnage parle seul sur scène, c'est un ____.","rep":"Mot attendu : monologue"},{"q":"Les indications de mise en scène, en italique, s'appellent les ____.","rep":"Mot attendu : didascalies"},{"q":"Au théâtre, une prise de parole d'un personnage s'appelle une ____.","rep":"Mot attendu : réplique"},{"q":"Un texte ____ défend une cause ou dénonce une injustice.","rep":"Mot attendu : engagé"},{"q":"Les récits de ____ et de Résistance montrent souvent des héros ordinaires face au danger.","rep":"Mot attendu : guerre"}],"frise":[],"oral":"Explique en 90 secondes ce qui caractérise un texte de théâtre.","oralRedige":"Un texte de théâtre se reconnaît à sa présentation très particulière. Il est fait pour être joué : on y trouve le nom des personnages, suivi de leurs paroles, qu'on appelle des répliques. L'échange de répliques entre plusieurs personnages forme un dialogue ; quand un personnage parle seul sur scène, c'est un monologue. À côté des paroles, on trouve les didascalies : ce sont les indications de mise en scène, souvent en italique, qui précisent les gestes, le décor ou le ton, mais qui ne sont pas prononcées par les acteurs. Le théâtre, comme d'autres genres, peut servir à agir dans la cité : à travers des récits de guerre, de Résistance ou des textes engagés, les auteurs défendent des causes, dénoncent l'injustice et nous font réfléchir sur le pouvoir et la liberté.","ecrit":{"consigne":"En 8 à 10 lignes, écris un court dialogue de théâtre entre deux personnages qui ne sont pas d'accord sur une décision importante. N'oublie pas les noms et au moins une didascalie.","min":"LÉA. Il faut partir maintenant.\nTOM, inquiet. Non, c'est trop dangereux.\nLÉA. Si on reste, on sera pris.\nTOM. Alors d'accord, on y va.","solide":"LÉA, à voix basse. Il faut partir maintenant, pendant qu'ils dorment.\nTOM, inquiet. Non, c'est trop risqué. S'ils nous entendent, c'est fini.\nLÉA. Et si on reste, tu crois qu'on a une chance ? Demain, ils nous trouveront.\nTOM, hésitant. Tu as peut-être raison... Mais j'ai peur, Léa.\nLÉA, lui prenant la main. Moi aussi. Mais la peur ne doit pas décider à notre p

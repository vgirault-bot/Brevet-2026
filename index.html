duction, puis avec le coefficient multiplicateur.","grille":["Réduction : 80 × 25/100 = 20 €. Nouveau prix : 80 − 20 = 60 €.\nCoefficient : 80 × 0,75 = 60 €.","Méthode 1, par la réduction. La réduction vaut 25 % de 80 : 80 × 25/100 = 20 €. Le nouveau prix est donc 80 − 20 = 60 €.\nMéthode 2, par le coefficient multiplicateur. Une baisse de 25 % correspond au coefficient 1 − 0,25 = 0,75. Le nouveau prix est 80 × 0,75 = 60 €.\nLes deux méthodes donnent le même résultat : 60 €.","Méthode 1 : en calculant le montant de la réduction.\nLa réduction représente 25 % du prix initial : 80 × 25/100 = 80 × 0,25 = 20 €.\nOn soustrait cette réduction au prix de départ : 80 − 20 = 60 €.\n\nMéthode 2 : avec le coefficient multiplicateur.\nUne diminution de 25 % revient à conserver 100 − 25 = 75 % du prix, soit un coefficient multiplicateur de 0,75.\nLe nouveau prix est donc 80 × 0,75 = 60 €.\n\nConclusion : le manteau coûte 60 € pendant les soldes. Les deux méthodes aboutissent au même résultat, ce qui valide le calcul. La méthode du coefficient est plus rapide, surtout s'il faut enchaîner plusieurs variations."],"type":"calcul","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"},"exos":[{"consigne":"Exercice type brevet. Un article coûte 80 €. 1) Son prix baisse de 25 %. Calcule le nouveau prix. 2) Ce prix soldé augmente ensuite de 20 %. Calcule le prix final. 3) Au total, par rapport au prix de départ, l'article a-t-il baissé ou augmenté, et de combien de pour cent ?","min":"1) 80 × 0,75 = 60 €. 2) 60 × 1,2 = 72 €. 3) De 80 à 72 : baisse de 8 €, soit 8/80 = 10 % de baisse globale.","solide":"1) Baisse de 25 % : coefficient 0,75. Nouveau prix = 80 × 0,75 = 60 €.\n2) Hausse de 20 % : coefficient 1,2. Prix final = 60 × 1,2 = 72 €.\n3) On compare 72 € au prix initial 80 € : variation = (72 − 80)/80 = −8/80 = −0,10 = −10 %. L'article a donc baissé de 10 % au total (et non de 5 %, car les pourcentages ne s'additionnent pas).","mention":"1) Première variation : la baisse.\nUne baisse de 25 % correspond au coefficient multiplicateur 1 − 0,25 = 0,75. Le prix soldé est donc 80 × 0,75 = 60 €.\n\n2) Seconde variation : la hausse.\nUne hausse de 20 % correspond au coefficient 1 + 0,20 = 1,2. Le prix final est 60 × 1,2 = 72 €.\n\n3) Variation globale.\nOn compare le prix final (72 €) au prix de départ (80 €) : variation = (72 − 80) / 80 = −8/80 = −0,10, soit −10 %. L'article a donc baissé de 10 % au total.\nPoint essentiel : on ne peut pas additionner les pourcentages (−25 % puis +20 % ne donnent pas −5 %). On compose les coefficients : 0,75 × 1,2 = 0,9, ce qui correspond bien à une baisse de 10 %.\n\nConclusion : prix soldé 60 €, prix final 72 €, soit une baisse globale de 10 % par rapport au prix initial."},{"consigne":"Exercice type brevet. Un article coûte 60 €. Son prix augmente de 15 %. Calcule le nouveau prix.","min":"Coefficient : 1,15. Nouveau prix : 60 × 1,15 = 69 €.","solide":"Une augmentation de 15 % correspond au coefficient multiplicateur 1 + 0,15 = 1,15.\nNouveau prix = 60 × 1,15 = 69 €.\nOn peut vérifier : l'augmentation vaut 60 × 0,15 = 9 €, et 60 + 9 = 69 €.","mention":"L'article coûte 60 € et augmente de 15 %. On utilise la méthode du coefficient multiplicateur.\n\nUne augmentation de 15 % revient à conserver 100 % du prix et à ajouter 15 %, soit 115 % du prix de départ. Le coefficient multiplicateur est donc 1,15.\n\nNouveau prix = 60 × 1,15 = 69 €.\n\nVérification par l'autre méthode : l'augmentation représente 60 × 15/100 = 9 €, et le nouveau prix est 60 + 9 = 69 €. Les deux méthodes concordent.\n\nConclusion : après une hausse de 15 %, l'article coûte 69 €."},{"consigne":"Exercice type brevet. Une recette pour 4 personnes nécessite 300 g de farine. Quelle quantité de farine faut-il pour 6 personnes ? (situation de proportionnalité)","min":"Pour 1 personne : 300/4 = 75 g. Pour 6 personnes : 75 × 6 = 450 g.","solide":"La quantité de farine est proportionnelle au nombre de personnes.\nPour 1 personne : 300 ÷ 4 = 75 g.\nPour 6 personnes : 75 × 6 = 450 g.\nOn peut aussi faire un produit en croix : (300 × 6) / 4 = 1800 / 4 = 450 g.","mention":"La quantité de farine est proportionnelle au nombre de personnes. On cherche la quantité pour 6 personnes, sachant qu'il faut 300 g pour 4 personnes.\n\nMéthode du passage à l'unité.\nPour 1 personne : 300 ÷ 4 = 75 g.\nPour 6 personnes : 75 × 6 = 450 g.\n\nMéthode du produit en croix (quatrième proportionnelle).\nLa quantité cherchée est (300 × 6) / 4 = 1800 / 4 = 450 g.\n\nLes deux méthodes donnent le même résultat.\n\nConclusion : il faut 450 g de farine pour 6 personnes. Cohérence : 6 personnes, c'est une fois et demie 4 personnes, et 300 × 1,5 = 450 g."}],"parcours":{"mission":"À la fin, tu sais reconnaître une situation de proportionnalité, calculer une quatrième proportionnelle et appliquer un pourcentage.","froid":[{"q":"Comment calcule-t-on 20 % de 80 ?","rep":"80 × 20/100 = 16."},{"q":"Qu'est-ce qu'une situation de proportionnalité ?","rep":"Une situation où l'on passe d'une grandeur à l'autre en multipliant toujours par le même nombre (le coefficient de proportionnalité)."},{"q":"Quel est le coefficient multiplicateur d'une augmentation de 25 % ?","rep":"1,25 (on multiplie le prix par 1,25)."},{"q":"Quel est le coefficient multiplicateur d'une réduction de 30 % ?","rep":"0,70 (on multiplie le prix par 0,70)."},{"q":"Qu'est-ce que la règle de trois (quatrième proportionnelle) ?","rep":"Une méthode pour trouver une 4e valeur dans un tableau de proportionnalité, par produit en croix."}],"coffre":[{"q":"Pour calculer p % d'une quantité, on multiplie par p puis on divise par ____.","rep":"Mot attendu : 100"},{"q":"Dans une situation de proportionnalité, on multiplie toujours par le même ____.","rep":"Mot attendu : coefficient"},{"q":"Une augmentation de t % correspond au coefficient multiplicateur 1 + t/____.","rep":"Mot attendu : 100"},{"q":"Une réduction de t % correspond au coefficient multiplicateur 1 − t/100, par exemple −30 % donne ____.","rep":"Mot attendu : 0,70"},{"q":"Pour trouver une quatrième proportionnelle, on fait un produit en ____.","rep":"Mot attendu : croix"}],"frise":[],"oral":"Explique en 90 secondes comment appliquer une augmentation ou une réduction en pourcentage avec un coefficient multiplicateur.","oralRedige":"Les pourcentages reviennent presque à chaque brevet, et la méthode la plus efficace est celle du coefficient multiplicateur. L'idée est simple : au lieu de calculer l'augmentation ou la réduction puis de l'ajouter ou de la retrancher, on multiplie directement le prix de départ par un seul nombre. Pour une augmentation de t pour cent, le coefficient est 1 plus t sur 100. Par exemple, une hausse de 25 pour cent correspond à multiplier par 1,25. Pour une réduction de t pour cent, le coefficient est 1 moins t sur 100 : une baisse de 30 pour cent revient à multiplier par 0,70. Donc, pour un article à 200 euros soldé à moins 30 pour cent, je calcule directement 200 fois 0,70, ce qui donne 140 euros. Cette méthode est rapide et limite les erreurs, surtout quand il y a plusieurs hausses ou baisses successives, car il suffit alors de multiplier les coefficients entre eux.","ecrit":{"consigne":"Exercice type brevet. Un manteau coûte 80 euros. Pendant les soldes, son prix baisse de 25 %. Calcule le nouveau prix de deux façons : avec le montant de la réduction, puis avec le coefficient multiplicateur.","min":"Réduction : 80 × 25/100 = 20 €. Nouveau prix : 80 − 20 = 60 €.\nCoefficient : 80 × 0,75 = 60 €.","solide":"Méthode 1, par la réduction. La réduction vaut 25 % de 80 : 80 × 25/100 = 20 €. Le nouveau prix est donc 80 − 20 = 60 €.\nMéthode 2, par le coefficient multiplicateur. Une baisse de 25 % correspond au coefficient 1 − 0,25 = 0,75. Le nouveau prix est 80 × 0,75 = 60 €.\nLes deux méthodes donnent le même résultat : 60 €.","mention":"Méthode 1 : en calculant le montant de la réduction.\nLa réduction représente 25 % du prix initial : 80 × 25/100 = 80 × 0,25 = 20 €.\nOn soustrait cette réduction au prix de départ : 80 − 20 = 60 €.\n\nMéthode 2 : avec le coefficient multiplicateur.\nUne diminution de 25 % revient à conserver 100 − 25 = 75 % du prix, soit un coefficient multiplicateur de 0,75.\nLe nouveau prix est donc 80 × 0,75 = 60 €.\n\nConclusion : le manteau coûte 60 € pendant les soldes. Les deux méthodes aboutissent au même résultat, ce qui valide le calcul. La méthode du coefficient est plus rapide, surtout s'il faut enchaîner plusieurs variations."},"ecritRedige":{"min":"Réduction : 80 × 25/100 = 20 €. Nouveau prix : 80 − 20 = 60 €.\nCoefficient : 80 × 0,75 = 60 €.","solide":"Méthode 1, par la réduction. La réduction vaut 25 % de 80 : 80 × 25/100 = 20 €. Le nouveau prix est donc 80 − 20 = 60 €.\nMéthode 2, par le coefficient multiplicateur. Une baisse de 25 % correspond au coefficient 1 − 0,25 = 0,75. Le nouveau prix est 80 × 0,75 = 60 €.\nLes deux méthodes donnent le même résultat : 60 €.","mention":"Méthode 1 : en calculant le montant de la réduction.\nLa réduction représente 25 % du prix initial : 80 × 25/100 = 80 × 0,25 = 20 €.\nOn soustrait cette réduction au prix de départ : 80 − 20 = 60 €.\n\nMéthode 2 : avec le coefficient multiplicateur.\nUne diminution de 25 % revient à conserver 100 − 25 = 75 % du prix, soit un coefficient multiplicateur de 0,75.\nLe nouveau prix est donc 80 × 0,75 = 60 €.\n\nConclusion : le manteau coûte 60 € pendant les soldes. Les deux méthodes aboutissent au même résultat, ce qui valide le calcul. La méthode du coefficient est plus rapide, surtout s'il faut enchaîner plusieurs variations."},"carte":"Carte mémoire : au centre « POURCENTAGES & PROPORTIONNALITÉ », branches : p % = ×p/100, coefficient multiplicateur (+25 % → ×1,25 ; −30 % → ×0,70), proportionnalité (×même nombre), produit en croix.","motscles":"proportionnalité, coefficient de proportionnalité, pourcentage, coefficient multiplicateur, augmentation, réduction, produit en croix, quatrième proportionnelle","vid":"https://www.lumni.fr/college/troisieme/mathematiques","vidlab":"Vidéo du chapitre"}},{"id":"M8","matiere":"maths","titre":"Statistiques et probabilités","objectif":"À la fin, tu sais calculer une moyenne, une médiane, une étendue, et la probabilité d'un événement simple.","retiens":["Moyenne = somme des valeurs ÷ nombre de valeurs.","Médiane = valeur du milieu quand les données sont rangées dans l'ordre (moyenne des deux du milieu si nombre pair).","Étendue = plus grande valeur − plus petite valeur.","Probabilité = nombre de cas favorables ÷ nombre de cas possibles (entre 0 et 1)."],"formules":["moyenne = somme ÷ effectif","P(événement) = cas favorables ÷ cas possibles"],"resolu":{"enonce":"Calculer la moyenne de la série : 8, 12, 9, 15, 11, 7, 14, 10.","etapes":["J'additionne toutes les valeurs : 8+12+9+15+11+7+14+10 = 86.","Je compte les valeurs : il y en a 8.","Je divise : 86 ÷ 8 = 10,75."],"resultat":"moyenne = 10,75"},"exact":[],"qcm":[{"q":"Quelle est la moyenne de la série 6, 9, 9, 12, 14 ?","good":"10","choices":["50","9","10","11"],"explain":"Somme = 6+9+9+12+14 = 50 ; moyenne = 50 ÷ 5 = 10. Erreur fréquente : confondre avec la médiane (9) ou oublier de diviser.","verif":"Moyenne = somme des valeurs ÷ nombre de valeurs."},{"q":"Quelle est la médiane de la série 3, 7, 7, 9, 14, 20 ?","good":"8","choices":["10","8","7","9"],"explain":"6 valeurs (nombre pair) : la médiane est la moyenne des 3e et 4e valeurs, soit (7 + 9)/2 = 8. Erreur : prendre une seule valeur centrale alors qu'il y en a deux.","verif":"Effectif pair : la médiane est la moyenne des deux valeurs centrales."},{"q":"Une urne contient 3 boules rouges, 5 vertes et 2 bleues. Quelle est la probabilité de tirer une verte ?","good":"1/2","choices":["1/5","1/2","5/3","5/2"],"explain":"Total = 3+5+2 = 10 boules. P(verte) = 5/10 = 1/2. Erreur : oublier d'ajouter toutes les boules au dénominateur.","verif":"Probabilité = cas favorables ÷ nombre TOTAL de cas possibles."},{"q":"On lance un dé à 6 faces. Quelle est la probabilité d'obtenir un nombre pair ?","good":"1/2","choices":["1/3","1/6","2/6 simplifié faux","1/2"],"explain":"Les pairs sont 2, 4, 6 : 3 cas favorables sur 6, soit 3/6 = 1/2. Erreur : ne compter qu'un seul nombre pair ou se tromper de simplification.","verif":"Compte tous les cas favorables (2, 4, 6) sur les 6 issues possibles."}],"paper":{"consigne":"Exercice type brevet. Voici les notes d'un élève : 8, 12, 14, 10, 16. 1) Calcule la moyenne. 2) Détermine la médiane. 3) Calcule l'étendue.","grille":["1) Moyenne = (8+12+14+10+16)/5 = 60/5 = 12.\n2) Série rangée : 8, 10, 12, 14, 16. Médiane = 12.\n3) Étendue = 16 − 8 = 8.","1) Moyenne : on additionne les 5 notes et on divise par 5.\n(8 + 12 + 14 + 10 + 16) / 5 = 60 / 5 = 12.\n2) Médiane : on range d'abord dans l'ordre croissant : 8, 10, 12, 14, 16. Il y a 5 valeurs (nombre impair), la médiane est la valeur du milieu, soit la 3e : 12.\n3) Étendue : plus grande moins plus petite = 16 − 8 = 8.","1) La moyenne.\nOn additionne toutes les valeurs puis on divise par l'effectif total, qui est 5.\nMoyenne = (8 + 12 + 14 + 10 + 16) / 5 = 60 / 5 = 12.\n\n2) La médiane.\nÉtape indispensable : on range les valeurs dans l'ordre croissant : 8, 10, 12, 14, 16. L'effectif est impair (5 valeurs), donc la médiane est la valeur de rang (5 + 1)/2 = 3, c'est-à-dire la 3e valeur : 12. Il y a bien deux notes en dessous (8 et 10) et deux notes au-dessus (14 et 16).\n\n3) L'étendue.\nÉtendue = valeur maximale − valeur minimale = 16 − 8 = 8.\n\nConclusion : la moyenne et la médiane valent ici toutes les deux 12, ce qui indique une série assez régulière, et l'étendue de 8 mesure l'écart entre la plus faible et la plus forte note."],"type":"calcul","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"},"exos":[{"consigne":"Exercice type brevet. Voici les notes obtenues par un élève : 8, 11, 11, 14, 16. 1) Calcule la moyenne. 2) Donne la médiane et l'étendue. 3) On tire une de ces 5 notes au hasard. Quelle est la probabilité qu'elle soit supérieure ou égale à 11  ?","min":"1) Moyenne = (8+11+11+14+16)/5 = 60/5 = 12. 2) Médiane = 11 (3e valeur) ; étendue = 16 − 8 = 8. 3) Notes ≥ 11 : 11, 11, 14, 16 → 4 cas sur 5 → 4/5.","solide":"1) Moyenne = (8 + 11 + 11 + 14 + 16)/5 = 60/5 = 12.\n2) Les notes sont déjà rangées ; avec 5 valeurs, la médiane est la 3e : 11. L'étendue = max − min = 16 − 8 = 8.\n3) Les notes ≥ 11 sont 11, 11, 14, 16, soit 4 notes sur 5. La probabilité est donc 4/5 (= 0,8).","mention":"1) La moyenne.\nMoyenne = somme ÷ effectif = (8 + 11 + 11 + 14 + 16) / 5 = 60 / 5 = 12.\n\n2) Médiane et étendue.\nLes 5 notes sont déjà rangées dans l'ordre croissant. L'effectif est impair, donc la médiane est la valeur centrale (la 3e) : 11. Il y a bien deux notes en dessous et deux au-dessus.\nL'étendue est la différence entre la plus grande et la plus petite note : 16 − 8 = 8.\n\n3) La probabilité.\nOn tire une note au hasard parmi 5 (cas possibles). Les cas favorables sont les notes supérieures ou égales à 11 : 11, 11, 14 et 16, soit 4 notes. La probabilité est donc P = 4/5 = 0,8.\n\nConclusion : moyenne 12, médiane 11, étendue 8, et une probabilité de 4/5 d'obtenir une note d'au moins 11. On remarque que la moyenne (12) est légèrement supérieure à la médiane (11), tirée vers le haut par la note 16."},{"consigne":"Exercice type brevet. Une série de valeurs est : 3, 7, 7, 9, 14. 1) Calcule la moyenne. 2) Donne la médiane. 3) Donne l'étendue.","min":"1) Moyenne = (3+7+7+9+14)/5 = 40/5 = 8.\n2) Série déjà rangée, 5 valeurs : médiane = 7 (la 3e).\n3) Étendue = 14 − 3 = 11.","solide":"1) Moyenne = (3 + 7 + 7 + 9 + 14) / 5 = 40 / 5 = 8.\n2) Les valeurs sont déjà rangées dans l'ordre croissant. Il y a 5 valeurs (nombre impair), la médiane est la valeur du milieu, soit la 3e : 7.\n3) Étendue = plus grande − plus petite = 14 − 3 = 11.","mention":"1) La moyenne.\nOn additionne les valeurs et on divise par l'effectif (5) :\nMoyenne = (3 + 7 + 7 + 9 + 14) / 5 = 40 / 5 = 8.\n\n2) La médiane.\nLes valeurs sont déjà rangées dans l'ordre croissant. L'effectif est impair (5 valeurs), donc la médiane est la valeur de rang (5 + 1)/2 = 3, c'est-à-dire la 3e valeur : 7. Il y a bien deux valeurs en dessous (3 et 7) et deux au-dessus (9 et 14).\n\n3) L'étendue.\nÉtendue = valeur maximale − valeur minimale = 14 − 3 = 11.\n\nConclusion : la moyenne vaut 8, la médiane 7 et l'étendue 11. La moyenne (8) est légèrement supérieure à la médiane (7), ce qui s'explique par la valeur élevée 14 qui tire la moyenne vers le haut."},{"consigne":"Exercice type brevet. Dans une urne, il y a 5 boules rouges, 3 boules vertes et 2 boules bleues. On tire une boule au hasard. 1) Combien y a-t-il de boules en tout ? 2) Quelle est la probabilité de tirer une boule rouge ?","min":"1) 5 + 3 + 2 = 10 boules.\n2) P(rouge) = 5/10 = 1/2.","solide":"1) Nombre total de boules : 5 + 3 + 2 = 10.\n2) La probabilité de tirer une rouge est le nombre de cas favorables (boules rouges) divisé par le nombre de cas possibles (total) :\nP(rouge) = 5 / 10 = 1/2.","mention":"1) Nombre total de boules.\nOn additionne toutes les boules : 5 rouges + 3 vertes + 2 bleues = 10 boules. C'est le nombre de cas possibles lors d'un tirage.\n\n2) Probabilité de tirer une rouge.\nLa probabilité d'un événement est le nombre de cas favorables divisé par le nombre de cas possibles. Ici, les cas favorables sont les 5 boules rouges, et les cas possibles sont les 10 boules.\nP(rouge) = 5 / 10 = 1/2.\n\nConclusion : il y a 10 boules en tout et la probabilité de tirer une boule rouge est 1/2 (soit 0,5, ou une chance sur deux). Cohérence : les rouges représentent la moitié des boules, ce qui correspond bien à une probabilité de 1/2."}],"parcours":{"mission":"À la fin, tu sais calculer une moyenne, une médiane, une étendue, et la probabilité d'un événement simple.","froid":[{"q":"Comment calcule-t-on la moyenne d'une série de valeurs ?","rep":"On additionne toutes les valeurs, puis on divise par le nombre de valeurs (l'effectif total)."},{"q":"Qu'est-ce que la médiane ?","rep":"La valeur qui partage la série ordonnée en deux groupes de même effectif (autant de valeurs au-dessus qu'en dessous)."},{"q":"Qu'est-ce que l'étendue d'une série ?","rep":"La différence entre la plus grande et la plus petite valeur."},{"q":"Que faut-il faire absolument AVANT de chercher la médiane ?","rep":"Ranger les valeurs dans l'ordre croissant."},{"q":"Quelle est la probabilité d'obtenir un 6 en lançant un dé à 6 faces ?","rep":"1/6 (un cas favorable sur six cas possibles)."}],"coffre":[{"q":"La moyenne = somme des valeurs ÷ ____ total.","rep":"Mot attendu : effectif"},{"q":"La médiane partage la série ____ en deux groupes de même effectif.","rep":"Mot attendu : ordonnée"},{"q":"L'étendue = plus grande valeur − plus ____ valeur.","rep":"Mot attendu : petite"},{"q":"Avant de chercher la médiane, il faut toujours ____ les valeurs.","rep":"Mot attendu : ranger"},{"q":"Une probabilité est un nombre compris entre 0 et ____.","rep":"Mot attendu : 1"}],"frise":[],"oral":"Explique en 90 secondes la différence entre la moyenne et la médiane, et comment calculer une probabilité simple.","oralRedige":"En statistiques, il ne faut pas confondre la moyenne et la médiane, deux indicateurs différents. La moyenne, c'est la somme de toutes les valeurs divisée par leur nombre. La médiane, c'est autre chose : c'est la valeur qui coupe la série en deux groupes de même taille, avec autant de valeurs au-dessus qu'en dessous. Le piège classique, c'est d'oublier de ranger les valeurs dans l'ordre croissant avant de chercher la médiane : c'est indispensable. Il y a aussi l'étendue, qui mesure la dispersion : c'est simplement la plus grande valeur moins la plus petite. Pour les probabilités, la règle de base est simple : la probabilité d'un événement, c'est le nombre de cas favorables divisé par le nombre de cas possibles. Par exemple, avec un dé à six faces, la probabilité d'obtenir un 6 est de un sur six. Et une probabilité est toujours comprise entre 0, l'impossible, et 1, le certain.","ecrit":{"consigne":"Exercice type brevet. Voici les notes d'un élève : 8, 12, 14, 10, 16. 1) Calcule la moyenne. 2) Détermine la médiane. 3) Calcule l'étendue.","min":"1) Moyenne = (8+12+14+10+16)/5 = 60/5 = 12.\n2) Série rangée : 8, 10, 12, 14, 16. Médiane = 12.\n3) Étendue = 16 − 8 = 8.","solide":"1) Moyenne : on additionne les 5 notes et on divise par 5.\n(8 + 12 + 14 + 10 + 16) / 5 = 60 / 5 = 12.\n2) Médiane : on range d'abord dans l'ordre croissant : 8, 10, 12, 14, 16. Il y a 5 valeurs (nombre impair), la médiane est la valeur du milieu, soit la 3e : 12.\n3) Étendue : plus grande moins plus petite = 16 − 8 = 8.","mention":"1) La moyenne.\nOn additionne toutes les valeurs puis on divise par l'effectif total, qui est 5.\nMoyenne = (8 + 12 + 14 + 10 + 16) / 5 = 60 / 5 = 12.\n\n2) La médiane.\nÉtape indispensable : on range les valeurs dans l'ordre croissant : 8, 10, 12, 14, 16. L'effectif est impair (5 valeurs), donc la médiane est la valeur de rang (5 + 1)/2 = 3, c'est-à-dire la 3e valeur : 12. Il y a bien deux notes en dessous (8 et 10) et deux notes au-dessus (14 et 16).\n\n3) L'étendue.\nÉtendue = valeur maximale − valeur minimale = 16 − 8 = 8.\n\nConclusion : la moyenne et la médiane valent ici toutes les deux 12, ce qui indique une série assez régulière, et l'étendue de 8 mesure l'écart entre la plus faible et la plus forte note."},"ecritRedige":{"min":"1) Moyenne = (8+12+14+10+16)/5 = 60/5 = 12.\n2) Série rangée : 8, 10, 12, 14, 16. Médiane = 12.\n3) Étendue = 16 − 8 = 8.","solide":"1) Moyenne : on additionne les 5 notes et on divise par 5.\n(8 + 12 + 14 + 10 + 16) / 5 = 60 / 5 = 12.\n2) Médiane : on range d'abord dans l'ordre croissant : 8, 10, 12, 14, 16. Il y a 5 valeurs (nombre impair), la médiane est la valeur du milieu, soit la 3e : 12.\n3) Étendue : plus grande moins plus petite = 16 − 8 = 8.","mention":"1) La moyenne.\nOn additionne toutes les valeurs puis on divise par l'effectif total, qui est 5.\nMoyenne = (8 + 12 + 14 + 10 + 16) / 5 = 60 / 5 = 12.\n\n2) La médiane.\nÉtape indispensable : on range les valeurs dans l'ordre croissant : 8, 10, 12, 14, 16. L'effectif est impair (5 valeurs), donc la médiane est la valeur de rang (5 + 1)/2 = 3, c'est-à-dire la 3e valeur : 12. Il y a bien deux notes en dessous (8 et 10) et deux notes au-dessus (14 et 16).\n\n3) L'étendue.\nÉtendue = valeur maximale − valeur minimale = 16 − 8 = 8.\n\nConclusion : la moyenne et la médiane valent ici toutes les deux 12, ce qui indique une série assez régulière, et l'étendue de 8 mesure l'écart entre la plus faible et la plus forte note."},"carte":"Carte mémoire : au centre « STATS & PROBAS », branches : moyenne (somme ÷ effectif), médiane (ranger puis valeur du milieu), étendue (max − min), probabilité (favorables / possibles, entre 0 et 1).","motscles":"moyenne, médiane, étendue, effectif, série ordonnée, dispersion, probabilité, cas favorables, cas possibles, événement","vid":"https://www.lumni.fr/college/troisieme/mathematiques","vidlab":"Vidéo du chapitre"}},{"id":"M9","matiere":"maths","titre":"Fonctions linéaires et affines","objectif":"À la fin, tu sais calculer une image et un antécédent, et distinguer une fonction linéaire d'une fonction affine.","retiens":["Fonction linéaire : f(x) = a × x (représentée par une droite passant par l'origine). a est le coefficient de proportionnalité.","Fonction affine : f(x) = a × x + b (droite ne passant pas forcément par l'origine). a = coefficient directeur, b = ordonnée à l'origine.","Calculer une image de x, c'est remplacer x par sa valeur dans la formule."],"formules":["linéaire : f(x) = a x","affine : f(x) = a x + b"],"resolu":{"enonce":"Soit g(x) = 2x + 1. Calculer g(3).","etapes":["Je remplace x par 3 dans la formule : g(3) = 2 × 3 + 1.","Je calcule : 6 + 1.","Donc g(3) = 7."],"resultat":"g(3) = 7"},"exact":[],"qcm":[{"q":"Pour f(x) = 3x − 5, combien vaut f(4) ?","good":"7","choices":["7","−5","17","12"],"explain":"f(4) = 3×4 − 5 = 12 − 5 = 7. Erreur : oublier le −5, ou additionner 3+4 au lieu de multiplier.","verif":"Remplace x par la valeur, en respectant l'ordre des opérations."},{"q":"Pour la fonction linéaire f(x) = 4x, quel est l'antécédent de 28 ?","good":"7","choices":["24","4","7","112"],"explain":"On résout f(x) = 28, soit 4x = 28, donc x = 7. Erreur : calculer f(28) = 112 (c'est l'image, pas l'antécédent).","verif":"Antécédent : on résout f(x) = valeur donnée."},{"q":"Une fonction affine vérifie f(0) = 3 et f(2) = 11. Quel est son coefficient directeur ?","good":"4","choices":["2","3","4","8"],"explain":"Coefficient directeur a = (f(2) − f(0))/(2 − 0) = (11 − 3)/2 = 8/2 = 4. Erreur : oublier de diviser par l'écart des x (donnerait 8).","verif":"a = (variation des images) ÷ (variation des x)."},{"q":"La fonction f(x) = −3x + 2 est-elle croissante ou décroissante ?","good":"Décroissante (coefficient −3 négatif)","choices":["Constante","Croissante car +2","Décroissante (coefficient −3 négatif)","Croissante (coefficient −3)"],"explain":"Le sens de variation d'une fonction affine dépend du signe du coefficient directeur. Ici a = −3 < 0, donc la fonction est décroissante. Le +2 (ordonnée à l'origine) n'a aucun effet sur le sens de variation.","verif":"Coefficient directeur négatif = fonction décroissante."}],"paper":{"consigne":"Exercice type brevet. On considère la fonction affine f définie par f(x) = 3x − 2. 1) Calcule l'image de 4. 2) Détermine l'antécédent de 7.","grille":["1) f(4) = 3 × 4 − 2 = 10.\n2) 3x − 2 = 7 → 3x = 9 → x = 3.","1) Image de 4 : on remplace x par 4.\nf(4) = 3 × 4 − 2 = 12 − 2 = 10.\n2) Antécédent de 7 : on cherche x tel que f(x) = 7, donc on résout 3x − 2 = 7.\n3x = 7 + 2 = 9, donc x = 9 ÷ 3 = 3.\nL'antécédent de 7 est 3.","La fonction est f(x) = 3x − 2 : c'est une fonction affine, avec un coefficient directeur a = 3 et une ordonnée à l'origine b = −2.\n\n1) Image de 4.\nCalculer l'image de 4, c'est calculer f(4) en remplaçant x par 4 :\nf(4) = 3 × 4 − 2 = 12 − 2 = 10.\nL'image de 4 par f est 10.\n\n2) Antécédent de 7.\nChercher l'antécédent de 7, c'est trouver le nombre x dont l'image vaut 7, donc résoudre l'équation f(x) = 7 :\n3x − 2 = 7\n3x = 9\nx = 3.\nVérification : f(3) = 3 × 3 − 2 = 7. C'est correct.\nL'antécédent de 7 par f est 3."],"type":"calcul","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"},"exos":[{"consigne":"Exercice type brevet. Une fonction affine f vérifie f(0) = 5 et f(4) = 13. 1) Détermine le coefficient directeur de f. 2) Donne l'expression de f(x). 3) Résous l'équation f(x) = 20.","min":"1) a = (13 − 5)/(4 − 0) = 8/4 = 2. 2) f(0) = 5 donne b = 5, donc f(x) = 2x + 5. 3) 2x + 5 = 20 → 2x = 15 → x = 7,5.","solide":"1) Le coefficient directeur est a = (f(4) − f(0))/(4 − 0) = (13 − 5)/4 = 8/4 = 2.\n2) Une fonction affine s'écrit f(x) = ax + b. Ici a = 2, et f(0) = b = 5, donc f(x) = 2x + 5.\n3) f(x) = 20 : 2x + 5 = 20, donc 2x = 15, donc x = 7,5.","mention":"1) Le coefficient directeur.\nPour une fonction affine, le coefficient directeur se calcule avec deux valeurs : a = (variation des images) / (variation des x) = (f(4) − f(0)) / (4 − 0) = (13 − 5) / 4 = 8 / 4 = 2.\n\n2) L'expression de f(x).\nUne fonction affine s'écrit f(x) = ax + b. On a trouvé a = 2. De plus, f(0) = b, et l'énoncé donne f(0) = 5, donc b = 5. L'expression est donc f(x) = 2x + 5.\nVérification : f(4) = 2 × 4 + 5 = 13, ce qui correspond bien à l'énoncé.\n\n3) Résolution de f(x) = 20.\nOn résout 2x + 5 = 20 : 2x = 20 − 5 = 15, donc x = 15 / 2 = 7,5.\n\nConclusion : f(x) = 2x + 5, et la solution de f(x) = 20 est x = 7,5. La fonction est croissante car son coefficient directeur (2) est positif."},{"consigne":"Exercice type brevet. On considère la fonction linéaire g définie par g(x) = 4x. 1) Calcule l'image de 5. 2) Quel est l'antécédent de 28 ?","min":"1) g(5) = 4×5 = 20.\n2) 4x = 28 → x = 7.","solide":"1) Image de 5 : on remplace x par 5. g(5) = 4 × 5 = 20.\n2) Antécédent de 28 : on cherche x tel que g(x) = 28, donc 4x = 28, d'où x = 28 ÷ 4 = 7.","mention":"La fonction g est définie par g(x) = 4x : c'est une fonction linéaire (de la forme ax, avec a = 4), donc sa représentation est une droite passant par l'origine.\n\n1) Image de 5.\nCalculer l'image de 5, c'est calculer g(5) en remplaçant x par 5 :\ng(5) = 4 × 5 = 20.\n\n2) Antécédent de 28.\nChercher l'antécédent de 28, c'est trouver le nombre x dont l'image vaut 28, donc résoudre g(x) = 28 :\n4x = 28, d'où x = 28 ÷ 4 = 7.\nVérification : g(7) = 4 × 7 = 28. C'est correct.\n\nConclusion : l'image de 5 est 20, et l'antécédent de 28 est 7."},{"consigne":"Exercice type brevet. Une fonction affine est définie par h(x) = −2x + 5. 1) Calcule h(0) et h(3). 2) La fonction est-elle croissante ou décroissante ? Justifie.","min":"1) h(0) = 5 ; h(3) = −2×3 + 5 = −1.\n2) Le coefficient directeur est −2, négatif, donc la fonction est décroissante.","solide":"1) h(0) = −2×0 + 5 = 5. h(3) = −2×3 + 5 = −6 + 5 = −1.\n2) Dans h(x) = −2x + 5, le coefficient directeur est a = −2. Comme il est négatif, la fonction est décroissante (quand x augmente, h(x) diminue). On le vérifie : entre x = 0 et x = 3, h passe de 5 à −1, donc elle diminue bien.","mention":"La fonction h est définie par h(x) = −2x + 5 : c'est une fonction affine, avec un coefficient directeur a = −2 et une ordonnée à l'origine b = 5.\n\n1) Calcul des images.\nh(0) = −2 × 0 + 5 = 5 (c'est l'ordonnée à l'origine).\nh(3) = −2 × 3 + 5 = −6 + 5 = −1.\n\n2) Sens de variation.\nLe sens de variation d'une fonction affine dépend du signe de son coefficient directeur a. Ici a = −2, qui est négatif. Une fonction affine dont le coefficient directeur est négatif est décroissante : quand x augmente, h(x) diminue.\nOn le confirme avec les valeurs calculées : lorsque x passe de 0 à 3, h(x) passe de 5 à −1, donc h(x) a bien diminué.\n\nConclusion : h(0) = 5 et h(3) = −1, et la fonction est décroissante car son coefficient directeur (−2) est négatif."}],"parcours":{"mission":"À la fin, tu sais calculer une image et un antécédent, et distinguer une fonction linéaire d'une fonction affine.","froid":[{"q":"Pour la fonction f(x) = 2x + 1, combien vaut l'image de 3 ?","rep":"f(3) = 2 × 3 + 1 = 7."},{"q":"Qu'est-ce qu'une fonction linéaire ?","rep":"Une fonction de la forme f(x) = ax (elle traduit une proportionnalité et sa courbe passe par l'origine)."},{"q":"Qu'est-ce qu'une fonction affine ?","rep":"Une fonction de la forme f(x) = ax + b."},{"q":"Dans f(x) = ax + b, comment s'appelle a ? et b ?","rep":"a est le coefficient directeur, b est l'ordonnée à l'origine."},{"q":"Quelle est la différence entre une image et un antécédent ?","rep":"L'image, c'est f(x) (on connaît x, on cherche le résultat) ; l'antécédent, c'est l'inverse (on connaît f(x), on cherche x)."}],"coffre":[{"q":"Une fonction linéaire s'écrit f(x) = ____ et sa courbe passe par l'origine.","rep":"Mot attendu : ax"},{"q":"Une fonction affine s'écrit f(x) = ax + ____.","rep":"Mot attendu : b"},{"q":"Dans f(x) = ax + b, a est le coefficient ____.","rep":"Mot attendu : directeur"},{"q":"Dans f(x) = ax + b, b est l'ordonnée à l'____.","rep":"Mot attendu : origine"},{"q":"Calculer l'image de x, c'est calculer f(x) ; chercher l'antécédent, c'est connaître f(x) et chercher ____.","rep":"Mot attendu : x"}],"frise":[],"oral":"Explique en 90 secondes la différence entre une image et un antécédent, et entre une fonction linéaire et affine.","oralRedige":"Une fonction, c'est un procédé qui, à un nombre x, associe un autre nombre. Deux notions reviennent tout le temps : l'image et l'antécédent. Calculer l'image d'un nombre, c'est le plus direct : on connaît x et on calcule f de x en remplaçant. Par exemple, avec f de x égale 2x plus 1, l'image de 3 vaut 2 fois 3 plus 1, donc 7. Chercher un antécédent, c'est l'opération inverse : on connaît le résultat f de x et on cherche le x de départ, ce qui revient à résoudre une équation. Il faut aussi distinguer deux types de fonctions. Une fonction linéaire s'écrit f de x égale a fois x : elle traduit une proportionnalité et sa représentation est une droite qui passe par l'origine. Une fonction affine s'écrit f de x égale a fois x plus b : sa droite ne passe plus forcément par l'origine. Dans les deux cas, a est le coefficient directeur, qui donne la pente, et b est l'ordonnée à l'origine.","ecrit":{"consigne":"Exercice type brevet. On considère la fonction affine f définie par f(x) = 3x − 2. 1) Calcule l'image de 4. 2) Détermine l'antécédent de 7.","min":"1) f(4) = 3 × 4 − 2 = 10.\n2) 3x − 2 = 7 → 3x = 9 → x = 3.","solide":"1) Image de 4 : on remplace x par 4.\nf(4) = 3 × 4 − 2 = 12 − 2 = 10.\n2) Antécédent de 7 : on cherche x tel que f(x) = 7, donc on résout 3x − 2 = 7.\n3x = 7 + 2 = 9, donc x = 9 ÷ 3 = 3.\nL'antécédent de 7 est 3.","mention":"La fonction est f(x) = 3x − 2 : c'est une fonction affine, avec un coefficient directeur a = 3 et une ordonnée à l'origine b = −2.\n\n1) Image de 4.\nCalculer l'image de 4, c'est calculer f(4) en remplaçant x par 4 :\nf(4) = 3 × 4 − 2 = 12 − 2 = 10.\nL'image de 4 par f est 10.\n\n2) Antécédent de 7.\nChercher l'antécédent de 7, c'est trouver le nombre x dont l'image vaut 7, donc résoudre l'équation f(x) = 7 :\n3x − 2 = 7\n3x = 9\nx = 3.\nVérification : f(3) = 3 × 3 − 2 = 7. C'est correct.\nL'antécédent de 7 par f est 3."},"ecritRedige":{"min":"1) f(4) = 3 × 4 − 2 = 10.\n2) 3x − 2 = 7 → 3x = 9 → x = 3.","solide":"1) Image de 4 : on remplace x par 4.\nf(4) = 3 × 4 − 2 = 12 − 2 = 10.\n2) Antécédent de 7 : on cherche x tel que f(x) = 7, donc on résout 3x − 2 = 7.\n3x = 7 + 2 = 9, donc x = 9 ÷ 3 = 3.\nL'antécédent de 7 est 3.","mention":"La fonction est f(x) = 3x − 2 : c'est une fonction affine, avec un coefficient directeur a = 3 et une ordonnée à l'origine b = −2.\n\n1) Image de 4.\nCalculer l'image de 4, c'est calculer f(4) en remplaçant x par 4 :\nf(4) = 3 × 4 − 2 = 12 − 2 = 10.\nL'image de 4 par f est 10.\n\n2) Antécédent de 7.\nChercher l'antécédent de 7, c'est trouver le nombre x dont l'image vaut 7, donc résoudre l'équation f(x) = 7 :\n3x − 2 = 7\n3x = 9\nx = 3.\nVérification : f(3) = 3 × 3 − 2 = 7. C'est correct.\nL'antécédent de 7 par f est 3."},"carte":"Carte mémoire : au centre « FONCTIONS », branches : image (on a x, on calcule f(x)), antécédent (on a f(x), on cherche x), linéaire f(x)=ax (passe par l'origine), affine f(x)=ax+b.","motscles":"fonction, image, antécédent, fonction linéaire, fonction affine, coefficient directeur, ordonnée à l'origine, lecture graphique, f(x)","vid":"https://www.lumni.fr/college/troisieme/mathematiques","vidlab":"Vidéo du chapitre"}},{"id":"M10","matiere":"maths","titre":"Géométrie dans l'espace : volumes","objectif":"À la fin, tu connais les formules de volume des solides usuels et tu sais les appliquer sans oublier le 1/3 du cône et de la pyramide.","retiens":["Le volume s'exprime en unités cubes (cm³, m³…).","Pour le cylindre, on multiplie l'aire du disque de base par la hauteur.","Garde π dans le calcul puis arrondis seulement à la fin."],"formules":["Cylindre : V = π × r² × h","Boule : V = (4/3) × π × r³"],"resolu":{"enonce":"Calculer le volume d'un cylindre de rayon 3 cm et de hauteur 10 cm (arrondi au dixième).","etapes":["J'applique la formule : V = π × r² × h = π × 3² × 10.","Je calcule : V = π × 9 × 10 = 90 π.","J'arrondis : 90 × 3,1416 ≈ 282,7 cm³."],"resultat":"≈ 282,7 cm³"},"exact":[],"qcm":[{"q":"Un pavé droit mesure 4 cm × 5 cm × 6 cm. Quel est son volume ?","good":"120 cm³","choices":["120 cm³","148 cm³","60 cm³","15 cm³"],"explain":"Volume du pavé = longueur × largeur × hauteur = 4 × 5 × 6 = 120 cm³. Erreur : additionner les dimensions (15) ou ne multiplier que deux d'entre elles.","verif":"Volume d'un pavé = produit des trois dimensions."},{"q":"Une pyramide a une base de 36 cm² et une hauteur de 10 cm. Quel est son volume ?","good":"120 cm³","choices":["46 cm³","120 cm³","360 cm³","180 cm³"],"explain":"Volume pyramide = (1/3) × base × hauteur = (1/3) × 36 × 10 = 120 cm³. Erreur majeure : oublier le 1/3 et trouver 360 cm³.","verif":"Pour une pyramide ou un cône, n'oublie jamais le facteur 1/3."},{"q":"Un cylindre a un rayon de 3 cm et une hauteur de 10 cm. Quel est son volume exact ?","good":"90π cm³","choices":["30π cm³","90π cm³","60π cm³","900π cm³"],"explain":"Volume cylindre = π × r² × h = π × 3² × 10 = π × 9 × 10 = 90π cm³. Erreur : utiliser r au lieu de r² (donnerait 30π).","verif":"Aire du disque = π r² (le rayon est au carré), puis on multiplie par la hauteur."},{"q":"On double toutes les arêtes d'un cube. Par combien son volume est-il multiplié ?","good":"8","choices":["8","6","4","2"],"explain":"Le volume d'un cube est a³. Si l'arête double (2a), le volume devient (2a)³ = 8a³, soit 8 fois plus. Erreur : penser que le volume double seulement.","verif":"En multipliant une longueur par k, un volume est multiplié par k³."}],"paper":{"consigne":"Exercice type brevet. Un cône a un rayon de base de 3 cm et une hauteur de 7 cm. Calcule son volume. On donnera la valeur exacte en fonction de π, puis une valeur approchée au cm³ près (π ≈ 3,14).","grille":["V = (1/3) × π × r² × h = (1/3) × π × 3² × 7 = (1/3) × π × 63 = 21π ≈ 66 cm³.","Le volume d'un cône est V = (1/3) × π × r² × h, avec r = 3 et h = 7.\nV = (1/3) × π × 3² × 7 = (1/3) × π × 9 × 7 = (1/3) × 63 × π = 21π.\nValeur exacte : V = 21π cm³.\nValeur approchée : 21 × 3,14 ≈ 65,9, soit environ 66 cm³.","On utilise la formule du volume d'un cône : V = (1/3) × π × r² × h, où r est le rayon de la base et h la hauteur. Ici r = 3 cm et h = 7 cm.\n\nÉtape 1 : calcul de l'aire de la base (disque).\nr² = 3² = 9, donc l'aire de base est π × 9 = 9π.\n\nÉtape 2 : application de la formule, sans oublier le facteur 1/3.\nV = (1/3) × 9π × 7 = (1/3) × 63π = 21π.\nLa valeur exacte du volume est donc 21π cm³.\n\nÉtape 3 : valeur approchée.\nV = 21 × π ≈ 21 × 3,14 ≈ 65,94, soit environ 66 cm³.\n\nConclusion : le volume du cône est de 21π cm³, c'est-à-dire environ 66 cm³. Le point de vigilance était de ne pas oublier le facteur 1/3, propre au cône et à la pyramide."],"type":"calcul","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"},"exos":[{"consigne":"Exercice type brevet. Un récipient est formé d'un cube de 10 cm d'arête surmonté d'une pyramide de même base (côté 10 cm) et de hauteur 6 cm. 1) Calcule le volume du cube. 2) Calcule le volume de la pyramide. 3) En déduis le volume total, puis convertis-le en litres (1 L = 1000 cm³).","min":"1) Cube : 10³ = 1000 cm³. 2) Pyramide : (1/3) × (10×10) × 6 = (1/3) × 100 × 6 = 200 cm³. 3) Total = 1000 + 200 = 1200 cm³ = 1,2 L.","solide":"1) Volume du cube = arête³ = 10³ = 1000 cm³.\n2) Volume de la pyramide = (1/3) × aire de base × hauteur = (1/3) × (10 × 10) × 6 = (1/3) × 100 × 6 = 200 cm³.\n3) Volume total = 1000 + 200 = 1200 cm³. Conversion : 1200 ÷ 1000 = 1,2 L.","mention":"1) Volume du cube.\nLe volume d'un cube est arête au cube : V_cube = 10³ = 1000 cm³.\n\n2) Volume de la pyramide.\nLa base est un carré de côté 10 cm, donc son aire est 10 × 10 = 100 cm². Le volume d'une pyramide est (1/3) × aire de base × hauteur :\nV_pyramide = (1/3) × 100 × 6 = (1/3) × 600 = 200 cm³.\nLe facteur 1/3 est essentiel : l'oublier donnerait 600 cm³, soit trois fois trop.\n\n3) Volume total et conversion.\nLe récipient est l'assemblage des deux solides : V_total = V_cube + V_pyramide = 1000 + 200 = 1200 cm³.\nPour convertir en litres, on utilise 1 L = 1000 cm³ : 1200 cm³ = 1200 ÷ 1000 = 1,2 L.\n\nConclusion : le volume total est de 1200 cm³, soit 1,2 L. Les deux points de vigilance étaient le facteur 1/3 de la pyramide et la conversion cm³ → L."},{"consigne":"Exercice type brevet. Un cube a une arête de 5 cm. Calcule son volume.","min":"V = a³ = 5³ = 125 cm³.","solide":"Le volume d'un cube est V = a³, où a est l'arête. Ici a = 5 cm.\nV = 5³ = 5 × 5 × 5 = 125 cm³.","mention":"On utilise la formule du volume d'un cube : V = a³, où a est la longueur de l'arête. Ici a = 5 cm.\n\nCalcul : V = 5³ = 5 × 5 × 5 = 125.\n\nL'unité de volume est le centimètre cube (cm³), car les longueurs sont en centimètres.\n\nConclusion : le volume du cube est de 125 cm³."},{"consigne":"Exercice type brevet. Une pyramide a une base carrée de côté 6 cm et une hauteur de 10 cm. Calcule son volume. (Rappel : V = (1/3) × aire de base × hauteur.)","min":"Aire de base = 6×6 = 36 cm². V = (1/3) × 36 × 10 = 120 cm³.","solide":"L'aire de la base carrée est 6 × 6 = 36 cm².\nLe volume d'une pyramide est V = (1/3) × aire de base × hauteur.\nV = (1/3) × 36 × 10 = (1/3) × 360 = 120 cm³.","mention":"On calcule le volume d'une pyramide à base carrée.\n\nÉtape 1 : aire de la base.\nLa base est un carré de côté 6 cm, donc son aire est 6 × 6 = 36 cm².\n\nÉtape 2 : application de la formule du volume, sans oublier le facteur 1/3.\nLe volume d'une pyramide est V = (1/3) × aire de base × hauteur.\nV = (1/3) × 36 × 10 = (1/3) × 360 = 120 cm³.\n\nConclusion : le volume de la pyramide est de 120 cm³. Le point de vigilance était de ne pas oublier le facteur 1/3, propre à la pyramide et au cône : sans lui, on aurait trouvé 360 cm³, soit trois fois trop."}],"parcours":{"mission":"À la fin, tu connais les formules de volume des solides usuels et tu sais les appliquer sans oublier le 1/3 du cône et de la pyramide.","froid":[{"q":"Quel est le volume d'un pavé droit de dimensions L, l, h ?","rep":"V = L × l × h."},{"q":"Quel est le volume d'un cube d'arête a ?","rep":"V = a³."},{"q":"Quel est le volume d'un cylindre de rayon r et de hauteur h ?","rep":"V = π × r² × h."},{"q":"Quel est le volume d'une pyramide ou d'un cône (aire de base B, hauteur h) ?","rep":"V = (1/3) × B × h. Pour le cône, B = π r², donc V = (1/3) × π r² × h."},{"q":"Quel est le piège classique du cône et de la pyramide ?","rep":"Oublier de multiplier par 1/3 (diviser par 3)."}],"coffre":[{"q":"Volume d'un pavé droit = L × l × ____.","rep":"Mot attendu : h"},{"q":"Volume d'un cube d'arête a = a au cube, c'est-à-dire a × a × ____.","rep":"Mot attendu : a"},{"q":"Volume d'un cylindre = π × r² × ____.","rep":"Mot attendu : h"},{"q":"Volume d'une pyramide ou d'un cône = (1/____) × aire de base × hauteur.","rep":"Mot attendu : 3"},{"q":"Le piège du cône et de la pyramide est d'oublier de multiplier par ____.","rep":"Mot attendu : 1/3 (diviser par 3)"}],"frise":[],"oral":"Explique en 90 secondes les formules de volume des principaux solides et le piège à éviter.","oralRedige":"Pour les volumes, il faut connaître par cœur quelques formules, en faisant attention à un piège récurrent. Pour les solides droits, c'est simple : le volume d'un pavé droit, c'est longueur fois largeur fois hauteur ; celui d'un cube, c'est l'arête au cube ; et celui d'un cylindre, c'est l'aire du disque de base, donc pi fois rayon au carré, multipliée par la hauteur. Là où beaucoup d'élèves perdent des points, c'est sur la pyramide et le cône. Pour ces deux solides pointus, le volume vaut un tiers de l'aire de la base multipliée par la hauteur. Le piège, c'est d'oublier ce un tiers, c'est-à-dire d'oublier de diviser par trois. Pour le cône précisément, comme la base est un disque, le volume est un tiers de pi r carré fois la hauteur. Donc, dès que je vois un cône ou une pyramide, le réflexe est de penser au facteur un tiers.","ecrit":{"consigne":"Exercice type brevet. Un cône a un rayon de base de 3 cm et une hauteur de 7 cm. Calcule son volume. On donnera la valeur exacte en fonction de π, puis une valeur approchée au cm³ près (π ≈ 3,14).","min":"V = (1/3) × π × r² × h = (1/3) × π × 3² × 7 = (1/3) × π × 63 = 21π ≈ 66 cm³.","solide":"Le volume d'un cône est V = (1/3) × π × r² × h, avec r = 3 et h = 7.\nV = (1/3) × π × 3² × 7 = (1/3) × π × 9 × 7 = (1/3) × 63 × π = 21π.\nValeur exacte : V = 21π cm³.\nValeur approchée : 21 × 3,14 ≈ 65,9, soit environ 66 cm³.","mention":"On utilise la formule du volume d'un cône : V = (1/3) × π × r² × h, où r est le rayon de la base et h la hauteur. Ici r = 3 cm et h = 7 cm.\n\nÉtape 1 : calcul de l'aire de la base (disque).\nr² = 3² = 9, donc l'aire de base est π × 9 = 9π.\n\nÉtape 2 : application de la formule, sans oublier le facteur 1/3.\nV = (1/3) × 9π × 7 = (1/3) × 63π = 21π.\nLa valeur exacte du volume est donc 21π cm³.\n\nÉtape 3 : valeur approchée.\nV = 21 × π ≈ 21 × 3,14 ≈ 65,94, soit environ 66 cm³.\n\nConclusion : le volume du cône est de 21π cm³, c'est-à-dire environ 66 cm³. Le point de vigilance était de ne pas oublier le facteur 1/3, propre au cône et à la pyramide."},"ecritRedige":{"min":"V = (1/3) × π × r² × h = (1/3) × π × 3² × 7 = (1/3) × π × 63 = 21π ≈ 66 cm³.","solide":"Le volume d'un cône est V = (1/3) × π × r² × h, avec r = 3 et h = 7.\nV = (1/3) × π × 3² × 7 = (1/3) × π × 9 × 7 = (1/3) × 63 × π = 21π.\nValeur exacte : V = 21π cm³.\nValeur approchée : 21 × 3,14 ≈ 65,9, soit environ 66 cm³.","mention":"On utilise la formule du volume d'un cône : V = (1/3) × π × r² × h, où r est le rayon de la base et h la hauteur. Ici r = 3 cm et h = 7 cm.\n\nÉtape 1 : calcul de l'aire de la base (disque).\nr² = 3² = 9, donc l'aire de base est π × 9 = 9π.\n\nÉtape 2 : application de la formule, sans oublier le facteur 1/3.\nV = (1/3) × 9π × 7 = (1/3) × 63π = 21π.\nLa valeur exacte du volume est donc 21π cm³.\n\nÉtape 3 : valeur approchée.\nV = 21 × π ≈ 21 × 3,14 ≈ 65,94, soit environ 66 cm³.\n\nConclusion : le volume du cône est de 21π cm³, c'est-à-dire environ 66 cm³. Le point de vigilance était de ne pas oublier le facteur 1/3, propre au cône et à la pyramide."},"carte":"Carte mémoire : au centre « VOLUMES », branches : pavé (L×l×h), cube (a³), cylindre (πr²h), cône et pyramide ((1/3)×base×h, ATTENTION au 1/3), valeur exacte en π puis approchée.","motscles":"volume, pavé droit, cube, cylindre, cône, pyramide, sphère, aire de base, facteur 1/3, π, conversion d'unités","vid":"https://www.lumni.fr/college/troisieme/mathematiques","vidlab":"Vidéo du chapitre"}},{"id":"P1","matiere":"pc","titre":"Mouvement et vitesse","objectif":"À la fin, tu sais calculer une vitesse avec v = d/t et convertir entre km/h et m/s.","retiens":["La vitesse indique la distance parcourue par unité de temps.","Attention aux unités : la distance en mètres et le temps en secondes donnent des m/s.","Conversion : pour passer de m/s à km/h on multiplie par 3,6 ; dans l'autre sens on divise par 3,6."],"formules":["v = d ÷ t","m/s → km/h : × 3,6   |   km/h → m/s : ÷ 3,6"],"resolu":{"enonce":"Un coureur parcourt 150 m en 30 s. Calculer sa vitesse en m/s.","etapes":["J'applique la formule : v = d ÷ t = 150 ÷ 30.","Je calcule : v = 5.","La vitesse est 5 m/s."],"resultat":"5 m/s"},"exact":[],"qcm":[{"q":"Un train parcourt 180 km en 2 h. Quelle est sa vitesse moyenne en km/h ?","good":"90 km/h","choices":["90 km/h","360 km/h","45 km/h","178 km/h"],"explain":"v = d/t = 180/2 = 90 km/h. Erreur fréquente : multiplier (180×2=360) au lieu de diviser.","verif":"v = d ÷ t. Vérifie l'unité : des km et des h donnent des km/h."},{"q":"Convertis 72 km/h en m/s.","good":"20 m/s","choices":["7,2 m/s","20 m/s","260 m/s","72 m/s"],"explain":"On divise par 3,6 : 72 ÷ 3,6 = 20 m/s. Erreur : oublier la conversion ou diviser par 10.","verif":"Pour passer des km/h aux m/s, on divise par 3,6."},{"q":"Une voiture roule à 30 m/s pendant 5 s. Quelle distance parcourt-elle ?","good":"150 m","choices":["35 m","6 m","0,17 m","150 m"],"explain":"d = v × t = 30 × 5 = 150 m. Erreur : diviser (30/5=6) alors qu'ici on cherche la distance.","verif":"De v = d/t on tire d = v × t."},{"q":"La lumière voyage à 300 000 km/s. Combien de temps met-elle pour parcourir 1 500 000 km ?","good":"5 s","choices":["450 000 000 000 s","5 s","0,2 s","2 s"],"explain":"t = d/v = 1 500 000 / 300 000 = 5 s. Erreur : multiplier au lieu de diviser, ou inverser le rapport.","verif":"De v = d/t on tire t = d ÷ v."}],"paper":{"consigne":"Exercice type brevet. Un train parcourt 240 km en 2 heures. 1) Calcule sa vitesse moyenne en km/h. 2) Convertis cette vitesse en m/s. (Méthode : formule, valeurs avec unités, résultat avec unité.)","grille":["1) v = d/t = 240/2 = 120 km/h.\n2) 120 ÷ 3,6 ≈ 33,3 m/s.","1) On utilise la formule de la vitesse : v = d / t.\nv = 240 km / 2 h = 120 km/h.\n2) Pour convertir en m/s, on divise par 3,6 :\n120 ÷ 3,6 ≈ 33,3 m/s.\nLa vitesse moyenne du train est de 120 km/h, soit environ 33,3 m/s.","1) Vitesse moyenne en km/h.\nFormule littérale : v = d / t, où d est la distance et t la durée.\nApplication numérique avec unités : v = 240 km / 2 h.\nCalcul : v = 120 km/h.\n\n2) Conversion en m/s.\nPour passer des km/h aux m/s, on divise par 3,6.\nv = 120 ÷ 3,6 ≈ 33,3 m/s.\n\nConclusion : la vitesse moyenne du train est de 120 km/h, ce qui correspond à environ 33,3 m/s. Vérification de plausibilité : 33 m/s pour un train, c'est cohérent (un ordre de grandeur réaliste)."],"type":"probleme","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},"exos":[{"consigne":"Exercice type brevet. Un train parcourt 240 km en 2 heures. 1) Calcule sa vitesse moyenne en km/h. 2) Convertis cette vitesse en m/s. (Méthode : formule, valeurs avec unités, résultat avec unité.)","min":"1) v = d/t = 240/2 = 120 km/h.\n2) 120 ÷ 3,6 ≈ 33,3 m/s.","solide":"1) On utilise la formule de la vitesse : v = d / t.\nv = 240 km / 2 h = 120 km/h.\n2) Pour convertir en m/s, on divise par 3,6 :\n120 ÷ 3,6 ≈ 33,3 m/s.\nLa vitesse moyenne du train est de 120 km/h, soit environ 33,3 m/s.","mention":"1) Vitesse moyenne en km/h.\nFormule littérale : v = d / t, où d est la distance et t la durée.\nApplication numérique avec unités : v = 240 km / 2 h.\nCalcul : v = 120 km/h.\n\n2) Conversion en m/s.\nPour passer des km/h aux m/s, on divise par 3,6.\nv = 120 ÷ 3,6 ≈ 33,3 m/s.\n\nConclusion : la vitesse moyenne du train est de 120 km/h, ce qui correspond à environ 33,3 m/s. Vérification de plausibilité : 33 m/s pour un train, c'est cohérent (un ordre de grandeur réaliste)."},{"consigne":"Exercice type brevet. Un cycliste parcourt 30 km en 1 h 30 min. 1) Convertis la durée en heures. 2) Calcule sa vitesse moyenne en km/h.","min":"1) 1 h 30 min = 1,5 h.\n2) v = d/t = 30/1,5 = 20 km/h.","solide":"1) 30 min = 0,5 h, donc 1 h 30 min = 1,5 h.\n2) Formule : v = d/t, avec d = 30 km et t = 1,5 h.\nv = 30 / 1,5 = 20 km/h.\nLa vitesse moyenne du cycliste est de 20 km/h.","mention":"1) Conversion de la durée.\n1 h 30 min, c'est 1 heure plus 30 minutes. Comme 30 minutes valent une demi-heure, soit 0,5 h, la durée totale est t = 1,5 h.\n\n2) Vitesse moyenne.\nFormule littérale : v = d / t.\nApplication numérique avec unités : v = 30 km / 1,5 h.\nCalcul : v = 20 km/h.\n\nConclusion : la vitesse moyenne du cycliste est de 20 km/h. Vérification de plausibilité : 20 km/h est une vitesse réaliste pour un cycliste, le résultat est cohérent."},{"consigne":"Exercice type brevet. La lumière se déplace à environ 300 000 km/s. Le Soleil est à 150 000 000 km de la Terre. 1) Quelle formule relie distance, vitesse et temps ? 2) Calcule le temps mis par la lumière du Soleil pour atteindre la Terre, en secondes.","min":"1) t = d / v.\n2) t = 150 000 000 / 300 000 = 500 s.","solide":"1) À partir de v = d/t, on isole le temps : t = d / v.\n2) Application : t = 150 000 000 / 300 000 = 500 s.\nLa lumière met 500 s, soit un peu plus de 8 minutes, pour aller du Soleil à la Terre.","mention":"1) Relation entre les grandeurs.\nLa vitesse est définie par v = d / t. En réorganisant cette formule pour isoler le temps, on obtient t = d / v.\n\n2) Calcul du temps de trajet de la lumière.\nApplication numérique avec unités : t = 150 000 000 km / 300 000 km/s.\nCalcul : t = 500 s.\n\nConclusion : la lumière met 500 secondes pour parcourir la distance Soleil-Terre. On peut convertir pour mieux se représenter : 500 s = 8 min 20 s. C'est pourquoi on dit que l'on voit le Soleil tel qu'il était environ 8 minutes plus tôt."}],"parcours":{"mission":"À la fin, tu sais calculer une vitesse avec v = d/t et convertir entre km/h et m/s.","froid":[{"q":"Quelle est la formule de la vitesse moyenne ?","rep":"v = d / t (vitesse = distance ÷ temps)."},{"q":"Quelle est l'unité de vitesse du système international ?","rep":"Le mètre par seconde (m/s). On utilise aussi le km/h."},{"q":"Comment convertir des km/h en m/s ?","rep":"On divise par 3,6. Exemple : 90 km/h = 90 ÷ 3,6 = 25 m/s."},{"q":"Comment convertir des m/s en km/h ?","rep":"On multiplie par 3,6."},{"q":"Qu'est-ce que la relativité du mouvement ?","rep":"Un mouvement se décrit toujours par rapport à un objet de référence : un même objet peut être en mouvement par rapport à l'un et immobile par rapport à un autre."}],"coffre":[{"q":"La vitesse se calcule par v = d / ____.","rep":"Mot attendu : t"},{"q":"L'unité de vitesse du système international est le ____ par seconde.","rep":"Mot attendu : mètre"},{"q":"Pour convertir des km/h en m/s, on divise par ____.","rep":"Mot attendu : 3,6"},{"q":"Pour convertir des m/s en km/h, on multiplie par ____.","rep":"Mot attendu : 3,6"},{"q":"Décrire un mouvement nécessite de choisir un objet de ____.","rep":"Mot attendu : référence"}],"frise":[],"oral":"Explique en 90 secondes comment on calcule une vitesse et comment passer des km/h aux m/s.","oralRedige":"La vitesse mesure la distance parcourue pendant une certaine durée. La formule de base est v égale d sur t, c'est-à-dire la distance divisée par le temps. L'unité du système international est le mètre par seconde, mais dans la vie courante on utilise souvent le kilomètre par heure. Il faut donc savoir convertir. Pour passer des kilomètres par heure aux mètres par seconde, on divise par 3,6. Par exemple, une voiture à 90 kilomètres par heure roule à 90 divisé par 3,6, soit 25 mètres par seconde. Dans l'autre sens, des mètres par seconde aux kilomètres par heure, on multiplie par 3,6. Ce facteur 3,6 vient du fait qu'il y a 1000 mètres dans un kilomètre et 3600 secondes dans une heure. Enfin, il faut se souvenir que le mouvement est relatif : on le décrit toujours par rapport à un objet de référence.","ecrit":{"consigne":"Exercice type brevet. Un train parcourt 240 km en 2 heures. 1) Calcule sa vitesse moyenne en km/h. 2) Convertis cette vitesse en m/s. (Méthode : formule, valeurs avec unités, résultat avec unité.)","min":"1) v = d/t = 240/2 = 120 km/h.\n2) 120 ÷ 3,6 ≈ 33,3 m/s.","solide":"1) On utilise la formule de la vitesse : v = d / t.\nv = 240 km / 2 h = 120 km/h.\n2) Pour convertir en m/s, on divise par 3,6 :\n120 ÷ 3,6 ≈ 33,3 m/s.\nLa vitesse moyenne du train est de 120 km/h, soit environ 33,3 m/s.","mention":"1) Vitesse moyenne en km/h.\nFormule littérale : v = d / t, où d est la distance et t la durée.\nApplication numérique avec unités : v = 240 km / 2 h.\nCalcul : v = 120 km/h.\n\n2) Conversion en m/s.\nPour passer des km/h aux m/s, on divise par 3,6.\nv = 120 ÷ 3,6 ≈ 33,3 m/s.\n\nConclusion : la vitesse moyenne du train est de 120 km/h, ce qui correspond à environ 33,3 m/s. Vérification de plausibilité : 33 m/s pour un train, c'est cohérent (un ordre de grandeur réaliste)."},"ecritRedige":{"min":"1) v = d/t = 240/2 = 120 km/h.\n2) 120 ÷ 3,6 ≈ 33,3 m/s.","solide":"1) On utilise la formule de la vitesse : v = d / t.\nv = 240 km / 2 h = 120 km/h.\n2) Pour convertir en m/s, on divise par 3,6 :\n120 ÷ 3,6 ≈ 33,3 m/s.\nLa vitesse moyenne du train est de 120 km/h, soit environ 33,3 m/s.","mention":"1) Vitesse moyenne en km/h.\nFormule littérale : v = d / t, où d est la distance et t la durée.\nApplication numérique avec unités : v = 240 km / 2 h.\nCalcul : v = 120 km/h.\n\n2) Conversion en m/s.\nPour passer des km/h aux m/s, on divise par 3,6.\nv = 120 ÷ 3,6 ≈ 33,3 m/s.\n\nConclusion : la vitesse moyenne du train est de 120 km/h, ce qui correspond à environ 33,3 m/s. Vérification de plausibilité : 33 m/s pour un train, c'est cohérent (un ordre de grandeur réaliste)."},"carte":"Carte mémoire : au centre « VITESSE », branches : v = d/t, unités (m/s, km/h), conversions (km/h → m/s : ÷3,6 ; m/s → km/h : ×3,6), mouvement relatif (objet de référence).","motscles":"vitesse, v = d/t, distance, temps, m/s, km/h, conversion (÷3,6 et ×3,6), relativité du mouvement, objet de référence","vid":"https://www.lumni.fr/college/troisieme/physique-chimie","vidlab":"Vidéo du chapitre"}},{"id":"P2","matiere":"pc","titre":"Énergie cinétique et énergies","objectif":"À la fin, tu sais calculer une énergie cinétique avec Ec = ½ m v² et comprendre les conversions d'énergie.","retiens":["L'énergie cinétique est l'énergie que possède un objet à cause de son mouvement.","Elle dépend de la masse et SURTOUT de la vitesse (la vitesse est au carré : doubler la vitesse multiplie l'énergie par 4).","Unités : masse en kg, vitesse en m/s, énergie en joules (J)."],"formules":["Ec = ½ × m × v²   (m en kg, v en m/s, Ec en J)"],"resolu":{"enonce":"Une voiture de 1000 kg roule à 20 m/s. Calculer son énergie cinétique.","etapes":["J'applique la formule : Ec = ½ × m × v² = ½ × 1000 × 20².","Je calcule le carré puis le produit : ½ × 1000 × 400 = 200 000.","L'énergie cinétique est 200 000 J, soit 200 kJ."],"resultat":"200 000 J = 200 kJ"},"exact":[],"qcm":[{"q":"Calcule l'énergie cinétique d'un objet de 4 kg se déplaçant à 5 m/s. (Ec = ½ m v²)","good":"50 J","choices":["10 J","20 J","50 J","100 J"],"explain":"Ec = ½ × 4 × 5² = ½ × 4 × 25 = 50 J. Erreur classique : oublier le carré (½×4×5=10) ou oublier le ½ (100).","verif":"N'oublie ni le carré de la vitesse, ni le facteur ½."},{"q":"Si la vitesse d'un véhicule est multipliée par 3, par combien est multipliée son énergie cinétique ?","good":"9","choices":["27","3","6","9"],"explain":"Ec dépend de v² : si v est ×3, alors v² est ×9, donc Ec est ×9. C'est pourquoi la vitesse est si dangereuse au volant.","verif":"L'énergie cinétique varie avec le CARRÉ de la vitesse."},{"q":"Un objet de 1 000 kg roule à 10 m/s. Quelle est son énergie cinétique ?","good":"50 000 J","choices":["10 000 J","100 000 J","50 000 J","5 000 J"],"explain":"Ec = ½ × 1000 × 10² = ½ × 1000 × 100 = 50 000 J. Erreur : oublier le carré (donne 5 000 J).","verif":"½ × m × v², avec la vitesse au carré."},{"q":"Une grandeur s'exprime en joules. Laquelle ne peut PAS être un joule ?","good":"Une puissance","choices":["Une puissance","Une énergie de position","Une énergie électrique","Une énergie cinétique"],"explain":"Le joule (J) est l'unité d'énergie sous toutes ses formes. La puissance, elle, s'exprime en watts (W). Ne pas confondre énergie (J) et puissance (W).","verif":"Énergie en joules (J), puissance en watts (W)."}],"paper":{"consigne":"Exercice type brevet. Une voiture de masse 1000 kg roule à 20 m/s. 1) Calcule son énergie cinétique. 2) Que devient cette énergie si la vitesse double (40 m/s) ? (Méthode : formule, valeurs avec unités, résultat.)","grille":["1) Ec = ½ × 1000 × 20² = ½ × 1000 × 400 = 200 000 J.\n2) À 40 m/s : Ec = ½ × 1000 × 40² = ½ × 1000 × 1600 = 800 000 J, soit 4 fois plus.","1) Formule : Ec = ½ × m × v², avec m = 1000 kg et v = 20 m/s.\nEc = ½ × 1000 × 20² = ½ × 1000 × 400 = 200 000 J.\n2) À 40 m/s : Ec = ½ × 1000 × 40² = ½ × 1000 × 1600 = 800 000 J.\nL'énergie est multipliée par 4 quand la vitesse double, car la vitesse intervient au carré.","1) Énergie cinétique à 20 m/s.\nFormule littérale : Ec = ½ × m × v².\nApplication numérique avec unités : Ec = ½ × 1000 kg × (20 m/s)².\nCalcul : (20)² = 400, donc Ec = ½ × 1000 × 400 = 200 000 J.\n\n2) Énergie cinétique à 40 m/s.\nEc = ½ × 1000 × (40)² = ½ × 1000 × 1600 = 800 000 J.\n\nConclusion : à 20 m/s l'énergie cinétique vaut 200 000 J ; à 40 m/s elle vaut 800 000 J, soit 4 fois plus. Ce résultat illustre une notion essentielle de sécurité routière : comme la vitesse intervient au carré dans la formule, doubler la vitesse quadruple l'énergie à dissiper en cas de choc, et augmente fortement la distance de freinage."],"type":"probleme","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},"exos":[{"consigne":"Exercice type brevet. Une voiture de masse 1000 kg roule à 20 m/s. 1) Calcule son énergie cinétique. 2) Que devient cette énergie si la vitesse double (40 m/s) ? (Méthode : formule, valeurs avec unités, résultat.)","min":"1) Ec = ½ × 1000 × 20² = ½ × 1000 × 400 = 200 000 J.\n2) À 40 m/s : Ec = ½ × 1000 × 40² = ½ × 1000 × 1600 = 800 000 J, soit 4 fois plus.","solide":"1) Formule : Ec = ½ × m × v², avec m = 1000 kg et v = 20 m/s.\nEc = ½ × 1000 × 20² = ½ × 1000 × 400 = 200 000 J.\n2) À 40 m/s : Ec = ½ × 1000 × 40² = ½ × 1000 × 1600 = 800 000 J.\nL'énergie est multipliée par 4 quand la vitesse double, car la vitesse intervient au carré.","mention":"1) Énergie cinétique à 20 m/s.\nFormule littérale : Ec = ½ × m × v².\nApplication numérique avec unités : Ec = ½ × 1000 kg × (20 m/s)².\nCalcul : (20)² = 400, donc Ec = ½ × 1000 × 400 = 200 000 J.\n\n2) Énergie cinétique à 40 m/s.\nEc = ½ × 1000 × (40)² = ½ × 1000 × 1600 = 800 000 J.\n\nConclusion : à 20 m/s l'énergie cinétique vaut 200 000 J ; à 40 m/s elle vaut 800 000 J, soit 4 fois plus. Ce résultat illustre une notion essentielle de sécurité routière : comme la vitesse intervient au carré dans la formule, doubler la vitesse quadruple l'énergie à dissiper en cas de choc, et augmente fortement la distance de freinage."},{"consigne":"Exercice type brevet. Un ballon de football de masse 0,4 kg est frappé et atteint la vitesse de 25 m/s. Calcule son énergie cinétique. (Méthode : formule, valeurs avec unités, calcul, résultat avec unité.)","min":"Ec = ½ × m × v² = ½ × 0,4 × 25² = ½ × 0,4 × 625 = 125 J.","solide":"Formule : Ec = ½ × m × v², avec m = 0,4 kg et v = 25 m/s.\nOn calcule d'abord v² : 25² = 625.\nEc = ½ × 0,4 × 625 = 0,2 × 625 = 125 J.\nL'énergie cinétique du ballon est de 125 J.","mention":"On utilise la formule de l'énergie cinétique : Ec = ½ × m × v², avec la masse m en kilogrammes et la vitesse v en mètres par seconde.\n\nÉtape 1 : calcul du carré de la vitesse.\nv² = (25)² = 625.\n\nÉtape 2 : application de la formule avec les unités.\nEc = ½ × 0,4 kg × 625 = 0,2 × 625 = 125 J.\n\nConclusion : l'énergie cinétique du ballon frappé est de 125 J. On remarque l'importance de la vitesse : même avec une masse faible (0,4 kg), la vitesse élevée donne une énergie notable, car la vitesse intervient au carré dans la formule."},{"consigne":"Exercice type brevet. Une voiture roule d'abord à 30 km/h en ville, puis à 90 km/h sur route. 1) Par combien la vitesse a-t-elle été multipliée ? 2) Par combien son énergie cinétique a-t-elle été multipliée ? Justifie.","min":"1) 90 / 30 = 3 : la vitesse est multipliée par 3.\n2) L'énergie cinétique est multipliée par 3² = 9, car la vitesse intervient au carré.","solide":"1) La vitesse passe de 30 à 90 km/h : 90 / 30 = 3. La vitesse est donc multipliée par 3.\n2) Dans Ec = ½mv², la vitesse est au carré. Si v est multipliée par 3, alors v² est multipliée par 3² = 9. À masse égale, l'énergie cinétique est donc multipliée par 9.","mention":"1) Variation de la vitesse.\nLa vitesse passe de 30 km/h à 90 km/h. Le facteur de multiplication est 90 ÷ 30 = 3 : la vitesse a triplé.\n\n2) Variation de l'énergie cinétique.\nL'énergie cinétique est donnée par Ec = ½ × m × v². La masse de la voiture ne change pas. En revanche, la vitesse intervient au carré : si la vitesse est multipliée par 3, le terme v² est multiplié par 3 × 3 = 9.\n\nL'énergie cinétique est donc multipliée par 9.\n\nConclusion : en triplant sa vitesse, la voiture multiplie son énergie cinétique par 9. C'est une notion clé de sécurité routière : l'énergie à dissiper en cas de choc, et la distance de freinage, augmentent beaucoup plus vite que la vitesse elle-même."}],"parcours":{"mission":"À la fin, tu sais calculer une énergie cinétique avec Ec = ½ m v² et comprendre les conversions d'énergie.","froid":[{"q":"Quelle est la formule de l'énergie cinétique ?","rep":"Ec = ½ × m × v² (m en kg, v en m/s, Ec en joules)."},{"q":"Quelle est l'unité d'énergie ?","rep":"Le joule (J)."},{"q":"De quoi dépend l'énergie cinétique d'un objet ?","rep":"De sa masse et surtout de sa vitesse (qui intervient au carré)."},{"q":"Cite deux formes d'énergie.","rep":"Énergie cinétique, énergie chimique, électrique, thermique, lumineuse (deux suffisent)."},{"q":"Que dit le principe de conservation de l'énergie ?","rep":"L'énergie ne se crée pas et ne disparaît pas : elle se transforme d'une forme à une autre."}],"coffre":[{"q":"L'énergie cinétique se calcule par Ec = ½ × m × ____.","rep":"Mot attendu : v²"},{"q":"Dans Ec = ½ m v², la masse m est en ____ et la vitesse v en m/s.","rep":"Mot attendu : kg"},{"q":"L'unité d'énergie est le ____.","rep":"Mot attendu : joule"},{"q":"Comme la vitesse intervient au ____, doubler la vitesse multiplie l'énergie cinétique par 4.","rep":"Mot attendu : carré"},{"q":"L'énergie ne se crée pas et ne disparaît pas : elle se ____.","rep":"Mot attendu : transforme"}],"frise":[],"oral":"Explique en 90 secondes ce qu'est l'énergie cinétique et pourquoi la vitesse est si importante.","oralRedige":"L'énergie cinétique, c'est l'énergie que possède un objet en mouvement. Sa formule est Ec égale un demi fois m fois v au carré, où m est la masse en kilogrammes et v la vitesse en mètres par seconde, le résultat étant en joules. Ce qu'il faut surtout comprendre, c'est le rôle de la vitesse : elle intervient au carré. Cela veut dire que si on double la vitesse, l'énergie cinétique est multipliée par quatre, et non par deux. C'est pour ça qu'un accident à grande vitesse est bien plus violent : l'énergie à dissiper augmente très vite. C'est aussi pour ça que la distance de freinage augmente fortement avec la vitesse. Enfin, l'énergie cinétique n'est qu'une forme d'énergie parmi d'autres, comme l'énergie chimique, électrique ou thermique. Et selon le principe de conservation, l'énergie ne se crée ni ne disparaît : elle se transforme d'une forme à une autre.","ecrit":{"consigne":"Exercice type brevet. Une voiture de masse 1000 kg roule à 20 m/s. 1) Calcule son énergie cinétique. 2) Que devient cette énergie si la vitesse double (40 m/s) ? (Méthode : formule, valeurs avec unités, résultat.)","min":"1) Ec = ½ × 1000 × 20² = ½ × 1000 × 400 = 200 000 J.\n2) À 40 m/s : Ec = ½ × 1000 × 40² = ½ × 1000 × 1600 = 800 000 J, soit 4 fois plus.","solide":"1) Formule : Ec = ½ × m × v², avec m = 1000 kg et v = 20 m/s.\nEc = ½ × 1000 × 20² = ½ × 1000 × 400 = 200 000 J.\n2) À 40 m/s : Ec = ½ × 1000 × 40² = ½ × 1000 × 1600 = 800 000 J.\nL'énergie est multipliée par 4 quand la vitesse double, car la vitesse intervient au carré.","mention":"1) Énergie cinétique à 20 m/s.\nFormule littérale : Ec = ½ × m × v².\nApplication numérique avec unités : Ec = ½ × 1000 kg × (20 m/s)².\nCalcul : (20)² = 400, donc Ec = ½ × 1000 × 400 = 200 000 J.\n\n2) Énergie cinétique à 40 m/s.\nEc = ½ × 1000 × (40)² = ½ × 1000 × 1600 = 800 000 J.\n\nConclusion : à 20 m/s l'énergie cinétique vaut 200 000 J ; à 40 m/s elle vaut 800 000 J, soit 4 fois plus. Ce résultat illustre une notion essentielle de sécurité routière : comme la vitesse intervient au carré dans la formule, doubler la vitesse quadruple l'énergie à dissiper en cas de choc, et augmente fortement la distance de freinage."},"ecritRedige":{"min":"1) Ec = ½ × 1000 × 20² = ½ × 1000 × 400 = 200 000 J.\n2) À 40 m/s : Ec = ½ × 1000 × 40² = ½ × 1000 × 1600 = 800 000 J, soit 4 fois plus.","solide":"1) Formule : Ec = ½ × m × v², avec m = 1000 kg et v = 20 m/s.\nEc = ½ × 1000 × 20² = ½ × 1000 × 400 = 200 000 J.\n2) À 40 m/s : Ec = ½ × 1000 × 40² = ½ × 1000 × 1600 = 800 000 J.\nL'énergie est multipliée par 4 quand la vitesse double, car la vitesse intervient au carré.","mention":"1) Énergie cinétique à 20 m/s.\nFormule littérale : Ec = ½ × m × v².\nApplication numérique avec unités : Ec = ½ × 1000 kg × (20 m/s)².\nCalcul : (20)² = 400, donc Ec = ½ × 1000 × 400 = 200 000 J.\n\n2) Énergie cinétique à 40 m/s.\nEc = ½ × 1000 × (40)² = ½ × 1000 × 1600 = 800 000 J.\n\nConclusion : à 20 m/s l'énergie cinétique vaut 200 000 J ; à 40 m/s elle vaut 800 000 J, soit 4 fois plus. Ce résultat illustre une notion essentielle de sécurité routière : comme la vitesse intervient au carré dans la formule, doubler la vitesse quadruple l'énergie à dissiper en cas de choc, et augmente fortement la distance de freinage."},"carte":"Carte mémoire : au centre « ÉNERGIE CINÉTIQUE », branches : Ec = ½mv² (m en kg, v en m/s, Ec en J), vitesse au carré (×2 vitesse → ×4 énergie), formes d'énergie, conservation.","motscles":"énergie cinétique, Ec = ½mv², joule, masse, vitesse au carré, formes d'énergie, conservation de l'énergie, sécurité routière","vid":"https://www.lumni.fr/college/troisieme/physique-chimie","vidlab":"Vidéo du chapitre"}},{"id":"P3","matiere":"pc","titre":"Électricité : loi d'Ohm, puissance et énergie","objectif":"À la fin, tu sais utiliser la loi d'Ohm U = R·I, calculer une puissance P = U·I et une énergie E = P·t.","retiens":["La loi d'Ohm relie la tension U (en volts), la résistance R (en ohms) et l'intensité I (en ampères).","Attention aux unités : si l'intensité est en milliampères (mA), il faut la convertir en ampères (÷ 1000).","La puissance électrique se calcule avec la tension et l'intensité."],"formules":["U = R × I   (U en V, R en Ω, I en A)","P = U × I   (P en watts)"],"resolu":{"enonce":"Une résistance de 220 Ω est traversée par un courant de 0,05 A. Calculer la tension à ses bornes.","etapes":["J'applique la loi d'Ohm : U = R × I = 220 × 0,05.","Je calcule : 220 × 0,05 = 11.","La tension est 11 V."],"resultat":"11 V"},"exact":[],"qcm":[{"q":"Un conducteur ohmique de résistance 50 Ω est traversé par un courant de 0,2 A. Quelle est la tension à ses bornes ? (U = R × I)","good":"10 V","choices":["50,2 V","10 V","250 V","0,004 V"],"explain":"U = R × I = 50 × 0,2 = 10 V. Erreur : diviser (50/0,2=250) au lieu de multiplier.","verif":"Loi d'Ohm : U = R × I (tension en volts)."},{"q":"Un appareil de puissance 1 500 W fonctionne sous 230 V. Quelle intensité le traverse ? (P = U × I)","good":"≈ 6,5 A","choices":["≈ 1 730 A","≈ 6,5 A","≈ 345 000 A","≈ 0,15 A"],"explain":"De P = U×I on tire I = P/U = 1500/230 ≈ 6,5 A. Erreur : multiplier U et P au lieu de diviser.","verif":"De P = U × I, on isole I = P ÷ U."},{"q":"Un appareil de 60 W fonctionne pendant 5 h. Quelle énergie consomme-t-il en kWh ? (E = P × t)","good":"0,3 kWh","choices":["300 kWh","12 kWh","3 kWh","0,3 kWh"],"explain":"E = P × t = 60 W × 5 h = 300 Wh = 0,3 kWh (on divise par 1000 pour passer en kWh). Erreur : oublier la conversion Wh → kWh.","verif":"E = P × t ; 1 kWh = 1000 Wh."},{"q":"Pour mesurer l'intensité du courant qui traverse une lampe, on branche un ampèremètre :","good":"En série avec la lampe","choices":["En dérivation aux bornes de la pile","En dérivation aux bornes de la lampe","Peu importe le branchement","En série avec la lampe"],"explain":"L'ampèremètre se branche EN SÉRIE pour être traversé par le même courant que la lampe. En dérivation, on mesurerait une tension (voltmètre).","verif":"Ampèremètre en série (mesure I), voltmètre en dérivation (mesure U)."}],"paper":{"consigne":"Exercice type brevet. Un appareil fonctionne sous une tension U = 230 V avec une intensité I = 2 A. 1) Calcule la puissance P. 2) Calcule l'énergie E consommée en 3 heures, en wattheures. (Méthode : formule, valeurs avec unités, résultat.)","grille":["1) P = U × I = 230 × 2 = 460 W.\n2) E = P × t = 460 × 3 = 1380 Wh.","1) Formule de la puissance : P = U × I, avec U = 230 V et I = 2 A.\nP = 230 × 2 = 460 W.\n2) Formule de l'énergie : E = P × t, avec P = 460 W et t = 3 h.\nE = 460 × 3 = 1380 Wh.\nL'appareil a une puissance de 460 W et consomme 1380 Wh en 3 heures.","1) Puissance électrique.\nFormule littérale : P = U × I.\nApplication numérique avec unités : P = 230 V × 2 A.\nCalcul : P = 460 W.\n\n2) Énergie consommée en 3 heures.\nFormule littérale : E = P × t.\nApplication numérique avec unités : E = 460 W × 3 h.\nCalcul : E = 1380 Wh.\n\nConclusion : l'appareil a une puissance de 460 W et consomme 1380 Wh, soit 1,38 kWh, en 3 heures. On garde le temps en heures pour obtenir directement des wattheures, unité utilisée sur les factures d'électricité."],"type":"probleme","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},"exos":[{"consigne":"Exercice type brevet. Un appareil fonctionne sous une tension U = 230 V avec une intensité I = 2 A. 1) Calcule la puissance P. 2) Calcule l'énergie E consommée en 3 heures, en wattheures. (Méthode : formule, valeurs avec unités, résultat.)","min":"1) P = U × I = 230 × 2 = 460 W.\n2) E = P × t = 460 × 3 = 1380 Wh.","solide":"1) Formule de la puissance : P = U × I, avec U = 230 V et I = 2 A.\nP = 230 × 2 = 460 W.\n2) Formule de l'énergie : E = P × t, avec P = 460 W et t = 3 h.\nE = 460 × 3 = 1380 Wh.\nL'appareil a une puissance de 460 W et consomme 1380 Wh en 3 heures.","mention":"1) Puissance électrique.\nFormule littérale : P = U × I.\nApplication numérique avec unités : P = 230 V × 2 A.\nCalcul : P = 460 W.\n\n2) Énergie consommée en 3 heures.\nFormule littérale : E = P × t.\nApplication numérique avec unités : E = 460 W × 3 h.\nCalcul : E = 1380 Wh.\n\nConclusion : l'appareil a une puissance de 460 W et consomme 1380 Wh, soit 1,38 kWh, en 3 heures. On garde le temps en heures pour obtenir directement des wattheures, unité utilisée sur les factures d'électricité."},{"consigne":"Exercice type brevet. Une résistance R = 100 Ω est traversée par une intensité I = 0,2 A. 1) Énonce la loi d'Ohm. 2) Calcule la tension U aux bornes de la résistance. (Méthode : formule, valeurs avec unités, résultat.)","min":"1) U = R × I.\n2) U = 100 × 0,2 = 20 V.","solide":"1) La loi d'Ohm relie la tension, la résistance et l'intensité : U = R × I.\n2) Application : U = 100 Ω × 0,2 A = 20 V.\nLa tension aux bornes de la résistance est de 20 V.","mention":"1) Loi d'Ohm.\nLa loi d'Ohm énonce que la tension U aux bornes d'une résistance est égale au produit de sa résistance R par l'intensité I qui la traverse : U = R × I, avec U en volts, R en ohms et I en ampères.\n\n2) Calcul de la tension.\nFormule littérale : U = R × I.\nApplication numérique avec unités : U = 100 Ω × 0,2 A.\nCalcul : U = 20 V.\n\nConclusion : la tension aux bornes de la résistance est de 20 V."},{"consigne":"Exercice type brevet. Une ampoule porte l'indication « 230 V ; 60 W ». Elle reste allumée 5 heures. 1) Calcule l'énergie consommée en wattheures. 2) Convertis ce résultat en kilowattheures (kWh).","min":"1) E = P × t = 60 × 5 = 300 Wh.\n2) 300 Wh = 0,3 kWh.","solide":"1) Formule : E = P × t, avec P = 60 W et t = 5 h.\nE = 60 × 5 = 300 Wh.\n2) 1 kWh = 1000 Wh, donc 300 Wh = 300 ÷ 1000 = 0,3 kWh.","mention":"1) Énergie consommée.\nLa puissance de l'ampoule est P = 60 W (l'indication « 230 V ; 60 W » donne la tension de fonctionnement et la puissance).\nFormule littérale : E = P × t.\nApplication numérique avec unités : E = 60 W × 5 h.\nCalcul : E = 300 Wh.\n\n2) Conversion en kilowattheures.\nUn kilowattheure vaut 1000 wattheures. On divise donc par 1000 :\nE = 300 ÷ 1000 = 0,3 kWh.\n\nConclusion : l'ampoule consomme 300 Wh, soit 0,3 kWh, en 5 heures. Le kilowattheure est l'unité utilisée sur les factures d'électricité, ce qui permet d'estimer le coût de l'éclairage."}],"parcours":{"mission":"À la fin, tu sais utiliser la loi d'Ohm U = R·I, calculer une puissance P = U·I et une énergie E = P·t.","froid":[{"q":"Énonce la loi d'Ohm.","rep":"U = R × I (la tension est égale à la résistance multipliée par l'intensité)."},{"q":"Quelles sont les unités de U, R et I ?","rep":"U en volts (V), R en ohms (Ω), I en ampères (A)."},{"q":"Quelle est la formule de la puissance électrique ?","rep":"P = U × I (puissance en watts W)."},{"q":"Quelle est la formule de l'énergie électrique ?","rep":"E = P × t (énergie en joules si t en secondes ; en Wh si t en heures)."},{"q":"Avec quel appareil mesure-t-on l'intensité, et comment le branche-t-on ?","rep":"L'ampèremètre, branché en série dans le circuit. (La tension se mesure au voltmètre, branché en dérivation.)"}],"coffre":[{"q":"La loi d'Ohm s'écrit U = R × ____.","rep":"Mot attendu : I"},{"q":"La tension U se mesure en ____, la résistance en ohms, l'intensité en ampères.","rep":"Mot attendu : volts"},{"q":"La puissance électrique se calcule par P = U × ____.","rep":"Mot attendu : I"},{"q":"L'énergie électrique se calcule par E = P × ____.","rep":"Mot attendu : t"},{"q":"L'ampèremètre se branche en ____ dans le circuit.","rep":"Mot attendu : série"}],"frise":[],"oral":"Explique en 90 secondes la loi d'Ohm et comment calculer une puissance électrique.","oralRedige":"En électricité, trois grandeurs sont liées : la tension U, en volts, la résistance R, en ohms, et l'intensité I, en ampères. La loi d'Ohm les relie par une formule simple : U égale R fois I. Elle permet, si on connaît deux grandeurs, de trouver la troisième : par exemple, l'intensité vaut U divisé par R. Ensuite, pour parler de l'énergie consommée par un appareil, on utilise la puissance, qui se calcule par P égale U fois I, en watts. Et l'énergie consommée se calcule avec E égale P fois t : si le temps est en secondes, l'énergie est en joules, et si le temps est en heures, on l'exprime souvent en wattheures. Côté mesure, il faut retenir que l'ampèremètre, qui mesure l'intensité, se branche en série, alors que le voltmètre, qui mesure la tension, se branche en dérivation.","ecrit":{"consigne":"Exercice type brevet. Un appareil fonctionne sous une tension U = 230 V avec une intensité I = 2 A. 1) Calcule la puissance P. 2) Calcule l'énergie E consommée en 3 heures, en wattheures. (Méthode : formule, valeurs avec unités, résultat.)","min":"1) P = U × I = 230 × 2 = 460 W.\n2) E = P × t = 460 × 3 = 1380 Wh.","solide":"1) Formule de la puissance : P = U × I, avec U = 230 V et I = 2 A.\nP = 230 × 2 = 460 W.\n2) Formule de l'énergie : E = P × t, avec P = 460 W et t = 3 h.\nE = 460 × 3 = 1380 Wh.\nL'appareil a une puissance de 460 W et consomme 1380 Wh en 3 heures.","mention":"1) Puissance électrique.\nFormule littérale : P = U × I.\nApplication numérique avec unités : P = 230 V × 2 A.\nCalcul : P = 460 W.\n\n2) Énergie consommée en 3 heures.\nFormule littérale : E = P × t.\nApplication numérique avec unités : E = 460 W × 3 h.\nCalcul : E = 1380 Wh.\n\nConclusion : l'appareil a une puissance de 460 W et consomme 1380 Wh, soit 1,38 kWh, en 3 heures. On garde le temps en heures pour obtenir directement des wattheures, unité utilisée sur les factures d'électricité."},"ecritRedige":{"min":"1) P = U × I = 230 × 2 = 460 W.\n2) E = P × t = 460 × 3 = 1380 Wh.","solide":"1) Formule de la puissance : P = U × I, avec U = 230 V et I = 2 A.\nP = 230 × 2 = 460 W.\n2) Formule de l'énergie : E = P × t, avec P = 460 W et t = 3 h.\nE = 460 × 3 = 1380 Wh.\nL'appareil a une puissance de 460 W et consomme 1380 Wh en 3 heures.","mention":"1) Puissance électrique.\nFormule littérale : P = U × I.\nApplication numérique avec unités : P = 230 V × 2 A.\nCalcul : P = 460 W.\n\n2) Énergie consommée en 3 heures.\nFormule littérale : E = P × t.\nApplication numérique avec unités : E = 460 W × 3 h.\nCalcul : E = 1380 Wh.\n\nConclusion : l'appareil a une puissance de 460 W et consomme 1380 Wh, soit 1,38 kWh, en 3 heures. On garde le temps en heures pour obtenir directement des wattheures, unité utilisée sur les factures d'électricité."},"carte":"Carte mémoire : au centre « ÉLECTRICITÉ », branches : loi d'Ohm U=R·I, puissance P=U·I (W), énergie E=P·t, unités (V, Ω, A, W), mesures (ampèremètre série, voltmètre dérivation).","motscles":"loi d'Ohm, U = R·I, tension (V), résistance (Ω), intensité (A), puissance P = U·I (W), énergie E = P·t, ampèremètre (série), voltmètre (dérivation)","vid":"https://www.lumni.fr/college/troisieme/physique-chimie","vidlab":"Vidéo du chapitre"}},{"id":"P4","matiere":"pc","titre":"Masse volumique et concentration","objectif":"À la fin, tu sais calculer une masse volumique avec ρ = m/V et une concentration massique.","retiens":["La masse volumique compare la masse d'un objet à son volume : un objet « lourd pour sa taille » a une grande masse volumique.","L'eau a une masse volumique de 1 g/mL (donc 1 L d'eau pèse 1000 g).","La concentra

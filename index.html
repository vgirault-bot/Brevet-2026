n\n3) La couronne périurbaine.\nC'est l'espace situé à la périphérie d'une aire urbaine, assez peu dense, où vivent des habitants dont une partie travaille dans la ville-centre et s'y déplace quotidiennement.\n\nConclusion : ces trois notions décrivent la dynamique des villes françaises, marquées par la concentration (métropolisation) et l'extension (étalement urbain, couronne périurbaine)."}],"parcours":{"mission":"À la fin, tu sais expliquer comment les villes transforment le territoire français.","froid":[{"q":"Quelles sont les 3 parties d'une aire urbaine ?","rep":"Ville-centre, banlieue, couronne périurbaine."},{"q":"Qu'est-ce qu'une mobilité pendulaire ?","rep":"Le déplacement quotidien domicile-travail/études."},{"q":"Que veut dire « périurbanisation » ?","rep":"L'extension de l'habitat autour des villes."},{"q":"Cite une grande métropole française.","rep":"Paris, Lyon, Marseille, Toulouse… (au choix)."},{"q":"Cite un problème causé par l'étalement urbain.","rep":"Étalement, transports, pollution, prix du logement."}],"coffre":[{"q":"Une aire urbaine = ____ + ____ + ____","rep":"ville-centre + banlieue + couronne périurbaine."},{"q":"La métropolisation, c'est la concentration des ____","rep":"…fonctions de commandement (emplois, services, décisions)."},{"q":"Les habitants vont vivre de plus en plus dans la ____","rep":"couronne périurbaine."},{"q":"Une mobilité pendulaire, c'est ____","rep":"…le trajet quotidien domicile-travail."},{"q":"Trois problèmes des villes : ____, ____, ____","rep":"transports, pollution, inégalités (au choix)."}],"frise":[],"oral":"Explique en 90 secondes pourquoi les gens partent vivre autour des villes plutôt qu'au centre.","ecrit":{"consigne":"Écris 8 lignes : comment la métropolisation transforme le territoire (avantages + problèmes). Cite une métropole.","min":"Métropoles attractives + périurbanisation.","solide":"Attractivité + étalement + mobilités + 1 métropole.","mention":"Ajoute les inégalités centre/banlieue/périurbain et un enjeu environnemental."},"oralRedige":"De plus en plus de gens vont vivre autour des villes plutôt qu'en plein centre : c'est la périurbanisation. Cela s'explique par la métropolisation, c'est-à-dire la concentration des populations et des activités dans les grandes villes. Les métropoles, comme Paris ou Lyon, attirent les emplois, les services et les universités. Mais le centre est cher et dense, alors beaucoup de ménages s'installent dans la couronne périurbaine, où ils trouvent des logements plus grands, quitte à utiliser leur voiture chaque jour pour aller travailler en ville. Cela crée un étalement urbain et des inégalités entre le centre et les périphéries.","ecritRedige":{"min":"La métropolisation est la concentration des gens et des activités dans les grandes villes, comme Paris. Comme le centre est cher, beaucoup de gens habitent autour de la ville, dans le périurbain, et prennent leur voiture pour aller travailler.","solide":"La métropolisation transforme le territoire français. C'est la concentration croissante des populations, des emplois et des services dans les grandes villes, les métropoles, comme Paris ou Lyon. Cette attractivité a un effet : comme les centres-villes sont chers et denses, de nombreux habitants s'installent dans la couronne périurbaine, où ils trouvent des logements plus spacieux. Cela provoque un étalement urbain et de nombreux déplacements quotidiens en voiture, les mobilités pendulaires. Mais la métropolisation crée aussi des inégalités entre le centre, les banlieues et le périurbain.","mention":"La métropolisation est un processus majeur qui transforme le territoire français. Elle désigne la concentration croissante des populations, des activités économiques et des fonctions de commandement dans les grandes villes. Une métropole comme Paris, de rang mondial, ou comme Lyon, concentre les emplois qualifiés, les universités, les sièges sociaux et les services. Cette forte attractivité a des conséquences spatiales : parce que les centres-villes sont chers et densément peuplés, de nombreux ménages choisissent de s'installer dans la couronne périurbaine, où ils accèdent à des logements plus grands et individuels. Il en résulte un étalement urbain et une multiplication des mobilités pendulaires, ces déplacements quotidiens entre le domicile et le travail, souvent en voiture. Cette dynamique pose des problèmes d'environnement, avec l'artificialisation des sols et la pollution, et accentue les inégalités entre les centres dynamiques, les banlieues et les espaces périurbains."},"carte":"Carte mémoire : « AIRE URBAINE » au centre, dessine les 3 cercles concentriques.","motscles":"aire urbaine, métropole, métropolisation, périurbanisation, mobilité pendulaire, étalement.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aires urbaines)"}},{"id":"G2","matiere":"geo","titre":"Les espaces productifs et la mondialisation","objectif":"À la fin, tu sais classer les espaces productifs et expliquer leur adaptation.","qcm":[{"q":"Qu'est-ce qu'un espace productif ?","good":"Un espace aménagé et organisé pour produire des biens ou des services","choices":["Un quartier uniquement résidentiel","Un espace aménagé et organisé pour produire des biens ou des services","Une zone naturelle interdite à toute activité","Un espace réservé uniquement aux loisirs"],"explain":"Les espaces productifs peuvent être industriels, agricoles ou de services. Beaucoup sont aujourd'hui connectés à la mondialisation.","verif":"Dans ton cours, classe des exemples d'espaces productifs (industriel, agricole, tertiaire).","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces productifs)"},{"q":"Quel secteur économique emploie aujourd'hui le plus d'actifs en France ?","good":"Le secteur tertiaire (les services)","choices":["Le secteur tertiaire (les services)","La pêche","Le secteur primaire (l'agriculture)","Le secteur secondaire (l'industrie)"],"explain":"Le tertiaire (commerce, santé, banque, tourisme, administration) domine très largement l'emploi. L'agriculture occupe une faible part des actifs.","verif":"Vérifie dans ton cours la répartition des actifs entre les trois secteurs.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces productifs)"},{"q":"Pourquoi les façades maritimes (ex. Le Havre) sont-elles des espaces productifs majeurs ?","good":"Parce qu'elles concentrent des ports et des industries connectés aux échanges mondiaux","choices":["Parce qu'elles concentrent des ports et des industries connectés aux échanges mondiaux","Parce qu'elles sont inhabitées","Parce qu'elles sont uniquement agricoles","Parce qu'elles sont coupées du reste du monde"],"explain":"Les façades maritimes sont les portes d'entrée des flux mondialisés (conteneurs, énergie), avec ports, zones industrialo-portuaires et logistique.","verif":"Dans ton cours, repère une façade maritime française et ses activités.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces productifs)"},{"q":"Qu'est-ce qui caractérise une agriculture intégrée à la mondialisation, comme en Bretagne ?","good":"Une production intensive, spécialisée et tournée vers l'exportation","choices":["Une agriculture vivrière sans machines","Une production destinée uniquement à la famille","Une absence totale de commerce","Une production intensive, spécialisée et tournée vers l'exportation"],"explain":"L'agriculture productiviste (élevage breton, grandes cultures) est mécanisée, spécialisée et exporte une partie de sa production.","verif":"Vérifie dans ton cours un exemple d'espace agricole productif et ses limites (environnement).","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces productifs)"}],"court":[{"q":"Qu'est-ce qu'un espace productif ?","sol":"Un espace aménagé pour une activité économique.","kw":["espace","aménagé","activité","économique"],"explain":"Contexte : espace productif, mondialisation, reconversion, technopôle, littoralisation, spécialisation. · À éviter : Réduire les espaces productifs à l'industrie.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces productifs)"},{"q":"Cite les 3 grands types d'espaces productifs.","sol":"Agricole, industriel, services/tourisme.","kw":["agricole","industriel","servicestourisme"],"explain":"Contexte : espace productif, mondialisation, reconversion, technopôle, littoralisation, spécialisation. · À éviter : Réduire les espaces productifs à l'industrie.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces productifs)"},{"q":"Pourquoi les métropoles sont-elles avantagées ?","sol":"Transports, recherche, main-d'œuvre, entreprises.","kw":["transports","recherche","mainduvre","entreprises"],"explain":"Contexte : espace productif, mondialisation, reconversion, technopôle, littoralisation, spécialisation. · À éviter : Réduire les espaces productifs à l'industrie.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces productifs)"},{"q":"Que veut dire « reconversion » ?","sol":"Transformer un ancien espace productif.","kw":["transformer","ancien","espace","productif"],"explain":"Contexte : espace productif, mondialisation, reconversion, technopôle, littoralisation, spécialisation. · À éviter : Réduire les espaces productifs à l'industrie.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces productifs)"},{"q":"Cite un exemple d'espace productif agricole français.","sol":"Bassin parisien, vignobles, Bretagne… (au choix).","kw":["bassin","parisien","vignobles","bretagne"],"explain":"Contexte : espace productif, mondialisation, reconversion, technopôle, littoralisation, spécialisation. · À éviter : Réduire les espaces productifs à l'industrie.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces productifs)"}],"paper":{"consigne":"Écris 8 lignes : les espaces productifs sont variés et inégalement intégrés à la mondialisation.","grille":["3 types + mondialisation.","Types variés + territoires inégaux + adaptations.","Cite un technopôle (Aerospace Valley) et une reconversion industrielle."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/geographie"},"exos":[{"consigne":"Écris 8 lignes : les espaces productifs sont variés et inégalement intégrés à la mondialisation.","min":"3 types + mondialisation.","solide":"Types variés + territoires inégaux + adaptations.","mention":"Introduction : les espaces productifs sont les territoires où se concentrent les activités économiques. Ils sont variés et inégalement intégrés à la mondialisation, c'est-à-dire à la mise en relation des économies à l'échelle planétaire.\n\nDes espaces variés. On distingue les espaces industriels, les espaces agricoles et les espaces de services. Certains sont tournés vers les hautes technologies, comme les technopôles : Aerospace Valley, autour de Toulouse, regroupe ainsi les activités de l'aéronautique.\n\nUne intégration inégale à la mondialisation. Les espaces les mieux intégrés sont les métropoles, les littoraux équipés de grands ports et les territoires connectés, qui profitent des échanges mondiaux. À l'inverse, d'anciennes régions industrielles, concurrencées par des pays à main-d'œuvre moins chère, ont connu des fermetures d'usines et doivent se reconvertir, par exemple vers les services ou les nouvelles technologies.\n\nConclusion : les espaces productifs français sont donc divers et profitent inégalement de la mondialisation. Les territoires connectés en sortent gagnants, tandis que d'anciens bassins industriels doivent s'adapter pour ne pas décliner."},{"consigne":"Développement construit (8 lignes). « Comment la mondialisation transforme-t-elle les espaces productifs français ? » Distingue espaces gagnants et espaces en difficulté.","min":"Espaces productifs variés (industriels, agricoles, de services). La mondialisation favorise certains espaces (métropoles, littoraux, zones connectées) et fragilise d'autres (anciennes régions industrielles). Concurrence mondiale, importance des transports.","solide":"Introduction : les espaces productifs (industriels, agricoles, de services) sont transformés par la mondialisation, c'est-à-dire l'ouverture des échanges à l'échelle planétaire.\nIdée 1 : des espaces gagnants. Les métropoles, les littoraux (ports) et les territoires bien connectés attirent les activités à forte valeur ajoutée et bénéficient de la mondialisation.\nIdée 2 : des espaces en difficulté. Les anciennes régions industrielles, confrontées à la concurrence mondiale, connaissent des fermetures d'usines et du chômage.\nConclusion : la mondialisation accentue les contrastes entre les territoires productifs.","mention":"Introduction : la France dispose d'espaces productifs variés, qu'ils soient industriels, agricoles ou tournés vers les services. La mondialisation, c'est-à-dire la mise en relation des économies à l'échelle planétaire, transforme profondément ces espaces. Elle ne les affecte pas tous de la même manière.\n\nPremière idée : des espaces gagnants. Certains territoires tirent profit de la mondialisation. C'est le cas des métropoles, qui concentrent les activités de pointe et les fonctions de commandement, des littoraux équipés de grands ports tournés vers le commerce mondial, et plus généralement des espaces bien connectés aux réseaux de transport et de communication.\n\nSeconde idée : des espaces en difficulté. À l'inverse, d'anciennes régions industrielles souffrent de la concurrence des pays où la main-d'œuvre coûte moins cher. Elles connaissent des fermetures d'usines, du chômage et un déclin qui oblige à reconvertir ces territoires.\n\nConclusion : en favorisant les territoires connectés et en fragilisant les anciens bassins industriels, la mondialisation accentue les contrastes entre les espaces productifs français. Les transports et la connexion au monde deviennent des facteurs décisifs."},{"consigne":"Vocabulaire et notions. 1) Qu'est-ce qu'un espace productif ? 2) Cite les trois grands types d'espaces productifs. 3) Qu'est-ce que la mondialisation ?","min":"1) Un espace productif est un territoire où se concentre une activité économique (production de richesses). 2) Espaces industriels, agricoles, de services. 3) La mondialisation est la mise en relation des économies et des territoires à l'échelle de la planète.","solide":"1) Un espace productif est un territoire aménagé et utilisé pour une activité économique, c'est-à-dire pour produire des richesses.\n2) Les trois grands types sont : les espaces industriels, les espaces agricoles et les espaces de services (tertiaires).\n3) La mondialisation est le processus de mise en relation des économies, des hommes et des territoires à l'échelle de la planète, grâce aux échanges et aux transports.","mention":"L'exercice porte sur le vocabulaire des espaces productifs.\n\n1) Un espace productif.\nC'est un territoire aménagé et organisé pour accueillir une activité économique, autrement dit un lieu où l'on produit des biens ou des services et où l'on crée des richesses.\n\n2) Les trois grands types d'espaces productifs.\nOn distingue les espaces industriels (usines, zones d'activité), les espaces agricoles (cultures, élevage) et les espaces de services, dits tertiaires (commerces, tourisme, bureaux, recherche).\n\n3) La mondialisation.\nC'est le processus de mise en relation croissante des économies, des hommes et des territoires à l'échelle de la planète. Elle repose sur le développement des échanges commerciaux, des transports et des communications, et met les territoires en concurrence.\n\nConclusion : un espace productif est un lieu de production de richesses, qui peut être industriel, agricole ou de services, et la mondialisation est le cadre planétaire qui transforme ces espaces."}],"parcours":{"mission":"À la fin, tu sais classer les espaces productifs et expliquer leur adaptation.","froid":[{"q":"Qu'est-ce qu'un espace productif ?","rep":"Un espace aménagé pour une activité économique."},{"q":"Cite les 3 grands types d'espaces productifs.","rep":"Agricole, industriel, services/tourisme."},{"q":"Pourquoi les métropoles sont-elles avantagées ?","rep":"Transports, recherche, main-d'œuvre, entreprises."},{"q":"Que veut dire « reconversion » ?","rep":"Transformer un ancien espace productif."},{"q":"Cite un exemple d'espace productif agricole français.","rep":"Bassin parisien, vignobles, Bretagne… (au choix)."}],"coffre":[{"q":"Un espace productif est un espace aménagé pour ____","rep":"…une activité économique."},{"q":"Les 3 types : ____, ____, ____","rep":"agricole, industriel, services/tourisme."},{"q":"La mondialisation pousse les territoires à ____ et ____","rep":"se spécialiser ; innover."},{"q":"Les territoires avantagés sont les ____ et les ____","rep":"métropoles ; littoraux."},{"q":"La reconversion, c'est ____","rep":"…la transformation d'un ancien site vers de nouvelles activités."}],"frise":[],"oral":"Explique en 90 secondes pourquoi tous les territoires ne profitent pas autant de la mondialisation.","ecrit":{"consigne":"Écris 8 lignes : les espaces productifs sont variés et inégalement intégrés à la mondialisation.","min":"3 types + mondialisation.","solide":"Types variés + territoires inégaux + adaptations.","mention":"Cite un technopôle (Aerospace Valley) et une reconversion industrielle."},"oralRedige":"Un espace productif est un espace aménagé pour produire des biens ou des services. En France, on en distingue trois grands types : les espaces agricoles, les espaces industriels et les espaces de services. Avec la mondialisation, beaucoup de ces espaces se sont spécialisés et connectés au reste du monde. Par exemple, les façades maritimes, comme celle du Havre, concentrent de grands ports et des industries tournés vers les échanges internationaux. Aujourd'hui, c'est surtout le secteur des services qui domine l'emploi en France. La mondialisation rend ces espaces plus compétitifs, mais elle met aussi certains d'entre eux en difficulté face à la concurrence.","ecritRedige":{"min":"Un espace productif sert à produire des biens ou des services. En France il y a des espaces agricoles, industriels et de services. Avec la mondialisation, les grands ports comme Le Havre échangent avec le monde entier. Le secteur des services emploie le plus de gens.","solide":"Les espaces productifs sont les espaces aménagés pour produire des biens ou des services. En France, on distingue les espaces agricoles, industriels et de services. La mondialisation a transformé ces espaces en les spécialisant et en les connectant au monde. Les façades maritimes, comme celle du Havre, concentrent des ports et des industries tournés vers le commerce international et constituent les portes d'entrée des flux mondialisés. Aujourd'hui, c'est le secteur tertiaire, celui des services, qui emploie de loin le plus d'actifs. La mondialisation rend ces espaces compétitifs mais en fragilise certains face à la concurrence.","mention":"Les espaces productifs sont les territoires aménagés et organisés pour produire des biens ou des services. La France en compte trois grands types : les espaces agricoles, comme les régions de grande culture ou l'élevage breton, devenus très productifs et exportateurs ; les espaces industriels, souvent reconfigurés par la mondialisation ; et les espaces de services, aujourd'hui dominants, puisque le secteur tertiaire emploie la grande majorité des actifs. La mondialisation a profondément transformé ces espaces : elle les a spécialisés et intégrés aux échanges internationaux. Les façades maritimes, comme l'axe Le Havre-Rouen-Paris, jouent un rôle stratégique : leurs ports et zones industrialo-portuaires sont les portes d'entrée des flux de marchandises et d'énergie. Cette intégration à la mondialisation rend les espaces productifs plus compétitifs, mais elle accentue aussi les inégalités entre les territoires gagnants, bien connectés, et ceux qui souffrent de la concurrence ou de la désindustrialisation."},"carte":"Carte mémoire : « ESPACES PRODUCTIFS », 3 branches : agricole / industriel / tourisme-services.","motscles":"espace productif, mondialisation, reconversion, technopôle, littoralisation, spécialisation.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces productifs)"}},{"id":"G3","matiere":"geo","titre":"Les espaces de faible densité et leurs atouts","objectif":"À la fin, tu sais montrer que ces espaces ont des contraintes MAIS aussi des atouts.","qcm":[{"q":"Qu'est-ce qu'un espace de faible densité ?","good":"Un territoire faiblement peuplé, comme certaines campagnes ou zones de montagne","choices":["Un territoire faiblement peuplé, comme certaines campagnes ou zones de montagne","Une banlieue densément peuplée","Le centre d'une grande métropole","Une zone industrialo-portuaire"],"explain":"Faible densité : peu d'habitants au km2 (« diagonale des faibles densités »). Ces espaces ont pourtant de réels atouts.","verif":"Dans ton cours, repère sur la carte la « diagonale des faibles densités ».","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces de faible densité)"},{"q":"Quels sont les principaux atouts des espaces de faible densité ?","good":"Le tourisme vert, l'agriculture de qualité et les ressources naturelles (eau, énergies)","choices":["Le tourisme vert, l'agriculture de qualité et les ressources naturelles (eau, énergies)","L'absence totale d'activité humaine","Les embouteillages permanents","La concentration de gratte-ciels"],"explain":"Ces espaces valorisent paysages, produits du terroir, tourisme nature et énergies renouvelables, malgré l'éloignement des services.","verif":"Vérifie dans ton cours des exemples de valorisation des espaces ruraux.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces de faible densité)"},{"q":"Quel est un défi majeur pour les habitants des espaces de faible densité ?","good":"L'accès aux services (santé, commerces, transports), souvent éloignés","choices":["L'excès de gratte-ciels","L'accès aux services (santé, commerces, transports), souvent éloignés","La pollution due à la circulation intense","Le manque de place pour se loger"],"explain":"Faible densité rime souvent avec « déserts médicaux » et éloignement des services : l'aménagement cherche à réduire ces inégalités.","verif":"Dans ton cours, retrouve les difficultés d'accès aux services dans ces territoires.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces de faible densité)"}],"court":[{"q":"Qu'est-ce qu'un espace de faible densité ?","sol":"Un espace où la population est peu nombreuse et dispersée.","kw":["espace","population","nombreuse","dispersée"],"explain":"Contexte : faible densité, enclavement, néorural, tourisme vert, parc naturel. · À éviter : Présenter ces espaces comme seulement vides et en retard.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces de faible densité)"},{"q":"Qu'est-ce qu'un néorural ?","sol":"Une personne qui quitte la ville pour la campagne.","kw":["une","personne","quitte","campagne"],"explain":"Contexte : faible densité, enclavement, néorural, tourisme vert, parc naturel. · À éviter : Présenter ces espaces comme seulement vides et en retard.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces de faible densité)"},{"q":"Cite deux contraintes de ces espaces.","sol":"Enclavement, vieillissement, peu de services/emplois.","kw":["enclavement","vieillissement","servicesemplois"],"explain":"Contexte : faible densité, enclavement, néorural, tourisme vert, parc naturel. · À éviter : Présenter ces espaces comme seulement vides et en retard.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces de faible densité)"},{"q":"Cite deux atouts de ces espaces.","sol":"Tourisme, agriculture, paysages, patrimoine.","kw":["tourisme","agriculture","paysages","patrimoine"],"explain":"Contexte : faible densité, enclavement, néorural, tourisme vert, parc naturel. · À éviter : Présenter ces espaces comme seulement vides et en retard.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces de faible densité)"},{"q":"Cite un exemple français (montagne ou campagne).","sol":"Lozère, Massif central, Alpes, Pyrénées (au choix).","kw":["lozère","massif","central","alpes"],"explain":"Contexte : faible densité, enclavement, néorural, tourisme vert, parc naturel. · À éviter : Présenter ces espaces comme seulement vides et en retard.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces de faible densité)"}],"paper":{"consigne":"Écris 8 lignes : ces espaces ont des contraintes MAIS de vrais atouts. Donne un exemple.","grille":["Contraintes + atouts.","Contraintes puis atouts + 1 exemple.","Montre les dynamiques contrastées (télétravail, néoruraux, tourisme vert)."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/geographie"},"exos":[{"consigne":"Écris 8 lignes : ces espaces ont des contraintes MAIS de vrais atouts. Donne un exemple.","min":"Contraintes + atouts.","solide":"Contraintes puis atouts + 1 exemple.","mention":"Introduction : les espaces de faible densité sont des territoires peu peuplés, comme les campagnes isolées et les zones de montagne. On les croit souvent en difficulté, mais ils possèdent aussi de vrais atouts.\n\nDe réelles contraintes. Ces espaces souffrent de l'éloignement des services publics et des emplois, d'un accès parfois difficile (notamment en montagne) et souvent d'un vieillissement de la population, les jeunes partant vers les villes.\n\nMais de vrais atouts. Ils disposent de vastes espaces pour l'agriculture et l'élevage. Leur cadre naturel attire le tourisme, vert ou de montagne, et ils offrent un potentiel pour les énergies renouvelables. De nouvelles dynamiques apparaissent : le télétravail et l'arrivée de néoruraux, en quête d'un meilleur cadre de vie, redonnent de l'activité à certains de ces territoires. Le Massif central, par exemple, valorise le tourisme vert.\n\nConclusion : les espaces de faible densité ne se réduisent donc pas à des espaces en déclin. Malgré leurs contraintes, ils possèdent des atouts (agriculture, tourisme, énergies, cadre de vie) qui permettent de nouvelles dynamiques."},{"consigne":"Développement construit (8 lignes). « Les espaces de faible densité ne sont-ils que des espaces en difficulté ? » Montre leurs contraintes mais aussi leurs atouts.","min":"Espaces peu peuplés (campagnes isolées, montagnes). Contraintes : éloignement des services, vieillissement, accès difficile. Mais atouts : agriculture, tourisme (nature, montagne), énergies renouvelables, cadre de vie.","solide":"Introduction : les espaces de faible densité sont des territoires peu peuplés (campagnes isolées, zones de montagne). On peut se demander s'ils ne connaissent que des difficultés.\nIdée 1 : de réelles contraintes. Ils souffrent de l'éloignement des services et des emplois, d'un accès parfois difficile et souvent d'un vieillissement de la population.\nIdée 2 : mais aussi des atouts. Ils disposent d'espaces pour l'agriculture, d'un cadre naturel favorable au tourisme (montagne, nature) et d'un potentiel pour les énergies renouvelables. Leur cadre de vie attire parfois de nouveaux habitants.\nConclusion : ces espaces ne sont donc pas seulement en difficulté ; ils ont aussi des ressources à valoriser.","mention":"Introduction : les espaces de faible densité sont des territoires peu peuplés, comme les campagnes isolées ou les zones de montagne. On les présente souvent comme des espaces en difficulté, mais cette image mérite d'être nuancée.\n\nPremière idée : de réelles contraintes. Ces espaces souffrent de l'éloignement des services publics (écoles, hôpitaux) et des emplois, ce qui complique la vie quotidienne. L'accès peut y être difficile, notamment en montagne, et la population y est souvent vieillissante, certains jeunes partant vers les villes.\n\nSeconde idée : mais aussi de véritables atouts. Ces territoires disposent de vastes espaces pour l'agriculture et l'élevage. Leur cadre naturel attire le tourisme, qu'il soit vert ou de montagne. Ils offrent aussi un potentiel pour les énergies renouvelables (éolien, hydroélectricité) et un cadre de vie recherché, qui attire de nouveaux habitants en quête de calme.\n\nConclusion : les espaces de faible densité ne se réduisent donc pas à des espaces en difficulté. Malgré de réelles contraintes, ils possèdent des atouts qu'il s'agit de valoriser pour assurer leur dynamisme."},{"consigne":"Vocabulaire et notions. 1) Qu'est-ce qu'un espace de faible densité ? 2) Cite deux exemples de ces espaces. 3) Cite un atout que ces espaces peuvent valoriser.","min":"1) Un territoire peu peuplé (peu d'habitants au km²). 2) Campagnes isolées, zones de montagne (ou certaines forêts). 3) Le tourisme (ou l'agriculture, les énergies renouvelables).","solide":"1) Un espace de faible densité est un territoire qui compte peu d'habitants par kilomètre carré, donc peu peuplé.\n2) Exemples : les campagnes isolées et les zones de montagne (on peut aussi citer certaines forêts).\n3) Un atout valorisable : le tourisme (nature, montagne), mais aussi l'agriculture ou les énergies renouvelables.","mention":"L'exercice porte sur le vocabulaire des espaces de faible densité.\n\n1) Un espace de faible densité.\nC'est un territoire qui compte peu d'habitants par kilomètre carré, c'est-à-dire un espace peu peuplé, par opposition aux espaces densément peuplés comme les aires urbaines.\n\n2) Deux exemples.\nLes campagnes isolées et les zones de montagne sont des espaces de faible densité typiques. On peut aussi penser à certaines forêts ou à des espaces ruraux éloignés des villes.\n\n3) Un atout valorisable.\nMalgré leurs contraintes, ces espaces ont des atouts : le tourisme (nature, randonnée, montagne) en est un majeur. On peut aussi citer l'agriculture et l'élevage, ou le potentiel d'énergies renouvelables (éolien, hydroélectricité).\n\nConclusion : un espace de faible densité est un territoire peu peuplé, comme les campagnes isolées ou la montagne, mais il dispose d'atouts, notamment touristiques, qui peuvent être mis en valeur."}],"parcours":{"mission":"À la fin, tu sais montrer que ces espaces ont des contraintes MAIS aussi des atouts.","froid":[{"q":"Qu'est-ce qu'un espace de faible densité ?","rep":"Un espace où la population est peu nombreuse et dispersée."},{"q":"Qu'est-ce qu'un néorural ?","rep":"Une personne qui quitte la ville pour la campagne."},{"q":"Cite deux contraintes de ces espaces.","rep":"Enclavement, vieillissement, peu de services/emplois."},{"q":"Cite deux atouts de ces espaces.","rep":"Tourisme, agriculture, paysages, patrimoine."},{"q":"Cite un exemple français (montagne ou campagne).","rep":"Lozère, Massif central, Alpes, Pyrénées (au choix)."}],"coffre":[{"q":"Faible densité = population ____ et ____","rep":"peu nombreuse ; dispersée."},{"q":"Trois contraintes : ____, ____, ____","rep":"enclavement, vieillissement, peu d'emplois (au choix)."},{"q":"Trois atouts : ____, ____, ____","rep":"tourisme, paysages, agriculture (au choix)."},{"q":"Un néorural est une personne qui ____","rep":"…quitte la ville pour s'installer à la campagne."},{"q":"Le mot-clé du programme à ne pas oublier : les ____","rep":"atouts."}],"frise":[],"oral":"Explique en 90 secondes pourquoi ces espaces ne sont PAS seulement « vides et en retard ».","ecrit":{"consigne":"Écris 8 lignes : ces espaces ont des contraintes MAIS de vrais atouts. Donne un exemple.","min":"Contraintes + atouts.","solide":"Contraintes puis atouts + 1 exemple.","mention":"Montre les dynamiques contrastées (télétravail, néoruraux, tourisme vert)."},"oralRedige":"Les espaces de faible densité sont des territoires peu peuplés, comme certaines campagnes ou zones de montagne. On les regroupe parfois sous le nom de « diagonale des faibles densités ». On pourrait croire qu'ils n'ont aucun atout, mais c'est faux : ils disposent de paysages, d'une agriculture de qualité, de ressources naturelles et d'un fort potentiel pour le tourisme vert et les énergies renouvelables. Leur principale difficulté, c'est l'accès aux services : commerces, médecins et transports sont souvent loin, ce qui crée parfois des déserts médicaux. L'aménagement du territoire cherche justement à réduire ces inégalités.","ecritRedige":{"min":"Les espaces de faible densité sont des territoires peu peuplés, comme les campagnes et les montagnes. Ils ont des atouts : le tourisme, l'agriculture, la nature. Mais l'accès aux services comme les médecins ou les commerces y est difficile.","solide":"Les espaces de faible densité sont des territoires faiblement peuplés, comme certaines campagnes et zones de montagne, regroupés dans ce qu'on appelle la diagonale des faibles densités. Contrairement à une idée reçue, ils possèdent de réels atouts : des paysages attractifs pour le tourisme vert, une agriculture de qualité et des ressources naturelles utiles, notamment pour les énergies renouvelables. Leur principale difficulté est l'accès aux services : les commerces, les médecins et les transports sont souvent éloignés, ce qui crée des déserts médicaux. L'aménagement du territoire vise à réduire ces inégalités.","mention":"Les espaces de faible densité sont des territoires comptant peu d'habitants au kilomètre carré, comme les zones rurales isolées et les espaces de montagne, souvent regroupés sous l'expression de diagonale des faibles densités, qui traverse la France du nord-est au sud-ouest. Loin d'être des espaces vides et sans intérêt, ils disposent de véritables atouts : des paysages préservés qui attirent un tourisme vert, une agriculture de qualité valorisée par des labels, et des ressources naturelles importantes, en particulier pour produire des énergies renouvelables comme l'éolien ou l'hydroélectricité. Cependant, ces territoires connaissent aussi de fortes contraintes : l'éloignement et le faible nombre d'habitants rendent difficile l'accès aux services publics, aux commerces, aux transports et aux soins, au point de créer des déserts médicaux. C'est pourquoi l'aménagement du territoire, mené par l'État et les collectivités, cherche à désenclaver ces espaces et à y maintenir des services pour réduire les inégalités."},"carte":"Carte mémoire : une balance avec « CONTRAINTES » d'un côté, « ATOUTS » de l'autre.","motscles":"faible densité, enclavement, néorural, tourisme vert, parc naturel.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre espaces de faible densité)"}},{"id":"G4","matiere":"geo","titre":"Aménager le territoire pour réduire les inégalités","objectif":"À la fin, tu sais expliquer pourquoi et avec qui on aménage le territoire.","qcm":[{"q":"Quel est l'objectif principal de l'aménagement du territoire ?","good":"Réduire les inégalités entre les espaces et améliorer l'accès de tous aux services","choices":["Supprimer les transports collectifs","Réduire les inégalités entre les espaces et améliorer l'accès de tous aux services","Vider les campagnes de leurs habitants","Concentrer toutes les activités dans la capitale"],"explain":"L'aménagement vise un développement plus équilibré : transports, très haut débit, services publics, soutien aux territoires fragiles.","verif":"Vérifie dans ton cours des exemples concrets d'aménagement (LGV, très haut débit, maisons de santé).","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aménager le territoire)"},{"q":"Quels acteurs financent et pilotent l'aménagement du territoire en France ?","good":"L'État, les collectivités territoriales et l'Union européenne","choices":["Une organisation mondiale unique","Les particuliers uniquement","L'État, les collectivités territoriales et l'Union européenne","Les seules entreprises privées"],"explain":"L'État, les régions, départements et communes (collectivités territoriales) et l'UE (fonds de cohésion) financent ensemble les aménagements.","verif":"Dans ton cours, retrouve le rôle de la région et de l'Union européenne dans l'aménagement.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aménager le territoire)"},{"q":"Pourquoi la décentralisation modifie-t-elle l'aménagement du territoire ?","good":"Parce qu'elle transfère des compétences de l'État vers les régions et les autres collectivités","choices":["Parce qu'elle supprime toutes les régions","Parce qu'elle interdit aux communes d'agir","Parce qu'elle transfère des compétences de l'État vers les régions et les autres collectivités","Parce qu'elle confie tout à l'Union européenne"],"explain":"La décentralisation donne plus de pouvoir aux collectivités (régions surtout), qui deviennent des acteurs majeurs de l'aménagement.","verif":"Vérifie dans ton cours ce qu'est la décentralisation et qui gagne des compétences.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aménager le territoire)"}],"court":[{"q":"À quoi sert l'aménagement du territoire ?","sol":"Organiser l'espace et réduire les inégalités.","kw":["organiser","lespace","réduire","inégalités"],"explain":"Contexte : aménagement, inégalités territoriales, collectivité, décentralisation, infrastructure. · À éviter : Oublier les acteurs ; présenter l'aménagement comme toujours positif.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aménager le territoire)"},{"q":"Cite deux acteurs de l'aménagement.","sol":"État, région, département, commune, UE… (2 au choix).","kw":["état","région","département","commune"],"explain":"Contexte : aménagement, inégalités territoriales, collectivité, décentralisation, infrastructure. · À éviter : Oublier les acteurs ; présenter l'aménagement comme toujours positif.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aménager le territoire)"},{"q":"Cite deux inégalités entre territoires.","sol":"Transports, soins, emploi, numérique, école (2 au choix).","kw":["transports","emploi","numérique"],"explain":"Contexte : aménagement, inégalités territoriales, collectivité, décentralisation, infrastructure. · À éviter : Oublier les acteurs ; présenter l'aménagement comme toujours positif.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aménager le territoire)"},{"q":"Que veut dire « décentralisation » ?","sol":"Le transfert de compétences de l'État vers les collectivités.","kw":["transfert","compétences","létat","collectivités"],"explain":"Contexte : aménagement, inégalités territoriales, collectivité, décentralisation, infrastructure. · À éviter : Oublier les acteurs ; présenter l'aménagement comme toujours positif.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aménager le territoire)"},{"q":"Cite un exemple d'aménagement concret.","sol":"LGV, tramway, fibre, écoquartier… (au choix).","kw":["lgv","tramway","écoquartier"],"explain":"Contexte : aménagement, inégalités territoriales, collectivité, décentralisation, infrastructure. · À éviter : Oublier les acteurs ; présenter l'aménagement comme toujours positif.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aménager le territoire)"}],"paper":{"consigne":"Écris 8 lignes : pourquoi aménage-t-on, avec quels acteurs, et pourquoi c'est débattu ?","grille":["Pourquoi + acteurs.","Inégalités + acteurs multiples + débats.","Appuie sur l'étude de cas du cours et nuance (utile mais critiqué)."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/geographie"},"exos":[{"consigne":"Écris 8 lignes : pourquoi aménage-t-on, avec quels acteurs, et pourquoi c'est débattu ?","min":"Pourquoi + acteurs.","solide":"Inégalités + acteurs multiples + débats.","mention":"Introduction : aménager le territoire, c'est l'organiser pour le rendre plus équilibré et plus accessible. On peut se demander pourquoi on aménage, avec quels acteurs, et pourquoi cela fait débat.\n\nPourquoi aménager. L'objectif principal est de réduire les inégalités entre les territoires : entre les villes et les campagnes, entre les régions dynamiques et celles qui le sont moins. Il s'agit d'assurer à tous un accès aux services, aux emplois et aux transports.\n\nAvec quels acteurs. L'aménagement fait intervenir plusieurs acteurs : l'État, qui fixe les grandes orientations, les collectivités territoriales (régions, départements, communes), qui mènent des projets locaux, et l'Union européenne, qui apporte des financements. Cela se traduit par des réalisations concrètes : lignes de TGV, équipements, services.\n\nPourquoi c'est débattu. Ces aménagements sont parfois critiqués : leur coût est élevé, et certains projets sont contestés pour leur impact sur l'environnement ou parce qu'ils profiteraient surtout à certains territoires.\n\nConclusion : on aménage le territoire pour réduire les inégalités, grâce à l'action conjointe de l'État, des collectivités et de l'Union européenne. Ces choix, utiles, font cependant débat par leur coût et leurs effets."},{"consigne":"Développement construit (8 lignes). « Pourquoi et comment aménage-t-on le territoire français ? » Évoque les objectifs et les acteurs.","min":"On aménage pour réduire les inégalités entre territoires et rendre les espaces plus accessibles et attractifs. Acteurs : l'État, les collectivités (régions, communes), l'Union européenne. Exemples : transports, équipements, services.","solide":"Introduction : aménager le territoire, c'est l'organiser pour le rendre plus équilibré, plus accessible et plus attractif.\nIdée 1 : pourquoi aménager ? Pour réduire les inégalités entre les territoires (entre villes et campagnes, entre régions riches et plus pauvres) et améliorer la vie des habitants.\nIdée 2 : comment et avec qui ? Par des projets concrets : transports (lignes ferroviaires, routes), équipements, services. Les acteurs sont l'État, les collectivités territoriales (régions, départements, communes) et l'Union européenne, qui peut financer des projets.\nConclusion : l'aménagement vise un développement plus équilibré du territoire.","mention":"Introduction : aménager le territoire consiste à l'organiser et à l'équiper pour le rendre plus équilibré, plus accessible et plus attractif. On peut se demander pourquoi et comment la France procède à cet aménagement.\n\nPremière idée : les objectifs. On aménage d'abord pour réduire les inégalités entre les territoires : entre les villes et les campagnes, entre les régions dynamiques et celles qui le sont moins. Il s'agit d'assurer à tous un accès aux services, aux emplois et aux transports, et donc d'améliorer la vie des habitants.\n\nSeconde idée : les moyens et les acteurs. L'aménagement passe par des projets concrets : construction de lignes de transport (TGV, autoroutes), implantation d'équipements et de services, soutien à des zones en difficulté. Plusieurs acteurs interviennent : l'État, qui définit de grandes orientations, les collectivités territoriales (régions, départements, communes), qui mènent des projets locaux, et l'Union européenne, qui peut apporter des financements.\n\nConclusion : on aménage le territoire pour réduire les inégalités et favoriser un développement plus équilibré ; cet objectif est mis en œuvre par l'État, les collectivités et l'Union européenne, à travers des projets concrets."},{"consigne":"Vocabulaire et notions. 1) Qu'est-ce que l'aménagement du territoire ? 2) Cite deux acteurs de l'aménagement. 3) Donne un exemple concret d'aménagement.","min":"1) L'aménagement du territoire est l'action d'organiser l'espace pour le rendre plus équilibré et réduire les inégalités. 2) L'État et les collectivités territoriales (ou l'Union européenne). 3) Une ligne de TGV, une autoroute, un hôpital, une zone d'activité.","solide":"1) L'aménagement du territoire est l'ensemble des actions visant à organiser l'espace pour le rendre plus équilibré, plus accessible et plus attractif, et pour réduire les inégalités entre territoires.\n2) Deux acteurs : l'État et les collectivités territoriales (régions, départements, communes) ; on peut aussi citer l'Union européenne.\n3) Exemple concret : la construction d'une ligne de TGV, d'une autoroute, d'un hôpital ou d'une zone d'activité.","mention":"L'exercice porte sur le vocabulaire de l'aménagement du territoire.\n\n1) L'aménagement du territoire.\nC'est l'ensemble des actions menées pour organiser l'espace d'un pays ou d'une région afin de le rendre plus équilibré, plus accessible et plus attractif. Son but principal est de réduire les inégalités entre les territoires.\n\n2) Deux acteurs.\nL'aménagement fait intervenir plusieurs acteurs : l'État, qui fixe les grandes orientations et finance de grands projets ; les collectivités territoriales (régions, départements, communes), qui mènent des actions à leur échelle. On peut ajouter l'Union européenne, qui apporte des aides financières.\n\n3) Un exemple concret.\nLa construction d'une ligne de TGV, d'une autoroute, d'un hôpital ou d'une zone d'activité sont des exemples d'aménagement, car ils équipent un territoire et améliorent son accessibilité.\n\nConclusion : aménager le territoire, c'est l'organiser pour réduire les inégalités ; cela mobilise l'État, les collectivités et l'Union européenne, à travers des réalisations concrètes comme les infrastructures de transport."}],"parcours":{"mission":"À la fin, tu sais expliquer pourquoi et avec qui on aménage le territoire.","froid":[{"q":"À quoi sert l'aménagement du territoire ?","rep":"Organiser l'espace et réduire les inégalités."},{"q":"Cite deux acteurs de l'aménagement.","rep":"État, région, département, commune, UE… (2 au choix)."},{"q":"Cite deux inégalités entre territoires.","rep":"Transports, soins, emploi, numérique, école (2 au choix)."},{"q":"Que veut dire « décentralisation » ?","rep":"Le transfert de compétences de l'État vers les collectivités."},{"q":"Cite un exemple d'aménagement concret.","rep":"LGV, tramway, fibre, écoquartier… (au choix)."}],"coffre":[{"q":"L'aménagement sert à organiser l'espace et réduire les ____","rep":"inégalités."},{"q":"Les acteurs : ____, ____, ____, l'____","rep":"État, régions, communes, l'UE (au choix)."},{"q":"Un aménagement peut être débattu à cause de : ____, ____","rep":"coût, environnement, utilité contestée (2 au choix)."},{"q":"La décentralisation = transfert de compétences de l'____ vers les ____","rep":"État ; collectivités."},{"q":"Exemple d'aménagement : ____","rep":"LGV, tramway, fibre… (au choix)."}],"frise":[],"oral":"Explique en 90 secondes pourquoi un même aménagement peut être à la fois utile et critiqué.","ecrit":{"consigne":"Écris 8 lignes : pourquoi aménage-t-on, avec quels acteurs, et pourquoi c'est débattu ?","min":"Pourquoi + acteurs.","solide":"Inégalités + acteurs multiples + débats.","mention":"Appuie sur l'étude de cas du cours et nuance (utile mais critiqué)."},"oralRedige":"Aménager le territoire, c'est agir pour réduire les inégalités entre les espaces et permettre à tous d'accéder aux services. En effet, certains territoires sont riches et bien équipés, comme les grandes métropoles, tandis que d'autres sont plus fragiles, comme les espaces ruraux isolés ou certaines banlieues. Pour corriger cela, on construit des transports, on déploie le très haut débit, on installe des maisons de santé ou des services publics. Ces aménagements sont financés et décidés par plusieurs acteurs : l'État, les collectivités territoriales comme les régions, et l'Union européenne. La décentralisation a d'ailleurs donné plus de pouvoir aux régions dans ce domaine.","ecritRedige":{"min":"Aménager le territoire, c'est réduire les inégalités entre les espaces. On construit des transports, on installe le très haut débit et des services publics. C'est financé par l'État, les régions et l'Union européenne.","solide":"L'aménagement du territoire vise à réduire les inégalités entre les espaces et à améliorer l'accès de tous aux services. En effet, le territoire français est marqué par des contrastes : des métropoles riches et bien équipées d'un côté, des espaces ruraux isolés ou des banlieues en difficulté de l'autre. Pour réduire ces écarts, on réalise des aménagements : lignes à grande vitesse, déploiement du très haut débit, maisons de santé, services publics. Plusieurs acteurs financent et pilotent ces projets : l'État, les collectivités territoriales, en particulier les régions, et l'Union européenne grâce à sa politique de cohésion.","mention":"Aménager le territoire consiste à intervenir pour réduire les inégalités entre les différents espaces et garantir à chaque habitant un accès équitable aux services. Le territoire français présente en effet de forts contrastes : les grandes métropoles concentrent richesse, emplois et équipements, tandis que les espaces ruraux de faible densité et certains quartiers de banlieue souffrent d'un manque de services et d'enclavement. Pour corriger ces déséquilibres, les pouvoirs publics mènent des politiques d'aménagement variées : construction d'infrastructures de transport comme les lignes à grande vitesse, déploiement du très haut débit pour réduire la fracture numérique, implantation de maisons de santé pour lutter contre les déserts médicaux, et maintien des services publics. Ces actions sont financées et décidées par plusieurs acteurs aux compétences imbriquées : l'État, l'Union européenne à travers sa politique de cohésion, et surtout les collectivités territoriales, dont le rôle s'est renforcé avec la décentralisation, en particulier celui des régions."},"carte":"Carte mémoire : « AMÉNAGER », branches : pourquoi / qui / outils / débats.","motscles":"aménagement, inégalités territoriales, collectivité, décentralisation, infrastructure.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aménager le territoire)"}},{"id":"G5","matiere":"geo","titre":"Les territoires ultramarins français","objectif":"À la fin, tu sais montrer leurs contraintes ET leurs atouts pour la France.","qcm":[{"q":"Que sont les territoires ultramarins français ?","good":"Des territoires français situés hors d'Europe (Guadeloupe, Martinique, Réunion, Guyane, Mayotte...)","choices":["Les régions de l'est de la France métropolitaine","Des territoires français situés hors d'Europe (Guadeloupe, Martinique, Réunion, Guyane, Mayotte...)","Des pays étrangers alliés de la France","Les anciennes colonies devenues indépendantes"],"explain":"L'outre-mer (DROM-COM) fait partie intégrante de la France et de l'UE, bien que parfois à des milliers de kilomètres de la métropole.","verif":"Dans ton cours, situe sur le planisphère les principaux territoires ultramarins.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre territoires ultramarins)"},{"q":"Quel atout majeur les territoires ultramarins apportent-ils à la France ?","good":"Le 2e domaine maritime du monde et une biodiversité exceptionnelle","choices":["Une population nulle","Le 2e domaine maritime du monde et une biodiversité exceptionnelle","Une frontière terrestre avec l'Allemagne","Un climat polaire propice au ski"],"explain":"Grâce à l'outre-mer, la France possède une présence sur tous les océans et le 2e espace maritime mondial (ZEE), avec une biodiversité remarquable.","verif":"Vérifie dans ton cours ce qu'est la ZEE et pourquoi l'outre-mer la rend immense.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre territoires ultramarins)"},{"q":"Quelle difficulté est commune à de nombreux territoires ultramarins ?","good":"Des inégalités fortes : chômage élevé, vie chère, éloignement de la métropole","choices":["Un excès de gratte-ciels","Un climat trop froid pour vivre","Une absence totale de tourisme","Des inégalités fortes : chômage élevé, vie chère, éloignement de la métropole"],"explain":"L'outre-mer cumule des atouts (mer, biodiversité, tourisme) et des fragilités (chômage, dépendance, vie chère, risques naturels).","verif":"Dans ton cours, retrouve atouts et contraintes d'un territoire ultramarin précis.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre territoires ultramarins)"}],"court":[{"q":"Cite un territoire ultramarin qui n'est PAS une île.","sol":"La Guyane.","kw":["guyane"],"explain":"Contexte : outre-mer, insularité, discontinuité, ZEE, risque naturel. · À éviter : Croire que tous les outre-mer sont des îles (la Guyane est continentale).","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre territoires ultramarins)"},{"q":"Que veut dire « insularité » ?","sol":"Le fait d'être une île.","kw":["dêtre"],"explain":"Contexte : outre-mer, insularité, discontinuité, ZEE, risque naturel. · À éviter : Croire que tous les outre-mer sont des îles (la Guyane est continentale).","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre territoires ultramarins)"},{"q":"Cite deux contraintes des outre-mer.","sol":"Éloignement, risques naturels, chômage, coût de la vie (2 au choix).","kw":["éloignement","risques","naturels","chômage"],"explain":"Contexte : outre-mer, insularité, discontinuité, ZEE, risque naturel. · À éviter : Croire que tous les outre-mer sont des îles (la Guyane est continentale).","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre territoires ultramarins)"},{"q":"Cite deux atouts des outre-mer.","sol":"Tourisme, biodiversité, espace maritime, position stratégique (2 au choix).","kw":["tourisme","biodiversité","espace","maritime"],"explain":"Contexte : outre-mer, insularité, discontinuité, ZEE, risque naturel. · À éviter : Croire que tous les outre-mer sont des îles (la Guyane est continentale).","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre territoires ultramarins)"},{"q":"Cite un risque naturel ultramarin.","sol":"Cyclone, volcan, séisme (au choix).","kw":["cyclone","volcan","séisme"],"explain":"Contexte : outre-mer, insularité, discontinuité, ZEE, risque naturel. · À éviter : Croire que tous les outre-mer sont des îles (la Guyane est continentale).","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre territoires ultramarins)"}],"paper":{"consigne":"Écris 8 lignes : les outre-mer ont de fortes contraintes mais de vrais atouts pour la France.","grille":["Contraintes + atouts.","Contraintes (éloignement, risques) + atouts (ZEE, tourisme).","Cite la ZEE et un aménagement adapté ; rappelle que la Guyane est continentale."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/geographie"},"exos":[{"consigne":"Écris 8 lignes : les outre-mer ont de fortes contraintes mais de vrais atouts pour la France.","min":"Contraintes + atouts.","solide":"Contraintes (éloignement, risques) + atouts (ZEE, tourisme).","mention":"Introduction : les territoires ultramarins sont les territoires français situés loin de la métropole, dans plusieurs océans (Guadeloupe, Martinique, Guyane, La Réunion, Mayotte). Ils cumulent de fortes contraintes mais offrent de vrais atouts pour la France.\n\nDe fortes contraintes. Ces territoires sont très éloignés de la métropole, ce qui renchérit les échanges. Beaucoup sont insulaires, donc dépendants de l'extérieur. Ils sont exposés à des risques naturels (cyclones, séismes, éruptions) et connaissent souvent un chômage élevé et un coût de la vie important.\n\nDe vrais atouts. Les outre-mer possèdent une biodiversité exceptionnelle et de forts atouts touristiques. Surtout, ils donnent à la France l'une des plus vastes zones économiques exclusives (ZEE) du monde, c'est-à-dire un immense espace maritime où elle détient des droits d'exploitation, ainsi qu'une présence stratégique sur tous les océans. Des aménagements adaptés (ports, aéroports, protection contre les risques) accompagnent leur développement. On notera que la Guyane n'est pas une île mais un territoire continental, en Amérique du Sud.\n\nConclusion : malgré l'éloignement, l'insularité et les risques, les territoires ultramarins constituent une richesse pour la France, par leur biodiversité, leur tourisme et surtout leur dimension maritime mondiale."},{"consigne":"Développement construit (8 lignes). « Quelles sont les contraintes et les atouts des territoires ultramarins français ? »","min":"Outre-mer = territoires français loin de la métropole (Guadeloupe, Martinique, Guyane, Réunion, Mayotte...). Contraintes : éloignement, insularité, risques naturels, chômage. Atouts : biodiversité, tourisme, ressources, position stratégique, vaste espace maritime.","solide":"Introduction : les territoires ultramarins sont les territoires français situés loin de la métropole (Antilles, Guyane, Réunion, Mayotte, etc.). Ils présentent à la fois des contraintes et des atouts.\nIdée 1 : des contraintes. Ils sont éloignés de la métropole, souvent insulaires, exposés à des risques naturels (cyclones, volcans) et connaissent un fort chômage.\nIdée 2 : des atouts. Ils possèdent une grande biodiversité, un fort potentiel touristique, des ressources, et donnent à la France un vaste espace maritime et une présence sur plusieurs océans.\nConclusion : malgré leurs difficultés, les outre-mer sont une richesse pour la France.","mention":"Introduction : les territoires ultramarins français sont les territoires situés en dehors de la métropole, comme la Guadeloupe, la Martinique, la Guyane, La Réunion ou Mayotte. Répartis dans plusieurs océans, ils cumulent des contraintes mais offrent aussi de véritables atouts.\n\nPremière idée : des contraintes importantes. Ces territoires sont très éloignés de la métropole, ce qui complique les échanges et augmente les coûts. Beaucoup sont insulaires, donc dépendants de l'extérieur. Ils sont exposés à des risques naturels (cyclones, séismes, éruptions volcaniques) et connaissent souvent un chômage élevé et un coût de la vie important.\n\nSeconde idée : de réels atouts. Les outre-mer possèdent une biodiversité exceptionnelle et des paysages qui favorisent le tourisme. Ils disposent de ressources et, surtout, ils confèrent à la France un immense espace maritime (zone économique exclusive) et une présence stratégique sur plusieurs océans du globe.\n\nConclusion : malgré l'éloignement, l'insularité et les risques, les territoires ultramarins constituent une richesse pour la France, par leur biodiversité, leur potentiel touristique et leur dimension maritime et stratégique."},{"consigne":"Vocabulaire et notions. 1) Que désigne l'expression « territoires ultramarins » (ou outre-mer) ? 2) Cite deux territoires ultramarins français. 3) Cite une contrainte et un atout de ces territoires.","min":"1) Les territoires français situés loin de la métropole, dans d'autres régions du monde. 2) Guadeloupe, Martinique, Guyane, La Réunion, Mayotte (deux suffisent). 3) Contrainte : éloignement (ou risques naturels). Atout : biodiversité (ou tourisme, espace maritime).","solide":"1) Les territoires ultramarins (outre-mer) sont les territoires français situés en dehors de la métropole, dans d'autres parties du monde (océans Atlantique, Indien, Pacifique).\n2) Exemples : la Guadeloupe, la Martinique, la Guyane, La Réunion, Mayotte (deux suffisent).\n3) Une contrainte : l'éloignement de la métropole (ou les risques naturels). Un atout : la biodiversité (ou le tourisme, le vaste espace maritime).","mention":"L'exercice porte sur le vocabulaire des territoires ultramarins.\n\n1) La définition.\nLes territoires ultramarins, ou outre-mer, sont les territoires français situés en dehors de la métropole, dispersés dans plusieurs océans du monde. Ils font partie intégrante de la France.\n\n2) Deux exemples.\nOn peut citer la Guadeloupe et la Martinique (Antilles), la Guyane (Amérique du Sud), La Réunion et Mayotte (océan Indien).\n\n3) Une contrainte et un atout.\nUne contrainte majeure est l'éloignement de la métropole, auquel s'ajoutent l'insularité et les risques naturels. Un atout important est la biodiversité exceptionnelle de ces territoires, ainsi que leur potentiel touristique et le vaste espace maritime qu'ils procurent à la France.\n\nConclusion : les territoires ultramarins sont les territoires français lointains ; malgré l'éloignement et les risques, ils offrent une grande biodiversité et une dimension maritime précieuse."}],"parcours":{"mission":"À la fin, tu sais montrer leurs contraintes ET leurs atouts pour la France.","froid":[{"q":"Cite un territoire ultramarin qui n'est PAS une île.","rep":"La Guyane."},{"q":"Que veut dire « insularité » ?","rep":"Le fait d'être une île."},{"q":"Cite deux contraintes des outre-mer.","rep":"Éloignement, risques naturels, chômage, coût de la vie (2 au choix)."},{"q":"Cite deux atouts des outre-mer.","rep":"Tourisme, biodiversité, espace maritime, position stratégique (2 au choix)."},{"q":"Cite un risque naturel ultramarin.","rep":"Cyclone, volcan, séisme (au choix)."}],"coffre":[{"q":"Les outre-mer sont situés ____ de la métropole","rep":"loin."},{"q":"Contraintes : ____, ____, ____","rep":"éloignement, risques naturels, chômage (au choix)."},{"q":"Atouts : ____, ____, ____","rep":"tourisme, biodiversité, espace maritime (au choix)."},{"q":"Grâce aux outre-mer, la France a un vaste espace ____","rep":"maritime (ZEE)."},{"q":"Attention : la ____ n'est pas une île (elle est continentale)","rep":"Guyane."}],"frise":[],"oral":"Explique en 90 secondes pourquoi les outre-mer renforcent la puissance de la France.","ecrit":{"consigne":"Écris 8 lignes : les outre-mer ont de fortes contraintes mais de vrais atouts pour la France.","min":"Contraintes + atouts.","solide":"Contraintes (éloignement, risques) + atouts (ZEE, tourisme).","mention":"Cite la ZEE et un aménagement adapté ; rappelle que la Guyane est continentale."},"oralRedige":"Les territoires ultramarins sont les territoires français situés en dehors de l'Europe, comme la Guadeloupe, la Martinique, la Réunion, la Guyane ou Mayotte. Ils font pleinement partie de la France et de l'Union européenne, même s'ils sont parfois à des milliers de kilomètres de la métropole. Ils représentent un atout considérable : grâce à eux, la France possède une présence sur tous les océans et le deuxième domaine maritime du monde, avec une biodiversité exceptionnelle. Mais ces territoires connaissent aussi des difficultés : un chômage élevé, une vie chère et un éloignement qui les rend dépendants de la métropole.","ecritRedige":{"min":"Les territoires ultramarins sont les territoires français hors d'Europe, comme la Guadeloupe ou la Réunion. Ils donnent à la France une grande zone maritime et une riche biodiversité. Mais ils ont des problèmes : chômage, vie chère, éloignement.","solide":"Les territoires ultramarins sont les territoires français situés hors d'Europe, comme la Guadeloupe, la Martinique, la Réunion, la Guyane ou Mayotte. Ils font partie intégrante de la France et de l'Union européenne. Ils constituent un atout majeur : grâce à eux, la France dispose d'une présence sur tous les océans et du deuxième domaine maritime mondial, ainsi que d'une biodiversité exceptionnelle. Mais ces territoires cumulent aussi des fragilités : un chômage souvent élevé, une vie chère, un fort éloignement de la métropole et une exposition aux risques naturels.","mention":"Les territoires ultramarins français sont les territoires situés en dehors du continent européen, comme la Guadeloupe, la Martinique, la Réunion, la Guyane ou Mayotte. Bien que parfois éloignés de plusieurs milliers de kilomètres, ils font partie intégrante de la République et, pour la plupart, de l'Union européenne. Ils représentent un atout géostratégique considérable : grâce à eux, la France est présente sur tous les océans du globe et possède le deuxième domaine maritime mondial, sa zone économique exclusive, riche en ressources. Ils abritent par ailleurs une biodiversité exceptionnelle, comme la forêt amazonienne en Guyane. Cependant, ces territoires connaissent aussi de réelles difficultés et de fortes inégalités par rapport à la métropole : un chômage élevé, en particulier chez les jeunes, un coût de la vie important du fait de l'éloignement et des importations, une dépendance économique, et une exposition accrue aux risques naturels comme les cyclones ou les séismes. L'enjeu, pour l'aménagement, est de valoriser leurs atouts tout en réduisant ces inégalités."},"carte":"Carte mémoire : un planisphère simple + les territoires + une balance contraintes/atouts.","motscles":"outre-mer, insularité, discontinuité, ZEE, risque naturel.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre territoires ultramarins)"}},{"id":"G6","matiere":"geo","titre":"L'Union européenne, territoire d'appartenance","objectif":"À la fin, tu sais montrer que l'UE est un territoire commun MAIS contrasté.","qcm":[{"q":"Que permet l'espace Schengen ?","good":"La libre circulation des personnes sans contrôle aux frontières intérieures","choices":["L'élection du président de l'UE","L'usage de l'euro comme monnaie","La défense militaire commune","La libre circulation des personnes sans contrôle aux frontières intérieures"],"explain":"Schengen supprime les contrôles aux frontières intérieures. À ne pas confondre avec la zone euro (monnaie), qui regroupe d'autres pays.","verif":"Vérifie dans ton cours la différence entre espace Schengen et zone euro.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France et Union européenne)"},{"q":"Qu'est-ce que la zone euro ?","good":"L'ensemble des pays de l'UE ayant adopté l'euro comme monnaie unique","choices":["Les pays membres de l'OTAN","Tous les pays utilisant le dollar","L'ensemble des pays de l'UE ayant adopté l'euro comme monnaie unique","Les pays voisins de la France"],"explain":"La zone euro regroupe les États de l'UE qui utilisent l'euro. Tous les pays de l'UE n'en font pas partie.","verif":"Dans ton cours, retrouve quels grands pays de l'UE n'utilisent pas l'euro.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France et Union européenne)"},{"q":"Comment l'Union européenne tente-t-elle de réduire les inégalités entre ses régions ?","good":"Par la politique de cohésion, qui aide financièrement les régions les plus pauvres","choices":["En supprimant les régions pauvres","En imposant une langue unique","Par la politique de cohésion, qui aide financièrement les régions les plus pauvres","En interdisant le commerce entre pays"],"explain":"L'UE présente de forts contrastes (dorsale riche vs périphéries). Les fonds européens (politique de cohésion) soutiennent les régions en retard de développement.","verif":"Vérifie dans ton cours ce qu'est la politique de cohésion de l'UE.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France et Union européenne)"}],"court":[{"q":"Combien d'États dans l'UE en 2026 ?","sol":"27 États.","kw":["états"],"explain":"Contexte : Union européenne, marché unique, Schengen, région transfrontalière, FEDER. · À éviter : Confondre UE, zone euro et Schengen ; croire que tous ont l'euro.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France et Union européenne)"},{"q":"Qu'est-ce que le marché unique ?","sol":"La libre circulation des biens, services, capitaux et personnes.","kw":["circulation","services","capitaux","personnes"],"explain":"Contexte : Union européenne, marché unique, Schengen, région transfrontalière, FEDER. · À éviter : Confondre UE, zone euro et Schengen ; croire que tous ont l'euro.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France et Union européenne)"},{"q":"Tous les pays de l'UE utilisent-ils l'euro ?","sol":"Non.","kw":["non"],"explain":"Contexte : Union européenne, marché unique, Schengen, région transfrontalière, FEDER. · À éviter : Confondre UE, zone euro et Schengen ; croire que tous ont l'euro.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France et Union européenne)"},{"q":"Qu'est-ce qu'une région transfrontalière ?","sol":"Un espace à cheval sur une frontière, avec coopération.","kw":["espace","cheval","frontière","coopération"],"explain":"Contexte : Union européenne, marché unique, Schengen, région transfrontalière, FEDER. · À éviter : Confondre UE, zone euro et Schengen ; croire que tous ont l'euro.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France et Union européenne)"},{"q":"Cite un exemple de mobilité européenne (ex. étudiants).","sol":"Erasmus, travail frontalier (au choix).","kw":["erasmus","travail","frontalier"],"explain":"Contexte : Union européenne, marché unique, Schengen, région transfrontalière, FEDER. · À éviter : Confondre UE, zone euro et Schengen ; croire que tous ont l'euro.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France et Union européenne)"}],"paper":{"consigne":"Écris 8 lignes : l'UE est un territoire commun mais contrasté.","grille":["Commun mais contrasté.","Ce qui unit (marché, Schengen, euro) + contrastes.","Cite les régions transfrontalières et les inégalités Ouest/Sud/Est."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/geographie"},"exos":[{"consigne":"Écris 8 lignes : l'UE est un territoire commun mais contrasté.","min":"Commun mais contrasté.","solide":"Ce qui unit (marché, Schengen, euro) + contrastes.","mention":"Introduction : l'Union européenne regroupe de nombreux États qui forment un territoire commun. Mais ce territoire reste marqué par des contrastes : il est donc à la fois uni et inégal.\n\nUn territoire qui unit. Les pays membres partagent des règles et des politiques communes. La libre circulation, renforcée par les accords de Schengen, permet aux personnes et aux marchandises de se déplacer sans frontières internes. Un marché unique facilite les échanges, et de nombreux pays utilisent une monnaie commune, l'euro. Des régions transfrontalières, où l'on vit dans un pays et travaille dans un autre, illustrent cette intégration.\n\nUn territoire contrasté. De fortes inégalités subsistent toutefois entre les pays et les régions. Un cœur économique très dynamique, à l'ouest, s'oppose à des périphéries plus pauvres, notamment au sud et à l'est. Pour réduire ces écarts, l'Union verse des aides aux régions les moins favorisées.\n\nConclusion : l'Union européenne est donc un territoire commun, par ses règles, sa libre circulation et sa monnaie, mais aussi un territoire contrasté, marqué par des inégalités que les aides européennes cherchent à atténuer."},{"consigne":"Développement construit (8 lignes). « L'Union européenne est-elle un territoire uni ou contrasté ? » Montre ce qui rapproche les pays et ce qui les sépare.","min":"UE = territoire commun (libre circulation, monnaie unique pour certains, politiques communes) mais contrasté (différences de richesse entre pays et régions, niveaux de vie inégaux). Des aides cherchent à réduire ces écarts.","solide":"Introduction : l'Union européenne réunit de nombreux pays dans un territoire commun, mais celui-ci reste marqué par des contrastes.\nIdée 1 : un territoire qui unit. Les pays partagent des règles communes, la libre circulation des personnes et des marchandises, et pour beaucoup une monnaie unique, l'euro. Des politiques communes les rapprochent.\nIdée 2 : un territoire contrasté. Il existe des différences de richesse importantes entre les pays et entre les régions (un cœur économique dynamique, des périphéries moins riches). L'UE verse des aides pour réduire ces inégalités.\nConclusion : l'UE est donc un territoire à la fois uni et inégal.","mention":"Introduction : l'Union européenne regroupe de nombreux États qui forment un territoire commun. Mais derrière cette unité, le territoire européen demeure marqué par de fortes différences. On peut donc se demander s'il est uni ou contrasté.\n\nPremière idée : un territoire qui unit. Les pays membres partagent des règles et des politiques communes. La libre circulation permet aux personnes et aux marchandises de se déplacer sans frontières internes, et de nombreux pays utilisent une monnaie unique, l'euro. Une citoyenneté européenne et des institutions communes renforcent ce sentiment d'appartenance.\n\nSeconde idée : un territoire contrasté. Pourtant, de fortes inégalités subsistent. Les niveaux de richesse et de développement varient beaucoup d'un pays à l'autre et d'une région à l'autre : un cœur économique très dynamique s'oppose à des périphéries plus pauvres. Pour réduire ces écarts, l'Union verse des aides aux régions les moins favorisées.\n\nConclusion : l'Union européenne est donc à la fois un territoire uni, par ses règles et sa monnaie communes, et un territoire contrasté, marqué par des inégalités que les aides européennes cherchent à atténuer."},{"consigne":"Vocabulaire et notions. 1) Qu'est-ce que la libre circulation dans l'Union européenne ? 2) Comment s'appelle la monnaie unique de plusieurs pays de l'UE ? 3) Que cherchent à réduire les aides européennes ?","min":"1) Le droit de circuler librement (personnes, marchandises) entre les pays de l'UE, sans frontières internes. 2) L'euro. 3) Les inégalités entre les régions et les pays de l'Union.","solide":"1) La libre circulation est le droit, dans l'Union européenne, de se déplacer et d'échanger librement (personnes, marchandises, capitaux) entre les pays membres, sans frontières internes.\n2) La monnaie unique de plusieurs pays de l'UE est l'euro.\n3) Les aides européennes cherchent à réduire les inégalités de richesse et de développement entre les régions et les pays de l'Union.","mention":"L'exercice porte sur le vocabulaire de l'Union européenne comme territoire.\n\n1) La libre circulation.\nC'est l'un des principes fondamentaux de l'Union européenne : le droit, pour les personnes, les marchandises et les capitaux, de se déplacer librement d'un pays membre à l'autre, sans contrôle aux frontières internes. Elle facilite les échanges et les déplacements.\n\n2) La monnaie unique.\nPlusieurs pays de l'Union européenne partagent une monnaie commune, l'euro, mis en circulation en 2002. Cette monnaie unique facilite le commerce et les voyages entre ces pays.\n\n3) Le rôle des aides européennes.\nL'Union européenne verse des aides aux régions et aux pays les moins développés. Ces aides cherchent à réduire les inégalités de richesse et de développement à l'intérieur de l'Union, afin de rendre le territoire plus équilibré.\n\nConclusion : la libre circulation et l'euro unissent les pays de l'UE, tandis que les aides européennes visent à réduire les inégalités entre des territoires encore très contrastés."}],"parcours":{"mission":"À la fin, tu sais montrer que l'UE est un territoire commun MAIS contrasté.","froid":[{"q":"Combien d'États dans l'UE en 2026 ?","rep":"27 États."},{"q":"Qu'est-ce que le marché unique ?","rep":"La libre circulation des biens, services, capitaux et personnes."},{"q":"Tous les pays de l'UE utilisent-ils l'euro ?","rep":"Non."},{"q":"Qu'est-ce qu'une région transfrontalière ?","rep":"Un espace à cheval sur une frontière, avec coopération."},{"q":"Cite un exemple de mobilité européenne (ex. étudiants).","rep":"Erasmus, travail frontalier (au choix)."}],"coffre":[{"q":"L'UE compte ____ États en 2026","rep":"27."},{"q":"Le marché unique = libre circulation des ____, ____, ____, ____","rep":"biens, services, capitaux, personnes."},{"q":"Programme d'échange étudiant européen : ____","rep":"Erasmus."},{"q":"L'UE est un territoire ____ (uniforme / contrasté)","rep":"contrasté."},{"q":"Ne pas confondre UE, zone ____ et espace ____","rep":"euro ; Schengen."}],"frise":[],"oral":"Explique en 90 secondes ce qui unit les pays de l'UE et ce qui les rend différents.","ecrit":{"consigne":"Écris 8 lignes : l'UE est un territoire commun mais contrasté.","min":"Commun mais contrasté.","solide":"Ce qui unit (marché, Schengen, euro) + contrastes.","mention":"Cite les régions transfrontalières et les inégalités Ouest/Sud/Est."},"oralRedige":"L'Union européenne est un territoire auquel on appartient, avec des règles communes. Deux éléments rapprochent les Européens. D'abord l'espace Schengen, qui permet de circuler librement d'un pays à l'autre sans contrôle aux frontières. Ensuite la zone euro, qui regroupe les pays ayant adopté l'euro comme monnaie commune. Attention, ce ne sont pas exactement les mêmes pays. Mais l'Union reste marquée par de fortes inégalités : certaines régions sont très riches, d'autres beaucoup plus pauvres. Pour réduire ces écarts, l'UE mène une politique de cohésion qui aide financièrement les régions les moins développées.","ecritRedige":{"min":"L'Union européenne permet de circuler librement grâce à l'espace Schengen et d'utiliser la même monnaie, l'euro, dans la zone euro. Mais il y a des inégalités entre les régions riches et pauvres. L'UE aide les régions pauvres.","solide":"L'Union européenne est un territoire d'appartenance organisé par des règles communes. L'espace Schengen permet aux habitants de circuler librement d'un pays à l'autre, sans contrôle aux frontières intérieures. La zone euro regroupe les pays qui utilisent l'euro comme monnaie unique, même si tous les pays de l'UE n'en font pas partie. Cependant, l'Union reste marquée par de fortes inégalités de richesse entre ses régions et ses pays. Pour les réduire, elle met en place une politique de cohésion qui aide financièrement les régions les moins développées.","mention":"L'Union européenne constitue pour ses habitants un véritable territoire d'appartenance, structuré par des espaces et des règles communs. Deux dispositifs renforcent ce sentiment d'unité. L'espace Schengen, d'abord, supprime les contrôles aux frontières intérieures et permet une libre circulation des personnes. La zone euro, ensuite, regroupe les États membres ayant adopté l'euro comme monnaie unique, ce qui facilite les échanges, étant entendu que Schengen et la zone euro ne recouvrent pas exactement les mêmes pays. Toutefois, le territoire de l'UE demeure profondément inégalitaire : il existe un contraste marqué entre une dorsale européenne, riche et dynamique, et des périphéries au développement plus faible, qu'il s'agisse de pays ou de régions. Pour réduire ces écarts et renforcer la solidarité entre territoires, l'Union européenne mène une politique de cohésion, financée par des fonds européens destinés en priorité aux régions les moins avancées."},"carte":"Carte mémoire : « UE », branches : ce qui unit / ce qui divise / les mobilités.","motscles":"Union européenne, marché unique, Schengen, région transfrontalière, FEDER.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France et Union européenne)"}},{"id":"G7","matiere":"geo","titre":"La Fr

lace. Viens.","mention":"La scène se passe la nuit, dans une cave éclairée par une bougie.\n\nLÉA, à voix basse, jetant un regard vers la porte. Il faut partir maintenant, Tom, pendant qu'ils dorment. C'est notre seule chance.\nTOM, reculant, la voix tremblante. Non. C'est de la folie. S'ils nous entendent dans l'escalier, c'est fini pour nous deux.\nLÉA. Et si on reste là, recroquevillés dans cette cave ? Tu crois vraiment qu'on a une chance ? Demain matin, ils fouilleront la maison et ils nous trouveront.\nTOM, se passant la main sur le visage. Tu as peut-être raison... Mais j'ai peur, Léa. Je n'ai jamais eu aussi peur.\nLÉA, s'approchant et lui prenant la main avec douceur. Moi aussi, j'ai peur. Mais la peur ne doit pas décider à notre place, sinon nous ne ferons jamais rien. Lève-toi. On part ensemble.\nTOM, après un long silence, se redressant. Ensemble, alors."},"ecritRedige":{"min":"LÉA. Il faut partir maintenant.\nTOM, inquiet. Non, c'est trop dangereux.\nLÉA. Si on reste, on sera pris.\nTOM. Alors d'accord, on y va.","solide":"LÉA, à voix basse. Il faut partir maintenant, pendant qu'ils dorment.\nTOM, inquiet. Non, c'est trop risqué. S'ils nous entendent, c'est fini.\nLÉA. Et si on reste, tu crois qu'on a une chance ? Demain, ils nous trouveront.\nTOM, hésitant. Tu as peut-être raison... Mais j'ai peur, Léa.\nLÉA, lui prenant la main. Moi aussi. Mais la peur ne doit pas décider à notre place. Viens.","mention":"La scène se passe la nuit, dans une cave éclairée par une bougie.\n\nLÉA, à voix basse, jetant un regard vers la porte. Il faut partir maintenant, Tom, pendant qu'ils dorment. C'est notre seule chance.\nTOM, reculant, la voix tremblante. Non. C'est de la folie. S'ils nous entendent dans l'escalier, c'est fini pour nous deux.\nLÉA. Et si on reste là, recroquevillés dans cette cave ? Tu crois vraiment qu'on a une chance ? Demain matin, ils fouilleront la maison et ils nous trouveront.\nTOM, se passant la main sur le visage. Tu as peut-être raison... Mais j'ai peur, Léa. Je n'ai jamais eu aussi peur.\nLÉA, s'approchant et lui prenant la main avec douceur. Moi aussi, j'ai peur. Mais la peur ne doit pas décider à notre place, sinon nous ne ferons jamais rien. Lève-toi. On part ensemble.\nTOM, après un long silence, se redressant. Ensemble, alors."},"carte":"Carte mémoire : au centre « THÉÂTRE & ENGAGEMENT », branches : réplique, dialogue, monologue, didascalies (italique), et littérature engagée (guerre, Résistance, liberté).","motscles":"théâtre, réplique, dialogue, monologue, didascalies, scène, texte engagé, guerre, Résistance, liberté","vid":"","vidlab":""}},{"id":"F5","matiere":"fr","titre":"Grammaire et compétences linguistiques","objectif":"À la fin, tu sais identifier la classe grammaticale (nature) et la fonction des mots, et distinguer phrase simple et phrase complexe.","qcm":[{"q":"Dans « Demain, les élèves rendront leur devoir au professeur », quelle est la fonction de « leur devoir » ?","good":"Complément d'objet direct (COD)","choices":["Sujet","Complément d'objet direct (COD)","Complément circonstanciel de temps","Complément d'objet indirect (COI)"],"explain":"On rend QUOI ? leur devoir : c'est le COD (relié au verbe sans préposition). « au professeur » serait le COI, « demain » le complément circonstanciel de temps.","verif":"COD = répond à « qui ? / quoi ? » après le verbe, sans préposition."},{"q":"Dans « Quand la cloche sonna, les élèves sortirent », combien y a-t-il de propositions et quelle est leur nature ?","good":"Deux propositions : une subordonnée et une principale","choices":["Trois propositions","Deux propositions indépendantes coordonnées","Une seule proposition","Deux propositions : une subordonnée et une principale"],"explain":"Deux verbes conjugués (« sonna », « sortirent ») = deux propositions. « Quand la cloche sonna » est subordonnée (introduite par « quand »), « les élèves sortirent » est la principale.","verif":"Autant de propositions que de verbes conjugués ; « quand » introduit une subordonnée."},{"q":"Dans « Cette nouvelle est surprenante », quelle est la fonction de « surprenante » ?","good":"Attribut du sujet","choices":["Attribut du sujet","Complément d'objet direct","Complément circonstanciel","Épithète"],"explain":"« surprenante » est relié au sujet « nouvelle » par le verbe d'état « est » : c'est un attribut du sujet. S'il était collé au nom sans verbe (« une nouvelle surprenante »), ce serait une épithète.","verif":"Après un verbe d'état (être, paraître, sembler...), l'adjectif est attribut du sujet."},{"q":"Quel mot commande l'accord du verbe « (chanter) » dans « Les oiseaux du jardin ... » ?","good":"« oiseaux » (le sujet, donc « chantent »)","choices":["Aucun, le verbe reste à l'infinitif","« jardin » (donc « chante »)","« du » (donc « chante »)","« oiseaux » (le sujet, donc « chantent »)"],"explain":"Le verbe s'accorde avec son sujet « les oiseaux » (pluriel) : « chantent ». Attention au piège du nom le plus proche (« jardin »), qui n'est pas le sujet.","verif":"Le verbe s'accorde avec le SUJET, même si un autre nom est plus proche."}],"court":[],"paper":{"consigne":"Analyse la phrase suivante : « Le vieux marin raconte ses aventures aux enfants. » Donne la nature et la fonction des mots soulignés mentalement : « marin », « raconte », « aventures ».","grille":["« marin » : nom, sujet. « raconte » : verbe. « aventures » : nom, COD.","Dans la phrase « Le vieux marin raconte ses aventures aux enfants » : « marin » est un nom commun, sa fonction est sujet du verbe (c'est lui qui raconte). « raconte » est un verbe, conjugué au présent de l'indicatif, c'est le noyau de la phrase. « aventures » est un nom commun, sa fonction est complément d'objet direct (il répond à « raconte quoi ? »).","Analysons la phrase « Le vieux marin raconte ses aventures aux enfants ». Le mot « marin » est, par nature, un nom commun, accompagné du déterminant « le » et de l'adjectif « vieux » ; sa fonction dans la phrase est sujet, car c'est lui qui accomplit l'action et qui commande l'accord du verbe. Le mot « raconte » est un verbe, ici conjugué à la troisième personne du singulier du présent de l'indicatif : il constitue le noyau de la phrase. Enfin, « aventures » est un nom commun ; sa fonction est complément d'objet direct, car il complète le verbe sans préposition et répond à la question « raconte quoi ? ». On remarque que « aux enfants », introduit par une préposition, serait quant à lui complément d'objet indirect. Cette phrase, qui ne comporte qu'un seul verbe conjugué, est une phrase simple."],"type":"devcons","minutes":15,"vid":""},"exos":[{"consigne":"Analyse la phrase suivante : « Le vieux marin raconte ses aventures aux enfants. » Donne la nature et la fonction des mots soulignés mentalement : « marin », « raconte », « aventures ».","min":"« marin » : nom, sujet. « raconte » : verbe. « aventures » : nom, COD.","solide":"Dans la phrase « Le vieux marin raconte ses aventures aux enfants » : « marin » est un nom commun, sa fonction est sujet du verbe (c'est lui qui raconte). « raconte » est un verbe, conjugué au présent de l'indicatif, c'est le noyau de la phrase. « aventures » est un nom commun, sa fonction est complément d'objet direct (il répond à « raconte quoi ? »).","mention":"Analysons la phrase « Le vieux marin raconte ses aventures aux enfants ». Le mot « marin » est, par nature, un nom commun, accompagné du déterminant « le » et de l'adjectif « vieux » ; sa fonction dans la phrase est sujet, car c'est lui qui accomplit l'action et qui commande l'accord du verbe. Le mot « raconte » est un verbe, ici conjugué à la troisième personne du singulier du présent de l'indicatif : il constitue le noyau de la phrase. Enfin, « aventures » est un nom commun ; sa fonction est complément d'objet direct, car il complète le verbe sans préposition et répond à la question « raconte quoi ? ». On remarque que « aux enfants », introduit par une préposition, serait quant à lui complément d'objet indirect. Cette phrase, qui ne comporte qu'un seul verbe conjugué, est une phrase simple."},{"consigne":"Analyse la phrase suivante : « Demain, les élèves présenteront leur exposé à la classe. » 1) Donne la nature et la fonction de « les élèves ». 2) Donne la fonction de « leur exposé ». 3) À quel temps est le verbe ?","min":"1) « les élèves » : groupe nominal, sujet du verbe. 2) « leur exposé » : COD. 3) Le verbe est au futur simple.","solide":"1) « les élèves » est un groupe nominal ; sa fonction est sujet du verbe « présenteront » (ce sont eux qui présentent).\n2) « leur exposé » est complément d'objet direct (COD) : on présente quoi ? leur exposé.\n3) « présenteront » est au futur simple de l'indicatif.","mention":"L'exercice évalue l'analyse grammaticale d'une phrase.\n\n1) « les élèves ».\nNature (classe grammaticale) : c'est un groupe nominal, construit autour du nom « élèves ».\nFonction : c'est le sujet du verbe « présenteront ». On le vérifie en posant la question « qui est-ce qui présentera ? » : les élèves.\n\n2) « leur exposé ».\nFonction : c'est le complément d'objet direct (COD). On le trouve en posant la question « présenteront quoi ? » : leur exposé. Il est directement relié au verbe, sans préposition.\n\n3) Le temps du verbe.\n« présenteront » est conjugué au futur simple de l'indicatif (terminaison -ont, action située dans l'avenir, renforcée par « demain »).\n\nConclusion : « les élèves » est un groupe nominal sujet, « leur exposé » est COD, et le verbe est au futur simple. Le complément « à la classe » serait, lui, un complément d'objet indirect (COI)."},{"consigne":"Dans la phrase « Quand il est arrivé, nous avions déjà commencé », identifie les deux propositions et donne la classe grammaticale du mot « Quand ».","min":"Deux propositions : « Quand il est arrivé » (subordonnée) et « nous avions déjà commencé » (principale). « Quand » est une conjonction de subordination.","solide":"La phrase contient deux propositions. « nous avions déjà commencé » est la proposition principale. « Quand il est arrivé » est une proposition subordonnée, introduite par « Quand ». Le mot « Quand » est ici une conjonction de subordination, qui exprime le temps.","mention":"L'exercice porte sur l'analyse d'une phrase complexe.\n\nRepérage des propositions : la phrase comporte deux verbes conjugués (« est arrivé » et « avions commencé »), donc deux propositions.\nLa proposition principale est « nous avions déjà commencé » : elle peut exister seule.\nLa proposition subordonnée est « Quand il est arrivé » : elle dépend de la principale et ne peut pas être employée seule. C'est une subordonnée circonstancielle de temps.\n\nClasse grammaticale de « Quand » : il introduit la subordonnée et la relie à la principale ; c'est donc une conjonction de subordination. Elle exprime ici le temps (le moment de l'action).\n\nConclusion : la phrase associe une principale (« nous avions déjà commencé ») et une subordonnée de temps (« Quand il est arrivé »), reliées par la conjonction de subordination « Quand ». On remarque aussi la concordance des temps : le plus-que-parfait (« avions commencé ») marque une action antérieure au passé composé (« est arrivé »)."}],"parcours":{"mission":"À la fin, tu sais identifier la classe grammaticale (nature) et la fonction des mots, et distinguer phrase simple et phrase complexe.","froid":[{"q":"Quelle est la différence entre la NATURE (classe) et la FONCTION d'un mot ?","rep":"La nature, c'est ce qu'est le mot (nom, verbe, adjectif...) ; la fonction, c'est le rôle qu'il joue dans la phrase (sujet, COD...)."},{"q":"Cite quatre classes grammaticales (natures de mots).","rep":"Nom, verbe, adjectif, déterminant, pronom, adverbe, préposition, conjonction (4 suffisent)."},{"q":"Quelle est la fonction du mot qui fait l'action et commande l'accord du verbe ?","rep":"Le sujet."},{"q":"Qu'est-ce qu'un COD ? Donne un exemple.","rep":"Le complément d'objet direct : il complète le verbe sans préposition et répond à « qui ? » ou « quoi ? ». Ex. : « Je mange une pomme » (une pomme = COD)."},{"q":"Quelle est la différence entre une phrase simple et une phrase complexe ?","rep":"La phrase simple a un seul verbe conjugué (une proposition) ; la phrase complexe en a plusieurs."}],"coffre":[{"q":"La ____ d'un mot, c'est sa classe (nom, verbe...) ; sa ____, c'est son rôle dans la phrase.","rep":"Mot attendu : nature (et fonction)"},{"q":"Le ____ commande l'accord du verbe et répond à « qui est-ce qui ? ».","rep":"Mot attendu : sujet"},{"q":"Le COD complète le verbe sans ____ et répond à « qui ? » ou « quoi ? ».","rep":"Mot attendu : préposition"},{"q":"Une phrase ____ contient un seul verbe conjugué.","rep":"Mot attendu : simple"},{"q":"Une phrase contenant plusieurs propositions est une phrase ____.","rep":"Mot attendu : complexe"}],"frise":[],"oral":"Explique en 90 secondes la différence entre la nature et la fonction d'un mot, avec un exemple.","oralRedige":"En grammaire, il faut bien distinguer deux notions qui se ressemblent mais ne disent pas la même chose : la nature et la fonction. La nature d'un mot, qu'on appelle aussi sa classe grammaticale, c'est ce que le mot est en lui-même : un nom, un verbe, un adjectif, un déterminant, un pronom, et ainsi de suite. C'est une étiquette fixe, qu'on pourrait trouver dans le dictionnaire. La fonction, en revanche, c'est le rôle que le mot joue à l'intérieur d'une phrase précise : il peut être sujet, complément d'objet direct, complément circonstanciel, etc. Prenons la phrase « Le chien mange un os ». Le mot « chien » est de nature un nom, et sa fonction est sujet, car c'est lui qui fait l'action. Le mot « os » est aussi un nom par nature, mais sa fonction est complément d'objet direct. Un même mot garde sa nature, mais peut changer de fonction selon la phrase.","ecrit":{"consigne":"Analyse la phrase suivante : « Le vieux marin raconte ses aventures aux enfants. » Donne la nature et la fonction des mots soulignés mentalement : « marin », « raconte », « aventures ».","min":"« marin » : nom, sujet. « raconte » : verbe. « aventures » : nom, COD.","solide":"Dans la phrase « Le vieux marin raconte ses aventures aux enfants » : « marin » est un nom commun, sa fonction est sujet du verbe (c'est lui qui raconte). « raconte » est un verbe, conjugué au présent de l'indicatif, c'est le noyau de la phrase. « aventures » est un nom commun, sa fonction est complément d'objet direct (il répond à « raconte quoi ? »).","mention":"Analysons la phrase « Le vieux marin raconte ses aventures aux enfants ». Le mot « marin » est, par nature, un nom commun, accompagné du déterminant « le » et de l'adjectif « vieux » ; sa fonction dans la phrase est sujet, car c'est lui qui accomplit l'action et qui commande l'accord du verbe. Le mot « raconte » est un verbe, ici conjugué à la troisième personne du singulier du présent de l'indicatif : il constitue le noyau de la phrase. Enfin, « aventures » est un nom commun ; sa fonction est complément d'objet direct, car il complète le verbe sans préposition et répond à la question « raconte quoi ? ». On remarque que « aux enfants », introduit par une préposition, serait quant à lui complément d'objet indirect. Cette phrase, qui ne comporte qu'un seul verbe conjugué, est une phrase simple."},"ecritRedige":{"min":"« marin » : nom, sujet. « raconte » : verbe. « aventures » : nom, COD.","solide":"Dans la phrase « Le vieux marin raconte ses aventures aux enfants » : « marin » est un nom commun, sa fonction est sujet du verbe (c'est lui qui raconte). « raconte » est un verbe, conjugué au présent de l'indicatif, c'est le noyau de la phrase. « aventures » est un nom commun, sa fonction est complément d'objet direct (il répond à « raconte quoi ? »).","mention":"Analysons la phrase « Le vieux marin raconte ses aventures aux enfants ». Le mot « marin » est, par nature, un nom commun, accompagné du déterminant « le » et de l'adjectif « vieux » ; sa fonction dans la phrase est sujet, car c'est lui qui accomplit l'action et qui commande l'accord du verbe. Le mot « raconte » est un verbe, ici conjugué à la troisième personne du singulier du présent de l'indicatif : il constitue le noyau de la phrase. Enfin, « aventures » est un nom commun ; sa fonction est complément d'objet direct, car il complète le verbe sans préposition et répond à la question « raconte quoi ? ». On remarque que « aux enfants », introduit par une préposition, serait quant à lui complément d'objet indirect. Cette phrase, qui ne comporte qu'un seul verbe conjugué, est une phrase simple."},"carte":"Carte mémoire : deux colonnes face à face, « NATURE » (nom, verbe, adjectif, déterminant, pronom...) et « FONCTION » (sujet, COD, COI, CC...). Au milieu : un même mot garde sa nature mais change de fonction.","motscles":"nature, classe grammaticale, fonction, sujet, COD, COI, complément circonstanciel, phrase simple, phrase complexe, proposition","vid":"","vidlab":""}},{"id":"F6","matiere":"fr","titre":"Conjugaison et orthographe","objectif":"À la fin, tu sais accorder le verbe avec son sujet, accorder le participe passé, et ne plus confondre les homophones courants.","qcm":[{"q":"Choisis la forme correcte : « Les lettres que tu as ... »","good":"écrites (accord avec « que » mis pour lettres, COD placé avant)","choices":["écrites (accord avec « que » mis pour lettres, COD placé avant)","écris (présent)","écrit (pas d'accord)","écrient (forme inexistante)"],"explain":"Avec avoir, le participe passé s'accorde avec le COD placé avant : ici « que » = « les lettres » (féminin pluriel), donc « écrites ».","verif":"Participe passé avec avoir : accord avec le COD si celui-ci est placé avant le verbe."},{"q":"Choisis : « Hier, elle ... allée au cinéma. »","good":"est allée (auxiliaire être, accord avec le sujet féminin)","choices":["a allé","a allée","est allée (auxiliaire être, accord avec le sujet féminin)","est allé"],"explain":"Le verbe « aller » se conjugue avec être : « elle est allée ». Avec être, le participe s'accorde avec le sujet (elle, féminin singulier) : « allée ».","verif":"Verbes comme aller, partir, venir : auxiliaire être + accord avec le sujet."},{"q":"Quelle phrase est correctement orthographiée ?","good":"« Il a mangé, puis il est sorti. »","choices":["« Il a mangé, puis il est sorti. »","« Il a manger, puis il est sortit. »","« Il a mangé, puis il est sortit. »","« Il a manger, puis il est sorti. »"],"explain":"Après avoir/être on met le participe passé (mangé, sorti), pas l'infinitif (manger) ni une forme en -it. « sorti » ne prend pas de t au masculin singulier.","verif":"Après un auxiliaire : participe passé (mangé, sorti), jamais l'infinitif."},{"q":"Complète correctement : « ... vacances, ... amis sont venus me voir. »","good":"Ces / ses (Ces vacances, ses amis)","choices":["Ses / ces","Ces / ses (Ces vacances, ses amis)","Ces / ces","Ses / ses"],"explain":"« Ces vacances » : démonstratif (celles-ci). « ses amis » : possessif (les siens). On montre les vacances, on possède les amis.","verif":"« ces » = démonstratif (montrer) ; « ses » = possessif (à lui/elle)."}],"court":[],"paper":{"consigne":"Récris ces phrases en corrigeant les fautes : « La lettre que j'ai écrit est sur la table. Les enfants sont parti et il son contents. »","grille":["La lettre que j'ai écrite est sur la table. Les enfants sont partis et ils sont contents.","Phrase corrigée : « La lettre que j'ai écrite est sur la table. Les enfants sont partis et ils sont contents. » On accorde « écrite » car le COD « la lettre » est placé avant l'auxiliaire avoir. « partis » s'accorde avec le sujet « les enfants » (auxiliaire être). « ils sont » remplace « il son », car c'est le pronom pluriel et le verbe être.","La phrase correcte est : « La lettre que j'ai écrite est sur la table. Les enfants sont partis et ils sont contents. » Justifions chaque correction. D'abord, « écrite » : le verbe est conjugué avec l'auxiliaire avoir, donc on cherche le COD ; ici, le COD est « la lettre », représenté par le pronom relatif « que », et il est placé avant le verbe : le participe passé s'accorde donc au féminin singulier. Ensuite, « partis » : le verbe est conjugué avec l'auxiliaire être, le participe passé s'accorde donc avec le sujet « les enfants », masculin pluriel. Enfin, « ils sont contents » : « il son » comportait deux erreurs, le pronom devait être au pluriel « ils », et « son » (déterminant possessif) devait être « sont », forme du verbe être que l'on peut remplacer par « étaient ». L'adjectif « contents » s'accorde lui aussi avec le sujet pluriel."],"type":"devcons","minutes":15,"vid":""},"exos":[{"consigne":"Récris ces phrases en corrigeant les fautes : « La lettre que j'ai écrit est sur la table. Les enfants sont parti et il son contents. »","min":"La lettre que j'ai écrite est sur la table. Les enfants sont partis et ils sont contents.","solide":"Phrase corrigée : « La lettre que j'ai écrite est sur la table. Les enfants sont partis et ils sont contents. » On accorde « écrite » car le COD « la lettre » est placé avant l'auxiliaire avoir. « partis » s'accorde avec le sujet « les enfants » (auxiliaire être). « ils sont » remplace « il son », car c'est le pronom pluriel et le verbe être.","mention":"La phrase correcte est : « La lettre que j'ai écrite est sur la table. Les enfants sont partis et ils sont contents. » Justifions chaque correction. D'abord, « écrite » : le verbe est conjugué avec l'auxiliaire avoir, donc on cherche le COD ; ici, le COD est « la lettre », représenté par le pronom relatif « que », et il est placé avant le verbe : le participe passé s'accorde donc au féminin singulier. Ensuite, « partis » : le verbe est conjugué avec l'auxiliaire être, le participe passé s'accorde donc avec le sujet « les enfants », masculin pluriel. Enfin, « ils sont contents » : « il son » comportait deux erreurs, le pronom devait être au pluriel « ils », et « son » (déterminant possessif) devait être « sont », forme du verbe être que l'on peut remplacer par « étaient ». L'adjectif « contents » s'accorde lui aussi avec le sujet pluriel."},{"consigne":"Récris ces phrases en corrigeant les fautes et explique l'accord : 1) « Les fleurs que j'ai cueilli sont belles. » 2) « Elle ce promène. »","min":"1) « Les fleurs que j'ai cueillies » (accord du participe passé avec le COD « que » mis pour fleurs, placé avant). 2) « Elle se promène » (« se », pronom réfléchi, pas « ce »).","solide":"1) On écrit « Les fleurs que j'ai cueillies ». Avec l'auxiliaire avoir, le participe passé s'accorde avec le COD s'il est placé avant le verbe. Ici le COD est « que », mis pour « les fleurs » (féminin pluriel), placé avant : on accorde donc « cueillies ».\n2) On écrit « Elle se promène ». Il s'agit du pronom réfléchi « se » (elle se promène elle-même), et non du déterminant démonstratif « ce ».","mention":"L'exercice porte sur l'orthographe grammaticale.\n\n1) « Les fleurs que j'ai cueillies ».\nLe verbe est conjugué avec l'auxiliaire avoir. Règle : le participe passé employé avec avoir s'accorde avec le complément d'objet direct (COD) lorsque celui-ci est placé avant le verbe. Ici, le COD est le pronom relatif « que », qui remplace « les fleurs » (féminin pluriel) et qui est placé avant « ai cueilli ». Le participe passé prend donc les marques du féminin pluriel : « cueillies ».\n\n2) « Elle se promène ».\nIl faut distinguer « ce » et « se ». « ce » est un déterminant ou un pronom démonstratif (« ce livre », « ce que je vois »). « se » est le pronom personnel réfléchi des verbes pronominaux (« se promener »). Ici, le sujet « elle » accomplit l'action sur lui-même : on emploie donc « se ».\n\nConclusion : on écrit « Les fleurs que j'ai cueillies sont belles » et « Elle se promène ». Astuce pour le second cas : si l'on peut remplacer par « me » ou « te » en changeant de personne (« je me promène »), c'est « se »."},{"consigne":"Conjugue le verbe « finir » aux personnes demandées : 1) à l'imparfait, « nous ». 2) au futur simple, « ils ». 3) au passé composé, « j' ».","min":"1) nous finissions. 2) ils finiront. 3) j'ai fini.","solide":"1) Imparfait, nous : nous finissions (radical finiss- + terminaison -ions).\n2) Futur simple, ils : ils finiront (infinitif finir + terminaison -ont).\n3) Passé composé, j' : j'ai fini (auxiliaire avoir au présent + participe passé fini).","mention":"L'exercice vérifie la conjugaison d'un verbe du 2e groupe (« finir »).\n\n1) Imparfait avec « nous ».\nÀ l'imparfait, les verbes du 2e groupe gardent l'élément -iss-. La terminaison de « nous » est -ions. On obtient : nous finissions.\n\n2) Futur simple avec « ils ».\nAu futur simple, on part de l'infinitif « finir » et on ajoute la terminaison de « ils », soit -ont. On obtient : ils finiront.\n\n3) Passé composé avec « j' ».\nLe passé composé se forme avec l'auxiliaire (ici avoir) au présent, suivi du participe passé. Le participe passé de « finir » est « fini ». On obtient : j'ai fini.\n\nConclusion : nous finissions, ils finiront, j'ai fini. Point de vigilance : à l'imparfait, ne pas oublier le -iss- propre au 2e groupe (« finissions » et non « finions »)."}],"parcours":{"mission":"À la fin, tu sais accorder le verbe avec son sujet, accorder le participe passé, et ne plus confondre les homophones courants.","froid":[{"q":"Avec quoi le verbe s'accorde-t-il toujours ?","rep":"Avec son sujet (en personne et en nombre)."},{"q":"Comment accorde-t-on le participe passé employé avec l'auxiliaire « être » ?","rep":"Il s'accorde avec le sujet. Ex. : « Elles sont parties »."},{"q":"Comment accorde-t-on le participe passé avec « avoir » ?","rep":"Il ne s'accorde JAMAIS avec le sujet ; il s'accorde avec le COD seulement si celui-ci est placé AVANT le verbe. Ex. : « les pommes que j'ai mangées »."},{"q":"Comment distinguer « a » et « à » ?","rep":"« a » est le verbe avoir (on peut le remplacer par « avait ») ; « à » est une préposition (on ne peut pas le remplacer par « avait »)."},{"q":"Comment distinguer « et » et « est » ?","rep":"« et » relie deux mots (= « et puis ») ; « est » est le verbe être (on peut le remplacer par « était »)."}],"coffre":[{"q":"Le verbe s'accorde toujours avec son ____.","rep":"Mot attendu : sujet"},{"q":"Avec l'auxiliaire être, le participe passé s'accorde avec le ____.","rep":"Mot attendu : sujet"},{"q":"Avec l'auxiliaire avoir, le participe passé s'accorde avec le COD seulement s'il est placé ____ le verbe.","rep":"Mot attendu : avant"},{"q":"« a » est le verbe avoir, « à » est une ____.","rep":"Mot attendu : préposition"},{"q":"« est » peut se remplacer par « ____ » ; « et » signifie « et puis ».","rep":"Mot attendu : était"}],"frise":[],"oral":"Explique en 90 secondes la règle d'accord du participe passé avec être et avec avoir.","oralRedige":"L'accord du participe passé est l'un des pièges les plus fréquents au brevet, mais la règle est claire si on distingue les deux auxiliaires. Avec l'auxiliaire être, le participe passé s'accorde toujours avec le sujet, en genre et en nombre. Par exemple : « elles sont parties » ; on met « parties » au féminin pluriel parce que le sujet « elles » est féminin pluriel. Avec l'auxiliaire avoir, c'est différent : le participe passé ne s'accorde jamais avec le sujet. Il reste invariable, sauf dans un cas précis : il s'accorde avec le complément d'objet direct, mais uniquement si ce COD est placé avant le verbe. Par exemple, on écrit « j'ai mangé les pommes » sans accord, mais « les pommes que j'ai mangées » avec un « es », parce que le COD « pommes » est cette fois placé avant. Le réflexe, c'est donc toujours de se demander quel est l'auxiliaire, puis, si c'est avoir, où se trouve le COD.","ecrit":{"consigne":"Récris ces phrases en corrigeant les fautes : « La lettre que j'ai écrit est sur la table. Les enfants sont parti et il son contents. »","min":"La lettre que j'ai écrite est sur la table. Les enfants sont partis et ils sont contents.","solide":"Phrase corrigée : « La lettre que j'ai écrite est sur la table. Les enfants sont partis et ils sont contents. » On accorde « écrite » car le COD « la lettre » est placé avant l'auxiliaire avoir. « partis » s'accorde avec le sujet « les enfants » (auxiliaire être). « ils sont » remplace « il son », car c'est le pronom pluriel et le verbe être.","mention":"La phrase correcte est : « La lettre que j'ai écrite est sur la table. Les enfants sont partis et ils sont contents. » Justifions chaque correction. D'abord, « écrite » : le verbe est conjugué avec l'auxiliaire avoir, donc on cherche le COD ; ici, le COD est « la lettre », représenté par le pronom relatif « que », et il est placé avant le verbe : le participe passé s'accorde donc au féminin singulier. Ensuite, « partis » : le verbe est conjugué avec l'auxiliaire être, le participe passé s'accorde donc avec le sujet « les enfants », masculin pluriel. Enfin, « ils sont contents » : « il son » comportait deux erreurs, le pronom devait être au pluriel « ils », et « son » (déterminant possessif) devait être « sont », forme du verbe être que l'on peut remplacer par « étaient ». L'adjectif « contents » s'accorde lui aussi avec le sujet pluriel."},"ecritRedige":{"min":"La lettre que j'ai écrite est sur la table. Les enfants sont partis et ils sont contents.","solide":"Phrase corrigée : « La lettre que j'ai écrite est sur la table. Les enfants sont partis et ils sont contents. » On accorde « écrite » car le COD « la lettre » est placé avant l'auxiliaire avoir. « partis » s'accorde avec le sujet « les enfants » (auxiliaire être). « ils sont » remplace « il son », car c'est le pronom pluriel et le verbe être.","mention":"La phrase correcte est : « La lettre que j'ai écrite est sur la table. Les enfants sont partis et ils sont contents. » Justifions chaque correction. D'abord, « écrite » : le verbe est conjugué avec l'auxiliaire avoir, donc on cherche le COD ; ici, le COD est « la lettre », représenté par le pronom relatif « que », et il est placé avant le verbe : le participe passé s'accorde donc au féminin singulier. Ensuite, « partis » : le verbe est conjugué avec l'auxiliaire être, le participe passé s'accorde donc avec le sujet « les enfants », masculin pluriel. Enfin, « ils sont contents » : « il son » comportait deux erreurs, le pronom devait être au pluriel « ils », et « son » (déterminant possessif) devait être « sont », forme du verbe être que l'on peut remplacer par « étaient ». L'adjectif « contents » s'accorde lui aussi avec le sujet pluriel."},"carte":"Carte mémoire : au centre « ACCORDS », branches : verbe→sujet ; PP + être→sujet ; PP + avoir→COD si avant ; homophones (a/à, et/est, son/sont, ces/ses).","motscles":"accord, sujet, participe passé, auxiliaire être, auxiliaire avoir, COD placé avant, homophones, a/à, et/est, son/sont, ces/ses","vid":"","vidlab":""}},{"id":"F7","matiere":"fr","titre":"Vocabulaire et figures de style","objectif":"À la fin, tu sais repérer un champ lexical, distinguer sens propre et figuré, et nommer les principales figures de style.","qcm":[{"q":"« Je t'ai appelé un million de fois ! » Quelle figure de style est-ce ?","good":"Une hyperbole (exagération)","choices":["Une personnification","Une comparaison","Une hyperbole (exagération)","Une litote"],"explain":"« un million de fois » exagère volontairement : c'est une hyperbole. Elle ne compare rien et n'attribue pas de trait humain à un objet.","verif":"Hyperbole = exagération volontaire pour marquer les esprits."},{"q":"Quelle expression est une antithèse (opposition de deux mots contraires) ?","good":"« Cette obscure clarté »","choices":["« Doux comme un agneau »","« Le soleil sourit »","« Une faim de loup »","« Cette obscure clarté »"],"explain":"« obscure » et « clarté » sont des mots de sens opposés rapprochés : c'est une antithèse. « doux comme » est une comparaison, « le soleil sourit » une personnification.","verif":"Antithèse = deux mots ou idées de sens contraire rapprochés."},{"q":"Dans « le préfixe et la racine du mot », quel est le sens du préfixe de « relire » ?","good":"« re- » indique la répétition (lire à nouveau)","choices":["« re- » indique le contraire","« re- » indique la négation","« re- » indique la répétition (lire à nouveau)","« re- » n'a aucun sens"],"explain":"Le préfixe « re- » exprime ici la répétition : relire, c'est lire de nouveau. Connaître les préfixes (re-, dé-, in-, mal-) aide à comprendre le sens des mots.","verif":"Préfixes utiles : re- (répétition), dé-/in-/mal- (contraire ou négation)."},{"q":"Dans « un torrent de paroles », le mot « torrent » est employé au sens :","good":"Figuré (une grande quantité de paroles)","choices":["Propre (un cours d'eau)","Premier","Littéral","Figuré (une grande quantité de paroles)"],"explain":"Il n'y a pas de vrai cours d'eau : « torrent » est une image pour « beaucoup de paroles ». C'est le sens figuré, par opposition au sens propre (le cours d'eau).","verif":"Sens propre = sens premier réel ; sens figuré = sens imagé."}],"court":[],"paper":{"consigne":"Pour chacune de ces phrases, nomme la figure de style : 1) « Il pleure des rivières. » 2) « Le soleil souriait. » 3) « Un bruit silencieux. »","grille":["1) hyperbole. 2) personnification. 3) antithèse.","1) « Il pleure des rivières » est une hyperbole : c'est une exagération, on grossit la quantité de larmes. 2) « Le soleil souriait » est une personnification : on attribue au soleil une action humaine, sourire. 3) « Un bruit silencieux » est une antithèse : on rapproche deux mots opposés, le bruit et le silence.","Analysons les trois phrases. La première, « Il pleure des rivières », est une hyperbole : il s'agit d'une exagération, car on amplifie énormément la quantité de larmes versées pour souligner l'intensité du chagrin. La deuxième, « Le soleil souriait », est une personnification : on attribue à un élément naturel, le soleil, un comportement proprement humain, le fait de sourire, ce qui rend la scène vivante et chaleureuse. La troisième, « Un bruit silencieux », est une antithèse : elle rapproche dans une même expression deux termes de sens opposé, « bruit » et « silencieux », pour créer un effet de surprise et exprimer une réalité paradoxale. Ces figures montrent comment, en jouant sur les mots, un auteur enrichit le sens et provoque des émotions."],"type":"devcons","minutes":15,"vid":""},"exos":[{"consigne":"Pour chacune de ces phrases, nomme la figure de style : 1) « Il pleure des rivières. » 2) « Le soleil souriait. » 3) « Un bruit silencieux. »","min":"1) hyperbole. 2) personnification. 3) antithèse.","solide":"1) « Il pleure des rivières » est une hyperbole : c'est une exagération, on grossit la quantité de larmes. 2) « Le soleil souriait » est une personnification : on attribue au soleil une action humaine, sourire. 3) « Un bruit silencieux » est une antithèse : on rapproche deux mots opposés, le bruit et le silence.","mention":"Analysons les trois phrases. La première, « Il pleure des rivières », est une hyperbole : il s'agit d'une exagération, car on amplifie énormément la quantité de larmes versées pour souligner l'intensité du chagrin. La deuxième, « Le soleil souriait », est une personnification : on attribue à un élément naturel, le soleil, un comportement proprement humain, le fait de sourire, ce qui rend la scène vivante et chaleureuse. La troisième, « Un bruit silencieux », est une antithèse : elle rapproche dans une même expression deux termes de sens opposé, « bruit » et « silencieux », pour créer un effet de surprise et exprimer une réalité paradoxale. Ces figures montrent comment, en jouant sur les mots, un auteur enrichit le sens et provoque des émotions."},{"consigne":"Pour chacune de ces phrases, nomme la figure de style : 1) « Cette valise pèse une tonne. » 2) « Le vent murmurait dans les arbres. » 3) « Il est fort comme un lion. »","min":"1) Hyperbole (exagération). 2) Personnification. 3) Comparaison.","solide":"1) « pèse une tonne » est une exagération volontaire : c'est une hyperbole.\n2) « Le vent murmurait » prête une action humaine (murmurer) à une chose : c'est une personnification.\n3) « fort comme un lion » rapproche deux éléments avec l'outil « comme » : c'est une comparaison.","mention":"L'exercice demande d'identifier des figures de style.\n\n1) « Cette valise pèse une tonne. »\nC'est une hyperbole : une exagération manifeste destinée à frapper l'esprit. La valise ne pèse pas réellement une tonne, on grossit pour insister sur son poids.\n\n2) « Le vent murmurait dans les arbres. »\nC'est une personnification : on attribue à une chose ou à un élément naturel (le vent) un comportement humain (murmurer). Cela rend la description plus vivante.\n\n3) « Il est fort comme un lion. »\nC'est une comparaison : deux éléments (lui et le lion) sont rapprochés à l'aide d'un outil de comparaison, ici « comme ». Sans l'outil (« c'est un lion »), ce serait une métaphore.\n\nConclusion : on reconnaît successivement une hyperbole, une personnification et une comparaison. Pour distinguer comparaison et métaphore, on cherche la présence ou l'absence d'un mot-outil comme « comme »."},{"consigne":"Donne un synonyme et un antonyme du mot « courageux ». Puis explique le sens du préfixe dans le mot « malheureux ».","min":"Synonyme : brave (ou vaillant). Antonyme : peureux (ou lâche). Le préfixe « mal- » indique le contraire, le négatif (malheureux = pas heureux).","solide":"Synonyme de « courageux » : brave, vaillant, intrépide. Antonyme : peureux, lâche, craintif. Dans « malheureux », le préfixe « mal- » exprime la négation ou le contraire : « malheureux » signifie « qui n'est pas heureux ».","mention":"L'exercice porte sur le vocabulaire : synonymie, antonymie et formation des mots.\n\nSynonyme de « courageux » : un mot de sens proche, par exemple « brave », « vaillant » ou « intrépide ».\n\nAntonyme de « courageux » : un mot de sens contraire, par exemple « peureux », « lâche » ou « craintif ».\n\nSens du préfixe dans « malheureux » : le mot est formé du préfixe « mal- » ajouté à « heureux ». Le préfixe « mal- » exprime ici le contraire, la négation : « malheureux » signifie « qui n'est pas heureux ». Connaître les préfixes (mal-, in-, dé-, re-) aide à comprendre le sens des mots.\n\nConclusion : un synonyme de « courageux » est « brave », un antonyme est « peureux », et le préfixe « mal- » de « malheureux » marque le contraire de « heureux »."}],"parcours":{"mission":"À la fin, tu sais repérer un champ lexical, distinguer sens propre et figuré, et nommer les principales figures de style.","froid":[{"q":"Qu'est-ce qu'un champ lexical ?","rep":"L'ensemble des mots d'un texte qui se rapportent à un même thème. Ex. : « vague, écume, marée, rivage » → champ lexical de la mer."},{"q":"Quelle est la différence entre sens propre et sens figuré ?","rep":"Le sens propre est le sens premier, concret ; le sens figuré est un sens imagé. Ex. : « une pluie de pierres » (propre) / « une pluie de compliments » (figuré)."},{"q":"Qu'est-ce qu'une hyperbole ?","rep":"Une exagération. Ex. : « mourir de faim », « je te l'ai dit mille fois »."},{"q":"Qu'est-ce qu'une antithèse ?","rep":"Le rapprochement de deux mots ou idées opposés. Ex. : « un silence assourdissant »."},{"q":"Qu'est-ce qu'une personnification ?","rep":"Attribuer des caractéristiques humaines à un objet, un animal ou une idée. Ex. : « la tempête hurlait »."}],"coffre":[{"q":"L'ensemble des mots qui se rapportent à un même thème est un ____ lexical.","rep":"Mot attendu : champ"},{"q":"Le sens premier et concret d'un mot est le sens ____ ; le sens imagé est le sens ____.","rep":"Mot attendu : propre / figuré"},{"q":"Une exagération est une ____ (ex. : « mourir de rire »).","rep":"Mot attendu : hyperbole"},{"q":"Le rapprochement de deux idées opposées est une ____ (ex. : « cette obscure clarté »).","rep":"Mot attendu : antithèse"},{"q":"Donner des traits humains à une chose est une ____.","rep":"Mot attendu : personnification"}],"frise":[],"oral":"Explique en 90 secondes ce qu'est une figure de style et cite-en trois avec un exemple.","oralRedige":"Une figure de style est un procédé qui permet de rendre un texte plus expressif, plus imagé ou plus frappant : l'auteur ne dit pas les choses de façon ordinaire, il joue avec les mots. Il en existe beaucoup, mais quelques-unes reviennent souvent au brevet. La comparaison et la métaphore créent des images en rapprochant deux éléments, avec un mot comme « comme » pour la comparaison, sans pour la métaphore. L'hyperbole est une exagération, par exemple « je meurs de faim ». L'antithèse rapproche deux idées opposées dans la même phrase, comme « cette obscure clarté ». La personnification donne des caractéristiques humaines à une chose ou un animal, comme « le vent hurlait dans la nuit ». Repérer ces figures aide à comprendre les intentions de l'auteur et les émotions qu'il veut transmettre.","ecrit":{"consigne":"Pour chacune de ces phrases, nomme la figure de style : 1) « Il pleure des rivières. » 2) « Le soleil souriait. » 3) « Un bruit silencieux. »","min":"1) hyperbole. 2) personnification. 3) antithèse.","solide":"1) « Il pleure des rivières » est une hyperbole : c'est une exagération, on grossit la quantité de larmes. 2) « Le soleil souriait » est une personnification : on attribue au soleil une action humaine, sourire. 3) « Un bruit silencieux » est une antithèse : on rapproche deux mots opposés, le bruit et le silence.","mention":"Analysons les trois phrases. La première, « Il pleure des rivières », est une hyperbole : il s'agit d'une exagération, car on amplifie énormément la quantité de larmes versées pour souligner l'intensité du chagrin. La deuxième, « Le soleil souriait », est une personnification : on attribue à un élément naturel, le soleil, un comportement proprement humain, le fait de sourire, ce qui rend la scène vivante et chaleureuse. La troisième, « Un bruit silencieux », est une antithèse : elle rapproche dans une même expression deux termes de sens opposé, « bruit » et « silencieux », pour créer un effet de surprise et exprimer une réalité paradoxale. Ces figures montrent comment, en jouant sur les mots, un auteur enrichit le sens et provoque des émotions."},"ecritRedige":{"min":"1) hyperbole. 2) personnification. 3) antithèse.","solide":"1) « Il pleure des rivières » est une hyperbole : c'est une exagération, on grossit la quantité de larmes. 2) « Le soleil souriait » est une personnification : on attribue au soleil une action humaine, sourire. 3) « Un bruit silencieux » est une antithèse : on rapproche deux mots opposés, le bruit et le silence.","mention":"Analysons les trois phrases. La première, « Il pleure des rivières », est une hyperbole : il s'agit d'une exagération, car on amplifie énormément la quantité de larmes versées pour souligner l'intensité du chagrin. La deuxième, « Le soleil souriait », est une personnification : on attribue à un élément naturel, le soleil, un comportement proprement humain, le fait de sourire, ce qui rend la scène vivante et chaleureuse. La troisième, « Un bruit silencieux », est une antithèse : elle rapproche dans une même expression deux termes de sens opposé, « bruit » et « silencieux », pour créer un effet de surprise et exprimer une réalité paradoxale. Ces figures montrent comment, en jouant sur les mots, un auteur enrichit le sens et provoque des émotions."},"carte":"Carte mémoire : au centre « FIGURES DE STYLE », branches : comparaison, métaphore, hyperbole (exagération), antithèse (idées opposées), personnification (traits humains).","motscles":"champ lexical, sens propre, sens figuré, hyperbole, antithèse, personnification, métaphore, comparaison, registre de langue","vid":"","vidlab":""}},{"id":"F8","matiere":"fr","titre":"La dictée","objectif":"À la fin, tu connais la méthode pour réussir la dictée : écouter, écrire, puis relire en ciblant les accords.","qcm":[{"q":"Choisis : « Les enfants ... partis quand leurs parents ... arrivés. »","good":"sont / sont","choices":["sont / son","son / sont","sont / sont","son / son"],"explain":"Les deux fois, on peut remplacer par « étaient » (« les enfants étaient partis »), donc c'est le verbe « sont ». « son » serait un possessif (« son cartable »).","verif":"« sont » = verbe (remplaçable par « étaient ») ; « son » = possessif."},{"q":"Choisis : « Il ... froid, alors il met un manteau ... capuche. »","good":"a / à","choices":["à / à","a / a","à / a","a / à"],"explain":"« Il a froid » : verbe avoir (remplaçable par « avait »). « à capuche » : préposition (on ne peut pas dire « avait capuche »).","verif":"« a » = verbe avoir (remplaçable par « avait ») ; « à » = préposition."},{"q":"Quelle phrase est correcte ?","good":"« Ses parents lui ont offert ce livre. »","choices":["« Ces parents lui on offert ce livre. »","« Ses parents lui ont offert ce livre. »","« Ces parents lui ont offert se livre. »","« Ses parents lui on offert se livre. »"],"explain":"« Ses parents » (possessif), « ont offert » (verbe avoir, remplaçable par « avaient »), « ce livre » (démonstratif). « on », « se » et « ces » seraient des fautes ici.","verif":"Distinguer ses/ces, ont/on, ce/se selon le sens et le test de remplacement."},{"q":"En relisant une dictée, quel accord faut-il vérifier en PREMIER ?","good":"L'accord du verbe avec son sujet","choices":["La couleur du stylo","La taille de l'écriture","L'accord du verbe avec son sujet","Le nombre de lignes"],"explain":"La priorité est l'accord sujet-verbe, source d'erreurs fréquente. Vient ensuite l'accord dans le groupe nominal, puis les participes passés.","verif":"Méthode de relecture : sujet-verbe d'abord, puis groupes nominaux, puis participes passés."}],"court":[],"paper":{"consigne":"Voici une phrase avec des fautes typiques de dictée. Corrige-la et explique : « Les oiseau qui chante dans les arbre son revenu ce printemps. »","grille":["Les oiseaux qui chantent dans les arbres sont revenus ce printemps.","Correction : « Les oiseaux qui chantent dans les arbres sont revenus ce printemps. » On met « oiseaux » et « arbres » au pluriel (déterminant « les »). Le verbe « chantent » s'accorde avec « oiseaux » (pluriel). « sont » remplace « son » (verbe être = étaient). « revenus » s'accorde avec le sujet « oiseaux » (auxiliaire être).","La phrase correcte est : « Les oiseaux qui chantent dans les arbres sont revenus ce printemps. » Détaillons chaque correction. « Les oiseaux » : le déterminant « les » impose le pluriel au nom. « qui chantent » : le verbe s'accorde avec son sujet, le pronom relatif « qui », qui reprend « les oiseaux », d'où la terminaison « -ent » du pluriel. « dans les arbres » : à nouveau, le déterminant « les » impose le pluriel. « sont revenus » : « son » était une faute d'homophone, il fallait « sont », forme du verbe être que l'on peut remplacer par « étaient » ; et « revenus », participe passé employé avec l'auxiliaire être, s'accorde avec le sujet « oiseaux », masculin pluriel. Cette correction illustre les trois réflexes de la dictée : accord verbe-sujet, accords en nombre, et vigilance sur les homophones."],"type":"devcons","minutes":15,"vid":""},"exos":[{"consigne":"Voici une phrase avec des fautes typiques de dictée. Corrige-la et explique : « Les oiseau qui chante dans les arbre son revenu ce printemps. »","min":"Les oiseaux qui chantent dans les arbres sont revenus ce printemps.","solide":"Correction : « Les oiseaux qui chantent dans les arbres sont revenus ce printemps. » On met « oiseaux » et « arbres » au pluriel (déterminant « les »). Le verbe « chantent » s'accorde avec « oiseaux » (pluriel). « sont » remplace « son » (verbe être = étaient). « revenus » s'accorde avec le sujet « oiseaux » (auxiliaire être).","mention":"La phrase correcte est : « Les oiseaux qui chantent dans les arbres sont revenus ce printemps. » Détaillons chaque correction. « Les oiseaux » : le déterminant « les » impose le pluriel au nom. « qui chantent » : le verbe s'accorde avec son sujet, le pronom relatif « qui », qui reprend « les oiseaux », d'où la terminaison « -ent » du pluriel. « dans les arbres » : à nouveau, le déterminant « les » impose le pluriel. « sont revenus » : « son » était une faute d'homophone, il fallait « sont », forme du verbe être que l'on peut remplacer par « étaient » ; et « revenus », participe passé employé avec l'auxiliaire être, s'accorde avec le sujet « oiseaux », masculin pluriel. Cette correction illustre les trois réflexes de la dictée : accord verbe-sujet, accords en nombre, et vigilance sur les homophones."},{"consigne":"Voici une phrase avec des fautes. Corrige-la et explique : « Les enfants on jouer dans le jardin et il sont rentré tard. »","min":"« Les enfants ont joué dans le jardin et ils sont rentrés tard. » : « ont » (verbe avoir), « joué » (participe passé après avoir), « ils » (pronom sujet), « rentrés » (accord avec ils).","solide":"Phrase correcte : « Les enfants ont joué dans le jardin et ils sont rentrés tard. »\n« on » → « ont » : c'est le verbe avoir (3e personne du pluriel), on peut le remplacer par « avaient ».\n« jouer » → « joué » : après l'auxiliaire avoir, on met le participe passé, pas l'infinitif.\n« il » → « ils » : le sujet est pluriel (les enfants).\n« rentré » → « rentrés » : avec l'auxiliaire être, le participe passé s'accorde avec le sujet (ils, masculin pluriel).","mention":"L'exercice porte sur les fautes typiques de dictée et leur justification.\n\nPhrase corrigée : « Les enfants ont joué dans le jardin et ils sont rentrés tard. »\n\nExplications, faute par faute :\n« on » devient « ont » : il s'agit du verbe avoir à la 3e personne du pluriel, et non du pronom « on ». Test : on peut le remplacer par « avaient » (« les enfants avaient joué » garde un sens), ce qui confirme le verbe avoir.\n« jouer » devient « joué » : après l'auxiliaire avoir, on emploie le participe passé (« joué »), pas l'infinitif. Test : on remplace par un verbe du 3e groupe, « ont pris » et non « ont prendre ».\n« il » devient « ils » : le sujet « les enfants » est au pluriel, le pronom qui le reprend doit l'être aussi.\n« rentré » devient « rentrés » : avec l'auxiliaire être, le participe passé s'accorde en genre et en nombre avec le sujet. Le sujet « ils » est masculin pluriel, d'où « rentrés ».\n\nConclusion : la phrase contenait quatre fautes (homophone on/ont, infinitif/participe, pronom singulier/pluriel, accord du participe avec être). Les justifier montre la maîtrise des règles, ce qui est valorisé."},{"consigne":"Choisis la bonne orthographe et justifie : 1) « Il a pris (ses / ces / ses) affaires. » 2) « (Quel / Qu'elle) belle journée ! »","min":"1) « ses affaires » (déterminant possessif : les siennes). 2) « Quelle belle journée ! » (déterminant exclamatif, accordé avec « journée »).","solide":"1) On écrit « ses affaires » : « ses » est un déterminant possessif (les affaires qui sont à lui). « ces » désignerait des affaires que l'on montre.\n2) On écrit « Quelle belle journée ! » : « quelle » est un déterminant exclamatif, qui s'accorde avec le nom « journée » (féminin singulier). « Qu'elle » (= que + elle) ne conviendrait pas ici.","mention":"L'exercice porte sur des homophones grammaticaux fréquents en dictée.\n\n1) ses / ces.\nOn écrit « Il a pris ses affaires ». « ses » est un déterminant possessif : il indique que les affaires lui appartiennent (on pourrait dire « les siennes »). « ces » serait un déterminant démonstratif, pour désigner des choses que l'on montre (« ces affaires-là »). Le sens (les affaires qui sont à lui) impose « ses ».\n\n2) quel / quelle / qu'elle.\nOn écrit « Quelle belle journée ! ». Ici, c'est un déterminant exclamatif placé devant le nom « journée ». Il s'accorde avec ce nom, féminin singulier, d'où « quelle ». « Qu'elle » correspond à « que + elle » (« il faut qu'elle vienne »), ce qui n'a pas de sens ici.\n\nConclusion : on écrit « ses affaires » et « Quelle belle journée ! ». Ces homophones se distinguent par leur nature et par le test de remplacement (les siennes pour « ses » ; que + elle pour « qu'elle »)."}],"parcours":{"mission":"À la fin, tu connais la méthode pour réussir la dictée : écouter, écrire, puis relire en ciblant les accords.","froid":[{"q":"Combien de fois le texte de la dictée est-il lu au brevet ?","rep":"Trois fois : une lecture complète, une lecture lente pour écrire, une relecture finale."},{"q":"Quel est le premier accord à vérifier dans une dictée ?","rep":"L'accord du verbe avec son sujet."},{"q":"Quel accord vérifie-t-on pour les adjectifs et les participes passés ?","rep":"L'accord en genre (masculin/féminin) et en nombre (singulier/pluriel) avec le nom ou le sujet."},{"q":"Cite deux homophones grammaticaux à surveiller en dictée.","rep":"a/à, et/est, son/sont, ces/ses, ou/où, la/là, ce/se (deux suffisent)."},{"q":"Que faut-il faire pendant la dernière lecture ?","rep":"Relire en se concentrant uniquement sur l'orthographe et les accords, mot par mot, sans chercher à tout réécrire."}],"coffre":[{"q":"Au brevet, le texte de la dictée est lu ____ fois.","rep":"Mot attendu : trois"},{"q":"Le premier accord à vérifier est celui du ____ avec son sujet.","rep":"Mot attendu : verbe"},{"q":"Les adjectifs s'accordent en ____ et en ____ avec le nom.","rep":"Mot attendu : genre et nombre"},{"q":"« a / à », « et / est », « son / sont » sont des ____ grammaticaux à surveiller.","rep":"Mot attendu : homophones"},{"q":"Pendant la dernière lecture, on se concentre sur l'____ et les accords.","rep":"Mot attendu : orthographe"}],"frise":[],"oral":"Explique en 90 secondes ta méthode pour réussir une dictée.","oralRedige":"Pour réussir une dictée, le plus important est d'avoir une méthode et de bien utiliser les trois lectures. À la première lecture, je ne fais qu'écouter pour comprendre le sens général du texte, sans écrire. À la deuxième lecture, plus lente, j'écris au fur et à mesure, en faisant attention à bien suivre. Puis vient l'étape décisive : la relecture. Je ne relis pas une seule fois pour tout, je cible mes vérifications. Je commence par les accords des verbes avec leur sujet, car c'est l'erreur la plus fréquente. Ensuite, je vérifie les accords des noms, des adjectifs et des participes passés, en genre et en nombre. Enfin, je traque les homophones grammaticaux comme « a » et « à » ou « et » et « est », en remplaçant mentalement par « avait » ou « était » pour trancher. Cette relecture ciblée permet de rattraper beaucoup de points.","ecrit":{"consigne":"Voici une phrase avec des fautes typiques de dictée. Corrige-la et explique : « Les oiseau qui chante dans les arbre son revenu ce printemps. »","min":"Les oiseaux qui chantent dans les arbres sont revenus ce printemps.","solide":"Correction : « Les oiseaux qui chantent dans les arbres sont revenus ce printemps. » On met « oiseaux » et « arbres » au pluriel (déterminant « les »). Le verbe « chantent » s'accorde avec « oiseaux » (pluriel). « sont » remplace « son » (verbe être = étaient). « revenus » s'accorde avec le sujet « oiseaux » (auxiliaire être).","mention":"La phrase correcte est : « Les oiseaux qui chantent dans les arbres sont revenus ce printemps. » Détaillons chaque correction. « Les oiseaux » : le déterminant « les » impose le pluriel au nom. « qui chantent » : le verbe s'accorde avec son sujet, le pronom relatif « qui », qui reprend « les oiseaux », d'où la terminaison « -ent » du pluriel. « dans les arbres » : à nouveau, le déterminant « les » impose le pluriel. « sont revenus » : « son » était une faute d'homophone, il fallait « sont », forme du verbe être que l'on peut remplacer par « étaient » ; et « revenus », participe passé employé avec l'auxiliaire être, s'accorde avec le sujet « oiseaux », masculin pluriel. Cette correction illustre les trois réflexes de la dictée : accord verbe-sujet, accords en nombre, et vigilance sur les homophones."},"ecritRedige":{"min":"Les oiseaux qui chantent dans les arbres sont revenus ce printemps.","solide":"Correction : « Les oiseaux qui chantent dans les arbres sont revenus ce printemps. » On met « oiseaux » et « arbres » au pluriel (déterminant « les »). Le verbe « chantent » s'accorde avec « oiseaux » (pluriel). « sont » remplace « son » (verbe être = étaient). « revenus » s'accorde avec le sujet « oiseaux » (auxiliaire être).","mention":"La phrase correcte est : « Les oiseaux qui chantent dans les arbres sont revenus ce printemps. » Détaillons chaque correction. « Les oiseaux » : le déterminant « les » impose le pluriel au nom. « qui chantent » : le verbe s'accorde avec son sujet, le pronom relatif « qui », qui reprend « les oiseaux », d'où la terminaison « -ent » du pluriel. « dans les arbres » : à nouveau, le déterminant « les » impose le pluriel. « sont revenus » : « son » était une faute d'homophone, il fallait « sont », forme du verbe être que l'on peut remplacer par « étaient » ; et « revenus », participe passé employé avec l'auxiliaire être, s'accorde avec le sujet « oiseaux », masculin pluriel. Cette correction illustre les trois réflexes de la dictée : accord verbe-sujet, accords en nombre, et vigilance sur les homophones."},"carte":"Carte mémoire : au centre « DICTÉE », branches : 3 lectures (écouter, écrire, relire), accords verbe-sujet, accords nom-adjectif, homophones (a/à, et/est, son/sont).","motscles":"dictée, trois lectures, accord verbe-sujet, accord nom-adjectif, participe passé, homophones, relecture ciblée","vid":"","vidlab":""}},{"id":"F9","matiere":"fr","titre":"Compréhension et analyse de texte et d'image","objectif":"À la fin, tu sais répondre aux questions de compréhension en justifiant, réussir une réécriture et analyser une image.","qcm":[{"q":"Réécriture : « Il prend son livre et le range. » Récris en remplaçant « Il » par « Ils ».","good":"« Ils prennent leur livre et le rangent. »","choices":["« Ils prennent son livre et le range. »","« Ils prenent leur livre et le rangent. »","« Ils prennent leur livre et le rangent. »","« Ils prend leur livre et le range. »"],"explain":"Au pluriel : verbes « prennent » et « rangent », possessif « son » devient « leur ». Attention : « prennent » prend deux n.","verif":"Réécriture : accorder TOUS les mots qui dépendent du changement (verbes, déterminants)."},{"q":"Réécriture : « La fille était contente. » Récris au pluriel.","good":"« Les filles étaient contentes. »","choices":["« Les filles étaient content. »","« Les fille étaient contentes. »","« Les filles étaient contentes. »","« Les filles était contentes. »"],"explain":"Pluriel : « les filles » (déterminant + nom au pluriel), « étaient » (verbe au pluriel), « contentes » (adjectif accordé en genre et nombre).","verif":"Au pluriel, on accorde le déterminant, le verbe ET l'adjectif attribut."},{"q":"Dans un texte, l'« implicite » désigne :","good":"Ce que le texte suggère sans le dire clairement","choices":["Ce que le texte suggère sans le dire clairement","Ce qui est écrit noir sur blanc","Le titre du texte","La biographie de l'auteur"],"explain":"L'implicite est le sous-entendu : ce que le lecteur comprend entre les lignes. L'explicite, lui, est ce qui est dit directement.","verif":"Implicite = sous-entendu ; explicite = dit clairement."},{"q":"Une question de compréhension demande « Justifiez votre réponse ». Que doit-on faire ?","good":"Citer le texte (entre guillemets) ou donner le numéro de ligne","choices":["Donner son avis personnel uniquement","Répondre par oui ou non sans rien ajouter","Recopier tout le paragraphe","Citer le texte (entre guillemets) ou donner le numéro de ligne"],"explain":"Justifier, c'est appuyer sa réponse sur le texte : une citation entre guillemets ou un renvoi à la ligne. Recopier tout le paragraphe ou donner seulement son avis ne suffit pas.","verif":"Justifier = s'appuyer sur le texte (citation courte ou numéro de ligne)."}],"court":[],"paper":{"consigne":"Réécriture : récris cette phrase en remplaçant « je » par « nous » et en faisant tous les accords. « Je suis parti tôt car j'étais pressé et content de mon travail. »","grille":["Nous sommes partis tôt car nous étions pressés et contents de notre travail.","Réécriture : « Nous sommes partis tôt car nous étions pressés et contents de notre travail. » Les changements : « je suis » devient « nous sommes », « parti » devient « partis » (pluriel), « j'étais » devient « nous étions », « pressé » et « content » deviennent « pressés » et « contents » (pluriel), et « mon » devient « notre ».","La phrase réécrite est : « Nous sommes partis tôt car nous étions pressés et contents de notre travail. » Détaillons les transformations imposées par le passage de « je » à « nous ». Le verbe « suis » devient « sommes » (être, 1re personne du pluriel) ; le participe passé « parti », employé avec être, s'accorde désormais avec le sujet pluriel et prend un « s » : « partis ». L'imparfait « j'étais » devient « nous étions ». Les deux adjectifs attributs, « pressé » et « content », doivent eux aussi se mettre au pluriel : « pressés » et « contents ». Enfin, le déterminant possessif « mon » devient « notre », puisqu'il renvoie maintenant à plusieurs personnes. Cet exercice teste avant tout la rigueur des accords lors d'un changement de personne et de nombre."],"type":"devcons","minutes":15,"vid":""},"exos":[{"consigne":"Réécriture : récris cette phrase en remplaçant « je » par « nous » et en faisant tous les accords. « Je suis parti tôt car j'étais pressé et content de mon travail. »","min":"Nous sommes partis tôt car nous étions pressés et contents de notre travail.","solide":"Réécriture : « Nous sommes partis tôt car nous étions pressés et contents de notre travail. » Les changements : « je suis » devient « nous sommes », « parti » devient « partis » (pluriel), « j'étais » devient « nous étions », « pressé » et « content » deviennent « pressés » et « contents » (pluriel), et « mon » devient « notre ».","mention":"La phrase réécrite est : « Nous sommes partis tôt car nous étions pressés et contents de notre travail. » Détaillons les transformations imposées par le passage de « je » à « nous ». Le verbe « suis » devient « sommes » (être, 1re personne du pluriel) ; le participe passé « parti », employé avec être, s'accorde désormais avec le sujet pluriel et prend un « s » : « partis ». L'imparfait « j'étais » devient « nous étions ». Les deux adjectifs attributs, « pressé » et « content », doivent eux aussi se mettre au pluriel : « pressés » et « contents ». Enfin, le déterminant possessif « mon » devient « notre », puisqu'il renvoie maintenant à plusieurs personnes. Cet exercice teste avant tout la rigueur des accords lors d'un changement de personne et de nombre."},{"consigne":"Réécriture : récris cette phrase en remplaçant « il » par « ils » et en faisant toutes les modifications nécessaires : « Il prend son livre et le range dans son sac. »","min":"« Ils prennent leur livre et le rangent dans leur sac. »","solide":"On remplace « il » par « ils » et on accorde : le verbe passe au pluriel (« prennent », « rangent »), et les déterminants possessifs « son » deviennent « leur » (un livre et un sac pour l'ensemble).\nRésultat : « Ils prennent leur livre et le rangent dans leur sac. »","mention":"L'exercice de réécriture évalue la maîtrise des accords lors d'un changement de personne.\n\nConsigne : passer de « il » (singulier) à « ils » (pluriel). Il faut répercuter ce changement sur tout ce qui en dépend.\n\nModifications nécessaires :\n- Les verbes passent au pluriel : « prend » devient « prennent », « range » devient « rangent » (3e personne du pluriel).\n- Les déterminants possessifs « son » se rapportent désormais à plusieurs personnes : on emploie « leur ». On garde le singulier « leur livre », « leur sac » si chacun a un livre et un sac (sens le plus naturel).\n\nRésultat : « Ils prennent leur livre et le rangent dans leur sac. »\n\nConseil de méthode : dans une réécriture, on repère d'abord tous les mots qui dépendent de l'élément changé (verbes, déterminants, pronoms, accords), puis on les modifie un par un, sans rien oublier. C'est la rigueur qui est notée."},{"consigne":"Pour analyser un texte, on peut utiliser la méthode NADI. Explique ce que signifie chaque lettre et pourquoi il faut ajouter une connaissance personnelle.","min":"N : Nature du document. A : Auteur. D : Date et contexte. I : Idée principale. On ajoute une connaissance du cours car cela enrichit et prouve qu'on comprend.","solide":"La méthode NADI sert à présenter et analyser un document. N : la Nature (texte, image, article...). A : l'Auteur (qui l'a produit). D : la Date et le contexte (quand, dans quelles circonstances). I : l'Idée principale (le message essentiel). Il faut ensuite ajouter une connaissance personnelle issue du cours, car cela montre qu'on ne se contente pas de décrire le document : on le relie à ce qu'on a appris, ce qui rapporte des points.","mention":"L'exercice porte sur une méthode d'analyse de document, utile en français comme dans d'autres matières.\n\nLa méthode NADI décompose l'analyse en quatre points :\nN, la Nature du document : de quel type de document s'agit-il (texte littéraire, article de presse, image, affiche...) ?\nA, l'Auteur : qui en est à l'origine, et que sait-on de lui ?\nD, la Date et le contexte : quand le document a-t-il été produit, et dans quelles circonstances ?\nI, l'Idée principale : quel est le message ou le sens essentiel du document ?\n\nPourquoi ajouter une connaissance personnelle : décrire le document ne suffit pas. En ajoutant une connaissance issue du cours (un fait, une notion, un exemple), on montre qu'on comprend le document et qu'on sait le relier à un savoir plus large. C'est précisément ce qui est valorisé par les correcteurs et qui distingue une bonne analyse d'une simple paraphrase.\n\nConclusion : NADI signifie Nature, Auteur, Date et contexte, Idée principale ; et l'ajout d'une connaissance du cours transforme une description en véritable analyse."}],"parcours":{"mission":"À la fin, tu sais répondre aux questions de compréhension en justifiant, réussir une réécriture et analyser une image.","froid":[{"q":"Règle d'or : comment doit-on répondre à une question de compréhension au brevet ?","rep":"En justifiant sa réponse par un élément du texte : une citation entre guillemets ou un numéro de ligne."},{"q":"Qu'est-ce que l'exercice de réécriture au brevet ?","rep":"Recopier un passage en le transformant selon une consigne (changer le temps, le nombre, la personne) et en faisant tous les accords nécessaires."},{"q":"Que faut-il observer pour analyser une image ?","rep":"Ce qu'on voit (les éléments, les personnages), la composition (premier plan, arrière-plan), les couleurs, et le message ou l'effet produit."},{"q":"Quelle est la différence entre l'explicite et l'implicite dans un texte ?","rep":"L'explicite est ce que le texte dit clairement ; l'implicite est ce qu'il suggère sans le dire (sous-entendus)."},{"q":"Qui raconte l'histoire dans un texte ?","rep":"Le narrateur (à ne pas confondre avec l'auteur)."}],"coffre":[{"q":"Toute réponse de compréhension doit être ____ par une citation ou un numéro de ligne.","rep":"Mot attendu : justifiée"},{"q":"L'exercice de ____ consiste à recopier un passage en le transformant selon une consigne.","rep":"Mot attendu : réécriture"},{"q":"Pour analyser une image, on observe les éléments, la ____, les couleurs et le message.","rep":"Mot attendu : composition"},{"q":"Ce que le texte dit clairement est l'____ ; ce qu'il suggère est l'____.","rep":"Mot attendu : explicite / implicite"},{"q":"Celui qui raconte l'histoire est le ____, à ne pas confondre avec l'auteur.","rep":"Mot attendu : narrateur"}],"frise":[],"oral":"Explique en 90 secondes comment bien répondre aux questions de compréhension au brevet.","oralRedige":"Pour réussir la partie compréhension du brevet, il y a une règle d'or à ne jamais oublier : chaque réponse doit être justifiée par le texte. On ne se contente pas de donner son avis, on prouve ce qu'on affirme en citant un mot ou une phrase entre guillemets, ou en indiquant un numéro de ligne. Avant de répondre, je lis le texte une première fois en entier pour le comprendre, puis je le relis en soulignant les personnages, les lieux, le temps et les mots difficiles. Pour chaque question, je retourne dans le texte plutôt que de répondre de mémoire. Je fais aussi attention à distinguer ce que le texte dit clairement, l'explicite, de ce qu'il suggère, l'implicite. Et je n'oublie pas que celui qui raconte est le narrateur, qui n'est pas forcément l'auteur. Pour la réécriture, l'essentiel est de bien respecter la consigne de transformation et de refaire tous les accords. Enfin, si une image est proposée, je décris ce que je vois, la composition et les couleurs, avant d'en dégager le message.","ecrit":{"consigne":"Réécriture : récris cette phrase en remplaçant « je » par « nous » et en faisant tous les accords. « Je suis parti tôt car j'étais pressé et content de mon travail. »","min":"Nous sommes partis tôt car nous étions pressés et contents de notre travail.","solide":"Réécriture : « Nous sommes partis tôt car nous étions pressés et contents de notre travail. » Les changements : « je suis » devient « nous sommes », « parti » devient « partis » (pluriel), « j'étais » devient « nous étions », « pressé » et « content » deviennent « pressés » et « contents » (pluriel), et « mon » devient « notre ».","mention":"La phrase réécrite est : « Nous sommes partis tôt car nous étions pressés et contents de notre travail. » Détaillons les transformations imposées par le passage de « je » à « nous ». Le verbe « suis » devient « sommes » (être, 1re personne du pluriel) ; le participe passé « parti », employé avec être, s'accorde désormais avec le sujet pluriel et prend un « s » : « partis ». L'imparfait « j'étais » devient « nous étions ». Les deux adjectifs attributs, « pressé » et « content », doivent eux aussi se mettre au pluriel : « pressés » et « contents ». Enfin, le déterminant possessif « mon » devient « notre », puisqu'il renvoie maintenant à plusieurs personnes. Cet exercice teste avant tout la rigueur des accords lors d'un changement de personne et de nombre."},"ecritRedige":{"min":"Nous sommes partis tôt car nous étions pressés et contents de notre travail.","solide":"Réécriture : « Nous sommes partis tôt car nous étions pressés et contents de notre travail. » Les changements : « je suis » devient « nous sommes », « parti » devient « partis » (pluriel), « j'étais » devient « nous étions », « pressé » et « content » deviennent « pressés » et « contents » (pluriel), et « mon » devient « notre ».","mention":"La phrase réécrite est : « Nous sommes partis tôt car nous étions pressés et contents de notre travail. » Détaillons les transformations imposées par le passage de « je » à « nous ». Le verbe « suis » devient « sommes » (être, 1re personne du pluriel) ; le participe passé « parti », employé avec être, s'accorde désormais avec le sujet pluriel et prend un « s » : « partis ». L'imparfait « j'étais » devient « nous étions ». Les deux adjectifs attributs, « pressé » et « content », doivent eux aussi se mettre au pluriel : « pressés » et « contents ». Enfin, le déterminant possessif « mon » devient « notre », puisqu'il renvoie maintenant à plusieurs personnes. Cet exercice teste avant tout la rigueur des accords lors d'un changement de personne et de nombre."},"carte":"Carte mémoire : au centre « COMPRENDRE », branches : justifier (citation/ligne), réécriture (transformer + accorder), image (voir/composition/message), narrateur ≠ auteur.","motscles":"compréhension, justifier, citation, ligne, réécriture, transformation, accords, image, composition, explicite, implicite, narrateur","vid":"","vidlab":""}},{"id":"F10","matiere":"fr","titre":"La rédaction (imagination ou réflexion)","objectif":"À la fin, tu connais la méthode pour réussir la rédaction du brevet, qu'il s'agisse d'un sujet d'imagination ou de réflexion.","qcm":[{"q":"Comment s'organise correctement un sujet de réflexion ?","good":"Introduction, développement (arguments + exemples), conclusion","choices":["Une longue description sans plan","Une suite de questions sans réponse","Une simple liste de mots-clés","Introduction, développement (arguments + exemples), conclusion"],"explain":"Le texte de réflexion suit un plan argumenté : on annonce le sujet, on développe des arguments illustrés d'exemples, puis on conclut.","verif":"Réflexion : introduction, arguments illustrés, conclusion."},{"q":"Dans un sujet d'imagination commençant par « En ouvrant la porte, je découvris... », quel temps faut-il garder ?","good":"Un système du passé cohérent (« je découvris » → passé simple/imparfait)","choices":["Mélanger librement tous les temps","Écrire au futur","Passer au présent dès la deuxième phrase","Un système du passé cohérent (« je découvris » → passé simple/imparfait)"],"explain":"L'amorce est au passé (« je découvris »), il faut donc poursuivre dans un système du passé cohérent. Changer de temps sans raison est une faute fréquente et pénalisée.","verif":"Respecter la cohérence des temps imposée par l'amorce."},{"q":"Quel début d'introduction convient le mieux pour un sujet de réflexion sur le mensonge ?","good":"« On pense souvent qu'il faut toujours dire la vérité. Mais est-ce toujours possible ? »","choices":["« Il était une fois un menteur. »","« Je vais vous parler du mensonge. Voilà. »","« Le mensonge le mensonge le mensonge. »","« On pense souvent qu'il faut toujours dire la vérité. Mais est-ce toujours possible ? »"],"explain":"Une bonne introduction amène le sujet et pose une question (problématique). Annoncer platement « je vais parler de » ou commencer un récit ne convient pas à un sujet de réflexion.","verif":"Introduction de réflexion : amener le sujet et poser une question."},{"q":"Avant de rédiger, quelle est la démarche la plus efficace ?","good":"Faire un plan rapide au brouillon, puis rédiger","choices":["Compter d'abord le nombre de lignes attendu","Recopier l'énoncé du sujet","Faire un plan rapide au brouillon, puis rédiger","Écrire directement au propre sans réfléchir"],"explain":"Un court plan au brouillon évite le hors-sujet et structure les idées. On rédige ensuite, puis on relit. Écrire au propre sans plan mène souvent au désordre.","verif":"Méthode : brouillon (plan) → rédaction → relecture."}],"court":[],"paper":{"consigne":"Sujet de réflexion. Rédige l'introduction et un paragraphe de développement (avec un argument et un exemple) sur ce sujet : « La lecture est-elle encore utile à notre époque ? »","grille":["La lecture est-elle utile aujourd'hui ? Je pense que oui. D'abord, lire permet d'apprendre beaucoup de choses. Par exemple, un livre d'histoire nous apprend le passé. Donc la lecture est encore utile.","De nos jours, avec les écrans et les vidéos, on pourrait croire que lire ne sert plus à grand-chose. Pourtant, la lecture reste-t-elle utile à notre époque ? Je pense qu'elle l'est plus que jamais. Tout d'abord, la lecture enrichit les connaissances et le vocabulaire. En effet, en lisant régulièrement, on découvre des mots nouveaux et des idées variées : par exemple, un élève qui lit des romans s'exprime souvent mieux à l'écrit, car il a vu de nombreuses tournures de phrases. La lecture est donc un véritable outil d'apprentissage.","À l'heure des écrans, des vidéos courtes et des réseaux sociaux, beaucoup pensent que lire est devenu inutile, voire dépassé. Pourtant, on peut se demander si la lecture n'est pas, au contraire, encore plus précieuse aujourd'hui. Je suis convaincu qu'elle demeure essentielle, et je voudrais le montrer à travers plusieurs arguments.\n\nTout d'abord, la lecture enrichit considérablement les connaissances et la maîtrise de la langue. En lisant régulièrement, on rencontre des mots nouveaux, des tournures variées et des idées que l'on n'aurait pas croisées autrement. Par exemple, un élève qui lit des romans ou des articles s'exprime généralement avec plus d'aisance et de précision à l'écrit, parce qu'il a intériorisé, sans même s'en rendre compte, des milliers de phrases bien construites. Là où une vidéo livre une information toute faite, la lecture oblige l'esprit à travailler, à imaginer et à réfléchir. C'est en cela qu'elle reste un outil d'apprentissage irremplaçable, que rien n'a vraiment remplacé."],"type":"devcons","minutes":15,"vid":""},"exos":[{"consigne":"Sujet de réflexion. Rédige l'introduction et un paragraphe de développement (avec un argument et un exemple) sur ce sujet : « La lecture est-elle encore utile à notre époque ? »","min":"La lecture est-elle utile aujourd'hui ? Je pense que oui. D'abord, lire permet d'apprendre beaucoup de choses. Par exemple, un livre d'histoire nous apprend le passé. Donc la lecture est encore utile.","solide":"De nos jours, avec les écrans et les vidéos, on pourrait croire que lire ne sert plus à grand-chose. Pourtant, la lecture reste-t-elle utile à notre époque ? Je pense qu'elle l'est plus que jamais. Tout d'abord, la lecture enrichit les connaissances et le vocabulaire. En effet, en lisant régulièrement, on découvre des mots nouveaux et des idées variées : par exemple, un élève qui lit des romans s'exprime souvent mieux à l'écrit, car il a vu de nombreuses tournures de phrases. La lecture est donc un véritable outil d'apprentissage.","mention":"À l'heure des écrans, des vidéos courtes et des réseaux sociaux, beaucoup pensent que lire est devenu inutile, voire dépassé. Pourtant, on peut se demander si la lecture n'est pas, au contraire, encore plus précieuse aujourd'hui. Je suis convaincu qu'elle demeure essentielle, et je voudrais le montrer à travers plusieurs arguments.\n\nTout d'abord, la lecture enrichit considérablement les connaissances et la maîtrise de la langue. En lisant régulièrement, on rencontre des mots nouveaux, des tournures variées et des idées que l'on n'aurait pas croisées autrement. Par exemple, un élève qui lit des romans ou des articles s'exprime généralement avec plus d'aisance et de précision à l'écrit, parce qu'il a intériorisé, sans même s'en rendre compte, des milliers de phrases bien construites. Là où une vidéo livre une information toute faite, la lecture oblige l'esprit à travailler, à imaginer et à réfléchir. C'est en cela qu'elle reste un outil d'apprentissage irremplaçable, que rien n'a vraiment remplacé."},{"consigne":"Sujet d'imagination. Rédige le début d'un récit (environ 10 lignes) qui commence par : « Ce matin-là, en ouvrant la porte, je découvris quelque chose d'inattendu. » Emploie un temps du récit cohérent.","min":"Un début de récit cohérent à partir de l'amorce, avec un temps du passé maintenu et un élément inattendu décrit.","solide":"On attend la suite cohérente de l'amorce imposée, dans un récit organisé. Le temps du récit doit être maintenu (passé simple ou imparfait/passé composé, sans mélange incohérent). L'élément inattendu annoncé doit être décrit et provoquer une réaction du narrateur. Le texte doit donner envie de lire la suite.","mention":"L'exercice porte sur la rédaction d'invention à partir d'une amorce imposée.\n\nAttendus de contenu : le texte doit prolonger logiquement la phrase de départ. L'« élément inattendu » doit être imaginé, décrit avec des détails, et susciter une réaction du narrateur (surprise, peur, curiosité). Un bon début pose un décor, installe une atmosphère et crée une attente chez le lecteur.\n\nAttendus de langue : la cohérence des temps est essentielle. Puisque l'amorce est au passé (« je découvris »), on poursuit dans un système du passé cohérent (passé simple pour les actions, imparfait pour les descriptions). Il faut éviter de basculer au présent sans raison.\n\nAttendus de structure : un récit progressif, des phrases variées, du vocabulaire précis, et si possible une touche de style (comparaison, notation sensorielle).\n\nConseil de relecture : vérifier la continuité avec l'amorce, la cohérence des temps du passé, l'orthographe et la ponctuation, et s'assurer que le texte donne envie de connaître la suite."},{"consigne":"Sujet de réflexion. Rédige l'introduction et un paragraphe argumenté sur le sujet : « Faut-il

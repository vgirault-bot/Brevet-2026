itannique devient indépendante en 1947 ?","sol":"L'Inde (1947).","kw":["linde","1947"],"explain":"Contexte : décolonisation, métropole, nationalisme, Tiers Monde, non-alignement, Bandung. · À éviter : Croire que toutes les indépendances passent par la guerre ; oublier la guerre froide en toile de fond.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre décolonisation)"},{"q":"Quelle guerre coloniale française dure de 1954 à 1962 ?","sol":"La guerre d'Algérie.","kw":["guerre","dalgérie"],"explain":"Contexte : décolonisation, métropole, nationalisme, Tiers Monde, non-alignement, Bandung. · À éviter : Croire que toutes les indépendances passent par la guerre ; oublier la guerre froide en toile de fond.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre décolonisation)"},{"q":"Que se passe-t-il à Bandung en 1955 ?","sol":"Des pays affirment leur indépendance et le non-alignement.","kw":["des","affirment","indépendance","nonalignement"],"explain":"Contexte : décolonisation, métropole, nationalisme, Tiers Monde, non-alignement, Bandung. · À éviter : Croire que toutes les indépendances passent par la guerre ; oublier la guerre froide en toile de fond.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre décolonisation)"},{"q":"Cite deux façons d'accéder à l'indépendance.","sol":"La négociation et la guerre.","kw":["négociation","guerre"],"explain":"Contexte : décolonisation, métropole, nationalisme, Tiers Monde, non-alignement, Bandung. · À éviter : Croire que toutes les indépendances passent par la guerre ; oublier la guerre froide en toile de fond.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre décolonisation)"},{"q":"Qu'est-ce que le Tiers Monde ?","sol":"Les pays nouvellement indépendants, hors des deux blocs.","kw":["les","nouvellement","indépendants"],"explain":"Contexte : décolonisation, métropole, nationalisme, Tiers Monde, non-alignement, Bandung. · À éviter : Croire que toutes les indépendances passent par la guerre ; oublier la guerre froide en toile de fond.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre décolonisation)"}],"paper":{"consigne":"Écris 8 lignes : les causes de la décolonisation, puis ses deux formes avec un exemple chacune.","grille":["Causes + 2 formes.","Causes (Europe affaiblie, nationalismes) + indépendance négociée vs guerre.","Ajoute Bandung 1955, Tiers Monde, et développe l'exemple vu en classe."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/histoire"},"exos":[{"consigne":"Écris 8 lignes : les causes de la décolonisation, puis ses deux formes avec un exemple chacune.","min":"Causes + 2 formes.","solide":"Causes (Europe affaiblie, nationalismes) + indépendance négociée vs guerre.","mention":"Introduction : après 1945, les empires coloniaux européens se défont et de nombreuses colonies accèdent à l'indépendance. On peut en présenter les causes, puis les deux formes principales.\n\nLes causes de la décolonisation. La Seconde Guerre mondiale a affaibli les puissances coloniales européennes. Dans le même temps, les mouvements nationalistes se renforcent et revendiquent l'indépendance, au nom du droit des peuples à disposer d'eux-mêmes. La conférence de Bandung, en 1955, marque l'affirmation des peuples colonisés et l'émergence du Tiers Monde.\n\nLes deux formes de la décolonisation. L'indépendance peut être obtenue de façon négociée et relativement pacifique : c'est le cas de l'Inde, qui devient indépendante du Royaume-Uni en 1947. Elle peut aussi résulter d'une guerre : l'Algérie accède à l'indépendance au terme d'un conflit contre la France, de 1954 à 1962.\n\nConclusion : affaiblissement des métropoles et montée des nationalismes expliquent la décolonisation, qui se réalise soit par la négociation, soit par la guerre. Elle bouleverse la carte du monde en faisant naître de nombreux États nouveaux."},{"consigne":"Développement construit (8 lignes). « Pourquoi et comment les colonies accèdent-elles à l'indépendance après 1945 ? » Donne un exemple d'indépendance pacifique et un exemple par la guerre.","min":"Causes : affaiblissement des métropoles après la guerre, montée des mouvements nationalistes, droit des peuples à disposer d'eux-mêmes. Formes : pacifique (Inde, 1947) ou par la guerre (Algérie, 1954-1962).","solide":"Introduction : après 1945, les empires coloniaux européens se défont et de nombreuses colonies accèdent à l'indépendance.\nIdée 1 : les causes. Les métropoles sont affaiblies par la Seconde Guerre mondiale ; les mouvements nationalistes se renforcent et revendiquent le droit des peuples à disposer d'eux-mêmes.\nIdée 2 : les formes. L'indépendance peut être obtenue de façon relativement pacifique, comme en Inde en 1947, ou au terme d'une guerre, comme en Algérie (guerre de 1954 à 1962).\nConclusion : la décolonisation transforme la carte du monde et fait émerger de nouveaux États.","mention":"Introduction : après 1945, les grands empires coloniaux européens se disloquent. De nombreuses colonies d'Asie et d'Afrique accèdent à l'indépendance. On peut se demander pourquoi et comment.\n\nPremière idée : les causes de la décolonisation. La Seconde Guerre mondiale a affaibli les puissances coloniales européennes, sur le plan militaire comme économique. Dans le même temps, les mouvements nationalistes se renforcent dans les colonies et réclament l'indépendance, au nom du droit des peuples à disposer d'eux-mêmes, principe soutenu par l'ONU.\n\nSeconde idée : les formes de l'accès à l'indépendance. Celle-ci peut être obtenue de manière relativement pacifique, par la négociation : c'est le cas de l'Inde, qui devient indépendante du Royaume-Uni en 1947. Mais elle peut aussi résulter d'un conflit armé : l'Algérie accède à l'indépendance au terme d'une guerre contre la France, de 1954 à 1962.\n\nConclusion : affaiblissement des métropoles et montée des nationalismes expliquent la décolonisation, qui se réalise tantôt pacifiquement, tantôt par la guerre. Elle bouleverse la carte du monde en faisant naître de nombreux nouveaux États."},{"consigne":"Repères. 1) En quelle année l'Inde devient-elle indépendante ? 2) Donne les dates de la guerre d'Algérie. 3) Que signifie l'expression « droit des peuples à disposer d'eux-mêmes » ?","min":"1) 1947. 2) 1954-1962. 3) C'est le droit de chaque peuple à choisir lui-même son destin et à se gouverner (donc à devenir indépendant).","solide":"1) L'Inde devient indépendante en 1947.\n2) La guerre d'Algérie se déroule de 1954 à 1962.\n3) Le « droit des peuples à disposer d'eux-mêmes » signifie que chaque peuple a le droit de décider lui-même de son sort, de choisir son gouvernement et, le cas échéant, de devenir un État indépendant.","mention":"1) L'indépendance de l'Inde.\nL'Inde accède à l'indépendance en 1947, vis-à-vis du Royaume-Uni, au terme d'un long mouvement nationaliste largement non violent.\n\n2) La guerre d'Algérie.\nLa guerre d'Algérie oppose les indépendantistes algériens à la France de 1954 à 1962. Elle s'achève par l'indépendance de l'Algérie en 1962.\n\n3) Le droit des peuples à disposer d'eux-mêmes.\nCette expression désigne le principe selon lequel chaque peuple a le droit de décider librement de son destin politique : choisir son gouvernement et, s'il le souhaite, former un État indépendant. Ce principe a soutenu les revendications des peuples colonisés après 1945.\n\nConclusion : l'Inde devient indépendante en 1947, la guerre d'Algérie dure de 1954 à 1962, et le droit des peuples à disposer d'eux-mêmes est le principe au nom duquel les colonies ont réclamé leur indépendance."}],"parcours":{"mission":"À la fin, tu sais expliquer comment les colonies deviennent indépendantes.","froid":[{"q":"Quelle grande colonie britannique devient indépendante en 1947 ?","rep":"L'Inde (1947)."},{"q":"Quelle guerre coloniale française dure de 1954 à 1962 ?","rep":"La guerre d'Algérie."},{"q":"Que se passe-t-il à Bandung en 1955 ?","rep":"Des pays affirment leur indépendance et le non-alignement."},{"q":"Cite deux façons d'accéder à l'indépendance.","rep":"La négociation et la guerre."},{"q":"Qu'est-ce que le Tiers Monde ?","rep":"Les pays nouvellement indépendants, hors des deux blocs."}],"coffre":[{"q":"Après 1945, les empires coloniaux sont ____","rep":"…affaiblis."},{"q":"Les peuples colonisés réclament l'indépendance au nom du droit des ____","rep":"…peuples à disposer d'eux-mêmes."},{"q":"Deux formes d'indépendance : ____ ou ____","rep":"négociation ; guerre."},{"q":"Exemple d'indépendance négociée : ____","rep":"Inde (1947)."},{"q":"Exemple d'indépendance par la guerre : ____","rep":"Algérie (1954-1962) ou Indochine."}],"frise":[["1947","Inde"],["1954-1962","Algérie"],["1955","Bandung"]],"oral":"Explique en 90 secondes pourquoi les empires coloniaux s'effondrent après 1945.","ecrit":{"consigne":"Écris 8 lignes : les causes de la décolonisation, puis ses deux formes avec un exemple chacune.","min":"Causes + 2 formes.","solide":"Causes (Europe affaiblie, nationalismes) + indépendance négociée vs guerre.","mention":"Ajoute Bandung 1955, Tiers Monde, et développe l'exemple vu en classe."},"oralRedige":"Après 1945, les empires coloniaux européens s'effondrent : c'est la décolonisation. Les colonies d'Afrique et d'Asie accèdent à l'indépendance. Parfois cela se passe de façon pacifique, par la négociation ; parfois cela passe par la guerre, comme la guerre d'Algérie, qui oppose la France à sa colonie de 1954 à 1962 et se termine par l'indépendance algérienne. L'année 1960 est marquante : une quinzaine de colonies africaines deviennent indépendantes la même année, ce qu'on appelle l'année de l'Afrique. La décolonisation change la carte du monde et fait émerger de nombreux nouveaux États.","ecritRedige":{"min":"Après 1945, les colonies deviennent indépendantes : c'est la décolonisation. Certaines obtiennent l'indépendance pacifiquement, d'autres par la guerre, comme l'Algérie entre 1954 et 1962. En 1960, beaucoup de colonies africaines deviennent indépendantes.","solide":"La décolonisation est le processus par lequel, après 1945, les colonies européennes accèdent à l'indépendance. Elle prend deux formes principales. Elle peut être négociée et pacifique, comme dans de nombreuses colonies d'Afrique noire. Elle peut aussi être violente : la guerre d'Algérie, de 1954 à 1962, oppose durement la France aux indépendantistes algériens avant d'aboutir à l'indépendance. L'année 1960, surnommée l'année de l'Afrique, voit une quinzaine de colonies africaines devenir indépendantes. La carte du monde est profondément redessinée.","mention":"La décolonisation désigne l'accès à l'indépendance des colonies d'Afrique et d'Asie après la Seconde Guerre mondiale. Affaiblies par la guerre et contestées par des mouvements nationalistes, les puissances coloniales européennes perdent leurs empires. Ce processus prend des formes contrastées. Certaines indépendances sont obtenues par la négociation, de manière relativement pacifique, comme dans une grande partie de l'Afrique subsaharienne. D'autres résultent de guerres longues et meurtrières : la guerre d'Algérie, de 1954 à 1962, est la plus marquante pour la France et se conclut par l'indépendance algérienne après les accords d'Évian. L'année 1960, dite année de l'Afrique, voit à elle seule une quinzaine d'anciennes colonies accéder à l'indépendance. La décolonisation fait émerger de nombreux nouveaux États, souvent regroupés ensuite sous le nom de tiers-monde, et transforme durablement l'équilibre du monde."},"carte":"Carte mémoire : « DÉCOLONISATION », branches : causes / formes / exemples / difficultés.","motscles":"décolonisation, métropole, nationalisme, Tiers Monde, non-alignement, Bandung.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre décolonisation)"}},{"id":"H6","matiere":"histoire","titre":"Un monde bipolaire : la guerre froide","objectif":"À la fin, tu sais expliquer la rivalité USA-URSS et ses grandes crises.","qcm":[{"q":"Pourquoi parle-t-on de « guerre froide » entre 1947 et 1991 ?","good":"Parce que les deux blocs s'affrontent indirectement, sans guerre directe entre les deux superpuissances","choices":["Parce que les deux blocs s'affrontent indirectement, sans guerre directe entre les deux superpuissances","Parce que tous les combats ont lieu dans les régions polaires","Parce que les armes sont gelées par un traité","Parce qu'il n'y a aucun conflit dans le monde"],"explain":"Guerre froide : tension permanente, course aux armements, conflits par pays interposés (Corée, Vietnam), mais pas d'affrontement militaire direct USA-URSS.","verif":"Retrouve dans ton cours des exemples de conflits indirects de la guerre froide.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerre froide)"},{"q":"Quelles idéologies opposent les deux blocs pendant la guerre froide ?","good":"Le capitalisme libéral (Ouest) et le communisme (Est)","choices":["Le colonialisme et la décolonisation","La monarchie et la République","Le fascisme et le nazisme","Le capitalisme libéral (Ouest) et le communisme (Est)"],"explain":"Bloc de l'Ouest (USA, capitalisme, démocratie) contre bloc de l'Est (URSS, communisme, parti unique). Fascisme et nazisme appartiennent à l'avant-1945.","verif":"Vérifie dans ton cours ce qui distingue le modèle américain du modèle soviétique.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerre froide)"},{"q":"Que symbolise le mur de Berlin (1961-1989) ?","good":"La division de l'Europe et du monde en deux blocs","choices":["La frontière entre la France et l'Allemagne","La division de l'Europe et du monde en deux blocs","La ligne de front de 14-18","La limite de l'Empire romain"],"explain":"Construit en 1961 pour empêcher les départs vers l'Ouest, le mur de Berlin devient LE symbole du « rideau de fer ». Sa chute (1989) annonce la fin de la guerre froide.","verif":"Dans ton cours, retrouve pourquoi le mur est construit en 1961 et ce que signifie sa chute en 1989.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerre froide)"},{"q":"Quel événement de 1991 met fin à la guerre froide ?","good":"La disparition de l'URSS","choices":["La crise des missiles de Cuba","La création de l'ONU","La disparition de l'URSS","La chute du mur de Berlin"],"explain":"L'URSS disparaît en 1991, laissant les États-Unis seule superpuissance. La chute du mur (1989) l'avait précédée et annoncée.","verif":"Vérifie l'ordre sur ta frise : chute du mur (1989) puis disparition de l'URSS (1991).","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerre froide)"}],"court":[{"q":"Quelles sont les deux superpuissances ?","sol":"Les États-Unis et l'URSS.","kw":["les","étatsunis","lurss"],"explain":"Contexte : guerre froide, bipolarisation, bloc, OTAN, pacte de Varsovie, rideau de fer, Cuba, mur de Berlin. · À éviter : Dire que USA et URSS se font la guerre directement ; confondre 1989 et 1991.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerre froide)"},{"q":"En quelle année le mur de Berlin est-il construit ?","sol":"En 1961.","kw":["1961"],"explain":"Contexte : guerre froide, bipolarisation, bloc, OTAN, pacte de Varsovie, rideau de fer, Cuba, mur de Berlin. · À éviter : Dire que USA et URSS se font la guerre directement ; confondre 1989 et 1991.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerre froide)"},{"q":"Quelle crise nucléaire a lieu en 1962 ?","sol":"La crise de Cuba.","kw":["cuba"],"explain":"Contexte : guerre froide, bipolarisation, bloc, OTAN, pacte de Varsovie, rideau de fer, Cuba, mur de Berlin. · À éviter : Dire que USA et URSS se font la guerre directement ; confondre 1989 et 1991.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerre froide)"},{"q":"En quelle année tombe le mur de Berlin ?","sol":"En 1989.","kw":["1989"],"explain":"Contexte : guerre froide, bipolarisation, bloc, OTAN, pacte de Varsovie, rideau de fer, Cuba, mur de Berlin. · À éviter : Dire que USA et URSS se font la guerre directement ; confondre 1989 et 1991.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerre froide)"},{"q":"En quelle année disparaît l'URSS ?","sol":"En 1991.","kw":["1991"],"explain":"Contexte : guerre froide, bipolarisation, bloc, OTAN, pacte de Varsovie, rideau de fer, Cuba, mur de Berlin. · À éviter : Dire que USA et URSS se font la guerre directement ; confondre 1989 et 1991.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerre froide)"}],"paper":{"consigne":"Écris 8 lignes : montre que le monde est divisé en deux blocs opposés (modèles + alliances + exemple de crise).","grille":["Deux blocs opposés.","Deux modèles + deux alliances (OTAN/Varsovie) + une crise.","Explique l'affrontement indirect et la dissuasion nucléaire ; situe la fin 1989-1991."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/histoire"},"exos":[{"consigne":"Écris 8 lignes : montre que le monde est divisé en deux blocs opposés (modèles + alliances + exemple de crise).","min":"Deux blocs opposés.","solide":"Deux modèles + deux alliances (OTAN/Varsovie) + une crise.","mention":"Introduction : après 1945, le monde se divise en deux blocs rivaux, dominés par les États-Unis et l'URSS. Cet affrontement sans guerre directe entre les deux Grands, entre 1947 et 1991, est la guerre froide.\n\nDeux modèles opposés. Le bloc de l'Ouest, mené par les États-Unis, défend la démocratie libérale et le capitalisme. Le bloc de l'Est, dirigé par l'URSS, impose le modèle communiste, fondé sur le parti unique et l'économie d'État.\n\nDeux alliances et des crises. Chaque bloc se dote d'une alliance militaire : l'OTAN à l'Ouest, le pacte de Varsovie à l'Est. Les deux blocs s'affrontent indirectement, par pays interposés et par la course aux armements, sous la menace de la dissuasion nucléaire qui empêche un conflit direct. Berlin, ville coupée par un mur de 1961 à 1989, symbolise cette division.\n\nConclusion : le monde de la guerre froide est donc bipolaire, organisé autour de deux superpuissances aux modèles opposés. Cet affrontement s'achève avec la chute du mur de Berlin en 1989 et la disparition de l'URSS en 1991."},{"consigne":"Développement construit (8 lignes). « En quoi Berlin est-elle un symbole de la guerre froide ? » Appuie-toi sur des exemples (blocus, mur).","min":"Berlin, ville divisée, au cœur de l'affrontement Est-Ouest. Blocus de Berlin (1948-1949), construction du mur de Berlin en 1961 séparant Berlin-Est (communiste) et Berlin-Ouest, chute du mur en 1989.","solide":"Introduction : après 1945, le monde se divise en deux blocs opposés, l'Ouest (États-Unis) et l'Est (URSS) : c'est la guerre froide. Berlin en est un symbole.\nIdée 1 : une ville au cœur des tensions. Dès 1948-1949, l'URSS organise le blocus de Berlin-Ouest, auquel les Occidentaux répondent par un pont aérien.\nIdée 2 : une ville coupée en deux. En 1961, le mur de Berlin est construit pour empêcher les passages vers l'Ouest ; il sépare la ville jusqu'à sa chute en 1989.\nConclusion : divisée puis murée, Berlin incarne la coupure du monde en deux blocs.","mention":"Introduction : après la Seconde Guerre mondiale, le monde se divise en deux blocs rivaux : le bloc de l'Ouest, mené par les États-Unis, et le bloc de l'Est, dirigé par l'URSS. Cet affrontement, sans guerre directe entre les deux Grands, est la guerre froide. La ville de Berlin, située en zone soviétique mais elle-même divisée, en est un symbole majeur.\n\nPremière idée : Berlin, lieu de crise. Dès 1948-1949, l'URSS impose un blocus de Berlin-Ouest, coupant ses accès terrestres pour tenter de la faire passer à l'Est. Les Occidentaux ravitaillent la ville par un gigantesque pont aérien, et le blocus échoue.\n\nSeconde idée : Berlin, ville coupée en deux. En 1961, les autorités de l'Est font construire le mur de Berlin pour empêcher les habitants de fuir vers l'Ouest. Le mur sépare physiquement Berlin-Est (communiste) de Berlin-Ouest jusqu'à sa chute en 1989, qui annonce la fin de la guerre froide.\n\nConclusion : objet de crise puis ville murée, Berlin incarne de façon concrète la division du monde en deux blocs opposés, et sa réunification symbolise la fin de cet affrontement."},{"consigne":"Repères et notions. 1) Quelles sont les deux superpuissances de la guerre froide ? 2) En quelle année le mur de Berlin est-il construit, et en quelle année tombe-t-il ? 3) Qu'est-ce qu'un « bloc » ?","min":"1) Les États-Unis et l'URSS. 2) Construit en 1961, tombé en 1989. 3) Un bloc est un ensemble de pays regroupés autour d'une superpuissance et partageant le même système politique et économique.","solide":"1) Les deux superpuissances sont les États-Unis (bloc de l'Ouest) et l'URSS (bloc de l'Est).\n2) Le mur de Berlin est construit en 1961 et tombe en 1989.\n3) Un bloc est un ensemble de pays regroupés autour d'une superpuissance, partageant le même modèle politique et économique (libéral et capitaliste à l'Ouest, communiste à l'Est).","mention":"1) Les deux superpuissances.\nPendant la guerre froide, le monde est dominé par deux superpuissances rivales : les États-Unis, à la tête du bloc de l'Ouest, et l'URSS, à la tête du bloc de l'Est.\n\n2) Les dates du mur de Berlin.\nLe mur de Berlin est construit en 1961, pour empêcher les habitants de l'Est de passer à l'Ouest. Il tombe en 1989, événement qui symbolise la fin de la guerre froide.\n\n3) La notion de bloc.\nUn bloc est un ensemble de pays regroupés autour d'une superpuissance et partageant le même système politique et économique. Le bloc de l'Ouest est libéral et capitaliste, le bloc de l'Est est communiste. Les deux blocs s'opposent sans s'affronter directement par les armes.\n\nConclusion : les États-Unis et l'URSS dominent la période, le mur de Berlin (1961-1989) en est le symbole, et la notion de bloc traduit la division du monde en deux camps opposés."}],"parcours":{"mission":"À la fin, tu sais expliquer la rivalité USA-URSS et ses grandes crises.","froid":[{"q":"Quelles sont les deux superpuissances ?","rep":"Les États-Unis et l'URSS."},{"q":"En quelle année le mur de Berlin est-il construit ?","rep":"En 1961."},{"q":"Quelle crise nucléaire a lieu en 1962 ?","rep":"La crise de Cuba."},{"q":"En quelle année tombe le mur de Berlin ?","rep":"En 1989."},{"q":"En quelle année disparaît l'URSS ?","rep":"En 1991."}],"coffre":[{"q":"Les deux blocs sont le bloc ____ et le bloc ____","rep":"…américain ; soviétique."},{"q":"Les USA défendent le modèle ____, l'URSS le modèle ____","rep":"…libéral/capitaliste ; communiste."},{"q":"On parle de guerre « froide » parce que ____","rep":"…les deux Grands ne se font pas la guerre directement."},{"q":"Alliance militaire de l'Ouest : ____ (sigle)","rep":"OTAN."},{"q":"La guerre froide se termine entre ____ et ____","rep":"1989 ; 1991."}],"frise":[["1961","mur de Berlin"],["1962","crise de Cuba"],["1989","chute du mur"],["1991","disparition de l'URSS"]],"oral":"Explique en 90 secondes pourquoi les deux Grands ne se font jamais la guerre directement.","ecrit":{"consigne":"Écris 8 lignes : montre que le monde est divisé en deux blocs opposés (modèles + alliances + exemple de crise).","min":"Deux blocs opposés.","solide":"Deux modèles + deux alliances (OTAN/Varsovie) + une crise.","mention":"Explique l'affrontement indirect et la dissuasion nucléaire ; situe la fin 1989-1991."},"oralRedige":"De 1947 à 1991, le monde est dominé par la guerre froide. Deux superpuissances s'opposent : les États-Unis, à la tête du bloc de l'Ouest capitaliste et démocratique, et l'URSS, à la tête du bloc de l'Est communiste. On parle de guerre froide parce que les deux camps ne s'affrontent jamais directement par les armes : ils se font la guerre de façon indirecte, par pays interposés, comme en Corée ou au Vietnam, et par la course aux armements. Le mur de Berlin, construit en 1961, devient le symbole de cette division du monde en deux blocs. Sa chute, en 1989, annonce la fin de la guerre froide, suivie en 1991 par la disparition de l'URSS.","ecritRedige":{"min":"Pendant la guerre froide (1947-1991), deux superpuissances s'opposent : les États-Unis et l'URSS. Elles ne se font pas la guerre directement. Le mur de Berlin, construit en 1961, sépare le monde en deux blocs. Il tombe en 1989.","solide":"La guerre froide, de 1947 à 1991, oppose deux superpuissances : les États-Unis, qui dirigent le bloc de l'Ouest capitaliste, et l'URSS, qui dirige le bloc de l'Est communiste. On parle de guerre « froide » car les deux camps ne s'affrontent jamais directement : ils s'opposent de façon indirecte, par la course aux armements et par des conflits dans d'autres pays, comme la Corée ou le Vietnam. Le mur de Berlin, élevé en 1961, symbolise la division du monde en deux blocs. Sa chute en 1989 marque la fin de cette période, confirmée par la disparition de l'URSS en 1991.","mention":"La guerre froide, qui s'étend de 1947 à 1991, organise le monde autour de l'affrontement entre deux superpuissances aux idéologies opposées : les États-Unis, qui défendent le capitalisme et la démocratie libérale à la tête du bloc de l'Ouest, et l'URSS, qui promeut le communisme et le parti unique à la tête du bloc de l'Est. On la qualifie de « froide » parce que les deux grands ne s'affrontent jamais directement sur un champ de bataille : la dissuasion nucléaire rend une guerre directe trop dangereuse. L'opposition se joue donc autrement : course aux armements, propagande, conquête spatiale, et conflits indirects où chacun soutient un camp, comme en Corée ou au Vietnam. Le mur de Berlin, construit en 1961 pour empêcher les fuites vers l'Ouest, devient le symbole du « rideau de fer » qui coupe l'Europe en deux. Sa chute, en 1989, ouvre la voie à la réunification allemande, et la disparition de l'URSS en 1991 met fin à la guerre froide en laissant les États-Unis seule superpuissance."},"carte":"Carte mémoire : un trait au milieu, « USA » à gauche, « URSS » à droite, et les crises au centre.","motscles":"guerre froide, bipolarisation, bloc, OTAN, pacte de Varsovie, rideau de fer, Cuba, mur de Berlin.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerre froide)"}},{"id":"H7","matiere":"histoire","titre":"La construction européenne","objectif":"À la fin, tu sais raconter les grandes étapes de l'Europe, de 1951 à aujourd'hui.","qcm":[{"q":"Quel traité de 1957 fonde la Communauté économique européenne (CEE) entre six pays ?","good":"Le traité de Rome","choices":["Le traité de Lisbonne","Le traité de Maastricht","Le traité de Versailles","Le traité de Rome"],"explain":"Le traité de Rome (1957) crée la CEE (marché commun). Maastricht (1992) viendra plus tard créer l'Union européenne ; Versailles concerne 14-18.","verif":"Dans ton cours, distingue traité de Rome (1957, CEE) et traité de Maastricht (1992, UE).","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre construction européenne)"},{"q":"Qu'apporte le traité de Maastricht signé en 1992 ?","good":"Il crée l'Union européenne et prépare la monnaie unique","choices":["Il crée l'espace Schengen","Il met fin à la Première Guerre mondiale","Il fonde la CEE","Il crée l'Union européenne et prépare la monnaie unique"],"explain":"Maastricht (1992) transforme la CEE en Union européenne et lance le projet de l'euro. Schengen (libre circulation) est un accord distinct.","verif":"Vérifie dans ton cours ce que change Maastricht par rapport à la CEE.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre construction européenne)"},{"q":"En quelle année l'euro est-il mis en circulation sous forme de pièces et billets ?","good":"2002","choices":["2002","1992","2016","1957"],"explain":"L'euro circule à partir de 2002 dans la zone euro. 1957 (Rome) et 1992 (Maastricht) sont des étapes antérieures de la construction européenne.","verif":"Place 2002 sur ta frise de la construction européenne.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre construction européenne)"},{"q":"Combien d'États membres compte l'Union européenne depuis le départ du Royaume-Uni (Brexit) ?","good":"27","choices":["27","15","28","12"],"explain":"L'UE comptait 28 membres ; après le Brexit, elle en compte 27. Elle est partie de 6 pays fondateurs en 1957.","verif":"Dans ton cours, retrouve le nombre de pays fondateurs (6) et le nombre actuel (27).","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre construction européenne)"}],"court":[{"q":"Que crée le traité de Rome en 1957 ?","sol":"La CEE.","kw":["cee"],"explain":"Contexte : CECA, CEE, Maastricht, marché unique, zone euro, élargissement, Brexit. · À éviter : Dire que l'UE existe dès 1957 ; confondre UE, zone euro et Schengen.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre construction européenne)"},{"q":"Quel traité crée l'Union européenne en 1992 ?","sol":"Le traité de Maastricht.","kw":["traité","maastricht"],"explain":"Contexte : CECA, CEE, Maastricht, marché unique, zone euro, élargissement, Brexit. · À éviter : Dire que l'UE existe dès 1957 ; confondre UE, zone euro et Schengen.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre construction européenne)"},{"q":"Combien d'États dans l'UE en 2026 ?","sol":"27 États.","kw":["états"],"explain":"Contexte : CECA, CEE, Maastricht, marché unique, zone euro, élargissement, Brexit. · À éviter : Dire que l'UE existe dès 1957 ; confondre UE, zone euro et Schengen.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre construction européenne)"},{"q":"Quand l'euro entre-t-il en circulation (pièces et billets) ?","sol":"En 2002.","kw":["2002"],"explain":"Contexte : CECA, CEE, Maastricht, marché unique, zone euro, élargissement, Brexit. · À éviter : Dire que l'UE existe dès 1957 ; confondre UE, zone euro et Schengen.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre construction européenne)"},{"q":"Quel pays quitte l'UE en 2020 ?","sol":"Le Royaume-Uni.","kw":["royaumeuni"],"explain":"Contexte : CECA, CEE, Maastricht, marché unique, zone euro, élargissement, Brexit. · À éviter : Dire que l'UE existe dès 1957 ; confondre UE, zone euro et Schengen.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre construction européenne)"}],"paper":{"consigne":"Écris 8 lignes : présente les grandes étapes de la construction européenne (de la CECA à l'UE).","grille":["CECA → CEE → UE.","Étapes datées de la CECA à l'UE + objectif de paix.","Distingue marché unique, euro, Schengen ; cite 2002 (euro), 2004 (élargissement)."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/histoire"},"exos":[{"consigne":"Écris 8 lignes : présente les grandes étapes de la construction européenne (de la CECA à l'UE).","min":"CECA → CEE → UE.","solide":"Étapes datées de la CECA à l'UE + objectif de paix.","mention":"Introduction : au lendemain de la Seconde Guerre mondiale, des pays européens choisissent de s'unir, d'abord pour garantir la paix, ensuite pour coopérer économiquement. La construction européenne connaît plusieurs grandes étapes.\n\nLes débuts de la coopération. Dès 1951, six pays créent la CECA (Communauté européenne du charbon et de l'acier), pour mettre en commun des productions stratégiques. En 1957, le traité de Rome institue la CEE (Communauté économique européenne) et un marché commun favorisant les échanges.\n\nL'approfondissement et l'élargissement. La Communauté s'élargit progressivement à de nouveaux pays. En 1992, le traité de Maastricht crée l'Union européenne. Celle-ci se dote d'un marché unique, d'une libre circulation renforcée par les accords de Schengen, et d'une monnaie commune, l'euro, mis en circulation en 2002. L'Union connaît un important élargissement en 2004.\n\nConclusion : de la CECA en 1951 à l'Union européenne d'aujourd'hui, la construction européenne est passée d'une coopération économique entre six pays à une union politique et monétaire élargie, avec pour objectif premier d'assurer la paix sur le continent."},{"consigne":"Développement construit (8 lignes). « Quelles sont les grandes étapes de la construction européenne depuis 1957 ? » Cite des dates et des exemples.","min":"1957 : traité de Rome, CEE (6 pays). Élargissements successifs. 1992 : traité de Maastricht, Union européenne. 2002 : mise en circulation de l'euro. But : paix et coopération économique.","solide":"Introduction : après la Seconde Guerre mondiale, des pays européens choisissent de s'unir pour garantir la paix et coopérer économiquement.\nIdée 1 : les débuts. En 1957, le traité de Rome crée la Communauté économique européenne (CEE), réunissant six pays autour d'un marché commun.\nIdée 2 : l'approfondissement. L'Europe s'élargit à de nouveaux pays. En 1992, le traité de Maastricht crée l'Union européenne, et en 2002 l'euro devient la monnaie commune de plusieurs États.\nConclusion : d'une coopération économique entre six pays, l'Europe est devenue une union politique et monétaire élargie.","mention":"Introduction : au lendemain de la Seconde Guerre mondiale, plusieurs pays européens décident de s'unir, d'abord pour garantir la paix après des décennies de conflits, ensuite pour coopérer sur le plan économique. La construction européenne connaît alors plusieurs grandes étapes.\n\nPremière idée : les débuts de la coopération économique. En 1957, le traité de Rome crée la Communauté économique européenne (CEE), qui réunit six pays fondateurs autour d'un marché commun favorisant les échanges. Par la suite, la Communauté s'élargit progressivement à de nouveaux États membres.\n\nSeconde idée : l'approfondissement politique et monétaire. En 1992, le traité de Maastricht transforme la Communauté en Union européenne (UE) et prévoit une monnaie commune. En 2002, l'euro est mis en circulation dans plusieurs pays. L'Union se dote ainsi d'institutions communes et d'une citoyenneté européenne.\n\nConclusion : partie d'une coopération économique entre six pays en 1957, la construction européenne a abouti à une Union politique et monétaire, élargie à de nombreux États. Elle a d'abord pour but d'assurer la paix et la coopération sur le continent."},{"consigne":"Repères et notions. 1) Quel traité crée la CEE et en quelle année ? 2) Quel traité crée l'Union européenne et en quelle année ? 3) En quelle année l'euro est-il mis en circulation ?","min":"1) Le traité de Rome, en 1957. 2) Le traité de Maastricht, en 1992. 3) L'euro est mis en circulation en 2002.","solide":"1) La CEE (Communauté économique européenne) est créée par le traité de Rome en 1957.\n2) L'Union européenne est créée par le traité de Maastricht en 1992.\n3) L'euro, monnaie unique, est mis en circulation en 2002.","mention":"1) La création de la CEE.\nLa Communauté économique européenne est instituée par le traité de Rome, signé en 1957 par six pays fondateurs. Elle vise à créer un marché commun.\n\n2) La création de l'Union européenne.\nL'Union européenne naît du traité de Maastricht, signé en 1992. Ce traité approfondit l'intégration et prévoit notamment une monnaie commune et une citoyenneté européenne.\n\n3) La mise en circulation de l'euro.\nL'euro, monnaie unique partagée par plusieurs pays de l'Union, est mis en circulation en 2002 (les pièces et billets).\n\nConclusion : le traité de Rome (1957) crée la CEE, le traité de Maastricht (1992) crée l'Union européenne, et l'euro entre en circulation en 2002. Ces trois repères jalonnent l'approfondissement de la construction européenne."}],"parcours":{"mission":"À la fin, tu sais raconter les grandes étapes de l'Europe, de 1951 à aujourd'hui.","froid":[{"q":"Que crée le traité de Rome en 1957 ?","rep":"La CEE."},{"q":"Quel traité crée l'Union européenne en 1992 ?","rep":"Le traité de Maastricht."},{"q":"Combien d'États dans l'UE en 2026 ?","rep":"27 États."},{"q":"Quand l'euro entre-t-il en circulation (pièces et billets) ?","rep":"En 2002."},{"q":"Quel pays quitte l'UE en 2020 ?","rep":"Le Royaume-Uni."}],"coffre":[{"q":"La construction européenne commence après 1945 pour garantir la ____","rep":"…paix."},{"q":"Première coopération en 1951 : la ____ (charbon-acier)","rep":"CECA."},{"q":"Le marché unique permet la libre circulation des ____, ____, ____, ____","rep":"biens, services, capitaux, personnes."},{"q":"La zone euro est ____ (plus grande / plus petite) que l'UE","rep":"plus petite."},{"q":"En 2026, l'UE compte ____ États","rep":"27."}],"frise":[["1957","Rome"],["1992","Maastricht"],["2002","euro"],["2020","Brexit"]],"oral":"Explique en 90 secondes la différence entre UE, zone euro et espace Schengen.","ecrit":{"consigne":"Écris 8 lignes : présente les grandes étapes de la construction européenne (de la CECA à l'UE).","min":"CECA → CEE → UE.","solide":"Étapes datées de la CECA à l'UE + objectif de paix.","mention":"Distingue marché unique, euro, Schengen ; cite 2002 (euro), 2004 (élargissement)."},"oralRedige":"La construction européenne commence après la Seconde Guerre mondiale, avec l'idée de rapprocher les pays pour éviter une nouvelle guerre. En 1957, le traité de Rome crée la Communauté économique européenne entre six pays : c'est un marché commun. La construction s'approfondit ensuite : en 1992, le traité de Maastricht transforme la CEE en Union européenne et prépare la monnaie unique. L'euro est mis en circulation en 2002. L'Union s'est aussi élargie : partie de 6 pays, elle en compte aujourd'hui 27, après le départ du Royaume-Uni. C'est donc une double dynamique : approfondissement et élargissement.","ecritRedige":{"min":"La construction européenne commence après 1945 pour éviter une nouvelle guerre. En 1957, le traité de Rome crée la CEE. En 1992, le traité de Maastricht crée l'Union européenne. L'euro arrive en 2002. L'UE compte aujourd'hui 27 pays.","solide":"La construction européenne naît après la Seconde Guerre mondiale, dans le but de rapprocher les pays et d'éviter de nouveaux conflits. En 1957, le traité de Rome fonde la Communauté économique européenne entre six pays, autour d'un marché commun. La construction s'approfondit avec le traité de Maastricht, en 1992, qui crée l'Union européenne et lance la monnaie unique : l'euro est mis en circulation en 2002. L'Union s'est aussi élargie, passant de 6 à 27 pays. Elle combine donc approfondissement et élargissement.","mention":"La construction européenne est lancée au lendemain de la Seconde Guerre mondiale, avec l'objectif de réconcilier les anciens ennemis et de rendre la guerre impossible en liant leurs économies. Une première étape décisive est le traité de Rome, en 1957, qui crée la Communauté économique européenne entre six pays fondateurs autour d'un marché commun. La construction connaît ensuite un approfondissement majeur avec le traité de Maastricht, en 1992, qui transforme la CEE en Union européenne, élargit ses compétences et prépare la monnaie unique ; l'euro entre en circulation en 2002. Parallèlement à cet approfondissement, l'Union connaît plusieurs élargissements successifs : partie de 6 membres, elle en a compté jusqu'à 28, puis 27 après le retrait du Royaume-Uni, le Brexit. La construction européenne se définit ainsi par cette double dynamique, d'approfondissement et d'élargissement, même si elle suscite aussi des débats sur la souveraineté et les inégalités entre régions."},"carte":"Frise mémoire : une flèche du temps 1951 → 2026 avec les 5 grandes étapes.","motscles":"CECA, CEE, Maastricht, marché unique, zone euro, élargissement, Brexit.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre construction européenne)"}},{"id":"H8","matiere":"histoire","titre":"Enjeux et conflits dans le monde après 1989","objectif":"À la fin, tu sais expliquer que la fin de la guerre froide n'a pas mis fin aux conflits.","qcm":[{"q":"Quelle situation géopolitique succède à la guerre froide dans les années 1990 ?","good":"Un monde dominé par une seule superpuissance, les États-Unis","choices":["Un monde dominé par une seule superpuissance, les États-Unis","Un monde gouverné par l'ONU seule","Un monde sans aucune grande puissance","Un monde toujours divisé en deux blocs"],"explain":"Après la disparition de l'URSS (1991), les États-Unis deviennent l'unique superpuissance (monde unipolaire), avant l'émergence de nouvelles puissances (Chine).","verif":"Vérifie dans ton cours le passage d'un monde bipolaire à un monde unipolaire puis multipolaire.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre monde depuis 1989)"},{"q":"Quel acte terroriste majeur frappe les États-Unis le 11 septembre 2001 ?","good":"Les attentats contre le World Trade Center et le Pentagone","choices":["Les attentats contre le World Trade Center et le Pentagone","L'attaque de Pearl Harbor","La chute de Saïgon","La crise des missiles de Cuba"],"explain":"Le 11 septembre 2001 ouvre l'ère du terrorisme international et de la « guerre contre le terrorisme ». Pearl Harbor (1941) relève de la Seconde Guerre mondiale.","verif":"Dans ton cours, retrouve les conséquences du 11 septembre 2001 sur les conflits du XXIe siècle.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre monde depuis 1989)"},{"q":"Que désigne la mondialisation, qui s'accélère après 1989 ?","good":"L'intensification des échanges et de l'interdépendance entre les pays du monde","choices":["Le repli de chaque pays sur ses frontières","La fin du commerce international","Le retour de la division en deux blocs","L'intensification des échanges et de l'interdépendance entre les pays du monde"],"explain":"La mondialisation accélère les flux de marchandises, de capitaux, d'informations et de personnes à l'échelle planétaire, avec des effets contrastés.","verif":"Vérifie dans ton cours des exemples concrets de flux mondialisés (marchandises, informations).","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre monde depuis 1989)"}],"court":[{"q":"Quel mur tombe en 1989 ?","sol":"Le mur de Berlin.","kw":["berlin"],"explain":"Contexte : multipolaire, ONU, terrorisme, génocide, 11 septembre, climat. · À éviter : Croire que 1989 met fin aux guerres ; confondre ONU et OTAN.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre monde depuis 1989)"},{"q":"En quelle année ont lieu les attentats du 11 septembre ?","sol":"En 2001.","kw":["2001"],"explain":"Contexte : multipolaire, ONU, terrorisme, génocide, 11 septembre, climat. · À éviter : Croire que 1989 met fin aux guerres ; confondre ONU et OTAN.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre monde depuis 1989)"},{"q":"Que veut dire « monde multipolaire » ?","sol":"Un monde à plusieurs pôles de puissance.","kw":["plusieurs","puissance"],"explain":"Contexte : multipolaire, ONU, terrorisme, génocide, 11 septembre, climat. · À éviter : Croire que 1989 met fin aux guerres ; confondre ONU et OTAN.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre monde depuis 1989)"},{"q":"Quel est le rôle principal de l'ONU ?","sol":"Maintenir la paix et la coopération.","kw":["maintenir","coopération"],"explain":"Contexte : multipolaire, ONU, terrorisme, génocide, 11 septembre, climat. · À éviter : Croire que 1989 met fin aux guerres ; confondre ONU et OTAN.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre monde depuis 1989)"},{"q":"Cite un enjeu mondial qui n'est PAS militaire.","sol":"Climat, migrations, ressources, cybersécurité.","kw":["climat","migrations","ressources","cybersécurité"],"explain":"Contexte : multipolaire, ONU, terrorisme, génocide, 11 septembre, climat. · À éviter : Croire que 1989 met fin aux guerres ; confondre ONU et OTAN.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre monde depuis 1989)"}],"paper":{"consigne":"Écris 8 lignes : montre que le monde après 1989 reste conflictuel. Appuie-toi sur l'exemple vu en classe.","grille":["Fin guerre froide ≠ fin des conflits.","Nouveaux conflits (génocides, terrorisme) + ONU limitée.","Développe l'exemple de cours (Rwanda, Syrie…) et un enjeu non militaire."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/histoire"},"exos":[{"consigne":"Écris 8 lignes : montre que le monde après 1989 reste conflictuel. Appuie-toi sur l'exemple vu en classe.","min":"Fin guerre froide ≠ fin des conflits.","solide":"Nouveaux conflits (génocides, terrorisme) + ONU limitée.","mention":"Introduction : la fin de la guerre froide, en 1989-1991, fait espérer un monde plus pacifique. Pourtant, le monde après 1989 reste profondément conflictuel.\n\nDe nouveaux conflits. La disparition de l'affrontement entre les deux blocs n'a pas mis fin aux guerres. De nombreux conflits régionaux éclatent, souvent liés à des tensions ethniques ou religieuses. Le génocide des Tutsi au Rwanda, en 1994, ou la guerre en Syrie en sont des exemples tragiques. Une menace nouvelle s'impose, le terrorisme international, marqué par les attentats du 11 septembre 2001 contre les États-Unis.\n\nDes limites et de nouveaux enjeux. L'ONU, chargée de maintenir la paix, peine souvent à intervenir efficacement. Par ailleurs, le monde fait face à des enjeux non militaires majeurs, comme le réchauffement climatique ou les migrations, qui peuvent eux aussi nourrir les tensions.\n\nConclusion : la fin de la guerre froide n'a donc pas apporté une paix durable. Le monde après 1989 demeure instable, traversé par de nombreux conflits et confronté à des défis mondiaux nouveaux."},{"consigne":"Développement construit (8 lignes). « Le monde après 1989 est-il devenu plus pacifique ? » Nuance ta réponse avec des exemples.","min":"1989 : fin de la guerre froide (chute du mur de Berlin), fin de l'affrontement des deux blocs. Mais de nouveaux conflits apparaissent : guerres régionales, terrorisme (attentats du 11 septembre 2001). Le monde reste donc instable.","solide":"Introduction : la fin de la guerre froide, marquée par la chute du mur de Berlin en 1989, fait espérer un monde plus pacifique. La réalité est plus nuancée.\nIdée 1 : la fin d'un affrontement majeur. La disparition de l'URSS (1991) met fin à la rivalité des deux blocs et au risque d'une guerre mondiale entre superpuissances.\nIdée 2 : un monde qui reste conflictuel. De nouveaux conflits éclatent (guerres régionales, conflits ethniques) et une nouvelle menace s'impose : le terrorisme, illustré par les attentats du 11 septembre 2001.\nConclusion : la fin de la guerre froide n'a pas apporté une paix durable ; le monde reste instable.","mention":"Introduction : en 1989, la chute du mur de Berlin annonce la fin de la guerre froide, suivie en 1991 par la disparition de l'URSS. Beaucoup espèrent alors un monde plus pacifique. Mais le monde après 1989 est-il vraiment devenu plus pacifique ?\n\nPremière idée : la fin d'un affrontement majeur. La fin de la guerre froide met un terme à la rivalité entre les deux blocs et au risque d'un affrontement nucléaire entre les États-Unis et l'URSS. La division du monde en deux camps disparaît.\n\nSeconde idée : un monde qui reste conflictuel. Pour autant, la paix n'est pas générale. De nouveaux conflits éclatent, souvent régionaux ou liés à des tensions ethniques et religieuses. Une menace nouvelle s'impose, le terrorisme international, dont les attentats du 11 septembre 2001 aux États-Unis constituent l'exemple le plus marquant.\n\nConclusion : si la fin de la guerre froide a écarté le risque d'un affrontement mondial entre superpuissances, elle n'a pas apporté une paix durable. Le monde après 1989 demeure instable, traversé par de nombreux conflits et par la menace terroriste."},{"consigne":"Repères et notions. 1) Que symbolise la chute du mur de Berlin en 1989 ? 2) En quelle année l'URSS disparaît-elle ? 3) À quelle date ont lieu les attentats contre les États-Unis qui marquent le terrorisme international ?","min":"1) La fin de la guerre froide. 2) 1991. 3) Le 11 septembre 2001.","solide":"1) La chute du mur de Berlin en 1989 symbolise la fin de la guerre froide et de la division du monde en deux blocs.\n2) L'URSS disparaît en 1991.\n3) Les attentats contre les États-Unis qui marquent le terrorisme international ont lieu le 11 septembre 2001.","mention":"1) La chute du mur de Berlin.\nLa chute du mur de Berlin, en 1989, symbolise la fin de la guerre froide et de la division du monde en deux blocs opposés. Elle annonce l'effondrement du bloc de l'Est.\n\n2) La disparition de l'URSS.\nL'URSS, l'une des deux superpuissances de la guerre froide, disparaît en 1991. Cet événement met définitivement fin à la période de la guerre froide.\n\n3) Les attentats du 11 septembre.\nLes attentats contre les États-Unis ont lieu le 11 septembre 2001. Ils marquent l'irruption du terrorisme international comme menace majeure du nouveau monde.\n\nConclusion : 1989 (chute du mur) et 1991 (fin de l'URSS) marquent la fin de la guerre froide, tandis que le 11 septembre 2001 illustre les nouvelles menaces du monde actuel."}],"parcours":{"mission":"À la fin, tu sais expliquer que la fin de la guerre froide n'a pas mis fin aux conflits.","froid":[{"q":"Quel mur tombe en 1989 ?","rep":"Le mur de Berlin."},{"q":"En quelle année ont lieu les attentats du 11 septembre ?","rep":"En 2001."},{"q":"Que veut dire « monde multipolaire » ?","rep":"Un monde à plusieurs pôles de puissance."},{"q":"Quel est le rôle principal de l'ONU ?","rep":"Maintenir la paix et la coopération."},{"q":"Cite un enjeu mondial qui n'est PAS militaire.","rep":"Climat, migrations, ressources, cybersécurité."}],"coffre":[{"q":"Après 1989, le monde devient progressivement ____","rep":"…multipolaire."},{"q":"Les nouveaux conflits sont : ____, ____, ____","rep":"guerres civiles, terrorisme, génocides (au choix)."},{"q":"L'ONU cherche à ____ mais son action est limitée par ____","rep":"…maintenir la paix ; …les rivalités entre États."},{"q":"Un enjeu non militaire majeur aujourd'hui : ____","rep":"le climat (ou migrations…)."},{"q":"Ne pas confondre ONU et ____ (alliance militaire)","rep":"OTAN."}],"frise":[["1989","mur de Berlin"],["2001","11 septembre"],["1994","Rwanda"]],"oral":"Explique en 90 secondes pourquoi le monde reste dangereux même après la guerre froide.","ecrit":{"consigne":"Écris 8 lignes : montre que le monde après 1989 reste conflictuel. Appuie-toi sur l'exemple vu en classe.","min":"Fin guerre froide ≠ fin des conflits.","solide":"Nouveaux conflits (génocides, terrorisme) + ONU limitée.","mention":"Développe l'exemple de cours (Rwanda, Syrie…) et un enjeu non militaire."},"oralRedige":"Après 1989 et la fin de la guerre froide, le monde change de visage. La disparition de l'URSS en 1991 laisse d'abord les États-Unis comme seule superpuissance : on parle d'un monde unipolaire. Mais de nouvelles puissances émergent, comme la Chine, et le monde devient progressivement multipolaire. La mondialisation s'accélère : les échanges de marchandises, d'argent, d'informations et de personnes se multiplient à l'échelle de la planète. De nouveaux conflits apparaissent, notamment le terrorisme international, comme le montrent les attentats du 11 septembre 2001 aux États-Unis. Le monde est donc plus ouvert, mais aussi traversé de nouvelles tensions.","ecritRedige":{"min":"Après 1989, la guerre froide se termine et l'URSS disparaît en 1991. Les États-Unis deviennent la seule superpuissance. La mondialisation augmente les échanges dans le monde. De nouveaux conflits apparaissent, comme le terrorisme avec les attentats du 11 septembre 2001.","solide":"La fin de la guerre froide, après 1989, bouleverse l'organisation du monde. Avec la disparition de l'URSS en 1991, les États-Unis deviennent la seule superpuissance : le monde devient unipolaire, avant que de nouvelles puissances comme la Chine ne le rendent multipolaire. La mondialisation s'accélère : les flux de marchandises, de capitaux et d'informations se multiplient. Mais de nouvelles menaces apparaissent, en particulier le terrorisme international, illustré par les attentats du 11 septembre 2001 aux États-Unis.","mention":"Après 1989, la fin de la guerre froide ouvre une nouvelle période dans les relations internationales. La disparition de l'URSS en 1991 laisse les États-Unis comme unique superpuissance, dans un monde devenu unipolaire ; mais cette domination est progressivement contestée par l'émergence de nouvelles puissances, en particulier la Chine, ce qui conduit à un monde multipolaire. Cette période est aussi marquée par l'accélération de la mondialisation : les échanges de marchandises, les flux financiers, la circulation des informations et des personnes s'intensifient à l'échelle planétaire, créant de fortes interdépendances. Mais cette ouverture s'accompagne de nouvelles tensions et de nouveaux types de conflits : le terrorisme international devient une menace majeure, comme le révèlent les attentats du 11 septembre 2001 aux États-Unis, qui ouvrent une période de « guerre contre le terrorisme ». Le monde de l'après-guerre froide est donc à la fois plus connecté et plus instable."},"carte":"Carte mémoire : « APRÈS 1989 », branches : fin guerre froide / nouveaux conflits / nouveaux enjeux.","motscles":"multipolaire, ONU, terrorisme, génocide, 11 septembre, climat.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre monde depuis 1989)"}},{"id":"H9","matiere":"histoire","titre":"Françaises et Français dans une République repensée","objectif":"À la fin, tu sais expliquer comment la République se reconstruit et évolue depuis 1944.","qcm":[{"q":"En quelle année les femmes obtiennent-elles le droit de vote en France ?","good":"1944","choices":["1981","1848","1944","1789"],"explain":"L'ordonnance de 1944 accorde le droit de vote aux femmes, qui votent pour la première fois en 1945. 1848 instaure le suffrage universel masculin.","verif":"Sur ta frise, place 1848 (vote des hommes) et 1944 (vote des femmes).","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre République repensée)"},{"q":"Quelle République, fondée en 1958, est encore en vigueur aujourd'hui ?","good":"La Ve République","choices":["La IVe République","La IIe République","La Ve République","La IIIe République"],"explain":"La Ve République naît en 1958 (Constitution, de Gaulle), après l'instabilité de la IVe (1946-1958).","verif":"Dans ton cours, retrouve pourquoi la IVe République laisse place à la Ve en 1958.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre République repensée)"},{"q":"Que garantit la loi de séparation des Églises et de l'État de 1905 ?","good":"La laïcité : liberté de conscience et neutralité religieuse de l'État","choices":["Le droit de grève","La gratuité de l'école","La laïcité : liberté de conscience et neutralité religieuse de l'État","La liberté de la presse"],"explain":"La loi de 1905 fonde la laïcité. La liberté de la presse (1881), l'école gratuite (lois Ferry, années 1880) sont d'autres lois républicaines.","verif":"Vérifie dans ton cours ce que la laïcité garantit et ce qu'elle n'interdit pas.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre République repensée)"},{"q":"Quelle grande avancée sociale est créée en France en 1945 ?","good":"La Sécurité sociale","choices":["La semaine de 35 heures","La Sécurité sociale","Le droit de vote des femmes","Les congés payés"],"explain":"La Sécurité sociale est créée en 1945 (programme du CNR). Les congés payés datent de 1936, les 35 heures de 1998-2000.","verif":"Dans ton cours, relie la Sécurité sociale (1945) au programme de la Résistance (CNR).","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre République repensée)"}],"court":[{"q":"En quelle année les femmes obtiennent-elles le droit de vote en France ?","sol":"En 1944.","kw":["1944"],"explain":"Contexte : GPRF, Sécurité sociale, IVe/Ve République, suffrage universel direct, loi Veil, décentralisation. · À éviter : Confondre IVe et Ve République ; tout ramener à de Gaulle.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre République repensée)"},{"q":"En quelle année commence la Ve République ?","sol":"En 1958.","kw":["1958"],"explain":"Contexte : GPRF, Sécurité sociale, IVe/Ve République, suffrage universel direct, loi Veil, décentralisation. · À éviter : Confondre IVe et Ve République ; tout ramener à de Gaulle.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre République repensée)"},{"q":"Quelle réforme électorale a lieu en 1962 ?","sol":"Le président élu au suffrage universel direct.","kw":["président","suffrage","universel","direct"],"explain":"Contexte : GPRF, Sécurité sociale, IVe/Ve République, suffrage universel direct, loi Veil, décentralisation. · À éviter : Confondre IVe et Ve République ; tout ramener à de Gaulle.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre République repensée)"},{"q":"À quoi correspond la loi Veil de 1975 ?","sol":"Le droit à l'IVG (droits des femmes).","kw":["droits","femmes"],"explain":"Contexte : GPRF, Sécurité sociale, IVe/Ve République, suffrage universel direct, loi Veil, décentralisation. · À éviter : Confondre IVe et Ve République ; tout ramener à de Gaulle.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre République repensée)"},{"q":"En quelle année la peine de mort est-elle abolie ?","sol":"En 1981.","kw":["1981"],"explain":"Contexte : GPRF, Sécurité sociale, IVe/Ve République, suffrage universel direct, loi Veil, décentralisation. · À éviter : Confondre IVe et Ve République ; tout ramener à de Gaulle.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre République repensée)"}],"paper":{"consigne":"Écris 8 lignes : la République se reconstruit (1944-47) ET s'adapte (grandes lois de société).","grille":["Refondation + Ve République.","1944-47 (vote des femmes, Sécu) + Ve République 1958.","Ajoute les grandes lois de société (Veil 1975, peine de mort 1981) et la transformation sociale."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/histoire"},"exos":[{"consigne":"Écris 8 lignes : la République se reconstruit (1944-47) ET s'adapte (grandes lois de société).","min":"Refondation + Ve République.","solide":"1944-47 (vote des femmes, Sécu) + Ve République 1958.","mention":"Introduction : à partir de 1944, la République française se reconstruit après l'épreuve de la guerre, puis s'adapte aux évolutions de la société. On peut le montrer en deux temps.\n\nLa refondation (1944-1947). À la Libération, la République est rétablie. Des avancées majeures sont mises en place : les femmes obtiennent le droit de vote en 1944 et votent pour la première fois en 1945 ; la Sécurité sociale est créée en 1945 pour protéger les citoyens. En 1958 est fondée la Ve République, encore en vigueur aujourd'hui.\n\nL'adaptation par les lois de société. La République évolue ensuite pour accompagner les transformations sociales. De grandes lois élargissent les droits : la loi Veil, en 1975, légalise l'interruption volontaire de grossesse ; la peine de mort est abolie en 1981. Ces lois traduisent une société qui change et une République qui se repense.\n\nConclusion : de la refondation d'après-guerre aux grandes lois de société, la République française s'est à la fois reconstruite et adaptée, en élargissant progressivement les droits et les libertés des citoyens."},{"consigne":"Développement construit (8 lignes). « Comment les femmes obtiennent-elles l'égalité des droits dans la France de la seconde moitié du XXe siècle ? » Donne des exemples de conquêtes.","min":"Droit de vote des femmes en 1944 (premier vote en 1945). Puis évolutions : accès au travail, autorité partagée, loi sur la contraception, loi Veil de 1975 sur l'IVG, lois sur l'égalité professionnelle.","solide":"Introduction : dans la seconde moitié du XXe siècle, les femmes françaises conquièrent progressivement l'égalité des droits.\nIdée 1 : les droits politiques. Les femmes obtiennent le droit de vote en 1944 et votent pour la première fois en 1945 : elles deviennent des citoyennes à part entière.\nIdée 2 : les droits civils et sociaux. Elles gagnent en autonomie : maîtrise de la contraception, loi Veil de 1975 légalisant l'IVG, lois pour l'égalité professionnelle entre hommes et femmes.\nConclusion : par étapes, les femmes accèdent à une égalité des droits, même si des inégalités subsistent.","mention":"Introduction : dans la seconde moitié du XXe siècle, la République française se transforme et les femmes y conquièrent progressivement l'égalité des droits, dans le domaine politique comme dans la vie sociale. Comment cette égalité est-elle obtenue ?\n\nPremière idée : la conquête des droits politiques. Les femmes obtiennent le droit de vote en 1944 et l'exercent pour la première fois en 1945. Elles deviennent ainsi des citoyennes à part entière, pouvant voter et être élues, alors qu'elles en étaient jusque-là exclues.\n\nSeconde idée : la conquête des droits civils et sociaux. Au fil des décennies, les femmes gagnent en autonomie et en égalité : accès plus large au travail, partage de l'autorité dans la famille, maîtrise de la contraception, puis la loi Veil de 1975 qui légalise l'interruption volontaire de grossesse (IVG). Des lois sont également votées pour favoriser l'égalité professionnelle.\n\nConclusion : par étapes successives, du droit de vote en 1944 aux lois sur l'égalité, les femmes accèdent à l'égalité des droits dans une République repensée. Cette égalité de droit reste néanmoins à compléter, des inégalités subsistant dans les faits."},{"consigne":"Repères et notions. 1) En quelle année les femmes obtiennent-elles le droit de vote en France ? 2) Que permet la loi Veil de 1975 ? 3) Qu'est-ce que la laïcité ?","min":"1) 1944 (premier vote en 1945). 2) La loi Veil de 1975 légalise l'IVG (interruption volontaire de grossesse). 3) La laïcité est la séparation des religions et de l'État, qui garantit la liberté de conscience et la neutralité de l'État.","solide":"1) Les femmes obtiennent le droit de vote en 1944 et votent pour la première fois en 1945.\n2) La loi Veil de 1975 légalise l'interruption volontaire de grossesse (IVG).\n3) La laïcité est le principe de séparation des religions et de l'État : l'État est neutre en matière de religion et garantit à chacun la liberté de croire ou de ne pas croire.","mention":"1) Le droit de vote des femmes.\nLes femmes obtiennent le droit de vote en France en 1944, et l'exercent pour la première fois lors des élections de 1945. C'est une étape majeure vers l'égalité politique.\n\n2) La loi Veil de 1975.\nLa loi Veil, votée en 1975 et portée par Simone Veil, légalise l'interruption volontaire de grossesse (IVG). Elle marque une avancée importante des droits des femmes à disposer de leur corps.\n\n3) La laïcité.\nLa laïcité est le principe de séparation des religions et de l'État. Elle garantit la neutralité de l'État à l'égard des religions et assure à chacun la liberté de conscience, c'est-à-dire la liberté de croire, de changer de croyance ou de ne pas croire.\n\nConclusion : les femmes votent à partir de 1944-1945, la loi Veil de 1975 légalise l'IVG, et la laïcité garantit la séparation des religions et de l'État. Ces éléments illustrent une République qui se repense pour étendre les droits et les libertés."}],"parcours":{"mission":"À la fin, tu sais expliquer comment la République se reconstruit et évolue depuis 1944.","froid":[{"q":"En quelle année les femmes obtiennent-elles le droit de vote en France ?","rep":"En 1944."},{"q":"En quelle année commence la Ve République ?","rep":"En 1958."},{"q":"Quelle réforme électorale a lieu en 1962 ?","rep":"Le président élu au suffrage universel direct."},{"q":"À quoi correspond la loi Veil de 1975 ?","rep":"Le droit à l'IVG (droits des femmes)."},{"q":"En quelle année la peine de mort est-elle abolie ?","rep":"En 1981."}],"coffre":[{"q":"À la Libération, on rétablit la ____","rep":"…République."},{"q":"Grande avancée sociale de 1945 : la ____","rep":"Sécurité sociale."},{"q":"La Ve République (1958) renforce le pouvoir ____","rep":"exécutif (le président)."},{"q":"Différence IVe / Ve République : la Ve a un président ____","rep":"…central / élu au suffrage universel."},{"q":"Trois grandes lois de société : ____, ____, ____","rep":"loi Veil 1975, abolition peine de mort 1981, majorité à 18 ans 1974 (au choix)."}],"frise":[["1944","femmes"],["1945","Sécurité sociale"],["1958","Ve"],["1981","peine de mort"]],"oral":"Explique en 90 secondes la différence entre la IVe et la Ve République.","ecrit":{"consigne":"Écris 8 lignes : la République se reconstruit (1944-47) ET s'adapte (grandes lois de société).","min":"Refondation + Ve République.","solide":"1944-47 (vote des femmes, Sécu) + Ve République 1958.","mention":"Ajoute les grandes lois de société (Veil 1975, peine de mort 1981) et la transformation sociale."},"oralRedige":"Au XXe siècle, la République française évolue et devient plus égalitaire. Une avancée majeure est le droit de vote accordé aux femmes en 1944 : elles votent pour la première fois en 1945, alors que les hommes votaient déjà depuis 1848. En 1945, la Sécurité sociale est créée pour protéger tous les citoyens. En 1958, la Ve République est fondée, et c'est encore notre régime aujourd'hui. La République repose aussi sur la laïcité, établie par la loi de 1905. Au fil du temps, la République s'est donc adaptée pour mieux garantir l'égalité et les droits de chacun.","ecritRedige":{"min":"La République française change au XXe siècle. En 1944, les femmes obtiennent le droit de vote. En 1945, la Sécurité sociale est créée. En 1958, la Ve République est fondée. La laïcité date de la loi de 1905.","solide":"Au cours du XXe siècle, la République française se transforme pour devenir plus juste et plus égalitaire. Une étape essentielle est le droit de vote accordé aux femmes en 1944, qui votent pour la première fois en 1945 : la démocratie devient alors réellement universelle. En 1945, la création de la Sécurité sociale protège les citoyens face à la maladie et à la vieillesse. En 1958, la Ve République est fondée et reste le régime actuel. La République s'appuie aussi sur la laïcité, instaurée par la loi de 1905.","mention":"Au XXe siècle, la République française est « repensée » : elle se réforme pour étendre les droits et renforcer l'égalité entre les citoyens. Sur le plan politique, l'avancée la plus importante est l'obtention du droit de vote par les femmes, accordé par l'ordonnance de 1944, qui leur permet de voter pour la première fois en 1945 : la République devient alors pleinement démocratique, alors que le suffrage universel masculin existait depuis 1848. Sur le plan social, le programme du Conseil national de la Résistance aboutit en 1945 à la création de la Sécurité sociale, qui protège l'ensemble de la population. Sur le plan institutionnel, la Ve République, fondée en 1958, met fin à l'instabilité de la IVe et constitue encore aujourd'hui notre régime. Enfin, la République repose sur des principes hérités du début du siècle, notamment la laïcité instaurée par la loi de séparation des Églises et de l'État de 1905. Ces évolutions montrent une République qui s'adapte pour mieux garantir les droits de chacun."},"carte":"Frise mémoire : 1944 → 1982, place les avancées politiques et sociales.","motscles":"GPRF, Sécurité sociale, IVe/Ve République, suffrage universel direct, loi Veil, décentralisation.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre République repensée)"}},{"id":"G1","matiere":"geo","titre":"Aires urbaines et métropolisation","objectif":"À la fin, tu sais expliquer comment les villes transforment le territoire français.","qcm":[{"q":"Que désigne exactement une aire urbaine ?","good":"Un ensemble formé d'une ville-centre, de sa banlieue et de la couronne périurbaine reliées par les déplacements domicile-travail","choices":["Un parc naturel régional","Une commune isolée à la campagne","Un ensemble formé d'une ville-centre, de sa banlieue et de la couronne périurbaine reliées par les déplacements domicile-travail","Une zone uniquement industrielle"],"explain":"L'aire urbaine se définit par les migrations pendulaires : les habitants de la périphérie viennent travailler dans le pôle urbain.","verif":"Dans ton cours, repère le schéma d'une aire urbaine (ville-centre, banlieue, couronne périurbaine).","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aires urbaines)"},{"q":"Qu'est-ce que la métropolisation ?","good":"La concentration croissante des populations, des activités et des fonctions de commandement dans les grandes villes","choices":["L'abandon progressif des grandes villes","La concentration croissante des populations, des activités et des fonctions de commandement dans les grandes villes","La disparition des transports en commun","Le retour massif des habitants à la campagne"],"explain":"La métropolisation renforce le poids des métropoles, qui concentrent emplois qualifiés, sièges sociaux, universités, innovation et pouvoir de décision.","verif":"Vérifie dans ton cours les fonctions qui font la puissance d'une métropole.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aires urbaines)"},{"q":"Pourquoi Paris est-elle qualifiée de métropole de rang mondial ?","good":"Parce qu'elle concentre des fonctions de commandement et un rayonnement à l'échelle de la planète","choices":["Parce qu'elle est la seule ville de France","Parce qu'elle n'a aucune banlieue","Parce qu'elle concentre des fonctions de commandement et un rayonnement à l'échelle de la planète","Parce qu'elle est entourée de montagnes"],"explain":"Paris (sièges, bourse, culture, transports internationaux) rayonne dans le monde entier, contrairement aux métropoles régionales comme Lyon ou Marseille.","verif":"Dans ton cours, compare Paris (rang mondial) et une métropole régionale.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aires urbaines)"},{"q":"Qui habite surtout l'espace périurbain autour des villes ?","good":"Des ménages qui travaillent en ville mais résident en périphérie, souvent en maison individuelle","choices":["Aucun habitant","Des ménages qui travaillent en ville mais résident en périphérie, souvent en maison individuelle","Seulement des touristes de passage","Uniquement des agriculteurs"],"explain":"Le périurbain attire des ménages cherchant un logement plus grand : ils dépendent de la voiture pour rejoindre leur travail en ville (étalement urbain).","verif":"Retrouve dans ton cours la notion d'étalement urbain et ses conséquences.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aires urbaines)"}],"court":[{"q":"Quelles sont les 3 parties d'une aire urbaine ?","sol":"Ville-centre, banlieue, couronne périurbaine.","kw":["villecentre","banlieue","couronne","périurbaine"],"explain":"Contexte : aire urbaine, métropole, métropolisation, périurbanisation, mobilité pendulaire, étalement. · À éviter : Réduire l'aire urbaine au seul centre-ville.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aires urbaines)"},{"q":"Qu'est-ce qu'une mobilité pendulaire ?","sol":"Le déplacement quotidien domicile-travail/études.","kw":["déplacement","quotidien","domiciletravailétudes"],"explain":"Contexte : aire urbaine, métropole, métropolisation, périurbanisation, mobilité pendulaire, étalement. · À éviter : Réduire l'aire urbaine au seul centre-ville.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aires urbaines)"},{"q":"Que veut dire « périurbanisation » ?","sol":"L'extension de l'habitat autour des villes.","kw":["lextension","lhabitat","autour","villes"],"explain":"Contexte : aire urbaine, métropole, métropolisation, périurbanisation, mobilité pendulaire, étalement. · À éviter : Réduire l'aire urbaine au seul centre-ville.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aires urbaines)"},{"q":"Cite une grande métropole française.","sol":"Paris, Lyon, Marseille, Toulouse… (au choix).","kw":["paris","lyon","marseille","toulouse"],"explain":"Contexte : aire urbaine, métropole, métropolisation, périurbanisation, mobilité pendulaire, étalement. · À éviter : Réduire l'aire urbaine au seul centre-ville.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aires urbaines)"},{"q":"Cite un problème causé par l'étalement urbain.","sol":"Étalement, transports, pollution, prix du logement.","kw":["étalement","transports","pollution","logement"],"explain":"Contexte : aire urbaine, métropole, métropolisation, périurbanisation, mobilité pendulaire, étalement. · À éviter : Réduire l'aire urbaine au seul centre-ville.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre aires urbaines)"}],"paper":{"consigne":"Écris 8 lignes : comment la métropolisation transforme le territoire (avantages + problèmes). Cite une métropole.","grille":["Métropoles attractives + périurbanisation.","Attractivité + étalement + mobilités + 1 métropole.","Ajoute les inégalités centre/banlieue/périurbain et un enjeu environnemental."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/geographie"},"exos":[{"consigne":"Écris 8 lignes : comment la métropolisation transforme le territoire (avantages + problèmes). Cite une métropole.","min":"Métropoles attractives + périurbanisation.","solide":"Attractivité + étalement + mobilités + 1 métropole.","mention":"Introduction : la métropolisation est la concentration croissante de la population et des activités dans les grandes villes, les métropoles. Elle transforme profondément le territoire français, avec des avantages mais aussi des problèmes.\n\nLes avantages. La métropole concentre les emplois, les services, les universités et les fonctions de commandement, ce qui la rend très attractive. Elle est bien reliée au reste du monde par les transports et les réseaux. La métropole de Lyon, par exemple, attire entreprises et habitants par son dynamisme économique.\n\nLes problèmes. Cette concentration provoque un fort étalement urbain : la ville s'étend toujours plus loin, sur les espaces agricoles et naturels. Elle engendre d'importantes mobilités quotidiennes (domicile-travail) et des embouteillages. Elle creuse aussi des inégalités entre la ville-centre, les banlieues et les espaces périurbains, et pose des enjeux environnementaux (pollution, artificialisation des sols).\n\nConclusion : la métropolisation rend les grandes villes attractives et dynamiques, mais elle accentue l'étalement urbain, les mobilités et les inégalités au sein du territoire. Elle constitue un défi majeur d'aménagement."},{"consigne":"Développement construit (8 lignes). « Qu'est-ce qu'une aire urbaine et comment s'organise-t-elle ? » Donne un exemple et utilise les mots ville-centre, banlieue, couronne périurbaine.","min":"Une aire urbaine = une ville-centre + sa banlieue + une couronne périurbaine, reliées par les déplacements quotidiens (travail). Exemple : l'aire urbaine de Paris. La population et les activités s'y concentrent.","solide":"Introduction : une aire urbaine est un vaste espace organisé autour d'une grande ville, où se concentrent population et activités.\nIdée 1 : son organisation. Elle se compose d'une ville-centre, d'une banlieue qui l'entoure, et d'une couronne périurbaine plus éloignée. Ces espaces sont reliés par les déplacements quotidiens (les habitants de la périphérie travaillent souvent dans la ville-centre).\nIdée 2 : son rôle. L'aire urbaine concentre emplois, services et commerces ; elle s'étale de plus en plus, ce qui pose des enjeux de transport. Exemple : l'aire urbaine de Paris.\nConclusion : l'aire urbaine traduit l'attractivité et l'étalement des grandes villes françaises.","mention":"Introduction : une aire urbaine est un vaste territoire organisé autour d'une grande ville, dans lequel se concentrent la population, les emplois et les activités. On peut se demander comment elle s'organise.\n\nPremière idée : l'organisation en trois espaces. Au cœur se trouve la ville-centre, la commune principale qui rassemble de nombreux emplois et services. Elle est entourée de la banlieue, les communes proches densément peuplées. Au-delà s'étend la couronne périurbaine, plus éloignée et moins dense, où vivent des habitants qui travaillent dans la ville-centre. Ces espaces sont reliés par d'importants déplacements quotidiens, notamment domicile-travail.\n\nSeconde idée : un espace attractif et qui s'étale. L'aire urbaine concentre les emplois, les commerces et les services, ce qui la rend attractive. Elle tend à s'étendre toujours plus loin (étalement urbain), ce qui engendre des enjeux de transport et d'environnement. L'aire urbaine de Paris en est l'exemple le plus marquant en France.\n\nConclusion : organisée autour d'une ville-centre prolongée par sa banlieue et sa couronne périurbaine, l'aire urbaine illustre la concentration des hommes et des activités, ainsi que l'étalement croissant des villes françaises."},{"consigne":"Vocabulaire et notions. Définis en une phrase chacun de ces mots : 1) métropolisation. 2) étalement urbain. 3) couronne périurbaine.","min":"1) Métropolisation : concentration croissante de la population et des activités dans les grandes villes. 2) Étalement urbain : extension de la ville sur les espaces alentour. 3) Couronne périurbaine : espace éloigné de la ville-centre dont les habitants y travaillent.","solide":"1) La métropolisation est le processus de concentration croissante de la population, des activités et des fonctions de commandement dans les grandes villes (les métropoles).\n2) L'étalement urbain est l'extension de la ville sur les espaces qui l'entourent (campagnes, périphéries).\n3) La couronne périurbaine est l'espace situé en périphérie de l'aire urbaine, peu dense, dont une partie des habitants travaillent dans la ville-centre.","mention":"L'exercice vérifie la maîtrise du vocabulaire de la géographie urbaine.\n\n1) La métropolisation.\nC'est le processus par lequel la population, les activités économiques et les fonctions de commandement (entreprises, décisions, services) se concentrent de plus en plus dans les grandes villes appelées métropoles. Ces métropoles deviennent les centres majeurs du territoire.\n\n2) L'étalement urbain.\nC'est l'extension progressive de la ville sur les espaces qui l'entourent, comme les campagnes et les périphéries. Il se traduit par la construction de logements, de zones commerciales et de routes toujours plus loin du centre.\

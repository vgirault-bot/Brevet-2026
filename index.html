<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#FBFAF7"/>
<title>Brevet Quest · révise en jouant</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#15161B;--grey:#5B6270;--line:#E4E5EC;--paper:#FBFAF7;--gold:#D9A407;--goldbg:#FFF6DE;
--ok:#16A34A;--okbg:#E7F8ED;--bad:#DC2626;--badbg:#FDEAEA;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;color:var(--ink);background:var(--paper);line-height:1.5;-webkit-font-smoothing:antialiased;
background-image:radial-gradient(circle at 10% 5%,rgba(37,99,235,.05),transparent 36%),radial-gradient(circle at 92% 2%,rgba(220,38,38,.05),transparent 32%)}
h1,h2,h3,.serif{font-family:'Fraunces',serif}
.wrap{max-width:680px;margin:0 auto;padding:0 16px 90px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.hidden{display:none!important}

/* HUD */
.hud{position:sticky;top:0;z-index:40;background:rgba(251,250,247,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:10px 0}
.hud .inner{max-width:680px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:12px}
.hud .home{font-weight:900;font-family:'Fraunces';font-size:18px;color:var(--ink)}
.hud .stats{margin-left:auto;display:flex;gap:10px;font-weight:800;font-size:14px}
.hud .stat{display:flex;align-items:center;gap:4px}
.lvlbar{height:8px;background:#ECEDF2;border-radius:999px;overflow:hidden;margin-top:8px}
.lvlbar .f{height:100%;background:linear-gradient(90deg,#2563EB,#16A34A,#EA580C);width:0;transition:width .5s}

/* HERO / hub */
.hero{text-align:center;padding:30px 0 8px}
.hero .kick{display:inline-block;font-weight:800;font-size:11px;letter-spacing:.16em;color:#fff;background:var(--ink);padding:6px 14px;border-radius:999px;transform:rotate(-2deg)}
.hero h1{font-size:clamp(34px,10vw,54px);margin:14px 0 4px;letter-spacing:-.02em}
.hero h1 .hl{background:linear-gradient(180deg,transparent 58%,#FFE08A 58%);padding:0 .08em}
.hero p{color:var(--grey);font-weight:600;margin:0}
.countdown{display:inline-block;margin-top:12px;font-weight:800;color:#fff;background:var(--bad);padding:8px 16px;border-radius:999px;font-size:14px}

/* cartes matières */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:22px 0}
.mcard{--mc:#000;--mb:#eee;border:1.5px solid var(--line);border-left:6px solid var(--mc);border-radius:16px;background:#fff;padding:15px;text-align:left;box-shadow:0 8px 22px -16px rgba(0,0,0,.3);transition:transform .15s}
.mcard:active{transform:scale(.98)}
.mcard .top{display:flex;align-items:center;gap:9px}
.mcard .pic{font-size:26px}
.mcard .nom{font-weight:800;font-size:16px}
.mcard .meta{color:var(--grey);font-size:12.5px;font-weight:600;margin-top:6px}
.mcard .pg{height:7px;background:#ECEDF2;border-radius:999px;overflow:hidden;margin-top:9px}
.mcard .pg .f{height:100%;background:var(--mc);width:0;border-radius:999px}
.mcard .stars{margin-top:7px;font-size:13px;color:var(--gold);font-weight:800}

/* boutons modes */
.modes{display:flex;flex-direction:column;gap:10px;margin:18px 0}
.modebtn{--mc:#2563EB;display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-left:6px solid var(--mc);border-radius:14px;background:#fff;padding:14px 16px;text-align:left;box-shadow:0 6px 18px -14px rgba(0,0,0,.3)}
.modebtn:active{transform:scale(.99)}
.modebtn .e{font-size:24px;flex:0 0 auto}
.modebtn b{font-size:16px;display:block}
.modebtn span{color:var(--grey);font-size:13px;font-weight:600}

/* session timer */
.timer{position:sticky;top:54px;z-index:30;background:rgba(251,250,247,.95);padding:8px 0}
.timer .bar{height:10px;border-radius:999px;background:#ECEDF2;overflow:hidden}
.timer .bar .f{height:100%;border-radius:999px;background:linear-gradient(90deg,#16A34A,#EA580C,#DC2626);width:100%;transition:width 1s linear}
.timer .lab{display:flex;justify-content:space-between;font-weight:800;font-size:13px;margin-top:5px}

/* question card */
.qcard{background:#fff;border:1.5px solid var(--line);border-radius:18px;padding:20px;margin:14px 0;box-shadow:0 10px 28px -18px rgba(0,0,0,.3)}
.qtag{font-weight:800;font-size:11px;letter-spacing:.1em;color:var(--grey)}
.qbody{font-size:19px;font-weight:600;margin:8px 0 16px;line-height:1.4}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{border:2px solid var(--line);border-radius:13px;padding:13px 15px;font-size:15px;font-weight:600;text-align:left;background:#fff;transition:all .12s}
.choice:active{transform:scale(.99)}
.choice.good{border-color:var(--ok);background:var(--okbg);color:#0F6B34}
.choice.bad{border-color:var(--bad);background:var(--badbg);color:#9C2C2C}
.choice.dim{opacity:.5}
.tinput{width:100%;border:2px solid var(--line);border-radius:13px;padding:13px 15px;font-size:16px;font-family:inherit}
.tinput:focus{outline:none;border-color:#2563EB}
.bigarea{width:100%;min-height:140px;border:2px solid var(--line);border-radius:13px;padding:13px 15px;font-size:15px;font-family:inherit;resize:vertical;line-height:1.6}
.bigarea:focus{outline:none;border-color:#2563EB}
.primary{display:block;width:100%;margin-top:14px;background:var(--ink);color:#fff;font-weight:800;font-size:16px;padding:14px;border-radius:13px}
.primary:active{transform:scale(.99)}
.ghost{display:block;width:100%;margin-top:10px;border:1.5px solid var(--line);color:var(--grey);font-weight:700;padding:11px;border-radius:13px;background:#fff}

/* feedback */
.fb{border-radius:13px;padding:13px 15px;margin-top:14px;font-weight:600;font-size:14.5px}
.fb.ok{background:var(--okbg);border:1.5px solid var(--ok);color:#0F6B34}
.fb.bad{background:var(--badbg);border:1.5px solid var(--bad);color:#9C2C2C}
.fb .sol{display:block;margin-top:6px;font-weight:700;color:var(--ink)}
.combo{position:fixed;top:30%;left:50%;transform:translateX(-50%);font-family:'Fraunces';font-weight:900;font-size:44px;color:var(--gold);pointer-events:none;opacity:0;z-index:60;text-shadow:0 2px 0 rgba(0,0,0,.1)}
.combo.show{animation:pop 1s ease}
@keyframes pop{0%{opacity:0;transform:translateX(-50%) scale(.5)}25%{opacity:1;transform:translateX(-50%) scale(1.15)}100%{opacity:0;transform:translateX(-50%) scale(1) translateY(-40px)}}

/* paper mode */
.paper{background:var(--goldbg);border:1.5px solid var(--gold);border-radius:14px;padding:16px;margin:14px 0}
.paper .doc{background:#fff;border:1.5px solid #E7D9A0;border-radius:11px;padding:14px;margin:10px 0;font-size:15px;line-height:1.6}
.paper .doc p{margin:0 0 10px}.paper .doc p:last-child{margin:0}
.paper .aide{font-size:13px;color:#8A6D1B;font-weight:600;margin-top:8px}
.grille{background:var(--okbg);border:1.5px solid var(--ok);border-radius:12px;padding:13px 15px;margin-top:12px}
.grille b{color:#0F6B34}
.selfscore{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.ssbtn{flex:1;min-width:90px;border:2px solid var(--line);border-radius:12px;padding:11px;font-weight:700;font-size:13px;background:#fff;text-align:center}
.ssbtn.sel{border-color:#2563EB;background:#EAF1FF}

/* résultats */
.result{text-align:center;padding:30px 0}
.result .big{font-family:'Fraunces';font-weight:900;font-size:60px;color:var(--gold)}
.result h2{font-size:30px;margin:6px 0}
.result .line{color:var(--grey);font-weight:600;margin:4px 0}
.badge{display:inline-block;margin:12px 6px 0;background:var(--goldbg);border:1.5px solid var(--gold);color:#7A610F;font-weight:800;padding:8px 14px;border-radius:999px;font-size:14px}

/* divers */
.section-title{font-family:'Fraunces';font-weight:900;font-size:24px;margin:24px 0 4px}
.muted{color:var(--grey);font-weight:600;font-size:14px;margin:0 0 8px}
.backrow{display:flex;gap:8px;margin:14px 0 0}
.streakflame{color:#EA580C}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-weight:700;padding:11px 18px;border-radius:999px;font-size:14px;opacity:0;transition:opacity .3s;z-index:70}
.toast.show{opacity:1}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:50}
.tabbar button{flex:1;padding:10px 0 12px;font-weight:700;font-size:11px;color:var(--grey);display:flex;flex-direction:column;align-items:center;gap:3px}
.tabbar button.on{color:#2563EB}
.tabbar .ti{font-size:20px}
</style>

, cybersécurité, engagement, intérêt général. · À éviter : Réduire la défense à la guerre et à l'armée.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (défense et sécurité)"},{"q":"Cite un acteur de la sécurité civile.","sol":"Pompiers, secouristes, associations agréées (au choix).","kw":["pompiers","secouristes","associations","agréées"],"explain":"Contexte : défense nationale, sécurité civile, réserve, cybersécurité, engagement, intérêt général. · À éviter : Réduire la défense à la guerre et à l'armée.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (défense et sécurité)"},{"q":"Cite une menace contemporaine.","sol":"Terrorisme, cyberattaque, catastrophe, crise sanitaire (au choix).","kw":["terrorisme","cyberattaque","catastrophe","sanitaire"],"explain":"Contexte : défense nationale, sécurité civile, réserve, cybersécurité, engagement, intérêt général. · À éviter : Réduire la défense à la guerre et à l'armée.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (défense et sécurité)"},{"q":"La défense concerne-t-elle seulement les militaires ?","sol":"Non, elle concerne aussi les citoyens et la sécurité civile.","kw":["non","concerne","citoyens","sécurité"],"explain":"Contexte : défense nationale, sécurité civile, réserve, cybersécurité, engagement, intérêt général. · À éviter : Réduire la défense à la guerre et à l'armée.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (défense et sécurité)"},{"q":"Qu'est-ce que l'engagement citoyen ?","sol":"Une action volontaire au service de l'intérêt général.","kw":["une","action","volontaire","service"],"explain":"Contexte : défense nationale, sécurité civile, réserve, cybersécurité, engagement, intérêt général. · À éviter : Réduire la défense à la guerre et à l'armée.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (défense et sécurité)"}],"paper":{"consigne":"Méthode EMC. Une cyberattaque touche ton collège. En 6 lignes : 1) l'enjeu, 2) les acteurs, 3) la conduite responsable.","grille":["Enjeu + conduite.","Enjeu + acteurs + conduite responsable.","Élargit la défense à la cybersécurité et à la sécurité civile, conduite précise."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique"}}],"mpc":[{"id":"M1","matiere":"maths","titre":"Calcul littéral : développer et factoriser","objectif":"Développer une expression et reconnaître une factorisation, sans erreur de signe.","retiens":["Développer = enlever les parenthèses. Double distributivité : (a+b)(c+d) = ac + ad + bc + bd.","Identité utile : a² − b² = (a − b)(a + b).","Factoriser = écrire sous forme de produit. On cherche un facteur commun ou une identité."],"formules":["(a+b)(c+d) = ac + ad + bc + bd","a² − b² = (a − b)(a + b)"],"resolu":{"enonce":"Développer (2x + 3)(x − 5).","etapes":["J'applique la double distributivité : (2x)(x) + (2x)(−5) + (3)(x) + (3)(−5).","Je calcule chaque produit : 2x² − 10x + 3x − 15.","Je réduis les termes semblables : 2x² − 7x − 15."],"resultat":"2x² − 7x − 15"},"exact":[{"q":"Développe (x + 4)(x + 2).","sol":"x² + 6x + 8","detail":"(x+4)(x+2) = x² + 2x + 4x + 8 = x² + 6x + 8.","explain":"Méthode : (x+4)(x+2) = x² + 2x + 4x + 8 = x² + 6x + 8.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Développe (3x − 1)(2x + 5).","sol":"6x² + 13x − 5","detail":"(3x−1)(2x+5) = 6x² + 15x − 2x − 5 = 6x² + 13x − 5.","explain":"Méthode : (3x−1)(2x+5) = 6x² + 15x − 2x − 5 = 6x² + 13x − 5.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Factorise 9x² − 25 (pense à l'identité a² − b²).","sol":"(3x − 5)(3x + 5)","detail":"9x² − 25 = (3x)² − 5² = (3x − 5)(3x + 5) (identité a² − b²).","explain":"Méthode : 9x² − 25 = (3x)² − 5² = (3x − 5)(3x + 5) (identité a² − b²).","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"qcm":[{"q":"Développe (x + 4)(x + 2).","good":"x² + 6x + 8","choices":["80 km/h","f(5) = 15 ; linéaire","2/3","x² + 6x + 8"],"explain":"Méthode : (x+4)(x+2) = x² + 2x + 4x + 8 = x² + 6x + 8.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Développe (3x − 1)(2x + 5).","good":"6x² + 13x − 5","choices":["10 cm","≈ 904,8 cm³","6x² + 13x − 5","BC = 12 cm"],"explain":"Méthode : (3x−1)(2x+5) = 6x² + 15x − 2x − 5 = 6x² + 13x − 5.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Factorise 9x² − 25 (pense à l'identité a² − b²).","good":"(3x − 5)(3x + 5)","choices":["10³ = 1000","x = 5","(3x − 5)(3x + 5)","BC = 12 cm"],"explain":"Méthode : 9x² − 25 = (3x)² − 5² = (3x − 5)(3x + 5) (identité a² − b²).","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"paper":{"consigne":"Refais les exercices de ce chapitre sur papier, pose tes calculs, puis vérifie.","grille":["(x+4)(x+2) = x² + 2x + 4x + 8 = x² + 6x + 8.","(3x−1)(2x+5) = 6x² + 15x − 2x − 5 = 6x² + 13x − 5.","9x² − 25 = (3x)² − 5² = (3x − 5)(3x + 5) (identité a² − b²)."],"type":"calcul","minutes":12,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"}},{"id":"M2","matiere":"maths","titre":"Équations du premier degré et équations-produits","objectif":"Résoudre 3x + 7 = 19 et une équation-produit (x−a)(x−b)=0.","retiens":["Résoudre une équation = trouver la valeur de x qui rend l'égalité vraie.","On fait passer les nombres d'un côté, les x de l'autre, en faisant la même opération des deux côtés.","Équation-produit : un produit est nul si et seulement si l'un des facteurs est nul."],"formules":["Si A × B = 0  alors  A = 0  OU  B = 0"],"resolu":{"enonce":"Résoudre 3x + 7 = 19.","etapes":["Je retire 7 des deux côtés : 3x = 19 − 7, donc 3x = 12.","Je divise les deux côtés par 3 : x = 12 ÷ 3.","Je vérifie : 3 × 4 + 7 = 19. C'est correct."],"resultat":"x = 4"},"exact":[{"q":"Résous 5x − 3 = 22.","sol":"x = 5","detail":"5x − 3 = 22 → 5x = 25 → x = 5. Vérif : 5×5 − 3 = 22. ✓","explain":"Méthode : 5x − 3 = 22 → 5x = 25 → x = 5. Vérif : 5×5 − 3 = 22. ✓","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Résous 2x + 9 = 5x − 6.","sol":"x = 5","detail":"2x + 9 = 5x − 6 → 9 + 6 = 5x − 2x → 15 = 3x → x = 5.","explain":"Méthode : 2x + 9 = 5x − 6 → 9 + 6 = 5x − 2x → 15 = 3x → x = 5.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Résous l'équation-produit (x − 2)(x + 5) = 0.","sol":"x = 2 ou x = −5","detail":"(x − 2)(x + 5) = 0 → x − 2 = 0 ou x + 5 = 0 → x = 2 ou x = −5.","explain":"Méthode : (x − 2)(x + 5) = 0 → x − 2 = 0 ou x + 5 = 0 → x = 2 ou x = −5.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"qcm":[{"q":"Résous 5x − 3 = 22.","good":"x = 5","choices":["x = 5","AC = 7,5 cm","b = 1 ; a = 2","6 × 10⁷"],"explain":"Méthode : 5x − 3 = 22 → 5x = 25 → x = 5. Vérif : 5×5 − 3 = 22. ✓","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Résous 2x + 9 = 5x − 6.","good":"x = 5","choices":["AC = 7,5 cm","x = 5","6x² + 13x − 5","2/5"],"explain":"Méthode : 2x + 9 = 5x − 6 → 9 + 6 = 5x − 2x → 15 = 3x → x = 5.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Résous l'équation-produit (x − 2)(x + 5) = 0.","good":"x = 2 ou x = −5","choices":["105 €","x = 2 ou x = −5","25 %","b = 1 ; a = 2"],"explain":"Méthode : (x − 2)(x + 5) = 0 → x − 2 = 0 ou x + 5 = 0 → x = 2 ou x = −5.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"paper":{"consigne":"Refais les exercices de ce chapitre sur papier, pose tes calculs, puis vérifie.","grille":["5x − 3 = 22 → 5x = 25 → x = 5. Vérif : 5×5 − 3 = 22. ✓","2x + 9 = 5x − 6 → 9 + 6 = 5x − 2x → 15 = 3x → x = 5.","(x − 2)(x + 5) = 0 → x − 2 = 0 ou x + 5 = 0 → x = 2 ou x = −5."],"type":"calcul","minutes":12,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"}},{"id":"M3","matiere":"maths","titre":"Théorème de Pythagore","objectif":"Calculer une longueur dans un triangle rectangle et utiliser la réciproque.","retiens":["Le théorème de Pythagore s'utilise UNIQUEMENT dans un triangle rectangle.","Le côté le plus long, opposé à l'angle droit, s'appelle l'hypoténuse.","La réciproque sert à PROUVER qu'un triangle est rectangle : si le carré du plus grand côté = somme des carrés des deux autres, alors le triangle est rectangle."],"formules":["Dans un triangle rectangle : hypoténuse² = côté1² + côté2²","Réciproque : si c² = a² + b², le triangle est rectangle"],"resolu":{"enonce":"Un triangle rectangle a deux côtés de l'angle droit qui mesurent 3 cm et 4 cm. Calculer l'hypoténuse.","etapes":["Le triangle est rectangle, j'applique Pythagore : hyp² = 3² + 4².","Je calcule : hyp² = 9 + 16 = 25.","Je prends la racine carrée : hyp = √25 = 5."],"resultat":"hypoténuse = 5 cm"},"exact":[{"q":"Triangle rectangle, côtés de l'angle droit 6 cm et 8 cm. Calcule l'hypoténuse.","sol":"10 cm","detail":"hyp² = 6² + 8² = 36 + 64 = 100 → hyp = √100 = 10 cm.","explain":"Méthode : hyp² = 6² + 8² = 36 + 64 = 100 → hyp = √100 = 10 cm.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Un triangle a pour côtés 5 cm, 12 cm et 13 cm. Est-il rectangle ? Justifie avec la réciproque.","sol":"oui, rectangle","detail":"Plus grand côté : 13. On compare 13² et 5² + 12² : 169 et 25 + 144 = 169. Égalité → d'après la réciproque de Pythagore, le triangle est rectangle.","explain":"Méthode : Plus grand côté : 13. On compare 13² et 5² + 12² : 169 et 25 + 144 = 169. Égalité → d'après la réciproque de Pythagore, le triangle est rectangle.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"qcm":[{"q":"Triangle rectangle, côtés de l'angle droit 6 cm et 8 cm. Calcule l'hypoténuse.","good":"10 cm","choices":["x = 2 ou x = −5","10 cm","b = 1 ; a = 2","1/2"],"explain":"Méthode : hyp² = 6² + 8² = 36 + 64 = 100 → hyp = √100 = 10 cm.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Un triangle a pour côtés 5 cm, 12 cm et 13 cm. Est-il rectangle ? Justifie avec la réciproque.","good":"oui, rectangle","choices":["6x² + 13x − 5","≈ 5,77 cm","oui, rectangle","105 €"],"explain":"Méthode : Plus grand côté : 13. On compare 13² et 5² + 12² : 169 et 25 + 144 = 169. Égalité → d'après la réciproque de Pythagore, le triangle est rectangle.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"paper":{"consigne":"Refais les exercices de ce chapitre sur papier, pose tes calculs, puis vérifie.","grille":["hyp² = 6² + 8² = 36 + 64 = 100 → hyp = √100 = 10 cm.","Plus grand côté : 13. On compare 13² et 5² + 12² : 169 et 25 + 144 = 169. Égalité → d'après la réciproque de Pythagore, le triangle est rectangle."],"type":"calcul","minutes":12,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"}},{"id":"M4","matiere":"maths","titre":"Théorème de Thalès","objectif":"Calculer une longueur manquante grâce à l'égalité des rapports de Thalès.","retiens":["Le théorème de Thalès s'utilise dans une configuration de droites parallèles coupant deux droites sécantes (figure en « papillon » ou en « triangle »).","Il donne une égalité de trois rapports de longueurs.","Pour trouver une longueur inconnue, on utilise le produit en croix."],"formules":["Si (MN) ∥ (BC) :  AM/AB = AN/AC = MN/BC","Produit en croix : a/b = c/d  ⟺  a × d = b × c"],"resolu":{"enonce":"Dans une configuration de Thalès, AM = 3 cm, AB = 5 cm, AN = 4,2 cm. Calculer AC.","etapes":["J'écris l'égalité de Thalès : AM/AB = AN/AC, soit 3/5 = 4,2/AC.","Produit en croix : 3 × AC = 5 × 4,2 = 21.","Je divise par 3 : AC = 21 ÷ 3 = 7."],"resultat":"AC = 7 cm"},"exact":[{"q":"Configuration de Thalès : AM = 4, AB = 6, AN = 5. Calcule AC.","sol":"AC = 7,5 cm","detail":"AM/AB = AN/AC → 4/6 = 5/AC → 4 × AC = 6 × 5 = 30 → AC = 30 ÷ 4 = 7,5 cm.","explain":"Méthode : AM/AB = AN/AC → 4/6 = 5/AC → 4 × AC = 6 × 5 = 30 → AC = 30 ÷ 4 = 7,5 cm.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Configuration de Thalès : AM = 2, AB = 8, MN = 3. Calcule BC.","sol":"BC = 12 cm","detail":"AM/AB = MN/BC → 2/8 = 3/BC → 2 × BC = 8 × 3 = 24 → BC = 12 cm.","explain":"Méthode : AM/AB = MN/BC → 2/8 = 3/BC → 2 × BC = 8 × 3 = 24 → BC = 12 cm.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"qcm":[{"q":"Configuration de Thalès : AM = 4, AB = 6, AN = 5. Calcule AC.","good":"AC = 7,5 cm","choices":["AC = 7,5 cm","b = 1 ; a = 2","x = 5","f(5) = 15 ; linéaire"],"explain":"Méthode : AM/AB = AN/AC → 4/6 = 5/AC → 4 × AC = 6 × 5 = 30 → AC = 30 ÷ 4 = 7,5 cm.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Configuration de Thalès : AM = 2, AB = 8, MN = 3. Calcule BC.","good":"BC = 12 cm","choices":["AC = 7,5 cm","BC = 12 cm","10 cm","30°"],"explain":"Méthode : AM/AB = MN/BC → 2/8 = 3/BC → 2 × BC = 8 × 3 = 24 → BC = 12 cm.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"paper":{"consigne":"Refais les exercices de ce chapitre sur papier, pose tes calculs, puis vérifie.","grille":["AM/AB = AN/AC → 4/6 = 5/AC → 4 × AC = 6 × 5 = 30 → AC = 30 ÷ 4 = 7,5 cm.","AM/AB = MN/BC → 2/8 = 3/BC → 2 × BC = 8 × 3 = 24 → BC = 12 cm."],"type":"calcul","minutes":12,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"}},{"id":"M5","matiere":"maths","titre":"Trigonométrie dans le triangle rectangle","objectif":"Utiliser cosinus, sinus, tangente pour trouver un angle ou une longueur.","retiens":["Dans un triangle rectangle, on repère par rapport à un angle : le côté adjacent (à côté), le côté opposé (en face), l'hypoténuse (la plus longue).","Moyen mnémotechnique : SOH-CAH-TOA.","Pour trouver un angle quand on connaît un rapport, on utilise les touches cos⁻¹, sin⁻¹, tan⁻¹ de la calculatrice."],"formules":["cos(angle) = adjacent / hypoténuse","sin(angle) = opposé / hypoténuse","tan(angle) = opposé / adjacent"],"resolu":{"enonce":"Dans un triangle rectangle, le côté adjacent à un angle mesure 4 cm, l'hypoténuse 8 cm. Calculer cet angle.","etapes":["Je connais adjacent et hypoténuse, j'utilise le cosinus : cos(angle) = 4/8 = 0,5.","Pour trouver l'angle, j'utilise cos⁻¹ : angle = cos⁻¹(0,5).","La calculatrice donne 60°."],"resultat":"angle = 60°"},"exact":[{"q":"Triangle rectangle : opposé = 5 cm, hypoténuse = 10 cm. Calcule l'angle avec le sinus.","sol":"30°","detail":"sin(angle) = opposé/hyp = 5/10 = 0,5 → angle = sin⁻¹(0,5) = 30°.","explain":"Méthode : sin(angle) = opposé/hyp = 5/10 = 0,5 → angle = sin⁻¹(0,5) = 30°.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Triangle rectangle : un angle vaut 30°, le côté adjacent mesure 10 cm. Calcule le côté opposé (avec la tangente).","sol":"≈ 5,77 cm","detail":"tan(30°) = opposé/adjacent → opposé = tan(30°) × 10 ≈ 0,577 × 10 ≈ 5,77 cm.","explain":"Méthode : tan(30°) = opposé/adjacent → opposé = tan(30°) × 10 ≈ 0,577 × 10 ≈ 5,77 cm.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"qcm":[{"q":"Triangle rectangle : opposé = 5 cm, hypoténuse = 10 cm. Calcule l'angle avec le sinus.","good":"30°","choices":["x = 5","30°","6 × 10⁷","x = 5"],"explain":"Méthode : sin(angle) = opposé/hyp = 5/10 = 0,5 → angle = sin⁻¹(0,5) = 30°.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Triangle rectangle : un angle vaut 30°, le côté adjacent mesure 10 cm. Calcule le côté opposé (avec la tangente).","good":"≈ 5,77 cm","choices":["1/2","≈ 5,77 cm","médiane 10,5 ; étendue 8","x = 5"],"explain":"Méthode : tan(30°) = opposé/adjacent → opposé = tan(30°) × 10 ≈ 0,577 × 10 ≈ 5,77 cm.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"paper":{"consigne":"Refais les exercices de ce chapitre sur papier, pose tes calculs, puis vérifie.","grille":["sin(angle) = opposé/hyp = 5/10 = 0,5 → angle = sin⁻¹(0,5) = 30°.","tan(30°) = opposé/adjacent → opposé = tan(30°) × 10 ≈ 0,577 × 10 ≈ 5,77 cm."],"type":"calcul","minutes":12,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"}},{"id":"M6","matiere":"maths","titre":"Fractions et puissances","objectif":"Additionner et multiplier des fractions, manipuler les puissances de 10.","retiens":["Pour additionner des fractions, il faut le même dénominateur.","Pour multiplier des fractions, on multiplie les numérateurs entre eux et les dénominateurs entre eux, puis on simplifie.","Puissances de 10 : 10ᵃ × 10ᵇ = 10ᵃ⁺ᵇ et 10ᵃ ÷ 10ᵇ = 10ᵃ⁻ᵇ."],"formules":["a/b + c/d = (ad + cb)/(bd)","a/b × c/d = (a×c)/(b×d)","10ᵃ × 10ᵇ = 10ᵃ⁺ᵇ"],"resolu":{"enonce":"Calculer 2/3 + 1/4.","etapes":["Je cherche un dénominateur commun à 3 et 4 : c'est 12.","Je convertis : 2/3 = 8/12 et 1/4 = 3/12.","J'additionne les numérateurs : 8/12 + 3/12 = 11/12."],"resultat":"11/12"},"exact":[{"q":"Calcule 3/5 × 10/9 et simplifie.","sol":"2/3","detail":"3/5 × 10/9 = (3 × 10)/(5 × 9) = 30/45 = 2/3 (en simplifiant par 15).","explain":"Méthode : 3/5 × 10/9 = (3 × 10)/(5 × 9) = 30/45 = 2/3 (en simplifiant par 15).","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Calcule et donne le résultat en écriture scientifique : (3 × 10⁴) × (2 × 10³).","sol":"6 × 10⁷","detail":"(3 × 10⁴) × (2 × 10³) = (3 × 2) × 10⁴⁺³ = 6 × 10⁷.","explain":"Méthode : (3 × 10⁴) × (2 × 10³) = (3 × 2) × 10⁴⁺³ = 6 × 10⁷.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Calcule 10⁵ ÷ 10².","sol":"10³ = 1000","detail":"10⁵ ÷ 10² = 10⁵⁻² = 10³ = 1000.","explain":"Méthode : 10⁵ ÷ 10² = 10⁵⁻² = 10³ = 1000.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"qcm":[{"q":"Calcule 3/5 × 10/9 et simplifie.","good":"2/3","choices":["2/3","AC = 7,5 cm","105 €","oui, rectangle"],"explain":"Méthode : 3/5 × 10/9 = (3 × 10)/(5 × 9) = 30/45 = 2/3 (en simplifiant par 15).","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Calcule et donne le résultat en écriture scientifique : (3 × 10⁴) × (2 × 10³).","good":"6 × 10⁷","choices":["2/3","x² + 6x + 8","6 × 10⁷","oui, rectangle"],"explain":"Méthode : (3 × 10⁴) × (2 × 10³) = (3 × 2) × 10⁴⁺³ = 6 × 10⁷.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Calcule 10⁵ ÷ 10².","good":"10³ = 1000","choices":["b = 1 ; a = 2","f(5) = 15 ; linéaire","≈ 904,8 cm³","10³ = 1000"],"explain":"Méthode : 10⁵ ÷ 10² = 10⁵⁻² = 10³ = 1000.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"paper":{"consigne":"Refais les exercices de ce chapitre sur papier, pose tes calculs, puis vérifie.","grille":["3/5 × 10/9 = (3 × 10)/(5 × 9) = 30/45 = 2/3 (en simplifiant par 15).","(3 × 10⁴) × (2 × 10³) = (3 × 2) × 10⁴⁺³ = 6 × 10⁷.","10⁵ ÷ 10² = 10⁵⁻² = 10³ = 1000."],"type":"calcul","minutes":12,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"}},{"id":"M7","matiere":"maths","titre":"Pourcentages et proportionnalité","objectif":"Calculer une augmentation, une réduction, une vitesse moyenne.","retiens":["Augmenter de t % : on multiplie par (1 + t/100). Diminuer de t % : on multiplie par (1 − t/100).","Un pourcentage est une proportion : partie ÷ total × 100.","Vitesse moyenne = distance ÷ temps."],"formules":["Augmentation de t % : × (1 + t/100)","Réduction de t % : × (1 − t/100)","v = distance ÷ temps"],"resolu":{"enonce":"Un article coûte 80 €. Son prix augmente de 20 %. Quel est le nouveau prix ?","etapes":["Augmenter de 20 % revient à multiplier par 1 + 20/100 = 1,2.","Je calcule : 80 × 1,2.","Le nouveau prix est 96 €."],"resultat":"96 €"},"exact":[{"q":"Un article à 150 € est réduit de 30 %. Calcule le nouveau prix.","sol":"105 €","detail":"Réduction de 30 % : × (1 − 0,30) = × 0,70. Donc 150 × 0,70 = 105 €.","explain":"Méthode : Réduction de 30 % : × (1 − 0,30) = × 0,70. Donc 150 × 0,70 = 105 €.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Dans une classe, 15 élèves sur 60 font de l'allemand. Quel pourcentage ?","sol":"25 %","detail":"Proportion : 15 ÷ 60 × 100 = 25 %.","explain":"Méthode : Proportion : 15 ÷ 60 × 100 = 25 %.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Une voiture parcourt 120 km en 1 h 30. Calcule sa vitesse moyenne en km/h.","sol":"80 km/h","detail":"1 h 30 = 1,5 h. v = distance ÷ temps = 120 ÷ 1,5 = 80 km/h.","explain":"Méthode : 1 h 30 = 1,5 h. v = distance ÷ temps = 120 ÷ 1,5 = 80 km/h.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"qcm":[{"q":"Un article à 150 € est réduit de 30 %. Calcule le nouveau prix.","good":"105 €","choices":["x² + 6x + 8","30°","10³ = 1000","105 €"],"explain":"Méthode : Réduction de 30 % : × (1 − 0,30) = × 0,70. Donc 150 × 0,70 = 105 €.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Dans une classe, 15 élèves sur 60 font de l'allemand. Quel pourcentage ?","good":"25 %","choices":["25 %","(3x − 5)(3x + 5)","x² + 6x + 8","6 × 10⁷"],"explain":"Méthode : Proportion : 15 ÷ 60 × 100 = 25 %.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Une voiture parcourt 120 km en 1 h 30. Calcule sa vitesse moyenne en km/h.","good":"80 km/h","choices":["x = 2 ou x = −5","80 km/h","BC = 12 cm","105 €"],"explain":"Méthode : 1 h 30 = 1,5 h. v = distance ÷ temps = 120 ÷ 1,5 = 80 km/h.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"paper":{"consigne":"Refais les exercices de ce chapitre sur papier, pose tes calculs, puis vérifie.","grille":["Réduction de 30 % : × (1 − 0,30) = × 0,70. Donc 150 × 0,70 = 105 €.","Proportion : 15 ÷ 60 × 100 = 25 %.","1 h 30 = 1,5 h. v = distance ÷ temps = 120 ÷ 1,5 = 80 km/h."],"type":"calcul","minutes":12,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"}},{"id":"M8","matiere":"maths","titre":"Statistiques et probabilités","objectif":"Calculer moyenne, médiane, étendue, et une probabilité simple.","retiens":["Moyenne = somme des valeurs ÷ nombre de valeurs.","Médiane = valeur du milieu quand les données sont rangées dans l'ordre (moyenne des deux du milieu si nombre pair).","Étendue = plus grande valeur − plus petite valeur.","Probabilité = nombre de cas favorables ÷ nombre de cas possibles (entre 0 et 1)."],"formules":["moyenne = somme ÷ effectif","P(événement) = cas favorables ÷ cas possibles"],"resolu":{"enonce":"Calculer la moyenne de la série : 8, 12, 9, 15, 11, 7, 14, 10.","etapes":["J'additionne toutes les valeurs : 8+12+9+15+11+7+14+10 = 86.","Je compte les valeurs : il y en a 8.","Je divise : 86 ÷ 8 = 10,75."],"resultat":"moyenne = 10,75"},"exact":[{"q":"Pour la série 8, 12, 9, 15, 11, 7, 14, 10 : calcule la médiane et l'étendue.","sol":"médiane 10,5 ; étendue 8","detail":"Série rangée : 7, 8, 9, 10, 11, 12, 14, 15 (8 valeurs). Médiane = moyenne des deux du milieu (10 et 11) = 10,5. Étendue = 15 − 7 = 8.","explain":"Méthode : Série rangée : 7, 8, 9, 10, 11, 12, 14, 15 (8 valeurs). Médiane = moyenne des deux du milieu (10 et 11) = 10,5. Étendue = 15 − 7 = 8.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"On lance un dé équilibré. Quelle est la probabilité d'obtenir un nombre pair ? Donne une fraction simplifiée.","sol":"1/2","detail":"Cas favorables (pair : 2,4,6) = 3 ; cas possibles = 6. P = 3/6 = 1/2.","explain":"Méthode : Cas favorables (pair : 2,4,6) = 3 ; cas possibles = 6. P = 3/6 = 1/2.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Une urne contient 4 boules rouges et 6 bleues. Probabilité de tirer une rouge ?","sol":"2/5","detail":"4 rouges sur 4 + 6 = 10 boules. P = 4/10 = 2/5.","explain":"Méthode : 4 rouges sur 4 + 6 = 10 boules. P = 4/10 = 2/5.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"qcm":[{"q":"Pour la série 8, 12, 9, 15, 11, 7, 14, 10 : calcule la médiane et l'étendue.","good":"médiane 10,5 ; étendue 8","choices":["2/3","x = 2 ou x = −5","f(5) = 15 ; linéaire","médiane 10,5 ; étendue 8"],"explain":"Méthode : Série rangée : 7, 8, 9, 10, 11, 12, 14, 15 (8 valeurs). Médiane = moyenne des deux du milieu (10 et 11) = 10,5. Étendue = 15 − 7 = 8.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"On lance un dé équilibré. Quelle est la probabilité d'obtenir un nombre pair ? Donne une fraction simplifiée.","good":"1/2","choices":["10 cm","1/2","(3x − 5)(3x + 5)","30°"],"explain":"Méthode : Cas favorables (pair : 2,4,6) = 3 ; cas possibles = 6. P = 3/6 = 1/2.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Une urne contient 4 boules rouges et 6 bleues. Probabilité de tirer une rouge ?","good":"2/5","choices":["2/5","30°","x = 5","≈ 904,8 cm³"],"explain":"Méthode : 4 rouges sur 4 + 6 = 10 boules. P = 4/10 = 2/5.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"paper":{"consigne":"Refais les exercices de ce chapitre sur papier, pose tes calculs, puis vérifie.","grille":["Série rangée : 7, 8, 9, 10, 11, 12, 14, 15 (8 valeurs). Médiane = moyenne des deux du milieu (10 et 11) = 10,5. Étendue = 15 − 7 = 8.","Cas favorables (pair : 2,4,6) = 3 ; cas possibles = 6. P = 3/6 = 1/2.","4 rouges sur 4 + 6 = 10 boules. P = 4/10 = 2/5."],"type":"calcul","minutes":12,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"}},{"id":"M9","matiere":"maths","titre":"Fonctions linéaires et affines","objectif":"Calculer une image, reconnaître linéaire/affine, lire un coefficient.","retiens":["Fonction linéaire : f(x) = a × x (représentée par une droite passant par l'origine). a est le coefficient de proportionnalité.","Fonction affine : f(x) = a × x + b (droite ne passant pas forcément par l'origine). a = coefficient directeur, b = ordonnée à l'origine.","Calculer une image de x, c'est remplacer x par sa valeur dans la formule."],"formules":["linéaire : f(x) = a x","affine : f(x) = a x + b"],"resolu":{"enonce":"Soit g(x) = 2x + 1. Calculer g(3).","etapes":["Je remplace x par 3 dans la formule : g(3) = 2 × 3 + 1.","Je calcule : 6 + 1.","Donc g(3) = 7."],"resultat":"g(3) = 7"},"exact":[{"q":"Soit f(x) = 3x. Calcule f(5). La fonction est-elle linéaire ou affine ?","sol":"f(5) = 15 ; linéaire","detail":"f(5) = 3 × 5 = 15. La fonction f(x) = 3x est de la forme a×x : elle est linéaire.","explain":"Méthode : f(5) = 3 × 5 = 15. La fonction f(x) = 3x est de la forme a×x : elle est linéaire.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Soit g(x) = 2x + 1. Donne son ordonnée à l'origine et son coefficient directeur.","sol":"b = 1 ; a = 2","detail":"g(x) = 2x + 1 est affine. Ordonnée à l'origine b = 1 ; coefficient directeur a = 2.","explain":"Méthode : g(x) = 2x + 1 est affine. Ordonnée à l'origine b = 1 ; coefficient directeur a = 2.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"qcm":[{"q":"Soit f(x) = 3x. Calcule f(5). La fonction est-elle linéaire ou affine ?","good":"f(5) = 15 ; linéaire","choices":["oui, rectangle","médiane 10,5 ; étendue 8","≈ 5,77 cm","f(5) = 15 ; linéaire"],"explain":"Méthode : f(5) = 3 × 5 = 15. La fonction f(x) = 3x est de la forme a×x : elle est linéaire.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Soit g(x) = 2x + 1. Donne son ordonnée à l'origine et son coefficient directeur.","good":"b = 1 ; a = 2","choices":["b = 1 ; a = 2","oui, rectangle","x² + 6x + 8","6x² + 13x − 5"],"explain":"Méthode : g(x) = 2x + 1 est affine. Ordonnée à l'origine b = 1 ; coefficient directeur a = 2.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"paper":{"consigne":"Refais les exercices de ce chapitre sur papier, pose tes calculs, puis vérifie.","grille":["f(5) = 3 × 5 = 15. La fonction f(x) = 3x est de la forme a×x : elle est linéaire.","g(x) = 2x + 1 est affine. Ordonnée à l'origine b = 1 ; coefficient directeur a = 2."],"type":"calcul","minutes":12,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"}},{"id":"M10","matiere":"maths","titre":"Volumes","objectif":"Calculer le volume d'un cylindre et d'une boule.","retiens":["Le volume s'exprime en unités cubes (cm³, m³…).","Pour le cylindre, on multiplie l'aire du disque de base par la hauteur.","Garde π dans le calcul puis arrondis seulement à la fin."],"formules":["Cylindre : V = π × r² × h","Boule : V = (4/3) × π × r³"],"resolu":{"enonce":"Calculer le volume d'un cylindre de rayon 3 cm et de hauteur 10 cm (arrondi au dixième).","etapes":["J'applique la formule : V = π × r² × h = π × 3² × 10.","Je calcule : V = π × 9 × 10 = 90 π.","J'arrondis : 90 × 3,1416 ≈ 282,7 cm³."],"resultat":"≈ 282,7 cm³"},"exact":[{"q":"Calcule le volume d'une boule de rayon 6 cm (arrondi au dixième).","sol":"≈ 904,8 cm³","detail":"V = (4/3) × π × r³ = (4/3) × π × 6³ = (4/3) × π × 216 = 288π ≈ 904,8 cm³.","explain":"Méthode : V = (4/3) × π × r³ = (4/3) × π × 6³ = (4/3) × π × 216 = 288π ≈ 904,8 cm³.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Un cylindre a un rayon de 5 cm et une hauteur de 4 cm. Calcule son volume (arrondi au dixième).","sol":"≈ 314,2 cm³","detail":"V = π × r² × h = π × 5² × 4 = π × 25 × 4 = 100π ≈ 314,2 cm³.","explain":"Méthode : V = π × r² × h = π × 5² × 4 = π × 25 × 4 = 100π ≈ 314,2 cm³.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"qcm":[{"q":"Calcule le volume d'une boule de rayon 6 cm (arrondi au dixième).","good":"≈ 904,8 cm³","choices":["b = 1 ; a = 2","oui, rectangle","1/2","≈ 904,8 cm³"],"explain":"Méthode : V = (4/3) × π × r³ = (4/3) × π × 6³ = (4/3) × π × 216 = 288π ≈ 904,8 cm³.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"},{"q":"Un cylindre a un rayon de 5 cm et une hauteur de 4 cm. Calcule son volume (arrondi au dixième).","good":"≈ 314,2 cm³","choices":["6 × 10⁷","BC = 12 cm","≈ 314,2 cm³","médiane 10,5 ; étendue 8"],"explain":"Méthode : V = π × r² × h = π × 5² × 4 = π × 25 × 4 = 100π ≈ 314,2 cm³.","vid":"https://www.lumni.fr/college/troisieme/mathematiques"}],"paper":{"consigne":"Refais les exercices de ce chapitre sur papier, pose tes calculs, puis vérifie.","grille":["V = (4/3) × π × r³ = (4/3) × π × 6³ = (4/3) × π × 216 = 288π ≈ 904,8 cm³.","V = π × r² × h = π × 5² × 4 = π × 25 × 4 = 100π ≈ 314,2 cm³."],"type":"calcul","minutes":12,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"}},{"id":"P1","matiere":"pc","titre":"Vitesse et mouvement","objectif":"Calculer une vitesse, convertir m/s ⇄ km/h.","retiens":["La vitesse indique la distance parcourue par unité de temps.","Attention aux unités : la distance en mètres et le temps en secondes donnent des m/s.","Conversion : pour passer de m/s à km/h on multiplie par 3,6 ; dans l'autre sens on divise par 3,6."],"formules":["v = d ÷ t","m/s → km/h : × 3,6   |   km/h → m/s : ÷ 3,6"],"resolu":{"enonce":"Un coureur parcourt 150 m en 30 s. Calculer sa vitesse en m/s.","etapes":["J'applique la formule : v = d ÷ t = 150 ÷ 30.","Je calcule : v = 5.","La vitesse est 5 m/s."],"resultat":"5 m/s"},"exact":[{"q":"Convertis 5 m/s en km/h.","sol":"18 km/h","detail":"m/s → km/h : on multiplie par 3,6. 5 × 3,6 = 18 km/h.","explain":"Méthode : m/s → km/h : on multiplie par 3,6. 5 × 3,6 = 18 km/h.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},{"q":"Convertis 108 km/h en m/s.","sol":"30 m/s","detail":"km/h → m/s : on divise par 3,6. 108 ÷ 3,6 = 30 m/s.","explain":"Méthode : km/h → m/s : on divise par 3,6. 108 ÷ 3,6 = 30 m/s.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},{"q":"Une voiture parcourt 90 km en 1 h. Quelle est sa vitesse en km/h, puis en m/s ?","sol":"90 km/h = 25 m/s","detail":"v = 90 km/h. En m/s : 90 ÷ 3,6 = 25 m/s.","explain":"Méthode : v = 90 km/h. En m/s : 90 ÷ 3,6 = 25 m/s.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"}],"qcm":[{"q":"Convertis 5 m/s en km/h.","good":"18 km/h","choices":["a gagné 1 électron","460 W","18 km/h","1500 g"],"explain":"Méthode : m/s → km/h : on multiplie par 3,6. 5 × 3,6 = 18 km/h.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},{"q":"Convertis 108 km/h en m/s.","good":"30 m/s","choices":["460 W","1500 g","90 km/h = 25 m/s","30 m/s"],"explain":"Méthode : km/h → m/s : on divise par 3,6. 108 ÷ 3,6 = 30 m/s.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},{"q":"Une voiture parcourt 90 km en 1 h. Quelle est sa vitesse en km/h, puis en m/s ?","good":"90 km/h = 25 m/s","choices":["0,02 A = 20 mA","60 g/L","90 km/h = 25 m/s","acide"],"explain":"Méthode : v = 90 km/h. En m/s : 90 ÷ 3,6 = 25 m/s.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"}],"paper":{"consigne":"Refais les exercices de ce chapitre sur papier, pose tes calculs, puis vérifie.","grille":["m/s → km/h : on multiplie par 3,6. 5 × 3,6 = 18 km/h.","km/h → m/s : on divise par 3,6. 108 ÷ 3,6 = 30 m/s.","v = 90 km/h. En m/s : 90 ÷ 3,6 = 25 m/s."],"type":"calcul","minutes":12,"vid":"https://www.lumni.fr/college/troisieme/physique-chimie"}},{"id":"P2","matiere":"pc","titre":"Énergie cinétique","objectif":"Calculer une énergie cinétique et comprendre l'effet de la vitesse.","retiens":["L'énergie cinétique est l'énergie que possède un objet à cause de son mouvement.","Elle dépend de la masse et SURTOUT de la vitesse (la vitesse est au carré : doubler la vitesse multiplie l'énergie par 4).","Unités : masse en kg, vitesse en m/s, énergie en joules (J)."],"formules":["Ec = ½ × m × v²   (m en kg, v en m/s, Ec en J)"],"resolu":{"enonce":"Une voiture de 1000 kg roule à 20 m/s. Calculer son énergie cinétique.","etapes":["J'applique la formule : Ec = ½ × m × v² = ½ × 1000 × 20².","Je calcule le carré puis le produit : ½ × 1000 × 400 = 200 000.","L'énergie cinétique est 200 000 J, soit 200 kJ."],"resultat":"200 000 J = 200 kJ"},"exact":[{"q":"Un cycliste de masse 70 kg roule à 10 m/s. Calcule son énergie cinétique.","sol":"3500 J","detail":"Ec = ½ × m × v² = ½ × 70 × 10² = ½ × 70 × 100 = 3500 J.","explain":"Méthode : Ec = ½ × m × v² = ½ × 70 × 10² = ½ × 70 × 100 = 3500 J.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},{"q":"Explique avec une phrase ce qui se passe pour l'énergie cinétique si la vitesse double.","sol":"× 4","detail":"La vitesse est au carré dans la formule : si elle double, l'énergie cinétique est multipliée par 2² = 4.","explain":"Méthode : La vitesse est au carré dans la formule : si elle double, l'énergie cinétique est multipliée par 2² = 4.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"}],"qcm":[{"q":"Un cycliste de masse 70 kg roule à 10 m/s. Calcule son énergie cinétique.","good":"3500 J","choices":["3500 J","90 km/h = 25 m/s","a gagné 1 électron","30 m/s"],"explain":"Méthode : Ec = ½ × m × v² = ½ × 70 × 10² = ½ × 70 × 100 = 3500 J.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},{"q":"Explique avec une phrase ce qui se passe pour l'énergie cinétique si la vitesse double.","good":"× 4","choices":["a gagné 1 électron","18 km/h","1 C + 2 O","× 4"],"explain":"Méthode : La vitesse est au carré dans la formule : si elle double, l'énergie cinétique est multipliée par 2² = 4.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"}],"paper":{"consigne":"Refais les exercices de ce chapitre sur papier, pose tes calculs, puis vérifie.","grille":["Ec = ½ × m × v² = ½ × 70 × 10² = ½ × 70 × 100 = 3500 J.","La vitesse est au carré dans la formule : si elle double, l'énergie cinétique est multipliée par 2² = 4."],"type":"calcul","minutes":12,"vid":"https://www.lumni.fr/college/troisieme/physique-chimie"}},{"id":"P3","matiere":"pc","titre":"Loi d'Ohm et puissance électrique","objectif":"Utiliser U = R × I et calculer une puissance électrique.","retiens":["La loi d'Ohm relie la tension U (en volts), la résistance R (en ohms) et l'intensité I (en ampères).","Attention aux unités : si l'intensité est en milliampères (mA), il faut la convertir en ampères (÷ 1000).","La puissance électrique se calcule avec la tension et l'intensité."],"formules":["U = R × I   (U en V, R en Ω, I en A)","P = U × I   (P en watts)"],"resolu":{"enonce":"Une résistance de 220 Ω est traversée par un courant de 0,05 A. Calculer la tension à ses bornes.","etapes":["J'applique la loi d'Ohm : U = R × I = 220 × 0,05.","Je calcule : 220 × 0,05 = 11.","La tension est 11 V."],"resultat":"11 V"},"exact":[{"q":"Une tension de 6 V est appliquée à une résistance de 300 Ω. Calcule l'intensité (en A puis en mA).","sol":"0,02 A = 20 mA","detail":"I = U ÷ R = 6 ÷ 300 = 0,02 A. En milliampères : 0,02 × 1000 = 20 mA.","explain":"Méthode : I = U ÷ R = 6 ÷ 300 = 0,02 A. En milliampères : 0,02 × 1000 = 20 mA.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},{"q":"Un appareil fonctionne sous 230 V avec une intensité de 2 A. Calcule sa puissance.","sol":"460 W","detail":"P = U × I = 230 × 2 = 460 W.","explain":"Méthode : P = U × I = 230 × 2 = 460 W.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"}],"qcm":[{"q":"Une tension de 6 V est appliquée à une résistance de 300 Ω. Calcule l'intensité (en A puis en mA).","good":"0,02 A = 20 mA","choices":["a gagné 1 électron","0,02 A = 20 mA","3500 J","1 C + 2 O"],"explain":"Méthode : I = U ÷ R = 6 ÷ 300 = 0,02 A. En milliampères : 0,02 × 1000 = 20 mA.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},{"q":"Un appareil fonctionne sous 230 V avec une intensité de 2 A. Calcule sa puissance.","good":"460 W","choices":["a gagné 1 électron","3500 J","1 C + 2 O","460 W"],"explain":"Méthode : P = U × I = 230 × 2 = 460 W.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"}],"paper":{"consigne":"Refais les exercices de ce chapitre sur papier, pose tes calculs, puis vérifie.","grille":["I = U ÷ R = 6 ÷ 300 = 0,02 A. En milliampères : 0,02 × 1000 = 20 mA.","P = U × I = 230 × 2 = 460 W."],"type":"calcul","minutes":12,"vid":"https://www.lumni.fr/college/troisieme/physique-chimie"}},{"id":"P4","matiere":"pc","titre":"Masse volumique et concentration","objectif":"Calculer une masse volumique et une concentration massique.","retiens":["La masse volumique compare la masse d'un objet à son volume : un objet « lourd pour sa taille » a une grande masse volumique.","L'eau a une masse volumique de 1 g/mL (donc 1 L d'eau pèse 1000 g).","La concentration massique indique la masse de soluté dissoute par litre de solution."],"formules":["ρ = m ÷ V   (masse volumique)","c = m ÷ V   (concentration massique, en g/L)"],"resolu":{"enonce":"Un objet a une masse de 200 g et un volume de 250 mL. Calculer sa masse volumique.","etapes":["J'applique la formule : ρ = m ÷ V = 200 ÷ 250.","Je calcule : 200 ÷ 250 = 0,8.","La masse volumique est 0,8 g/mL."],"resultat":"0,8 g/mL"},"exact":[{"q":"On dissout 30 g de sel dans 0,5 L d'eau. Calcule la concentration massique en g/L.","sol":"60 g/L","detail":"c = m ÷ V = 30 ÷ 0,5 = 60 g/L.","explain":"Méthode : c = m ÷ V = 30 ÷ 0,5 = 60 g/L.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},{"q":"Quelle est la masse de 1,5 L d'eau (masse volumique 1 g/mL) ?","sol":"1500 g","detail":"1,5 L = 1500 mL. Masse = 1500 × 1 g/mL = 1500 g.","explain":"Méthode : 1,5 L = 1500 mL. Masse = 1500 × 1 g/mL = 1500 g.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"}],"qcm":[{"q":"On dissout 30 g de sel dans 0,5 L d'eau. Calcule la concentration massique en g/L.","good":"60 g/L","choices":["60 g/L","1 C + 2 O","× 4","3500 J"],"explain":"Méthode : c = m ÷ V = 30 ÷ 0,5 = 60 g/L.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},{"q":"Quelle est la masse de 1,5 L d'eau (masse volumique 1 g/mL) ?","good":"1500 g","choices":["acide","3500 J","1500 g","× 4"],"explain":"Méthode : 1,5 L = 1500 mL. Masse = 1500 × 1 g/mL = 1500 g.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"}],"paper":{"consigne":"Refais les exercices de ce chapitre sur papier, pose tes calculs, puis vérifie.","grille":["c = m ÷ V = 30 ÷ 0,5 = 60 g/L.","1,5 L = 1500 mL. Masse = 1500 × 1 g/mL = 1500 g."],"type":"calcul","minutes":12,"vid":"https://www.lumni.fr/college/troisieme/physique-chimie"}},{"id":"P5","matiere":"pc","titre":"Atomes, molécules, ions et pH","objectif":"Reconnaître atomes, molécules, ions, et lire une échelle de pH.","retiens":["Un atome est neutre. Un ion est un atome (ou groupe d'atomes) qui a gagné ou perdu des électrons : il porte alors une charge (+ s'il a perdu, − s'il a gagné).","Une molécule est un assemblage d'atomes (ex. l'eau H₂O contient 2 atomes d'hydrogène et 1 d'oxygène).","Le pH mesure l'acidité : inférieur à 7 = acide, égal à 7 = neutre, supérieur à 7 = basique."],"formules":["pH < 7 : acide   |   pH = 7 : neutre   |   pH > 7 : basique"],"resolu":{"enonce":"L'ion sodium s'écrit Na⁺. Expliquer ce que signifie le « + ».","etapes":["Le sodium Na est au départ un atome neutre.","Le signe « + » indique qu'il a PERDU un électron (charge négative en moins).","Il devient donc un ion positif : Na⁺."],"resultat":"Na⁺ = atome de sodium ayant perdu 1 électron"},"exact":[{"q":"Combien d'atomes, et lesquels, dans la molécule de dioxyde de carbone CO₂ ?","sol":"1 C + 2 O","detail":"CO₂ : 1 atome de carbone (C) et 2 atomes d'oxygène (O), soit 3 atomes en tout.","explain":"Méthode : CO₂ : 1 atome de carbone (C) et 2 atomes d'oxygène (O), soit 3 atomes en tout.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},{"q":"Un liquide a un pH de 3. Est-il acide, neutre ou basique ?","sol":"acide","detail":"pH = 3, c'est inférieur à 7 : le liquide est acide.","explain":"Méthode : pH = 3, c'est inférieur à 7 : le liquide est acide.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},{"q":"L'ion chlorure s'écrit Cl⁻. A-t-il gagné ou perdu un électron ?","sol":"a gagné 1 électron","detail":"Le signe « − » indique une charge négative en plus : l'ion chlorure a GAGNÉ un électron.","explain":"Méthode : Le signe « − » indique une charge négative en plus : l'ion chlorure a GAGNÉ un électron.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"}],"qcm":[{"q":"Combien d'atomes, et lesquels, dans la molécule de dioxyde de carbone CO₂ ?","good":"1 C + 2 O","choices":["1500 g","90 km/h = 25 m/s","460 W","1 C + 2 O"],"explain":"Méthode : CO₂ : 1 atome de carbone (C) et 2 atomes d'oxygène (O), soit 3 atomes en tout.","vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},{"q":"Un liquide a un pH de 3. Est-il acide, neutre ou basique ?","good":"acide","choices":["acide","0,02 A = 20 mA","1 C + 2

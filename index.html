<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#FBFAF7"/>
<title>Brevet Quest · révise en jouant</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#15161B;--grey:#5B6270;--line:#E4E5EC;--paper:#FBFAF7;--gold:#D9A407;--goldbg:#FFF6DE;
--ok:#16A34A;--okbg:#E7F8ED;--bad:#DC2626;--badbg:#FDEAEA;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;color:var(--ink);background:var(--paper);line-height:1.5;-webkit-font-smoothing:antialiased;
background-image:radial-gradient(circle at 10% 5%,rgba(37,99,235,.05),transparent 36%),radial-gradient(circle at 92% 2%,rgba(220,38,38,.05),transparent 32%)}
h1,h2,h3,.serif{font-family:'Fraunces',serif}
.wrap{max-width:680px;margin:0 auto;padding:0 16px 90px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.hidden{display:none!important}

/* HUD */
.hud{position:sticky;top:0;z-index:40;background:rgba(251,250,247,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:10px 0}
.hud .inner{max-width:680px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:12px}
.hud .home{font-weight:900;font-family:'Fraunces';font-size:18px;color:var(--ink)}
.hud .stats{margin-left:auto;display:flex;gap:10px;font-weight:800;font-size:14px}
.hud .stat{display:flex;align-items:center;gap:4px}
.lvlbar{height:8px;background:#ECEDF2;border-radius:999px;overflow:hidden;margin-top:8px}
.lvlbar .f{height:100%;background:linear-gradient(90deg,#2563EB,#16A34A,#EA580C);width:0;transition:width .5s}

/* HERO / hub */
.hero{text-align:center;padding:30px 0 8px}
.hero .kick{display:inline-block;font-weight:800;font-size:11px;letter-spacing:.16em;color:#fff;background:var(--ink);padding:6px 14px;border-radius:999px;transform:rotate(-2deg)}
.hero h1{font-size:clamp(34px,10vw,54px);margin:14px 0 4px;letter-spacing:-.02em}
.hero h1 .hl{background:linear-gradient(180deg,transparent 58%,#FFE08A 58%);padding:0 .08em}
.hero p{color:var(--grey);font-weight:600;margin:0}
.countdown{display:inline-block;margin-top:12px;font-weight:800;color:#fff;background:var(--bad);padding:8px 16px;border-radius:999px;font-size:14px}

/* cartes matières */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:22px 0}
.mcard{--mc:#000;--mb:#eee;border:1.5px solid var(--line);border-left:6px solid var(--mc);border-radius:16px;background:#fff;padding:15px;text-align:left;box-shadow:0 8px 22px -16px rgba(0,0,0,.3);transition:transform .15s}
.mcard:active{transform:scale(.98)}
.mcard .top{display:flex;align-items:center;gap:9px}
.mcard .pic{font-size:26px}
.mcard .nom{font-weight:800;font-size:16px}
.mcard .meta{color:var(--grey);font-size:12.5px;font-weight:600;margin-top:6px}
.mcard .pg{height:7px;background:#ECEDF2;border-radius:999px;overflow:hidden;margin-top:9px}
.mcard .pg .f{height:100%;background:var(--mc);width:0;border-radius:999px}
.mcard .stars{margin-top:7px;font-size:13px;color:var(--gold);font-weight:800}

/* boutons modes */
.modes{display:flex;flex-direction:column;gap:10px;margin:18px 0}
.modebtn{--mc:#2563EB;display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-left:6px solid var(--mc);border-radius:14px;background:#fff;padding:14px 16px;text-align:left;box-shadow:0 6px 18px -14px rgba(0,0,0,.3)}
.modebtn:active{transform:scale(.99)}
.modebtn .e{font-size:24px;flex:0 0 auto}
.modebtn b{font-size:16px;display:block}
.modebtn span{color:var(--grey);font-size:13px;font-weight:600}

/* session timer */
.timer{position:sticky;top:54px;z-index:30;background:rgba(251,250,247,.95);padding:8px 0}
.timer .bar{height:10px;border-radius:999px;background:#ECEDF2;overflow:hidden}
.timer .bar .f{height:100%;border-radius:999px;background:linear-gradient(90deg,#16A34A,#EA580C,#DC2626);width:100%;transition:width 1s linear}
.timer .lab{display:flex;justify-content:space-between;font-weight:800;font-size:13px;margin-top:5px}

/* question card */
.qcard{background:#fff;border:1.5px solid var(--line);border-radius:18px;padding:20px;margin:14px 0;box-shadow:0 10px 28px -18px rgba(0,0,0,.3)}
.qtag{font-weight:800;font-size:11px;letter-spacing:.1em;color:var(--grey)}
.qbody{font-size:19px;font-weight:600;margin:8px 0 16px;line-height:1.4}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{border:2px solid var(--line);border-radius:13px;padding:13px 15px;font-size:15px;font-weight:600;text-align:left;background:#fff;transition:all .12s}
.choice:active{transform:scale(.99)}
.choice.good{border-color:var(--ok);background:var(--okbg);color:#0F6B34}
.choice.bad{border-color:var(--bad);background:var(--badbg);color:#9C2C2C}
.choice.dim{opacity:.5}
.tinput{width:100%;border:2px solid var(--line);border-radius:13px;padding:13px 15px;font-size:16px;font-family:inherit}
.tinput:focus{outline:none;border-color:#2563EB}
.bigarea{width:100%;min-height:140px;border:2px solid var(--line);border-radius:13px;padding:13px 15px;font-size:15px;font-family:inherit;resize:vertical;line-height:1.6}
.bigarea:focus{outline:none;border-color:#2563EB}
.primary{display:block;width:100%;margin-top:14px;background:var(--ink);color:#fff;font-weight:800;font-size:16px;padding:14px;border-radius:13px}
.primary:active{transform:scale(.99)}
.ghost{display:block;width:100%;margin-top:10px;border:1.5px solid var(--line);color:var(--grey);font-weight:700;padding:11px;border-radius:13px;background:#fff}

/* feedback */
.fb{border-radius:13px;padding:13px 15px;margin-top:14px;font-weight:600;font-size:14.5px}
.fb.ok{background:var(--okbg);border:1.5px solid var(--ok);color:#0F6B34}
.fb.bad{background:var(--badbg);border:1.5px solid var(--bad);color:#9C2C2C}
.fb .sol{display:block;margin-top:6px;font-weight:700;color:var(--ink)}
.toolsmini{display:flex;gap:10px;justify-content:center;margin:14px 0 4px}
.tmini{flex:1;max-width:120px;display:flex;flex-direction:column;align-items:center;gap:4px;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:10px 6px;cursor:pointer}
.tmini span{font-size:22px}
.tmini small{font-size:11px;font-weight:700;color:var(--grey)}
.fb .why{display:block;margin-top:10px;padding:8px 10px;border-radius:10px;background:#EEF6FF;border:1px solid #BBD7F5;line-height:1.45}
.fb .vidlink{display:inline-block;margin-top:10px;font-weight:700;text-decoration:none;color:#1D4ED8}
.combo{position:fixed;top:30%;left:50%;transform:translateX(-50%);font-family:'Fraunces';font-weight:900;font-size:44px;color:var(--gold);pointer-events:none;opacity:0;z-index:60;text-shadow:0 2px 0 rgba(0,0,0,.1)}
.combo.show{animation:pop 1s ease}
@keyframes pop{0%{opacity:0;transform:translateX(-50%) scale(.5)}25%{opacity:1;transform:translateX(-50%) scale(1.15)}100%{opacity:0;transform:translateX(-50%) scale(1) translateY(-40px)}}

/* paper mode */
.paper{background:var(--goldbg);border:1.5px solid var(--gold);border-radius:14px;padding:16px;margin:14px 0}
.paper .doc{background:#fff;border:1.5px solid #E7D9A0;border-radius:11px;padding:14px;margin:10px 0;font-size:15px;line-height:1.6}
.paper .doc p{margin:0 0 10px}.paper .doc p:last-child{margin:0}
.paper .aide{font-size:13px;color:#8A6D1B;font-weight:600;margin-top:8px}
.grille{background:var(--okbg);border:1.5px solid var(--ok);border-radius:12px;padding:13px 15px;margin-top:12px}
.grille b{color:#0F6B34}
.selfscore{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.ssbtn{flex:1;min-width:90px;border:2px solid var(--line);border-radius:12px;padding:11px;font-weight:700;font-size:13px;background:#fff;text-align:center}
.ssbtn.sel{border-color:#2563EB;background:#EAF1FF}

/* résultats */
.result{text-align:center;padding:30px 0}
.result .big{font-family:'Fraunces';font-weight:900;font-size:60px;color:var(--gold)}
.result h2{font-size:30px;margin:6px 0}
.result .line{color:var(--grey);font-weight:600;margin:4px 0}
.badge{display:inline-block;margin:12px 6px 0;background:var(--goldbg);border:1.5px solid var(--gold);color:#7A610F;font-weight:800;padding:8px 14px;border-radius:999px;font-size:14px}

/* divers */
.section-title{font-family:'Fraunces';font-weight:900;font-size:24px;margin:24px 0 4px}
.muted{color:var(--grey);font-weight:600;font-size:14px;margin:0 0 8px}
.backrow{display:flex;gap:8px;margin:14px 0 0}
.streakflame{color:#EA580C}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-weight:700;padding:11px 18px;border-radius:999px;font-size:14px;opacity:0;transition:opacity .3s;z-index:70}
.toast.show{opacity:1}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:50}
.tabbar button{flex:1;padding:10px 0 12px;font-weight:700;font-size:11px;color:var(--grey);display:flex;flex-direction:column;align-items:center;gap:3px}
.tabbar button.on{color:#2563EB}
.tabbar .ti{font-size:20px}
</style>
</head><body>
<div id="app"></div>
<div class="combo" id="combo"></div>
<div class="toast" id="toast"></div>
<script>const DATA={"themes":{"histoire":{"c":"#1F4E79","bg":"#E8F0FB","pic":"📜","nom":"Histoire"},"geo":{"c":"#2E7D32","bg":"#E7F6E8","pic":"🗺️","nom":"Géo"},"emc":{"c":"#7B2FB5","bg":"#F1E7FA","pic":"⚖️","nom":"EMC"},"maths":{"c":"#C0392B","bg":"#FBE7E4","pic":"➗","nom":"Maths"},"pc":{"c":"#0E8A8F","bg":"#E0F4F4","pic":"🧪","nom":"Physique-Chimie"},"svt":{"c":"#2E9E4F","bg":"#E6F6EB","pic":"🧬","nom":"SVT"},"fr":{"c":"#D97706","bg":"#FCEFD9","pic":"✍️","nom":"Français"}},"hg":[{"id":"H1","matiere":"histoire","titre":"Civils et militaires dans la Première Guerre mondiale","objectif":"À la fin, tu sais expliquer pourquoi 14-18 est une guerre totale qui touche soldats ET civils.","qcm":[{"q":"Quel événement, le 28 juin 1914, déclenche l'engrenage menant à la Première Guerre mondiale ?","good":"L'assassinat de l'archiduc François-Ferdinand à Sarajevo","choices":["L'invasion de la Pologne","L'attentat de Sarajevo visant directement le tsar de Russie","Le torpillage du Lusitania","L'assassinat de l'archiduc François-Ferdinand à Sarajevo"],"explain":"L'attentat de Sarajevo déclenche le jeu des alliances. L'invasion de la Pologne (1939) ouvre la Seconde Guerre mondiale, pas la Première.","verif":"Vérifie dans ton cours la chaîne des alliances qui transforme cet attentat en guerre européenne.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerres totales)"},{"q":"Comment appelle-t-on la phase de la guerre, à partir de fin 1914, où les armées s'enterrent face à face sans avancer ?","good":"La guerre de position (guerre des tranchées)","choices":["La guerre de mouvement","La guerre éclair (Blitzkrieg)","La guerre de position (guerre des tranchées)","La drôle de guerre"],"explain":"Après la guerre de mouvement de 1914, le front se fige : c'est la guerre de position dans les tranchées. Le Blitzkrieg et la drôle de guerre relèvent de 1939-1940.","verif":"Retrouve dans ton cours la différence entre guerre de mouvement (1914) et guerre de position.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerres totales)"},{"q":"Quelle bataille de 1916 est devenue le symbole de la violence de masse subie par les soldats français ?","good":"Verdun","choices":["Stalingrad","La bataille de la Marne","Verdun","La bataille de la Somme"],"explain":"Verdun (1916) symbolise l'enfer des tranchées. Austerlitz et Waterloo sont napoléoniennes ; Stalingrad relève de la Seconde Guerre mondiale.","verif":"Repère Verdun (1916) sur ta frise et note pourquoi cette bataille est un symbole.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerres totales)"},{"q":"Que signifie l'expression « guerre totale » appliquée à 1914-1918 ?","good":"La mobilisation de toute la société : militaire, économique, financière et civile","choices":["Une guerre sans victimes civiles","La mobilisation de toute la société : militaire, économique, financière et civile","Une guerre qui se déroule uniquement dans les tranchées","Une guerre limitée à l'Europe de l'Ouest"],"explain":"Guerre totale : l'arrière (usines, femmes au travail, emprunts, propagande) est mobilisé autant que le front. La frontière entre civils et militaires s'efface.","verif":"Dans ton cours, souligne les exemples de mobilisation de l'arrière (usines, femmes, propagande).","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerres totales)"},{"q":"Quel génocide, perpétré par l'Empire ottoman dès 1915, a lieu pendant la Première Guerre mondiale ?","good":"Le génocide des Arméniens","choices":["Le génocide des Juifs","Le génocide des Tutsi au Rwanda","Le génocide des Herero (Namibie)","Le génocide des Arméniens"],"explain":"Le génocide arménien (1915) a lieu pendant 14-18. Le génocide des Juifs relève de la Seconde Guerre mondiale, celui des Tutsis du Rwanda (1994).","verif":"Vérifie la date du génocide arménien (1915) et situe-la dans la chronologie de la guerre.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerres totales)"},{"q":"Quelle révolution, en 1917, conduit la Russie à se retirer de la guerre ?","good":"La révolution russe (bolchevique)","choices":["La révolution russe (bolchevique)","La prise de la Bastille","La révolution allemande de 1918","La révolution de Juillet 1830"],"explain":"Les révolutions de 1917 renversent le tsar puis portent les bolcheviks au pouvoir : la Russie signe la paix et quitte la guerre en 1918.","verif":"Retrouve dans ton cours pourquoi 1917 est une année charnière (Russie qui sort, États-Unis qui entrent).","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerres totales)"},{"q":"Quel traité, signé en 1919, met officiellement fin à l'état de guerre avec l'Allemagne et la juge responsable du conflit ?","good":"Le traité de Versailles","choices":["Le traité de Versailles","L'armistice de Rethondes","Le traité de Rome","Le traité de Maastricht"],"explain":"Le traité de Versailles (1919) impose de lourdes sanctions à l'Allemagne. À ne pas confondre avec l'armistice du 11 novembre 1918, qui arrête seulement les combats.","verif":"Dans ton cours, distingue l'armistice (11 novembre 1918) du traité de Versailles (1919).","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerres totales)"}],"court":[{"q":"En quelle année commence la Première Guerre mondiale ? Et quand se termine-t-elle ?","sol":"1914 ; 1918.","kw":["1914","1918"],"explain":"Contexte : guerre totale, tranchées, Verdun, poilus, arrière, propagande, génocide arménien, armistice. · À éviter : Ne parler que des batailles en oubliant les civils ; confondre armistice et traité de paix.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerres totales)"},{"q":"Cite le nom donné aux soldats français.","sol":"Les poilus.","kw":["les","poilus"],"explain":"Contexte : guerre totale, tranchées, Verdun, poilus, arrière, propagande, génocide arménien, armistice. · À éviter : Ne parler que des batailles en oubliant les civils ; confondre armistice et traité de paix.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerres totales)"},{"q":"Qu'est-ce qu'une tranchée ?","sol":"Un fossé creusé où vivent et combattent les soldats (guerre de position).","kw":["creusé","vivent","combattent","soldats"],"explain":"Contexte : guerre totale, tranchées, Verdun, poilus, arrière, propagande, génocide arménien, armistice. · À éviter : Ne parler que des batailles en oubliant les civils ; confondre armistice et traité de paix.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerres totales)"},{"q":"Cite une bataille célèbre de cette guerre.","sol":"Verdun (1916).","kw":["verdun","1916"],"explain":"Contexte : guerre totale, tranchées, Verdun, poilus, arrière, propagande, génocide arménien, armistice. · À éviter : Ne parler que des batailles en oubliant les civils ; confondre armistice et traité de paix.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerres totales)"},{"q":"Que veut dire « armistice » ?","sol":"L'arrêt des combats (ce n'est pas un traité de paix).","kw":["larrêt","combats","traité"],"explain":"Contexte : guerre totale, tranchées, Verdun, poilus, arrière, propagande, génocide arménien, armistice. · À éviter : Ne parler que des batailles en oubliant les civils ; confondre armistice et traité de paix.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerres totales)"}],"paper":{"consigne":"Écris 8 lignes : « La Première Guerre mondiale, une guerre totale. » Donne 1 exemple pour les soldats et 1 exemple pour les civils.","grille":["Cite tranchées + civils mobilisés.","Intro + soldats (Verdun, tranchées, gaz) + civils (usines, propagande, pénuries).","Ajoute le génocide arménien (1915) et le bilan (Europe affaiblie, Versailles 1919)."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/histoire"},"exos":[{"consigne":"Écris 8 lignes : « La Première Guerre mondiale, une guerre totale. » Donne 1 exemple pour les soldats et 1 exemple pour les civils.","min":"Cite tranchées + civils mobilisés.","solide":"Intro + soldats (Verdun, tranchées, gaz) + civils (usines, propagande, pénuries).","mention":"Introduction : la Première Guerre mondiale (1914-1918) est qualifiée de guerre totale parce qu'elle mobilise non seulement les armées, mais la société tout entière. On peut le montrer du côté des soldats comme des civils.\n\nDu côté des soldats : la guerre impose une violence de masse inédite. À partir de fin 1914, le front se fige et les soldats vivent dans les tranchées, exposés en permanence à l'artillerie, aux gaz de combat et à des conditions effroyables. La bataille de Verdun, en 1916, en est le symbole, avec des centaines de milliers de morts.\n\nDu côté des civils : toute la société est mobilisée pour soutenir l'effort de guerre. Les femmes remplacent les hommes dans les usines d'armement, l'économie entière est tournée vers le front, et la propagande encadre les esprits tandis que la population subit pénuries et rationnement.\n\nLa guerre franchit même un nouveau seuil de violence avec le génocide des Arméniens, perpétré par l'Empire ottoman dès 1915.\n\nConclusion : par la mobilisation des soldats comme des civils et par sa violence extrême, la Première Guerre mondiale est bien une guerre totale. Elle laisse une Europe affaiblie et endeuillée, et s'achève par le traité de Versailles en 1919."},{"consigne":"Développement construit (8 lignes). « En quoi la bataille de Verdun (1916) illustre-t-elle la violence de la Première Guerre mondiale ? » Introduction, deux idées avec exemples, courte conclusion.","min":"Verdun (1916) : bataille longue et meurtrière, des centaines de milliers de morts, usage de l'artillerie massive, guerre de tranchées, conditions terribles pour les soldats (« poilus »).","solide":"Introduction : la bataille de Verdun, en 1916, est l'une des plus longues et des plus meurtrières de la Première Guerre mondiale ; elle symbolise la violence de masse de ce conflit.\nIdée 1 : une violence matérielle extrême. L'artillerie pilonne le champ de bataille en permanence (des millions d'obus), et la guerre de position dans les tranchées expose les soldats à des conditions effroyables (boue, froid, gaz).\nIdée 2 : une violence humaine de masse. La bataille fait des centaines de milliers de morts et de blessés des deux côtés en quelques mois ; les « poilus » subissent des assauts répétés pour quelques mètres de terrain.\nConclusion : Verdun incarne la guerre totale et la violence inédite de la Grande Guerre.","mention":"Introduction : la bataille de Verdun, qui se déroule en 1916, oppose les armées française et allemande pendant près de dix mois. Elle est devenue le symbole de la violence extrême de la Première Guerre mondiale. On peut se demander en quoi elle illustre cette violence.\n\nPremière idée : une violence matérielle inédite. Verdun est marquée par des bombardements d'artillerie quasi continus, avec des millions d'obus tirés sur un espace réduit. Les soldats vivent dans des tranchées, exposés à la boue, au froid, aux rats et aux gaz de combat. Le paysage lui-même est entièrement bouleversé.\n\nSeconde idée : une violence humaine de masse. La bataille fait des centaines de milliers de morts et de blessés dans les deux camps, pour des gains de terrain souvent minimes. Les soldats, surnommés les « poilus », sont envoyés dans des assauts meurtriers. Cette hécatombe illustre la mobilisation et le sacrifice de toute une génération.\n\nConclusion : par l'ampleur des moyens engagés et le nombre des victimes, la bataille de Verdun illustre parfaitement la violence de masse et le caractère total de la Première Guerre mondiale."},{"consigne":"Analyse de document. Un soldat écrit dans une lettre de 1916 : « Nous vivons dans la boue, sous les obus, sans dormir. » 1) De quel type de document s'agit-il ? 2) Quelles conditions de vie des soldats décrit-il ? 3) Relie ce témoignage à une connaissance du cours.","min":"1) Une lettre (témoignage d'un soldat). 2) Boue, bombardements, manque de sommeil : conditions très dures dans les tranchées. 3) C'est la guerre de tranchées de la Première Guerre mondiale.","solide":"1) C'est une lettre, donc un témoignage personnel et direct d'un soldat (source de première main).\n2) Il décrit des conditions de vie très dures : la boue, les obus (bombardements permanents), le manque de sommeil. Ce sont les conditions de la vie dans les tranchées.\n3) Connaissance du cours : pendant la Première Guerre mondiale, après 1914, le front se fixe et les soldats (les « poilus ») vivent dans des tranchées, exposés à l'artillerie et à des conditions épouvantables. Ce témoignage illustre la violence quotidienne subie par les combattants.","mention":"1) Nature du document.\nIl s'agit d'une lettre écrite par un soldat en 1916. C'est donc un témoignage personnel et direct, une source de première main qui rapporte le vécu d'un combattant.\n\n2) Les conditions de vie décrites.\nLe soldat évoque trois éléments : « la boue », qui renvoie à l'état du terrain des tranchées ; « les obus », c'est-à-dire les bombardements d'artillerie permanents ; et l'absence de sommeil, qui traduit l'épuisement physique et nerveux. Ce sont les conditions de la guerre de position dans les tranchées.\n\n3) Mise en relation avec le cours.\nÀ partir de la fin 1914, la Première Guerre mondiale devient une guerre de tranchées : les fronts se figent et les soldats, surnommés les « poilus », vivent dans des conditions effroyables, exposés en permanence à l'artillerie. Ce témoignage illustre concrètement la violence quotidienne et la souffrance des combattants, qui caractérisent ce conflit total.\n\nConclusion : cette lettre, source directe, met en évidence les conditions terribles de la vie dans les tranchées, un aspect central de la Première Guerre mondiale."}],"parcours":{"mission":"À la fin, tu sais expliquer pourquoi 14-18 est une guerre totale qui touche soldats ET civils.","froid":[{"q":"En quelle année commence la Première Guerre mondiale ? Et quand se termine-t-elle ?","rep":"1914 ; 1918."},{"q":"Cite le nom donné aux soldats français.","rep":"Les poilus."},{"q":"Qu'est-ce qu'une tranchée ?","rep":"Un fossé creusé où vivent et combattent les soldats (guerre de position)."},{"q":"Cite une bataille célèbre de cette guerre.","rep":"Verdun (1916)."},{"q":"Que veut dire « armistice » ?","rep":"L'arrêt des combats (ce n'est pas un traité de paix)."}],"coffre":[{"q":"La Première Guerre mondiale est une guerre totale parce que ____","rep":"…elle mobilise toute la société : soldats, civils, économie, industrie, propagande."},{"q":"Une guerre de position, c'est quand ____","rep":"…les armées s'enterrent dans des tranchées et ne bougent presque plus."},{"q":"Les civils sont touchés par : 1)____ 2)____ 3)____","rep":"1) bombardements 2) pénuries/propagande 3) violences et deuils."},{"q":"En 1915, l'Empire ottoman organise le génocide des ____","rep":"Arméniens."},{"q":"L'armistice est signé le ____","rep":"11 novembre 1918."}],"frise":[["1914-1918","Première Guerre mondiale"],["1915","(date attendue)"],["1916","Verdun"],["11 nov. 1918","armistice"],["28 juin 1919","Versailles"]],"oral":"Explique en 90 secondes : « Pourquoi cette guerre change-t-elle l'Europe ? » Parle sans notes.","ecrit":{"consigne":"Écris 8 lignes : « La Première Guerre mondiale, une guerre totale. » Donne 1 exemple pour les soldats et 1 exemple pour les civils.","min":"Cite tranchées + civils mobilisés.","solide":"Intro + soldats (Verdun, tranchées, gaz) + civils (usines, propagande, pénuries).","mention":"Ajoute le génocide arménien (1915) et le bilan (Europe affaiblie, Versailles 1919)."},"oralRedige":"La Première Guerre mondiale, de 1914 à 1918, est une guerre totale : elle ne touche pas seulement les soldats, mais toute la société. Au front, les poilus vivent dans les tranchées des combats d'une violence inédite, comme à Verdun en 1916, avec l'artillerie et les gaz. À l'arrière, les civils sont mobilisés eux aussi : les femmes remplacent les hommes dans les usines d'armement, l'économie tout entière sert l'effort de guerre, et la propagande soutient le moral. Les civils sont aussi victimes directes, comme lors du génocide des Arméniens en 1915. Au bout du compte, l'Europe sort de la guerre affaiblie, avec des millions de morts, et le traité de Versailles de 1919 redessine le continent.","ecritRedige":{"min":"La Première Guerre mondiale (1914-1918) est une guerre totale. Les soldats, appelés les poilus, se battent dans les tranchées dans des conditions terribles. Les civils aussi sont touchés : les femmes travaillent dans les usines pour fabriquer des armes pendant que les hommes sont au front.","solide":"La Première Guerre mondiale (1914-1918) est une guerre totale, car elle mobilise à la fois les soldats et l'ensemble de la société. Au front, les poilus combattent dans les tranchées et subissent une violence de masse : à Verdun, en 1916, l'artillerie et les gaz de combat font des centaines de milliers de victimes. À l'arrière, les civils sont eux aussi mobilisés : les femmes remplacent les hommes dans les usines d'armement, et la propagande entretient le soutien à la guerre. La frontière entre le front et l'arrière s'efface : c'est ce qui définit une guerre totale.","mention":"La Première Guerre mondiale (1914-1918) est une guerre totale, car elle engage la totalité des forces militaires, économiques et humaines des pays en guerre. Au front, les soldats, les poilus, vivent dans les tranchées une guerre de position d'une violence inédite : la bataille de Verdun, en 1916, symbolise cet enfer fait d'artillerie et de gaz. Mais l'arrière est tout aussi mobilisé : les femmes prennent la place des hommes dans les usines, l'économie est entièrement tournée vers l'effort de guerre et la propagande encadre l'opinion. Les civils deviennent aussi des cibles, comme le montre le génocide des Arméniens perpétré par l'Empire ottoman en 1915. La guerre s'achève par l'armistice du 11 novembre 1918, puis le traité de Versailles en 1919. L'Europe en sort durablement affaiblie, avec près de dix millions de morts, ce qui prépare les tensions de l'entre-deux-guerres."},"carte":"Crée une carte mémoire avec au centre « GUERRE TOTALE » et 4 branches : soldats, civils, dates, vocabulaire.","motscles":"guerre totale, tranchées, Verdun, poilus, arrière, propagande, génocide arménien, armistice.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre guerres totales)"}},{"id":"H2","matiere":"histoire","titre":"Démocraties fragilisées et régimes totalitaires (entre-deux-guerres)","objectif":"À la fin, tu sais distinguer une démocratie d'un régime totalitaire, avec des exemples.","qcm":[{"q":"Quelle caractéristique distingue un régime totalitaire d'une simple dictature ?","good":"Il veut contrôler la société tout entière, y compris les pensées, par la propagande et la terreur","choices":["Il organise des élections libres et pluralistes","Il laisse une opposition s'exprimer au parlement","Il se contente de limiter la liberté de la presse","Il veut contrôler la société tout entière, y compris les pensées, par la propagande et la terreur"],"explain":"Le totalitarisme va plus loin qu'une dictature classique : parti unique, culte du chef, embrigadement, police politique, encadrement total de la vie.","verif":"Vérifie dans ton cours les points communs des trois régimes (URSS, Italie, Allemagne) qui définissent le totalitarisme.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre démocraties et totalitarismes)"},{"q":"Quel régime Staline met-il en place en URSS dans l'entre-deux-guerres ?","good":"Un régime totalitaire communiste","choices":["Un régime nazi","Un régime totalitaire communiste","Une démocratie parlementaire","Un régime fasciste"],"explain":"Staline dirige un totalitarisme communiste (collectivisation, Goulag, culte de la personnalité). Le fascisme est italien, le nazisme allemand.","verif":"Retrouve dans ton cours les moyens de la terreur stalinienne (Goulag, procès, planification).","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre démocraties et totalitarismes)"},{"q":"Sur quelle idéologie repose le régime nazi de Hitler en Allemagne ?","good":"Le racisme et l'antisémitisme, avec la théorie d'une « race supérieure »","choices":["La séparation des pouvoirs","La lutte des classes et l'abolition de la propriété","Le racisme et l'antisémitisme, avec la théorie d'une « race supérieure »","L'égalité de tous les citoyens"],"explain":"Le nazisme ajoute au totalitarisme une idéologie raciste et antisémite. La lutte des classes caractérise plutôt le communisme soviétique.","verif":"Dans ton cours, compare l'idéologie nazie (racisme) et l'idéologie soviétique (lutte des classes).","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre démocraties et totalitarismes)"},{"q":"Quelle crise économique mondiale, partie des États-Unis en 1929, fragilise les démocraties européennes ?","good":"La Grande Dépression (krach de 1929)","choices":["La Grande Dépression (krach de 1929)","Le premier choc pétrolier","La crise de l'euro","La crise des subprimes"],"explain":"Le krach de Wall Street (1929) provoque chômage de masse et misère, qui nourrissent la montée des extrêmes. Les autres crises sont bien postérieures.","verif":"Vérifie dans ton cours le lien entre la crise de 1929 et la montée des régimes autoritaires.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre démocraties et totalitarismes)"},{"q":"Quelles avancées sociales le Front populaire obtient-il en France en 1936 ?","good":"Les congés payés et la semaine de 40 heures","choices":["Les congés payés et la semaine de 40 heures","Le droit de vote des femmes","La création de la Sécurité sociale","L'abolition de la peine de mort"],"explain":"Le Front populaire (1936) instaure congés payés et 40 heures. Le vote des femmes date de 1944, la Sécurité sociale de 1945, l'abolition de la peine de mort de 1981.","verif":"Retrouve dans ton cours les mesures précises de 1936 et ne les confonds pas avec celles de 1945.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre démocraties et totalitarismes)"}],"court":[{"q":"Qui arrive au pouvoir en Allemagne en 1933 ?","sol":"Adolf Hitler.","kw":["adolf","hitler"],"explain":"Contexte : totalitarisme, parti unique, propagande, terreur, Staline, Hitler, Front populaire. · À éviter : Confondre dictature simple et totalitarisme ; croire que toute l'Europe devient totalitaire.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre démocraties et totalitarismes)"},{"q":"Quel pays Staline dirige-t-il ?","sol":"L'URSS.","kw":["lurss"],"explain":"Contexte : totalitarisme, parti unique, propagande, terreur, Staline, Hitler, Front populaire. · À éviter : Confondre dictature simple et totalitarisme ; croire que toute l'Europe devient totalitaire.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre démocraties et totalitarismes)"},{"q":"Quelle crise économique mondiale éclate en 1929 ?","sol":"La crise de 1929.","kw":["1929"],"explain":"Contexte : totalitarisme, parti unique, propagande, terreur, Staline, Hitler, Front populaire. · À éviter : Confondre dictature simple et totalitarisme ; croire que toute l'Europe devient totalitaire.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre démocraties et totalitarismes)"},{"q":"Cite un point commun entre les régimes totalitaires.","sol":"Parti unique, propagande, terreur, culte du chef.","kw":["parti","unique","propagande","terreur"],"explain":"Contexte : totalitarisme, parti unique, propagande, terreur, Staline, Hitler, Front populaire. · À éviter : Confondre dictature simple et totalitarisme ; croire que toute l'Europe devient totalitaire.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre démocraties et totalitarismes)"},{"q":"Qu'est-ce que le Front populaire ?","sol":"Un gouvernement français de réformes sociales (1936).","kw":["gouvernement","français","réformes","sociales"],"explain":"Contexte : totalitarisme, parti unique, propagande, terreur, Staline, Hitler, Front populaire. · À éviter : Confondre dictature simple et totalitarisme ; croire que toute l'Europe devient totalitaire.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre démocraties et totalitarismes)"}],"paper":{"consigne":"Écris 8 lignes qui opposent démocratie et totalitarisme. Cite 2 exemples précis.","grille":["Totalitarisme = parti unique ; démocratie = élections.","Oppose contrôle total (URSS, Allemagne) et libertés (France).","Détaille propagande, terreur, culte du chef, et cite le Front populaire 1936 comme démocratie qui résiste."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/histoire"},"exos":[{"consigne":"Écris 8 lignes qui opposent démocratie et totalitarisme. Cite 2 exemples précis.","min":"Totalitarisme = parti unique ; démocratie = élections.","solide":"Oppose contrôle total (URSS, Allemagne) et libertés (France).","mention":"Introduction : dans l'entre-deux-guerres, deux types de régimes s'opposent en Europe : les démocraties, fondées sur les libertés, et les régimes totalitaires, qui veulent tout contrôler. On peut les comparer à partir d'exemples précis.\n\nLes régimes totalitaires. Ils reposent sur un parti unique et un chef tout-puissant, autour duquel se développe un culte de la personnalité. La propagande encadre les esprits et la police politique fait régner la terreur : les opposants sont surveillés, arrêtés, déportés. C'est le cas de l'URSS de Staline (totalitarisme communiste) et de l'Allemagne nazie d'Hitler, arrivé au pouvoir en 1933, fondée sur le racisme et l'antisémitisme.\n\nLes démocraties. À l'inverse, elles garantissent des élections libres, le pluralisme des partis, la liberté de la presse et le respect des libertés individuelles. En France, malgré la crise, la démocratie résiste : en 1936, le Front populaire obtient des avancées sociales (congés payés, semaine de 40 heures).\n\nConclusion : démocratie et totalitarisme s'opposent donc radicalement. L'une repose sur la liberté et le choix des citoyens, l'autre sur le contrôle total de la société par la propagande et la terreur."},{"consigne":"Développement construit (8 lignes). « Quelles sont les principales caractéristiques d'un régime totalitaire dans l'entre-deux-guerres ? » Appuie-toi sur l'exemple de l'URSS de Staline ou de l'Allemagne nazie.","min":"Parti unique, chef tout-puissant (Staline, Hitler), propagande, surveillance et terreur (police politique), absence de libertés, contrôle de l'économie et de la société.","solide":"Introduction : dans l'entre-deux-guerres, des régimes totalitaires s'installent, notamment en URSS (Staline) et en Allemagne (Hitler à partir de 1933).\nIdée 1 : le contrôle total du pouvoir et de la société. Un parti unique et un chef tout-puissant dirigent l'État ; la propagande encadre les esprits et un culte du chef est mis en place.\nIdée 2 : la suppression des libertés et la terreur. Les opposants sont surveillés par une police politique, arrêtés, envoyés dans des camps ; il n'y a plus de libertés ni d'élections libres.\nConclusion : le totalitarisme cherche à contrôler entièrement l'individu et la société.","mention":"Introduction : l'entre-deux-guerres voit naître des régimes totalitaires, en particulier l'URSS dirigée par Staline et l'Allemagne nazie d'Hitler, arrivé au pouvoir en 1933. Ces régimes présentent des caractéristiques communes.\n\nPremière caractéristique : un contrôle total du pouvoir et de la société. Le régime repose sur un parti unique et un chef tout-puissant, autour duquel se développe un véritable culte de la personnalité. Une propagande omniprésente (affiches, radio, écoles, jeunesses) encadre les esprits, et l'État cherche à contrôler l'économie et toute la vie sociale.\n\nSeconde caractéristique : la suppression des libertés et le recours à la terreur. Les libertés individuelles et politiques disparaissent : plus d'élections libres ni de presse indépendante. Les opposants, réels ou supposés, sont surveillés par une police politique, arrêtés, déportés dans des camps, voire exécutés. La peur devient un instrument de gouvernement.\n\nConclusion : qu'il s'agisse de l'URSS stalinienne ou de l'Allemagne nazie, le régime totalitaire se caractérise par un pouvoir absolu, une propagande de masse et la terreur, dans le but de contrôler entièrement l'individu et la société."},{"consigne":"Repères et notions. 1) En quelle année Hitler arrive-t-il au pouvoir en Allemagne ? 2) Donne le nom du chef de l'URSS dans les années 1930. 3) Explique en une phrase ce qu'est la propagande.","min":"1) 1933. 2) Staline. 3) La propagande est l'ensemble des moyens (affiches, discours, radio) utilisés pour imposer des idées et faire adhérer la population au régime.","solide":"1) Hitler arrive au pouvoir en Allemagne en 1933 (il devient chancelier).\n2) Le chef de l'URSS dans les années 1930 est Staline.\n3) La propagande est l'ensemble des moyens de communication (affiches, discours, presse, radio, cinéma) employés par un régime pour diffuser ses idées et obtenir l'adhésion ou l'obéissance de la population.","mention":"1) L'arrivée d'Hitler au pouvoir.\nAdolf Hitler accède au pouvoir en Allemagne en 1933, lorsqu'il devient chancelier. Il met ensuite rapidement en place une dictature.\n\n2) Le chef de l'URSS.\nDans les années 1930, l'URSS est dirigée par Staline, qui exerce un pouvoir personnel et totalitaire.\n\n3) La définition de la propagande.\nLa propagande désigne l'ensemble des moyens de communication (affiches, discours, presse, radio, cinéma, défilés) utilisés par un régime pour diffuser ses idées et obtenir l'adhésion, voire l'obéissance, de la population. Dans les régimes totalitaires, elle est omniprésente et sert à glorifier le chef et le parti unique.\n\nConclusion : Hitler arrive au pouvoir en 1933, Staline dirige l'URSS, et la propagande est l'arme de communication par laquelle ces régimes contrôlent les esprits."}],"parcours":{"mission":"À la fin, tu sais distinguer une démocratie d'un régime totalitaire, avec des exemples.","froid":[{"q":"Qui arrive au pouvoir en Allemagne en 1933 ?","rep":"Adolf Hitler."},{"q":"Quel pays Staline dirige-t-il ?","rep":"L'URSS."},{"q":"Quelle crise économique mondiale éclate en 1929 ?","rep":"La crise de 1929."},{"q":"Cite un point commun entre les régimes totalitaires.","rep":"Parti unique, propagande, terreur, culte du chef."},{"q":"Qu'est-ce que le Front populaire ?","rep":"Un gouvernement français de réformes sociales (1936)."}],"coffre":[{"q":"Un régime totalitaire veut contrôler ____, ____ et ____","rep":"…l'État, la société et les esprits."},{"q":"Trois outils des régimes totalitaires : ____, ____, ____","rep":"propagande, terreur, parti unique (culte du chef)."},{"q":"En URSS, le dirigeant est ____","rep":"Staline."},{"q":"En Allemagne, le dirigeant est ____","rep":"Hitler."},{"q":"La France reste une démocratie : exemple, le ____ en 1936","rep":"Front populaire."}],"frise":[["1929","crise économique mondiale"],["1933","(date attendue)"],["1936","Front populaire"],["1922","Mussolini"]],"oral":"Explique en 90 secondes la différence entre une dictature ordinaire et un régime totalitaire.","ecrit":{"consigne":"Écris 8 lignes qui opposent démocratie et totalitarisme. Cite 2 exemples précis.","min":"Totalitarisme = parti unique ; démocratie = élections.","solide":"Oppose contrôle total (URSS, Allemagne) et libertés (France).","mention":"Détaille propagande, terreur, culte du chef, et cite le Front populaire 1936 comme démocratie qui résiste."},"oralRedige":"Dans l'entre-deux-guerres, les démocraties sont fragilisées, notamment par la crise économique de 1929 qui provoque chômage et misère. Dans ce contexte, des régimes totalitaires s'installent. En URSS, Staline impose un communisme totalitaire ; en Italie, Mussolini dirige un régime fasciste ; en Allemagne, Hitler met en place un régime nazi fondé sur le racisme et l'antisémitisme. Ces régimes ont des points communs : un parti unique, un chef tout-puissant, la propagande, la terreur et la police politique. Ils veulent contrôler la société entière. La France, elle, reste une démocratie : en 1936, le Front populaire obtient les congés payés et la semaine de 40 heures.","ecritRedige":{"min":"Dans l'entre-deux-guerres, des régimes totalitaires apparaissent. En URSS il y a Staline, en Italie Mussolini, en Allemagne Hitler. Ces régimes ont un parti unique et un chef qui contrôle tout. La France reste une démocratie, avec le Front populaire en 1936.","solide":"Une démocratie et un régime totalitaire s'opposent point par point. Dans une démocratie, comme la France des années 1930, le pouvoir est élu, plusieurs partis existent et les libertés sont garanties : en 1936, le Front populaire fait voter les congés payés. À l'inverse, un régime totalitaire repose sur un parti unique et un chef tout-puissant : Staline en URSS, Hitler en Allemagne, Mussolini en Italie. Ces régimes contrôlent la société par la propagande, la terreur et une police politique. La crise de 1929 a favorisé leur montée en plongeant des millions de gens dans le chômage.","mention":"Une démocratie et un régime totalitaire reposent sur des principes opposés. La démocratie garantit des élections libres, le pluralisme des partis et le respect des libertés individuelles : la France en est un exemple, avec le Front populaire qui obtient en 1936 les congés payés et la semaine de 40 heures. Le régime totalitaire, lui, veut contrôler la société tout entière, jusqu'aux pensées. Il s'appuie sur un parti unique, le culte du chef, la propagande, l'embrigadement de la jeunesse et la terreur exercée par une police politique. Trois régimes l'incarnent : le communisme de Staline en URSS, le fascisme de Mussolini en Italie, et le nazisme de Hitler en Allemagne, qui y ajoute une idéologie raciste et antisémite. La crise économique de 1929, en provoquant chômage et misère, a nourri la montée de ces régimes en discréditant les démocraties."},"carte":"Carte mémoire : deux colonnes face à face, « TOTALITARISME » vs « DÉMOCRATIE ».","motscles":"totalitarisme, parti unique, propagande, terreur, Staline, Hitler, Front populaire.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre démocraties et totalitarismes)"}},{"id":"H3","matiere":"histoire","titre":"La Seconde Guerre mondiale, une guerre d'anéantissement","objectif":"À la fin, tu sais expliquer pourquoi 39-45 est planétaire, totale et d'anéantissement.","qcm":[{"q":"Quel événement de septembre 1939 marque le début de la Seconde Guerre mondiale en Europe ?","good":"L'invasion de la Pologne par l'Allemagne","choices":["L'attaque de Pearl Harbor","L'invasion de l'URSS","L'invasion de la Pologne par l'Allemagne","Le débarquement en Normandie"],"explain":"L'invasion de la Pologne (1er septembre 1939) déclenche la guerre. Pearl Harbor (1941) et le débarquement (1944) viennent plus tard.","verif":"Place sur ta frise septembre 1939 et vérifie quels pays déclarent alors la guerre à l'Allemagne.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre Seconde Guerre mondiale)"},{"q":"Que désigne précisément le terme « Shoah » ?","good":"L'extermination systématique des Juifs d'Europe par le régime nazi","choices":["La résistance des populations occupées","La déportation des prisonniers de guerre","L'extermination systématique des Juifs d'Europe par le régime nazi","Les bombardements des villes allemandes"],"explain":"La Shoah désigne le génocide des Juifs (avec celui des Tziganes), industrialisé dans les camps d'extermination. C'est le cœur de la « guerre d'anéantissement ».","verif":"Dans ton cours, distingue camps de concentration et camps d'extermination.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre Seconde Guerre mondiale)"},{"q":"Pourquoi parle-t-on de « guerre d'anéantissement » pour 1939-1945 ?","good":"Parce qu'on cherche à détruire l'adversaire et des populations entières, par le génocide et les violences de masse","choices":["Parce que la guerre est uniquement économique","Parce qu'aucun civil n'est touché","Parce que les combats se limitent aux armées","Parce qu'on cherche à détruire l'adversaire et des populations entières, par le génocide et les violences de masse"],"explain":"Anéantissement : génocides, massacres de civils, bombardements massifs, déshumanisation de l'ennemi. La violence dépasse de loin le seul affrontement militaire.","verif":"Retrouve dans ton cours les formes de violence qui justifient l'expression « guerre d'anéantissement ».","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre Seconde Guerre mondiale)"},{"q":"Quelle bataille de 1942-1943 marque le tournant de la guerre sur le front de l'Est ?","good":"Stalingrad","choices":["Verdun","Stalingrad","La bataille de la Marne","La bataille d'El-Alamein"],"explain":"La défaite allemande à Stalingrad (1943) inverse le cours de la guerre. Verdun et la Marne sont de 14-18, Austerlitz est napoléonienne.","verif":"Vérifie sur ta frise la date de Stalingrad et pourquoi c'est un tournant.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre Seconde Guerre mondiale)"},{"q":"Que se passe-t-il le 6 juin 1944 ?","good":"Le débarquement allié en Normandie (Jour J)","choices":["L'entrée en guerre des États-Unis","La capitulation de l'Allemagne","Le débarquement allié en Normandie (Jour J)","Le lancement de la bombe atomique"],"explain":"Le 6 juin 1944, les Alliés débarquent en Normandie pour libérer l'Ouest. La capitulation allemande, elle, intervient en mai 1945.","verif":"Dans ton cours, ordonne : débarquement (juin 1944), capitulation allemande (mai 1945), bombes atomiques (août 1945).","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre Seconde Guerre mondiale)"},{"q":"Comment la Seconde Guerre mondiale se termine-t-elle dans le Pacifique en août 1945 ?","good":"Par les bombardements atomiques d'Hiroshima et de Nagasaki","choices":["Par l'armistice de Rethondes","Par la bataille de Stalingrad","Par le débarquement en Normandie","Par les bombardements atomiques d'Hiroshima et de Nagasaki"],"explain":"Les bombes atomiques sur Hiroshima et Nagasaki (août 1945) précipitent la capitulation du Japon. Rethondes concerne 1918.","verif":"Vérifie dans ton cours la date des bombes atomiques et la fin de la guerre dans le Pacifique.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre Seconde Guerre mondiale)"}],"court":[{"q":"Quel pays est envahi le 1er septembre 1939 ?","sol":"La Pologne.","kw":["pologne"],"explain":"Contexte : Axe, Alliés, guerre d'anéantissement, Shoah, génocide, Stalingrad, Normandie, Hiroshima. · À éviter : Confondre camp de concentration et centre de mise à mort ; oublier les civils et les génocides.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre Seconde Guerre mondiale)"},{"q":"Quel événement fait entrer les États-Unis en guerre ?","sol":"L'attaque de Pearl Harbor (7 décembre 1941).","kw":["lattaque","pearl","harbor","décembre"],"explain":"Contexte : Axe, Alliés, guerre d'anéantissement, Shoah, génocide, Stalingrad, Normandie, Hiroshima. · À éviter : Confondre camp de concentration et centre de mise à mort ; oublier les civils et les génocides.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre Seconde Guerre mondiale)"},{"q":"Quelle bataille est un tournant sur le front de l'Est ?","sol":"Stalingrad (1942-1943).","kw":["stalingrad","19421943"],"explain":"Contexte : Axe, Alliés, guerre d'anéantissement, Shoah, génocide, Stalingrad, Normandie, Hiroshima. · À éviter : Confondre camp de concentration et centre de mise à mort ; oublier les civils et les génocides.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre Seconde Guerre mondiale)"},{"q":"Que désigne le mot « Shoah » ?","sol":"Le génocide des Juifs d'Europe.","kw":["génocide","juifs","deurope"],"explain":"Contexte : Axe, Alliés, guerre d'anéantissement, Shoah, génocide, Stalingrad, Normandie, Hiroshima. · À éviter : Confondre camp de concentration et centre de mise à mort ; oublier les civils et les génocides.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre Seconde Guerre mondiale)"},{"q":"Quand l'Allemagne capitule-t-elle ?","sol":"Le 8 mai 1945.","kw":["1945"],"explain":"Contexte : Axe, Alliés, guerre d'anéantissement, Shoah, génocide, Stalingrad, Normandie, Hiroshima. · À éviter : Confondre camp de concentration et centre de mise à mort ; oublier les civils et les génocides.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre Seconde Guerre mondiale)"}],"paper":{"consigne":"Écris 10 lignes : « Pourquoi la Seconde Guerre mondiale est-elle une guerre d'anéantissement ? » Intro + 2 idées + exemples.","grille":["Guerre mondiale + génocides.","Intro + dimension mondiale + violence d'anéantissement (civils, génocides).","Distingue camp de concentration / centre de mise à mort, cite Auschwitz-Birkenau, Shoah et Roms/Sinti."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/histoire"},"exos":[{"consigne":"Écris 10 lignes : « Pourquoi la Seconde Guerre mondiale est-elle une guerre d'anéantissement ? » Intro + 2 idées + exemples.","min":"Guerre mondiale + génocides.","solide":"Intro + dimension mondiale + violence d'anéantissement (civils, génocides).","mention":"Introduction : la Seconde Guerre mondiale (1939-1945) est qualifiée de guerre d'anéantissement parce que les belligérants ne cherchent plus seulement la victoire militaire, mais la destruction totale de l'adversaire et de populations entières. On peut le montrer par deux aspects.\n\nPremière idée : une guerre mondiale d'une violence inédite. Le conflit s'étend sur plusieurs continents (Europe, Afrique, Asie, Pacifique) et mobilise toutes les ressources. Les combats sont d'une ampleur extrême, comme à Stalingrad (1942-1943), et touchent massivement les civils, notamment par les bombardements, jusqu'aux bombes atomiques d'Hiroshima et Nagasaki en 1945.\n\nSeconde idée : des génocides planifiés. Le régime nazi organise l'extermination systématique de populations pour ce qu'elles sont. C'est la Shoah, le génocide des Juifs d'Europe (environ six millions de morts), auquel s'ajoute le génocide des Roms et Sinti. Il faut distinguer les camps de concentration, où l'on enferme et exploite, des centres de mise à mort comme Auschwitz-Birkenau, conçus pour tuer en masse.\n\nConclusion : par son extension mondiale, sa violence contre les civils et la mise en œuvre de génocides, la Seconde Guerre mondiale est bien une guerre d'anéantissement, sans précédent dans l'histoire."},{"consigne":"Développement construit (10 lignes). « En quoi le génocide des Juifs et des Tsiganes montre-t-il que la Seconde Guerre mondiale est une guerre d'anéantissement ? » Intro, deux idées avec exemples, conclusion.","min":"Génocide = volonté d'exterminer un peuple entier. Juifs et Tsiganes visés par les nazis, ghettos, déportation dans des camps d'extermination (Auschwitz), massacres de masse. Cela dépasse la guerre militaire : on vise des civils pour ce qu'ils sont.","solide":"Introduction : la Seconde Guerre mondiale est dite « d'anéantissement » car elle vise à détruire des populations entières. Le génocide des Juifs et des Tsiganes en est la preuve la plus tragique.\nIdée 1 : une volonté d'extermination planifiée. Les nazis cherchent à éliminer totalement les Juifs et les Tsiganes d'Europe pour ce qu'ils sont. Cela passe par les ghettos, les fusillades de masse, puis la déportation.\nIdée 2 : une mise en œuvre industrielle. Des camps d'extermination, comme Auschwitz, sont organisés pour tuer massivement dans les chambres à gaz. Des millions de personnes sont assassinées.\nConclusion : viser des civils pour les anéantir, au-delà de tout objectif militaire, fait de ce conflit une guerre d'anéantissement.","mention":"Introduction : la Seconde Guerre mondiale (1939-1945) est qualifiée de guerre d'anéantissement parce que les belligérants ne visent plus seulement une victoire militaire, mais la destruction de populations entières. Le génocide des Juifs et des Tsiganes en constitue l'illustration la plus dramatique. En quoi le montre-t-il ?\n\nPremière idée : une volonté d'extermination planifiée et idéologique. Le régime nazi décide d'éliminer totalement les Juifs et les Tsiganes d'Europe, non pour ce qu'ils font, mais pour ce qu'ils sont. Les Juifs sont d'abord persécutés, regroupés dans des ghettos, puis des unités mobiles procèdent à des fusillades de masse à l'arrière du front de l'Est.\n\nSeconde idée : une mise à mort organisée à l'échelle industrielle. À partir de 1942, les nazis déportent les victimes vers des camps d'extermination, comme Auschwitz-Birkenau, où l'assassinat est organisé méthodiquement, notamment dans les chambres à gaz. Le génocide fait environ six millions de victimes juives, auxquelles s'ajoutent les Tsiganes.\n\nConclusion : en cherchant à anéantir des civils entiers pour des raisons idéologiques, bien au-delà de tout objectif militaire, le génocide montre que la Seconde Guerre mondiale est une guerre d'anéantissement, d'une violence sans précédent dans l'histoire."},{"consigne":"Repères. 1) Donne les dates de début et de fin de la Seconde Guerre mondiale. 2) Qu'appelle-t-on la Shoah ? 3) Cite un camp d'extermination nazi.","min":"1) 1939-1945. 2) La Shoah désigne le génocide des Juifs d'Europe par les nazis. 3) Auschwitz (Auschwitz-Birkenau).","solide":"1) La Seconde Guerre mondiale commence en 1939 et se termine en 1945.\n2) La Shoah désigne le génocide des Juifs d'Europe organisé par l'Allemagne nazie, c'est-à-dire leur extermination planifiée (environ 6 millions de morts).\n3) Un camp d'extermination nazi : Auschwitz-Birkenau (on peut aussi citer Treblinka).","mention":"1) Les dates du conflit.\nLa Seconde Guerre mondiale débute en 1939, avec l'invasion de la Pologne, et s'achève en 1945, avec la capitulation de l'Allemagne (mai) puis du Japon (septembre).\n\n2) La Shoah.\nLa Shoah désigne le génocide des Juifs d'Europe perpétré par l'Allemagne nazie pendant la guerre. Il s'agit de l'extermination planifiée et systématique d'un peuple, qui a fait environ six millions de victimes.\n\n3) Un camp d'extermination.\nLe camp d'Auschwitz-Birkenau est le plus connu des camps d'extermination nazis. On peut aussi citer Treblinka ou Sobibor. Ces camps étaient organisés pour tuer massivement.\n\nConclusion : la guerre se déroule de 1939 à 1945, la Shoah est le génocide des Juifs d'Europe, et Auschwitz en est le camp d'extermination emblématique."}],"parcours":{"mission":"À la fin, tu sais expliquer pourquoi 39-45 est planétaire, totale et d'anéantissement.","froid":[{"q":"Quel pays est envahi le 1er septembre 1939 ?","rep":"La Pologne."},{"q":"Quel événement fait entrer les États-Unis en guerre ?","rep":"L'attaque de Pearl Harbor (7 décembre 1941)."},{"q":"Quelle bataille est un tournant sur le front de l'Est ?","rep":"Stalingrad (1942-1943)."},{"q":"Que désigne le mot « Shoah » ?","rep":"Le génocide des Juifs d'Europe."},{"q":"Quand l'Allemagne capitule-t-elle ?","rep":"Le 8 mai 1945."}],"coffre":[{"q":"L'Axe regroupe : ____, ____, ____","rep":"Allemagne, Italie, Japon."},{"q":"Une guerre d'anéantissement vise à ____","rep":"…détruire totalement l'ennemi, civils compris."},{"q":"Différence : un camp de concentration sert à ____, un centre de mise à mort sert à ____","rep":"…interner et faire travailler de force ; …exterminer en masse."},{"q":"Les deux génocides organisés par les nazis visent les ____ et les ____","rep":"Juifs ; Roms/Sinti."},{"q":"Le Japon capitule après les bombes sur ____ et ____","rep":"Hiroshima ; Nagasaki."}],"frise":[["1er sept. 1939","invasion de la Pologne"],["1941","Pearl Harbor"],["6 juin 1944","Normandie"],["8 mai 1945","capitulation allemande"],["1942-1943","Stalingrad"]],"oral":"Explique en 90 secondes pourquoi on parle de guerre « d'anéantissement ».","ecrit":{"consigne":"Écris 10 lignes : « Pourquoi la Seconde Guerre mondiale est-elle une guerre d'anéantissement ? » Intro + 2 idées + exemples.","min":"Guerre mondiale + génocides.","solide":"Intro + dimension mondiale + violence d'anéantissement (civils, génocides).","mention":"Distingue camp de concentration / centre de mise à mort, cite Auschwitz-Birkenau, Shoah et Roms/Sinti."},"oralRedige":"La Seconde Guerre mondiale, de 1939 à 1945, est une guerre d'anéantissement, c'est-à-dire qu'on cherche à détruire totalement l'adversaire et des populations entières. Elle est mondiale, puisqu'elle se déroule sur plusieurs continents, et totale, parce qu'elle mobilise toutes les ressources. Mais elle va plus loin : les nazis organisent le génocide des Juifs et des Tziganes, la Shoah, dans des camps d'extermination. La violence vise aussi les civils, avec des bombardements massifs et, en 1945, les bombes atomiques sur Hiroshima et Nagasaki. C'est cette volonté de destruction totale qui fait de 39-45 une guerre d'anéantissement.","ecritRedige":{"min":"La Seconde Guerre mondiale (1939-1945) est une guerre d'anéantissement : on veut détruire l'ennemi et des populations entières. Les nazis organisent le génocide des Juifs, appelé la Shoah, dans des camps d'extermination. Les civils sont aussi tués lors des bombardements.","solide":"La Seconde Guerre mondiale est une guerre d'anéantissement parce qu'on ne cherche plus seulement à vaincre l'ennemi, mais à le détruire totalement. C'est une guerre mondiale et totale, mais elle se distingue par la violence extrême faite aux civils. Les nazis organisent un génocide, la Shoah : les Juifs d'Europe sont exterminés de façon systématique dans des camps de mise à mort. Les bombardements massifs frappent les villes, et la guerre s'achève en 1945 par les bombes atomiques sur Hiroshima et Nagasaki. Cette volonté de destruction de populations entières définit la guerre d'anéantissement.","mention":"La Seconde Guerre mondiale (1939-1945) est qualifiée de guerre d'anéantissement parce que les belligérants ne cherchent plus seulement la victoire militaire, mais la destruction totale de l'adversaire et de populations entières. Elle est d'abord mondiale, se déroulant en Europe, en Afrique et dans le Pacifique, et totale, mobilisant toutes les ressources humaines et économiques. Mais elle franchit un seuil supplémentaire avec les génocides organisés par les nazis : la Shoah, extermination systématique des Juifs d'Europe, et le génocide des Tziganes, perpétrés industriellement dans des camps d'extermination. La violence vise massivement les civils, à travers les bombardements de villes entières et, en août 1945, les bombes atomiques larguées sur Hiroshima et Nagasaki. Cette logique d'extermination, qui dépasse le simple affrontement entre armées, est ce qui caractérise une guerre d'anéantissement."},"carte":"Carte mémoire : « 39-45 » au centre, branches : guerre mondiale / guerre totale / anéantissement / génocides.","motscles":"Axe, Alliés, guerre d'anéantissement, Shoah, génocide, Stalingrad, Normandie, Hiroshima.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre Seconde Guerre mondiale)"}},{"id":"H4","matiere":"histoire","titre":"La France défaite et occupée : Vichy, collaboration, Résistance","objectif":"À la fin, tu sais raconter comment les Français réagissent à la défaite de 1940.","qcm":[{"q":"Quel régime Pétain met-il en place en juillet 1940, en remplacement de la République ?","good":"L'État français (régime de Vichy)","choices":["L'État français (régime de Vichy)","La IVe République","Le Directoire","La Commune de Paris"],"explain":"Pétain fonde l'« État français » (Vichy), autoritaire et collaborateur, dont la devise devient « Travail, Famille, Patrie ».","verif":"Retrouve dans ton cours la devise de Vichy et compare-la à celle de la République.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre France dans la Seconde Guerre mondiale)"},{"q":"Que signifie la « collaboration » menée par le régime de Vichy ?","good":"La coopération volontaire avec l'Allemagne nazie, y compris dans la persécution des Juifs","choices":["La coopération volontaire avec l'Allemagne nazie, y compris dans la persécution des Juifs","La lutte armée contre l'occupant","Le refus de tout contact avec l'ennemi","La fuite du gouvernement à Londres"],"explain":"Collaboration : Vichy aide l'occupant (police, STO, rafles comme celle du Vel d'Hiv en 1942). Elle s'oppose à la Résistance.","verif":"Dans ton cours, repère un exemple concret de collaboration (rafle du Vel d'Hiv, STO).","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre France dans la Seconde Guerre mondiale)"},{"q":"Qui lance, depuis Londres, l'appel du 18 juin 1940 à poursuivre le combat ?","good":"Le général de Gaulle","choices":["Le général de Gaulle","Le maréchal Pétain","Pierre Laval","Jean Moulin"],"explain":"De Gaulle incarne la France libre depuis Londres. Pétain et Laval sont au contraire les figures de Vichy et de la collaboration.","verif":"Vérifie dans ton cours la différence entre France libre (de Gaulle) et Résistance intérieure.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre France dans la Seconde Guerre mondiale)"},{"q":"Quel est le rôle de Jean Moulin dans la Résistance ?","good":"Il unifie les mouvements de la Résistance intérieure au sein du CNR","choices":["Il commande l'armée allemande en France","Il préside la IVe République","Il dirige le gouvernement de Vichy","Il unifie les mouvements de la Résistance intérieure au sein du CNR"],"explain":"Jean Moulin, envoyé par de Gaulle, crée le Conseil national de la Résistance (1943) qui unifie les réseaux. Arrêté, il meurt sous la torture.","verif":"Retrouve dans ton cours ce qu'est le CNR et le rôle de Jean Moulin.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre France dans la Seconde Guerre mondiale)"},{"q":"Quel régime politique est rétabli en France à la Libération (1944) ?","good":"La République","choices":["La République","L'Empire","La monarchie","Le régime de Vichy"],"explain":"La Libération rétablit la République (gouvernement provisoire dirigé par de Gaulle), mettant fin à l'État français de Vichy.","verif":"Dans ton cours, vérifie ce que devient la République entre 1940 et 1944.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre France dans la Seconde Guerre mondiale)"}],"court":[{"q":"Qui lance l'appel du 18 juin 1940 ?","sol":"Le général de Gaulle.","kw":["général","gaulle"],"explain":"Contexte : armistice, Vichy, État français, collaboration, Résistance, de Gaulle, Jean Moulin, CNR, Libération. · À éviter : Dire que tous les Français résistaient ; confondre Vichy et République.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre France dans la Seconde Guerre mondiale)"},{"q":"Qui dirige le régime de Vichy ?","sol":"Le maréchal Pétain.","kw":["maréchal","pétain"],"explain":"Contexte : armistice, Vichy, État français, collaboration, Résistance, de Gaulle, Jean Moulin, CNR, Libération. · À éviter : Dire que tous les Français résistaient ; confondre Vichy et République.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre France dans la Seconde Guerre mondiale)"},{"q":"Que veut dire « collaboration » ?","sol":"Coopérer avec l'Allemagne nazie.","kw":["coopérer","lallemagne"],"explain":"Contexte : armistice, Vichy, État français, collaboration, Résistance, de Gaulle, Jean Moulin, CNR, Libération. · À éviter : Dire que tous les Français résistaient ; confondre Vichy et République.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre France dans la Seconde Guerre mondiale)"},{"q":"Qui unifie la Résistance intérieure ?","sol":"Jean Moulin (autour du CNR).","kw":["jean","moulin","autour","cnr"],"explain":"Contexte : armistice, Vichy, État français, collaboration, Résistance, de Gaulle, Jean Moulin, CNR, Libération. · À éviter : Dire que tous les Français résistaient ; confondre Vichy et République.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre France dans la Seconde Guerre mondiale)"},{"q":"Quand Paris est-elle libérée ?","sol":"Le 25 août 1944.","kw":["1944"],"explain":"Contexte : armistice, Vichy, État français, collaboration, Résistance, de Gaulle, Jean Moulin, CNR, Libération. · À éviter : Dire que tous les Français résistaient ; confondre Vichy et République.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre France dans la Seconde Guerre mondiale)"}],"paper":{"consigne":"Écris 8 lignes : la défaite et l'occupation (partie I), puis Vichy et la collaboration (partie II).","grille":["Défaite + Vichy + Résistance.","I défaite/occupation, II Vichy et collaboration.","Nuance : tous les Français ne sont pas résistants ; cite statut des Juifs, Vel d'Hiv 1942, Jean Moulin/CNR."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/histoire"},"exos":[{"consigne":"Écris 8 lignes : la défaite et l'occupation (partie I), puis Vichy et la collaboration (partie II).","min":"Défaite + Vichy + Résistance.","solide":"I défaite/occupation, II Vichy et collaboration.","mention":"Introduction : après la défaite de 1940, la France connaît l'occupation et un régime qui choisit la collaboration. Mais une partie des Français refuse de se soumettre et entre en résistance.\n\nPartie I : la défaite et l'occupation. En juin 1940, l'armée française est écrasée par l'Allemagne. Le pays est en partie occupé, et le maréchal Pétain met en place l'État français, le régime de Vichy, qui met fin à la République.\n\nPartie II : Vichy, la collaboration et la Résistance. Le régime de Vichy choisit la collaboration avec l'Allemagne nazie : il promulgue un statut des Juifs et participe à leur persécution, comme lors de la rafle du Vel d'Hiv en 1942. Mais dès le 18 juin 1940, le général de Gaulle appelle, depuis Londres, à poursuivre le combat. En France, des réseaux de résistance se forment (sabotages, presse clandestine, maquis), unifiés en 1943 par Jean Moulin au sein du Conseil national de la Résistance.\n\nConclusion : il faut nuancer l'image d'une France unie : tous les Français ne furent ni résistants ni collaborateurs. La période oppose une politique de collaboration et un engagement résistant qui prépare la Libération de 1944."},{"consigne":"Développement construit (8 lignes). « Comment les Français résistent-ils à l'occupation allemande et au régime de Vichy ? » Donne des exemples de formes de résistance.","min":"Résistance intérieure (réseaux, maquis, sabotages, presse clandestine) et résistance extérieure (de Gaulle, appel du 18 juin 1940, Forces françaises libres). Jean Moulin unifie la Résistance.","solide":"Introduction : après la défaite de 1940 et l'instauration du régime de Vichy, qui collabore avec l'Allemagne, des Français choisissent de résister.\nIdée 1 : la résistance extérieure. Depuis Londres, le général de Gaulle lance l'appel du 18 juin 1940 et organise les Forces françaises libres pour continuer le combat.\nIdée 2 : la résistance intérieure. En France, des réseaux se forment : sabotages, renseignement, presse clandestine, maquis. Jean Moulin unifie ces mouvements en 1943.\nConclusion : malgré les risques, la Résistance, intérieure et extérieure, incarne le refus de la défaite et de la collaboration.","mention":"Introduction : après la défaite de juin 1940, la France est occupée et le régime de Vichy, dirigé par Pétain, choisit la collaboration avec l'Allemagne nazie. Face à cette situation, des Français refusent de se soumettre et entrent en résistance, sous des formes variées.\n\nPremière idée : la résistance extérieure. Depuis Londres, le général de Gaulle lance, dès l'appel du 18 juin 1940, un message invitant à poursuivre le combat. Il organise les Forces françaises libres, qui continuent la lutte aux côtés des Alliés.\n\nSeconde idée : la résistance intérieure. Sur le territoire français, des réseaux clandestins se forment et mènent des actions variées : sabotages de voies ferrées et d'usines, renseignement transmis aux Alliés, diffusion d'une presse clandestine, et formation de maquis (groupes armés cachés). En 1943, Jean Moulin parvient à unifier les principaux mouvements au sein du Conseil national de la Résistance.\n\nConclusion : malgré les dangers (arrestations, torture, exécutions), la Résistance, à la fois extérieure et intérieure, incarne le refus de la défaite, de l'occupation et de la collaboration. Elle participe à la libération du pays en 1944."},{"consigne":"Repères et notions. 1) Qui lance l'appel du 18 juin 1940 et d'où ? 2) Qui dirige le régime de Vichy ? 3) Que signifie le mot « collaboration » ?","min":"1) Le général de Gaulle, depuis Londres. 2) Le maréchal Pétain. 3) La collaboration est la coopération volontaire du régime de Vichy avec l'Allemagne nazie.","solide":"1) L'appel du 18 juin 1940 est lancé par le général de Gaulle depuis Londres (à la radio, sur la BBC).\n2) Le régime de Vichy est dirigé par le maréchal Pétain.\n3) La collaboration désigne la politique de coopération volontaire du régime de Vichy avec l'Allemagne nazie (livraison de Juifs, travail forcé en Allemagne, soutien à l'occupant).","mention":"1) L'appel du 18 juin 1940.\nIl est lancé par le général de Gaulle depuis Londres, sur les ondes de la radio britannique (la BBC). De Gaulle y appelle les Français à refuser la défaite et à poursuivre le combat.\n\n2) Le chef du régime de Vichy.\nLe régime de Vichy, installé après la défaite de 1940, est dirigé par le maréchal Pétain. Ce régime met fin à la République et choisit la collaboration.\n\n3) La collaboration.\nLa collaboration désigne la politique de coopération volontaire menée par le régime de Vichy avec l'Allemagne nazie. Elle se traduit notamment par la participation à l'arrestation et à la déportation des Juifs, par l'envoi de travailleurs en Allemagne et par le soutien apporté à l'occupant.\n\nConclusion : de Gaulle lance l'appel du 18 juin depuis Londres, Pétain dirige Vichy, et la collaboration est la coopération de ce régime avec l'Allemagne nazie. Résistance et collaboration s'opposent donc radicalement."}],"parcours":{"mission":"À la fin, tu sais raconter comment les Français réagissent à la défaite de 1940.","froid":[{"q":"Qui lance l'appel du 18 juin 1940 ?","rep":"Le général de Gaulle."},{"q":"Qui dirige le régime de Vichy ?","rep":"Le maréchal Pétain."},{"q":"Que veut dire « collaboration » ?","rep":"Coopérer avec l'Allemagne nazie."},{"q":"Qui unifie la Résistance intérieure ?","rep":"Jean Moulin (autour du CNR)."},{"q":"Quand Paris est-elle libérée ?","rep":"Le 25 août 1944."}],"coffre":[{"q":"En 1940, la France est ____ par l'Allemagne","rep":"…vaincue / occupée."},{"q":"Le régime de Vichy remplace la République par ____","rep":"l'État français."},{"q":"Depuis Londres, ____ appelle à résister","rep":"de Gaulle."},{"q":"Jean Moulin unifie la Résistance dans le ____ (sigle)","rep":"CNR."},{"q":"La collaboration, c'est ____","rep":"…la coopération politique, économique ou policière avec l'Allemagne nazie."}],"frise":[["18 juin 1940","de Gaulle (appel)"],["22 juin 1940","armistice"],["1943","CNR"],["25 août 1944","Paris"]],"oral":"Explique en 90 secondes : pourquoi ne peut-on PAS dire que « tous les Français étaient résistants » ?","ecrit":{"consigne":"Écris 8 lignes : la défaite et l'occupation (partie I), puis Vichy et la collaboration (partie II).","min":"Défaite + Vichy + Résistance.","solide":"I défaite/occupation, II Vichy et collaboration.","mention":"Nuance : tous les Français ne sont pas résistants ; cite statut des Juifs, Vel d'Hiv 1942, Jean Moulin/CNR."},"oralRedige":"En 1940, la France est vaincue par l'Allemagne. Le pays se divise alors en trois attitudes. D'abord la collaboration : le maréchal Pétain dirige le régime de Vichy, qui coopère avec l'occupant nazi et participe même à la persécution des Juifs. Ensuite la Résistance : à Londres, le général de Gaulle lance l'appel du 18 juin 1940 pour continuer le combat, tandis qu'en France, des réseaux clandestins s'organisent et que Jean Moulin les unifie au sein du Conseil national de la Résistance en 1943. Enfin, la majorité de la population subit l'Occupation au quotidien. La République est rétablie à la Libération, en 1944.","ecritRedige":{"min":"En 1940, la France est battue par l'Allemagne. Le maréchal Pétain dirige le régime de Vichy et collabore avec les nazis. D'autres Français résistent : le général de Gaulle lance l'appel du 18 juin 1940 depuis Londres, et Jean Moulin unifie la Résistance.","solide":"Après la défaite de 1940, les Français réagissent de différentes manières. Le maréchal Pétain met en place le régime de Vichy et choisit la collaboration avec l'Allemagne nazie, allant jusqu'à participer à la persécution et à la déportation des Juifs. À l'opposé, des Français entrent en résistance : depuis Londres, le général de Gaulle appelle à poursuivre le combat le 18 juin 1940, et en France, Jean Moulin unifie les réseaux de la Résistance intérieure au sein du Conseil national de la Résistance en 1943. La Libération, en 1944, rétablit la République.","mention":"La défaite de juin 1940 plonge la France dans une période sombre où coexistent trois attitudes. La collaboration d'abord : le maréchal Pétain instaure l'État français, le régime de Vichy, qui abandonne la devise républicaine pour « Travail, Famille, Patrie » et coopère activement avec l'occupant nazi, jusqu'à organiser des rafles de Juifs comme celle du Vel d'Hiv en 1942. La Résistance ensuite : dès le 18 juin 1940, le général de Gaulle, depuis Londres, appelle à continuer le combat et incarne la France libre, tandis qu'à l'intérieur des réseaux clandestins se forment ; Jean Moulin les unifie en créant le Conseil national de la Résistance en 1943, avant d'être arrêté et de mourir sous la torture. Enfin, la majorité des Français subit l'Occupation, entre privations et choix difficiles. La Libération de 1944 rétablit la République et ouvre la reconstruction du pays."},"carte":"Carte mémoire : 3 branches égales : Vichy / Collaboration / Résistance.","motscles":"armistice, Vichy, État français, collaboration, Résistance, de Gaulle, Jean Moulin, CNR, Libération.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre France dans la Seconde Guerre mondiale)"}},{"id":"H5","matiere":"histoire","titre":"Indépendances et décolonisation après 1945","objectif":"À la fin, tu sais expliquer comment les colonies deviennent indépendantes.","qcm":[{"q":"Que désigne la décolonisation après 1945 ?","good":"L'accès à l'indépendance des colonies d'Afrique et d'Asie","choices":["Le partage de l'Allemagne en quatre zones","La conquête de nouvelles colonies par l'Europe","La création de l'Union européenne","L'accès à l'indépendance des colonies d'Afrique et d'Asie"],"explain":"Après 1945, les empires coloniaux européens s'effondrent : les colonies deviennent des États indépendants, parfois pacifiquement, parfois par la guerre.","verif":"Retrouve dans ton cours deux exemples de décolonisation, l'un pacifique, l'autre violent.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre décolonisation)"},{"q":"Quelle guerre d'indépendance, longue et violente, oppose la France à une colonie d'Afrique du Nord de 1954 à 1962 ?","good":"La guerre d'Algérie","choices":["La guerre du Golfe","La guerre d'Algérie","La guerre du Vietnam","La guerre d'Indochine"],"explain":"La guerre d'Algérie (1954-1962) aboutit à l'indépendance. L'Indochine (jusqu'en 1954) concerne l'Asie ; le Vietnam et le Golfe sont d'autres conflits.","verif":"Vérifie sur ta frise les dates de la guerre d'Algérie et le pays concerné.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre décolonisation)"},{"q":"Pourquoi qualifie-t-on 1960 d'« année de l'Afrique » ?","good":"Parce qu'une quinzaine de colonies africaines accèdent à l'indépendance cette année-là","choices":["Parce que l'Union africaine y est créée","Parce qu'une quinzaine de colonies africaines accèdent à l'indépendance cette année-là","Parce que la guerre froide y commence","Parce que l'Afrique est entièrement colonisée cette année-là"],"explain":"En 1960, de nombreuses colonies françaises et britanniques d'Afrique deviennent indépendantes, d'où le nom d'« année de l'Afrique ».","verif":"Dans ton cours, repère pourquoi 1960 concentre autant d'indépendances.","vid":"https://www.lumni.fr/college/troisieme/histoire","vidlab":"Lumni · Histoire 3e (chapitre décolonisation)"}],"court":[{"q":"Quelle grande colonie br

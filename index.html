ance et l'Europe dans le monde","objectif":"À la fin, tu sais lister les forces ET les limites de la France et de l'UE.","qcm":[{"q":"En quoi consiste le rayonnement de la France dans le monde ?","good":"Son influence culturelle, économique, diplomatique et linguistique (francophonie)","choices":["Le nombre de ses montagnes","Sa distance avec les autres pays","Son influence culturelle, économique, diplomatique et linguistique (francophonie)","Uniquement sa surface agricole"],"explain":"La France rayonne par la francophonie, sa diplomatie (siège permanent à l'ONU), son économie, sa culture et son réseau d'ambassades.","verif":"Dans ton cours, retrouve les formes du rayonnement français (culturel, diplomatique).","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France dans le monde)"},{"q":"Grâce à quoi la France est-elle présente sur tous les océans du globe ?","good":"Grâce à ses territoires ultramarins","choices":["Grâce à ses territoires ultramarins","Grâce à ses massifs montagneux","Grâce à ses fleuves","Grâce à ses forêts métropolitaines"],"explain":"L'outre-mer donne à la France une présence mondiale et le 2e domaine maritime du monde.","verif":"Vérifie dans ton cours le lien entre outre-mer et présence mondiale de la France.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France dans le monde)"},{"q":"Quel rôle diplomatique majeur la France joue-t-elle au sein de l'ONU ?","good":"Elle est membre permanent du Conseil de sécurité, avec droit de veto","choices":["Elle préside l'ONU chaque année","Elle ne fait pas partie de l'ONU","Elle est membre permanent du Conseil de sécurité, avec droit de veto","Elle dirige l'Union européenne"],"explain":"La France est l'un des cinq membres permanents du Conseil de sécurité de l'ONU (avec droit de veto), signe de son influence diplomatique.","verif":"Dans ton cours, retrouve ce qu'est le Conseil de sécurité et le rôle de la France.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France dans le monde)"}],"court":[{"q":"Dans quelle grande institution la France siège-t-elle de façon permanente ?","sol":"Au Conseil de sécurité de l'ONU (membre permanent).","kw":["conseil","sécurité","membre","permanent"],"explain":"Contexte : puissance, soft power, hard power, francophonie, ZEE, ONU, norme. · À éviter : Confondre les types de puissance ; exagérer la puissance politique de l'UE.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France dans le monde)"},{"q":"Qu'est-ce que le soft power ?","sol":"L'influence par la culture, la langue, les valeurs.","kw":["linfluence","culture","langue","valeurs"],"explain":"Contexte : puissance, soft power, hard power, francophonie, ZEE, ONU, norme. · À éviter : Confondre les types de puissance ; exagérer la puissance politique de l'UE.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France dans le monde)"},{"q":"Pourquoi l'UE est-elle une puissance économique ?","sol":"Par son marché, ses échanges, ses normes.","kw":["par","marché","échanges","normes"],"explain":"Contexte : puissance, soft power, hard power, francophonie, ZEE, ONU, norme. · À éviter : Confondre les types de puissance ; exagérer la puissance politique de l'UE.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France dans le monde)"},{"q":"Cite une limite de la puissance européenne.","sol":"Divisions politiques, dépendances, concurrence USA/Chine.","kw":["divisions","politiques","dépendances","concurrence"],"explain":"Contexte : puissance, soft power, hard power, francophonie, ZEE, ONU, norme. · À éviter : Confondre les types de puissance ; exagérer la puissance politique de l'UE.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France dans le monde)"},{"q":"Quel rôle jouent les outre-mer dans la puissance française ?","sol":"Ils donnent une présence mondiale et un vaste espace maritime.","kw":["ils","donnent","présence","mondiale"],"explain":"Contexte : puissance, soft power, hard power, francophonie, ZEE, ONU, norme. · À éviter : Confondre les types de puissance ; exagérer la puissance politique de l'UE.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France dans le monde)"}],"paper":{"consigne":"Écris 8 lignes : la France et l'UE sont des puissances, mais avec des limites.","grille":["Puissances + limites.","France (ONU, soft power, outre-mer) + UE (économie) + limites.","Distingue soft/hard power et nuance la puissance européenne en politique étrangère."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/geographie"},"exos":[{"consigne":"Écris 8 lignes : la France et l'UE sont des puissances, mais avec des limites.","min":"Puissances + limites.","solide":"France (ONU, soft power, outre-mer) + UE (économie) + limites.","mention":"Introduction : la France et l'Union européenne jouent un rôle important dans le monde. Ce sont des puissances, mais des puissances qui connaissent aussi des limites.\n\nLa France, une puissance d'influence. La France rayonne par sa culture et la francophonie, parlée sur plusieurs continents : c'est ce qu'on appelle le soft power, la puissance d'influence. Grâce à ses territoires ultramarins, elle dispose d'un immense espace maritime. Elle pèse aussi sur la scène diplomatique, comme membre permanent du Conseil de sécurité de l'ONU, et possède une armée capable d'agir (hard power, la puissance militaire).\n\nL'Union européenne, une puissance économique. L'Union est l'une des premières puissances économiques et commerciales du monde, avec un grand marché et une monnaie forte, l'euro.\n\nDes limites. Cette puissance reste limitée : l'Union européenne peine à parler d'une seule voix en politique étrangère, et la France, puissance moyenne, ne pèse pas autant que les États-Unis ou la Chine.\n\nConclusion : la France et l'Union européenne sont donc de réelles puissances, économique pour l'Union, d'influence et diplomatique pour la France, mais leur poids reste limité face aux plus grandes puissances mondiales."},{"consigne":"Développement construit (8 lignes). « En quoi la France est-elle une puissance présente dans le monde ? » Donne des exemples (langue, économie, espace maritime, diplomatie).","min":"La France rayonne : langue française parlée sur plusieurs continents, économie et entreprises mondiales, vaste espace maritime grâce aux outre-mer, présence diplomatique (siège à l'ONU), influence culturelle.","solide":"Introduction : la France, bien que de taille moyenne, est une puissance qui rayonne dans le monde.\nIdée 1 : un rayonnement culturel et économique. La langue française est parlée sur plusieurs continents (francophonie) ; la France compte de grandes entreprises mondiales et reste une destination touristique majeure.\nIdée 2 : une présence mondiale. Grâce à ses territoires ultramarins, elle possède l'un des plus vastes espaces maritimes du monde. Elle dispose aussi d'un poids diplomatique fort (membre permanent du Conseil de sécurité de l'ONU).\nConclusion : par sa culture, son économie et sa présence mondiale, la France est une puissance d'influence.","mention":"Introduction : la France est un pays de taille moyenne, mais elle exerce une influence à l'échelle mondiale. On peut se demander en quoi elle est une puissance présente dans le monde.\n\nPremière idée : un rayonnement culturel et économique. La langue française est parlée sur plusieurs continents, ce qui constitue la francophonie. La France abrite de grandes entreprises présentes dans le monde entier et demeure l'une des premières destinations touristiques mondiales. Sa culture (mode, gastronomie, patrimoine) participe aussi à son influence.\n\nSeconde idée : une présence et un poids mondiaux. Grâce à ses territoires ultramarins répartis sur plusieurs océans, la France dispose de l'un des plus vastes espaces maritimes du monde (zone économique exclusive). Elle joue également un rôle diplomatique majeur : elle est membre permanent du Conseil de sécurité de l'ONU et participe aux grandes décisions internationales, en lien avec l'Union européenne.\n\nConclusion : par sa langue, son économie, son immense espace maritime et son poids diplomatique, la France est une véritable puissance d'influence dans le monde, dont le rayonnement est renforcé par son appartenance à l'Union européenne."},{"consigne":"Vocabulaire et notions. 1) Qu'est-ce que la francophonie ? 2) Qu'est-ce qu'une zone économique exclusive (ZEE) et pourquoi la France en a-t-elle une si grande ? 3) De quelle organisation internationale majeure la France est-elle membre permanent du Conseil de sécurité ?","min":"1) L'ensemble des personnes et pays qui parlent le français dans le monde. 2) La ZEE est l'espace maritime où un État a des droits exclusifs ; la France en a une vaste grâce à ses outre-mer. 3) L'ONU (Organisation des Nations unies).","solide":"1) La francophonie désigne l'ensemble des personnes et des pays qui parlent le français à travers le monde.\n2) La zone économique exclusive (ZEE) est l'espace maritime situé au large des côtes d'un État, où celui-ci possède des droits exclusifs (pêche, ressources). La France en a une des plus vastes du monde grâce à ses nombreux territoires ultramarins répartis sur tous les océans.\n3) La France est membre permanent du Conseil de sécurité de l'ONU.","mention":"L'exercice porte sur le vocabulaire de la puissance française dans le monde.\n\n1) La francophonie.\nC'est l'ensemble des personnes et des pays qui ont le français en partage à travers le monde. Présente sur plusieurs continents, la francophonie est un élément du rayonnement culturel de la France.\n\n2) La zone économique exclusive (ZEE).\nC'est l'espace maritime qui s'étend au large des côtes d'un État, sur lequel celui-ci détient des droits exclusifs d'exploitation des ressources (pêche, énergie, minerais). La France possède l'une des plus grandes ZEE du monde, parce que ses territoires ultramarins sont répartis sur tous les océans, ce qui lui donne une présence maritime mondiale.\n\n3) Le Conseil de sécurité de l'ONU.\nLa France est l'un des cinq membres permanents du Conseil de sécurité de l'Organisation des Nations unies (ONU). Cela lui confère un rôle diplomatique majeur dans les décisions internationales.\n\nConclusion : la francophonie illustre le rayonnement culturel, la vaste ZEE traduit la présence maritime mondiale liée aux outre-mer, et le siège permanent à l'ONU confirme le poids diplomatique de la France."}],"parcours":{"mission":"À la fin, tu sais lister les forces ET les limites de la France et de l'UE.","froid":[{"q":"Dans quelle grande institution la France siège-t-elle de façon permanente ?","rep":"Au Conseil de sécurité de l'ONU (membre permanent)."},{"q":"Qu'est-ce que le soft power ?","rep":"L'influence par la culture, la langue, les valeurs."},{"q":"Pourquoi l'UE est-elle une puissance économique ?","rep":"Par son marché, ses échanges, ses normes."},{"q":"Cite une limite de la puissance européenne.","rep":"Divisions politiques, dépendances, concurrence USA/Chine."},{"q":"Quel rôle jouent les outre-mer dans la puissance française ?","rep":"Ils donnent une présence mondiale et un vaste espace maritime."}],"coffre":[{"q":"La France est puissante par : ____, ____, ____ (cite 3 éléments)","rep":"ONU, arme nucléaire, francophonie, outre-mer (3 au choix)."},{"q":"Le soft power, c'est l'influence par la ____ et la ____","rep":"culture ; langue."},{"q":"L'UE est surtout une puissance ____ et ____","rep":"économique ; commerciale."},{"q":"Limites : ____, ____, ____","rep":"divisions, dépendances, concurrences (au choix)."},{"q":"Les outre-mer donnent à la France un vaste espace ____","rep":"maritime (ZEE)."}],"frise":[],"oral":"Explique en 90 secondes la différence entre soft power et hard power.","ecrit":{"consigne":"Écris 8 lignes : la France et l'UE sont des puissances, mais avec des limites.","min":"Puissances + limites.","solide":"France (ONU, soft power, outre-mer) + UE (économie) + limites.","mention":"Distingue soft/hard power et nuance la puissance européenne en politique étrangère."},"oralRedige":"La France occupe une place importante dans le monde et en Europe. Elle rayonne de plusieurs façons : par sa culture et la francophonie, par son économie, et par sa diplomatie, puisqu'elle est l'un des cinq membres permanents du Conseil de sécurité de l'ONU et possède l'arme nucléaire. Sa présence mondiale est aussi assurée par ses territoires ultramarins, qui lui donnent accès à tous les océans et le deuxième domaine maritime du monde. Enfin, la France agit au sein de l'Union européenne, dont elle est un membre fondateur et moteur. Elle est donc une puissance d'influence mondiale, même si elle n'est pas une superpuissance comme les États-Unis ou la Chine.","ecritRedige":{"min":"La France a une grande influence dans le monde grâce à sa culture, sa langue, son économie et sa diplomatie. Elle est membre permanent du Conseil de sécurité de l'ONU. Ses territoires ultramarins lui donnent une présence sur tous les océans.","solide":"La France joue un rôle important dans le monde et en Europe. Elle rayonne par sa culture et la francophonie, par son économie, et par sa diplomatie : elle est l'un des cinq membres permanents du Conseil de sécurité de l'ONU, avec un droit de veto. Sa présence mondiale est renforcée par ses territoires ultramarins, qui lui donnent accès à tous les océans et au deuxième domaine maritime mondial. Enfin, la France est un membre fondateur et moteur de l'Union européenne. C'est donc une puissance d'influence mondiale, sans être une superpuissance.","mention":"La France occupe une place singulière dans le monde et en Europe : sans être une superpuissance comme les États-Unis ou la Chine, elle dispose d'une réelle puissance d'influence, qui repose sur plusieurs piliers. Son rayonnement est d'abord culturel et linguistique, à travers la francophonie, son réseau d'écoles et d'instituts, et son attractivité touristique. Il est aussi économique, la France comptant parmi les grandes puissances commerciales et abritant de nombreuses firmes transnationales. Il est surtout diplomatique et militaire : la France est l'un des cinq membres permanents du Conseil de sécurité de l'ONU, où elle dispose d'un droit de veto, et elle possède l'arme nucléaire. Sa présence planétaire est encore renforcée par ses territoires ultramarins, qui lui assurent un accès à tous les océans et le deuxième domaine maritime du monde. Enfin, la France agit comme un membre fondateur et moteur de l'Union européenne, ce qui amplifie son poids sur la scène internationale."},"carte":"Carte mémoire : « PUISSANCE », branches : militaire / économique / culturelle / limites.","motscles":"puissance, soft power, hard power, francophonie, ZEE, ONU, norme.","vid":"https://www.lumni.fr/college/troisieme/geographie","vidlab":"Lumni · Géographie 3e (chapitre France dans le monde)"}},{"id":"E1","matiere":"emc","titre":"Valeurs, principes et symboles de la République","objectif":"À la fin, tu sais citer les valeurs, principes et symboles et appliquer la méthode EMC.","qcm":[{"q":"Quelle est la devise de la République française ?","good":"Liberté, Égalité, Fraternité","choices":["Travail, Famille, Patrie","Liberté, Égalité, Fraternité","Paix, Justice, Liberté","Un pour tous, tous pour un"],"explain":"« Liberté, Égalité, Fraternité » est la devise républicaine. « Travail, Famille, Patrie » était au contraire la devise du régime de Vichy.","verif":"Vérifie dans ton cours la devise de la République et celle, opposée, de Vichy.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (valeurs de la République)"},{"q":"Que garantit la laïcité en France ?","good":"La liberté de conscience et la neutralité de l'État, qui ne privilégie aucune religion","choices":["L'obligation d'avoir une religion d'État","L'interdiction de toutes les religions","La fin de la liberté d'expression","La liberté de conscience et la neutralité de l'État, qui ne privilégie aucune religion"],"explain":"La laïcité (loi de 1905) garantit la liberté de croire ou non et l'égalité de tous. L'État reste neutre : elle n'interdit pas les religions.","verif":"Dans ton cours, retrouve ce que la laïcité autorise et ce qu'elle interdit à l'État.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (valeurs de la République)"},{"q":"Que représente Marianne, présente dans les mairies ?","good":"L'allégorie (la figure symbolique) de la République française","choices":["Une ancienne reine de France","La capitale de l'Europe","L'allégorie (la figure symbolique) de la République française","Le nom de l'hymne national"],"explain":"Marianne incarne la République. Le drapeau tricolore, La Marseillaise, le 14 Juillet et la devise sont les autres symboles républicains.","verif":"Vérifie dans ton cours la liste des symboles de la République.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (valeurs de la République)"},{"q":"Quel principe affirme que la loi est la même pour tous les citoyens ?","good":"L'égalité devant la loi","choices":["Le secret professionnel","L'égalité devant la loi","La séparation des pouvoirs","La liberté de circulation"],"explain":"L'égalité devant la loi est un principe fondamental de la République : aucun citoyen n'est au-dessus des lois.","verif":"Dans ton cours, relie le principe d'égalité à la Déclaration des droits de l'homme.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (valeurs de la République)"}],"court":[{"q":"Quelle est la devise de la République ?","sol":"Liberté, Égalité, Fraternité.","kw":["liberté","égalité","fraternité"],"explain":"Contexte : République, laïcité, État de droit, souveraineté, liberté/égalité/fraternité. · À éviter : Définir la laïcité comme une interdiction des religions ; confondre valeur et symbole.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (valeurs de la République)"},{"q":"Que garantit la laïcité ?","sol":"La liberté de conscience et la neutralité de l'État.","kw":["liberté","conscience","neutralité","létat"],"explain":"Contexte : République, laïcité, État de droit, souveraineté, liberté/égalité/fraternité. · À éviter : Définir la laïcité comme une interdiction des religions ; confondre valeur et symbole.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (valeurs de la République)"},{"q":"Cite deux symboles de la République.","sol":"Drapeau, Marseillaise, Marianne, 14 juillet (2 au choix).","kw":["drapeau","marseillaise","marianne","juillet"],"explain":"Contexte : République, laïcité, État de droit, souveraineté, liberté/égalité/fraternité. · À éviter : Définir la laïcité comme une interdiction des religions ; confondre valeur et symbole.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (valeurs de la République)"},{"q":"Que signifie « égalité devant la loi » ?","sol":"Les mêmes règles s'appliquent à tous.","kw":["les","règles","sappliquent"],"explain":"Contexte : République, laïcité, État de droit, souveraineté, liberté/égalité/fraternité. · À éviter : Définir la laïcité comme une interdiction des religions ; confondre valeur et symbole.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (valeurs de la République)"},{"q":"En quelle année date la Déclaration des droits de l'homme et du citoyen ?","sol":"En 1789.","kw":["1789"],"explain":"Contexte : République, laïcité, État de droit, souveraineté, liberté/égalité/fraternité. · À éviter : Définir la laïcité comme une interdiction des religions ; confondre valeur et symbole.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (valeurs de la République)"}],"paper":{"consigne":"Méthode EMC. Un élève se moque de la religion d'un camarade. En 6 lignes : 1) la règle, 2) applique-la, 3) propose une conduite.","grille":["Cite la règle + 1 conduite.","Règle (laïcité/respect) + application + conduite citoyenne.","Structure nette en 3 temps, vocabulaire juste (laïcité = liberté, pas interdiction)."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique"},"exos":[{"consigne":"Méthode EMC. Un élève se moque de la religion d'un camarade. En 6 lignes : 1) la règle, 2) applique-la, 3) propose une conduite.","min":"Cite la règle + 1 conduite.","solide":"Règle (laïcité/respect) + application + conduite citoyenne.","mention":"1) La règle. La France est une République laïque, fondée sur le respect d'autrui et la liberté de conscience. La laïcité garantit à chacun le droit de croire ou de ne pas croire ; se moquer de la religion d'un camarade va donc contre le respect dû à chacun et contre le principe d'égalité.\n\n2) Application à la situation. En se moquant de la religion de son camarade, l'élève manque de respect et porte atteinte à sa liberté de conscience. Ce comportement est interdit, car il blesse l'autre et rompt l'égalité entre les élèves. La laïcité ne signifie pas interdire les religions, mais respecter les croyances de chacun.\n\n3) Conduite citoyenne proposée. Il faudrait que l'élève cesse ses moqueries et présente des excuses. Le camarade visé peut en parler à un adulte de confiance (professeur, CPE). Plus largement, chacun doit adopter une attitude de respect et de tolérance, conformément aux valeurs de la République.\n\nConclusion : cette situation rappelle que la laïcité et le respect d'autrui garantissent à chacun la liberté de conscience. Se moquer d'une religion, c'est rompre l'égalité et le respect qui fondent la vie commune."},{"consigne":"Question d'EMC (6 lignes). Explique la devise de la République française « Liberté, Égalité, Fraternité » : que signifie chacun de ces trois mots ?","min":"Liberté : pouvoir agir et penser librement dans le respect de la loi. Égalité : tous les citoyens ont les mêmes droits. Fraternité : la solidarité et l'entraide entre les citoyens.","solide":"La devise de la République repose sur trois valeurs.\nLiberté : chaque citoyen peut agir, s'exprimer et penser librement, dans la limite du respect de la loi et des autres.\nÉgalité : tous les citoyens ont les mêmes droits et sont traités de la même façon devant la loi, sans distinction.\nFraternité : les citoyens doivent faire preuve de solidarité et d'entraide les uns envers les autres.","mention":"La devise « Liberté, Égalité, Fraternité » résume les valeurs fondamentales de la République française.\n\nLa Liberté signifie que chaque citoyen a le droit d'agir, de s'exprimer, de croire et de penser librement. Cette liberté n'est pas sans limite : elle s'exerce dans le respect de la loi et de la liberté des autres.\n\nL'Égalité signifie que tous les citoyens possèdent les mêmes droits et sont traités de la même manière devant la loi, sans distinction d'origine, de religion, de sexe ou de fortune.\n\nLa Fraternité désigne le lien de solidarité qui doit unir les citoyens : l'entraide, le respect mutuel et l'attention portée aux autres, notamment aux plus fragiles.\n\nConclusion : ces trois valeurs, gravées sur de nombreux bâtiments publics, fondent la vie commune dans la République et guident le comportement attendu des citoyens."},{"consigne":"Question d'EMC (6 lignes). Cite trois symboles de la République française et explique ce que chacun représente.","min":"Le drapeau tricolore (bleu, blanc, rouge), La Marseillaise (l'hymne national), Marianne (figure de la République). On peut aussi citer la devise ou le 14 Juillet.","solide":"Trois symboles de la République française :\nLe drapeau tricolore (bleu, blanc, rouge), symbole de la nation.\nLa Marseillaise, qui est l'hymne national, chanté lors des cérémonies officielles.\nMarianne, figure représentant la République, dont le buste est présent dans les mairies.\nOn peut aussi citer la devise « Liberté, Égalité, Fraternité » ou la fête nationale du 14 Juillet.","mention":"La République française se reconnaît à plusieurs symboles, qui expriment son identité et ses valeurs.\n\nLe drapeau tricolore, composé du bleu, du blanc et du rouge, est le symbole de la nation française. On le retrouve sur les bâtiments publics et lors des cérémonies officielles.\n\nLa Marseillaise est l'hymne national. Elle est chantée notamment lors des commémorations et des événements officiels, et exprime l'attachement à la patrie.\n\nMarianne est la figure allégorique qui représente la République. Son buste est présent dans les mairies, et son visage figure sur les timbres et certaines pièces.\n\nOn peut compléter par la devise « Liberté, Égalité, Fraternité » et par la fête nationale du 14 Juillet, qui commémore la Révolution.\n\nConclusion : drapeau, hymne et Marianne sont trois symboles majeurs qui incarnent la République française et rappellent son histoire et ses valeurs."}],"parcours":{"mission":"À la fin, tu sais citer les valeurs, principes et symboles et appliquer la méthode EMC.","froid":[{"q":"Quelle est la devise de la République ?","rep":"Liberté, Égalité, Fraternité."},{"q":"Que garantit la laïcité ?","rep":"La liberté de conscience et la neutralité de l'État."},{"q":"Cite deux symboles de la République.","rep":"Drapeau, Marseillaise, Marianne, 14 juillet (2 au choix)."},{"q":"Que signifie « égalité devant la loi » ?","rep":"Les mêmes règles s'appliquent à tous."},{"q":"En quelle année date la Déclaration des droits de l'homme et du citoyen ?","rep":"En 1789."}],"coffre":[{"q":"Les 3 valeurs : ____, ____, ____","rep":"liberté, égalité, fraternité."},{"q":"La laïcité garantit la liberté de ____ et la ____ de l'État","rep":"conscience ; neutralité."},{"q":"Attention : la laïcité n'est PAS ____","rep":"…une interdiction des religions."},{"q":"Trois symboles : ____, ____, ____","rep":"drapeau, Marseillaise, Marianne (au choix)."},{"q":"L'État de droit = même les ____ obéissent au droit","rep":"pouvoirs publics."}],"frise":[["1789","droits de l'homme et du citoyen"],["1905","Églises"]],"oral":"Explique en 90 secondes ce que veut dire « laïcité » (sans dire que c'est interdire les religions).","ecrit":{"consigne":"Méthode EMC. Un élève se moque de la religion d'un camarade. En 6 lignes : 1) la règle, 2) applique-la, 3) propose une conduite.","min":"Cite la règle + 1 conduite.","solide":"Règle (laïcité/respect) + application + conduite citoyenne.","mention":"Structure nette en 3 temps, vocabulaire juste (laïcité = liberté, pas interdiction)."},"oralRedige":"La laïcité, c'est d'abord une liberté, pas une interdiction. Elle signifie que chacun est libre de croire en une religion, d'en changer ou de ne pas croire du tout : c'est la liberté de conscience. En contrepartie, l'État reste neutre : il ne privilégie aucune religion et n'en impose aucune. La laïcité permet ainsi à des personnes de convictions différentes de vivre ensemble dans le respect. Elle a été établie en France par la loi de 1905, qui sépare les Églises et l'État. C'est l'un des grands principes de la République, avec la devise « Liberté, Égalité, Fraternité ».","ecritRedige":{"min":"Règle : la laïcité et le respect interdisent de se moquer de la religion d'un camarade. Application : ici, l'élève ne respecte pas cette règle. Conduite : il faut arrêter de se moquer et respecter les croyances de chacun.","solide":"La règle : dans une école laïque, chacun est libre de croire ou de ne pas croire, et personne ne doit être moqué pour sa religion. C'est le principe de laïcité et de respect d'autrui. L'application : dans cette situation, l'élève qui se moque de la religion de son camarade ne respecte pas cette règle et porte atteinte à sa liberté de conscience. La conduite à adopter : il faut cesser ces moqueries, respecter les convictions de chacun, et si besoin en parler à un adulte de l'établissement pour rappeler la règle.","mention":"La règle. L'école de la République est laïque : la laïcité garantit à chaque élève la liberté de conscience, c'est-à-dire le droit de croire en une religion, d'en changer ou de ne pas croire, sans subir de pression ni de moquerie. La laïcité n'interdit pas les religions, elle protège la liberté de chacun et impose le respect mutuel. L'application au cas. Ici, l'élève qui se moque de la religion de son camarade ne respecte pas ce principe : il porte atteinte à sa liberté de conscience et à sa dignité, et il rompt le respect dû à autrui dans la communauté scolaire. La conduite à proposer. Il convient d'abord de cesser immédiatement ces moqueries et de présenter des excuses. Il faut ensuite adopter une attitude de respect des convictions de chacun, condition du vivre-ensemble. Enfin, si la situation se reproduit, on peut en parler à un professeur ou à la vie scolaire, qui rappelleront la règle et pourront accompagner les élèves concernés."},"carte":"Carte mémoire : « RÉPUBLIQUE », branches : valeurs / principes / symboles / droits-devoirs.","motscles":"République, laïcité, État de droit, souveraineté, liberté/égalité/fraternité.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (valeurs de la République)"}},{"id":"E2","matiere":"emc","titre":"Citoyenneté française et européenne","objectif":"À la fin, tu sais montrer qu'être citoyen, ce n'est pas seulement voter.","qcm":[{"q":"À partir de quel âge un citoyen français peut-il voter ?","good":"18 ans","choices":["16 ans","18 ans","15 ans","21 ans"],"explain":"On devient électeur à 18 ans, âge de la majorité. Le recensement citoyen, lui, se fait dès 16 ans.","verif":"Vérifie dans ton cours l'âge du droit de vote (18 ans) et celui du recensement (16 ans).","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (citoyenneté)"},{"q":"Lequel de ces éléments est un devoir du citoyen, et non un droit ?","good":"Payer ses impôts et respecter la loi","choices":["Payer ses impôts et respecter la loi","Se réunir et manifester","S'exprimer librement","Voter aux élections"],"explain":"Voter, s'exprimer et manifester sont des droits ; payer l'impôt, respecter la loi, participer à la défense (recensement, JDC) sont des devoirs.","verif":"Dans ton cours, sépare clairement la liste des droits et celle des devoirs du citoyen.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (citoyenneté)"},{"q":"Que permet concrètement la citoyenneté européenne ?","good":"Circuler, résider dans l'UE et voter aux élections européennes et municipales du pays de résidence","choices":["Élire le président des États-Unis","Circuler, résider dans l'UE et voter aux élections européennes et municipales du pays de résidence","Échapper aux lois de son propre pays","Obtenir automatiquement une autre nationalité"],"explain":"Tout citoyen d'un pays de l'UE est aussi citoyen européen : libre circulation, droit de vote aux européennes et aux municipales là où il réside.","verif":"Vérifie dans ton cours les droits liés à la citoyenneté européenne.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (citoyenneté)"}],"court":[{"q":"En quelle année les femmes votent-elles en France ?","sol":"En 1944.","kw":["1944"],"explain":"Contexte : citoyenneté, suffrage universel, engagement, association, citoyenneté européenne. · À éviter : Réduire la citoyenneté au seul vote ; oublier les devoirs.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (citoyenneté)"},{"q":"Quel traité crée la citoyenneté européenne ?","sol":"Le traité de Maastricht (1992).","kw":["traité","maastricht","1992"],"explain":"Contexte : citoyenneté, suffrage universel, engagement, association, citoyenneté européenne. · À éviter : Réduire la citoyenneté au seul vote ; oublier les devoirs.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (citoyenneté)"},{"q":"Cite un devoir du citoyen.","sol":"Respecter la loi, payer l'impôt, respecter les autres (au choix).","kw":["respecter","limpôt","autres"],"explain":"Contexte : citoyenneté, suffrage universel, engagement, association, citoyenneté européenne. · À éviter : Réduire la citoyenneté au seul vote ; oublier les devoirs.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (citoyenneté)"},{"q":"Cite une forme d'engagement accessible à un collégien.","sol":"Délégué de classe, association, bénévolat (au choix).","kw":["délégué","classe","association","bénévolat"],"explain":"Contexte : citoyenneté, suffrage universel, engagement, association, citoyenneté européenne. · À éviter : Réduire la citoyenneté au seul vote ; oublier les devoirs.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (citoyenneté)"}],"paper":{"consigne":"Écris 6 lignes : être citoyen, ce n'est pas seulement voter. Donne des exemples de droits, devoirs et engagements.","grille":["Droits + devoirs.","Droits + devoirs + 1 engagement concret.","Ajoute la citoyenneté européenne (1992) et insiste sur l'engagement quotidien."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique"},"exos":[{"consigne":"Écris 6 lignes : être citoyen, ce n'est pas seulement voter. Donne des exemples de droits, devoirs et engagements.","min":"Droits + devoirs.","solide":"Droits + devoirs + 1 engagement concret.","mention":"Introduction : on pense souvent que la citoyenneté se résume au droit de vote. En réalité, être citoyen, c'est bien plus : cela suppose des droits, des devoirs et un engagement au quotidien.\n\nDes droits. Le citoyen possède des droits politiques, comme voter et être élu, mais aussi des droits civils et sociaux (liberté d'expression, droit à l'éducation). Depuis le traité de Maastricht de 1992, tout citoyen d'un pays de l'Union européenne est aussi citoyen européen, ce qui lui donne des droits supplémentaires, comme circuler librement dans l'Union.\n\nDes devoirs. Être citoyen, c'est aussi respecter les lois et les règles communes, payer ses impôts, respecter les autres, etparticiper à la défense et à la solidarité nationales.\n\nUn engagement. La citoyenneté se vit enfin par l'engagement quotidien : s'informer, faire preuve d'esprit critique, s'investir dans une association, aider les autres ou défendre une cause comme l'environnement.\n\nConclusion : être citoyen ne se limite donc pas à voter. C'est exercer des droits, respecter des devoirs et s'engager activement, à l'échelle de la France comme de l'Union européenne."},{"consigne":"Question d'EMC (6 lignes). « Être citoyen, ce n'est pas seulement voter. » Donne trois exemples d'actions citoyennes autres que le vote.","min":"Respecter les lois, s'engager dans une association, aider les autres, être juré, participer à la vie de la commune, défendre l'environnement, s'informer pour avoir un esprit critique.","solide":"Être citoyen, c'est participer à la vie de la société de multiples façons, au-delà du vote.\nExemple 1 : respecter les lois et les règles communes, qui permettent de vivre ensemble.\nExemple 2 : s'engager, par exemple dans une association, pour aider les autres ou défendre une cause (environnement, solidarité).\nExemple 3 : participer à la vie démocratique, en s'informant, en débattant, ou en remplissant un devoir comme être juré dans un procès.","mention":"Le vote est un droit important du citoyen, mais la citoyenneté ne s'y résume pas : elle s'exerce au quotidien par de nombreuses actions.\n\nPremier exemple : le respect des lois et des règles communes. Un citoyen contribue à la vie en société en respectant les règles qui permettent de vivre ensemble (le code de la route, le respect des autres, le paiement des impôts).\n\nDeuxième exemple : l'engagement. On peut s'engager dans une association, faire du bénévolat, aider des personnes en difficulté ou défendre une cause comme la protection de l'environnement ou la solidarité.\n\nTroisième exemple : la participation à la vie démocratique. Cela passe par le fait de s'informer, de développer un esprit critique, de participer à des débats, ou encore de remplir des devoirs civiques comme être juré lors d'un procès d'assises.\n\nConclusion : la citoyenneté ne se limite pas au vote ; elle se vit aussi par le respect des lois, l'engagement et la participation active à la vie de la société."},{"consigne":"Question d'EMC (6 lignes). Qu'est-ce que la citoyenneté européenne et qu'apporte-t-elle aux citoyens français ?","min":"Tout citoyen d'un pays de l'Union européenne est aussi citoyen européen. Cela apporte des droits : circuler et s'installer librement dans l'UE, voter aux élections européennes, être protégé dans d'autres pays.","solide":"La citoyenneté européenne s'ajoute à la citoyenneté nationale : tout citoyen d'un pays membre de l'Union européenne est automatiquement citoyen européen.\nElle apporte des droits : circuler, étudier, travailler et s'installer librement dans les autres pays de l'Union ; voter et se présenter aux élections européennes (et municipales dans le pays où l'on réside) ; bénéficier d'une protection dans les pays tiers. Elle crée un sentiment d'appartenance commune.","mention":"La citoyenneté européenne est une citoyenneté qui s'ajoute à la citoyenneté nationale, sans la remplacer. Toute personne qui possède la nationalité d'un pays membre de l'Union européenne est, de ce fait, également citoyenne européenne. Un Français est donc à la fois citoyen français et citoyen européen.\n\nCette citoyenneté apporte plusieurs droits concrets. Elle permet de circuler, de voyager, d'étudier, de travailler et de s'installer librement dans les autres pays de l'Union. Elle donne le droit de voter et d'être candidat aux élections européennes, ainsi qu'aux élections municipales du pays de l'Union où l'on réside. Elle offre aussi une protection lorsqu'on se trouve dans un pays hors de l'Union, grâce aux ambassades des autres États membres.\n\nEnfin, elle crée un sentiment d'appartenance commune à un espace partagé et à des valeurs communes.\n\nConclusion : la citoyenneté européenne complète la citoyenneté française ; elle apporte aux citoyens la liberté de circulation et d'installation dans l'Union, des droits de vote spécifiques et une protection à l'étranger."}],"parcours":{"mission":"À la fin, tu sais montrer qu'être citoyen, ce n'est pas seulement voter.","froid":[{"q":"Quel est le droit politique principal du citoyen ?","rep":"Le droit de vote."},{"q":"En quelle année les femmes votent-elles en France ?","rep":"En 1944."},{"q":"Quel traité crée la citoyenneté européenne ?","rep":"Le traité de Maastricht (1992)."},{"q":"Cite un devoir du citoyen.","rep":"Respecter la loi, payer l'impôt, respecter les autres (au choix)."},{"q":"Cite une forme d'engagement accessible à un collégien.","rep":"Délégué de classe, association, bénévolat (au choix)."}],"coffre":[{"q":"Être citoyen = appartenir à une ____ politique","rep":"communauté."},{"q":"Le citoyen a des ____ mais aussi des ____","rep":"droits ; devoirs."},{"q":"La citoyenneté européenne vient du traité de ____ (1992)","rep":"Maastricht."},{"q":"Trois formes d'engagement : ____, ____, ____","rep":"vote, association, délégué (au choix)."},{"q":"Voter, c'est participer à la ____ nationale","rep":"souveraineté."}],"frise":[["1944","femmes"],["1992","européenne"]],"oral":"Explique en 90 secondes pourquoi un délégué de classe est déjà un citoyen engagé.","ecrit":{"consigne":"Écris 6 lignes : être citoyen, ce n'est pas seulement voter. Donne des exemples de droits, devoirs et engagements.","min":"Droits + devoirs.","solide":"Droits + devoirs + 1 engagement concret.","mention":"Ajoute la citoyenneté européenne (1992) et insiste sur l'engagement quotidien."},"oralRedige":"Être citoyen français, c'est avoir des droits et des devoirs. Parmi les droits, il y a le droit de vote à partir de 18 ans, la liberté d'expression ou encore le droit de manifester. Parmi les devoirs, il y a le respect de la loi, le paiement des impôts et la participation à la défense, avec le recensement à 16 ans puis la Journée défense et citoyenneté. Mais on est aussi citoyen européen : tout Français est en même temps citoyen de l'Union européenne, ce qui permet de circuler librement, de s'installer dans un autre pays de l'UE et d'y voter aux élections européennes et municipales. La citoyenneté, c'est donc à la fois des droits et un engagement.","ecritRedige":{"min":"Être citoyen, c'est avoir des droits, comme voter à 18 ans, et des devoirs, comme respecter la loi et payer ses impôts. On est aussi citoyen européen, ce qui permet de circuler dans l'Union européenne.","solide":"Être citoyen en France et en Europe signifie avoir des droits et des devoirs. Les droits du citoyen français sont par exemple le droit de vote à 18 ans, la liberté d'expression et le droit de manifester. Les devoirs comprennent le respect de la loi, le paiement des impôts et la participation à la défense, avec le recensement à 16 ans. De plus, tout citoyen français est aussi citoyen européen : il peut circuler et s'installer librement dans l'Union européenne, et voter aux élections européennes et municipales du pays où il réside. La citoyenneté combine donc des droits et un engagement.","mention":"Être citoyen, en France et en Europe, c'est appartenir à une communauté politique qui reconnaît des droits et attend des devoirs. La citoyenneté française ouvre d'abord des droits : des droits politiques, comme le droit de vote et d'éligibilité à partir de 18 ans ; des libertés, comme la liberté d'expression, de réunion et de manifestation. Elle implique aussi des devoirs : respecter la loi, payer ses impôts pour financer les services publics, et participer à la défense, ce qui passe par le recensement à 16 ans puis la Journée défense et citoyenneté. À cette citoyenneté nationale s'ajoute une citoyenneté européenne : tout ressortissant d'un État membre est aussi citoyen de l'Union européenne, ce qui lui permet de circuler et de s'installer librement dans l'UE, et de voter aux élections européennes ainsi qu'aux élections municipales de son pays de résidence. La citoyenneté ne se résume donc pas à des droits : elle suppose aussi un engagement et une participation à la vie démocratique."},"carte":"Carte mémoire : « CITOYEN », 3 branches : droits / devoirs / engagement.","motscles":"citoyenneté, suffrage universel, engagement, association, citoyenneté européenne.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (citoyenneté)"}},{"id":"E3","matiere":"emc","titre":"Les institutions de la Ve République","objectif":"À la fin, tu sais dire qui fait quoi (président, gouvernement, Parlement).","qcm":[{"q":"Comment le président de la République est-il désigné sous la Ve République ?","good":"Élu au suffrage universel direct par les citoyens","choices":["Choisi par le Premier ministre","Désigné par le Sénat","Élu au suffrage universel direct par les citoyens","Nommé par l'Assemblée nationale"],"explain":"Depuis 1962, le président est élu directement par les citoyens pour 5 ans. Le Premier ministre, lui, est nommé par le président.","verif":"Dans ton cours, distingue le mode de désignation du président et celui du Premier ministre.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (institutions de la Ve République)"},{"q":"Quel est le rôle principal du Parlement (Assemblée nationale et Sénat) ?","good":"Voter la loi et contrôler le gouvernement","choices":["Diriger les communes","Juger les criminels","Commander l'armée","Voter la loi et contrôler le gouvernement"],"explain":"Le Parlement détient le pouvoir législatif : il discute, amende et vote les lois, et contrôle l'action du gouvernement.","verif":"Vérifie dans ton cours le rôle de chaque pouvoir (exécutif, législatif, judiciaire).","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (institutions de la Ve République)"},{"q":"Qui nomme le Premier ministre sous la Ve République ?","good":"Le président de la République","choices":["Le président du Sénat","Le Conseil constitutionnel","Le président de la République","Les députés par un vote"],"explain":"Le président nomme le Premier ministre, qui dirige le gouvernement et doit disposer du soutien de l'Assemblée nationale.","verif":"Dans ton cours, retrouve qui nomme le Premier ministre et devant qui il est responsable.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (institutions de la Ve République)"}],"court":[{"q":"Quel texte fonde la Ve République ?","sol":"La Constitution de 1958.","kw":["constitution","1958"],"explain":"Contexte : Constitution, exécutif, législatif, Parlement, Assemblée nationale, Sénat, cohabitation. · À éviter : Dire que le président vote les lois ; confondre gouvernement et Parlement.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (institutions de la Ve République)"},{"q":"Qui vote la loi ?","sol":"Le Parlement.","kw":["parlement"],"explain":"Contexte : Constitution, exécutif, législatif, Parlement, Assemblée nationale, Sénat, cohabitation. · À éviter : Dire que le président vote les lois ; confondre gouvernement et Parlement.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (institutions de la Ve République)"},{"q":"De quoi est composé le Parlement ?","sol":"Assemblée nationale et Sénat.","kw":["assemblée","nationale","sénat"],"explain":"Contexte : Constitution, exécutif, législatif, Parlement, Assemblée nationale, Sénat, cohabitation. · À éviter : Dire que le président vote les lois ; confondre gouvernement et Parlement.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (institutions de la Ve République)"},{"q":"Qui dirige le gouvernement ?","sol":"Le Premier ministre.","kw":["premier","ministre"],"explain":"Contexte : Constitution, exécutif, législatif, Parlement, Assemblée nationale, Sénat, cohabitation. · À éviter : Dire que le président vote les lois ; confondre gouvernement et Parlement.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (institutions de la Ve République)"},{"q":"Qu'est-ce que la cohabitation ?","sol":"Président et majorité parlementaire de bords opposés.","kw":["président","majorité","parlementaire","opposés"],"explain":"Contexte : Constitution, exécutif, législatif, Parlement, Assemblée nationale, Sénat, cohabitation. · À éviter : Dire que le président vote les lois ; confondre gouvernement et Parlement.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (institutions de la Ve République)"}],"paper":{"consigne":"Écris 8 lignes : qui détient les pouvoirs sous la Ve République, et à quoi sert leur séparation ?","grille":["Qui fait quoi.","Exécutif + législatif + rôle du contrôle.","Explique la séparation des pouvoirs comme protection des libertés."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique"},"exos":[{"consigne":"Écris 8 lignes : qui détient les pouvoirs sous la Ve République, et à quoi sert leur séparation ?","min":"Qui fait quoi.","solide":"Exécutif + législatif + rôle du contrôle.","mention":"Introduction : la Ve République, mise en place en 1958, organise la répartition des pouvoirs entre plusieurs institutions, selon le principe de la séparation des pouvoirs.\n\nLe pouvoir exécutif. Il applique les lois et dirige le pays. Il est exercé par le président de la République, élu au suffrage universel direct, et par le gouvernement (Premier ministre et ministres).\n\nLe pouvoir législatif. Il vote les lois et contrôle l'action du gouvernement. Il appartient au Parlement, composé de l'Assemblée nationale, dont les députés sont élus par les citoyens, et du Sénat.\n\nLe pouvoir judiciaire. Il fait respecter les lois et juge ceux qui les enfreignent ; il doit être indépendant.\n\nÀ quoi sert leur séparation. Si une seule personne détenait tous les pouvoirs, elle pourrait gouverner sans contrôle et abuser de son autorité. En séparant les pouvoirs, on instaure des contrôles mutuels qui protègent les citoyens contre l'arbitraire et garantissent leurs libertés.\n\nConclusion : sous la Ve République, les pouvoirs exécutif, législatif et judiciaire sont distincts. Cette séparation est essentielle en démocratie, car elle empêche la concentration du pouvoir et protège les libertés."},{"consigne":"Question d'EMC (8 lignes). « Qui détient les pouvoirs sous la Ve République ? » Présente le pouvoir exécutif, le pouvoir législatif et le rôle du citoyen.","min":"Exécutif : le président de la République et le gouvernement (Premier ministre, ministres). Législatif : le Parlement (Assemblée nationale + Sénat), qui vote les lois. Le citoyen choisit ses représentants par le vote.","solide":"Introduction : sous la Ve République, les pouvoirs sont séparés entre plusieurs institutions.\nIdée 1 : le pouvoir exécutif. Il est exercé par le président de la République, élu au suffrage universel, et par le gouvernement (Premier ministre et ministres), qui applique les lois et dirige le pays.\nIdée 2 : le pouvoir législatif. Il appartient au Parlement, composé de l'Assemblée nationale et du Sénat, qui vote les lois et contrôle le gouvernement.\nLe rôle du citoyen : par son vote, il élit le président et les députés, et participe ainsi à la désignation de ceux qui exercent le pouvoir.\nConclusion : la séparation des pouvoirs garantit l'équilibre démocratique.","mention":"Introduction : la Ve République, mise en place en 1958, organise la répartition des pouvoirs entre différentes institutions, selon le principe de la séparation des pouvoirs.\n\nLe pouvoir exécutif. Il est chargé d'appliquer les lois et de diriger le pays. Il est exercé par le président de la République, élu au suffrage universel direct, et par le gouvernement, composé du Premier ministre et des ministres. Le président joue un rôle central dans les institutions françaises.\n\nLe pouvoir législatif. Il consiste à voter les lois. Il appartient au Parlement, qui comprend deux chambres : l'Assemblée nationale, dont les députés sont élus par les citoyens, et le Sénat. Le Parlement vote les lois et contrôle l'action du gouvernement.\n\nLe rôle du citoyen. Le citoyen est à la source du pouvoir : par son vote, il élit le président de la République et les députés de l'Assemblée nationale. Il choisit ainsi ses représentants et participe à la vie démocratique.\n\nConclusion : sous la Ve République, le pouvoir exécutif (président et gouvernement) et le pouvoir législatif (Parlement) sont distincts, et le citoyen, par son vote, désigne ceux qui les exercent. Cette séparation des pouvoirs garantit l'équilibre démocratique."},{"consigne":"Question d'EMC (6 lignes). Explique ce qu'est la séparation des pouvoirs et pourquoi elle est importante dans une démocratie. Nomme les trois pouvoirs.","min":"Les trois pouvoirs : exécutif (appliquer les lois), législatif (voter les lois), judiciaire (juger). La séparation des pouvoirs évite qu'une seule personne ait tous les pouvoirs, ce qui protège la liberté.","solide":"La séparation des pouvoirs consiste à confier les trois grands pouvoirs à des institutions différentes.\nLe pouvoir exécutif (président, gouvernement) applique les lois et dirige le pays.\nLe pouvoir législatif (le Parlement) vote les lois.\nLe pouvoir judiciaire (les juges, les tribunaux) fait respecter les lois et juge.\nCette séparation est importante car elle empêche qu'une seule personne ou un seul groupe détienne tous les pouvoirs, ce qui protège les citoyens contre l'abus de pouvoir et garantit leurs libertés.","mention":"La séparation des pouvoirs est un principe fondamental de la démocratie. Elle consiste à ne pas confier tous les pouvoirs à une seule personne ou institution, mais à les répartir entre trois pouvoirs distincts.\n\nLe pouvoir exécutif est chargé d'appliquer les lois et de diriger le pays. En France, il est exercé par le président de la République et par le gouvernement.\n\nLe pouvoir législatif est chargé de voter les lois. Il appartient au Parlement, composé de l'Assemblée nationale et du Sénat.\n\nLe pouvoir judiciaire est chargé de faire respecter les lois et de juger ceux qui les enfreignent. Il est exercé par les juges et les tribunaux, qui doivent être indépendants.\n\nPourquoi est-ce important ? Si une seule personne détenait tous les pouvoirs, elle pourrait gouverner sans contrôle et abuser de son autorité : ce serait une dictature. En séparant les pouvoirs, on instaure des contrôles mutuels qui protègent les citoyens contre l'arbitraire et garantissent leurs libertés.\n\nConclusion : la séparation distingue les pouvoirs exécutif, législatif et judiciaire ; elle est essentielle en démocratie car elle empêche la concentration du pouvoir et protège les libertés des citoyens."}],"parcours":{"mission":"À la fin, tu sais dire qui fait quoi (président, gouvernement, Parlement).","froid":[{"q":"Quel texte fonde la Ve République ?","rep":"La Constitution de 1958."},{"q":"Qui vote la loi ?","rep":"Le Parlement."},{"q":"De quoi est composé le Parlement ?","rep":"Assemblée nationale et Sénat."},{"q":"Qui dirige le gouvernement ?","rep":"Le Premier ministre."},{"q":"Qu'est-ce que la cohabitation ?","rep":"Président et majorité parlementaire de bords opposés."}],"coffre":[{"q":"La Ve République est fondée par la Constitution de ____","rep":"1958."},{"q":"Le pouvoir exécutif = le ____ + le ____","rep":"président ; gouvernement."},{"q":"Le pouvoir législatif = le ____ (qui vote la loi)","rep":"Parlement."},{"q":"Le Parlement = ____ + ____","rep":"Assemblée nationale ; Sénat."},{"q":"Le Conseil constitutionnel vérifie que les lois respectent la ____","rep":"Constitution."}],"frise":[["1958","Ve"],["1962","suffrage"]],"oral":"Explique en 90 secondes pourquoi on sépare les pouvoirs.","ecrit":{"consigne":"Écris 8 lignes : qui détient les pouvoirs sous la Ve République, et à quoi sert leur séparation ?","min":"Qui fait quoi.","solide":"Exécutif + législatif + rôle du contrôle.","mention":"Explique la séparation des pouvoirs comme protection des libertés."},"oralRedige":"La Ve République, fondée en 1958, repose sur une organisation précise des pouvoirs. Le pouvoir exécutif est partagé entre le président de la République, élu au suffrage universel direct pour cinq ans, et le Premier ministre qu'il nomme et qui dirige le gouvernement. Le pouvoir législatif, c'est-à-dire le vote des lois, appartient au Parlement, composé de deux chambres : l'Assemblée nationale, dont les députés sont élus directement par les citoyens, et le Sénat. Enfin, le pouvoir judiciaire est exercé par les tribunaux, qui jugent en appliquant la loi. Cette séparation des pouvoirs est essentielle pour éviter qu'une seule personne décide de tout.","ecritRedige":{"min":"Sous la Ve République, le président est élu pour 5 ans au suffrage universel. Il nomme le Premier ministre. Le Parlement, avec l'Assemblée nationale et le Sénat, vote les lois. Les tribunaux jugent.","solide":"La Ve République, fondée en 1958, organise les pouvoirs selon le principe de séparation. Le pouvoir exécutif est partagé : le président de la République, élu au suffrage universel direct pour cinq ans, nomme le Premier ministre, qui dirige le gouvernement. Le pouvoir législatif appartient au Parlement, formé de l'Assemblée nationale, élue directement par les citoyens, et du Sénat ; il vote les lois et contrôle le gouvernement. Le pouvoir judiciaire est exercé par les juges et les tribunaux. Cette séparation des pouvoirs garantit qu'aucune personne ne concentre tout le pouvoir.","mention":"La Ve République, instaurée en 1958, organise les institutions françaises autour du principe de séparation des pouvoirs, garant de la démocratie. Le pouvoir exécutif y est bicéphale : le président de la République, élu au suffrage universel direct pour un mandat de cinq ans depuis l'instauration du quinquennat, détient un rôle central ; il nomme le Premier ministre, qui dirige le gouvernement et conduit la politique de la nation, et qui doit disposer du soutien de l'Assemblée nationale. Le pouvoir législatif est confié au Parlement, composé de deux chambres : l'Assemblée nationale, dont les députés sont élus directement par les citoyens, et le Sénat ; le Parlement vote la loi et contrôle l'action du gouvernement. Enfin, le pouvoir judiciaire, exercé par les juges et les tribunaux, applique la loi de manière indépendante. Cette organisation, en distinguant et en équilibrant les pouvoirs, vise à empêcher qu'une seule autorité ne les concentre tous, ce qui protège les libertés des citoyens."},"carte":"Carte mémoire : un schéma avec EXÉCUTIF / LÉGISLATIF / contrôle (Conseil constitutionnel).","motscles":"Constitution, exécutif, législatif, Parlement, Assemblée nationale, Sénat, cohabitation.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (institutions de la Ve République)"}},{"id":"E4","matiere":"emc","titre":"Médias, information et esprit critique","objectif":"À la fin, tu sais vérifier une information et repérer une fake news.","qcm":[{"q":"Qu'est-ce qu'une « infox » (fake news) ?","good":"Une fausse information diffusée volontairement comme si elle était vraie","choices":["Un communiqué officiel d'un ministère","Un article scientifique relu par des experts","Une fausse information diffusée volontairement comme si elle était vraie","Une information vérifiée par plusieurs journalistes"],"explain":"Une infox est une fausse information, parfois conçue pour tromper ou manipuler. L'esprit critique consiste à vérifier avant de croire ou de partager.","verif":"Dans ton cours, retrouve les étapes pour vérifier une information avant de la partager.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (médias et esprit critique)"},{"q":"Quel réflexe relève de l'esprit critique face à une information sur Internet ?","good":"Identifier la source, vérifier la date et croiser plusieurs sources fiables","choices":["Identifier la source, vérifier la date et croiser plusieurs sources fiables","Croire ce qui est le plus partagé","Partager aussitôt sans la lire","Ne se fier qu'à une seule page web"],"explain":"L'esprit critique : qui parle ? quand ? est-ce confirmé ailleurs ? distinguer un fait d'une opinion. Le nombre de partages ne prouve rien.","verif":"Vérifie dans ton cours la différence entre un fait et une opinion.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (médias et esprit critique)"},{"q":"Que garantit la liberté de la presse dans une démocratie ?","good":"Le droit d'informer et d'être informé, essentiel au débat démocratique","choices":["L'interdiction de critiquer les responsables politiques","L'obligation de soutenir le gouvernement","Le droit de publier de fausses informations","Le droit d'informer et d'être informé, essentiel au débat démocratique"],"explain":"La liberté de la presse (loi de 1881) permet aux citoyens d'être informés et de se forger une opinion : c'est un pilier de la démocratie, encadré par la loi.","verif":"Dans ton cours, retrouve pourquoi une presse libre est nécessaire à la démocratie.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (médias et esprit critique)"}],"court":[{"q":"Pourquoi la liberté de la presse est-elle importante en démocratie ?","sol":"Elle informe les citoyens et permet de contrôler les pouvoirs.","kw":["elle","informe","citoyens","permet"],"explain":"Contexte : média, liberté de la presse, source, fake news, esprit critique. · À éviter : Écrire que tous les médias mentent ; confondre liberté d'expression et tout dire sans limite.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (médias et esprit critique)"},{"q":"Qu'est-ce qu'une fake news ?","sol":"Une information fausse ou trompeuse diffusée comme vraie.","kw":["une","information","fausse","trompeuse"],"explain":"Contexte : média, liberté de la presse, source, fake news, esprit critique. · À éviter : Écrire que tous les médias mentent ; confondre liberté d'expression et tout dire sans limite.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (médias et esprit critique)"},{"q":"Cite 3 choses à vérifier avant de croire une info.","sol":"La source, l'auteur, la date, les preuves (3 au choix).","kw":["source","lauteur","preuves"],"explain":"Contexte : média, liberté de la presse, source, fake news, esprit critique. · À éviter : Écrire que tous les médias mentent ; confondre liberté d'expression et tout dire sans limite.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (médias et esprit critique)"},{"q":"Quelle différence entre un fait et une opinion ?","sol":"Un fait se vérifie ; une opinion est un jugement.","kw":["vérifie","opinion","jugement"],"explain":"Contexte : média, liberté de la presse, source, fake news, esprit critique. · À éviter : Écrire que tous les médias mentent ; confondre liberté d'expression et tout dire sans limite.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (médias et esprit critique)"},{"q":"Cite un risque des réseaux sociaux.","sol":"Rumeurs rapides, bulles d'opinion, manipulation (au choix).","kw":["rumeurs","rapides","bulles","dopinion"],"explain":"Contexte : média, liberté de la presse, source, fake news, esprit critique. · À éviter : Écrire que tous les médias mentent ; confondre liberté d'expression et tout dire sans limite.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (médias et esprit critique)"}],"paper":{"consigne":"Méthode EMC. Un camarade partage une rumeur alarmante. En 6 lignes : 1) la règle, 2) applique-la, 3) propose une conduite.","grille":["Vérifier avant de partager.","Règle (vérifier) + application + conduite (ne pas relayer).","Structure en 3 temps + distingue fait/opinion et nuance « tous les médias mentent »."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique"},"exos":[{"consigne":"Méthode EMC. Un camarade partage une rumeur alarmante. En 6 lignes : 1) la règle, 2) applique-la, 3) propose une conduite.","min":"Vérifier avant de partager.","solide":"Règle (vérifier) + application + conduite (ne pas relayer).","mention":"1) La règle. Avant de croire et de partager une information, il faut vérifier sa fiabilité : c'est l'exercice de l'esprit critique. On doit s'assurer de la source, croiser l'information avec d'autres médias fiables, et distinguer un fait (vérifiable) d'une opinion.\n\n2) Application à la situation. La rumeur partagée par le camarade n'est pas vérifiée : rien ne prouve qu'elle soit vraie. La relayer risquerait de propager une fausse information (une infox) et de provoquer de l'inquiétude. Il faut donc d'abord se demander d'où vient cette information et si des sources sérieuses la confirment.\n\n3) Conduite responsable proposée. Il ne faut pas partager la rumeur tant qu'elle n'est pas vérifiée. On peut chercher l'information auprès de médias fiables, en parler à un adulte, et inviter le camarade à faire de même. Il faut éviter de penser que « tous les médias mentent » : certains médias sérieux vérifient justement leurs informations.\n\nConclusion : face à une rumeur alarmante, l'esprit critique impose de vérifier avant de partager. Distinguer les faits des opinions et croiser les sources permet de lutter contre les fausses informations."},{"consigne":"Question d'EMC (6 lignes). Un site internet annonce une nouvelle spectaculaire. Avant d'y croire et de la partager, quelles vérifications faut-il faire ? Donne trois conseils.","min":"Vérifier la source (qui publie ?), croiser avec d'autres médias fiables, regarder la date, se méfier des titres trop chocs. Ne pas partager sans avoir vérifié.","solide":"Avant de croire et de partager une information spectaculaire, il faut exercer son esprit critique.\nConseil 1 : vérifier la source. Qui publie cette information ? Est-ce un média sérieux et identifiable ?\nConseil 2 : croiser l'information. La retrouve-t-on sur d'autres médias fiables ? Si une seule source en parle, il faut se méfier.\nConseil 3 : vérifier la date et le contexte, et se méfier des titres trop chocs destinés à faire réagir. Tant qu'on n'a pas vérifié, on ne partage pas.","mention":"Face à une information spectaculaire, surtout sur internet, il faut adopter une démarche critique avant d'y croire ou de la diffuser, car les fausses informations (infox) circulent vite.\n\nPremier conseil : vérifier la source. Il faut se demander qui publie l'information. S'agit-il d'un média identifiable et reconnu, ou d'un site inconnu, anonyme ou peu fiable ? Une source sérieuse est un premier gage de confiance.\n\nDeuxième conseil : croiser l'information. Une information vraie est en général reprise par plusieurs médias fiables. Si une seule source, isolée, annonce une nouvelle extraordinaire, c'est un signal d'alerte : il faut chercher si d'autres médias sérieux la confirment.\n\nTroisième conseil : examiner la date et le contexte, et se méfier des titres trop chocs ou trop beaux pour être vrais, qui cherchent à faire réagir ou cliquer. Une image peut aussi être ancienne ou sortie de son contexte.\n\nConclusion : avant de croire et surtout de partager une information, il faut vérifier la source, la croiser avec d'autres médias fiables et examiner la date et le contexte. Cet esprit critique est essentiel pour lutter contre les fausses informations."},{"consigne":"Question d'EMC (6 lignes). Qu'est-ce qu'une « fake news » (fausse information) et pourquoi est-il important de lutter contre leur diffusion ?","min":"Une fake news est une fausse information diffusée comme si elle était vraie. Il faut lutter contre car elles trompent les gens, peuvent faire peur, diviser, et nuire à la démocratie.","solide":"Une fake news, ou infox, est une fausse information diffusée, volontairement ou non, comme si elle était vraie, notamment sur internet et les réseaux sociaux.\nIl est important de lutter contre leur diffusion car elles trompent les gens et déforment la réalité. Elles peuvent provoquer la peur, créer des tensions ou des divisions, et manipuler l'opinion. En faussant l'information des citoyens, elles nuisent au bon fonctionnement de la démocratie.","mention":"Une fake news, que l'on peut appeler en français une infox ou une fausse information, est une information mensongère diffusée comme si elle était vraie. Elle circule particulièrement vite sur internet et les réseaux sociaux, où elle peut être partagée par de nombreuses personnes.\n\nIl est important de lutter contre leur diffusion pour plusieurs raisons. D'abord, elles trompent les gens en déformant la réalité, ce qui les empêche de se faire une opinion juste. Ensuite, elles peuvent avoir des conséquences graves : provoquer la peur, créer des tensions entre des groupes, ou être utilisées pour manipuler l'opinion. Enfin, en faussant l'information des citoyens, elles nuisent au débat démocratique, qui suppose que chacun puisse s'informer à partir de faits vrais.\n\nConclusion : une fake news est une fausse information présentée comme vraie ; lutter contre sa diffusion est essentiel, car elle trompe les citoyens, peut diviser la société et menace le bon fonctionnement de la démocratie. C'est pourquoi il faut développer son esprit critique et vérifier les informations."}],"parcours":{"mission":"À la fin, tu sais vérifier une information et repérer une fake news.","froid":[{"q":"Pourquoi la liberté de la presse est-elle importante en démocratie ?","rep":"Elle informe les citoyens et permet de contrôler les pouvoirs."},{"q":"Qu'est-ce qu'une fake news ?","rep":"Une information fausse ou trompeuse diffusée comme vraie."},{"q":"Cite 3 choses à vérifier avant de croire une info.","rep":"La source, l'auteur, la date, les preuves (3 au choix)."},{"q":"Quelle différence entre un fait et une opinion ?","rep":"Un fait se vérifie ; une opinion est un jugement."},{"q":"Cite un risque des réseaux sociaux.","rep":"Rumeurs rapides, bulles d'opinion, manipulation (au choix)."}],"coffre":[{"q":"Les médias servent à ____ les citoyens et à ____ les pouvoirs","rep":"informer ; contrôler."},{"q":"Pour vérifier une info : ____, ____, ____, ____","rep":"source, auteur, date, preuves."},{"q":"Avoir l'esprit critique, ce n'est PAS ____","rep":"…tout rejeter."},{"q":"Un fait peut être ____, une opinion exprime un ____","rep":"vérifié ; jugement."},{"q":"La liberté d'expression s'exerce avec des ____","rep":"responsabilités / limites."}],"frise":[["1881","presse"]],"oral":"Explique en 90 secondes comment tu vérifies si une info vue sur ton téléphone est vraie.","ecrit":{"consigne":"Méthode EMC. Un camarade partage une rumeur alarmante. En 6 lignes : 1) la règle, 2) applique-la, 3) propose une conduite.","min":"Vérifier avant de partager.","solide":"Règle (vérifier) + application + conduite (ne pas relayer).","mention":"Structure en 3 temps + distingue fait/opinion et nuance « tous les médias mentent »."},"oralRedige":"À l'heure d'Internet, il est essentiel de développer son esprit critique face à l'information. Aujourd'hui, n'importe qui peut publier en ligne, et de fausses informations, les infox ou fake news, circulent très vite. Pour ne pas se faire tromper, il faut adopter de bons réflexes : se demander qui est l'auteur de l'information, vérifier la date, et surtout croiser plusieurs sources fiables avant de croire ou de partager. Il faut aussi distinguer un fait, qui peut être vérifié, d'une simple opinion. Une presse libre et un esprit critique solide sont indispensables à la démocratie, car ils permettent à chacun de se forger son propre jugement.","ecritRedige":{"min":"Sur Internet, il y a beaucoup de fausses informations, les fake news. Pour ne pas se tromper, il faut vérifier qui a écrit l'information, regarder la date et comparer plusieurs sources sérieuses avant de la croire ou de la partager.","solide":"Face à l'information, surtout sur Internet, il faut développer son esprit critique. Aujourd'hui, chacun peut publier en ligne, et de fausses informations, les infox ou fake news, se diffusent rapidement. Pour les repérer, il faut adopter de bons réflexes : identifier l'auteur de l'information, vérifier la date, et croiser plusieurs sources fiables avant de croire ou de partager un contenu. Il est aussi important de distinguer un fait, vérifiable, d'une opinion. Une presse libre et un esprit critique solide sont essentiels au bon fonctionnement de la démocratie.","mention":"Dans une société où l'information circule en permanence, notamment sur Internet et les réseaux sociaux, l'esprit critique est devenu une compétence citoyenne essentielle. Le numérique a profondément changé le rapport à l'information : chacun peut désormais publier et diffuser des contenus, ce qui favorise la circulation rapide de fausses informations, les infox ou fake news, parfois conçues pour manipuler l'opinion. Pour ne pas se laisser tromper, il faut adopter une démarche méthodique : identifier la source et l'auteur de l'information, vérifier la date, recouper le contenu avec plusieurs sources fiables et reconnues, et distinguer ce qui relève d'un fait vérifiable de ce qui n'est qu'une opinion. Il faut aussi se méfier de l'idée fausse selon laquelle une information serait vraie parce qu'elle est très partagée. Cet esprit critique va de pair avec la liberté de la presse, garantie en France depuis la loi de 1881 : une information libre et pluraliste, alliée à des citoyens capables de l'évaluer, constitue un pilier indispensable de la démocratie."},"carte":"Carte mémoire : « VÉRIFIER UNE INFO », branches : source / auteur / date / preuves.","motscles":"média, liberté de la presse, source, fake news, esprit critique.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (médias et esprit critique)"}},{"id":"E5","matiere":"emc","titre":"Défense, sécurité et engagement","objectif":"À la fin, tu sais expliquer que la défense concerne tous les citoyens.","qcm":[{"q":"À quel âge doit-on se faire recenser en mairie en vue de la Journée défense et citoyenneté ?","good":"16 ans","choices":["13 ans","18 ans","21 ans","16 ans"],"explain":"Le recensement citoyen se fait à 16 ans : il précède la Journée défense et citoyenneté (JDC) et permet l'inscription automatique sur les listes électorales.","verif":"Vérifie dans ton cours les étapes du parcours citoyen (recensement 16 ans, JDC).","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (défense et sécurité)"},{"q":"Que peut être une forme d'engagement citoyen ?","good":"Le bénévolat associatif, le service civique ou le volontariat de sapeur-pompier","choices":["Le bénévolat associatif, le service civique ou le volontariat de sapeur-pompier","L'abstention à toutes les élections","Le refus systématique de respecter la loi","Le départ définitif du pays"],"explain":"L'engagement citoyen prend des formes variées : vie associative, bénévolat, service civique, réserve, don du sang, vote.","verif":"Dans ton cours, retrouve plusieurs formes concrètes d'engagement citoyen.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (défense et sécurité)"},{"q":"Quelle est la mission principale de la défense nationale ?","good":"Protéger le territoire, la population et les intérêts de la France","choices":["Protéger le territoire, la population et les intérêts de la France","Fixer le montant des impôts","Organiser les élections municipales","Gérer les écoles publiques"],"explain":"La défense nationale (armées, mais aussi sécurité civile et cyberdéfense) protège le pays. Élections, écoles et impôts relèvent d'autres institutions.","verif":"Vérifie dans ton cours les différentes formes de la défense (militaire, civile, cyber).","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (défense et sécurité)"}],"court":[{"q":"Quel est le but de la défense nationale ?","sol":"Protéger population, territoire, institutions et intérêts.","kw":["protéger","population","territoire","institutions"],"explain":"Contexte : défense nationale, sécurité civile, réserve, cybersécurité, engagement, intérêt général. · À éviter : Réduire la défense à la guerre et à l'armée.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (défense et sécurité)"},{"q":"Cite un acteur de la sécurité civile.","sol":"Pompiers, secouristes, associations agréées (au choix).","kw":["pompiers","secouristes","associations","agréées"],"explain":"Contexte : défense nationale, sécurité civile, réserve, cybersécurité, engagement, intérêt général. · À éviter : Réduire la défense à la guerre et à l'armée.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (défense et sécurité)"},{"q":"Cite une menace contemporaine.","sol":"Terrorisme, cyberattaque, catastrophe, crise sanitaire (au choix).","kw":["terrorisme","cyberattaque","catastrophe","sanitaire"],"explain":"Contexte : défense nationale, sécurité civile, réserve, cybersécurité, engagement, intérêt général. · À éviter : Réduire la défense à la guerre et à l'armée.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (défense et sécurité)"},{"q":"La défense concerne-t-elle seulement les militaires ?","sol":"Non, elle concerne aussi les citoyens et la sécurité civile.","kw":["non","concerne","citoyens","sécurité"],"explain":"Contexte : défense nationale, sécurité civile, réserve, cybersécurité, engagement, intérêt général. · À éviter : Réduire la défense à la guerre et à l'armée.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (défense et sécurité)"},{"q":"Qu'est-ce que l'engagement citoyen ?","sol":"Une action volontaire au service de l'intérêt général.","kw":["une","action","volontaire","service"],"explain":"Contexte : défense nationale, sécurité civile, réserve, cybersécurité, engagement, intérêt général. · À éviter : Réduire la défense à la guerre et à l'armée.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (défense et sécurité)"}],"paper":{"consigne":"Méthode EMC. Une cyberattaque touche ton collège. En 6 lignes : 1) l'enjeu, 2) les acteurs, 3) la conduite responsable.","grille":["Enjeu + conduite.","Enjeu + acteurs + conduite responsable.","Élargit la défense à la cybersécurité et à la sécurité civile, conduite précise."],"type":"devcons","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique"},"exos":[{"consigne":"Méthode EMC. Une cyberattaque touche ton collège. En 6 lignes : 1) l'enjeu, 2) les acteurs, 3) la conduite responsable.","min":"Enjeu + conduite.","solide":"Enjeu + acteurs + conduite responsable.","mention":"1) L'enjeu. Une cyberattaque contre le collège menace la sécurité des données (notes, informations personnelles des élèves et des familles) et le bon fonctionnement de l'établissement. La cybersécurité est aujourd'hui un enjeu majeur de la défense et de la sécurité, au même titre que la protection du territoire.\n\n2) Les acteurs. Plusieurs acteurs interviennent. Au sein du collège, la direction et les responsables informatiques réagissent. À l'échelle de l'État, des services spécialisés dans la cybersécurité et la sécurité civile peuvent intervenir, car la défense ne se limite pas à l'armée : elle inclut aussi la protection contre les menaces numériques et la protection des populations.\n\n3) La conduite responsable. Chacun doit adopter de bons réflexes : ne pas partager ses mots de passe, signaler tout message suspect à un adulte, ne pas ouvrir de pièces jointes douteuses et respecter les consignes de sécurité informatique. C'est une forme d'engagement de chacun pour la sécurité de tous.\n\nConclusion : une cyberattaque montre que la sécurité concerne aussi le numérique. Elle mobilise des acteurs variés, du collège à l'État, et appelle de la part de chacun une conduite responsable."},{"consigne":"Question d'EMC (6 lignes). Pourquoi un État a-t-il besoin d'assurer la défense et la sécurité de ses citoyens ? Donne deux exemples d'acteurs qui y participent.","min":"Pour protéger la population, le territoire et les institutions contre les menaces (attaques, catastrophes, délinquance). Acteurs : l'armée (défense extérieure), la police et la gendarmerie (sécurité intérieure), les pompiers.","solide":"Un État doit assurer la défense et la sécurité pour protéger sa population, son territoire et ses institutions face à différentes menaces : agressions extérieures, terrorisme, catastrophes naturelles, délinquance.\nDeux exemples d'acteurs : l'armée, qui assure la défense du territoire face aux menaces extérieures ; la police et la gendarmerie, qui assure

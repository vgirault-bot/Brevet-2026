aléa (le séisme) est le même dans les deux villes. Mais la ville aux bâtiments adaptés a réduit son enjeu grâce à la prévention : ses constructions résistent.","vid":"https://www.lumni.fr/college/troisieme/svt"},{"q":"Que désigne : « plaque tectonique » ?","good":"grand morceau de la surface terrestre qui bouge","choices":["reste ou trace d'un être vivant ancien","molécule qui constitue les chromosomes","micro-organisme qui provoque une maladie","grand morceau de la surface terrestre qui bouge"],"explain":"À retenir : L'aléa (le séisme) est le même dans les deux villes. Mais la ville aux bâtiments adaptés a réduit son enjeu grâce à la prévention : ses constructions résistent.","vid":"https://www.lumni.fr/college/troisieme/svt"},{"q":"Que désigne : « aléa » ?","good":"phénomène naturel dangereux","choices":["une version possible d'un gène","molécule qui constitue les chromosomes","cellule reproductrice","phénomène naturel dangereux"],"explain":"À retenir : L'aléa (le séisme) est le même dans les deux villes. Mais la ville aux bâtiments adaptés a réduit son enjeu grâce à la prévention : ses constructions résistent.","vid":"https://www.lumni.fr/college/troisieme/svt"},{"q":"Que désigne : « enjeu » ?","good":"ce qui peut être touché par l'aléa","choices":["phénomène naturel dangereux","ce qui peut être touché par l'aléa","cellule formée à la fécondation","molécule de défense spécifique d'un microbe"],"explain":"À retenir : L'aléa (le séisme) est le même dans les deux villes. Mais la ville aux bâtiments adaptés a réduit son enjeu grâce à la prévention : ses constructions résistent.","vid":"https://www.lumni.fr/college/troisieme/svt"},{"q":"Que désigne : « risque » ?","good":"combinaison de l'aléa et de l'enjeu","choices":["combinaison de l'aléa et de l'enjeu","caractéristique qui favorise la survie","micro-organisme qui provoque une maladie","reste ou trace d'un être vivant ancien"],"explain":"À retenir : L'aléa (le séisme) est le même dans les deux villes. Mais la ville aux bâtiments adaptés a réduit son enjeu grâce à la prévention : ses constructions résistent.","vid":"https://www.lumni.fr/college/troisieme/svt"}],"court":[{"q":"Où se produisent surtout séismes et volcans ?","sol":"Aux frontières des plaques tectoniques.","kw":["aux","frontières","plaques","tectoniques"],"explain":"À retenir : L'aléa (le séisme) est le même dans les deux villes. Mais la ville aux bâtiments adaptés a réduit son enjeu grâce à la prévention : ses constructions résistent.","vid":"https://www.lumni.fr/college/troisieme/svt"},{"q":"Qu'est-ce qu'un séisme ?","sol":"Une libération brutale d'énergie qui fait trembler le sol.","kw":["une","libération","brutale","dénergie"],"explain":"À retenir : L'aléa (le séisme) est le même dans les deux villes. Mais la ville aux bâtiments adaptés a réduit son enjeu grâce à la prévention : ses constructions résistent.","vid":"https://www.lumni.fr/college/troisieme/svt"},{"q":"Quelle différence entre un aléa et un enjeu ?","sol":"L'aléa est le phénomène dangereux ; l'enjeu est ce qui peut être touché.","kw":["laléa","phénomène","dangereux","lenjeu"],"explain":"À retenir : L'aléa (le séisme) est le même dans les deux villes. Mais la ville aux bâtiments adaptés a réduit son enjeu grâce à la prévention : ses constructions résistent.","vid":"https://www.lumni.fr/college/troisieme/svt"},{"q":"Qu'est-ce que le risque ?","sol":"La combinaison de l'aléa et de l'enjeu.","kw":["combinaison","laléa","lenjeu"],"explain":"À retenir : L'aléa (le séisme) est le même dans les deux villes. Mais la ville aux bâtiments adaptés a réduit son enjeu grâce à la prévention : ses constructions résistent.","vid":"https://www.lumni.fr/college/troisieme/svt"},{"q":"Cite une façon de réduire le risque.","sol":"Construction adaptée, surveillance, alerte, éducation (au choix).","kw":["construction","adaptée","surveillance","alerte"],"explain":"À retenir : L'aléa (le séisme) est le même dans les deux villes. Mais la ville aux bâtiments adaptés a réduit son enjeu grâce à la prévention : ses constructions résistent.","vid":"https://www.lumni.fr/college/troisieme/svt"}],"paper":{"doc":"Deux villes subissent le même séisme. L'une a des bâtiments construits pour résister, l'autre non. Les dégâts sont très différents.","consigne":"Explique cette différence avec les mots « aléa », « enjeu » et « prévention ». (4 lignes)","grille":["L'aléa (le séisme) est le même dans les deux villes. Mais la ville aux bâtiments adaptés a réduit son enjeu grâce à la prévention : ses constructions résistent. L'autre, sans prévention, subit donc beaucoup plus de dégâts."],"type":"raisonnement","minutes":10,"vid":"https://www.lumni.fr/college/troisieme/svt"}}],"fr":[{"id":"F1","matiere":"fr","titre":"Comprendre et analyser un texte","objectif":"Repérer les informations d'un texte et justifier tes réponses avec des citations.","methode":["Lis le texte UNE fois en entier sans t'arrêter.","Relis en soulignant : personnages, lieux, temps, mots difficiles.","Pour chaque question, retourne au texte : ne réponds jamais de mémoire.","Justifie : « Le texte le montre quand il écrit : “…” (ligne X). »"],"exos":[{"q":"Sur un texte de ton manuel ou donné par ton professeur : qui est le narrateur ? Justifie avec un mot ou une phrase du texte.","repere":"Réponse attendue : identifier si le narrateur dit « je » (narrateur interne/personnage) ou raconte de l'extérieur (narrateur externe). La justification doit citer un mot du texte (ex. le pronom « je »). L'important est la présence d'une citation."},{"q":"Relève deux mots qui montrent l'émotion du personnage principal. Recopie-les entre guillemets.","repere":"Deux mots exprimant l'émotion doivent être recopiés entre guillemets (ex. « tremblait », « joie »). Une réponse sans guillemets ni renvoi au texte est incomplète."},{"q":"Explique avec tes mots ce que le texte suggère sans le dire directement (l'implicite).","repere":"L'implicite est ce que le texte suggère sans l'écrire (un sous-entendu, une émotion non nommée). La réponse doit reformuler ce sous-entendu avec ses propres mots, en s'appuyant sur un indice du texte."}],"conseil":"Astuce mention : une réponse sans citation perd des points, même si l'idée est juste. Cite toujours."},{"id":"F2","matiere":"fr","titre":"La grammaire et la langue","objectif":"Reconnaître les classes de mots, les fonctions et les valeurs des temps.","methode":["Pour la classe : demande-toi « quelle sorte de mot ? » (un nom ? un verbe ?).","Pour la fonction : demande-toi « quel rôle dans LA phrase ? » (qui fait l'action = sujet).","Pour un temps : demande-toi ce qu'il exprime (durée, soudaineté, habitude)."],"exos":[{"q":"Dans la phrase « Le vieux marin racontait souvent ses voyages », donne la classe grammaticale de : vieux, racontait, souvent.","repere":"vieux = adjectif qualificatif ; racontait = verbe (raconter, imparfait) ; souvent = adverbe."},{"q":"Dans la même phrase, quel est le sujet du verbe ? Quel est le COD ?","repere":"Sujet = « Le vieux marin » (c'est lui qui raconte). COD = « ses voyages » (il raconte quoi ? ses voyages)."},{"q":"« Il marchait lentement quand soudain il tomba. » Explique pourquoi on a un imparfait puis un passé simple.","repere":"« marchait » est à l'imparfait : action en cours, qui dure (l'arrière-plan). « tomba » est au passé simple : action soudaine et brève qui interrompt la première."}],"conseil":"Astuce mention : ne confonds pas classe (nature, fixe) et fonction (rôle, variable selon la phrase)."},{"id":"F3","matiere":"fr","titre":"La dictée","objectif":"Réduire tes fautes en relisant avec une méthode, pas au hasard.","methode":["1er passage : vérifie chaque verbe et son sujet (accord).","2e passage : vérifie chaque nom et ses accords (déterminant, adjectif).","3e passage : traque les homophones (a/à, et/est, son/sont, ces/ses, on/ont).","Lis ta dictée À L'ENVERS (de la fin au début) pour repérer les mots isolément."],"exos":[{"q":"Complète avec a ou à : « Il ___ pris son sac ___ dos pour aller ___ l'école. »","repere":"« Il a pris son sac à dos pour aller à l'école. » — « a » = verbe avoir (il a pris) ; « à » = préposition (à dos, à l'école)."},{"q":"Accorde le participe passé : « Les fleurs qu'elle a (cueillir) ___ sont belles. » Explique la règle utilisée.","repere":"« Les fleurs qu'elle a cueillies sont belles. » Participe passé avec « avoir » : le COD « qu' » (= les fleurs) est placé AVANT le verbe, donc on accorde au féminin pluriel : cueillies."},{"q":"Complète avec ces ou ses : « Il range ___ affaires, puis regarde ___ photos accrochées au mur. »","repere":"« Il range ses affaires, puis regarde ces photos. » — « ses » = les siennes (possessif) ; « ces » = celles-là, qu'on montre (démonstratif)."}],"conseil":"Astuce mention : entraîne-toi sur les homophones, ce sont les fautes les plus faciles à éliminer."},{"id":"F4","matiere":"fr","titre":"La rédaction","objectif":"Construire un texte organisé, qui répond vraiment au sujet.","methode":["Sujet d'imagination : situe le décor, fais vivre un personnage, ajoute des détails concrets et des émotions.","Sujet de réflexion : annonce ton avis, donne 2 ou 3 arguments avec des exemples, conclus.","Dans les deux cas : paragraphes aérés, connecteurs (d'abord, ensuite, enfin), temps cohérents.","Relis à la fin pour la ponctuation et les accords."],"exos":[{"q":"Sujet d'imagination. Raconte en quelques lignes un moment où un personnage découvre quelque chose d'inattendu. Commence par planter le décor.","repere":"Attendu : un récit qui plante d'abord le décor (lieu, moment), met en scène un personnage, puis amène la découverte inattendue. Bonus mention : détails concrets, émotions, et une chute. Texte organisé en paragraphes."},{"q":"Sujet de réflexion. « Les écrans nous rapprochent-ils ou nous éloignent-ils des autres ? » Note ton avis et 2 arguments.","repere":"Attendu : un avis clair annoncé dès le début, puis 2 arguments illustrés par des exemples concrets (vie quotidienne, expérience), reliés par des connecteurs (d'abord, ensuite). Une courte conclusion qui rappelle la position."}],"conseil":"Astuce mention : le correcteur valorise un texte ORGANISÉ (paragraphes, connecteurs) autant que les idées. Ne rends jamais un bloc compact."}],"mat":{"fr_texte":{"titre":"La porte du grenier","auteur":"texte original, pour l'entraînement","corps":["Léa n'avait jamais aimé le grenier. Pourtant, ce soir-là, une curiosité plus forte que sa peur la poussa vers l'escalier étroit. Les marches gémissaient sous ses pas, comme si la maison elle-même cherchait à la retenir.","En haut, une seule porte. Le bois en était gonflé par l'humidité, et une poignée de cuivre, verte de vieillesse, semblait l'attendre depuis des années. Léa posa la main dessus. Elle était glacée.","« Je n'ai pas peur », murmura-t-elle, sans vraiment y croire. Elle tourna la poignée. La porte résista, puis céda d'un coup, dans un grincement qui lui hérissa la nuque.","Derrière, il n'y avait pas le débarras poussiéreux qu'elle imaginait. Une lumière douce, dorée, baignait une pièce qu'elle n'avait jamais vue. Au centre, posé sur une table, un vieux carnet relié de cuir attendait, ouvert."],"questions":[{"q":"Qui est le personnage principal ? Relève deux mots du texte qui montrent ce qu'elle ressent au début.","kw":["léa","peur","curiosité"],"aide":"Cherche un nom propre, puis des mots d'émotion dans le 1er paragraphe."},{"q":"Où se déroule la scène ? Justifie avec un élément précis du texte.","kw":["grenier","escalier","porte"],"aide":"Le lieu est nommé dès la 1re phrase."},{"q":"Relève une comparaison dans le texte et explique ce qu'elle exprime.","kw":["comme","maison","retenir"],"aide":"Cherche le mot « comme » : il introduit une comparaison."},{"q":"La dernière phrase donne envie de lire la suite. Explique pourquoi (ce qu'on découvre, ce qu'on ne sait pas encore).","kw":["carnet","mystère","suite"],"aide":"Qu'est-ce qui est laissé en suspens ?"}],"grammaire":[{"q":"« Les marches gémissaient sous ses pas. » Donne l'infinitif, le temps et le sujet du verbe.","sol":"gémir ; imparfait ; sujet = les marches."},{"q":"Réécris au passé composé : « Léa tourne la poignée et la porte cède. »","sol":"Léa a tourné la poignée et la porte a cédé."}]},"fr_dictee":{"titre":"Dictée : le carnet","consigne":"Fais-toi lire ce texte à voix haute, écris-le, puis compare. Compte les fautes par type.","texte":"Le carnet que Léa avait découvert renfermait des pages couvertes d'une écriture fine. Les mots, qu'elle lisait à voix basse, semblaient s'animer sous ses yeux fatigués. Elle comprit alors que cette histoire n'était pas terminée : elle commençait à peine.","pieges":["que/qu' (pronom relatif)","accord « pages couvertes » (féminin pluriel)","« lisait » imparfait","« s'animer » infinitif après semblaient","« fatigués » accord avec yeux","deux-points puis « elle commençait »"]},"hg_doc_14_18":{"titre":"Lettre d'un soldat (document reconstitué pour l'entraînement)","intro":"Texte original écrit dans l'esprit des lettres de poilus, pour s'entraîner à l'analyse. Ce n'est pas un document d'archive authentique.","corps":["« Ma chère Marguerite,","Voilà trois semaines que nous tenons cette tranchée. La boue nous monte aux genoux, et le bruit des obus ne s'arrête jamais, ni le jour ni la nuit. Hier, l'ordre est venu d'attaquer ; beaucoup des nôtres ne sont pas revenus.","On nous dit que l'arrière travaille pour nous : les usines tournent, les femmes y remplacent les hommes partis au front. Cela me donne du courage, mais je rêve surtout du jour où tout cela finira.","Embrasse les enfants. Ton mari qui pense à vous. »"],"questions":[{"q":"Présente le document : sa nature, l'époque et le contexte (méthode NADI).","kw":["lettre","guerre","tranchée","1914"],"aide":"Quel type de texte ? Quelle guerre ? Où est l'auteur ?"},{"q":"Relève deux éléments qui montrent les conditions de vie des soldats.","kw":["boue","obus","tranchée"],"aide":"Cherche dans le 2e paragraphe."},{"q":"Le document montre que les civils participent aussi à la guerre. Explique avec un exemple du texte, puis avec une connaissance du cours.","kw":["usines","femmes","arrière","totale"],"aide":"3e paragraphe + notion de guerre totale."}]},"svt_doc_immunite":{"titre":"Résultat d'expérience (données originales pour l'entraînement)","intro":"On mesure la quantité d'anticorps dans le sang après deux contacts avec le même microbe.","donnees":["1er contact : les anticorps apparaissent lentement, au bout d'environ 10 jours, en faible quantité.","2e contact (avec le même microbe, des semaines plus tard) : les anticorps apparaissent très vite, en 2 à 3 jours, et en quantité beaucoup plus grande."],"question":"Explique cette différence entre le 1er et le 2e contact. Utilise les mots « mémoire » et « anticorps ».","kw":["mémoire","anticorps","vaccin","rapide"],"aide":"Pense à ce que le corps « garde » après le 1er contact."}},"plan":{"phases":[{"nom":"Phase 1 — Ancrage (5 au 13 juin)","desc":"On installe les bases : cahiers de révision, une matière après l'autre. Objectif : savoir le cours et la méthode."},{"nom":"Phase 2 — Entraînement (14 au 21 juin)","desc":"On bascule sur les sujets type brevet, en conditions. Objectif : appliquer sur des sujets nouveaux."},{"nom":"Phase 3 — Dernière ligne droite (22 au 25 juin)","desc":"Simulations chronométrées et révisions ciblées, calées sur l'ordre des épreuves. Objectif : être prêt le jour J."}],"jours":[{"d":"Ven. 5 juin","ph":1,"b1":["Histoire","Cahier HG-EMC : chapitre H1 (14-18), les 8 étapes."],"b2":["Maths","Cahier Maths : M1 calcul littéral, lis le rappel + refais l'exemple."],"note":"On démarre doucement : une matière littéraire, une scientifique."},{"d":"Sam. 6 juin","ph":1,"b1":["Français","Cahier Français : F1 comprendre un texte (méthode + 1 exercice)."],"b2":["SVT","Cahier SVT : S1 génétique (rappel + quiz à froid)."]},{"d":"Dim. 7 juin","ph":1,"b1":["Repos actif","Journée légère : refais juste les quiz ratés de la semaine (15 min)."],"b2":["—","Pas de 2e bloc le dimanche."],"note":"Le repos fait partie de la mémorisation. Ne culpabilise pas."},{"d":"Lun. 8 juin","ph":1,"b1":["Histoire","H2 totalitarismes + H3 Seconde Guerre mondiale (8 étapes, allégé)."],"b2":["Physique-Chimie","Cahier Maths-PC : P1 vitesse + P3 loi d'Ohm (rappels + exemples)."]},{"d":"Mar. 9 juin","ph":1,"b1":["Maths","M2 équations + M3 Pythagore (exemples puis exercices)."],"b2":["Français","F2 grammaire et langue (méthode + exercices)."]},{"d":"Mer. 10 juin","ph":1,"b1":["Géographie","G1 aires urbaines + G4 aménager le territoire."],"b2":["SVT","S4 immunité + S2 reproduction."]},{"d":"Jeu. 11 juin","ph":1,"b1":["Histoire","H6 guerre froide + H9 République repensée."],"b2":["Maths","M7 pourcentages + M8 stats/probas."]},{"d":"Ven. 12 juin","ph":1,"b1":["Français","F3 dictée (méthode 3 passages + exercices homophones)."],"b2":["Physique-Chimie","P2 énergie cinétique + P4 masse volumique."]},{"d":"Sam. 13 juin","ph":1,"b1":["Géographie","G2 espaces productifs + G5 outre-mer + G6 UE."],"b2":["EMC","E1 valeurs République + E4 médias/esprit critique."],"note":"Fin de la phase 1 : tu as balayé tout le programme une fois."},{"d":"Dim. 14 juin","ph":2,"b1":["Bilan","Reprends le planning de révision espacée : retests rapides des chapitres hésitants."],"b2":["—","Journée légère."]},{"d":"Lun. 15 juin","ph":2,"b1":["Histoire (sujet)","Sujets type brevet : HG Sujet 1 (développement construit 14-18), en 30 min chrono."],"b2":["Maths (sujet)","Sujets : Maths Sujet 1, puis vérifie avec le corrigé."]},{"d":"Mar. 16 juin","ph":2,"b1":["Français (sujet)","Sujets : Français Sujet 1 (compréhension + langue)."],"b2":["SVT (sujet)","Sujets : SVT Sujet 1 (génétique, raisonnement)."]},{"d":"Mer. 17 juin","ph":2,"b1":["Géo + EMC (sujet)","Sujets : HG Sujet 3 (aires urbaines + laïcité)."],"b2":["Physique-Chimie (sujet)","Sujets : PC Sujet 1 (mouvement et énergie)."]},{"d":"Jeu. 18 juin","ph":2,"b1":["Maths (sujet)","Sujets : Maths Sujet 2 (géométrie, Thalès, volumes)."],"b2":["Français (sujet)","Sujets : Français Sujet 2 (dictée + réécriture)."]},{"d":"Ven. 19 juin","ph":2,"b1":["Histoire (sujet)","Sujets : HG Sujet 2 (analyse de document, guerre froide)."],"b2":["SVT (sujet)","Sujets : SVT Sujet 2 (immunité, analyse de graphique)."]},{"d":"Sam. 20 juin","ph":2,"b1":["Maths (sujet)","Sujets : Maths Sujet 3 (probas, fonctions, algorithmique)."],"b2":["Physique-Chimie (sujet)","Sujets : PC Sujet 2 + 3 (électricité, chimie)."]},{"d":"Dim. 21 juin","ph":2,"b1":["Français (sujet)","Sujets : Français Sujet 3 (rédaction complète, 20 lignes chrono)."],"b2":["—","Journée plus calme avant la dernière semaine."],"note":"Tu as fait au moins un sujet complet dans chaque matière."},{"d":"Lun. 22 juin","ph":3,"b1":["Français (révision ciblée)","Reprends tes erreurs des sujets de français. Refais une dictée."],"b2":["SVT (révision ciblée)","Relis les 3 raisonnements types SVT (génétique, immunité, risques)."],"note":"Cette semaine, on cale les révisions sur l'ordre des épreuves."},{"d":"Mar. 23 juin","ph":3,"b1":["Français (simulation)","Refais un sujet de rédaction en 45 min, comme le jour J."],"b2":["Histoire (révision)","Relis les fiches mémoire H1 à H9, refais les frises."]},{"d":"Mer. 24 juin","ph":3,"b1":["Histoire-Géo-EMC (simulation)","Refais HG Sujet 1 ou 3 en 1 h chrono. C'est l'épreuve la plus rentable."],"b2":["Sciences (révision)","Relis les formules PC + les définitions SVT. Refais 3 calculs."]},{"d":"Jeu. 25 juin","ph":3,"b1":["Maths (simulation)","Refais un sujet de maths complet en 1 h. Vérifie chaque résultat."],"b2":["Détente + matériel","Prépare ta trousse, ta calculatrice, ta convocation. Couche-toi tôt."],"note":"Demain, c'est le français. Tu es prêt."}],"epreuves":[["Ven. 26 juin","Français","9h-12h15 : compréhension, grammaire, dictée, puis rédaction."],["Lun. 29 juin","Histoire-Géo-EMC (matin) + Sciences (après-midi)","9h-11h HG-EMC ; 13h30-14h30 sciences (PC + SVT)."],["Mar. 30 juin","Mathématiques","9h-11h : 6 à 8 exercices, calculatrice autorisée."]],"regles":["Deux blocs par jour d'environ 25-30 min, avec une pause de 10 min entre les deux.","Toujours commencer par ce qui est le plus difficile, quand la concentration est au maximum.","Avant chaque sujet d'entraînement : pas de cours sous les yeux, on se met en conditions.","Après chaque sujet : corriger avec le corrigé et noter UNE chose à améliorer.","Le dimanche est volontairement léger : le cerveau consolide pendant le repos.","Si une journée saute, on ne rattrape pas tout : on reprend simplement le lendemain."]}};</script>
<script>'use strict';
/* ============ ÉTAT & PERSISTANCE ============ */
var SAVE_KEY='brevetquest_v1';
var state=load();
function load(){
  try{var s=JSON.parse(localStorage.getItem(SAVE_KEY));if(s)return s;}catch(e){}
  return {xp:0,streakDays:0,lastDay:null,best:{},stars:{},seen:{},box:{},done:0};
}
function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function bumpStreak(){var t=todayStr();if(state.lastDay===t)return;
  var y=new Date();y.setDate(y.getDate()-1);var ys=y.getFullYear()+'-'+(y.getMonth()+1)+'-'+y.getDate();
  state.streakDays=(state.lastDay===ys)?state.streakDays+1:1;state.lastDay=t;save();}

/* ============ NIVEAU / XP ============ */
function levelOf(xp){return Math.floor(Math.sqrt(xp/50))+1;}
function xpForLevel(l){return 50*(l-1)*(l-1);}
function levelProgress(){var l=levelOf(state.xp);var cur=xpForLevel(l),nxt=xpForLevel(l+1);
  return {l:l,pct:Math.round((state.xp-cur)/(nxt-cur)*100)};}

/* ============ DECOMPTE BREVET ============ */
function daysToBrevet(){var ex=new Date(2026,5,26);var now=new Date();
  return Math.max(0,Math.ceil((ex-now)/86400000));}

/* ============ COLLECTE DES ITEMS JOUABLES ============ */
// renvoie la liste d'items {type, ...} pour une matière donnée
function itemsFor(mat){
  var out=[];
  function pushChap(c,kind){
    (c.qcm||[]).forEach(function(q,i){out.push({type:'qcm',mat:mat,chap:c.id,titre:c.titre,key:c.id+'_qcm'+i,q:q.q,good:q.good,choices:q.choices,explain:q.explain,vid:q.vid,vidlab:q.vidlab});});
    (c.court||[]).forEach(function(q,i){out.push({type:'court',mat:mat,chap:c.id,titre:c.titre,key:c.id+'_court'+i,q:q.q,sol:q.sol,kw:q.kw,explain:q.explain,vid:q.vid,vidlab:q.vidlab});});
    (c.exact||[]).forEach(function(q,i){out.push({type:'exact',mat:mat,chap:c.id,titre:c.titre,key:c.id+'_exact'+i,q:q.q,sol:q.sol,detail:q.detail,explain:q.explain,vid:q.vid,vidlab:q.vidlab});});
  }
  if(mat==='histoire'||mat==='geo'||mat==='emc'){DATA.hg.filter(function(c){return c.matiere===mat;}).forEach(function(c){pushChap(c);});}
  else if(mat==='maths'){DATA.mpc.filter(function(c){return c.matiere==='maths';}).forEach(function(c){pushChap(c);});}
  else if(mat==='pc'){DATA.mpc.filter(function(c){return c.matiere==='pc';}).forEach(function(c){pushChap(c);});}
  else if(mat==='svt'){DATA.svt.forEach(function(c){pushChap(c);});}
  return out;
}
// items "papier/clavier" (sujets longs)
function longFor(mat){
  var out=[];
  if(mat==='histoire'){var d=DATA.mat.hg_doc_14_18;out.push({type:'paper',mat:mat,titre:d.titre,doc:d,kind:'doc'});}
  if(mat==='fr'){
    out.push({type:'paper',mat:'fr',titre:DATA.mat.fr_texte.titre,doc:DATA.mat.fr_texte,kind:'texte'});
    out.push({type:'paper',mat:'fr',titre:DATA.mat.fr_dictee.titre,doc:DATA.mat.fr_dictee,kind:'dictee'});
  }
  if(mat==='svt'){var s=DATA.mat.svt_doc_immunite;out.push({type:'paper',mat:'svt',titre:s.titre,doc:s,kind:'svtdoc'});}
  // mode papier générique : dev construit de chaque chapitre HG
  if(mat==='histoire'||mat==='geo'||mat==='emc'){
    DATA.hg.filter(function(c){return c.matiere===mat;}).forEach(function(c){
      if(c.paper)out.push({type:'paper',mat:mat,titre:c.titre,kind:'devcons',consigne:c.paper.consigne,grille:c.paper.grille});
    });
  }
  return out;
}

/* ============ RÉVISION ESPACÉE (boîtes de Leitman simplifiées) ============ */
function dueItems(items){
  var now=Date.now();
  return items.filter(function(it){var b=state.box[it.key];if(!b)return true;return b.due<=now;});
}
function gradeItem(key,ok){
  var b=state.box[key]||{lvl:0};
  if(ok)b.lvl=Math.min(5,b.lvl+1);else b.lvl=Math.max(0,b.lvl-1);
  var delays=[0,1,2,4,7,14]; // jours selon le niveau
  b.due=Date.now()+delays[b.lvl]*86400000;
  state.box[key]=b;save();
}

/* ============ NORMALISATION RÉPONSES ============ */
function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');}
function checkCourt(it,ans){
  var n=norm(ans);if(n.length<2)return false;
  var hit=0;it.kw.forEach(function(k){if(n.indexOf(norm(k))>=0)hit++;});
  return hit>=Math.max(1,Math.ceil(it.kw.length/2));
}
function checkExact(it,ans){
  var a=norm(ans),s=norm(it.sol);
  if(a===s)return true;
  // tolère espaces/×/^ déjà retirés par norm ; compare aussi sans 0 superflus
  return a.replace(/^0+/,'')===s.replace(/^0+/,'');
}

/* ============ UI HELPERS ============ */
var app=document.getElementById('app');
function el(html){var d=document.createElement('div');d.innerHTML=html.trim();return d.firstChild;}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1600);}
function showCombo(txt){var c=document.getElementById('combo');c.textContent=txt;c.classList.remove('show');void c.offsetWidth;c.classList.add('show');}
function TH(m){return DATA.themes[m];}

/* ============ ÉCRANS ============ */
function hud(){
  var lp=levelProgress();
  return '<div class="hud"><div class="inner">'
    +'<button class="home" onclick="screenHub()">⚔ Brevet Quest</button>'
    +'<div class="stats">'
    +'<span class="stat">⭐ Niv. '+lp.l+'</span>'
    +'<span class="stat streakflame">🔥 '+(state.streakDays||0)+'</span>'
    +'</div></div>'
    +'<div class="lvlbar"><div class="f" style="width:'+lp.pct+'%"></div></div></div>';
}

// ----- mapping libellé de matière (planning) -> clé de matière jouable -----
function matKeyFromLabel(lab){
  var l=(lab||'').toLowerCase();
  if(l.indexOf('hist')>=0)return 'histoire';
  if(l.indexOf('géo')>=0||l.indexOf('geo')>=0)return 'geo';
  if(l.indexOf('emc')>=0)return 'emc';
  if(l.indexOf('phys')>=0||l.indexOf('chim')>=0)return 'pc';
  if(l.indexOf('math')>=0)return 'maths';
  if(l.indexOf('svt')>=0)return 'svt';
  if(l.indexOf('fran')>=0)return 'fr';
  return null;
}
// ----- mission du jour : retrouve l'entrée du planning correspondant à aujourd'hui -----
function todayMission(){
  if(!DATA.plan||!DATA.plan.jours)return null;
  var months={'jan':0,'fév':1,'fev':1,'mar':2,'avr':3,'mai':4,'juin':5,'juil':6,'aoû':7,'aou':7,'sep':8,'oct':9,'nov':10,'déc':11,'dec':11};
  var now=new Date();
  // chaque jour a un champ "d" du type "Ven. 5 juin" -> on extrait jour+mois
  for(var i=0;i<DATA.plan.jours.length;i++){
    var d=DATA.plan.jours[i];var mm=d.d.match(/(\d+)\s+([a-zéûôA-Z]+)/);
    if(!mm)continue;var day=parseInt(mm[1],10);var mon=months[mm[2].slice(0,4).toLowerCase()]; if(mon===undefined)mon=months[mm[2].slice(0,3).toLowerCase()];
    if(day===now.getDate()&&mon===now.getMonth())return {idx:i,d:d};
  }
  return null; // hors période de révision
}
function missionCard(){
  var m=todayMission();
  if(!m){
    // hors période : on propose quand même la session conseillée
    return '<div class="mission"><span class="phase">PROGRAMME</span><div class="day">Ta mission</div>'
      +'<p class="muted" style="margin:6px 0 0">Lance ta session du jour ci-dessous, ou choisis une matière précise plus bas pour cibler un point à revoir.</p></div>';
  }
  var d=m.d;var ph=(DATA.plan.phases&&DATA.plan.phases[d.ph-1])?DATA.plan.phases[d.ph-1].nom:'';
  function blk(b){if(!b)return '';var key=matKeyFromLabel(b[0]);var th=key?TH(key):null;
    var btn=key?' onclick="startSession(\''+key+'\',\'qcm\',10)"':'';
    return '<div class="blk"'+btn+' style="cursor:'+(key?'pointer':'default')+'">'
      +'<span class="e">'+(th?th.pic:'📘')+'</span><span><b>'+esc(b[0])+(key?' · jouer ▶':'')+'</b><span>'+esc(b[1])+'</span></span></div>';
  }
  return '<div class="mission">'
    +(ph?'<span class="phase">'+esc(ph)+'</span>':'')
    +'<div class="day">📅 '+esc(d.d)+' · ta mission du jour</div>'
    + blk(d.b1) + blk(d.b2)
    +(d.note?'<div class="note">💡 '+esc(d.note)+'</div>':'')
    +'</div>';
}
function screenHub(){
  bumpStreak();
  var mats=['histoire','geo','emc','maths','pc','svt','fr'];
  var cards=mats.map(function(m){
    var th=TH(m);var items=itemsFor(m);
    var total=items.length||1;var mastered=items.filter(function(it){return (state.box[it.key]||{}).lvl>=3;}).length;
    var pct=Math.round(mastered/total*100);
    return '<button class="mcard" style="--mc:'+th.c+';--mb:'+th.bg+'" onclick="screenMat(\''+m+'\')">'
      +'<div class="top"><span class="pic">'+th.pic+'</span><span class="nom">'+th.nom+'</span></div>'
      +'<div class="meta">'+items.length+' questions · '+mastered+' maîtrisées</div>'
      +'<div class="pg"><div class="f" style="width:'+pct+'%"></div></div>'
      +'<div class="stars">'+'★'.repeat(Math.min(3,Math.floor(pct/34)))+'☆'.repeat(3-Math.min(3,Math.floor(pct/34)))+'</div>'
      +'</button>';
  }).join('');
  app.innerHTML=hud()

/* ============ SESSION TIMÉE ============ */
var S=null; // session courante
function buildPool(mat,mode){
  var items;
  if(mat==='__daily__'){items=[];['histoire','geo','emc','maths','pc','svt'].forEach(function(m){items=items.concat(itemsFor(m));});}
  else items=itemsFor(mat);
  if(mode==='qcm')items=items.filter(function(i){return i.type==='qcm';});
  else if(mode==='court')items=items.filter(function(i){return i.type==='court';});
  else if(mode==='exact')items=items.filter(function(i){return i.type==='exact';});
  else if(mode==='due')items=dueItems(items);
  else if(mode==='mix')items=dueItems(items).length>=6?dueItems(items):items;
  // shuffle
  for(var i=items.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=items[i];items[i]=items[j];items[j]=t;}
  return items;
}
function startSession(mat,mode,n){
  var pool=buildPool(mat,mode);
  if(!pool.length){toast('Rien à réviser ici pour le moment 👍');return;}
  S={mat:mat,mode:mode,items:pool.slice(0,n),idx:0,correct:0,combo:0,maxcombo:0,xp:0,t0:Date.now(),perQ:mode==='exact'?40:(mode==='court'?30:20)};
  bumpStreak();
  nextQuestion();
}

/* ----- SAUVEGARDER : instantané daté de la progression ----- */
function progressSnapshot(){
  var mats=['histoire','geo','emc','maths','pc','svt'];
  var per={};var totMast=0,totItems=0;
  mats.forEach(function(m){var items=itemsFor(m);var mast=items.filter(function(it){return (state.box[it.key]||{}).lvl>=3;}).length;
    per[m]=Math.round(mast/(items.length||1)*100);totMast+=mast;totItems+=items.length;});
  return {date:new Date().toLocaleDateString('fr-FR'),ts:Date.now(),xp:state.xp,level:levelOf(state.xp),
    streak:state.streakDays||0,global:Math.round(totMast/(totItems||1)*100),per:per};
}
function saveSnapshot(){
  state.snaps=state.snaps||[];
  var snap=progressSnapshot();
  // évite les doublons le même jour : remplace
  state.snaps=state.snaps.filter(function(s){return s.date!==snap.date;});
  state.snaps.push(snap);
  if(state.snaps.length>60)state.snaps=state.snaps.slice(-60);
  save();
  toast('💾 Progression enregistrée ('+snap.global+'% du programme)');
}

/* ----- NOUVEAU JEU : tirage neuf qui balaie TOUT le programme ----- */
/* On garde un compteur de passage par item ; un "nouveau jeu" reconstruit une file
   ordonnée pour couvrir tous les chapitres et tous les items avant de recycler. */
function newQuestionSet(){
  // collecte tous les items de toutes les matières
  var all=[];['histoire','geo','emc','maths','pc','svt'].forEach(function(m){all=all.concat(itemsFor(m));});
  state.seen=state.seen||{};
  // groupe par chapitre pour garantir la couverture chapitre par chapitre
  var byChap={};all.forEach(function(it){var c=it.mat+'/'+(it.chap||'?');(byChap[c]=byChap[c]||[]).push(it);});
  var chaps=Object.keys(byChap);
  // file équilibrée : on prend en round-robin un item du chapitre le moins vu
  var queue=[];
  // trie les items de chaque chapitre par nombre de passages croissant
  chaps.forEach(function(c){byChap[c].sort(function(a,b){return (state.seen[a.key]||0)-(state.seen[b.key]||0);});});
  var maxLen=Math.max.apply(null,chaps.map(function(c){return byChap[c].length;}));
  for(var r=0;r<maxLen;r++){
    // mélange l'ordre des chapitres à chaque tour pour l'interleaving
    var order=chaps.slice();for(var i=order.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=order[i];order[i]=order[j];order[j]=t;}
    order.forEach(function(c){if(byChap[c][r])queue.push(byChap[c][r]);});
  }
  state.freshQueue=queue.map(function(it){return it.key;});
  state.freshPos=0;
  save();
  toast('🔄 Nouveau jeu : '+chaps.length+' chapitres, '+queue.length+' questions, tout le programme couvert');
  // lance immédiatement une session sur cette file
  startFreshSession();
}
function startFreshSession(){
  if(!state.freshQueue||!state.freshQueue.length){toast('Lance d\'abord « Nouveau jeu »');return;}
  // reconstruit les items depuis les clés, par tranches de 12
  var allByKey={};['histoire','geo','emc','maths','pc','svt'].forEach(function(m){itemsFor(m).forEach(function(it){allByKey[it.key]=it;});});
  var slice=[];var pos=state.freshPos||0;
  while(slice.length<12 && pos<state.freshQueue.length){var it=allByKey[state.freshQueue[pos]];if(it)slice.push(it);pos++;}
  if(!slice.length){ // file épuisée -> on en régénère une
    state.freshPos=0;save();return newQuestionSet();
  }
  // marque comme vus
  slice.forEach(function(it){state.seen[it.key]=(state.seen[it.key]||0)+1;});
  state.freshPos=pos;save();
  S={mat:'__fresh__',mode:'mix',items:slice,idx:0,correct:0,combo:0,maxcombo:0,xp:0,t0:Date.now(),perQ:20};
  bumpStreak();nextQuestion();
}

      +'<div class="qbody">'+esc(it.q)+'</div>'
      +(it.type==='exact'?'<p class="muted">Pose ton calcul sur papier, puis écris seulement le résultat.</p>':'')
      +'<input class="tinput" id="ti" placeholder="'+ph+'" autocomplete="off" autocapitalize="off"/>'
      +'<button class="primary" onclick="answerText()">Valider</button></div>';
  }
  app.innerHTML=hud()+head+'<div class="wrap">'+body
    +'<div class="backrow"><button class="ghost" onclick="quitSession()">Abandonner la session</button></div></div>';
  var ti=document.getElementById('ti');if(ti){ti.focus();ti.addEventListener('keydown',function(e){if(e.key==='Enter')answerText();});}
  // timer
  var left=S.perQ;var tf=document.getElementById('tf'),tl=document.getElementById('tlab');
  tf.style.width='100%';
  timerInt=setInterval(function(){left--;tf.style.width=(left/S.perQ*100)+'%';tl.textContent=left+'s';
    if(left<=0){clearInterval(timerInt);timerInt=null;timeout();}},1000);
}
function timeout(){var it=S.items[S.idx];feedback(false,it,true);}
function answerQCM(btn,b64good){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  var it=S.items[S.idx];var ok=esc(btn.textContent)===esc(unb64(b64good))? true : (btn.textContent===it.good);
  ok=btn.textContent===it.good;
  document.querySelectorAll('#ch .choice').forEach(function(b){b.onclick=null;
    if(b.textContent===it.good)b.classList.add('good');else if(b===btn&&!ok)b.classList.add('bad');else b.classList.add('dim');});
  setTimeout(function(){feedback(ok,it);},700);
}
function answerText(){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  var it=S.items[S.idx];var ans=(document.getElementById('ti')||{}).value||'';
  var ok=it.type==='exact'?checkExact(it,ans):checkCourt(it,ans);
  feedback(ok,it,false,ans);
}
function feedback(ok,it,wasTimeout,ans){
  gradeItem(it.key,ok);
  // historisation de la réponse pour le suivi de progression
  state.hist=state.hist||[];
  state.hist.push({d:Date.now(),mat:it.mat,chap:it.chap||'',ok:ok});
  if(state.hist.length>4000)state.hist=state.hist.slice(-4000);
  if(ok){S.correct++;S.combo++;S.maxcombo=Math.max(S.maxcombo,S.combo);
    var gain=10+Math.min(20,S.combo*2);S.xp+=gain;state.xp+=gain;
    if(S.combo>=3)showCombo('COMBO ×'+S.combo+' !');
  } else {S.combo=0;}
  save();
  var sol=it.good||it.sol||'';
  // explication : courte en QCM rapide, développée en maths/PC/analyse
  var isLong=(it.mat==='maths'||it.mat==='pc'||it.type==='court'||it.type==='exact');
  var expl=it.explain||'';
  // pour les "court", on ajoute aussi la solution rédigée complète
  var solBlock = sol?'<span class="sol">Réponse : '+esc(sol)+'</span>':'';
  var detailBlock = it.detail?'<span class="sol" style="font-weight:500">'+esc(it.detail)+'</span>':'';
  var explBlock = expl?'<span class="why">💡 '+esc(expl)+'</span>':'';
  var vidBlock = it.vid?'<a class="vidlink" href="'+it.vid+'" target="_blank" rel="noopener">🎬 Revoir en vidéo'+(it.vidlab?' : '+esc(it.vidlab):'')+'</a>':'';
  var fb='<div class="fb '+(ok?'ok':'bad')+'">'
    +'<b>'+(ok?'✅ Bravo !':(wasTimeout?'⏰ Trop tard !':'❌ Pas tout à fait.'))+'</b>'
    + solBlock + detailBlock + explBlock + vidBlock
    +'</div>';
  var card=document.querySelector('.qcard');if(card)card.insertAdjacentHTML('beforeend',fb);
  var w=document.querySelector('.wrap');
  w.insertAdjacentHTML('beforeend','<button class="primary" id="nextb">'+(S.idx+1>=S.items.length?'Voir mes résultats →':'Question suivante →')+'</button>');
  document.getElementById('nextb').onclick=function(){S.idx++;nextQuestion();};
}
function quitSession(){if(timerInt)clearInterval(timerInt);S=null;screenHub();}
function sessionResult(){

/* Phases : 1) énoncé + texte + minuteur de rédaction  2) "J'ai fini" -> grille  3) relecteur (parent)  4) reprise du fil */
var PAPER=null, paperInt=null;
function paperList(mat){return longFor(mat);}
function startPaper(mat,i,fromSession){
  var l=longFor(mat)[i];
  PAPER={mat:mat,i:i,l:l,fromSession:!!fromSession,minutes:(l.minutes||l.doc&&l.doc.minutes||12),started:0,elapsed:0};
  // minutes par type
  if(l.kind==='devcons')PAPER.minutes=15;
  else if(l.kind==='texte')PAPER.minutes=20;
  else if(l.kind==='dictee')PAPER.minutes=12;
  else if(l.kind==='svtdoc')PAPER.minutes=10;
  else if(l.kind==='doc')PAPER.minutes=15;
  paperIntro();
}
function paperIntro(){
  var l=PAPER.l, th=TH(PAPER.mat);
  var enonce='', texte='';
  if(l.kind==='devcons'){enonce=esc(l.consigne);}
  else if(l.kind==='texte'){var d=l.doc;texte='<div class="paper"><b>'+esc(d.titre)+'</b><div class="doc">'+d.corps.map(function(p){return '<p>'+esc(p)+'</p>';}).join('')+'</div><div class="aide">Texte original écrit pour l\'entraînement.</div></div>';enonce='Lis le texte, puis réponds aux '+d.questions.length+' questions (et la partie langue) sur ta feuille.';}
  else if(l.kind==='dictee'){var d=l.doc;enonce=esc(d.consigne)+' Fais-toi lire le texte par ton relecteur.';}
  else if(l.kind==='svtdoc'){var d=l.doc;texte='<div class="paper"><b>'+esc(d.titre)+'</b><p class="aide">'+esc(d.intro)+'</p><div class="doc">'+d.donnees.map(function(x){return '<p>• '+esc(x)+'</p>';}).join('')+'</div></div>';enonce=esc(d.question);}
  else if(l.kind==='doc'){var d=l.doc;texte='<div class="paper"><b>'+esc(d.titre)+'</b><p class="aide">'+esc(d.intro)+'</p><div class="doc">'+d.corps.map(function(p){return '<p>'+esc(p)+'</p>';}).join('')+'</div></div>';enonce='Réponds aux '+d.questions.length+' questions sur ta feuille (méthode NADI pour la 1re).';}
  app.innerHTML=hud()+'<div class="wrap">'
    +'<div class="hero" style="padding:18px 0 4px"><div style="font-size:36px">'+th.pic+'</div><h1 style="font-size:24px">'+esc(l.titre||'Sujet guidé')+'</h1>'
    +'<p>Mode papier guidé : on écrit à la main, en temps limité</p></div>'
    +'<div class="qcard"><div class="qtag">📝 ÉNONCÉ</div><div class="qbody" style="font-size:17px">'+enonce+'</div>'
    + texte
    +'<div class="grille" style="background:#EAF1FF;border-color:#2563EB"><b>Comment ça marche :</b><br>1. Prépare une feuille et un stylo.<br>2. Lance le minuteur ('+PAPER.minutes+' min) et rédige <b>sur papier</b>, sans écran.<br>3. Quand tu as fini (ou à la fin du temps), clique « J\'ai fini ».<br>4. Un parent ou un relecteur t\'aide à corriger avec la grille.</div>'
    +'<button class="primary" onclick="paperRun()">▶ Lancer le minuteur ('+PAPER.minutes+' min)</button>'
    +'<button class="ghost" onclick="paperSkipTimer()">Passer le minuteur (j\'ai déjà rédigé)</button>'
    +'</div>'
    +'<div class="backrow"><button class="ghost" onclick="'+(PAPER.fromSession?'paperBackToSession()':'screenMat(\''+PAPER.mat+'\')')+'">← Retour</button></div></div>'+tabbar('');
}
function paperRun(){
  PAPER.started=Date.now();
  var th=TH(PAPER.mat), total=PAPER.minutes*60;
  app.innerHTML=hud()+'<div class="wrap">'
    +'<div class="result" style="padding:24px 0 10px"><div style="font-size:40px">'+th.pic+'</div>'
    +'<h2 style="font-size:22px">'+esc(PAPER.l.titre||'Rédaction')+'</h2>'
    +'<p class="line">Rédige sur ta feuille. Garde le rythme, ne lâche pas le stylo.</p>'
    +'<div class="big" id="clock" style="font-size:54px">'+fmt(total)+'</div>'
    +'<div class="lvlbar" style="margin:14px 0"><div class="f" id="pf" style="width:100%"></div></div>'
    +'<p class="muted" id="phint">Conseil : commence par un brouillon rapide, puis rédige.</p>'
    +'</div>'
    +'<button class="primary" onclick="paperDone()">✅ J\'ai fini</button>'
    +'<button class="ghost" onclick="paperPauseToggle()" id="pp">⏸ Pause</button>'
    +'</div>'+tabbar('');
  var left=total, paused=false; PAPER._paused=false;
  if(paperInt)clearInterval(paperInt);
  paperInt=setInterval(function(){
    if(PAPER._paused)return;
    left--; var c=document.getElementById('clock'),pf=document.getElementById('pf'),ph=document.getElementById('phint');
    if(!c){clearInterval(paperInt);return;}
    c.textContent=fmt(left); pf.style.width=(left/total*100)+'%';
    if(left===Math.floor(total*0.5)&&ph)ph.textContent='Mi-temps : relis ta consigne, es-tu dans le sujet ?';
    if(left===60&&ph)ph.textContent='Dernière minute : termine ta phrase et conclus.';
    if(left<=0){clearInterval(paperInt);paperTimeUp();}
  },1000);
}

function paperPauseToggle(){PAPER._paused=!PAPER._paused;var b=document.getElementById('pp');if(b)b.textContent=PAPER._paused?'▶ Reprendre':'⏸ Pause';}
function paperTimeUp(){toast('⏰ Temps écoulé');showCombo('Temps !');paperDone();}
function paperSkipTimer(){PAPER.started=Date.now();paperDone();}
function paperDone(){
  if(paperInt){clearInterval(paperInt);paperInt=null;}
  var l=PAPER.l, th=TH(PAPER.mat);
  // grille de correction selon le type
  var grille='';
  if(l.kind==='devcons'){grille='<b>Ce qu\'on attend :</b>'+l.grille.map(function(g,k){return '<div style="margin-top:6px">'+(['Minimum','Solide','Niveau mention'][k]||'')+' : '+esc(g)+'</div>';}).join('');}
  else if(l.kind==='texte'){var d=l.doc;grille='<b>Repères par question :</b>'+d.questions.map(function(q,k){return '<div style="margin-top:6px">'+(k+1)+'. mots attendus : '+q.kw.join(', ')+' — 💡 '+esc(q.aide)+'</div>';}).join('')+'<div style="margin-top:10px"><b>Langue :</b></div>'+d.grammaire.map(function(g){return '<div style="margin-top:4px">• '+esc(g.sol)+'</div>';}).join('');}
  else if(l.kind==='dictee'){var d=l.doc;grille='<b>Texte de la dictée :</b><br>'+esc(d.texte)+'<br><br><b>Pièges à vérifier :</b><br>'+d.pieges.map(function(p){return '• '+esc(p);}).join('<br>');}
  else if(l.kind==='svtdoc'){var d=l.doc;grille='<b>Mots attendus :</b> '+d.kw.join(', ')+'<br>💡 '+esc(d.aide);}
  else if(l.kind==='doc'){var d=l.doc;grille='<b>Repères par question :</b>'+d.questions.map(function(q,k){return '<div style="margin-top:6px">'+(k+1)+'. mots attendus : '+q.kw.join(', ')+'</div>';}).join('');}
  app.innerHTML=hud()+'<div class="wrap">'
    +'<div class="hero" style="padding:18px 0 4px"><div style="font-size:34px">👀</div><h1 style="font-size:24px">Relecture</h1>'
    +'<p>Un parent ou un relecteur compare ta copie à la grille</p></div>'
    +'<div class="qcard"><div class="qtag">'+th.pic+' '+esc(l.titre||'')+'</div>'
    +'<div class="grille">'+grille+'</div>'
    +'<div style="margin-top:14px;font-weight:800">Avis du relecteur</div>'
    +'<p class="muted">À remplir avec l\'aide d\'un adulte si possible. Sois honnête, c\'est ce qui fait progresser.</p>'
    +'<textarea class="bigarea" id="reviewnote" placeholder="Remarques du relecteur (points forts, ce qui manque, 1 chose à améliorer)…" style="min-height:90px"></textarea>'
    +'<div style="margin-top:12px;font-weight:800">Niveau atteint</div>'
    +'<div class="selfscore">'
    +'<button class="ssbtn" onclick="paperGrade(this,0)">😕 À retravailler</button>'
    +'<button class="ssbtn" onclick="paperGrade(this,1)">🙂 Presque</button>'
    +'<button class="ssbtn" onclick="paperGrade(this,2)">💪 Réussi</button>'
    +'<button class="ssbtn" onclick="paperGrade(this,3)">🏆 Niveau mention</button>'
    +'</div>'
    +'<div id="papernext"></div>'
    +'</div></div>'+tabbar('');
}
function paperGrade(btn,lvl){
  document.querySelectorAll('.ssbtn').forEach(function(b){b.classList.remove('sel');});btn.classList.add('sel');
  var gain=[6,12,20,30][lvl];state.xp+=gain;
  // mémorise le sujet papier dans la révision espacée (clé dédiée)
  var key='paper_'+PAPER.mat+'_'+PAPER.i;gradeItem(key,lvl>=2);
  // garde la dernière remarque
  state.lastReview=state.lastReview||{};
  var note=(document.getElementById('reviewnote')||{}).value||'';
  state.lastReview[key]={lvl:lvl,note:note,date:todayStr()};save();
  var box=document.getElementById('paniernext')||document.getElementById('papernext')||document.getElementById('papernext');
  var cont=PAPER.fromSession
    ? '<button class="primary" onclick="paperBackToSession()">↩ Reprendre la session →</button>'
    : '<button class="primary" onclick="screenMat(\''+PAPER.mat+'\')">Continuer</button><button class="ghost" onclick="screenHub()">Accueil</button>';
  box.innerHTML='<div class="fb ok" style="margin-top:14px">+'+gain+' XP · '+(lvl>=2?'beau travail, c\'est ancré !':'noté, on y reviendra au bon moment grâce à la révision espacée')+'</div>'+cont;
}
function paperBackToSession(){ if(SESS){ SESS.idx++; runNeuro(); } else { screenMat(PAPER.mat); } }

/* ============ SESSION NEUROSCIENCES (Pomodoro + interleaving + récupération active) ============ */
/* Un parcours guidé : blocs courts de récupération active, alternance des matières,
   micro-pause toutes les ~2 manches, et un sujet papier minuté inséré. Basé sur :
   récupération active (effet test), répétition espacée, interleaving, Pomodoro. */
var SESS=null;
function startNeuro(){
  // construit un plan : on alterne les matières, priorité aux items "dus" (révision espacée)
  var mats=['histoire','geo','emc','maths','pc','svt'];
  // une "manche" = 6 questions d'une matière (active recall, timé)
  // plan : 4 manches en interleaving + 1 sujet papier + 2 manches
  var plan=[];
  var order=shuffle(mats);
  order.slice(0,3).forEach(function(m){plan.push({kind:'round',mat:m,n:6});});
  plan.push({kind:'break',sec:60});            // micro-pause
  // un sujet papier minuté si dispo
  var paperMat=['fr','histoire','svt'].filter(function(m){return longFor(m).length;})[0];
  if(paperMat)plan.push({kind:'paper',mat:paperMat,i:0});
  order.slice(3,5).forEach(function(m){plan.push({kind:'round',mat:m,n:6});});
  plan.push({kind:'done'});
  SESS={plan:plan,idx:0,xp:0,correct:0,total:0,t0:Date.now()};
  bumpStreak();
  runNeuro();
}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function runNeuro(){
  if(!SESS)return;
  if(SESS.idx>=SESS.plan.length){return neuroResult();}
  var step=SESS.plan[SESS.idx];
  if(step.kind==='done'){return neuroResult();}
  if(step.kind==='break'){return neuroBreak(step.sec);}
  if(step.kind==='paper'){ // lance le sujet papier en mode "fromSession"
    return startPaper(step.mat,step.i,true);
  }
  if(step.kind==='round'){ return neuroRound(step); }
}
// micro-pause guidée (Pomodoro)
function neuroBreak(sec){
  var th=TH('emc');
  app.innerHTML=hud()+'<div class="wrap"><div class="result" style="padding:40px 0 10px">'
    +'<div style="font-size:48px">🌿</div><h2>Micro-pause</h2>'
    +'<p class="line">Lève les yeux de l\'écran, respire, étire-toi.</p>'
    +'<p class="line">Le cerveau consolide ce que tu viens de réviser pendant la pause.</p>'
    +'<div class="big" id="bclock" style="font-size:50px">'+fmt(sec)+'</div></div>'
    +'<button class="primary" onclick="endBreak()">Je suis prêt, on continue →</button></div>'+tabbar('');
  var left=sec; if(window._bint)clearInterval(window._bint);
  window._bint=setInterval(function(){left--;var c=document.getElementById('bclock');if(!c){clearInterval(window._bint);return;}c.textContent=fmt(left);if(left<=0){clearInterval(window._bint);endBreak();}},1000);
}
function endBreak(){if(window._bint)clearInterval(window._bint);SESS.idx++;runNeuro();}
// une manche = mini-session timée de n questions (réutilise le moteur de session)
function neuroRound(step){
  var pool=buildPool(step.mat,'mix'); // priorité aux items dus, sinon tous
  if(!pool.length)pool=buildPool(step.mat,'qcm');
  if(!pool.length){SESS.idx++;return runNeuro();}
  S={mat:step.mat,mode:'neuro',items:pool.slice(0,step.n),idx:0,correct:0,combo:0,maxcombo:0,xp:0,t0:Date.now(),perQ:18,_neuro:true};
  nextQuestion();
}
// quand une manche neuro se termine, on revient au plan au lieu d'afficher l'écran de résultat
function neuroRoundEnd(){
  SESS.correct+=S.correct;SESS.total+=S.items.length;SESS.xp+=S.xp;
  S=null;SESS.idx++;
  // petit interstitiel d'encouragement entre les manches
  var msgs=['Manche terminée 💪','Belle série, on enchaîne 🔥','Tu avances bien 🚀','Le cerveau adore ça 🧠'];
  var m=msgs[Math.floor(Math.random()*msgs.length)];
  toast(m);
  runNeuro();
}
function neuroResult(){
  var pct=SESS.total?Math.round(SESS.correct/SESS.total*100):0;
  var mins=Math.round((Date.now()-SESS.t0)/60000);
  app.innerHTML=hud()+'<div class="wrap"><div class="result">'
    +'<div class="big">🎉</div><h2>Session terminée</h2>'
    +'<div class="line">'+SESS.correct+' / '+SESS.total+' bonnes réponses ('+pct+'%)</div>'
    +'<div class="line">+'+SESS.xp+' XP · '+mins+' min de concentration</div>'
    +'<div class="badge">🔁 Tu t\'es testé</div><div class="badge">🖇 Plusieurs matières</div><div class="badge">⏸ Avec une pause</div>'
    +'<p class="muted" style="margin-top:16px">Reviens demain : la répétition espacée te represente les bonnes questions au bon moment. La régularité bat les longues sessions.</p>'
    +'</div><button class="primary" onclick="startNeuro()">↻ Nouvelle session</button>'
    +'<button class="ghost" onclick="screenHub()">Retour à l\'accueil</button></div>'+tabbar('hub');
  SESS=null;
}

/* ============ PROGRÈS & AIDE ============ */
function screenProg(){
  var lp=levelProgress();
  var mats=['histoire','geo','emc','maths','pc','svt','fr'];
  var rows=mats.map(function(m){var th=TH(m);var items=itemsFor(m);var total=items.length||1;
    var mastered=items.filter(function(it){return (state.box[it.key]||{}).lvl>=3;}).length;
    return '<div class="mcard" style="--mc:'+th.c+';--mb:'+th.bg+';cursor:default"><div class="top"><span class="pic">'+th.pic+'</span><span class="nom">'+th.nom+'</span></div>'
      +'<div class="pg"><div class="f" style="width:'+Math.round(mastered/total*100)+'%"></div></div>'
      +'<div class="meta">'+mastered+' / '+items.length+' maîtrisées</div></div>';
  }).join('');
  // historique des instantanés sauvegardés
  var snaps=(state.snaps||[]).slice().reverse();
  var histHTML='';
  if(snaps.length){
    histHTML='<div class="section-title">Historique enregistré</div>'
      +'<p class="muted">Tes points de progression datés (bouton 💾 Sauvegarder sur l\'accueil).</p>'
      +'<div class="intro-card" style="padding:12px">'
      +snaps.map(function(s){return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)">'
        +'<span style="font-weight:700">'+esc(s.date)+'</span>'
        +'<span class="muted" style="margin:0">Niv. '+s.level+' · '+s.xp+' XP · '+s.global+'% du programme</span></div>';}).join('')
      +'</div>';
  }
  app.innerHTML=hud()+'<div class="wrap">'
    +'<div class="section-title">Ta progression</div>'
    +'<p class="muted">Niveau '+lp.l+' · '+state.xp+' XP · flamme '+(state.streakDays||0)+' jour(s) · '+(state.done||0)+' questions jouées</p>'
    +'<button class="primary" onclick="saveSnapshot();screenProg();" style="margin-bottom:8px">💾 Enregistrer un point de progression</button>'
    +'<div class="grid">'+rows+'</div>'
    + histHTML
    +'<button class="ghost" onclick="resetConfirm()" style="margin-top:18px">↺ Réinitialiser ma progression</button>'
    +'</div>'+tabbar('prog');
}

/* ============ PLANNING DE TRAVAIL RECOMMANDÉ ============ */
function screenPlan(){
  if(!DATA.plan||!DATA.plan.jours){app.innerHTML=hud()+'<div class="wrap"><p class="muted">Planning indisponible.</p></div>'+tabbar('');return;}
  var today=todayMission();var todayIdx=today?today.idx:-1;
  // bloc phases
  var phasesHTML=(DATA.plan.phases||[]).map(function(p){return '<div class="intro-card" style="padding:12px"><b>'+esc(p.nom)+'</b><p class="muted" style="margin:4px 0 0">'+esc(p.desc)+'</p></div>';}).join('');
  function blk(b){if(!b)return '';var key=matKeyFromLabel(b[0]);var th=key?TH(key):null;
    return '<div class="blk" style="cursor:default"><span class="e">'+(th?th.pic:'📘')+'</span><span><b>'+esc(b[0])+'</b><span>'+esc(b[1])+'</span></span></div>';}
  var jours=DATA.plan.jours.map(function(d,i){
    var isToday=(i===todayIdx);
    return '<div class="mission" style="'+(isToday?'border-left-color:#16A34A;box-shadow:0 0 0 2px #16A34A33':'')+'">'
      +'<div class="day" style="'+(isToday?'color:#16A34A':'')+'">'+(isToday?'➡ ':'')+esc(d.d)+(isToday?' · aujourd\'hui':'')+'</div>'
      + blk(d.b1) + blk(d.b2)
      +(d.note?'<div class="note">💡 '+esc(d.note)+'</div>':'')
      +'</div>';
  }).join('');
  // épreuves
  var epr=(DATA.plan.epreuves||[]).map(function(e){return '<div class="blk" style="background:var(--badbg);cursor:default"><span class="e">📝</span><span><b>'+esc(e[0])+' · '+esc(e[1])+'</b><span>'+esc(e[2]||'')+'</span></span></div>';}).join('');
  app.innerHTML=hud()+'<div class="wrap">'
    +'<div class="section-title">Planning de travail recommandé</div>'
    +'<p class="muted">Du 5 au 25 juin, deux petits blocs par jour : une matière littéraire, une scientifique. Rien d\'obligatoire, c\'est un fil conducteur pour ne rien oublier et avancer sans surcharge.</p>'
    + phasesHTML
    + jours
    +(epr?'<div class="section-title" style="font-size:18px">Les épreuves</div>'+epr:'')
    +'<div class="backrow"><button class="ghost" onclick="screenHub()">← Retour à l\'accueil</button></div>'
    +'</div>'+tabbar('');
}

/* ============ UTILS ============ */
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function b64(s){try{return btoa(unescape(encodeURIComponent(s)));}catch(e){return '';}}
function unb64(s){try{return decodeURIComponent(escape(atob(s)));}catch(e){return '';}}

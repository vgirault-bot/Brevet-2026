nt la sécurité intérieure au quotidien. On peut aussi citer les pompiers, qui protègent contre les incendies et les accidents.","mention":"Un État a pour mission essentielle de protéger ses citoyens : c'est l'une des raisons de son existence. Il doit donc assurer la défense et la sécurité.\n\nPourquoi ? Parce que la population, le territoire et les institutions peuvent être menacés de multiples façons : agressions venant de l'extérieur, terrorisme, cyberattaques, mais aussi délinquance, accidents ou catastrophes naturelles. Sans protection, la vie en société et le respect des lois seraient impossibles.\n\nQuels acteurs y participent ? L'armée assure la défense du territoire national face aux menaces extérieures et participe à des opérations de sécurité. La police et la gendarmerie assurent la sécurité intérieure au quotidien : elles font respecter la loi, protègent les personnes et les biens. On peut aussi citer les sapeurs-pompiers, qui interviennent lors des incendies, accidents et catastrophes.\n\nConclusion : l'État assure la défense et la sécurité pour protéger la population, le territoire et les institutions contre les menaces. L'armée, la police, la gendarmerie et les pompiers sont parmi les acteurs qui y contribuent, et chaque citoyen peut aussi s'engager pour la sécurité de tous."},{"consigne":"Question d'EMC (6 lignes). Comment un citoyen peut-il s'engager au service des autres ou de son pays ? Donne trois exemples d'engagement.","min":"S'engager dans une association (bénévolat), participer à la Journée défense et citoyenneté, devenir pompier volontaire, donner son sang, aider ses voisins, défendre une cause (environnement, solidarité).","solide":"Un citoyen peut s'engager de nombreuses façons au service des autres ou de son pays.\nExemple 1 : le bénévolat dans une association (aide aux personnes en difficulté, soutien scolaire, protection de l'environnement).\nExemple 2 : l'engagement pour la sécurité, par exemple en devenant sapeur-pompier volontaire, ou pour la solidarité en donnant son sang.\nExemple 3 : l'engagement citoyen lié à la défense, comme la Journée défense et citoyenneté, ou plus tard un engagement dans la réserve. S'engager, c'est participer activement à la vie de la société.","mention":"L'engagement est une dimension essentielle de la citoyenneté : un citoyen ne se contente pas de bénéficier de la protection de l'État, il peut aussi agir au service des autres et de son pays.\n\nPremier exemple : le bénévolat associatif. On peut s'engager dans une association pour aider les personnes en difficulté, faire du soutien scolaire, participer à des actions de solidarité ou protéger l'environnement. C'est une forme d'engagement accessible à tous.\n\nDeuxième exemple : l'engagement pour la sécurité et la solidarité. On peut devenir sapeur-pompier volontaire, secouriste, ou encore donner son sang : autant d'actions concrètes qui aident la collectivité et peuvent sauver des vies.\n\nTroisième exemple : l'engagement lié à la défense et à la citoyenneté. Les jeunes participent à la Journée défense et citoyenneté, et il est possible plus tard de rejoindre la réserve ou de servir le pays d'autres manières.\n\nConclusion : un citoyen peut s'engager par le bénévolat, par des actions au service de la sécurité et de la solidarité, ou par un engagement lié à la défense. Dans tous les cas, s'engager, c'est participer activement à la vie de la société et contribuer au bien commun."}],"parcours":{"mission":"À la fin, tu sais expliquer que la défense concerne tous les citoyens.","froid":[{"q":"Quel est le but de la défense nationale ?","rep":"Protéger population, territoire, institutions et intérêts."},{"q":"Cite un acteur de la sécurité civile.","rep":"Pompiers, secouristes, associations agréées (au choix)."},{"q":"Cite une menace contemporaine.","rep":"Terrorisme, cyberattaque, catastrophe, crise sanitaire (au choix)."},{"q":"La défense concerne-t-elle seulement les militaires ?","rep":"Non, elle concerne aussi les citoyens et la sécurité civile."},{"q":"Qu'est-ce que l'engagement citoyen ?","rep":"Une action volontaire au service de l'intérêt général."}],"coffre":[{"q":"La défense protège : ____, ____, ____","rep":"population, territoire, institutions (au choix)."},{"q":"La défense, ce n'est PAS seulement l'____","rep":"armée."},{"q":"Trois menaces contemporaines : ____, ____, ____","rep":"terrorisme, cyberattaque, catastrophe (au choix)."},{"q":"Formes d'engagement : ____, ____, ____","rep":"armée, réserve, association, bénévolat (au choix)."},{"q":"En cas de crise, le bon réflexe : s'informer auprès de sources ____","rep":"officielles."}],"frise":[],"oral":"Explique en 90 secondes pourquoi la cybersécurité fait partie de la défense.","ecrit":{"consigne":"Méthode EMC. Une cyberattaque touche ton collège. En 6 lignes : 1) l'enjeu, 2) les acteurs, 3) la conduite responsable.","min":"Enjeu + conduite.","solide":"Enjeu + acteurs + conduite responsable.","mention":"Élargit la défense à la cybersécurité et à la sécurité civile, conduite précise."},"oralRedige":"La défense et la sécurité de la France reposent à la fois sur l'État et sur l'engagement des citoyens. La défense nationale a pour mission de protéger le territoire, la population et les intérêts du pays ; elle ne se limite pas à l'armée, mais comprend aussi la sécurité civile, qui gère les catastrophes, et la cyberdéfense, qui protège contre les attaques informatiques. Les citoyens ont un rôle à jouer : à 16 ans, on doit se faire recenser, ce qui mène à la Journée défense et citoyenneté. Et au-delà, on peut s'engager de multiples façons : dans une association, comme bénévole, comme sapeur-pompier volontaire ou en service civique. La sécurité de tous dépend aussi de l'engagement de chacun.","ecritRedige":{"min":"La défense protège le territoire et la population de la France. Elle comprend l'armée, mais aussi la sécurité civile et la cyberdéfense. À 16 ans, on se fait recenser. On peut aussi s'engager comme bénévole ou pompier volontaire.","solide":"La défense et la sécurité de la France reposent sur l'État et sur l'engagement des citoyens. La défense nationale a pour mission de protéger le territoire, la population et les intérêts du pays. Elle comprend l'armée, mais aussi la sécurité civile, qui intervient lors des catastrophes, et la cyberdéfense, qui protège contre les attaques informatiques. Les citoyens participent : à 16 ans, le recensement est obligatoire et conduit à la Journée défense et citoyenneté. Au-delà, chacun peut s'engager de différentes manières : bénévolat associatif, service civique, sapeur-pompier volontaire. La sécurité de tous dépend donc aussi de l'engagement de chacun.","mention":"La défense et la sécurité de la France constituent une responsabilité partagée entre l'État et les citoyens. La défense nationale a pour mission de protéger le territoire, la population et les intérêts fondamentaux du pays. Elle ne se réduit pas à la dimension militaire incarnée par les armées : elle inclut aussi la sécurité civile, chargée de protéger les populations face aux risques et aux catastrophes, et la cyberdéfense, devenue essentielle pour protéger le pays contre les attaques informatiques. Cette défense s'inscrit dans des cadres plus larges, européen et international, notamment à travers l'OTAN et l'Union européenne. Mais la sécurité repose aussi sur l'implication des citoyens. Le parcours citoyen prévoit un recensement obligatoire à 16 ans, qui débouche sur la Journée défense et citoyenneté, étape de sensibilisation aux enjeux de défense. Au-delà de cette obligation, l'engagement peut prendre de nombreuses formes volontaires : bénévolat associatif, service civique, réserve, ou encore sapeur-pompier volontaire. Ainsi, la défense et la sécurité du pays dépendent à la fois des institutions et de l'engagement de chaque citoyen."},"carte":"Carte mémoire : « DÉFENSE », branches : armée / sécurité civile / cybersécurité / engagement.","motscles":"défense nationale, sécurité civile, réserve, cybersécurité, engagement, intérêt général.","vid":"https://www.lumni.fr/college/troisieme/enseignement-moral-et-civique","vidlab":"Lumni · EMC 3e (défense et sécurité)"}}],"mpc":[{"id":"M1","matiere":"maths","titre":"Calcul littéral : développer, réduire, factoriser","objectif":"À la fin, tu sais développer une expression, la réduire, et reconnaître les identités remarquables.","retiens":["Développer = enlever les parenthèses. Double distributivité : (a+b)(c+d) = ac + ad + bc + bd.","Identité utile : a² − b² = (a − b)(a + b).","Factoriser = écrire sous forme de produit. On cherche un facteur commun ou une identité."],"formules":["(a+b)(c+d) = ac + ad + bc + bd","a² − b² = (a − b)(a + b)"],"resolu":{"enonce":"Développer (2x + 3)(x − 5).","etapes":["J'applique la double distributivité : (2x)(x) + (2x)(−5) + (3)(x) + (3)(−5).","Je calcule chaque produit : 2x² − 10x + 3x − 15.","Je réduis les termes semblables : 2x² − 7x − 15."],"resultat":"2x² − 7x − 15"},"exact":[],"qcm":[{"q":"Développe et réduis (2x − 3)(x + 4).","good":"2x² + 5x − 12","choices":["2x² + 11x − 12","2x² + 5x − 12","2x² + 5x + 12","2x² − 5x − 12"],"explain":"(2x−3)(x+4) = 2x×x + 2x×4 − 3×x − 3×4 = 2x² + 8x − 3x − 12 = 2x² + 5x − 12. Attention aux signes : −3×4 = −12.","verif":"Revois la double distributivité et la règle des signes lors de la réduction."},{"q":"Développe (3x − 2)².","good":"9x² − 12x + 4","choices":["9x² + 4","6x² − 12x + 4","9x² − 6x + 4","9x² − 12x + 4"],"explain":"(a−b)² = a² − 2ab + b² avec a=3x et b=2 : (3x)² − 2×3x×2 + 2² = 9x² − 12x + 4. L'erreur classique est d'oublier le double produit −12x.","verif":"Apprends l'identité (a−b)² = a² − 2ab + b² et n'oublie jamais le double produit."},{"q":"Factorise 15x² + 10x.","good":"5x(3x + 2)","choices":["x(15x + 10)","5x(3x + 2x)","5(3x² + 2x)","5x(3x + 2)"],"explain":"Le facteur commun est 5x (5 divise 15 et 10 ; x est dans les deux termes). 15x² + 10x = 5x(3x + 2). Factoriser par 5 seul ou par x seul n'est pas complet.","verif":"Cherche toujours le plus grand facteur commun, sur les nombres ET sur les lettres."},{"q":"Factorise x² − 64.","good":"(x − 8)(x + 8)","choices":["(x − 8)(x − 8)","(x − 64)(x + 1)","(x − 8)²","(x − 8)(x + 8)"],"explain":"64 = 8², donc x² − 64 = x² − 8² = (x − 8)(x + 8) (différence de deux carrés). (x−8)² vaudrait x² − 16x + 64, ce qui est différent.","verif":"Reconnais la différence de deux carrés a² − b² = (a−b)(a+b)."}],"paper":{"consigne":"Exercice type brevet. On considère l'expression A = (2x + 3)² − 9. 1) Développe et réduis A. 2) Factorise A.","grille":["1) (2x + 3)² − 9 = 4x² + 12x + 9 − 9 = 4x² + 12x.\n2) A = 2x(2x + 6).","1) On développe (2x + 3)² avec l'identité (a + b)² = a² + 2ab + b², avec a = 2x et b = 3 :\n(2x + 3)² = (2x)² + 2 × 2x × 3 + 3² = 4x² + 12x + 9.\nDonc A = 4x² + 12x + 9 − 9 = 4x² + 12x.\n2) Dans 4x² + 12x, le facteur commun est 4x : A = 4x(x + 3).","1) Développement.\nOn reconnaît une identité remarquable du type (a + b)² = a² + 2ab + b², avec a = 2x et b = 3.\n(2x + 3)² = (2x)² + 2 × (2x) × 3 + 3² = 4x² + 12x + 9.\nDonc A = 4x² + 12x + 9 − 9 = 4x² + 12x.\n\n2) Factorisation.\nDans l'expression réduite 4x² + 12x, on cherche le facteur commun aux deux termes. 4x² = 4x × x et 12x = 4x × 3, donc le facteur commun est 4x.\nA = 4x(x + 3).\n\nRemarque : on peut aussi factoriser directement A = (2x + 3)² − 9 avec l'identité a² − b² = (a − b)(a + b), où a = 2x + 3 et b = 3 : A = (2x + 3 − 3)(2x + 3 + 3) = 2x(2x + 6) = 4x(x + 3). On retrouve bien le même résultat, ce qui valide les deux méthodes."],"type":"calcul","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"},"exos":[{"consigne":"Exercice type brevet. On considère l'expression A = (2x + 3)² − 9. 1) Développe et réduis A. 2) Factorise A.","min":"1) (2x + 3)² − 9 = 4x² + 12x + 9 − 9 = 4x² + 12x.\n2) A = 2x(2x + 6).","solide":"1) On développe (2x + 3)² avec l'identité (a + b)² = a² + 2ab + b², avec a = 2x et b = 3 :\n(2x + 3)² = (2x)² + 2 × 2x × 3 + 3² = 4x² + 12x + 9.\nDonc A = 4x² + 12x + 9 − 9 = 4x² + 12x.\n2) Dans 4x² + 12x, le facteur commun est 4x : A = 4x(x + 3).","mention":"1) Développement.\nOn reconnaît une identité remarquable du type (a + b)² = a² + 2ab + b², avec a = 2x et b = 3.\n(2x + 3)² = (2x)² + 2 × (2x) × 3 + 3² = 4x² + 12x + 9.\nDonc A = 4x² + 12x + 9 − 9 = 4x² + 12x.\n\n2) Factorisation.\nDans l'expression réduite 4x² + 12x, on cherche le facteur commun aux deux termes. 4x² = 4x × x et 12x = 4x × 3, donc le facteur commun est 4x.\nA = 4x(x + 3).\n\nRemarque : on peut aussi factoriser directement A = (2x + 3)² − 9 avec l'identité a² − b² = (a − b)(a + b), où a = 2x + 3 et b = 3 : A = (2x + 3 − 3)(2x + 3 + 3) = 2x(2x + 6) = 4x(x + 3). On retrouve bien le même résultat, ce qui valide les deux méthodes."},{"consigne":"Exercice type brevet. On considère B = (x − 5)(x + 2). 1) Développe et réduis B. 2) Calcule B pour x = 3.","min":"1) B = x² + 2x − 5x − 10 = x² − 3x − 10.\n2) B = 3² − 3×3 − 10 = 9 − 9 − 10 = −10.","solide":"1) On développe avec la double distributivité :\nB = (x − 5)(x + 2) = x×x + x×2 − 5×x − 5×2 = x² + 2x − 5x − 10.\nOn réduit : B = x² − 3x − 10.\n2) Pour x = 3 : B = 3² − 3×3 − 10 = 9 − 9 − 10 = −10.","mention":"1) Développement et réduction.\nOn utilise la double distributivité : (x − 5)(x + 2) = x×x + x×2 + (−5)×x + (−5)×2.\nCela donne x² + 2x − 5x − 10.\nOn réduit les termes en x : 2x − 5x = −3x.\nDonc B = x² − 3x − 10.\n\n2) Calcul pour x = 3.\nOn remplace x par 3 dans l'expression réduite :\nB = 3² − 3×3 − 10 = 9 − 9 − 10 = −10.\n\nConclusion : B = x² − 3x − 10, et pour x = 3, B = −10. On peut vérifier avec la forme factorisée : (3 − 5)(3 + 2) = (−2)×5 = −10, ce qui confirme le résultat."},{"consigne":"Exercice type brevet. Factorise les expressions suivantes : 1) C = 5x + 5×7. 2) D = x² − 49.","min":"1) C = 5(x + 7).\n2) D = x² − 7² = (x − 7)(x + 7).","solide":"1) On repère le facteur commun 5 : C = 5x + 35 = 5(x + 7).\n2) D = x² − 49 = x² − 7². C'est une différence de deux carrés, qui se factorise avec l'identité a² − b² = (a − b)(a + b). Ici a = x et b = 7, donc D = (x − 7)(x + 7).","mention":"1) Factorisation de C par facteur commun.\nC = 5x + 5×7. Les deux termes ont le facteur commun 5. On le met en facteur :\nC = 5(x + 7).\n\n2) Factorisation de D avec une identité remarquable.\nD = x² − 49. On reconnaît 49 = 7², donc D = x² − 7².\nC'est une différence de deux carrés, de la forme a² − b² = (a − b)(a + b), avec a = x et b = 7.\nDonc D = (x − 7)(x + 7).\n\nConclusion : C = 5(x + 7) et D = (x − 7)(x + 7). Pour vérifier D, on peut redévelopper : (x − 7)(x + 7) = x² + 7x − 7x − 49 = x² − 49, ce qui est bien l'expression de départ."}],"parcours":{"mission":"À la fin, tu sais développer une expression, la réduire, et reconnaître les identités remarquables.","froid":[{"q":"Développe : 3(x + 5).","rep":"3x + 15."},{"q":"Développe : (x + 2)(x + 4).","rep":"x² + 6x + 8."},{"q":"Réduis : 5x + 3 + 2x − 1.","rep":"7x + 2."},{"q":"Quelle est l'identité remarquable donnant (a + b)² ?","rep":"(a + b)² = a² + 2ab + b²."},{"q":"Factorise : 4x + 4·7, c'est-à-dire 4x + 28.","rep":"4(x + 7)."}],"coffre":[{"q":"Développer, c'est transformer un produit en une ____ (enlever les parenthèses).","rep":"Mot attendu : somme"},{"q":"Factoriser, c'est transformer une somme en un ____ (mettre en facteur commun).","rep":"Mot attendu : produit"},{"q":"(a + b)² = a² + 2ab + ____","rep":"Mot attendu : b²"},{"q":"(a − b)² = a² − 2ab + ____","rep":"Mot attendu : b²"},{"q":"(a + b)(a − b) = a² − ____","rep":"Mot attendu : b²"}],"frise":[],"oral":"Explique en 90 secondes la différence entre développer et factoriser, avec un exemple.","oralRedige":"En calcul littéral, deux opérations sont à bien distinguer : développer et factoriser, qui sont en fait inverses l'une de l'autre. Développer, c'est partir d'un produit, c'est-à-dire d'une expression avec des parenthèses, et le transformer en une somme en supprimant les parenthèses. Par exemple, 3 fois la parenthèse (x plus 5) donne 3x plus 15 : on a distribué le 3. Factoriser, c'est l'inverse : on part d'une somme et on la transforme en produit en repérant un facteur commun. Par exemple, dans 4x plus 28, le facteur commun est 4, donc on écrit 4 fois la parenthèse (x plus 7). Enfin, il faut connaître par cœur les trois identités remarquables, comme (a plus b) au carré qui égale a au carré plus 2ab plus b au carré : elles servent à développer ou factoriser plus vite.","ecrit":{"consigne":"Exercice type brevet. On considère l'expression A = (2x + 3)² − 9. 1) Développe et réduis A. 2) Factorise A.","min":"1) (2x + 3)² − 9 = 4x² + 12x + 9 − 9 = 4x² + 12x.\n2) A = 2x(2x + 6).","solide":"1) On développe (2x + 3)² avec l'identité (a + b)² = a² + 2ab + b², avec a = 2x et b = 3 :\n(2x + 3)² = (2x)² + 2 × 2x × 3 + 3² = 4x² + 12x + 9.\nDonc A = 4x² + 12x + 9 − 9 = 4x² + 12x.\n2) Dans 4x² + 12x, le facteur commun est 4x : A = 4x(x + 3).","mention":"1) Développement.\nOn reconnaît une identité remarquable du type (a + b)² = a² + 2ab + b², avec a = 2x et b = 3.\n(2x + 3)² = (2x)² + 2 × (2x) × 3 + 3² = 4x² + 12x + 9.\nDonc A = 4x² + 12x + 9 − 9 = 4x² + 12x.\n\n2) Factorisation.\nDans l'expression réduite 4x² + 12x, on cherche le facteur commun aux deux termes. 4x² = 4x × x et 12x = 4x × 3, donc le facteur commun est 4x.\nA = 4x(x + 3).\n\nRemarque : on peut aussi factoriser directement A = (2x + 3)² − 9 avec l'identité a² − b² = (a − b)(a + b), où a = 2x + 3 et b = 3 : A = (2x + 3 − 3)(2x + 3 + 3) = 2x(2x + 6) = 4x(x + 3). On retrouve bien le même résultat, ce qui valide les deux méthodes."},"ecritRedige":{"min":"1) (2x + 3)² − 9 = 4x² + 12x + 9 − 9 = 4x² + 12x.\n2) A = 2x(2x + 6).","solide":"1) On développe (2x + 3)² avec l'identité (a + b)² = a² + 2ab + b², avec a = 2x et b = 3 :\n(2x + 3)² = (2x)² + 2 × 2x × 3 + 3² = 4x² + 12x + 9.\nDonc A = 4x² + 12x + 9 − 9 = 4x² + 12x.\n2) Dans 4x² + 12x, le facteur commun est 4x : A = 4x(x + 3).","mention":"1) Développement.\nOn reconnaît une identité remarquable du type (a + b)² = a² + 2ab + b², avec a = 2x et b = 3.\n(2x + 3)² = (2x)² + 2 × (2x) × 3 + 3² = 4x² + 12x + 9.\nDonc A = 4x² + 12x + 9 − 9 = 4x² + 12x.\n\n2) Factorisation.\nDans l'expression réduite 4x² + 12x, on cherche le facteur commun aux deux termes. 4x² = 4x × x et 12x = 4x × 3, donc le facteur commun est 4x.\nA = 4x(x + 3).\n\nRemarque : on peut aussi factoriser directement A = (2x + 3)² − 9 avec l'identité a² − b² = (a − b)(a + b), où a = 2x + 3 et b = 3 : A = (2x + 3 − 3)(2x + 3 + 3) = 2x(2x + 6) = 4x(x + 3). On retrouve bien le même résultat, ce qui valide les deux méthodes."},"carte":"Carte mémoire : au centre « CALCUL LITTÉRAL », branches : développer (produit → somme), factoriser (somme → produit, facteur commun), les 3 identités remarquables.","motscles":"développer, réduire, factoriser, facteur commun, identité remarquable, (a+b)², (a−b)², a²−b²","vid":"https://www.lumni.fr/college/troisieme/mathematiques","vidlab":"Vidéo du chapitre"}},{"id":"M2","matiere":"maths","titre":"Équations du premier degré et équations-produits","objectif":"À la fin, tu sais résoudre une équation du premier degré et une équation-produit, et mettre un problème en équation.","retiens":["Résoudre une équation = trouver la valeur de x qui rend l'égalité vraie.","On fait passer les nombres d'un côté, les x de l'autre, en faisant la même opération des deux côtés.","Équation-produit : un produit est nul si et seulement si l'un des facteurs est nul."],"formules":["Si A × B = 0  alors  A = 0  OU  B = 0"],"resolu":{"enonce":"Résoudre 3x + 7 = 19.","etapes":["Je retire 7 des deux côtés : 3x = 19 − 7, donc 3x = 12.","Je divise les deux côtés par 3 : x = 12 ÷ 3.","Je vérifie : 3 × 4 + 7 = 19. C'est correct."],"resultat":"x = 4"},"exact":[],"qcm":[{"q":"Résous 5x − 7 = 2x + 8.","good":"x = 5","choices":["x = 5/7","x = 5","x = 1/3","x = 3"],"explain":"5x − 2x = 8 + 7, donc 3x = 15, donc x = 5. Erreur fréquente : se tromper de signe en déplaçant les termes.","verif":"Regroupe les x d'un côté, les nombres de l'autre, en changeant les signes."},{"q":"Quelles sont les solutions de (2x − 6)(x + 4) = 0 ?","good":"x = 3 ou x = −4","choices":["x = 6 ou x = −4","x = −3 ou x = 4","x = 3 ou x = 4","x = 3 ou x = −4"],"explain":"Un produit est nul si un facteur est nul. 2x−6=0 donne x=3 ; x+4=0 donne x=−4. Attention : 2x−6=0 ne donne pas x=6 mais x=3.","verif":"Annule chaque facteur séparément, puis résous chaque petite équation."},{"q":"Une équation-produit (x + 1)(3x − 9) = 0. Quelle solution est correcte ?","good":"x = 3","choices":["x = 3","x = −9","x = 1","x = 9"],"explain":"3x − 9 = 0 donne 3x = 9 donc x = 3 (l'autre solution est x = −1). Ne pas confondre la valeur qui annule le facteur avec le nombre lu directement.","verif":"Pour 3x − 9 = 0, divise par 3 après avoir isolé 3x."},{"q":"Résous l'équation 4(x − 2) = 2x + 6.","good":"x = 7","choices":["x = −7","x = 7","x = 1","x = 2"],"explain":"On développe : 4x − 8 = 2x + 6, donc 4x − 2x = 6 + 8, soit 2x = 14, donc x = 7. Erreur classique : oublier de distribuer le 4 sur le −2.","verif":"Développe d'abord les parenthèses, puis regroupe les termes."}],"paper":{"consigne":"Exercice type brevet. Résous l'équation suivante et vérifie ta solution : 5x − 3 = 2x + 9.","grille":["5x − 3 = 2x + 9\n5x − 2x = 9 + 3\n3x = 12\nx = 4.","On résout 5x − 3 = 2x + 9.\nOn regroupe les x à gauche et les nombres à droite :\n5x − 2x = 9 + 3\n3x = 12\nx = 12 ÷ 3 = 4.\nVérification : à gauche, 5 × 4 − 3 = 17 ; à droite, 2 × 4 + 9 = 17. Les deux côtés sont égaux, donc x = 4 est bien la solution.","On cherche à résoudre l'équation 5x − 3 = 2x + 9.\n\nÉtape 1 : on rassemble les termes en x d'un même côté. On soustrait 2x aux deux membres :\n5x − 2x − 3 = 9, soit 3x − 3 = 9.\n\nÉtape 2 : on isole le terme en x. On ajoute 3 aux deux membres :\n3x = 12.\n\nÉtape 3 : on divise les deux membres par 3 :\nx = 12 ÷ 3 = 4.\n\nVérification (indispensable au brevet) : on remplace x par 4 dans chaque membre de l'équation de départ. Membre de gauche : 5 × 4 − 3 = 20 − 3 = 17. Membre de droite : 2 × 4 + 9 = 8 + 9 = 17. Les deux membres sont égaux, donc la solution de l'équation est bien x = 4."],"type":"calcul","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"},"exos":[{"consigne":"Exercice type brevet. Un rectangle a une longueur qui dépasse sa largeur de 4 cm. Son périmètre est de 36 cm. 1) On note x la largeur. Exprime la longueur en fonction de x. 2) Écris une équation traduisant le périmètre. 3) Résous-la et donne les dimensions du rectangle.","min":"1) Longueur = x + 4. 2) Périmètre = 2(x + x + 4) = 36. 3) 2(2x + 4) = 36 → 4x + 8 = 36 → 4x = 28 → x = 7. Largeur 7 cm, longueur 11 cm.","solide":"1) La largeur est x, la longueur dépasse la largeur de 4 cm : longueur = x + 4.\n2) Le périmètre d'un rectangle est 2 × (longueur + largeur) = 2(x + 4 + x) = 2(2x + 4). On pose l'équation 2(2x + 4) = 36.\n3) 2(2x + 4) = 36 → 4x + 8 = 36 → 4x = 28 → x = 7. La largeur est 7 cm, la longueur 7 + 4 = 11 cm. Vérification : 2(7 + 11) = 2 × 18 = 36 cm.","mention":"1) Mise en équation.\nOn note x la largeur (en cm). La longueur dépasse la largeur de 4 cm, donc longueur = x + 4.\n\n2) Équation du périmètre.\nLe périmètre d'un rectangle vaut 2 × (longueur + largeur). Ici : 2 × ((x + 4) + x) = 2 × (2x + 4). Comme le périmètre est 36 cm, on obtient l'équation : 2(2x + 4) = 36.\n\n3) Résolution.\n2(2x + 4) = 36\n4x + 8 = 36 (on développe)\n4x = 28 (on retranche 8)\nx = 7 (on divise par 4).\nLa largeur est donc 7 cm et la longueur 7 + 4 = 11 cm.\n\nVérification : périmètre = 2 × (7 + 11) = 2 × 18 = 36 cm, ce qui correspond à l'énoncé. Les dimensions sont cohérentes (longueur > largeur)."},{"consigne":"Exercice type brevet. Résous l'équation 3x + 7 = 19 et vérifie ta solution.","min":"3x + 7 = 19 → 3x = 12 → x = 4. Vérification : 3×4 + 7 = 19. OK.","solide":"On isole le terme en x : 3x + 7 = 19, donc 3x = 19 − 7 = 12.\nOn divise par 3 : x = 12 ÷ 3 = 4.\nVérification : 3×4 + 7 = 12 + 7 = 19. C'est bien égal au membre de droite, donc x = 4 est la solution.","mention":"On résout l'équation 3x + 7 = 19.\n\nÉtape 1 : on regroupe les nombres d'un côté. On retranche 7 aux deux membres :\n3x = 19 − 7, soit 3x = 12.\n\nÉtape 2 : on isole x en divisant les deux membres par 3 :\nx = 12 ÷ 3 = 4.\n\nÉtape 3 : vérification. On remplace x par 4 dans l'équation de départ :\n3×4 + 7 = 12 + 7 = 19, ce qui correspond bien au membre de droite.\n\nConclusion : la solution de l'équation est x = 4."},{"consigne":"Exercice type brevet. Résous l'équation-produit (x − 2)(2x + 6) = 0.","min":"Un produit est nul si l'un des facteurs est nul. x − 2 = 0 → x = 2 ; 2x + 6 = 0 → x = −3. Solutions : 2 et −3.","solide":"Un produit de facteurs est nul si et seulement si l'un au moins des facteurs est nul. On résout donc séparément :\nx − 2 = 0, soit x = 2.\n2x + 6 = 0, soit 2x = −6, donc x = −3.\nL'équation a deux solutions : x = 2 et x = −3.","mention":"On résout l'équation-produit (x − 2)(2x + 6) = 0.\n\nOn utilise la propriété fondamentale : un produit de facteurs est nul si et seulement si l'un au moins de ses facteurs est nul. On annule donc chaque facteur.\n\nPremier facteur : x − 2 = 0, ce qui donne x = 2.\nSecond facteur : 2x + 6 = 0, soit 2x = −6, donc x = −3.\n\nConclusion : l'équation admet deux solutions, x = 2 et x = −3. Vérification rapide : pour x = 2, le premier facteur vaut 0 ; pour x = −3, le second vaut 2×(−3) + 6 = 0. Le produit est bien nul dans les deux cas."}],"parcours":{"mission":"À la fin, tu sais résoudre une équation du premier degré et une équation-produit, et mettre un problème en équation.","froid":[{"q":"Résous : x + 7 = 12.","rep":"x = 5."},{"q":"Résous : 3x = 21.","rep":"x = 7."},{"q":"Résous : 2x + 1 = 9.","rep":"x = 4."},{"q":"Une équation-produit A × B = 0 est vraie quand…","rep":"… l'un au moins des facteurs est nul : A = 0 ou B = 0."},{"q":"Vérifie si x = 3 est solution de 2x − 1 = 5.","rep":"2 × 3 − 1 = 5, donc oui, x = 3 est solution."}],"coffre":[{"q":"Résoudre une équation, c'est trouver la (ou les) ____ qui rendent l'égalité vraie.","rep":"Mot attendu : valeur(s)"},{"q":"Pour isoler x, on fait la même opération des ____ côtés de l'égalité.","rep":"Mot attendu : deux"},{"q":"Un produit de facteurs est nul si, et seulement si, l'un de ses ____ est nul.","rep":"Mot attendu : facteurs"},{"q":"Pour vérifier une solution, on la ____ dans l'équation de départ.","rep":"Mot attendu : remplace"},{"q":"Mettre un problème en équation : on choisit une ____ (souvent x) pour l'inconnue.","rep":"Mot attendu : lettre"}],"frise":[],"oral":"Explique en 90 secondes comment résoudre une équation du premier degré, avec un exemple.","oralRedige":"Résoudre une équation, c'est trouver la valeur de l'inconnue, qu'on appelle souvent x, qui rend l'égalité vraie. La méthode pour une équation du premier degré est toujours la même : on isole le x. Prenons 2x plus 1 égale 9. D'abord, je fais disparaître le terme sans x : je soustrais 1 des deux côtés, ce qui donne 2x égale 8. Ensuite, je divise par 2 des deux côtés, et j'obtiens x égale 4. Le principe d'or, c'est qu'on fait toujours la même opération des deux côtés de l'égalité pour ne pas la déséquilibrer. Pour une équation-produit, comme (x moins 2) fois (x plus 5) égale 0, on utilise une règle particulière : un produit est nul seulement si l'un des facteurs est nul. Donc soit x moins 2 égale 0, soit x plus 5 égale 0, ce qui donne deux solutions : 2 et moins 5. Enfin, on peut toujours vérifier en remplaçant x par la solution trouvée.","ecrit":{"consigne":"Exercice type brevet. Résous l'équation suivante et vérifie ta solution : 5x − 3 = 2x + 9.","min":"5x − 3 = 2x + 9\n5x − 2x = 9 + 3\n3x = 12\nx = 4.","solide":"On résout 5x − 3 = 2x + 9.\nOn regroupe les x à gauche et les nombres à droite :\n5x − 2x = 9 + 3\n3x = 12\nx = 12 ÷ 3 = 4.\nVérification : à gauche, 5 × 4 − 3 = 17 ; à droite, 2 × 4 + 9 = 17. Les deux côtés sont égaux, donc x = 4 est bien la solution.","mention":"On cherche à résoudre l'équation 5x − 3 = 2x + 9.\n\nÉtape 1 : on rassemble les termes en x d'un même côté. On soustrait 2x aux deux membres :\n5x − 2x − 3 = 9, soit 3x − 3 = 9.\n\nÉtape 2 : on isole le terme en x. On ajoute 3 aux deux membres :\n3x = 12.\n\nÉtape 3 : on divise les deux membres par 3 :\nx = 12 ÷ 3 = 4.\n\nVérification (indispensable au brevet) : on remplace x par 4 dans chaque membre de l'équation de départ. Membre de gauche : 5 × 4 − 3 = 20 − 3 = 17. Membre de droite : 2 × 4 + 9 = 8 + 9 = 17. Les deux membres sont égaux, donc la solution de l'équation est bien x = 4."},"ecritRedige":{"min":"5x − 3 = 2x + 9\n5x − 2x = 9 + 3\n3x = 12\nx = 4.","solide":"On résout 5x − 3 = 2x + 9.\nOn regroupe les x à gauche et les nombres à droite :\n5x − 2x = 9 + 3\n3x = 12\nx = 12 ÷ 3 = 4.\nVérification : à gauche, 5 × 4 − 3 = 17 ; à droite, 2 × 4 + 9 = 17. Les deux côtés sont égaux, donc x = 4 est bien la solution.","mention":"On cherche à résoudre l'équation 5x − 3 = 2x + 9.\n\nÉtape 1 : on rassemble les termes en x d'un même côté. On soustrait 2x aux deux membres :\n5x − 2x − 3 = 9, soit 3x − 3 = 9.\n\nÉtape 2 : on isole le terme en x. On ajoute 3 aux deux membres :\n3x = 12.\n\nÉtape 3 : on divise les deux membres par 3 :\nx = 12 ÷ 3 = 4.\n\nVérification (indispensable au brevet) : on remplace x par 4 dans chaque membre de l'équation de départ. Membre de gauche : 5 × 4 − 3 = 20 − 3 = 17. Membre de droite : 2 × 4 + 9 = 8 + 9 = 17. Les deux membres sont égaux, donc la solution de l'équation est bien x = 4."},"carte":"Carte mémoire : au centre « ÉQUATIONS », branches : isoler x (même opération des 2 côtés), équation-produit (un facteur nul), vérifier en remplaçant, mise en équation d'un problème.","motscles":"équation, inconnue, solution, isoler x, même opération des deux côtés, équation-produit, produit nul, vérification, mise en équation","vid":"https://www.lumni.fr/college/troisieme/mathematiques","vidlab":"Vidéo du chapitre"}},{"id":"M3","matiere":"maths","titre":"Le théorème de Pythagore","objectif":"À la fin, tu sais utiliser Pythagore pour calculer une longueur, et sa réciproque pour prouver qu'un triangle est rectangle.","retiens":["Le théorème de Pythagore s'utilise UNIQUEMENT dans un triangle rectangle.","Le côté le plus long, opposé à l'angle droit, s'appelle l'hypoténuse.","La réciproque sert à PROUVER qu'un triangle est rectangle : si le carré du plus grand côté = somme des carrés des deux autres, alors le triangle est rectangle."],"formules":["Dans un triangle rectangle : hypoténuse² = côté1² + côté2²","Réciproque : si c² = a² + b², le triangle est rectangle"],"resolu":{"enonce":"Un triangle rectangle a deux côtés de l'angle droit qui mesurent 3 cm et 4 cm. Calculer l'hypoténuse.","etapes":["Le triangle est rectangle, j'applique Pythagore : hyp² = 3² + 4².","Je calcule : hyp² = 9 + 16 = 25.","Je prends la racine carrée : hyp = √25 = 5."],"resultat":"hypoténuse = 5 cm"},"exact":[],"qcm":[{"q":"ABC est rectangle en A, AB = 9 cm et AC = 12 cm. Combien mesure l'hypoténuse BC ?","good":"15 cm","choices":["225 cm","√21 cm","15 cm","21 cm"],"explain":"BC² = AB² + AC² = 9² + 12² = 81 + 144 = 225, donc BC = √225 = 15 cm. Erreur fréquente : faire 9+12=21 sans passer par les carrés, ou oublier la racine.","verif":"BC² = somme des carrés, puis prends la racine carrée pour BC."},{"q":"Un triangle a pour côtés 6 cm, 8 cm et 11 cm. Est-il rectangle ?","good":"Non, car 6² + 8² ≠ 11²","choices":["Non, car 6² + 8² ≠ 11²","On ne peut pas savoir","Oui, car 6² + 8² = 11²","Oui, car 6 + 8 > 11"],"explain":"On compare le carré du plus grand côté à la somme des carrés des autres : 11² = 121 ; 6² + 8² = 36 + 64 = 100. Comme 121 ≠ 100, le triangle n'est PAS rectangle.","verif":"Calcule séparément les deux membres et compare ; l'égalité prouve l'angle droit."},{"q":"Dans un triangle rectangle, un côté de l'angle droit mesure 5 cm et l'hypoténuse 13 cm. Quelle est la longueur de l'autre côté ?","good":"12 cm","choices":["12 cm","√194 cm","8 cm","18 cm"],"explain":"On cherche un côté de l'angle droit : côté² = 13² − 5² = 169 − 25 = 144, donc côté = 12 cm. Erreur : additionner au lieu de soustraire.","verif":"Quand on cherche un côté de l'angle droit, on SOUSTRAIT les carrés."},{"q":"BC² = 49 cm². Combien mesure BC ?","good":"7 cm","choices":["24,5 cm","7 cm","2401 cm","√49 reste à calculer"],"explain":"BC = √49 = 7 cm. Erreur fréquente : diviser par 2 (donnerait 24,5) au lieu de prendre la racine carrée.","verif":"Pour passer de BC² à BC, on prend la racine carrée, pas la moitié."}],"paper":{"consigne":"Exercice type brevet. ABC est un triangle rectangle en A, avec AB = 3 cm et AC = 4 cm. Calcule la longueur de l'hypoténuse BC.","grille":["BC² = AB² + AC² = 3² + 4² = 9 + 16 = 25.\nBC = √25 = 5 cm.","Le triangle ABC est rectangle en A, donc d'après le théorème de Pythagore :\nBC² = AB² + AC².\nBC² = 3² + 4² = 9 + 16 = 25.\nDonc BC = √25 = 5.\nL'hypoténuse BC mesure 5 cm.","Le triangle ABC est rectangle en A. L'hypoténuse, côté opposé à l'angle droit, est donc [BC].\n\nD'après le théorème de Pythagore appliqué au triangle ABC rectangle en A :\nBC² = AB² + AC².\n\nOn remplace par les valeurs connues :\nBC² = 3² + 4² = 9 + 16 = 25.\n\nLa longueur BC est positive, on prend donc la racine carrée :\nBC = √25 = 5.\n\nConclusion : l'hypoténuse [BC] mesure 5 cm. (On reconnaît ici le triangle « 3-4-5 », un triangle rectangle classique.)"],"type":"calcul","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"},"exos":[{"consigne":"Exercice type brevet. Un triangle ABC a pour côtés AB = 6 cm, AC = 8 cm et BC = 10 cm. 1) Démontre que le triangle ABC est rectangle et précise en quel sommet. 2) Un point D est tel que le triangle ACD est rectangle en C, avec CD = 15 cm. Calcule AD.","min":"1) BC² = 100 ; AB² + AC² = 36 + 64 = 100. Égalité → rectangle en A. 2) AD² = AC² + CD² = 64 + 225 = 289 → AD = 17 cm.","solide":"1) Le plus grand côté est BC = 10. On compare : BC² = 100 ; AB² + AC² = 6² + 8² = 36 + 64 = 100. Comme BC² = AB² + AC², d'après la réciproque de Pythagore, ABC est rectangle, et l'angle droit est opposé à BC, donc en A.\n2) Le triangle ACD est rectangle en C, donc AD est l'hypoténuse : AD² = AC² + CD² = 8² + 15² = 64 + 225 = 289, donc AD = √289 = 17 cm.","mention":"1) Démonstration avec la réciproque de Pythagore.\nLe plus grand côté est BC = 10 cm. On calcule séparément :\nBC² = 10² = 100.\nAB² + AC² = 6² + 8² = 36 + 64 = 100.\nOn constate l'égalité BC² = AB² + AC². D'après la réciproque du théorème de Pythagore, le triangle ABC est donc rectangle. L'angle droit se situe face au plus grand côté BC, c'est-à-dire au sommet A.\n\n2) Calcul de AD avec le théorème de Pythagore.\nLe triangle ACD est rectangle en C, donc son hypoténuse est AD (côté opposé à l'angle droit). Le théorème de Pythagore donne :\nAD² = AC² + CD² = 8² + 15² = 64 + 225 = 289.\nDonc AD = √289 = 17 cm.\n\nConclusion : ABC est rectangle en A, et AD = 17 cm. On reconnaît au passage deux triplets de Pythagore connus : (6 ; 8 ; 10) et (8 ; 15 ; 17)."},{"consigne":"Exercice type brevet. Un triangle DEF est rectangle en D, avec DE = 6 cm et DF = 8 cm. Calcule la longueur de l'hypoténuse EF.","min":"EF² = DE² + DF² = 6² + 8² = 36 + 64 = 100. EF = √100 = 10 cm.","solide":"Le triangle DEF est rectangle en D, donc l'hypoténuse est EF (côté opposé à l'angle droit). D'après le théorème de Pythagore :\nEF² = DE² + DF² = 6² + 8² = 36 + 64 = 100.\nDonc EF = √100 = 10 cm.","mention":"Le triangle DEF est rectangle en D. L'angle droit est en D, donc l'hypoténuse, qui est le côté opposé à l'angle droit, est le côté EF.\n\nD'après le théorème de Pythagore, dans un triangle rectangle, le carré de l'hypoténuse est égal à la somme des carrés des deux autres côtés :\nEF² = DE² + DF².\n\nApplication numérique :\nEF² = 6² + 8² = 36 + 64 = 100.\n\nOn en déduit la longueur en prenant la racine carrée :\nEF = √100 = 10 cm.\n\nConclusion : l'hypoténuse EF mesure 10 cm. Vérification de cohérence : l'hypoténuse (10 cm) est bien le plus grand côté du triangle, ce qui est toujours le cas dans un triangle rectangle."},{"consigne":"Exercice type brevet. Un triangle a pour côtés 5 cm, 12 cm et 13 cm. Démontre qu'il est rectangle.","min":"On compare 13² avec 5² + 12². 13² = 169 ; 5² + 12² = 25 + 144 = 169. Égalité → le triangle est rectangle (réciproque de Pythagore).","solide":"On utilise la réciproque du théorème de Pythagore. On compare le carré du plus grand côté à la somme des carrés des deux autres.\nPlus grand côté : 13, donc 13² = 169.\nSomme des carrés des deux autres : 5² + 12² = 25 + 144 = 169.\nLes deux résultats sont égaux, donc le triangle est rectangle (l'angle droit est opposé au côté de 13 cm).","mention":"Pour démontrer qu'un triangle est rectangle à partir de ses longueurs, on utilise la réciproque du théorème de Pythagore. Elle dit que si le carré du plus grand côté est égal à la somme des carrés des deux autres côtés, alors le triangle est rectangle.\n\nLe plus grand côté mesure 13 cm. On calcule séparément les deux membres à comparer.\nCarré du plus grand côté : 13² = 169.\nSomme des carrés des deux autres côtés : 5² + 12² = 25 + 144 = 169.\n\nOn constate que 13² = 5² + 12² (169 = 169). L'égalité de Pythagore est donc vérifiée.\n\nConclusion : d'après la réciproque du théorème de Pythagore, le triangle est rectangle. L'angle droit se situe face au plus grand côté, donc face au côté de 13 cm."}],"parcours":{"mission":"À la fin, tu sais utiliser Pythagore pour calculer une longueur, et sa réciproque pour prouver qu'un triangle est rectangle.","froid":[{"q":"Le théorème de Pythagore s'applique uniquement dans quel type de triangle ?","rep":"Un triangle rectangle."},{"q":"Comment s'appelle le côté le plus long d'un triangle rectangle, opposé à l'angle droit ?","rep":"L'hypoténuse."},{"q":"Énonce le théorème de Pythagore dans un triangle ABC rectangle en A.","rep":"BC² = AB² + AC² (le carré de l'hypoténuse est égal à la somme des carrés des deux autres côtés)."},{"q":"À quoi sert la réciproque du théorème de Pythagore ?","rep":"À prouver qu'un triangle est rectangle (ou non)."},{"q":"Combien vaut √49 ?","rep":"7."}],"coffre":[{"q":"Le théorème de Pythagore ne s'applique que dans un triangle ____.","rep":"Mot attendu : rectangle"},{"q":"L'hypoténuse est le côté opposé à l'angle ____.","rep":"Mot attendu : droit"},{"q":"Dans un triangle rectangle, le carré de l'____ égale la somme des carrés des deux autres côtés.","rep":"Mot attendu : hypoténuse"},{"q":"La ____ du théorème de Pythagore permet de prouver qu'un triangle est rectangle.","rep":"Mot attendu : réciproque"},{"q":"Pour trouver une longueur, après avoir calculé son carré, on prend la ____ carrée.","rep":"Mot attendu : racine"}],"frise":[],"oral":"Explique en 90 secondes le théorème de Pythagore et à quoi il sert.","oralRedige":"Le théorème de Pythagore est un outil essentiel de géométrie, mais attention : il ne fonctionne que dans un triangle rectangle, c'est-à-dire un triangle qui possède un angle droit. Dans un tel triangle, le côté le plus long, celui qui est en face de l'angle droit, s'appelle l'hypoténuse. Le théorème dit ceci : le carré de l'hypoténuse est égal à la somme des carrés des deux autres côtés. Par exemple, dans un triangle rectangle en A, on écrit BC au carré égale AB au carré plus AC au carré. Ça sert principalement à calculer une longueur quand on connaît les deux autres. On calcule d'abord le carré cherché, puis on prend la racine carrée. Il existe aussi la réciproque, qui sert à l'inverse : si on connaît les trois côtés, elle permet de prouver qu'un triangle est rectangle, ou de montrer qu'il ne l'est pas.","ecrit":{"consigne":"Exercice type brevet. ABC est un triangle rectangle en A, avec AB = 3 cm et AC = 4 cm. Calcule la longueur de l'hypoténuse BC.","min":"BC² = AB² + AC² = 3² + 4² = 9 + 16 = 25.\nBC = √25 = 5 cm.","solide":"Le triangle ABC est rectangle en A, donc d'après le théorème de Pythagore :\nBC² = AB² + AC².\nBC² = 3² + 4² = 9 + 16 = 25.\nDonc BC = √25 = 5.\nL'hypoténuse BC mesure 5 cm.","mention":"Le triangle ABC est rectangle en A. L'hypoténuse, côté opposé à l'angle droit, est donc [BC].\n\nD'après le théorème de Pythagore appliqué au triangle ABC rectangle en A :\nBC² = AB² + AC².\n\nOn remplace par les valeurs connues :\nBC² = 3² + 4² = 9 + 16 = 25.\n\nLa longueur BC est positive, on prend donc la racine carrée :\nBC = √25 = 5.\n\nConclusion : l'hypoténuse [BC] mesure 5 cm. (On reconnaît ici le triangle « 3-4-5 », un triangle rectangle classique.)"},"ecritRedige":{"min":"BC² = AB² + AC² = 3² + 4² = 9 + 16 = 25.\nBC = √25 = 5 cm.","solide":"Le triangle ABC est rectangle en A, donc d'après le théorème de Pythagore :\nBC² = AB² + AC².\nBC² = 3² + 4² = 9 + 16 = 25.\nDonc BC = √25 = 5.\nL'hypoténuse BC mesure 5 cm.","mention":"Le triangle ABC est rectangle en A. L'hypoténuse, côté opposé à l'angle droit, est donc [BC].\n\nD'après le théorème de Pythagore appliqué au triangle ABC rectangle en A :\nBC² = AB² + AC².\n\nOn remplace par les valeurs connues :\nBC² = 3² + 4² = 9 + 16 = 25.\n\nLa longueur BC est positive, on prend donc la racine carrée :\nBC = √25 = 5.\n\nConclusion : l'hypoténuse [BC] mesure 5 cm. (On reconnaît ici le triangle « 3-4-5 », un triangle rectangle classique.)"},"carte":"Carte mémoire : au centre « PYTHAGORE », branches : triangle rectangle seulement, hypoténuse (face à l'angle droit), formule BC²=AB²+AC², réciproque (prouver rectangle), racine carrée.","motscles":"triangle rectangle, hypoténuse, angle droit, Pythagore, carré, racine carrée, réciproque, démontrer rectangle","vid":"https://www.lumni.fr/college/troisieme/mathematiques","vidlab":"Vidéo du chapitre"}},{"id":"M4","matiere":"maths","titre":"Le théorème de Thalès","objectif":"À la fin, tu sais utiliser le théorème de Thalès pour calculer une longueur dans une configuration de droites parallèles.","retiens":["Le théorème de Thalès s'utilise dans une configuration de droites parallèles coupant deux droites sécantes (figure en « papillon » ou en « triangle »).","Il donne une égalité de trois rapports de longueurs.","Pour trouver une longueur inconnue, on utilise le produit en croix."],"formules":["Si (MN) ∥ (BC) :  AM/AB = AN/AC = MN/BC","Produit en croix : a/b = c/d  ⟺  a × d = b × c"],"resolu":{"enonce":"Dans une configuration de Thalès, AM = 3 cm, AB = 5 cm, AN = 4,2 cm. Calculer AC.","etapes":["J'écris l'égalité de Thalès : AM/AB = AN/AC, soit 3/5 = 4,2/AC.","Produit en croix : 3 × AC = 5 × 4,2 = 21.","Je divise par 3 : AC = 21 ÷ 3 = 7."],"resultat":"AC = 7 cm"},"exact":[],"qcm":[{"q":"(MN)//(BC). A, M, B alignés et A, N, C alignés. AM = 3, AB = 9, AN = 4. Combien vaut AC ?","good":"12","choices":["10","12","6","1,33"],"explain":"Thalès : AM/AB = AN/AC, soit 3/9 = 4/AC, donc AC = (4×9)/3 = 12. Le rapport est 3/9 = 1/3, donc AC = 3×AN.","verif":"Écris l'égalité des rapports, puis utilise le produit en croix."},{"q":"Dans une configuration de Thalès, AM = 2, AB = 6, MN = 5. Combien vaut BC (avec (MN)//(BC)) ?","good":"15","choices":["10","1,67","15","7,5"],"explain":"AM/AB = MN/BC, soit 2/6 = 5/BC, donc BC = (5×6)/2 = 15. Erreur : inverser le rapport et trouver 5/3 ≈ 1,67.","verif":"Place MN et BC du même côté de l'égalité, puis produit en croix."},{"q":"Le rapport de réduction dans une configuration de Thalès est AM/AB = 2/5. Si MN = 4 cm, combien mesure BC ?","good":"10 cm","choices":["20 cm","10 cm","6,5 cm","1,6 cm"],"explain":"MN/BC = 2/5 donc BC = MN × 5/2 = 4 × 2,5 = 10 cm. MN est le côté réduit, BC le plus grand : BC > MN.","verif":"Le côté du grand triangle est plus long ; multiplie par l'inverse du rapport."},{"q":"On veut montrer que deux droites sont parallèles. Quelle égalité de Thalès faut-il vérifier ?","good":"AM/AB = AN/AC (rapports égaux)","choices":["AM + AB = AN + AC","AM/AB = AN/AC (rapports égaux)","AM × AB = AN × AC","AM/AN = AB/AC seulement"],"explain":"La réciproque de Thalès : si AM/AB = AN/AC (points dans le même ordre), alors (MN)//(BC). Ce sont des rapports égaux, pas des sommes ni des produits.","verif":"Réciproque de Thalès : on vérifie l'égalité de deux rapports, alignement dans le même ordre."}],"paper":{"consigne":"Exercice type brevet. Les droites (BC) et (DE) sont parallèles. A, B, D sont alignés et A, C, E sont alignés. On donne AB = 4 cm, AD = 6 cm et AC = 3 cm. Calcule AE.","grille":["D'après Thalès : AB/AD = AC/AE.\n4/6 = 3/AE\nAE = (3 × 6)/4 = 18/4 = 4,5 cm.","Les droites (BC) et (DE) sont parallèles, donc d'après le théorème de Thalès :\nAB/AD = AC/AE.\nOn remplace : 4/6 = 3/AE.\nPar produit en croix : 4 × AE = 6 × 3, soit 4 × AE = 18.\nDonc AE = 18 ÷ 4 = 4,5.\nAE mesure 4,5 cm.","Les points A, B, D sont alignés, les points A, C, E sont alignés, et les droites (BC) et (DE) sont parallèles. Les conditions du théorème de Thalès sont donc réunies.\n\nD'après le théorème de Thalès, les rapports des longueurs sont égaux :\nAB/AD = AC/AE = BC/DE.\n\nOn n'utilise que les deux rapports utiles ici :\nAB/AD = AC/AE, c'est-à-dire 4/6 = 3/AE.\n\nOn résout par produit en croix :\n4 × AE = 6 × 3\n4 × AE = 18\nAE = 18 ÷ 4 = 4,5.\n\nConclusion : AE = 4,5 cm. On vérifie la cohérence : AD (6) est plus grand que AB (4), donc AE doit être plus grand que AC (3), ce qui est bien le cas."],"type":"calcul","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"},"exos":[{"consigne":"Exercice type brevet. Sur une figure, les points A, M, B sont alignés et A, N, C sont alignés. On donne AM = 3 cm, AB = 7,5 cm, AN = 4 cm, AC = 10 cm. 1) Les droites (MN) et (BC) sont-elles parallèles ? Justifie par un calcul. 2) Sachant que MN = 5 cm, calcule BC.","min":"1) AM/AB = 3/7,5 = 0,4 ; AN/AC = 4/10 = 0,4. Rapports égaux et points dans le même ordre → (MN)//(BC). 2) MN/BC = 0,4 → BC = 5/0,4 = 12,5 cm.","solide":"1) On compare les rapports : AM/AB = 3/7,5 = 0,4 et AN/AC = 4/10 = 0,4. Les deux rapports sont égaux et les points sont alignés dans le même ordre, donc d'après la réciproque de Thalès, (MN) et (BC) sont parallèles.\n2) Comme les droites sont parallèles, Thalès donne MN/BC = 0,4, donc BC = MN/0,4 = 5/0,4 = 12,5 cm.","mention":"1) Parallélisme par la réciproque de Thalès.\nLes points A, M, B d'une part, A, N, C d'autre part, sont alignés dans le même ordre à partir de A. On compare les rapports :\nAM/AB = 3/7,5 = 0,4.\nAN/AC = 4/10 = 0,4.\nLes deux rapports sont égaux (0,4 = 0,4) et les points sont disposés dans le même ordre sur les deux droites. D'après la réciproque du théorème de Thalès, les droites (MN) et (BC) sont donc parallèles.\n\n2) Calcul de BC avec le théorème de Thalès.\nPuisque (MN)//(BC), le théorème de Thalès donne l'égalité des rapports : AM/AB = MN/BC = 0,4.\nDonc MN/BC = 0,4, soit BC = MN ÷ 0,4 = 5 ÷ 0,4 = 12,5 cm.\n\nConclusion : les droites sont parallèles car les rapports sont égaux, et BC = 12,5 cm. Cohérence : BC (12,5 cm) est plus grand que MN (5 cm), ce qui est normal puisque le triangle ABC est l'agrandissement du triangle AMN."},{"consigne":"Exercice type brevet. Les points A, M, B sont alignés et les points A, N, C sont alignés, avec (MN) parallèle à (BC). On donne AM = 2 cm, AB = 6 cm et MN = 3 cm. Calcule BC.","min":"D'après Thalès : AM/AB = MN/BC, donc 2/6 = 3/BC, donc BC = (3×6)/2 = 9 cm.","solide":"Comme (MN) est parallèle à (BC), on applique le théorème de Thalès :\nAM/AB = MN/BC.\nOn remplace : 2/6 = 3/BC.\nPar produit en croix : BC = (3 × 6) / 2 = 18 / 2 = 9 cm.","mention":"Les droites (MN) et (BC) sont parallèles, et les points sont alignés sur deux droites sécantes en A. On peut donc appliquer le théorème de Thalès, qui donne l'égalité des rapports :\nAM/AB = AN/AC = MN/BC.\n\nOn utilise les deux rapports qui contiennent les longueurs connues et l'inconnue BC :\nAM/AB = MN/BC, soit 2/6 = 3/BC.\n\nOn résout par produit en croix :\nBC = (3 × 6) / 2 = 18 / 2 = 9 cm.\n\nConclusion : BC mesure 9 cm. Vérification de cohérence : le rapport de réduction est AM/AB = 2/6 = 1/3, donc MN doit être le tiers de BC. On a bien 3 = 9/3, le résultat est cohérent."},{"consigne":"Exercice type brevet. Dans une configuration de Thalès, on a OA = 4 cm, OB = 10 cm, et la longueur AC = 6 cm (avec (AC) parallèle à (BD)). Calcule BD.","min":"OA/OB = AC/BD, donc 4/10 = 6/BD, donc BD = (6×10)/4 = 15 cm.","solide":"Les droites (AC) et (BD) étant parallèles, le théorème de Thalès donne :\nOA/OB = AC/BD.\nOn remplace : 4/10 = 6/BD.\nPar produit en croix : BD = (6 × 10) / 4 = 60 / 4 = 15 cm.","mention":"On est dans une configuration de Thalès avec deux droites parallèles (AC) et (BD), coupées par deux droites sécantes en O. Le théorème de Thalès donne l'égalité des rapports :\nOA/OB = OC/OD = AC/BD.\n\nOn utilise les rapports contenant les valeurs connues et l'inconnue BD :\nOA/OB = AC/BD, soit 4/10 = 6/BD.\n\nOn résout par produit en croix :\nBD = (6 × 10) / 4 = 60 / 4 = 15 cm.\n\nConclusion : BD mesure 15 cm. Vérification de cohérence : le rapport OA/OB = 4/10 = 0,4, donc AC doit valoir 0,4 × BD. On vérifie : 0,4 × 15 = 6, ce qui correspond bien à AC."}],"parcours":{"mission":"À la fin, tu sais utiliser le théorème de Thalès pour calculer une longueur dans une configuration de droites parallèles.","froid":[{"q":"Le théorème de Thalès met en jeu deux droites… comment ?","rep":"Deux droites parallèles coupées par deux droites sécantes (en un même point)."},{"q":"Quelle différence essentielle entre Pythagore et Thalès ?","rep":"Pythagore concerne le triangle rectangle ; Thalès concerne des droites parallèles et des longueurs proportionnelles."},{"q":"Que produit le théorème de Thalès entre les longueurs ?","rep":"Une égalité de rapports (des fractions égales) : les longueurs sont proportionnelles."},{"q":"À quoi sert la réciproque du théorème de Thalès ?","rep":"À prouver que deux droites sont parallèles."},{"q":"Si AB/AD = AC/AE et AB = 4, AD = 6, AC = 3, combien vaut AE ?","rep":"AE = (3 × 6) ÷ 4 = 4,5."}],"coffre":[{"q":"Le théorème de Thalès s'applique avec deux droites ____ coupées par deux sécantes.","rep":"Mot attendu : parallèles"},{"q":"Thalès donne une égalité de ____ (des fractions égales).","rep":"Mot attendu : rapports"},{"q":"Pythagore = triangle rectangle ; Thalès = droites ____.","rep":"Mot attendu : parallèles"},{"q":"La ____ de Thalès sert à prouver que deux droites sont parallèles.","rep":"Mot attendu : réciproque"},{"q":"Pour trouver une longueur manquante dans une égalité de fractions, on fait un produit en ____.","rep":"Mot attendu : croix"}],"frise":[],"oral":"Explique en 90 secondes le théorème de Thalès et comment ne pas le confondre avec Pythagore.","oralRedige":"Le théorème de Thalès sert à calculer des longueurs, mais dans une situation bien précise : il faut deux droites parallèles coupées par deux droites sécantes qui se croisent en un même point. La première chose à faire, c'est donc de vérifier qu'on a bien des droites parallèles, sinon Thalès ne s'applique pas. Le théorème donne alors une égalité de rapports, c'est-à-dire des fractions égales entre les longueurs : les longueurs sont proportionnelles. Pour trouver une longueur manquante, on écrit l'égalité des fractions puis on fait un produit en croix. Le piège classique du brevet, c'est de confondre Thalès et Pythagore. Le réflexe : Pythagore, c'est dès qu'il y a un triangle rectangle et un angle droit ; Thalès, c'est dès qu'il y a des droites parallèles. Enfin, comme pour Pythagore, il existe une réciproque, qui sert cette fois à démontrer que deux droites sont parallèles.","ecrit":{"consigne":"Exercice type brevet. Les droites (BC) et (DE) sont parallèles. A, B, D sont alignés et A, C, E sont alignés. On donne AB = 4 cm, AD = 6 cm et AC = 3 cm. Calcule AE.","min":"D'après Thalès : AB/AD = AC/AE.\n4/6 = 3/AE\nAE = (3 × 6)/4 = 18/4 = 4,5 cm.","solide":"Les droites (BC) et (DE) sont parallèles, donc d'après le théorème de Thalès :\nAB/AD = AC/AE.\nOn remplace : 4/6 = 3/AE.\nPar produit en croix : 4 × AE = 6 × 3, soit 4 × AE = 18.\nDonc AE = 18 ÷ 4 = 4,5.\nAE mesure 4,5 cm.","mention":"Les points A, B, D sont alignés, les points A, C, E sont alignés, et les droites (BC) et (DE) sont parallèles. Les conditions du théorème de Thalès sont donc réunies.\n\nD'après le théorème de Thalès, les rapports des longueurs sont égaux :\nAB/AD = AC/AE = BC/DE.\n\nOn n'utilise que les deux rapports utiles ici :\nAB/AD = AC/AE, c'est-à-dire 4/6 = 3/AE.\n\nOn résout par produit en croix :\n4 × AE = 6 × 3\n4 × AE = 18\nAE = 18 ÷ 4 = 4,5.\n\nConclusion : AE = 4,5 cm. On vérifie la cohérence : AD (6) est plus grand que AB (4), donc AE doit être plus grand que AC (3), ce qui est bien le cas."},"ecritRedige":{"min":"D'après Thalès : AB/AD = AC/AE.\n4/6 = 3/AE\nAE = (3 × 6)/4 = 18/4 = 4,5 cm.","solide":"Les droites (BC) et (DE) sont parallèles, donc d'après le théorème de Thalès :\nAB/AD = AC/AE.\nOn remplace : 4/6 = 3/AE.\nPar produit en croix : 4 × AE = 6 × 3, soit 4 × AE = 18.\nDonc AE = 18 ÷ 4 = 4,5.\nAE mesure 4,5 cm.","mention":"Les points A, B, D sont alignés, les points A, C, E sont alignés, et les droites (BC) et (DE) sont parallèles. Les conditions du théorème de Thalès sont donc réunies.\n\nD'après le théorème de Thalès, les rapports des longueurs sont égaux :\nAB/AD = AC/AE = BC/DE.\n\nOn n'utilise que les deux rapports utiles ici :\nAB/AD = AC/AE, c'est-à-dire 4/6 = 3/AE.\n\nOn résout par produit en croix :\n4 × AE = 6 × 3\n4 × AE = 18\nAE = 18 ÷ 4 = 4,5.\n\nConclusion : AE = 4,5 cm. On vérifie la cohérence : AD (6) est plus grand que AB (4), donc AE doit être plus grand que AC (3), ce qui est bien le cas."},"carte":"Carte mémoire : au centre « THALÈS », branches : droites parallèles + sécantes, égalité de fractions, produit en croix, réciproque (prouver parallèles), NE PAS confondre avec Pythagore.","motscles":"Thalès, droites parallèles, sécantes, égalité de rapports, proportionnalité, produit en croix, réciproque, parallèles","vid":"https://www.lumni.fr/college/troisieme/mathematiques","vidlab":"Vidéo du chapitre"}},{"id":"M5","matiere":"maths","titre":"Trigonométrie dans le triangle rectangle","objectif":"À la fin, tu sais utiliser cosinus, sinus et tangente pour calculer un côté ou un angle dans un triangle rectangle.","retiens":["Dans un triangle rectangle, on repère par rapport à un angle : le côté adjacent (à côté), le côté opposé (en face), l'hypoténuse (la plus longue).","Moyen mnémotechnique : SOH-CAH-TOA.","Pour trouver un angle quand on connaît un rapport, on utilise les touches cos⁻¹, sin⁻¹, tan⁻¹ de la calculatrice."],"formules":["cos(angle) = adjacent / hypoténuse","sin(angle) = opposé / hypoténuse","tan(angle) = opposé / adjacent"],"resolu":{"enonce":"Dans un triangle rectangle, le côté adjacent à un angle mesure 4 cm, l'hypoténuse 8 cm. Calculer cet angle.","etapes":["Je connais adjacent et hypoténuse, j'utilise le cosinus : cos(angle) = 4/8 = 0,5.","Pour trouver l'angle, j'utilise cos⁻¹ : angle = cos⁻¹(0,5).","La calculatrice donne 60°."],"resultat":"angle = 60°"},"exact":[],"qcm":[{"q":"Triangle rectangle en A. Angle B = 30°, hypoténuse BC = 10 cm. Quelle longueur donne cos(30°) = AB/BC ?","good":"AB = 10 × cos(30°) ≈ 8,7 cm","choices":["AB = 10 × sin(30°) = 5 cm","AB = 10 / cos(30°) ≈ 11,5 cm","AB = 10 × cos(30°) ≈ 8,7 cm","AB = 10 − cos(30°)"],"explain":"cos(B) = adjacent/hypoténuse = AB/BC, donc AB = BC × cos(30°) = 10 × cos(30°) ≈ 8,7 cm. Erreur : diviser au lieu de multiplier, ou confondre avec le sinus.","verif":"Isole la longueur cherchée : ici AB = BC × cos(B)."},{"q":"Triangle rectangle en A, AB = 4 cm (adjacent à B), AC = 3 cm (opposé à B). Quel rapport donne directement l'angle B ?","good":"tan(B) = 3/4","choices":["tan(B) = 4/3","tan(B) = 3/4","cos(B) = 3/4","sin(B) = 4/3"],"explain":"La tangente relie l'opposé et l'adjacent : tan(B) = opposé/adjacent = AC/AB = 3/4. Erreur fréquente : inverser et écrire 4/3.","verif":"tangente = opposé ÷ adjacent. Vérifie qui est opposé et qui est adjacent à l'angle."},{"q":"On connaît cos(B) = 0,6 dans un triangle rectangle. Comment trouve-t-on la mesure de l'angle B à la calculatrice ?","good":"En utilisant la touche cos⁻¹ (Arccos) de 0,6","choices":["En tapant cos(0,6)","En multipliant 0,6 par π","En utilisant la touche cos⁻¹ (Arccos) de 0,6","En calculant 0,6 × 90"],"explain":"Pour retrouver l'angle à partir de son cosinus, on utilise la fonction inverse cos⁻¹ (Arccos). Taper cos(0,6) donnerait le cosinus de 0,6, pas l'angle.","verif":"De la longueur vers l'angle : touches sin⁻¹, cos⁻¹ ou tan⁻¹."},{"q":"Triangle rectangle en A. Angle B = 40°, AB = 6 cm (adjacent). Quelle longueur fait AC (opposé) ? (tan 40° ≈ 0,84)","good":"AC ≈ 5 cm","choices":["AC ≈ 7,1 cm","AC ≈ 9,3 cm","AC ≈ 5 cm","AC ≈ 2,4 cm"],"explain":"tan(B) = AC/AB, donc AC = AB × tan(40°) = 6 × 0,84 ≈ 5 cm. Comme 40° < 45°, l'opposé est plus court que l'adjacent (5 < 6).","verif":"AC = AB × tan(B). Vérifie : angle < 45° donne opposé < adjacent."}],"paper":{"consigne":"Exercice type brevet. ABC est rectangle en A. L'angle en B mesure 30° et l'hypoténuse BC = 10 cm. Calcule la longueur AB (côté adjacent à l'angle B). On donne cos(30°) ≈ 0,87.","grille":["cos(B) = AB/BC\ncos(30°) = AB/10\nAB = 10 × cos(30°) ≈ 10 × 0,87 ≈ 8,7 cm.","Dans le triangle ABC rectangle en A, on s'intéresse à l'angle B. Par rapport à cet angle, AB est le côté adjacent et BC est l'hypoténuse. On utilise donc le cosinus :\ncos(B) = côté adjacent / hypoténuse = AB/BC.\ncos(30°) = AB/10.\nDonc AB = 10 × cos(30°) ≈ 10 × 0,87 ≈ 8,7.\nAB mesure environ 8,7 cm.","Le triangle ABC est rectangle en A. On travaille avec l'angle en B, qui mesure 30°.\n\nÉtape 1 : repérer les côtés par rapport à l'angle B. L'hypoténuse (face à l'angle droit) est [BC] = 10 cm. Le côté [AB] touche l'angle B sans être l'hypoténuse : c'est le côté adjacent. On cherche AB.\n\nÉtape 2 : choisir la bonne formule. On connaît l'hypoténuse et on cherche le côté adjacent : le rapport qui relie ces deux côtés est le cosinus (CAH : Cosinus = Adjacent / Hypoténuse).\ncos(B) = AB / BC.\n\nÉtape 3 : calculer.\ncos(30°) = AB / 10\nAB = 10 × cos(30°) ≈ 10 × 0,87 ≈ 8,7.\n\nConclusion : AB mesure environ 8,7 cm. (Cohérent : AB est un côté de l'angle droit, il doit être plus petit que l'hypoténuse de 10 cm.)"],"type":"calcul","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"},"exos":[{"consigne":"Exercice type brevet. ABC est rectangle en A. L'angle B mesure 35° et l'hypoténuse BC = 12 cm. 1) Calcule AB, arrondi au dixième (cos 35° ≈ 0,82). 2) Calcule AC, arrondi au dixième (sin 35° ≈ 0,57). 3) Vérifie la cohérence avec le théorème de Pythagore.","min":"1) AB = 12 × cos35° ≈ 12 × 0,82 ≈ 9,8 cm. 2) AC = 12 × sin35° ≈ 12 × 0,57 ≈ 6,8 cm. 3) 9,8² + 6,8² ≈ 96 + 46 ≈ 142 ≈ 12² = 144 (écart dû aux arrondis).","solide":"1) Pour l'angle B, AB est le côté adjacent et BC l'hypoténuse : cos(B) = AB/BC, donc AB = BC × cos(35°) = 12 × 0,82 ≈ 9,8 cm.\n2) AC est le côté opposé à B : sin(B) = AC/BC, donc AC = BC × sin(35°) = 12 × 0,57 ≈ 6,8 cm.\n3) Pythagore : AB² + AC² ≈ 9,8² + 6,8² ≈ 96 + 46,2 ≈ 142, proche de BC² = 144. L'écart vient des arrondis : la cohérence est vérifiée.","mention":"1) Calcul de AB avec le cosinus.\nDans le triangle rectangle en A, pour l'angle B, le côté adjacent est AB et l'hypoténuse est BC. On utilise le cosinus :\ncos(B) = adjacent/hypoténuse = AB/BC, d'où AB = BC × cos(35°) = 12 × 0,82 ≈ 9,8 cm.\n\n2) Calcul de AC avec le sinus.\nPour l'angle B, le côté opposé est AC. On utilise le sinus :\nsin(B) = opposé/hypoténuse = AC/BC, d'où AC = BC × sin(35°) = 12 × 0,57 ≈ 6,8 cm.\n\n3) Vérification avec Pythagore.\nLe triangle étant rectangle en A, on doit avoir AB² + AC² = BC². On calcule : 9,8² + 6,8² ≈ 96,0 + 46,2 ≈ 142,2, à comparer à BC² = 12² = 144. Les deux valeurs sont très proches : le petit écart s'explique par les arrondis effectués sur cos 35° et sin 35°.\n\nConclusion : AB ≈ 9,8 cm, AC ≈ 6,8 cm, et le contrôle par Pythagore confirme la cohérence des résultats."},{"consigne":"Exercice type brevet. ABC est rectangle en A. On donne AB = 4 cm et BC = 8 cm (BC est l'hypoténuse). Calcule la mesure de l'angle B, arrondie au degré. (On rappelle : cos = adjacent / hypoténuse.)","min":"cos(B) = AB/BC = 4/8 = 0,5. Donc B = 60°.","solide":"Dans le triangle ABC rectangle en A, l'angle B a pour côté adjacent AB et pour hypoténuse BC. On utilise le cosinus :\ncos(B) = adjacent/hypoténuse = AB/BC = 4/8 = 0,5.\nOn cherche l'angle dont le cosinus vaut 0,5 : B = 60°.","mention":"Le triangle ABC est rectangle en A. Pour l'angle B, le côté adjacent est AB et l'hypoténuse est BC (le côté opposé à l'angle droit). La grandeur qui relie le côté adjacent et l'hypoténuse est le cosinus.\n\nFormule : cos(B) = côté adjacent / hypoténuse = AB / BC.\nApplication numérique : cos(B) = 4 / 8 = 0,5.\n\nPour trouver l'angle, on utilise la fonction inverse du cosinus (touche cos⁻¹ ou Arccos de la calculatrice) :\nB = cos⁻¹(0,5) = 60°.\n\nConclusion : l'angle B mesure 60°. Vérification de cohérence : le cosinus d'un angle aigu est bien compris entre 0 et 1, et 0,5 correspond à l'angle connu de 60°."},{"consigne":"Exercice type brevet. ABC est rectangle en A. L'angle B mesure 40° et le côté AB (adjacent à B) mesure 5 cm. Calcule la longueur AC, arrondie au dixième. (On rappelle : tan = opposé / adjacent ; tan(40°) ≈ 0,839.)","min":"tan(B) = AC/AB, donc AC = AB × tan(40°) = 5 × 0,839 ≈ 4,2 cm.","solide":"Dans le triangle rectangle en A, pour l'angle B, le côté opposé est AC et le côté adjacent est AB. On utilise la tangente :\ntan(B) = opposé/adjacent = AC/AB.\nDonc AC = AB × tan(B) = 5 × tan(40°) ≈ 5 × 0,839 ≈ 4,2 cm.","mention":"Le triangle ABC est rectangle en A. Pour l'angle B, le côté opposé est AC et le côté adjacent est AB. La grandeur qui relie le côté opposé et le côté adjacent est la tangente.\n\nFormule : tan(B) = côté opposé / côté adjacent = AC / AB.\nOn isole AC : AC = AB × tan(B).\n\nApplication numérique :\nAC = 5 × tan(40°) ≈ 5 × 0,839 ≈ 4,195, soit environ 4,2 cm.\n\nConclusion : le côté AC mesure environ 4,2 cm. Vérification de cohérence : l'angle B (40°) est inférieur à 45°, donc sa tangente est inférieure à 1, et le côté opposé AC doit être plus court que le côté adjacent AB (5 cm). On a bien 4,2 cm < 5 cm, le résultat est cohérent."}],"parcours":{"mission":"À la fin, tu sais utiliser cosinus, sinus et tangente pour calculer un côté ou un angle dans un triangle rectangle.","froid":[{"q":"Dans quel type de triangle utilise-t-on la trigonométrie au collège ?","rep":"Le triangle rectangle."},{"q":"Que vaut le cosinus d'un angle ? (formule)","rep":"cos = côté adjacent ÷ hypoténuse."},{"q":"Que vaut le sinus d'un angle ? (formule)","rep":"sin = côté opposé ÷ hypoténuse."},{"q":"Que vaut la tangente d'un angle ? (formule)","rep":"tan = côté opposé ÷ côté adjacent."},{"q":"Quel moyen mnémotechnique résume les trois formules ?","rep":"SOH-CAH-TOA (Sinus=Opposé/Hypoténuse, Cosinus=Adjacent/Hypoténuse, Tangente=Opposé/Adjacent)."}],"coffre":[{"q":"La trigonométrie au collège s'utilise dans un triangle ____.","rep":"Mot attendu : rectangle"},{"q":"cos(angle) = côté ____ ÷ hypoténuse.","rep":"Mot attendu : adjacent"},{"q":"sin(angle) = côté ____ ÷ hypoténuse.","rep":"Mot attendu : opposé"},{"q":"tan(angle) = côté opposé ÷ côté ____.","rep":"Mot attendu : adjacent"},{"q":"Le moyen mnémotechnique des trois formules est ____.","rep":"Mot attendu : SOH-CAH-TOA"}],"frise":[],"oral":"Explique en 90 secondes ce que sont le cosinus, le sinus et la tangente, avec le moyen pour les retenir.","oralRedige":"La trigonométrie permet de calculer des angles ou des côtés dans un triangle rectangle, à partir d'un angle. Elle repose sur trois rapports : le cosinus, le sinus et la tangente. Pour les définir, on se place du point de vue d'un angle, et on distingue trois côtés : l'hypoténuse, qui est en face de l'angle droit, le côté adjacent à l'angle, qui le touche, et le côté opposé, qui est en face de l'angle. Alors, le cosinus de l'angle est égal au côté adjacent divisé par l'hypoténuse, le sinus est le côté opposé divisé par l'hypoténuse, et la tangente est le côté opposé divisé par le côté adjacent. Pour ne pas les confondre, on retient le moyen mnémotechnique SOH-CAH-TOA : Sinus égale Opposé sur Hypoténuse, Cosinus égale Adjacent sur Hypoténuse, Tangente égale Opposé sur Adjacent. Selon ce qu'on connaît et ce qu'on cherche, on choisit la bonne formule.","ecrit":{"consigne":"Exercice type brevet. ABC est rectangle en A. L'angle en B mesure 30° et l'hypoténuse BC = 10 cm. Calcule la longueur AB (côté adjacent à l'angle B). On donne cos(30°) ≈ 0,87.","min":"cos(B) = AB/BC\ncos(30°) = AB/10\nAB = 10 × cos(30°) ≈ 10 × 0,87 ≈ 8,7 cm.","solide":"Dans le triangle ABC rectangle en A, on s'intéresse à l'angle B. Par rapport à cet angle, AB est le côté adjacent et BC est l'hypoténuse. On utilise donc le cosinus :\ncos(B) = côté adjacent / hypoténuse = AB/BC.\ncos(30°) = AB/10.\nDonc AB = 10 × cos(30°) ≈ 10 × 0,87 ≈ 8,7.\nAB mesure environ 8,7 cm.","mention":"Le triangle ABC est rectangle en A. On travaille avec l'angle en B, qui mesure 30°.\n\nÉtape 1 : repérer les côtés par rapport à l'angle B. L'hypoténuse (face à l'angle droit) est [BC] = 10 cm. Le côté [AB] touche l'angle B sans être l'hypoténuse : c'est le côté adjacent. On cherche AB.\n\nÉtape 2 : choisir la bonne formule. On connaît l'hypoténuse et on cherche le côté adjacent : le rapport qui relie ces deux côtés est le cosinus (CAH : Cosinus = Adjacent / Hypoténuse).\ncos(B) = AB / BC.\n\nÉtape 3 : calculer.\ncos(30°) = AB / 10\nAB = 10 × cos(30°) ≈ 10 × 0,87 ≈ 8,7.\n\nConclusion : AB mesure environ 8,7 cm. (Cohérent : AB est un côté de l'angle droit, il doit être plus petit que l'hypoténuse de 10 cm.)"},"ecritRedige":{"min":"cos(B) = AB/BC\ncos(30°) = AB/10\nAB = 10 × cos(30°) ≈ 10 × 0,87 ≈ 8,7 cm.","solide":"Dans le triangle ABC rectangle en A, on s'intéresse à l'angle B. Par rapport à cet angle, AB est le côté adjacent et BC est l'hypoténuse. On utilise donc le cosinus :\ncos(B) = côté adjacent / hypoténuse = AB/BC.\ncos(30°) = AB/10.\nDonc AB = 10 × cos(30°) ≈ 10 × 0,87 ≈ 8,7.\nAB mesure environ 8,7 cm.","mention":"Le triangle ABC est rectangle en A. On travaille avec l'angle en B, qui mesure 30°.\n\nÉtape 1 : repérer les côtés par rapport à l'angle B. L'hypoténuse (face à l'angle droit) est [BC] = 10 cm. Le côté [AB] touche l'angle B sans être l'hypoténuse : c'est le côté adjacent. On cherche AB.\n\nÉtape 2 : choisir la bonne formule. On connaît l'hypoténuse et on cherche le côté adjacent : le rapport qui relie ces deux côtés est le cosinus (CAH : Cosinus = Adjacent / Hypoténuse).\ncos(B) = AB / BC.\n\nÉtape 3 : calculer.\ncos(30°) = AB / 10\nAB = 10 × cos(30°) ≈ 10 × 0,87 ≈ 8,7.\n\nConclusion : AB mesure environ 8,7 cm. (Cohérent : AB est un côté de l'angle droit, il doit être plus petit que l'hypoténuse de 10 cm.)"},"carte":"Carte mémoire : au centre « TRIGONOMÉTRIE » et « SOH-CAH-TOA », branches : cos = adjacent/hypoténuse, sin = opposé/hypoténuse, tan = opposé/adjacent, repérer les côtés selon l'angle.","motscles":"trigonométrie, triangle rectangle, cosinus, sinus, tangente, adjacent, opposé, hypoténuse, SOH-CAH-TOA","vid":"https://www.lumni.fr/college/troisieme/mathematiques","vidlab":"Vidéo du chapitre"}},{"id":"M6","matiere":"maths","titre":"Nombres : fractions, puissances, relatifs","objectif":"À la fin, tu sais calculer avec des fractions, utiliser les puissances et la notation scientifique, et respecter les priorités.","retiens":["Pour additionner des fractions, il faut le même dénominateur.","Pour multiplier des fractions, on multiplie les numérateurs entre eux et les dénominateurs entre eux, puis on simplifie.","Puissances de 10 : 10ᵃ × 10ᵇ = 10ᵃ⁺ᵇ et 10ᵃ ÷ 10ᵇ = 10ᵃ⁻ᵇ."],"formules":["a/b + c/d = (ad + cb)/(bd)","a/b × c/d = (a×c)/(b×d)","10ᵃ × 10ᵇ = 10ᵃ⁺ᵇ"],"resolu":{"enonce":"Calculer 2/3 + 1/4.","etapes":["Je cherche un dénominateur commun à 3 et 4 : c'est 12.","Je convertis : 2/3 = 8/12 et 1/4 = 3/12.","J'additionne les numérateurs : 8/12 + 3/12 = 11/12."],"resultat":"11/12"},"exact":[],"qcm":[{"q":"Calcule 3/4 − 2/3.","good":"1/12","choices":["1/7","1/12","5/12","1/1"],"explain":"Dénominateur commun 12 : 3/4 = 9/12 et 2/3 = 8/12, donc 9/12 − 8/12 = 1/12. Erreur fréquente : soustraire numérateurs et dénominateurs (donnerait 1/1).","verif":"Même dénominateur d'abord, puis on soustrait seulement les numérateurs."},{"q":"Calcule −5 − (−8).","good":"3","choices":["13","−3","−13","3"],"explain":"Soustraire (−8) revient à ajouter 8 : −5 + 8 = 3. Erreur classique : garder le signe moins et trouver −13 ou −3.","verif":"Moins par moins donne plus : −(−8) = +8."},{"q":"Écris 56 000 en notation scientifique.","good":"5,6 × 10⁴","choices":["56 × 10³","0,56 × 10⁵","5,6 × 10⁴","5,6 × 10³"],"explain":"La notation scientifique est a × 10ⁿ avec 1 ≤ a < 10. 56 000 = 5,6 × 10 000 = 5,6 × 10⁴. 56 × 10³ a le bon ordre de grandeur mais a n'est pas entre 1 et 10.","verif":"Le nombre a doit être compris entre 1 et 10 (un seul chiffre avant la virgule)."},{"q":"Calcule 2 + 3 × 4².","good":"50","choices":["80","100","50","48"],"explain":"Priorités : d'abord la puissance 4² = 16, puis la multiplication 3×16 = 48, puis l'addition 2 + 48 = 50. Erreur : calculer de gauche à droite sans respecter les priorités.","verif":"Ordre des priorités : puissances, puis × et ÷, puis + et −."}],"paper":{"consigne":"Exercice type brevet. Calcule et donne le résultat sous forme d'une fraction la plus simple possible : A = 3/4 + 1/4 × 2.","grille":["A = 3/4 + 1/4 × 2 = 3/4 + 2/4 = 5/4.","On respecte les priorités : la multiplication d'abord.\n1/4 × 2 = 2/4.\nDonc A = 3/4 + 2/4 = 5/4.\nLa fraction 5/4 est déjà simplifiée (5 et 4 n'ont pas de diviseur commun).","On calcule A = 3/4 + 1/4 × 2.\n\nÉtape 1 : priorités opératoires. La multiplication est prioritaire sur l'addition, on calcule donc 1/4 × 2 en premier.\n1/4 × 2 = 1/4 × 2/1 = 2/4.\n\nÉtape 2 : addition de fractions de même dénominateur.\nA = 3/4 + 2/4 = (3 + 2)/4 = 5/4.\n\nÉtape 3 : simplification. 5 et 4 n'ont aucun diviseur commun autre que 1, la fraction 5/4 est donc irréductible.\n\nConclusion : A = 5/4. On peut remarquer que 5/4 = 1,25, ce qui permet de vérifier l'ordre de grandeur : on additionnait à peu près 0,75 et 0,5, soit bien 1,25."],"type":"calcul","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/mathematiques"},"exos":[{"consigne":"Exercice type brevet. 1) Calcule A = 2/3 + 5/6 × 2 en respectant les priorités, et donne le résultat en fraction simplifiée. 2) Écris B = (3 × 10⁴) × (2 × 10³) sous la forme a × 10ⁿ avec 1 ≤ a < 10.","min":"1) A = 2/3 + 5/3 = 7/3 (priorité à la multiplication : 5/6 × 2 = 5/3). 2) B = 6 × 10⁷.","solide":"1) Priorité à la multiplication : 5/6 × 2 = 10/6 = 5/3. Puis A = 2/3 + 5/3 = 7/3 (déjà simplifiée).\n2) B = (3 × 2) × (10⁴ × 10³) = 6 × 10⁷. Le coefficient 6 est bien entre 1 et 10.","mention":"1) Calcul avec priorités et fractions.\nOn effectue d'abord la multiplication (prioritaire sur l'addition) : 5/6 × 2 = 10/6 = 5/3 (après simplification par 2).\nPuis l'addition, en mettant au même dénominateur (3) : A = 2/3 + 5/3 = 7/3. La fraction 7/3 est irréductible (7 est premier, non divisible par 3).\n\n2) Notation scientifique d'un produit.\nB = (3 × 10⁴) × (2 × 10³). On regroupe les nombres et les puissances de 10 : B = (3 × 2) × (10⁴ × 10³) = 6 × 10^(4+3) = 6 × 10⁷.\nLe coefficient 6 est compris entre 1 et 10 : l'écriture est bien en notation scientifique.\n\nConclusion : A = 7/3 et B = 6 × 10⁷. Points de vigilance : respecter la priorité de la multiplication, et additionner les exposants lors du produit de puissances de 10."},{"consigne":"Exercice type brevet. Calcule et donne le résultat sous forme d'une fraction la plus simple possible : A = 5/6 − 1/3.","min":"A = 5/6 − 2/6 = 3/6 = 1/2.","solide":"On met les fractions au même dénominateur 6. 1/3 = 2/6.\nA = 5/6 − 2/6 = 3/6.\nOn simplifie : 3/6 = 1/2.","mention":"On calcule A = 5/6 − 1/3.\n\nÉtape 1 : même dénominateur. Le dénominateur commun est 6. On convertit 1/3 en sixièmes : 1/3 = 2/6.\n\nÉtape 2 : soustraction. A = 5/6 − 2/6 = (5 − 2)/6 = 3/6.\n\nÉtape 3 : simplification. 3 et 6 sont tous deux divisibles par 3 : 3/6 = 1/2.\n\nConclusion : A = 1/2. Vérification de l'ordre de grandeur : 5/6 ≈ 0,83 et 1/3 ≈ 0,33, leur différence vaut environ 0,5, ce qui correspond bien à 1/2."},{"consigne":"Exercice type brevet. Écris en notation scientifique le nombre 45 000. Puis calcule 10³ × 10².","min":"45 000 = 4,5 × 10⁴. 10³ × 10² = 10⁵ = 100 000.","solide":"Notation scientifique : on écrit le nombre sous la forme a × 10ⁿ avec a entre 1 et 10. 45 000 = 4,5 × 10 000 = 4,5 × 10⁴.\nPour le produit de puissances de 10, on additionne les exposants : 10³ × 10² = 10^(3+2) = 10⁵ = 100 000.","mention":"1) Notation scientifique de 45 000.\nLa notation scientifique s'écrit a × 10ⁿ, où a est compris entre 1 et 10. On déplace la virgule pour obtenir 4,5, ce qui revient à diviser par 10 000, soit 10⁴. Pour compenser, on multiplie par 10⁴ :\n45 000 = 4,5 × 10⁴.\n\n2) Produit de puissances de 10.\nPour multiplier deux puissances de 10, on additionne les exposants :\n10³ × 10² = 10^(3+2) = 10⁵.\nCe qui vaut 100 000.\n\nConclusion : 45 000 s'écrit 4,5 × 10⁴ en notation scientifique, et 10³ × 10² = 10⁵ = 100 000."}],"parcours":{"mission":"À la fin, tu sais calculer avec des fractions, utiliser les puissances et la notation scientifique, et respecter les priorités.","froid":[{"q":"Calcule 1/2 + 1/3.","rep":"5/6 (on met au même dénominateur 6 : 3/6 + 2/6 = 5/6)."},{"q":"Calcule 2/3 × 3/4.","rep":"6/12 = 1/2 (on multiplie les numérateurs entre eux et les dénominateurs entre eux)."},{"q":"Combien vaut 2³ ?","rep":"8 (2 × 2 × 2)."},{"q":"Combien vaut 10⁴ ?","rep":"10 000."},{"q":"Dans 3 + 4 × 2, que calcule-t-on en premier ?","rep":"La multiplication : 3 + 8 = 11 (la multiplication est prioritaire sur l'addition)."}],"coffre":[{"q":"Pour additionner deux fractions, il faut le même ____.","rep":"Mot attendu : dénominateur"},{"q":"Pour multiplier deux fractions, on multiplie les ____ entre eux et les dénominateurs entre eux.","rep":"Mot attendu : numérateurs"},{"q":"aⁿ signifie a multiplié par lui-même ____ fois.","rep":"Mot attendu : n"},{"q":"La notation scientifique s'écrit a × 10ⁿ, avec a compris entre 1 et ____.","rep":"Mot attendu : 10"},{"q":"Dans un calcul, la multiplication et la division sont ____ sur l'addition et la soustraction.","rep":"Mot attendu : prioritaires"}],"frise":[],"oral":"Explique en 90 secondes comment additionner deux fractions et comment les multiplier.","oralRedige":"Avec les fractions, les deux opérations à bien distinguer sont l'addition et la multiplication, car elles ne suivent pas la même règle. Pour additionner deux fractions, il faut d'abord qu'elles aient le même dénominateur. Par exemple, pour un demi plus un tiers, je mets tout sur 6 : un demi devient trois sixièmes, un tiers devient deux sixièmes, et la somme fait cinq sixièmes. On additionne les numérateurs et on garde le dénominateur commun. Pour multiplier deux fractions, c'est plus simple : pas besoin de même dénominateur, on multiplie les numérateurs entre eux et les dénominateurs entre eux. Par exemple, deux tiers fois trois quarts donne six douzièmes, qu'on simplifie en un demi. Pour les puissances, a exposant n veut dire qu'on multiplie a par lui-même n fois. Et il faut toujours respecter les priorités : la multiplication et la division se calculent avant l'addition et la soustraction.","ecrit":{"consigne":"Exercice type brevet. Calcule et donne le résultat sous forme d'une fraction la plus simple possible : A = 3/4 + 1/4 × 2.","min":"A = 3/4 + 1/4 × 2 = 3/4 + 2/4 = 5/4.","solide":"On respecte les priorités : la multiplication d'abord.\n1/4 × 2 = 2/4.\nDonc A = 3/4 + 2/4 = 5/4.\nLa fraction 5/4 est déjà simplifiée (5 et 4 n'ont pas de diviseur commun).","mention":"On calcule A = 3/4 + 1/4 × 2.\n\nÉtape 1 : priorités opératoires. La multiplication est prioritaire sur l'addition, on calcule donc 1/4 × 2 en premier.\n1/4 × 2 = 1/4 × 2/1 = 2/4.\n\nÉtape 2 : addition de fractions de même dénominateur.\nA = 3/4 + 2/4 = (3 + 2)/4 = 5/4.\n\nÉtape 3 : simplification. 5 et 4 n'ont aucun diviseur commun autre que 1, la fraction 5/4 est donc irréductible.\n\nConclusion : A = 5/4. On peut remarquer que 5/4 = 1,25, ce qui permet de vérifier l'ordre de grandeur : on additionnait à peu près 0,75 et 0,5, soit bien 1,25."},"ecritRedige":{"min":"A = 3/4 + 1/4 × 2 = 3/4 + 2/4 = 5/4.","solide":"On respecte les priorités : la multiplication d'abord.\n1/4 × 2 = 2/4.\nDonc A = 3/4 + 2/4 = 5/4.\nLa fraction 5/4 est déjà simplifiée (5 et 4 n'ont pas de diviseur commun).","mention":"On calcule A = 3/4 + 1/4 × 2.\n\nÉtape 1 : priorités opératoires. La multiplication est prioritaire sur l'addition, on calcule donc 1/4 × 2 en premier.\n1/4 × 2 = 1/4 × 2/1 = 2/4.\n\nÉtape 2 : addition de fractions de même dénominateur.\nA = 3/4 + 2/4 = (3 + 2)/4 = 5/4.\n\nÉtape 3 : simplification. 5 et 4 n'ont aucun diviseur commun autre que 1, la fraction 5/4 est donc irréductible.\n\nConclusion : A = 5/4. On peut remarquer que 5/4 = 1,25, ce qui permet de vérifier l'ordre de grandeur : on additionnait à peu près 0,75 et 0,5, soit bien 1,25."},"carte":"Carte mémoire : au centre « NOMBRES », branches : addition de fractions (même dénominateur), multiplication (num×num, dén×dén), puissances (aⁿ), priorités (× et ÷ avant + et −).","motscles":"fraction, dénominateur commun, numérateur, multiplication de fractions, puissance, exposant, notation scientifique, priorités opératoires","vid":"https://www.lumni.fr/college/troisieme/mathematiques","vidlab":"Vidéo du chapitre"}},{"id":"M7","matiere":"maths","titre":"Proportionnalité et pourcentages","objectif":"À la fin, tu sais reconnaître une situation de proportionnalité, calculer une quatrième proportionnelle et appliquer un pourcentage.","retiens":["Augmenter de t % : on multiplie par (1 + t/100). Diminuer de t % : on multiplie par (1 − t/100).","Un pourcentage est une proportion : partie ÷ total × 100.","Vitesse moyenne = distance ÷ temps."],"formules":["Augmentation de t % : × (1 + t/100)","Réduction de t % : × (1 − t/100)","v = distance ÷ temps"],"resolu":{"enonce":"Un article coûte 80 €. Son prix augmente de 20 %. Quel est le nouveau prix ?","etapes":["Augmenter de 20 % revient à multiplier par 1 + 20/100 = 1,2.","Je calcule : 80 × 1,2.","Le nouveau prix est 96 €."],"resultat":"96 €"},"exact":[],"qcm":[{"q":"Un article coûte 80 €. Après une hausse de 15 %, combien coûte-t-il ?","good":"92 €","choices":["68 €","12 €","95 €","92 €"],"explain":"Coefficient multiplicateur 1,15 : 80 × 1,15 = 92 €. L'augmentation seule vaut 80 × 0,15 = 12 €, et 80 + 12 = 92 €. Trouver 12 € serait oublier d'ajouter au prix initial.","verif":"Hausse de 15 % : on multiplie par 1,15 (et non par 0,15)."},{"q":"Un prix passe de 40 € à 50 €. Quel est le pourcentage d'augmentation ?","good":"25 %","choices":["12,5 %","25 %","10 %","20 %"],"explain":"Augmentation = (50 − 40)/40 = 10/40 = 0,25 = 25 %. Erreur fréquente : dire 10 % (la hausse en euros) ou diviser par 50 au lieu de 40.","verif":"Pourcentage de variation = (valeur finale − initiale) ÷ valeur INITIALE."},{"q":"Après une baisse de 20 %, un article coûte 60 €. Quel était son prix initial ?","good":"75 €","choices":["72 €","80 €","75 €","48 €"],"explain":"Le prix a été multiplié par 0,8. Donc prix initial = 60 ÷ 0,8 = 75 €. Erreur : ajouter 20 % à 60 (donne 72), ce qui ne compense pas une baisse de 20 %.","verif":"Pour remonter à l'initial, on DIVISE par le coefficient (ici 0,8)."},{"q":"4 stylos coûtent 6 €. Combien coûtent 10 stylos (prix proportionnel) ?","good":"15 €","choices":["16 €","12 €","24 €","15 €"],"explain":"Prix d'un stylo : 6 ÷ 4 = 1,5 €. Pour 10 : 1,5 × 10 = 15 €. On peut aussi faire le produit en croix (6×10)/4 = 15.","verif":"Passe par le prix unitaire, ou utilise le produit en croix."}],"paper":{"consigne":"Exercice type brevet. Un manteau coûte 80 euros. Pendant les soldes, son prix baisse de 25 %. Calcule le nouveau prix de deux façons : avec le montant de la ré

toujours dire la vérité ? » Annonce ta position et donne un argument illustré d'un exemple.","min":"Une introduction qui présente le sujet et annonce une position, puis un paragraphe avec un argument et un exemple.","solide":"On attend une introduction qui présente le thème (la vérité, le mensonge) et annonce clairement une position ou la problématique. Puis un paragraphe de développement structuré : une idée (l'argument), une explication, et un exemple concret qui l'illustre. Les connecteurs logiques organisent le propos.","mention":"L'exercice porte sur la rédaction de réflexion (texte argumentatif).\n\nL'introduction doit remplir trois rôles : amener le sujet (par exemple en évoquant une situation où l'on hésite à dire la vérité), formuler la question posée, et annoncer la position que l'on va défendre ou le plan que l'on va suivre.\n\nLe paragraphe de développement doit être construit : on énonce un argument (une raison de penser ce qu'on défend), on l'explique, puis on l'illustre par un exemple concret et pertinent (tiré de la vie courante, d'une lecture, de l'actualité). Par exemple, pour défendre l'idée qu'on ne doit pas toujours dire la vérité : « dire une vérité blessante sans raison peut faire du mal ; ainsi, annoncer brutalement à un proche un défaut qu'il ne peut pas changer ne fait que le peiner inutilement. »\n\nAttendus de langue : des connecteurs logiques (« d'abord », « en effet », « par exemple », « c'est pourquoi »), des phrases correctes et un registre adapté.\n\nConseil de relecture : vérifier que l'introduction annonce bien une position, que le paragraphe contient un argument ET un exemple, et que l'ensemble reste cohérent."}],"parcours":{"mission":"À la fin, tu connais la méthode pour réussir la rédaction du brevet, qu'il s'agisse d'un sujet d'imagination ou de réflexion.","froid":[{"q":"Entre quels deux types de sujet peut-on choisir à la rédaction du brevet ?","rep":"Le sujet d'imagination (inventer un récit) et le sujet de réflexion (donner et défendre son point de vue)."},{"q":"Quelle longueur minimale est attendue pour la rédaction ?","rep":"Environ 40 à 50 lignes."},{"q":"Que faut-il faire avant de rédiger ?","rep":"Lire attentivement le sujet, puis faire un plan rapide au brouillon (les grandes idées ou les étapes du récit)."},{"q":"Comment doit être organisé un sujet de réflexion ?","rep":"Avec une introduction, un développement en plusieurs paragraphes (un argument + un exemple par paragraphe), et une conclusion."},{"q":"Que faut-il faire absolument à la fin de la rédaction ?","rep":"Se relire pour corriger l'orthographe, la ponctuation et la cohérence des temps."}],"coffre":[{"q":"À la rédaction, on choisit entre un sujet d'____ et un sujet de ____.","rep":"Mot attendu : imagination / réflexion"},{"q":"La rédaction attendue fait au minimum environ ____ à 50 lignes.","rep":"Mot attendu : 40"},{"q":"Avant d'écrire, on fait un ____ rapide au brouillon.","rep":"Mot attendu : plan"},{"q":"Un sujet de réflexion s'organise en introduction, développement (un argument + un ____ par paragraphe) et conclusion.","rep":"Mot attendu : exemple"},{"q":"À la fin, on se ____ pour corriger l'orthographe et les temps.","rep":"Mot attendu : relit"}],"frise":[],"oral":"Explique en 90 secondes ta méthode pour réussir la rédaction du brevet.","oralRedige":"Pour réussir la rédaction du brevet, la méthode compte autant que l'inspiration. D'abord, je lis bien le sujet et je choisis entre les deux types proposés : le sujet d'imagination, où je dois inventer un récit, et le sujet de réflexion, où je dois défendre un point de vue. Ensuite, et c'est essentiel, je ne me lance pas tête baissée : je fais un plan rapide au brouillon, environ cinq minutes. Pour un récit, je note les grandes étapes de l'histoire ; pour une réflexion, je note mes arguments avec un exemple pour chacun. Puis je rédige au propre en soignant l'introduction, qui présente le sujet, et la conclusion, qui apporte une réponse. Je vise au moins quarante à cinquante lignes et je vais à la ligne à chaque nouvelle idée ou nouvelle étape. Enfin, je garde une dizaine de minutes pour me relire et corriger l'orthographe, la ponctuation et la cohérence des temps. Une rédaction bien construite et relue rapporte beaucoup de points.","ecrit":{"consigne":"Sujet de réflexion. Rédige l'introduction et un paragraphe de développement (avec un argument et un exemple) sur ce sujet : « La lecture est-elle encore utile à notre époque ? »","min":"La lecture est-elle utile aujourd'hui ? Je pense que oui. D'abord, lire permet d'apprendre beaucoup de choses. Par exemple, un livre d'histoire nous apprend le passé. Donc la lecture est encore utile.","solide":"De nos jours, avec les écrans et les vidéos, on pourrait croire que lire ne sert plus à grand-chose. Pourtant, la lecture reste-t-elle utile à notre époque ? Je pense qu'elle l'est plus que jamais. Tout d'abord, la lecture enrichit les connaissances et le vocabulaire. En effet, en lisant régulièrement, on découvre des mots nouveaux et des idées variées : par exemple, un élève qui lit des romans s'exprime souvent mieux à l'écrit, car il a vu de nombreuses tournures de phrases. La lecture est donc un véritable outil d'apprentissage.","mention":"À l'heure des écrans, des vidéos courtes et des réseaux sociaux, beaucoup pensent que lire est devenu inutile, voire dépassé. Pourtant, on peut se demander si la lecture n'est pas, au contraire, encore plus précieuse aujourd'hui. Je suis convaincu qu'elle demeure essentielle, et je voudrais le montrer à travers plusieurs arguments.\n\nTout d'abord, la lecture enrichit considérablement les connaissances et la maîtrise de la langue. En lisant régulièrement, on rencontre des mots nouveaux, des tournures variées et des idées que l'on n'aurait pas croisées autrement. Par exemple, un élève qui lit des romans ou des articles s'exprime généralement avec plus d'aisance et de précision à l'écrit, parce qu'il a intériorisé, sans même s'en rendre compte, des milliers de phrases bien construites. Là où une vidéo livre une information toute faite, la lecture oblige l'esprit à travailler, à imaginer et à réfléchir. C'est en cela qu'elle reste un outil d'apprentissage irremplaçable, que rien n'a vraiment remplacé."},"ecritRedige":{"min":"La lecture est-elle utile aujourd'hui ? Je pense que oui. D'abord, lire permet d'apprendre beaucoup de choses. Par exemple, un livre d'histoire nous apprend le passé. Donc la lecture est encore utile.","solide":"De nos jours, avec les écrans et les vidéos, on pourrait croire que lire ne sert plus à grand-chose. Pourtant, la lecture reste-t-elle utile à notre époque ? Je pense qu'elle l'est plus que jamais. Tout d'abord, la lecture enrichit les connaissances et le vocabulaire. En effet, en lisant régulièrement, on découvre des mots nouveaux et des idées variées : par exemple, un élève qui lit des romans s'exprime souvent mieux à l'écrit, car il a vu de nombreuses tournures de phrases. La lecture est donc un véritable outil d'apprentissage.","mention":"À l'heure des écrans, des vidéos courtes et des réseaux sociaux, beaucoup pensent que lire est devenu inutile, voire dépassé. Pourtant, on peut se demander si la lecture n'est pas, au contraire, encore plus précieuse aujourd'hui. Je suis convaincu qu'elle demeure essentielle, et je voudrais le montrer à travers plusieurs arguments.\n\nTout d'abord, la lecture enrichit considérablement les connaissances et la maîtrise de la langue. En lisant régulièrement, on rencontre des mots nouveaux, des tournures variées et des idées que l'on n'aurait pas croisées autrement. Par exemple, un élève qui lit des romans ou des articles s'exprime généralement avec plus d'aisance et de précision à l'écrit, parce qu'il a intériorisé, sans même s'en rendre compte, des milliers de phrases bien construites. Là où une vidéo livre une information toute faite, la lecture oblige l'esprit à travailler, à imaginer et à réfléchir. C'est en cela qu'elle reste un outil d'apprentissage irremplaçable, que rien n'a vraiment remplacé."},"carte":"Carte mémoire : au centre « RÉDIGER », branches : choisir (imagination/réflexion), plan au brouillon, structure (intro, développement, conclusion), 40-50 lignes, relecture finale.","motscles":"rédaction, sujet d'imagination, sujet de réflexion, plan, introduction, développement, argument, exemple, conclusion, relecture, 40-50 lignes","vid":"","vidlab":""}}],"mat":{"fr_texte":{"titre":"La porte du grenier","auteur":"texte original, pour l'entraînement","corps":["Léa n'avait jamais aimé le grenier. Pourtant, ce soir-là, une curiosité plus forte que sa peur la poussa vers l'escalier étroit. Les marches gémissaient sous ses pas, comme si la maison elle-même cherchait à la retenir.","En haut, une seule porte. Le bois en était gonflé par l'humidité, et une poignée de cuivre, verte de vieillesse, semblait l'attendre depuis des années. Léa posa la main dessus. Elle était glacée.","« Je n'ai pas peur », murmura-t-elle, sans vraiment y croire. Elle tourna la poignée. La porte résista, puis céda d'un coup, dans un grincement qui lui hérissa la nuque.","Derrière, il n'y avait pas le débarras poussiéreux qu'elle imaginait. Une lumière douce, dorée, baignait une pièce qu'elle n'avait jamais vue. Au centre, posé sur une table, un vieux carnet relié de cuir attendait, ouvert."],"questions":[{"q":"Qui est le personnage principal ? Relève deux mots du texte qui montrent ce qu'elle ressent au début.","kw":["léa","peur","curiosité"],"aide":"Cherche un nom propre, puis des mots d'émotion dans le 1er paragraphe."},{"q":"Où se déroule la scène ? Justifie avec un élément précis du texte.","kw":["grenier","escalier","porte"],"aide":"Le lieu est nommé dès la 1re phrase."},{"q":"Relève une comparaison dans le texte et explique ce qu'elle exprime.","kw":["comme","maison","retenir"],"aide":"Cherche le mot « comme » : il introduit une comparaison."},{"q":"La dernière phrase donne envie de lire la suite. Explique pourquoi (ce qu'on découvre, ce qu'on ne sait pas encore).","kw":["carnet","mystère","suite"],"aide":"Qu'est-ce qui est laissé en suspens ?"}],"grammaire":[{"q":"« Les marches gémissaient sous ses pas. » Donne l'infinitif, le temps et le sujet du verbe.","sol":"gémir ; imparfait ; sujet = les marches."},{"q":"Réécris au passé composé : « Léa tourne la poignée et la porte cède. »","sol":"Léa a tourné la poignée et la porte a cédé."}]},"fr_dictee":{"titre":"Dictée : le départ","consigne":"Niveau brevet, environ 600 signes. Fais-toi lire le texte (ou lance la voix), écris-le, puis compare et compte tes fautes par type.","texte":"Lorsqu'elle quitta enfin la maison où elle avait grandi, Camille ne se retourna pas. Les volets que ses parents avaient repeints l'été précédent claquaient doucement dans le vent. Elle savait que les souvenirs qu'elle emportait ne s'effaceraient jamais, même si les années passaient. Au bout du chemin bordé de peupliers, une voiture l'attendait, chargée des quelques affaires qu'elle avait pu rassembler. Elle prit une longue inspiration, serra contre elle la vieille photographie jaunie, et comprit que cette journée resterait gravée dans sa mémoire.","pieges":["« Lorsqu'elle » élision","« avait grandi » plus-que-parfait, accord du participe","« que ses parents avaient repeints » accord du participe avec COD placé avant","« claquaient » accord du verbe avec volets","« qu'elle emportait » pronom relatif COD","« ne s'effaceraient jamais » conditionnel + négation","« bordé de peupliers » accord","« chargée » accord avec voiture (féminin)","« qu'elle avait pu rassembler » participe passé pu invariable","« gravée » accord avec journée"],"autres":[{"titre":"Dictée : l'orage","texte":"Le ciel s'était assombri en quelques minutes à peine. Les premières gouttes, larges et lourdes, frappèrent les carreaux que le vieil homme venait de fermer. Les arbres qu'il avait plantés autrefois ployaient sous les rafales, comme s'ils saluaient une force plus grande qu'eux. Réfugiés dans la cuisine, les enfants observaient, fascinés, les éclairs qui déchiraient l'horizon. Lorsque le calme revint, la terre mouillée exhalait une odeur que tous reconnurent aussitôt.","pieges":["« s'était assombri » plus-que-parfait pronominal","« larges et lourdes » accord avec gouttes","« frappèrent » passé simple, accord","« que le vieil homme venait de fermer » relative","« qu'il avait plantés » accord participe COD avant","« ployaient » accord avec arbres","« comme s'ils » élision","« Réfugiés » accord avec enfants (masculin pluriel)","« qui déchiraient » accord avec éclairs","« que tous reconnurent » passé simple"]}]},"hg_doc_14_18":{"titre":"Lettre d'un soldat (document reconstitué pour l'entraînement)","intro":"Texte original écrit dans l'esprit des lettres de poilus, pour s'entraîner à l'analyse. Ce n'est pas un document d'archive authentique.","corps":["« Ma chère Marguerite,","Voilà trois semaines que nous tenons cette tranchée. La boue nous monte aux genoux, et le bruit des obus ne s'arrête jamais, ni le jour ni la nuit. Hier, l'ordre est venu d'attaquer ; beaucoup des nôtres ne sont pas revenus.","On nous dit que l'arrière travaille pour nous : les usines tournent, les femmes y remplacent les hommes partis au front. Cela me donne du courage, mais je rêve surtout du jour où tout cela finira.","Embrasse les enfants. Ton mari qui pense à vous. »"],"questions":[{"q":"Présente le document : sa nature, l'époque et le contexte (méthode NADI).","kw":["lettre","guerre","tranchée","1914"],"aide":"Quel type de texte ? Quelle guerre ? Où est l'auteur ?"},{"q":"Relève deux éléments qui montrent les conditions de vie des soldats.","kw":["boue","obus","tranchée"],"aide":"Cherche dans le 2e paragraphe."},{"q":"Le document montre que les civils participent aussi à la guerre. Explique avec un exemple du texte, puis avec une connaissance du cours.","kw":["usines","femmes","arrière","totale"],"aide":"3e paragraphe + notion de guerre totale."}]},"svt_doc_immunite":{"titre":"Résultat d'expérience (données originales pour l'entraînement)","intro":"On mesure la quantité d'anticorps dans le sang après deux contacts avec le même microbe.","donnees":["1er contact : les anticorps apparaissent lentement, au bout d'environ 10 jours, en faible quantité.","2e contact (avec le même microbe, des semaines plus tard) : les anticorps apparaissent très vite, en 2 à 3 jours, et en quantité beaucoup plus grande."],"question":"Explique cette différence entre le 1er et le 2e contact. Utilise les mots « mémoire » et « anticorps ».","kw":["mémoire","anticorps","vaccin","rapide"],"aide":"Pense à ce que le corps « garde » après le 1er contact."},"geo_devcons":{"titre":"Aménager le territoire pour réduire les inégalités","consigne":"Rédige un développement construit d'une vingtaine de lignes : montre comment l'aménagement du territoire cherche à réduire les inégalités entre les espaces en France. Donne des exemples concrets (métropoles, espaces ruraux, ultramarins).","grille":["Minimum : citer 2 types d'espaces (métropole, espace rural/périphérique) et dire qu'il existe des inégalités d'accès (emploi, services, transports).","Solide : expliquer 2-3 actions d'aménagement (transports, très haut débit, services publics, zones d'activités) avec un exemple localisé.","Mention : structurer en intro/parties/conclusion, nuancer (les inégalités persistent), employer le vocabulaire (métropolisation, périurbain, ultramarin, désenclavement)."],"minutes":20},"emc_devcons":{"titre":"Être citoyen français et européen aujourd'hui","consigne":"Rédige un texte construit : explique ce que signifie être citoyen en France et dans l'Union européenne, quels sont les droits et les devoirs, et comment on participe à la vie démocratique.","grille":["Minimum : citer des droits (voter, s'exprimer) et des devoirs (respecter la loi, payer l'impôt, défense), dire qu'on vote à partir de 18 ans.","Solide : distinguer citoyenneté française et européenne, donner des formes de participation (vote, association, engagement), citer un symbole ou une valeur (devise, laïcité).","Mention : organiser le propos, relier droits et devoirs, mentionner la citoyenneté européenne (élections européennes, libre circulation) et nuancer."],"minutes":18},"maths_probleme":{"titre":"Problème : la sortie scolaire","consigne":"Un collège organise une sortie. Le car coûte 350 €. L'entrée du musée coûte 6 € par élève. 1) Exprime le coût total C en fonction du nombre n d'élèves. 2) Calcule C pour 25 élèves. 3) Le budget est de 700 €. Combien d'élèves au maximum peuvent partir ? Rédige tes calculs et une phrase de réponse.","grille":["1) C = 350 + 6n.","2) Pour n = 25 : C = 350 + 6×25 = 350 + 150 = 500 €.","3) 350 + 6n ≤ 700 → 6n ≤ 350 → n ≤ 58,33… donc 58 élèves au maximum. Phrase de réponse attendue."],"minutes":15},"pc_exercice":{"titre":"Exercice : vitesse et distance","consigne":"Une voiture parcourt 120 km en 1 h 30 min. 1) Convertis la durée en heures. 2) Calcule la vitesse moyenne en km/h (rédige la formule). 3) À cette vitesse, quelle distance en 2 h 15 ? Rédige tes calculs.","grille":["1) 1 h 30 = 1,5 h.","2) v = d / t = 120 / 1,5 = 80 km/h.","3) d = v × t = 80 × 2,25 = 180 km."],"minutes":12}},"plan":{"phases":[{"nom":"Phase 1 — Ancrage (5 au 13 juin)","desc":"On installe les bases : cahiers de révision, une matière après l'autre. Objectif : savoir le cours et la méthode."},{"nom":"Phase 2 — Entraînement (14 au 21 juin)","desc":"On bascule sur les sujets type brevet, en conditions. Objectif : appliquer sur des sujets nouveaux."},{"nom":"Phase 3 — Dernière ligne droite (22 au 25 juin)","desc":"Simulations chronométrées et révisions ciblées, calées sur l'ordre des épreuves. Objectif : être prêt le jour J."}],"jours":[{"d":"Ven. 5 juin","ph":1,"b1":["Histoire","Cahier HG-EMC : chapitre H1 (14-18), les 8 étapes."],"b2":["Maths","Cahier Maths : M1 calcul littéral, lis le rappel + refais l'exemple."],"note":"On démarre doucement : une matière littéraire, une scientifique."},{"d":"Sam. <script>'use strict';
/* ============ ÉTAT & PERSISTANCE ============ */
var SAVE_KEY='brevetquest_v1';
var state=load();
function load(){
  try{var s=JSON.parse(localStorage.getItem(SAVE_KEY));if(s)return s;}catch(e){}
  return {xp:0,streakDays:0,lastDay:null,best:{},stars:{},seen:{},box:{},done:0,parc:{}};
}
function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function bumpStreak(){var t=todayStr();if(state.lastDay===t)return;
  var y=new Date();y.setDate(y.getDate()-1);var ys=y.getFullYear()+'-'+(y.getMonth()+1)+'-'+y.getDate();
  state.streakDays=(state.lastDay===ys)?state.streakDays+1:1;state.lastDay=t;save();}

/* ============ NIVEAU / XP ============ */
function levelOf(xp){return Math.floor(Math.sqrt(xp/50))+1;}
function xpForLevel(l){return 50*(l-1)*(l-1);}
function levelProgress(){var l=levelOf(state.xp);var cur=xpForLevel(l),nxt=xpForLevel(l+1);
  return {l:l,pct:Math.round((state.xp-cur)/(nxt-cur)*100)};}

/* ============ DECOMPTE BREVET ============ */
function daysToBrevet(){var ex=new Date(2026,5,26);var now=new Date();
  return Math.max(0,Math.ceil((ex-now)/86400000));}

/* ============ COLLECTE DES ITEMS JOUABLES ============ */
// renvoie la liste d'items {type, ...} pour une matière donnée
function itemsFor(mat){
  var out=[];
  function pushChap(c,kind){
    // si le chapitre a une vidéo vérifiée, on l'utilise en priorité (lien direct)
    var vv=(DATA.videos&&DATA.videos[c.id]&&DATA.videos[c.id][0])?DATA.videos[c.id][0]:null;
    var vUrl=vv?vv.u:null, vLab=vv?vv.t:null;
    function pickVid(q){return {vid:vUrl||q.vid, vidlab:vLab||q.vidlab};}
    (c.qcm||[]).forEach(function(q,i){var pv=pickVid(q);out.push({type:'qcm',mat:mat,chap:c.id,titre:c.titre,key:c.id+'_qcm'+i,q:q.q,good:q.good,choices:q.choices,explain:q.explain,verif:q.verif,vid:pv.vid,vidlab:pv.vidlab});});
    (c.court||[]).forEach(function(q,i){var pv=pickVid(q);out.push({type:'court',mat:mat,chap:c.id,titre:c.titre,key:c.id+'_court'+i,q:q.q,sol:q.sol,kw:q.kw,explain:q.explain,vid:pv.vid,vidlab:pv.vidlab});});
    (c.exact||[]).forEach(function(q,i){var pv=pickVid(q);out.push({type:'exact',mat:mat,chap:c.id,titre:c.titre,key:c.id+'_exact'+i,q:q.q,sol:q.sol,detail:q.detail,explain:q.explain,vid:pv.vid,vidlab:pv.vidlab});});
  }
  if(mat==='histoire'||mat==='geo'||mat==='emc'){DATA.hg.filter(function(c){return c.matiere===mat;}).forEach(function(c){pushChap(c);});}
  else if(mat==='fr'){(DATA.fr||[]).forEach(function(c){pushChap(c);});}
  else if(mat==='maths'){DATA.mpc.filter(function(c){return c.matiere==='maths';}).forEach(function(c){pushChap(c);});}
  else if(mat==='pc'){DATA.mpc.filter(function(c){return c.matiere==='pc';}).forEach(function(c){pushChap(c);});}
  else if(mat==='svt'){DATA.svt.forEach(function(c){pushChap(c);});}
  return out;
}
// items "papier/clavier" (sujets longs)
function longFor(mat){
  var out=[];
  if(mat==='histoire'){var d=DATA.mat.hg_doc_14_18;out.push({type:'paper',mat:mat,titre:d.titre,doc:d,kind:'doc'});}
  if(mat==='fr'){

/* ============ RÉVISION ESPACÉE (boîtes de Leitman simplifiées) ============ */
function dueItems(items){
  var now=Date.now();
  return items.filter(function(it){var b=state.box[it.key];if(!b)return true;return b.due<=now;});
}
function gradeItem(key,ok){
  var b=state.box[key]||{lvl:0};
  if(ok)b.lvl=Math.min(5,b.lvl+1);else b.lvl=Math.max(0,b.lvl-1);
  var delays=[0,1,2,4,7,14]; // jours selon le niveau
  b.due=Date.now()+delays[b.lvl]*86400000;
  state.box[key]=b;save();
}

/* ============ NORMALISATION RÉPONSES ============ */
function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');}
function checkCourt(it,ans){
  var n=norm(ans);if(n.length<2)return false;
  var hit=0;it.kw.forEach(function(k){if(n.indexOf(norm(k))>=0)hit++;});
  return hit>=Math.max(1,Math.ceil(it.kw.length/2));
}
function checkExact(it,ans){
  var a=norm(ans),s=norm(it.sol);
  if(a===s)return true;
  // tolère espaces/×/^ déjà retirés par norm ; compare aussi sans 0 superflus
  return a.replace(/^0+/,'')===s.replace(/^0+/,'');
}

// ----- mission du jour : retrouve l'entrée du planning correspondant à aujourd'hui -----
// ----- planning du jour selon la récurrence (score -> nb de jours avant de revoir) -----
// Règle du cahier : raté (<3/5) -> revoir aujourd'hui puis J+1 ; hésitant (3-4) -> J+1 ; réussi (5) -> J+3 puis J+7.
function intervalForScore(sc,total){
  total=total||5; var r=sc/total;
  if(r<0.6)return 1;      // raté : à revoir dès le lendemain
  if(r<1)return 1;        // hésitant : J+1
  return 3;              // réussi : J+3 (puis 7 ensuite)
}
function dayNum(d){return Math.floor(d/86400000);} // jour entier depuis epoch
function dueChapters(){
  // renvoie les chapitres déjà travaillés qui sont "à revoir" aujourd'hui, triés par priorité
  var out=[]; var today=dayNum(Date.now());
  var P=state.parc||{};
  allChaps().forEach(function(c){
    var d=P[c.id]; if(!d||!d.fini)return;
    var sc=(d.retest!=null)?d.retest:(d.froid!=null?d.froid:0);
    var total=d.froidTotal||5;
    var last=d.lastDay||0;
    var reps=d.reps||0; // nombre de fois déjà revu en réussite (pour passer J+3 -> J+7)
    var interval=intervalForScore(sc,total);
    if(sc>=total)interval=(reps>=1)?7:3;
    var due=last+interval;
    out.push({c:c,sc:sc,total:total,due:due,over:today-due,interval:interval});
  });
  // à revoir = échéance atteinte (over>=0), priorité aux plus en retard et aux moins bien sus
  var todue=out.filter(function(o){return o.over>=0;});
  todue.sort(function(a,b){return (b.over-a.over)|| (a.sc/a.total-b.sc/b.total);});
  return todue;
}
function planToday(){
  var due=dueChapters();
  var P=state.parc||{};
  var doneToday=Object.keys(P).filter(function(id){return P[id].lastDay===dayNum(Date.now());}).length;
  // chapitres jamais faits (à découvrir) si rien n'est dû
  var neuf=allChaps().filter(function(c){return !P[c.id]||!P[c.id].fini;});
  return {due:due,neuf:neuf,doneToday:doneToday};
}

function todayMission(){
  if(!DATA.plan||!DATA.plan.jours)return null;
  var months={'jan':0,'fév':1,'fev':1,'mar':2,'avr':3,'mai':4,'juin':5,'juil':6,'aoû':7,'aou':7,'sep':8,'oct':9,'nov':10,'déc':11,'dec':11};
  var now=new Date();

  for(var i=0;i<DATA.plan.jours.length;i++){
    var d=DATA.plan.jours[i];var mm=d.d.match(/(\d+)\s+([a-zéûôA-Z]+)/);

    if(day===now.getDate()&&mon===now.getMonth())return {idx:i,d:d};

  return null; // hors période de révision
}

function buildPool(mat,mode){
  var items;
  if(mat==='__daily__'){items=[];['histoire','geo','emc','maths','pc','svt'].forEach(function(m){items=items.concat(itemsFor(m));});}
  else items=itemsFor(mat);
  if(mode==='qcm')items=items.filter(function(i){return i.type==='qcm';});
  else if(mode==='court')items=items.filter(function(i){return i.type==='court';});
  else if(mode==='exact')items=items.filter(function(i){return i.type==='exact';});
  else if(mode==='due')items=dueItems(items);
  else if(mode==='mix')items=dueItems(items).length>=6?dueItems(items):items;
  // shuffle
  for(var i=items.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=items[i];items[i]=items[j];items[j]=t;}
  return items;
}
function startSession(mat,mode,n){
  var pool=buildPool(mat,mode);
  if(!pool.length){toast('Rien à réviser ici pour le moment 👍');return;}
  S={mat:mat,mode:mode,items:pool.slice(0,n),idx:0,correct:0,combo:0,maxcombo:0,xp:0,t0:Date.now(),perQ:mode==='exact'?40:(mode==='court'?30:20)};
  bumpStreak();
  nextQuestion();
}

/* ----- SAUVEGARDER : instantané daté de la progression ----- */
function progressSnapshot(){
  var mats=['histoire','geo','emc','maths','pc','svt'];
  var per={};var totMast=0,totItems=0;
  mats.forEach(function(m){var items=itemsFor(m);var mast=items.filter(function(it){return (state.box[it.key]||{}).lvl>=3;}).length;
    per[m]=Math.round(mast/(items.length||1)*100);totMast+=mast;totItems+=items.length;});
  var ps=parcoursStats();
  return {date:new Date().toLocaleDateString('fr-FR'),ts:Date.now(),xp:state.xp,level:levelOf(state.xp),
    streak:state.streakDays||0,global:Math.round(totMast/(totItems||1)*100),per:per,
    parcDone:ps.totFini,parcStarted:ps.totDemarres,gain:ps.gainMoyen};
}
/* Agrège la progression réelle des parcours : chapitres démarrés / finis et
   gain moyen entre le score "à froid" et le score "après révision" (retest). */
function parcoursStats(){
  var P=state.parc||{};
  var mats=['histoire','geo','emc','fr','maths','pc','svt'];
  var perMat={};var totFini=0,totDemarres=0,gains=[];
  mats.forEach(function(m){
    var chaps=chapsOf(m);var total=chaps.length;
    var demarres=0,finis=0,gloc=[];
    chaps.forEach(function(c){
      var d=P[c.id];if(!d)return;
      if(d.froid!=null||d.fini)demarres++;
      if(d.fini)finis++;
      if(d.froid!=null && d.retest!=null)gloc.push(d.retest-d.froid);
    });
    var gMat=gloc.length?(gloc.reduce(function(a,b){return a+b;},0)/gloc.length):null;
    perMat[m]={total:total,demarres:demarres,finis:finis,gain:gMat,nGain:gloc.length};
    totFini+=finis;totDemarres+=demarres;gloc.forEach(function(g){gains.push(g);});
  });
  var gainMoyen=gains.length?Math.round((gains.reduce(function(a,b){return a+b;},0)/gains.length)*10)/10:null;
  return {perMat:perMat,totFini:totFini,totDemarres:totDemarres,totChap:51,gainMoyen:gainMoyen,nGain:gains.length};
}
function saveSnapshot(){
  state.snaps=state.snaps||[];
  var snap=progressSnapshot();
  // évite les doublons le même jour : remplace
  state.snaps=state.snaps.filter(function(s){return s.date!==snap.date;});
  state.snaps.push(snap);
  if(state.snaps.length>60)state.snaps=state.snaps.slice(-60);
  save();
  toast('💾 Progression enregistrée ('+snap.global+'% du programme)');
}

/* ----- NOUVEAU JEU : tirage neuf qui balaie TOUT le programme ----- */
/* On garde un compteur de passage par item ; un "nouveau jeu" reconstruit une file
   ordonnée pour couvrir tous les chapitres et tous les items avant de recycler. */
function newQuestionSet(){
  // collecte tous les items de toutes les matières
  var all=[];['histoire','geo','emc','maths','pc','svt'].forEach(function(m){all=all.concat(itemsFor(m));});
  state.seen=state.seen||{};
  // groupe par chapitre pour garantir la couverture chapitre par chapitre
  var byChap={};all.forEach(function(it){var c=it.mat+'/'+(it.chap||'?');(byChap[c]=byChap[c]||[]).push(it);});
  var chaps=Object.keys(byChap);
  // file équilibrée : on prend en round-robin un item du chapitre le moins vu
  var queue=[];
  // trie les items de chaque chapitre par nombre de passages croissant
  chaps.forEach(function(c){byChap[c].sort(function(a,b){return (state.seen[a.key]||0)-(state.seen[b.key]||0);});});
  var maxLen=Math.max.apply(null,chaps.map(function(c){return byChap[c].length;}));
  for(var r=0;r<maxLen;r++){
    // mélange l'ordre des chapitres à chaque tour pour alterner les matières
    var order=chaps.slice();for(var i=order.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=order[i];order[i]=order[j];order[j]=t;}
    order.forEach(function(c){if(byChap[c][r])queue.push(byChap[c][r]);});
  }
  state.freshQueue=queue.map(function(it){return it.key;});
  state.freshPos=0;
  save();
  toast('🔄 Nouveau jeu : '+chaps.length+' chapitres, '+queue.length+' questions, tout le programme couvert');
  // lance immédiatement une session sur cette file
  startFreshSession();
}
function startFreshSession(){
  if(!state.freshQueue||!state.freshQueue.length){toast('Lance d\'abord « Nouveau jeu »');return;}
  // reconstruit les items depuis les clés, par tranches de 12
  var allByKey={};['histoire','geo','emc','maths','pc','svt'].forEach(function(m){itemsFor(m).forEach(function(it){allByKey[it.key]=it;});});
  var slice=[];var pos=state.freshPos||0;
  while(slice.length<12 && pos<state.freshQueue.length){var it=allByKey[state.freshQueue[pos]];if(it)slice.push(it);pos++;}
  if(!slice.length){ // file épuisée -> on en régénère une
    state.freshPos=0;save();return newQuestionSet();
  }
  // marque comme vus
  slice.forEach(function(it){state.seen[it.key]=(state.seen[it.key]||0)+1;});
  state.freshPos=pos;save();
  S={mat:'__fresh__',mode:'mix',items:slice,idx:0,correct:0,combo:0,maxcombo:0,xp:0,t0:Date.now(),perQ:20};
  bumpStreak();nextQuestion();
}

      +'<input class="tinput" id="ti" placeholder="'+ph+'" autocomplete="off" autocapitalize="off"/>'
      +'<button class="primary" onclick="answerText()">Valider</button></div>';
  }
  app.innerHTML=hud()+head+'<div class="wrap">'+body

  var ti=document.getElementById('ti');if(ti){ti.focus();ti.addEventListener('keydown',function(e){if(e.key==='Enter')answerText();});}
  // timer
  var left=S.perQ;var tf=document.getElementById('tf'),tl=document.getElementById('tlab');
  tf.style.width='100%';
  timerInt=setInterval(function(){left--;tf.style.width=(left/S.perQ*100)+'%';tl.textContent=left+'s';
    if(left<=0){clearInterval(timerInt);timerInt=null;timeout();}},1000);
}
function timeout(){var it=S.items[S.idx];feedback(false,it,true);}
function answerQCM(btn,b64good){
  if(timerInt){clearInterval(timerInt);timerInt=null;}

function answerText(){

function feedback(ok,it,wasTimeout,ans){
  gradeItem(it.key,ok);

  state.hist=state.hist||[];

  var fb='<div class="fb '+(ok?'ok':'bad')+'">'
    +'<b>'+(ok?'✅ Bravo !':(wasTimeout?'⏰ Trop tard !':'❌ Pas tout à fait.'))+'</b>'

    if(left===60&&ph)ph.textContent='Dernière minute : termine ta phrase et conclus.';
    if(left<=0){clearInterval(paperInt);paperTimeUp();}
  },1000);
}

/* ============ SESSION DU JOUR (séries courtes + alternance des matières + pause + sujet papier) ============ */
/* Un parcours guidé : séries courtes de questions, alternance des matières,
   micro-pause toutes les ~2 manches, et un sujet papier minuté inséré. Basé sur :
   se tester souvent, espacer les révisions, varier les matières, faire des pauses. */
var SESS=null;
function startNeuro(){
  // construit un plan : on alterne les matières, priorité aux items "dus" (révision espacée)
  var mats=['histoire','geo','emc','maths','pc','svt'];
  // une "manche" = 6 questions d'une matière (active recall, timé)
  // plan : 3 séries + pause + 1 sujet papier + 2 séries
  var plan=[];
  var order=shuffle(mats);
  order.slice(0,3).forEach(function(m){plan.push({kind:'round',mat:m,n:6});});
  plan.push({kind:'break',sec:60});            // micro-pause
  // un sujet papier minuté si dispo
  var paperMat=['fr','histoire','svt'].filter(function(m){return longFor(m).length;})[0];
  if(paperMat)plan.push({kind:'paper',mat:paperMat,i:0});
  order.slice(3,5).forEach(function(m){plan.push({kind:'round',mat:m,n:6});});
  plan.push({kind:'done'});
  SESS={plan:plan,idx:0,xp:0,correct:0,total:0,t0:Date.now()};
  bumpStreak();
  runNeuro();
}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function runNeuro(){
  if(!SESS)return;
  if(SESS.idx>=SESS.plan.length){return neuroResult();}
  var step=SESS.plan[SESS.idx];
  if(step.kind==='done'){return neuroResult();}
  if(step.kind==='break'){return neuroBreak(step.sec);}
  if(step.kind==='paper'){ // lance le sujet papier en mode "fromSession"
    return startPaper(step.mat,step.i,true);
  }
  if(step.kind==='round'){ return neuroRound(step); }
}
// micro-pause guidée
function neuroBreak(sec){
  var th=TH('emc');
  app.innerHTML=hud()+'<div class="wrap"><div class="result" style="padding:40px 0 10px">'
    +'<div style="font-size:48px">🌿</div><h2>Micro-pause</h2>'
    +'<p class="line">Lève les yeux de l\'écran, respire, étire-toi.</p>'
    +'<p class="line">Le cerveau consolide ce que tu viens de réviser pendant la pause.</p>'
    +'<div class="big" id="bclock" style="font-size:50px">'+fmt(sec)+'</div></div>'
    +'<button class="primary" onclick="endBreak()">Je suis prêt, on continue →</button></div>'+tabbar('');
  var left=sec; if(window._bint)clearInterval(window._bint);
  window._bint=setInterval(function(){left--;var c=document.getElementById('bclock');if(!c){clearInterval(window._bint);return;}c.textContent=fmt(left);if(left<=0){clearInterval(window._bint);endBreak();}},1000);
}
function endBreak(){if(window._bint)clearInterval(window._bint);SESS.idx++;runNeuro();}
// une manche = mini-session timée de n questions (réutilise le moteur de session)
function neuroRound(step){
  var pool=buildPool(step.mat,'mix'); // priorité aux items dus, sinon tous
  if(!pool.length)pool=buildPool(step.mat,'qcm');
  if(!pool.length){SESS.idx++;return runNeuro();}
  S={mat:step.mat,mode:'neuro',items:pool.slice(0,step.n),idx:0,correct:0,combo:0,maxcombo:0,xp:0,t0:Date.now(),perQ:18,_neuro:true};
  nextQuestion();
}
// quand une manche neuro se termine, on revient au plan au lieu d'afficher l'écran de résultat
function neuroRoundEnd(){
  SESS.correct+=S.correct;SESS.total+=S.items.length;SESS.xp+=S.xp;
  S=null;SESS.idx++;
  // petit interstitiel d'encouragement entre les manches
  var msgs=['Manche terminée 💪','Belle série, on enchaîne 🔥','Tu avances bien 🚀','Le cerveau adore ça 🧠'];
  var m=msgs[Math.floor(Math.random()*msgs.length)];
  toast(m);
  runNeuro();
}
function neuroResult(){
  var pct=SESS.total?Math.round(SESS.correct/SESS.total*100):0;
  var mins=Math.round((Date.now()-SESS.t0)/60000);
  app.innerHTML=hud()+'<div class="wrap"><div class="result">'
    +'<div class="big">🎉</div><h2>Session terminée</h2>'
    +'<div class="line">'+SESS.correct+' / '+SESS.total+' bonnes réponses ('+pct+'%)</div>'
    +'<div class="line">+'+SESS.xp+' XP · '+mins+' min de concentration</div>'
    +'<div class="badge">🔁 Tu t\'es testé</div><div class="badge">🖇 Plusieurs matières</div><div class="badge">⏸ Avec une pause</div>'
    +'<p class="muted" style="margin-top:16px">Reviens demain : la répétition espacée te represente les bonnes questions au bon moment. La régularité bat les longues sessions.</p>'
    +'</div><button class="primary" onclick="startNeuro()">↻ Nouvelle session</button>'
    +'<button class="ghost" onclick="screenHub()">Retour à l\'accueil</button></div>'+tabbar('hub');
  SESS=null;
}

/* ============ PARCOURS GUIDÉ EN 8 ÉTAPES (cahier élève) ============ */

function parcReveal(id){var e=document.getElementById(id);if(e)e.style.display=e.style.display==='none'?'block':'none';}
function parcShow(phase,i){if(phase==='F'){if(!PARC.shownF)PARC.shownF={};PARC.shownF['q'+i]=true;}else{if(!PARC.shownR)PARC.shownR={};PARC.shownR['q'+i]=true;}parcStep();}
function parcMark(phase,i,val){
  var d=state.parc[PARC.id];
  var key=phase==='froid'?'froidMark':'retestMark';
  if(!d[key])d[key]={};
  d[key]['q'+i]=val;
  // score auto = nombre de "ok"
  var sc=Object.keys(d[key]).filter(function(k){return d[key][k]==='ok';}).length;
  if(phase==='froid'){d.froid=sc;d.froidTotal=PARC.p.froid.length;}
  else{d.retest=sc;}
  save();parcStep();
}
function parcSaveCarte(){var t=document.getElementById('cartetxt');if(t){state.parc[PARC.id].carte=t.value;save();toast('Carte gardée');}}

// minuteur oral 90 s
var ORALT=null;
function parcOralStart(){var n=90;var el=document.getElementById('oralt');parcOralStop();ORALT=setInterval(function(){n--;if(el)el.textContent=n;if(n<=0){parcOralStop();if(el)el.textContent='✓';}},1000);}
function parcOralStop(){if(ORALT){clearInterval(ORALT);ORALT=null;}}
// minuteur mini-écrit 12 min
var ECRT=null;
function parcEcritStart(){var n=12*60;var el=document.getElementById('ecrt');parcEcritStop();ECRT=setInterval(function(){n--;var m=Math.floor(n/60),s=n%60;if(el)el.textContent=m+':'+(s<10?'0':'')+s;if(n<=0){parcEcritStop();if(el)el.textContent='Terminé';}},1000);}
function parcEcritStop(){if(ECRT){clearInterval(ECRT);ECRT=null;}}

function parcFinish(){
  parcOralStop();parcEcritStop();
  var d=state.parc[PARC.id];
  d.fini=true;
  d.lastDay=Math.floor(Date.now()/86400000);
  var sc=(d.retest!=null)?d.retest:(d.froid!=null?d.froid:0);
  var total=d.froidTotal||5;
  if(sc>=total)d.reps=(d.reps||0)+1; else d.reps=0; // réussite parfaite : on avance vers J+7
  save();
  state.xp=(state.xp||0)+20;
  toast('Chapitre '+PARC.id+' terminé ! +20 XP');
  screenMat(PARC.mat);
}

function screenProgramme(){

  // un thème est "couvert" si un parcours existe pour ce code (HG-EMC) ; sinon "à venir"
  function chapExists(code){
    if(allChaps().some(function(c){return c.id===code&&c.parcours;}))return true;
    return false;
  }
  var blocks=order.filter(function(m){return P[m];}).map(function(m){
    var th=TH(m);var mat=P[m];
    var nTh=mat.themes.length;var covered=mat.themes.filter(function(t){return chapExists(t.code);}).length;
    var rows=mat.themes.map(function(t){
      var ok=chapExists(t.code);
      return '<div style="border:1px solid var(--line);border-left:5px solid '+th.c+';border-radius:12px;padding:11px 13px;margin:0 0 9px;background:#fff">'
        +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
        +'<span style="font-weight:800;font-size:11px;padding:3px 9px;border-radius:999px;background:'+th.c+'22;color:'+th.c+'">'+t.code+'</span>'
        +'<span style="font-weight:800;font-size:11px;padding:3px 9px;border-radius:999px;background:'+(ok?'#EAF7EE;color:#16a34a':'#FFF3E0;color:#C77700')+'">'+(ok?'✓ parcours dispo':'⏳ à venir')+'</span>'
        +(ok?'<button class="ghost" style="font-size:12px;padding:3px 10px;margin-left:auto" onclick="startParcours(\''+t.code+'\')">Réviser →</button>':'')
        +'</div>'
        +'<div style="font-family:\'Fraunces\',serif;font-weight:800;font-size:16px;margin:7px 0 5px">'+esc(t.titre)+'</div>'
        +'<div style="font-size:13px;color:var(--grey);line-height:1.5">'+t.notions.map(esc).join(' · ')+'</div>'
        +'</div>';
    }).join('');
    return '<div class="section-title" style="font-size:18px">'+th.pic+' '+esc(mat.nom)+' <span style="font-size:12px;color:var(--grey);font-weight:700">('+covered+'/'+nTh+' thèmes prêts · '+esc(mat.points)+')</span></div>'+rows;
  }).join('');
  app.innerHTML=hud()+'<div class="wrap">'

    +'</div>'+tabbar('');
}

// Graine du jour (change à minuit) : nombre de jours depuis l'origine.
function daySeed(){return Math.floor(Date.now()/86400000);}
// Choisit un exercice du chapitre de façon déterministe selon (graine du jour + variante + position).
function pickExo(c,seed,pos){
  var bank=(c.exos&&c.exos.length)?c.exos
    :[{consigne:(c.paper&&c.paper.consigne)||'',
       mention:(c.parcours&&c.parcours.ecritRedige)?c.parcours.ecritRedige.mention:((c.paper&&c.paper.grille)?c.paper.grille[c.paper.grille.length-1]:'')}];
  var idx=Math.abs((seed*31 + pos*7))%bank.length;
  return bank[idx];
}

    +'.head{border:2px solid #111;border-radius:8px;padding:12px 16px;margin-bottom:18px}'

    +'.exo-h{font-weight:bold;font-size:15px;border-bottom:1px solid #999;padding-bottom:4px;margin-bottom:8px}'
    +'.exo-th{font-weight:normal;font-style:italic;color:#555;font-size:13px}'
    +'.exo-c{font-size:14px;margin-bottom:10px;white-space:pre-line}'
    +'.lg{border-bottom:1px solid #ccc;height:22px}'
    +'.note{font-size:12px;color:#666;font-style:italic;margin:14px 0}'
    +'.pb{page-break-before:always}'
    +'.cor{margin:0 0 16px;page-break-inside:avoid}'
    +'.cor-h{font-weight:bold;font-size:14px;color:#0a5;margin-bottom:6px}'
    +'.cor-c{font-size:13px;background:#f6f6f6;border-left:3px solid #0a5;padding:8px 12px}'
    +'.barre{text-align:center;margin:22px 0}'
    +'.barre button{font-size:15px;padding:10px 18px;border:0;border-radius:8px;background:#111;color:#fff;cursor:pointer;margin:0 4px}'
    +'.barre .alt{background:#e8a13a}'
    +'@media print{.barre,.no-print{display:none}}'
    +'</style></head><body>'
    +'<div class="barre no-print"><button onclick="window.print()">🖨️ Imprimer ce sujet</button>'
    +'<button class="alt" onclick="opener && opener.openSujet(\''+m+'\','+(variante+1)+'); window.close();">🎲 Tirer un autre sujet</button></div>'

    +'<div class="meta" style="margin-top:4px"><b>Date de l\'épreuve :</b> '+esc(S.date)+' &nbsp;·&nbsp; <b>Durée :</b> '+esc(S.duree)+' &nbsp;·&nbsp; <b>Barème :</b> '+esc(S.bareme)+'</div>'

/* ============ BIBLIOTHÈQUE VIDÉOS (par matière puis thème) ============ */
function chapTitle(id){
  // retrouve le titre d'un chapitre à partir de son id
  var c=(DATA.mpc||[]).find(function(x){return x.id===id;});
  if(c)return c.titre;
  c=(DATA.hg||[]).find(function(x){return x.id===id;});
  if(c)return c.titre;
  c=(DATA.svt||[]).find(function(x){return x.id===id;});
  if(c)return c.titre;
  return id;
}
function chapMat(id){
  if(id[0]==='M')return 'maths';
  if(id[0]==='P')return 'pc';
  if(id[0]==='S')return 'svt';
  if(id[0]==='H')return 'histoire';
  if(id[0]==='G')return 'geo';
  if(id[0]==='E')return 'emc';
  return 'autre';
}
function videosForMat(mat){
  var V=DATA.videos||{};var out=[];
  Object.keys(V).forEach(function(id){if(chapMat(id)===mat)out.push({id:id,titre:chapTitle(id),vids:V[id]});});
  return out;
}
function screenVideos(only){
  var V=DATA.videos||{};
  var mats=['maths','pc','histoire','geo','emc','svt','fr'];
  if(only)mats=[only];
  var sections=mats.map(function(m){
    var th=TH(m);var chaps=videosForMat(m);
    if(!chaps.length){
      // pas encore de vidéo vérifiée pour cette matière : on l'indique honnêtement
      return only?('<div class="intro-card"><b>'+th.pic+' '+th.nom+'</b><p class="muted" style="margin:6px 0 0">Pas encore de vidéo vérifiée pour cette matière dans le jeu. En attendant, tape le thème sur Lumni ou YouTube.</p></div>'):'';
    }
    var blocks=chaps.map(function(c){
      var links=c.vids.map(function(v){return '<a class="vidlink" href="'+v.u+'" target="_blank" rel="noopener" style="display:block;margin:5px 0">🎬 '+esc(v.t)+'</a>';}).join('');
      return '<div style="margin:10px 0"><div style="font-weight:800;font-size:14.5px;color:'+th.c+'">'+esc(c.titre)+'</div>'+links+'</div>';
    }).join('');
    return '<div class="intro-card" style="border-left:6px solid '+th.c+'"><h3>'+th.pic+' '+th.nom+'</h3>'+blocks+'</div>';
  }).join('');
  app.innerHTML=hud()+'<div class="wrap">'
    +'<div class="section-title">'+(only?TH(only).nom+' : vidéos':'Bibliothèque vidéos')+'</div>'
    +'<p class="muted">Des vidéos de cours et de méthode, vérifiées une par une. Clique : la vidéo se lance directement. Maths et physique-chimie sont couvertes (chaîne Yvan Monka et révisions brevet). Les autres matières arrivent.</p>'
    + sections
    +'<div class="backrow"><button class="ghost" onclick="'+(only?'screenMat(\''+only+'\')':'screenHub()')+'">← Retour</button></div>'
    +'</div>'+tabbar(only?'':'vid');
}

function screenPlan(){
  if(!DATA.plan||!DATA.plan.jours){app.innerHTML=hud()+'<div class="wrap"><p class="muted">Planning indisponible.</p></div>'+tabbar('');return;}
  var today=todayMission();var todayIdx=today?today.idx:-1;
  // bloc phases
  var phasesHTML=(DATA.plan.phases||[]).map(function(p){return '<div class="intro-card" style="padding:12px"><b>'+esc(p.nom)+'</b><p class="muted" style="margin:4px 0 0">'+esc(p.desc)+'</p></div>';}).join('');
  function blk(b){if(!b)return '';var key=matKeyFromLabel(b[0]);var th=key?TH(key):null;
    return '<div class="blk" style="cursor:default"><span class="e">'+(th?th.pic:'📘')+'</span><span><b>'+esc(b[0])+'</b><span>'+esc(b[1])+'</span></span></div>';}
  var jours=DATA.plan.jours.map(function(d,i){
    var isToday=(i===todayIdx);
    return '<div class="mission" style="'+(isToday?'border-left-color:#16A34A;box-shadow:0 0 0 2px #16A34A33':'')+'">'
      +'<div class="day" style="'+(isToday?'color:#16A34A':'')+'">'+(isToday?'➡ ':'')+esc(d.d)+(isToday?' · aujourd\'hui':'')+'</div>'
      + blk(d.b1) + blk(d.b2)
      +(d.note?'<div class="note">💡 '+esc(d.note)+'</div>':'')
      +'</div>';
  }).join('');
  // épreuves
  var epr=(DATA.plan.epreuves||[]).map(function(e){return '<div class="blk" style="background:var(--badbg);cursor:default"><span class="e">📝</span><span><b>'+esc(e[0])+' · '+esc(e[1])+'</b><span>'+esc(e[2]||'')+'</span></span></div>';}).join('');
  app.innerHTML=hud()+'<div class="wrap">'
    +'<div class="section-title">Planning de travail recommandé</div>'
    +'<p class="muted">Du 5 au 25 juin, deux petits blocs par jour : une matière littéraire, une scientifique. Rien d\'obligatoire, c\'est un fil conducteur pour ne rien oublier et avancer sans surcharge.</p>'
    + phasesHTML
    + jours
    +(epr?'<div class="section-title" style="font-size:18px">Les épreuves</div>'+epr:'')
    +'<div class="backrow"><button class="ghost" onclick="screenHub()">← Retour à l\'accueil</button></div>'
    +'</div>'+tabbar('');
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function b64(s){try{return btoa(unescape(encodeURIComponent(s)));}catch(e){return '';}}

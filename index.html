tion massique indique la masse de soluté dissoute par litre de solution."],"formules":["ρ = m ÷ V   (masse volumique)","c = m ÷ V   (concentration massique, en g/L)"],"resolu":{"enonce":"Un objet a une masse de 200 g et un volume de 250 mL. Calculer sa masse volumique.","etapes":["J'applique la formule : ρ = m ÷ V = 200 ÷ 250.","Je calcule : 200 ÷ 250 = 0,8.","La masse volumique est 0,8 g/mL."],"resultat":"0,8 g/mL"},"exact":[],"qcm":[{"q":"Un bloc a une masse de 240 g et un volume de 300 cm³. Quelle est sa masse volumique ?","good":"0,8 g/cm³","choices":["0,8 g/cm³","60 g/cm³","1,25 g/cm³","72 000 g/cm³"],"explain":"ρ = m/V = 240/300 = 0,8 g/cm³. Erreur : inverser le rapport (300/240=1,25).","verif":"ρ = masse ÷ volume."},{"q":"Un liquide a une masse volumique de 0,9 g/cm³ (eau : 1 g/cm³). Que se passe-t-il si on le verse dans l'eau, sans qu'ils se mélangent ?","good":"Il flotte sur l'eau (il est moins dense)","choices":["Il flotte sur l'eau (il est moins dense)","Il coule sous l'eau","Il s'évapore","Il se dissout aussitôt"],"explain":"Un liquide moins dense que l'eau (0,9 < 1) flotte au-dessus. C'est le cas de l'huile par exemple.","verif":"Moins dense que l'eau (< 1 g/cm³) = flotte ; plus dense = coule."},{"q":"On dissout 30 g de sel dans de l'eau pour obtenir 0,5 L de solution. Quelle est la concentration massique ? (C = m/V)","good":"60 g/L","choices":["30 g/L","15 g/L","0,06 g/L","60 g/L"],"explain":"C = m/V = 30/0,5 = 60 g/L. Erreur : multiplier (30×0,5=15) au lieu de diviser par 0,5.","verif":"C = masse de soluté ÷ volume de solution."},{"q":"On veut 2 L d'une solution à 8 g/L de sucre. Quelle masse de sucre faut-il dissoudre ? (m = C × V)","good":"16 g","choices":["8 g","0,25 g","16 g","4 g"],"explain":"m = C × V = 8 × 2 = 16 g. Erreur : diviser (8/2=4) au lieu de multiplier.","verif":"De C = m/V on tire m = C × V."}],"paper":{"consigne":"Exercice type brevet. Un bloc de métal a une masse de 270 g et un volume de 100 cm³. 1) Calcule sa masse volumique. 2) Ce métal (l'eau vaut 1 g/cm³) flotte-t-il ? (Méthode : formule, valeurs avec unités, résultat.)","grille":["1) ρ = m/V = 270/100 = 2,7 g/cm³.\n2) 2,7 g/cm³ > 1 g/cm³, donc il coule (il ne flotte pas).","1) Formule : ρ = m / V, avec m = 270 g et V = 100 cm³.\nρ = 270 / 100 = 2,7 g/cm³.\n2) La masse volumique du métal (2,7 g/cm³) est supérieure à celle de l'eau (1 g/cm³). Le bloc est donc plus dense que l'eau : il coule.","1) Masse volumique du métal.\nFormule littérale : ρ = m / V.\nApplication numérique avec unités : ρ = 270 g / 100 cm³.\nCalcul : ρ = 2,7 g/cm³.\n\n2) Le métal flotte-t-il ?\nOn compare la masse volumique du métal à celle de l'eau. Le métal a une masse volumique de 2,7 g/cm³, l'eau de 1 g/cm³. Comme 2,7 > 1, le métal est plus dense que l'eau, donc il coule et ne flotte pas.\n\nConclusion : la masse volumique du métal est de 2,7 g/cm³ ; ce bloc coule dans l'eau. (Cette valeur de 2,7 g/cm³ correspond d'ailleurs à celle de l'aluminium.)"],"type":"probleme","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},"exos":[{"consigne":"Exercice type brevet. Un bloc de métal a une masse de 270 g et un volume de 100 cm³. 1) Calcule sa masse volumique. 2) Ce métal (l'eau vaut 1 g/cm³) flotte-t-il ? (Méthode : formule, valeurs avec unités, résultat.)","min":"1) ρ = m/V = 270/100 = 2,7 g/cm³.\n2) 2,7 g/cm³ > 1 g/cm³, donc il coule (il ne flotte pas).","solide":"1) Formule : ρ = m / V, avec m = 270 g et V = 100 cm³.\nρ = 270 / 100 = 2,7 g/cm³.\n2) La masse volumique du métal (2,7 g/cm³) est supérieure à celle de l'eau (1 g/cm³). Le bloc est donc plus dense que l'eau : il coule.","mention":"1) Masse volumique du métal.\nFormule littérale : ρ = m / V.\nApplication numérique avec unités : ρ = 270 g / 100 cm³.\nCalcul : ρ = 2,7 g/cm³.\n\n2) Le métal flotte-t-il ?\nOn compare la masse volumique du métal à celle de l'eau. Le métal a une masse volumique de 2,7 g/cm³, l'eau de 1 g/cm³. Comme 2,7 > 1, le métal est plus dense que l'eau, donc il coule et ne flotte pas.\n\nConclusion : la masse volumique du métal est de 2,7 g/cm³ ; ce bloc coule dans l'eau. (Cette valeur de 2,7 g/cm³ correspond d'ailleurs à celle de l'aluminium.)"},{"consigne":"Exercice type brevet. On mesure 50 cm³ d'huile dont la masse est de 46 g. 1) Calcule la masse volumique de l'huile. 2) Sachant que l'eau a une masse volumique de 1 g/cm³, explique pourquoi l'huile flotte sur l'eau.","min":"1) ρ = m/V = 46/50 = 0,92 g/cm³.\n2) 0,92 < 1 : l'huile est moins dense que l'eau, donc elle flotte.","solide":"1) Formule : ρ = m / V, avec m = 46 g et V = 50 cm³.\nρ = 46 / 50 = 0,92 g/cm³.\n2) La masse volumique de l'huile (0,92 g/cm³) est inférieure à celle de l'eau (1 g/cm³). L'huile est donc moins dense que l'eau, c'est pourquoi elle flotte à sa surface.","mention":"1) Masse volumique de l'huile.\nFormule littérale : ρ = m / V.\nApplication numérique avec unités : ρ = 46 g / 50 cm³.\nCalcul : ρ = 0,92 g/cm³.\n\n2) Pourquoi l'huile flotte.\nOn compare la masse volumique de l'huile à celle de l'eau. L'huile a une masse volumique de 0,92 g/cm³, l'eau de 1 g/cm³. Comme 0,92 < 1, l'huile est moins dense que l'eau : pour un même volume, l'huile est plus légère. C'est la raison pour laquelle l'huile reste à la surface et flotte sur l'eau.\n\nConclusion : la masse volumique de l'huile est de 0,92 g/cm³ ; étant inférieure à celle de l'eau, elle explique que l'huile flotte. Cela illustre la règle générale : un corps moins dense qu'un liquide flotte sur ce liquide."},{"consigne":"Exercice type brevet. On dissout 15 g de sel dans de l'eau pour obtenir 0,5 L de solution. 1) Calcule la concentration massique en sel. 2) Quel est le soluté et quel est le solvant ?","min":"1) C = m/V = 15/0,5 = 30 g/L.\n2) Soluté : le sel. Solvant : l'eau.","solide":"1) Formule de la concentration massique : C = m / V, avec m = 15 g et V = 0,5 L.\nC = 15 / 0,5 = 30 g/L.\n2) Le soluté est la substance dissoute, ici le sel. Le solvant est le liquide qui dissout, ici l'eau.","mention":"1) Concentration massique.\nLa concentration massique est la masse de soluté dissoute par litre de solution.\nFormule littérale : C = m / V.\nApplication numérique avec unités : C = 15 g / 0,5 L.\nCalcul : C = 30 g/L.\n\n2) Soluté et solvant.\nDans une solution, le soluté est la substance que l'on dissout : ici, c'est le sel. Le solvant est le liquide dans lequel a lieu la dissolution : ici, c'est l'eau.\n\nConclusion : la concentration massique de la solution est de 30 g/L. Le sel est le soluté et l'eau le solvant. On peut vérifier la cohérence : 15 g dans un demi-litre, cela fait bien 30 g pour un litre entier."}],"parcours":{"mission":"À la fin, tu sais calculer une masse volumique avec ρ = m/V et une concentration massique.","froid":[{"q":"Quelle est la formule de la masse volumique ?","rep":"ρ = m / V (masse divisée par volume)."},{"q":"Quelles sont les unités courantes de masse volumique ?","rep":"Le g/cm³ ou le kg/m³ (l'eau a une masse volumique de 1 g/cm³, soit 1000 kg/m³)."},{"q":"Comment savoir si un objet flotte sur l'eau ?","rep":"S'il est moins dense que l'eau (masse volumique inférieure à 1 g/cm³), il flotte ; sinon il coule."},{"q":"Qu'est-ce qu'une concentration massique ?","rep":"La masse de soluté dissoute par litre de solution : C = m / V (en g/L)."},{"q":"Dans une solution, qu'est-ce que le soluté et le solvant ?","rep":"Le soluté est ce qui est dissous ; le solvant est le liquide qui dissout (souvent l'eau)."}],"coffre":[{"q":"La masse volumique se calcule par ρ = m / ____.","rep":"Mot attendu : V"},{"q":"La masse volumique de l'eau vaut 1 g/cm³, soit ____ kg/m³.","rep":"Mot attendu : 1000"},{"q":"Un objet moins dense que l'eau ____ ; un objet plus dense coule.","rep":"Mot attendu : flotte"},{"q":"La concentration massique se calcule par C = m / ____, en g/L.","rep":"Mot attendu : V"},{"q":"Dans une solution, le ____ est la substance dissoute, le solvant est le liquide qui dissout.","rep":"Mot attendu : soluté"}],"frise":[],"oral":"Explique en 90 secondes ce qu'est la masse volumique et comment savoir si un objet flotte.","oralRedige":"La masse volumique indique si une matière est lourde ou légère pour un volume donné : c'est la masse divisée par le volume, ρ égale m sur V. On l'exprime souvent en grammes par centimètre cube ou en kilogrammes par mètre cube. Une valeur de référence à connaître est celle de l'eau : 1 gramme par centimètre cube, ce qui équivaut à 1000 kilogrammes par mètre cube. La masse volumique sert notamment à prévoir si un objet flotte : un objet dont la masse volumique est inférieure à celle de l'eau flotte, comme le bois, tandis qu'un objet plus dense coule, comme le fer. Une notion proche est la concentration massique d'une solution : c'est la masse de soluté dissoute par litre de solution, C égale m sur V, en grammes par litre. Dans une solution, on appelle soluté la substance qu'on dissout, et solvant le liquide qui la dissout, le plus souvent l'eau.","ecrit":{"consigne":"Exercice type brevet. Un bloc de métal a une masse de 270 g et un volume de 100 cm³. 1) Calcule sa masse volumique. 2) Ce métal (l'eau vaut 1 g/cm³) flotte-t-il ? (Méthode : formule, valeurs avec unités, résultat.)","min":"1) ρ = m/V = 270/100 = 2,7 g/cm³.\n2) 2,7 g/cm³ > 1 g/cm³, donc il coule (il ne flotte pas).","solide":"1) Formule : ρ = m / V, avec m = 270 g et V = 100 cm³.\nρ = 270 / 100 = 2,7 g/cm³.\n2) La masse volumique du métal (2,7 g/cm³) est supérieure à celle de l'eau (1 g/cm³). Le bloc est donc plus dense que l'eau : il coule.","mention":"1) Masse volumique du métal.\nFormule littérale : ρ = m / V.\nApplication numérique avec unités : ρ = 270 g / 100 cm³.\nCalcul : ρ = 2,7 g/cm³.\n\n2) Le métal flotte-t-il ?\nOn compare la masse volumique du métal à celle de l'eau. Le métal a une masse volumique de 2,7 g/cm³, l'eau de 1 g/cm³. Comme 2,7 > 1, le métal est plus dense que l'eau, donc il coule et ne flotte pas.\n\nConclusion : la masse volumique du métal est de 2,7 g/cm³ ; ce bloc coule dans l'eau. (Cette valeur de 2,7 g/cm³ correspond d'ailleurs à celle de l'aluminium.)"},"ecritRedige":{"min":"1) ρ = m/V = 270/100 = 2,7 g/cm³.\n2) 2,7 g/cm³ > 1 g/cm³, donc il coule (il ne flotte pas).","solide":"1) Formule : ρ = m / V, avec m = 270 g et V = 100 cm³.\nρ = 270 / 100 = 2,7 g/cm³.\n2) La masse volumique du métal (2,7 g/cm³) est supérieure à celle de l'eau (1 g/cm³). Le bloc est donc plus dense que l'eau : il coule.","mention":"1) Masse volumique du métal.\nFormule littérale : ρ = m / V.\nApplication numérique avec unités : ρ = 270 g / 100 cm³.\nCalcul : ρ = 2,7 g/cm³.\n\n2) Le métal flotte-t-il ?\nOn compare la masse volumique du métal à celle de l'eau. Le métal a une masse volumique de 2,7 g/cm³, l'eau de 1 g/cm³. Comme 2,7 > 1, le métal est plus dense que l'eau, donc il coule et ne flotte pas.\n\nConclusion : la masse volumique du métal est de 2,7 g/cm³ ; ce bloc coule dans l'eau. (Cette valeur de 2,7 g/cm³ correspond d'ailleurs à celle de l'aluminium.)"},"carte":"Carte mémoire : au centre « MASSE VOLUMIQUE », branches : ρ = m/V, eau = 1 g/cm³ = 1000 kg/m³, flotte si moins dense que l'eau, concentration C = m/V (g/L), soluté/solvant.","motscles":"masse volumique, ρ = m/V, g/cm³, kg/m³, flotter, couler, densité, concentration massique C = m/V, soluté, solvant","vid":"https://www.lumni.fr/college/troisieme/physique-chimie","vidlab":"Vidéo du chapitre"}},{"id":"P5","matiere":"pc","titre":"La matière : atomes, molécules, ions et pH","objectif":"À la fin, tu sais distinguer atome, molécule et ion, lire le pH d'une solution et équilibrer une équation simple.","retiens":["Un atome est neutre. Un ion est un atome (ou groupe d'atomes) qui a gagné ou perdu des électrons : il porte alors une charge (+ s'il a perdu, − s'il a gagné).","Une molécule est un assemblage d'atomes (ex. l'eau H₂O contient 2 atomes d'hydrogène et 1 d'oxygène).","Le pH mesure l'acidité : inférieur à 7 = acide, égal à 7 = neutre, supérieur à 7 = basique."],"formules":["pH < 7 : acide   |   pH = 7 : neutre   |   pH > 7 : basique"],"resolu":{"enonce":"L'ion sodium s'écrit Na⁺. Expliquer ce que signifie le « + ».","etapes":["Le sodium Na est au départ un atome neutre.","Le signe « + » indique qu'il a PERDU un électron (charge négative en moins).","Il devient donc un ion positif : Na⁺."],"resultat":"Na⁺ = atome de sodium ayant perdu 1 électron"},"exact":[],"qcm":[{"q":"Un ion sodium s'écrit Na⁺. Que s'est-il passé pour l'atome de sodium ?","good":"Il a perdu un électron","choices":["Il a gagné un neutron","Il a gagné un électron","Il a perdu un proton","Il a perdu un électron"],"explain":"La charge + signifie un déficit d'une charge négative : l'atome a perdu un électron. Gagner un électron donnerait une charge − ; on ne change pas le nombre de protons.","verif":"Charge + = électron(s) perdu(s) ; charge − = électron(s) gagné(s)."},{"q":"Lors d'une réaction chimique, 8 g de réactif A réagissent avec 12 g de réactif B. Quelle masse de produits obtient-on ?","good":"20 g","choices":["20 g","Plus de 20 g","On ne peut pas savoir","Moins de 20 g"],"explain":"La masse se conserve : la masse des produits égale celle des réactifs, soit 8 + 12 = 20 g. Les atomes se réorganisent mais ne disparaissent pas.","verif":"Conservation de la masse : masse des produits = masse des réactifs."},{"q":"Trois solutions ont des pH de 3, 7 et 11. Laquelle est la plus acide ?","good":"Celle de pH 3","choices":["Celle de pH 7","Celle de pH 3","Elles sont toutes acides","Celle de pH 11"],"explain":"Plus le pH est faible (inférieur à 7), plus la solution est acide. pH 3 est acide, pH 7 neutre, pH 11 basique.","verif":"pH < 7 acide, pH = 7 neutre, pH > 7 basique ; plus pH est bas, plus c'est acide."},{"q":"On dilue une solution acide en ajoutant de l'eau. Comment évolue son pH ?","good":"Il augmente et se rapproche de 7","choices":["Il ne change pas","Il devient négatif","Il augmente et se rapproche de 7","Il diminue encore"],"explain":"Diluer un acide le rend moins acide : son pH augmente en se rapprochant de 7 (neutre). Il ne franchit pas 7 par simple dilution.","verif":"Diluer un acide rapproche le pH de 7 (solution moins acide)."}],"paper":{"consigne":"Exercice type brevet. On étudie la molécule de dioxyde de carbone, de formule CO₂. 1) De quels atomes est-elle constituée, et combien de chaque ? 2) Une solution a un pH de 3 : est-elle acide, neutre ou basique ?","grille":["1) CO₂ : 1 atome de carbone (C) et 2 atomes d'oxygène (O).\n2) pH = 3 < 7, donc la solution est acide.","1) La formule CO₂ indique que la molécule est constituée d'un atome de carbone (C) et de deux atomes d'oxygène (O), soit 3 atomes en tout.\n2) Le pH vaut 3. Comme 3 est inférieur à 7, la solution est acide (plus le pH est petit, plus la solution est acide).","1) Composition de la molécule CO₂.\nDans une formule chimique, le symbole indique l'atome et l'indice en bas à droite indique le nombre d'atomes. La formule CO₂ se lit donc : un atome de carbone (symbole C) et deux atomes d'oxygène (symbole O). La molécule de dioxyde de carbone est ainsi constituée de 3 atomes au total.\n\n2) Nature de la solution de pH 3.\nLe pH mesure l'acidité d'une solution. La règle est : pH = 7 pour une solution neutre, pH < 7 pour une solution acide, pH > 7 pour une solution basique. Ici, le pH vaut 3, qui est inférieur à 7 : la solution est donc acide. De plus, comme le pH est nettement éloigné de 7 vers le bas, il s'agit d'une solution assez fortement acide.\n\nConclusion : la molécule CO₂ contient 1 atome de carbone et 2 atomes d'oxygène, et une solution de pH 3 est acide."],"type":"probleme","minutes":15,"vid":"https://www.lumni.fr/college/troisieme/physique-chimie"},"exos":[{"consigne":"Exercice type brevet. On étudie la molécule de dioxyde de carbone, de formule CO₂. 1) De quels atomes est-elle constituée, et combien de chaque ? 2) Une solution a un pH de 3 : est-elle acide, neutre ou basique ?","min":"1) CO₂ : 1 atome de carbone (C) et 2 atomes d'oxygène (O).\n2) pH = 3 < 7, donc la solution est acide.","solide":"1) La formule CO₂ indique que la molécule est constituée d'un atome de carbone (C) et de deux atomes d'oxygène (O), soit 3 atomes en tout.\n2) Le pH vaut 3. Comme 3 est inférieur à 7, la solution est acide (plus le pH est petit, plus la solution est acide).","mention":"1) Composition de la molécule CO₂.\nDans une formule chimique, le symbole indique l'atome et l'indice en bas à droite indique le nombre d'atomes. La formule CO₂ se lit donc : un atome de carbone (symbole C) et deux atomes d'oxygène (symbole O). La molécule de dioxyde de carbone est ainsi constituée de 3 atomes au total.\n\n2) Nature de la solution de pH 3.\nLe pH mesure l'acidité d'une solution. La règle est : pH = 7 pour une solution neutre, pH < 7 pour une solution acide, pH > 7 pour une solution basique. Ici, le pH vaut 3, qui est inférieur à 7 : la solution est donc acide. De plus, comme le pH est nettement éloigné de 7 vers le bas, il s'agit d'une solution assez fortement acide.\n\nConclusion : la molécule CO₂ contient 1 atome de carbone et 2 atomes d'oxygène, et une solution de pH 3 est acide."},{"consigne":"Exercice type brevet. On mélange deux solutions et la masse totale avant réaction est de 80 g. 1) Quelle est la masse totale des produits après la réaction chimique ? Justifie. 2) Comment appelle-t-on ce principe ?","min":"1) 80 g : la masse se conserve.\n2) C'est la conservation de la masse.","solide":"1) Au cours d'une réaction chimique, la masse totale ne change pas. La masse des produits après réaction est donc égale à la masse des réactifs avant réaction, soit 80 g.\n2) Ce principe s'appelle la conservation de la masse.","mention":"1) Masse des produits après réaction.\nAu cours d'une transformation chimique, les atomes ne sont ni créés ni détruits : ils se réorganisent pour former de nouvelles molécules. Il y a donc exactement autant d'atomes de chaque sorte avant et après la réaction. Par conséquent, la masse totale ne change pas : la masse des produits est égale à la masse des réactifs, soit 80 g.\n\n2) Nom du principe.\nCe principe s'appelle la conservation de la masse (parfois associé au nom de Lavoisier : « rien ne se perd, rien ne se crée, tout se transforme »).\n\nConclusion : la masse des produits est de 80 g, car la masse se conserve au cours d'une réaction chimique. C'est ce principe qui impose d'équilibrer les équations de réaction."},{"consigne":"Exercice type brevet. On dispose de trois solutions : un jus de citron (pH = 2), de l'eau pure (pH = 7) et de l'eau savonneuse (pH = 9). Classe ces solutions de la plus acide à la plus basique et indique pour chacune si elle est acide, neutre ou basique.","min":"Du plus acide au plus basique : jus de citron (pH 2, acide), eau pure (pH 7, neutre), eau savonneuse (pH 9, basique).","solide":"Le pH mesure l'acidité : plus il est petit, plus la solution est acide.\nDu plus acide au plus basique : jus de citron (pH 2), eau pure (pH 7), eau savonneuse (pH 9).\nNature : jus de citron pH 2 < 7 donc acide ; eau pure pH = 7 donc neutre ; eau savonneuse pH 9 > 7 donc basique.","mention":"Le pH mesure l'acidité d'une solution. La règle est la suivante : un pH inférieur à 7 correspond à une solution acide, un pH égal à 7 à une solution neutre, et un pH supérieur à 7 à une solution basique. Plus le pH est petit, plus la solution est acide ; plus il est grand, plus elle est basique.\n\nClassement du plus acide au plus basique :\n1. Le jus de citron, pH = 2 : c'est la valeur la plus basse, donc la solution la plus acide.\n2. L'eau pure, pH = 7 : valeur centrale, solution neutre.\n3. L'eau savonneuse, pH = 9 : valeur la plus élevée, solution basique.\n\nConclusion : dans l'ordre du plus acide au plus basique, on a le jus de citron (acide), l'eau pure (neutre) puis l'eau savonneuse (basique). On vérifie la cohérence : les pH sont bien rangés dans l'ordre croissant 2 < 7 < 9, ce qui correspond bien au passage de l'acide vers le basique."}],"parcours":{"mission":"À la fin, tu sais distinguer atome, molécule et ion, lire le pH d'une solution et équilibrer une équation simple.","froid":[{"q":"Qu'est-ce qu'un atome ?","rep":"Le constituant de base de la matière, électriquement neutre (noyau de protons et neutrons, entouré d'électrons)."},{"q":"Qu'est-ce qu'une molécule ?","rep":"Un groupe d'atomes liés entre eux (ex. : H₂O est une molécule d'eau, 2 atomes d'hydrogène et 1 d'oxygène)."},{"q":"Qu'est-ce qu'un ion ?","rep":"Un atome (ou groupe d'atomes) qui a gagné ou perdu un ou plusieurs électrons : il porte alors une charge électrique (positive ou négative)."},{"q":"Que mesure le pH ? Que vaut-il pour une solution neutre ?","rep":"Le pH mesure l'acidité d'une solution. Neutre : pH = 7 ; acide : pH < 7 ; basique : pH > 7."},{"q":"Que se conserve-t-il au cours d'une réaction chimique ?","rep":"La masse (et les atomes) : il y a autant d'atomes de chaque sorte avant et après. C'est pourquoi on équilibre l'équation."}],"coffre":[{"q":"Un atome est électriquement ____.","rep":"Mot attendu : neutre"},{"q":"Une ____ est un groupe d'atomes liés entre eux (ex. : H₂O).","rep":"Mot attendu : molécule"},{"q":"Un ion est un atome qui a gagné ou perdu des ____, il porte donc une charge.","rep":"Mot attendu : électrons"},{"q":"Une solution neutre a un pH égal à ____ ; un pH inférieur à 7 est acide.","rep":"Mot attendu : 7"},{"q":"Au cours d'une réaction chimique, la ____ se conserve (autant d'atomes avant et après).","rep":"Mot attendu : masse"}],"frise":[],"oral":"Explique en 90 secondes la différence entre atome, molécule et ion, et ce que mesure le pH.","oralRedige":"La matière est constituée d'atomes, qui sont les briques de base. Un atome est électriquement neutre, car il a autant de charges positives dans son noyau que d'électrons négatifs autour. Quand plusieurs atomes se lient entre eux, ils forment une molécule : par exemple, la molécule d'eau, H deux O, est faite de deux atomes d'hydrogène et un d'oxygène. Un ion, lui, est un atome ou un groupe d'atomes qui a gagné ou perdu des électrons : il n'est plus neutre, il porte une charge électrique, positive s'il a perdu des électrons, négative s'il en a gagné. Pour mesurer si une solution est acide ou basique, on utilise le pH : à 7 elle est neutre, en dessous de 7 elle est acide, au-dessus de 7 elle est basique. Enfin, lors d'une réaction chimique, la masse se conserve : il y a exactement autant d'atomes de chaque sorte avant et après, c'est pour cela qu'on équilibre les équations.","ecrit":{"consigne":"Exercice type brevet. On étudie la molécule de dioxyde de carbone, de formule CO₂. 1) De quels atomes est-elle constituée, et combien de chaque ? 2) Une solution a un pH de 3 : est-elle acide, neutre ou basique ?","min":"1) CO₂ : 1 atome de carbone (C) et 2 atomes d'oxygène (O).\n2) pH = 3 < 7, donc la solution est acide.","solide":"1) La formule CO₂ indique que la molécule est constituée d'un atome de carbone (C) et de deux atomes d'oxygène (O), soit 3 atomes en tout.\n2) Le pH vaut 3. Comme 3 est inférieur à 7, la solution est acide (plus le pH est petit, plus la solution est acide).","mention":"1) Composition de la molécule CO₂.\nDans une formule chimique, le symbole indique l'atome et l'indice en bas à droite indique le nombre d'atomes. La formule CO₂ se lit donc : un atome de carbone (symbole C) et deux atomes d'oxygène (symbole O). La molécule de dioxyde de carbone est ainsi constituée de 3 atomes au total.\n\n2) Nature de la solution de pH 3.\nLe pH mesure l'acidité d'une solution. La règle est : pH = 7 pour une solution neutre, pH < 7 pour une solution acide, pH > 7 pour une solution basique. Ici, le pH vaut 3, qui est inférieur à 7 : la solution est donc acide. De plus, comme le pH est nettement éloigné de 7 vers le bas, il s'agit d'une solution assez fortement acide.\n\nConclusion : la molécule CO₂ contient 1 atome de carbone et 2 atomes d'oxygène, et une solution de pH 3 est acide."},"ecritRedige":{"min":"1) CO₂ : 1 atome de carbone (C) et 2 atomes d'oxygène (O).\n2) pH = 3 < 7, donc la solution est acide.","solide":"1) La formule CO₂ indique que la molécule est constituée d'un atome de carbone (C) et de deux atomes d'oxygène (O), soit 3 atomes en tout.\n2) Le pH vaut 3. Comme 3 est inférieur à 7, la solution est acide (plus le pH est petit, plus la solution est acide).","mention":"1) Composition de la molécule CO₂.\nDans une formule chimique, le symbole indique l'atome et l'indice en bas à droite indique le nombre d'atomes. La formule CO₂ se lit donc : un atome de carbone (symbole C) et deux atomes d'oxygène (symbole O). La molécule de dioxyde de carbone est ainsi constituée de 3 atomes au total.\n\n2) Nature de la solution de pH 3.\nLe pH mesure l'acidité d'une solution. La règle est : pH = 7 pour une solution neutre, pH < 7 pour une solution acide, pH > 7 pour une solution basique. Ici, le pH vaut 3, qui est inférieur à 7 : la solution est donc acide. De plus, comme le pH est nettement éloigné de 7 vers le bas, il s'agit d'une solution assez fortement acide.\n\nConclusion : la molécule CO₂ contient 1 atome de carbone et 2 atomes d'oxygène, et une solution de pH 3 est acide."},"carte":"Carte mémoire : au centre « LA MATIÈRE », branches : atome (neutre), molécule (atomes liés, ex. H₂O), ion (a gagné/perdu des électrons → chargé), pH (7 neutre, <7 acide, >7 basique), conservation de la masse.","motscles":"atome, molécule, ion, électron, charge, formule chimique, pH, acide, basique, neutre, conservation de la masse, équation bilan","vid":"https://www.lumni.fr/college/troisieme/physique-chimie","vidlab":"Vidéo du chapitre"}}],"svt":[{"id":"S1","matiere":"svt","titre":"Le corps humain : nutrition et organes","objectif":"À la fin, tu sais expliquer comment les aliments sont transformés et comment les nutriments parviennent aux organes.","qcm":[{"q":"Le sang qui sort d'un muscle en effort contient moins de dioxygène et plus de dioxyde de carbone qu'à l'entrée. Pourquoi ?","good":"Le muscle consomme du dioxygène et rejette du dioxyde de carbone","choices":["Le muscle consomme du dioxygène et rejette du dioxyde de carbone","Le muscle fabrique du dioxygène","Le muscle absorbe le sang","Le sang ralentit dans le muscle"],"explain":"Pour produire de l'énergie, le muscle consomme du dioxygène (donc il en reste moins) et rejette du dioxyde de carbone (donc il y en a plus). C'est le signe de son activité.","verif":"Un organe actif prélève du dioxygène et des nutriments, et rejette du dioxyde de carbone."},{"q":"Après un repas, la quantité de nutriments augmente dans le sang. À quel niveau les nutriments passent-ils dans le sang ?","good":"Au niveau de l'intestin grêle (absorption)","choices":["Au niveau de l'intestin grêle (absorption)","Au niveau du cœur","Au niveau des poumons","Au niveau de l'estomac uniquement"],"explain":"La digestion transforme les aliments en nutriments, qui traversent la paroi de l'intestin grêle pour passer dans le sang : c'est l'absorption intestinale.","verif":"Digestion dans le tube digestif, puis absorption au niveau de l'intestin grêle."},{"q":"Quel est le trajet correct de l'air lors de la respiration ?","good":"Le dioxygène passe des poumons vers le sang","choices":["Le dioxygène passe des poumons vers le sang","Le dioxyde de carbone passe de l'air vers le sang","Les nutriments passent par les poumons","Le dioxygène passe du sang vers les poumons"],"explain":"Au niveau des poumons, le dioxygène de l'air passe dans le sang, tandis que le dioxyde de carbone (déchet) fait le trajet inverse, du sang vers l'air expiré.","verif":"Aux poumons : dioxygène vers le sang, dioxyde de carbone vers l'air expiré."},{"q":"Pourquoi le rythme cardiaque et la respiration s'accélèrent-ils pendant un effort physique ?","good":"Pour apporter plus de dioxygène et de nutriments aux muscles","choices":["Pour fabriquer des anticorps","Pour refroidir le sang","Pour apporter plus de dioxygène et de nutriments aux muscles","Pour digérer plus vite"],"explain":"En effort, les muscles ont besoin de plus d'énergie, donc de plus de dioxygène et de nutriments. Le cœur bat plus vite et la respiration s'accélère pour augmenter ces apports.","verif":"Effort = besoins accrus des muscles = cœur et respiration plus rapides."}],"court":[],"paper":{"consigne":"Question type brevet. Un sportif a besoin de beaucoup d'énergie pendant un effort. Explique comment ses muscles reçoivent ce dont ils ont besoin pour fonctionner.","grille":["Les muscles ont besoin de nutriments et de dioxygène. Le sang les transporte jusqu'aux muscles. Les nutriments viennent de la digestion des aliments et le dioxygène de la respiration.","Pour fonctionner pendant l'effort, les muscles ont besoin de deux choses : des nutriments et du dioxygène. Les nutriments proviennent de la digestion des aliments dans le tube digestif, puis passent dans le sang au niveau de l'intestin grêle. Le dioxygène, lui, entre dans le sang au niveau des poumons lors de la respiration. C'est ensuite le sang, mis en mouvement par le cœur, qui transporte les nutriments et le dioxygène jusqu'aux muscles. Les muscles peuvent alors produire l'énergie nécessaire à l'effort.","Pendant un effort, les muscles consomment beaucoup d'énergie, qu'ils produisent à partir de deux apports : les nutriments et le dioxygène.\n\nLes nutriments proviennent des aliments. Lors de la digestion, dans le tube digestif, les aliments sont transformés en nutriments suffisamment petits pour traverser la paroi de l'intestin grêle et passer dans le sang : c'est l'absorption intestinale.\n\nLe dioxygène, lui, provient de l'air respiré. Il passe dans le sang au niveau des poumons, plus précisément des alvéoles pulmonaires.\n\nUne fois dans le sang, nutriments et dioxygène sont transportés dans tout l'organisme grâce à la circulation sanguine, assurée par le cœur qui joue le rôle de pompe et par les vaisseaux sanguins. Ils atteignent ainsi les muscles, qui les utilisent pour produire l'énergie de l'effort. En retour, les muscles rejettent dans le sang des déchets, comme le dioxyde de carbone, qui sera éliminé par la respiration. La digestion, la respiration et la circulation fonctionnent donc de façon coordonnée."],"type":"svtdoc","minutes":15,"vid":""},"exos":[{"consigne":"Question type brevet. Un sportif a besoin de beaucoup d'énergie pendant un effort. Explique comment ses muscles reçoivent ce dont ils ont besoin pour fonctionner.","min":"Les muscles ont besoin de nutriments et de dioxygène. Le sang les transporte jusqu'aux muscles. Les nutriments viennent de la digestion des aliments et le dioxygène de la respiration.","solide":"Pour fonctionner pendant l'effort, les muscles ont besoin de deux choses : des nutriments et du dioxygène. Les nutriments proviennent de la digestion des aliments dans le tube digestif, puis passent dans le sang au niveau de l'intestin grêle. Le dioxygène, lui, entre dans le sang au niveau des poumons lors de la respiration. C'est ensuite le sang, mis en mouvement par le cœur, qui transporte les nutriments et le dioxygène jusqu'aux muscles. Les muscles peuvent alors produire l'énergie nécessaire à l'effort.","mention":"Pendant un effort, les muscles consomment beaucoup d'énergie, qu'ils produisent à partir de deux apports : les nutriments et le dioxygène.\n\nLes nutriments proviennent des aliments. Lors de la digestion, dans le tube digestif, les aliments sont transformés en nutriments suffisamment petits pour traverser la paroi de l'intestin grêle et passer dans le sang : c'est l'absorption intestinale.\n\nLe dioxygène, lui, provient de l'air respiré. Il passe dans le sang au niveau des poumons, plus précisément des alvéoles pulmonaires.\n\nUne fois dans le sang, nutriments et dioxygène sont transportés dans tout l'organisme grâce à la circulation sanguine, assurée par le cœur qui joue le rôle de pompe et par les vaisseaux sanguins. Ils atteignent ainsi les muscles, qui les utilisent pour produire l'énergie de l'effort. En retour, les muscles rejettent dans le sang des déchets, comme le dioxyde de carbone, qui sera éliminé par la respiration. La digestion, la respiration et la circulation fonctionnent donc de façon coordonnée."},{"consigne":"Question type brevet. Après un repas, la quantité de nutriments augmente dans le sang. Explique d'où viennent ces nutriments et par où ils passent pour rejoindre le sang.","min":"Les nutriments viennent de la digestion des aliments. Ils passent dans le sang au niveau de l'intestin grêle (absorption).","solide":"Après un repas, les aliments sont transformés en nutriments lors de la digestion, tout au long du tube digestif. Ces nutriments traversent ensuite la paroi de l'intestin grêle pour passer dans le sang : c'est l'absorption intestinale. C'est pourquoi la quantité de nutriments dans le sang augmente après un repas.","mention":"Après un repas, on observe une augmentation des nutriments dans le sang. Cette observation s'explique par deux étapes successives.\n\nD'abord la digestion : dans le tube digestif (bouche, estomac, intestin), les aliments sont progressivement transformés en éléments très petits appelés nutriments. Cette transformation est à la fois mécanique (mastication) et chimique (action des sucs digestifs).\n\nEnsuite l'absorption : au niveau de l'intestin grêle, dont la paroi est très fine et très étendue, les nutriments traversent cette paroi pour passer dans le sang. C'est cette étape, appelée absorption intestinale, qui fait augmenter la quantité de nutriments dans le sang après le repas.\n\nConclusion : les nutriments présents dans le sang proviennent de la digestion des aliments et y pénètrent au niveau de l'intestin grêle. Ils seront ensuite transportés par le sang vers tous les organes."},{"consigne":"Question type brevet. Un document montre que le sang qui sort d'un muscle en effort contient moins de dioxygène et plus de dioxyde de carbone que le sang qui y entre. Explique ce résultat.","min":"Le muscle consomme du dioxygène pour fonctionner, donc il y en a moins en sortie. Il rejette du dioxyde de carbone comme déchet, donc il y en a plus en sortie.","solide":"Pour fonctionner pendant l'effort, le muscle a besoin de dioxygène et de nutriments, qu'il utilise pour produire de l'énergie. Il prélève donc du dioxygène dans le sang qui arrive : c'est pourquoi le sang qui sort en contient moins. En produisant son énergie, le muscle rejette un déchet, le dioxyde de carbone, dans le sang : c'est pourquoi le sang qui sort en contient plus.","mention":"Le document compare le sang entrant et le sang sortant d'un muscle en effort. On observe deux choses : le dioxygène diminue, le dioxyde de carbone augmente. Ces deux résultats s'expliquent par le fonctionnement du muscle.\n\nPour se contracter pendant l'effort, le muscle doit produire de l'énergie. Pour cela, il consomme du dioxygène et des nutriments apportés par le sang. Comme il prélève du dioxygène dans le sang qui le traverse, le sang ressort logiquement appauvri en dioxygène.\n\nCette production d'énergie s'accompagne de la formation d'un déchet, le dioxyde de carbone. Le muscle rejette ce déchet dans le sang, qui ressort donc enrichi en dioxyde de carbone.\n\nConclusion : la baisse du dioxygène et la hausse du dioxyde de carbone entre l'entrée et la sortie du muscle traduisent son activité : il consomme du dioxygène et rejette du dioxyde de carbone. Le sang assure ainsi à la fois l'apport de ce dont le muscle a besoin et l'évacuation de ses déchets."}],"parcours":{"mission":"À la fin, tu sais expliquer comment les aliments sont transformés et comment les nutriments parviennent aux organes.","froid":[{"q":"Qu'est-ce que la digestion ?","rep":"La transformation des aliments en nutriments, des éléments assez petits pour passer dans le sang."},{"q":"Où les nutriments passent-ils dans le sang ?","rep":"Au niveau de l'intestin grêle, à travers sa paroi (l'absorption intestinale)."},{"q":"Quel organe transporte les nutriments et le dioxygène jusqu'aux organes ?","rep":"Le sang, grâce à l'appareil circulatoire (cœur et vaisseaux sanguins)."},{"q":"De quoi les organes ont-ils besoin pour fonctionner ?","rep":"De nutriments (issus des aliments) et de dioxygène (issu de la respiration)."},{"q":"Quel gaz les organes rejettent-ils comme déchet ?","rep":"Le dioxyde de carbone (CO₂)."}],"coffre":[{"q":"La digestion transforme les aliments en ____.","rep":"Mot attendu : nutriments"},{"q":"Les nutriments passent dans le sang au niveau de l'intestin ____.","rep":"Mot attendu : grêle"},{"q":"Le sang circule grâce au cœur et aux ____ sanguins.","rep":"Mot attendu : vaisseaux"},{"q":"Les organes ont besoin de nutriments et de ____ pour fonctionner.","rep":"Mot attendu : dioxygène"},{"q":"Les organes rejettent du ____ comme déchet.","rep":"Mot attendu : dioxyde de carbone"}],"frise":[],"oral":"Explique en 90 secondes le trajet des aliments, depuis la bouche jusqu'aux organes.","oralRedige":"Quand on mange, les aliments suivent un trajet et subissent des transformations pour nourrir tout le corps. Tout commence par la digestion : dans le tube digestif, de la bouche à l'intestin, les aliments sont découpés et transformés en éléments tout petits qu'on appelle des nutriments. Ces nutriments traversent ensuite la paroi de l'intestin grêle pour passer dans le sang : c'est l'absorption. À partir de là, c'est le sang, propulsé par le cœur dans les vaisseaux sanguins, qui transporte les nutriments et le dioxygène jusqu'à tous les organes. Les organes utilisent ces nutriments et ce dioxygène pour produire l'énergie dont ils ont besoin pour fonctionner. En contrepartie, ils rejettent des déchets, notamment du dioxyde de carbone, qui sera évacué par la respiration. Ainsi, digestion, circulation et respiration travaillent ensemble pour faire fonctionner le corps.","ecrit":{"consigne":"Question type brevet. Un sportif a besoin de beaucoup d'énergie pendant un effort. Explique comment ses muscles reçoivent ce dont ils ont besoin pour fonctionner.","min":"Les muscles ont besoin de nutriments et de dioxygène. Le sang les transporte jusqu'aux muscles. Les nutriments viennent de la digestion des aliments et le dioxygène de la respiration.","solide":"Pour fonctionner pendant l'effort, les muscles ont besoin de deux choses : des nutriments et du dioxygène. Les nutriments proviennent de la digestion des aliments dans le tube digestif, puis passent dans le sang au niveau de l'intestin grêle. Le dioxygène, lui, entre dans le sang au niveau des poumons lors de la respiration. C'est ensuite le sang, mis en mouvement par le cœur, qui transporte les nutriments et le dioxygène jusqu'aux muscles. Les muscles peuvent alors produire l'énergie nécessaire à l'effort.","mention":"Pendant un effort, les muscles consomment beaucoup d'énergie, qu'ils produisent à partir de deux apports : les nutriments et le dioxygène.\n\nLes nutriments proviennent des aliments. Lors de la digestion, dans le tube digestif, les aliments sont transformés en nutriments suffisamment petits pour traverser la paroi de l'intestin grêle et passer dans le sang : c'est l'absorption intestinale.\n\nLe dioxygène, lui, provient de l'air respiré. Il passe dans le sang au niveau des poumons, plus précisément des alvéoles pulmonaires.\n\nUne fois dans le sang, nutriments et dioxygène sont transportés dans tout l'organisme grâce à la circulation sanguine, assurée par le cœur qui joue le rôle de pompe et par les vaisseaux sanguins. Ils atteignent ainsi les muscles, qui les utilisent pour produire l'énergie de l'effort. En retour, les muscles rejettent dans le sang des déchets, comme le dioxyde de carbone, qui sera éliminé par la respiration. La digestion, la respiration et la circulation fonctionnent donc de façon coordonnée."},"ecritRedige":{"min":"Les muscles ont besoin de nutriments et de dioxygène. Le sang les transporte jusqu'aux muscles. Les nutriments viennent de la digestion des aliments et le dioxygène de la respiration.","solide":"Pour fonctionner pendant l'effort, les muscles ont besoin de deux choses : des nutriments et du dioxygène. Les nutriments proviennent de la digestion des aliments dans le tube digestif, puis passent dans le sang au niveau de l'intestin grêle. Le dioxygène, lui, entre dans le sang au niveau des poumons lors de la respiration. C'est ensuite le sang, mis en mouvement par le cœur, qui transporte les nutriments et le dioxygène jusqu'aux muscles. Les muscles peuvent alors produire l'énergie nécessaire à l'effort.","mention":"Pendant un effort, les muscles consomment beaucoup d'énergie, qu'ils produisent à partir de deux apports : les nutriments et le dioxygène.\n\nLes nutriments proviennent des aliments. Lors de la digestion, dans le tube digestif, les aliments sont transformés en nutriments suffisamment petits pour traverser la paroi de l'intestin grêle et passer dans le sang : c'est l'absorption intestinale.\n\nLe dioxygène, lui, provient de l'air respiré. Il passe dans le sang au niveau des poumons, plus précisément des alvéoles pulmonaires.\n\nUne fois dans le sang, nutriments et dioxygène sont transportés dans tout l'organisme grâce à la circulation sanguine, assurée par le cœur qui joue le rôle de pompe et par les vaisseaux sanguins. Ils atteignent ainsi les muscles, qui les utilisent pour produire l'énergie de l'effort. En retour, les muscles rejettent dans le sang des déchets, comme le dioxyde de carbone, qui sera éliminé par la respiration. La digestion, la respiration et la circulation fonctionnent donc de façon coordonnée."},"carte":"Carte mémoire : au centre « NUTRITION », branches : digestion (aliments → nutriments), absorption (intestin grêle → sang), circulation (cœur + vaisseaux), besoins des organes (nutriments + dioxygène), déchet (CO₂).","motscles":"digestion, nutriments, intestin grêle, absorption, sang, circulation, cœur, dioxygène, respiration, dioxyde de carbone, organes","vid":"","vidlab":""}},{"id":"S2","matiere":"svt","titre":"Reproduction, hormones et transmission de la vie","objectif":"À la fin, tu sais expliquer la puberté, le rôle des hormones et les bases de la reproduction humaine.","qcm":[{"q":"Une hormone fabriquée par un organe agit sur un autre organe situé loin dans le corps. Comment est-ce possible ?","good":"Elle est transportée par le sang jusqu'à l'organe cible","choices":["Elle voyage dans l'air des poumons","Elle se déplace dans le tube digestif","Elle circule par les nerfs","Elle est transportée par le sang jusqu'à l'organe cible"],"explain":"Une hormone est libérée dans le sang, qui la transporte dans tout le corps. Elle agit à distance, contrairement au message nerveux qui passe par les nerfs.","verif":"Hormone = message chimique transporté par le SANG (≠ message nerveux par les nerfs)."},{"q":"Qu'est-ce qui caractérise la fécondation ?","good":"La fusion d'un spermatozoïde et d'un ovule, formant une cellule-œuf","choices":["La rencontre de deux spermatozoïdes","La fusion d'un spermatozoïde et d'un ovule, formant une cellule-œuf","La transformation d'une hormone en cellule","La division d'un ovule en deux"],"explain":"La fécondation est la fusion des deux cellules reproductrices (spermatozoïde + ovule) en une seule cellule, la cellule-œuf, première cellule du futur individu.","verif":"Fécondation = fusion spermatozoïde + ovule → cellule-œuf."},{"q":"À la puberté, des transformations du corps apparaissent. Quel est le rôle des hormones dans ce processus ?","good":"Elles déclenchent et commandent les transformations du corps","choices":["Elles fabriquent les anticorps","Elles transportent le dioxygène","Elles digèrent les aliments plus vite","Elles déclenchent et commandent les transformations du corps"],"explain":"À la puberté, des hormones sont produites et, transportées par le sang, commandent les transformations du corps qui le rendent capable de se reproduire.","verif":"Les hormones commandent les transformations de la puberté."},{"q":"Quelle affirmation sur les cellules reproductrices est correcte ?","good":"L'ovule est produit par la femme, le spermatozoïde par l'homme","choices":["Le spermatozoïde est produit par la femme","L'ovule est produit par l'homme","Les deux sont produits par le même organe","L'ovule est produit par la femme, le spermatozoïde par l'homme"],"explain":"Les ovules sont produits par les ovaires (chez la femme), les spermatozoïdes par les testicules (chez l'homme). Ce sont les deux gamètes qui fusionnent à la fécondation.","verif":"Ovule = cellule reproductrice femelle ; spermatozoïde = mâle."}],"court":[],"paper":{"consigne":"Question type brevet. Explique le rôle des hormones dans les transformations du corps à la puberté.","grille":["À la puberté, des hormones sont libérées dans le sang. Elles agissent sur le corps et provoquent les transformations qui rendent capable de se reproduire.","À la puberté, les organes reproducteurs se mettent à fabriquer des hormones. Ces hormones sont libérées dans le sang, qui les transporte dans tout le corps. Elles agissent alors à distance sur différents organes et déclenchent les transformations physiques de la puberté (croissance, apparition des caractères sexuels). Grâce à elles, le corps devient capable de se reproduire.","À la puberté, le corps connaît de profondes transformations, qui sont commandées par des hormones.\n\nUne hormone est une substance chimique fabriquée par un organe, ici principalement les organes reproducteurs, puis déversée dans le sang. La circulation sanguine la transporte dans l'ensemble du corps, ce qui lui permet d'agir à distance sur les organes qui y sont sensibles.\n\nCe sont ces hormones qui déclenchent et coordonnent les transformations de la puberté : la croissance s'accélère, les organes reproducteurs deviennent fonctionnels, et apparaissent les caractères sexuels secondaires. À l'issue de ces changements, l'organisme devient capable de produire des cellules reproductrices, les gamètes, et donc de se reproduire.\n\nLes hormones jouent ainsi le rôle de messagers chimiques : fabriquées à un endroit, elles agissent ailleurs, ce qui assure une transformation coordonnée de tout l'organisme."],"type":"svtdoc","minutes":15,"vid":""},"exos":[{"consigne":"Question type brevet. Explique le rôle des hormones dans les transformations du corps à la puberté.","min":"À la puberté, des hormones sont libérées dans le sang. Elles agissent sur le corps et provoquent les transformations qui rendent capable de se reproduire.","solide":"À la puberté, les organes reproducteurs se mettent à fabriquer des hormones. Ces hormones sont libérées dans le sang, qui les transporte dans tout le corps. Elles agissent alors à distance sur différents organes et déclenchent les transformations physiques de la puberté (croissance, apparition des caractères sexuels). Grâce à elles, le corps devient capable de se reproduire.","mention":"À la puberté, le corps connaît de profondes transformations, qui sont commandées par des hormones.\n\nUne hormone est une substance chimique fabriquée par un organe, ici principalement les organes reproducteurs, puis déversée dans le sang. La circulation sanguine la transporte dans l'ensemble du corps, ce qui lui permet d'agir à distance sur les organes qui y sont sensibles.\n\nCe sont ces hormones qui déclenchent et coordonnent les transformations de la puberté : la croissance s'accélère, les organes reproducteurs deviennent fonctionnels, et apparaissent les caractères sexuels secondaires. À l'issue de ces changements, l'organisme devient capable de produire des cellules reproductrices, les gamètes, et donc de se reproduire.\n\nLes hormones jouent ainsi le rôle de messagers chimiques : fabriquées à un endroit, elles agissent ailleurs, ce qui assure une transformation coordonnée de tout l'organisme."},{"consigne":"Question type brevet. Explique ce qu'est la fécondation et ce qu'elle produit, en utilisant les mots spermatozoïde, ovule et cellule-œuf.","min":"La fécondation est la fusion d'un spermatozoïde et d'un ovule. Elle produit une cellule-œuf, première cellule du futur bébé.","solide":"La fécondation est la rencontre puis la fusion des deux cellules reproductrices : un spermatozoïde, produit par l'homme, et un ovule, produit par la femme. De cette fusion naît une seule cellule, appelée cellule-œuf. Cette cellule-œuf est la première cellule du futur individu : en se multipliant, elle donnera naissance à l'embryon puis au bébé.","mention":"La fécondation est l'étape qui marque le début d'une nouvelle vie. Elle met en jeu les deux cellules reproductrices, appelées gamètes.\n\nLe spermatozoïde est le gamète produit par l'homme ; l'ovule est le gamète produit par la femme. Lors de la fécondation, un spermatozoïde rencontre un ovule et fusionne avec lui.\n\nCette fusion produit une cellule unique, la cellule-œuf. Elle contient les informations génétiques apportées par les deux parents.\n\nLa cellule-œuf est la toute première cellule du futur individu. Par divisions successives, elle se multiplie et se développe pour former d'abord un embryon, puis un fœtus, et enfin un bébé.\n\nConclusion : la fécondation, c'est la fusion d'un spermatozoïde et d'un ovule, qui donne une cellule-œuf à l'origine d'un nouvel individu."},{"consigne":"Question type brevet. Une hormone fabriquée par un organe agit sur un autre organe situé plus loin dans le corps. Explique comment elle peut agir à distance.","min":"L'hormone est libérée dans le sang. Le sang la transporte dans tout le corps, ce qui lui permet d'atteindre un organe éloigné et d'agir sur lui.","solide":"Une hormone est une substance fabriquée par un organe puis libérée dans le sang. Comme le sang circule dans tout le corps, il transporte l'hormone partout, y compris jusqu'à des organes éloignés de celui qui l'a produite. L'hormone peut ainsi agir à distance sur l'organe sensible à son message.","mention":"La question porte sur le mode d'action d'une hormone, qui agit à distance de l'organe qui la fabrique. L'explication tient au rôle de la circulation sanguine.\n\nUne hormone est une substance chimique produite par un organe, par exemple une glande. Une fois fabriquée, elle n'est pas envoyée directement vers sa cible : elle est libérée dans le sang.\n\nOr le sang circule en permanence dans tout l'organisme, grâce au cœur et aux vaisseaux sanguins. Il transporte donc l'hormone dans l'ensemble du corps, ce qui lui permet d'atteindre des organes situés très loin de son lieu de fabrication.\n\nSeuls les organes sensibles à cette hormone réagissent à son message : on dit que l'hormone agit à distance, de façon ciblée.\n\nConclusion : une hormone agit à distance parce qu'elle est transportée par le sang, qui la diffuse dans tout le corps jusqu'à l'organe sur lequel elle agit. L'hormone joue ainsi le rôle de messager chimique."}],"parcours":{"mission":"À la fin, tu sais expliquer la puberté, le rôle des hormones et les bases de la reproduction humaine.","froid":[{"q":"Qu'est-ce que la puberté ?","rep":"La période où le corps devient capable de se reproduire, marquée par des transformations physiques."},{"q":"Qu'est-ce qu'une hormone ?","rep":"Une substance fabriquée par un organe, transportée par le sang, qui agit à distance sur d'autres organes."},{"q":"Quelles sont les deux cellules reproductrices (gamètes) chez l'humain ?","rep":"Le spermatozoïde (chez l'homme) et l'ovule (chez la femme)."},{"q":"Qu'est-ce que la fécondation ?","rep":"La rencontre et la fusion d'un spermatozoïde et d'un ovule, qui forme une cellule-œuf."},{"q":"À quoi sert un moyen de contraception ?","rep":"À empêcher une grossesse (par exemple en empêchant la fécondation)."}],"coffre":[{"q":"La ____ est la période où le corps devient capable de se reproduire.","rep":"Mot attendu : puberté"},{"q":"Une hormone est transportée par le ____ et agit à distance.","rep":"Mot attendu : sang"},{"q":"Les cellules reproductrices sont le spermatozoïde et l'____.","rep":"Mot attendu : ovule"},{"q":"La ____ est la fusion d'un spermatozoïde et d'un ovule.","rep":"Mot attendu : fécondation"},{"q":"La fécondation forme une cellule-____, première cellule du futur bébé.","rep":"Mot attendu : œuf"}],"frise":[],"oral":"Explique en 90 secondes ce qui se passe à la puberté et le rôle des hormones.","oralRedige":"La puberté est la période de la vie pendant laquelle le corps se transforme et devient capable de se reproduire. Ces changements ne se font pas au hasard : ils sont commandés par des hormones. Une hormone est une substance fabriquée par un organe, par exemple les organes reproducteurs, puis libérée dans le sang. Le sang la transporte dans tout le corps, et elle agit à distance sur d'autres organes : c'est ce qui déclenche les transformations de la puberté. À partir de là, l'organisme produit des cellules reproductrices, qu'on appelle des gamètes : les spermatozoïdes chez l'homme et les ovules chez la femme. La reproduction commence par la fécondation, c'est-à-dire la fusion d'un spermatozoïde et d'un ovule, qui forme une cellule-œuf, première cellule d'un nouvel individu. Enfin, les moyens de contraception permettent d'éviter une grossesse non désirée, le plus souvent en empêchant la fécondation.","ecrit":{"consigne":"Question type brevet. Explique le rôle des hormones dans les transformations du corps à la puberté.","min":"À la puberté, des hormones sont libérées dans le sang. Elles agissent sur le corps et provoquent les transformations qui rendent capable de se reproduire.","solide":"À la puberté, les organes reproducteurs se mettent à fabriquer des hormones. Ces hormones sont libérées dans le sang, qui les transporte dans tout le corps. Elles agissent alors à distance sur différents organes et déclenchent les transformations physiques de la puberté (croissance, apparition des caractères sexuels). Grâce à elles, le corps devient capable de se reproduire.","mention":"À la puberté, le corps connaît de profondes transformations, qui sont commandées par des hormones.\n\nUne hormone est une substance chimique fabriquée par un organe, ici principalement les organes reproducteurs, puis déversée dans le sang. La circulation sanguine la transporte dans l'ensemble du corps, ce qui lui permet d'agir à distance sur les organes qui y sont sensibles.\n\nCe sont ces hormones qui déclenchent et coordonnent les transformations de la puberté : la croissance s'accélère, les organes reproducteurs deviennent fonctionnels, et apparaissent les caractères sexuels secondaires. À l'issue de ces changements, l'organisme devient capable de produire des cellules reproductrices, les gamètes, et donc de se reproduire.\n\nLes hormones jouent ainsi le rôle de messagers chimiques : fabriquées à un endroit, elles agissent ailleurs, ce qui assure une transformation coordonnée de tout l'organisme."},"ecritRedige":{"min":"À la puberté, des hormones sont libérées dans le sang. Elles agissent sur le corps et provoquent les transformations qui rendent capable de se reproduire.","solide":"À la puberté, les organes reproducteurs se mettent à fabriquer des hormones. Ces hormones sont libérées dans le sang, qui les transporte dans tout le corps. Elles agissent alors à distance sur différents organes et déclenchent les transformations physiques de la puberté (croissance, apparition des caractères sexuels). Grâce à elles, le corps devient capable de se reproduire.","mention":"À la puberté, le corps connaît de profondes transformations, qui sont commandées par des hormones.\n\nUne hormone est une substance chimique fabriquée par un organe, ici principalement les organes reproducteurs, puis déversée dans le sang. La circulation sanguine la transporte dans l'ensemble du corps, ce qui lui permet d'agir à distance sur les organes qui y sont sensibles.\n\nCe sont ces hormones qui déclenchent et coordonnent les transformations de la puberté : la croissance s'accélère, les organes reproducteurs deviennent fonctionnels, et apparaissent les caractères sexuels secondaires. À l'issue de ces changements, l'organisme devient capable de produire des cellules reproductrices, les gamètes, et donc de se reproduire.\n\nLes hormones jouent ainsi le rôle de messagers chimiques : fabriquées à un endroit, elles agissent ailleurs, ce qui assure une transformation coordonnée de tout l'organisme."},"carte":"Carte mémoire : au centre « REPRODUCTION », branches : puberté (corps capable de se reproduire), hormones (messagers dans le sang), gamètes (spermatozoïde + ovule), fécondation (→ cellule-œuf), contraception.","motscles":"puberté, hormone, sang, message chimique, gamète, spermatozoïde, ovule, fécondation, cellule-œuf, contraception","vid":"","vidlab":""}},{"id":"S3","matiere":"svt","titre":"Génétique : ADN, gènes et hérédité","objectif":"À la fin, tu sais expliquer où est l'information génétique et comment les caractères se transmettent.","qcm":[{"q":"Range du plus grand au plus petit : ADN, cellule, chromosome, noyau.","good":"Cellule, noyau, chromosome, ADN","choices":["Cellule, noyau, chromosome, ADN","ADN, chromosome, noyau, cellule","Cellule, chromosome, noyau, ADN","Noyau, cellule, chromosome, ADN"],"explain":"La cellule contient le noyau, qui contient les chromosomes, faits d'ADN. Du plus grand au plus petit : cellule, noyau, chromosome, ADN.","verif":"Emboîtement : cellule ⊃ noyau ⊃ chromosomes (faits d'ADN)."},{"q":"Deux frères ont une couleur des yeux différente, alors qu'ils ont les mêmes parents. Comment l'expliquer ?","good":"Ils ont reçu des allèles différents de leurs parents","choices":["L'un a des gènes, l'autre des allèles","L'un a de l'ADN, l'autre non","Ils ont reçu des allèles différents de leurs parents","Ils n'ont pas le même nombre de chromosomes"],"explain":"Chaque parent possède deux allèles par gène et n'en transmet qu'un. Selon les allèles reçus, les enfants peuvent présenter des caractères différents, comme la couleur des yeux.","verif":"Les enfants reçoivent une combinaison d'allèles parmi celles possibles : d'où les différences."},{"q":"Qu'est-ce qu'un allèle ?","good":"Une version d'un gène","choices":["Une cellule reproductrice","Une molécule de sang","Une version d'un gène","Un chromosome entier"],"explain":"Un gène détermine un caractère et existe sous plusieurs versions appelées allèles (par exemple, l'allèle yeux bleus et l'allèle yeux marron pour le gène de la couleur des yeux).","verif":"Gène = caractère ; allèle = une version possible de ce gène."},{"q":"Une mutation modifie l'ADN. En quoi peut-elle créer de la diversité ?","good":"Elle peut créer un nouvel allèle, donc un nouveau caractère possible","choices":["Elle peut créer un nouvel allèle, donc un nouveau caractère possible","Elle supprime toujours un gène","Elle transforme le sang en ADN","Elle augmente le nombre de chromosomes à chaque génération"],"explain":"En modifiant l'ADN, une mutation peut faire apparaître un nouvel allèle, c'est-à-dire une nouvelle version d'un gène, ce qui ajoute de la diversité parmi les êtres vivants.","verif":"Mutation → modification de l'ADN → parfois un nouvel allèle → diversité."}],"court":[],"paper":{"consigne":"Question type brevet. Deux frères n'ont pas la même couleur des yeux alors qu'ils ont les mêmes parents. Explique comment c'est possible, en utilisant les mots gène et allèle.","grille":["Chaque parent possède deux allèles pour la couleur des yeux et n'en transmet qu'un. Les deux frères n'ont pas reçu les mêmes allèles, donc ils n'ont pas la même couleur des yeux.","La couleur des yeux est déterminée par un gène, qui existe sous plusieurs versions appelées allèles (par exemple « yeux bleus » et « yeux marron »). Chaque parent possède deux allèles pour ce gène, mais n'en transmet qu'un seul à chaque enfant, au hasard. Les deux frères n'ont donc pas forcément reçu la même combinaison d'allèles de leurs parents. C'est pourquoi ils peuvent avoir des couleurs d'yeux différentes tout en ayant les mêmes parents.","La couleur des yeux est un caractère héréditaire, déterminé par un gène, c'est-à-dire une portion d'ADN. Ce gène existe sous plusieurs versions, appelées allèles : par exemple un allèle « yeux marron » et un allèle « yeux bleus ».\n\nChaque personne possède deux allèles pour ce gène, un hérité de sa mère et un hérité de son père. Or, lors de la formation des cellules reproductrices, chaque parent ne transmet qu'un seul de ses deux allèles à chaque enfant, et ce de façon aléatoire.\n\nAinsi, deux frères issus des mêmes parents ne reçoivent pas nécessairement la même combinaison d'allèles : l'un peut recevoir deux allèles « yeux marron », l'autre un allèle « yeux marron » et un allèle « yeux bleus », par exemple. C'est ce qui explique qu'ils puissent avoir des couleurs d'yeux différentes. Ce brassage des allèles à chaque génération est aussi ce qui rend chaque individu unique, en dehors des vrais jumeaux."],"type":"svtdoc","minutes":15,"vid":""},"exos":[{"consigne":"Question type brevet. Deux frères n'ont pas la même couleur des yeux alors qu'ils ont les mêmes parents. Explique comment c'est possible, en utilisant les mots gène et allèle.","min":"Chaque parent possède deux allèles pour la couleur des yeux et n'en transmet qu'un. Les deux frères n'ont pas reçu les mêmes allèles, donc ils n'ont pas la même couleur des yeux.","solide":"La couleur des yeux est déterminée par un gène, qui existe sous plusieurs versions appelées allèles (par exemple « yeux bleus » et « yeux marron »). Chaque parent possède deux allèles pour ce gène, mais n'en transmet qu'un seul à chaque enfant, au hasard. Les deux frères n'ont donc pas forcément reçu la même combinaison d'allèles de leurs parents. C'est pourquoi ils peuvent avoir des couleurs d'yeux différentes tout en ayant les mêmes parents.","mention":"La couleur des yeux est un caractère héréditaire, déterminé par un gène, c'est-à-dire une portion d'ADN. Ce gène existe sous plusieurs versions, appelées allèles : par exemple un allèle « yeux marron » et un allèle « yeux bleus ».\n\nChaque personne possède deux allèles pour ce gène, un hérité de sa mère et un hérité de son père. Or, lors de la formation des cellules reproductrices, chaque parent ne transmet qu'un seul de ses deux allèles à chaque enfant, et ce de façon aléatoire.\n\nAinsi, deux frères issus des mêmes parents ne reçoivent pas nécessairement la même combinaison d'allèles : l'un peut recevoir deux allèles « yeux marron », l'autre un allèle « yeux marron » et un allèle « yeux bleus », par exemple. C'est ce qui explique qu'ils puissent avoir des couleurs d'yeux différentes. Ce brassage des allèles à chaque génération est aussi ce qui rend chaque individu unique, en dehors des vrais jumeaux."},{"consigne":"Question type brevet. Range du plus grand au plus petit les éléments suivants et explique comment ils s'emboîtent : ADN, cellule, noyau, chromosome.","min":"Du plus grand au plus petit : cellule, noyau, chromosome, ADN. La cellule contient le noyau, qui contient les chromosomes, qui sont faits d'ADN.","solide":"Du plus grand au plus petit, on a : la cellule, puis le noyau, puis le chromosome, puis l'ADN. Ces éléments s'emboîtent : la cellule contient un noyau ; le noyau contient les chromosomes ; et chaque chromosome est constitué d'une molécule d'ADN, qui porte l'information génétique.","mention":"Il s'agit de remettre dans l'ordre, du plus grand au plus petit, les niveaux d'organisation de l'information génétique, et d'expliquer comment ils s'emboîtent.\n\nL'ordre du plus grand au plus petit est : la cellule, le noyau, le chromosome, l'ADN.\n\nL'emboîtement est le suivant. La cellule est l'unité de base du vivant ; à l'intérieur, elle possède un noyau. Le noyau contient les chromosomes, au nombre de 46 dans une cellule humaine. Chaque chromosome est lui-même constitué d'une longue molécule, l'ADN, qui porte l'information génétique sous forme de gènes.\n\nConclusion : du plus grand au plus petit, cellule, noyau, chromosome, ADN. La cellule contient le noyau, le noyau contient les chromosomes, et les chromosomes sont faits d'ADN. L'information génétique est donc rangée tout au fond de la cellule, dans l'ADN des chromosomes."},{"consigne":"Question type brevet. On dit qu'une mutation crée de la diversité chez les êtres vivants. Explique cette affirmation en utilisant les mots ADN, allèle et diversité.","min":"Une mutation est une modification de l'ADN. Elle peut créer un nouvel allèle, c'est-à-dire une nouvelle version d'un gène, ce qui augmente la diversité des êtres vivants.","solide":"Une mutation est une modification de l'ADN. Or l'ADN porte les gènes, qui existent sous différentes versions appelées allèles. Quand une mutation modifie l'ADN, elle peut faire apparaître un nouvel allèle, c'est-à-dire une nouvelle version d'un gène, qui n'existait pas avant. Comme cet allèle peut donner un nouveau caractère, les mutations augmentent la diversité des êtres vivants.","mention":"L'affirmation à expliquer est qu'une mutation crée de la diversité. Le raisonnement relie trois notions : l'ADN, l'allèle et la diversité.\n\nL'ADN est la molécule qui porte l'information génétique, organisée en gènes. Chaque gène détermine un caractère et existe sous plusieurs versions appelées allèles.\n\nUne mutation est une modification de l'ADN. En changeant la séquence de l'ADN, elle peut transformer un gène et faire apparaître un allèle nouveau, c'est-à-dire une version du gène qui n'existait pas auparavant.\n\nCe nouvel allèle peut être à l'origine d'un nouveau caractère. En s'ajoutant aux allèles déjà existants, il augmente le nombre de versions possibles d'un gène au sein des populations.\n\nConclusion : une mutation modifie l'ADN et peut créer un nouvel allèle ; en multipliant les versions des gènes, elle augmente la diversité des êtres vivants. C'est l'une des sources de la diversité du vivant, sur laquelle agit ensuite l'évolution."}],"parcours":{"mission":"À la fin, tu sais expliquer où est l'information génétique et comment les caractères se transmettent.","froid":[{"q":"Où se trouve l'information génétique dans une cellule ?","rep":"Dans le noyau, sur les chromosomes, qui sont constitués d'ADN."},{"q":"Qu'est-ce qu'un gène ?","rep":"Une portion d'ADN qui détermine un caractère héréditaire (ex. : la couleur des yeux)."},{"q":"Qu'est-ce qu'un allèle ?","rep":"Une version d'un gène (ex. : l'allèle « yeux bleus » et l'allèle « yeux marron » sont deux versions du gène de la couleur des yeux)."},{"q":"Combien de chromosomes possède une cellule humaine ?","rep":"46 chromosomes (23 paires)."},{"q":"Qu'est-ce qu'une mutation ?","rep":"Une modification de l'ADN, qui peut créer un nouvel allèle et donc de la diversité génétique."}],"coffre":[{"q":"L'information génétique se trouve dans le ____ de la cellule, sur les chromosomes.","rep":"Mot attendu : noyau"},{"q":"Les chromosomes sont constitués d'____.","rep":"Mot attendu : ADN"},{"q":"Un ____ est une portion d'ADN qui détermine un caractère.","rep":"Mot attendu : gène"},{"q":"Une version d'un gène s'appelle un ____.","rep":"Mot attendu : allèle"},{"q":"Une cellule humaine possède ____ chromosomes.","rep":"Mot attendu : 46"}],"frise":[],"oral":"Explique en 90 secondes où se trouve l'information génétique et la différence entre un gène et un allèle.","oralRedige":"L'information génétique, c'est ce qui détermine nos caractères héréditaires, comme la couleur des yeux ou des cheveux. Elle est rangée dans un endroit précis de chaque cellule : le noyau. Dans ce noyau, on trouve les chromosomes, qui sont constitués d'une molécule appelée ADN. Une cellule humaine en possède 46, soit 23 paires. Sur cet ADN, il faut distinguer deux notions souvent confondues : le gène et l'allèle. Un gène est une portion d'ADN qui détermine un caractère, par exemple le gène de la couleur des yeux. Un allèle, lui, est une version particulière de ce gène : l'allèle yeux bleus et l'allèle yeux marron sont deux versions du même gène. On hérite nos allèles de nos deux parents, ce qui explique les ressemblances familiales. Enfin, l'ADN peut subir des mutations, c'est-à-dire des modifications, qui créent de nouveaux allèles et donc de la diversité au sein du vivant.","ecrit":{"consigne":"Question type brevet. Deux frères n'ont pas la même couleur des yeux alors qu'ils ont les mêmes parents. Explique comment c'est possible, en utilisant les mots gène et allèle.","min":"Chaque parent possède deux allèles pour la couleur des yeux et n'en transmet qu'un. Les deux frères n'ont pas reçu les mêmes allèles, donc ils n'ont pas la même couleur des yeux.","solide":"La couleur des yeux est déterminée par un gène, qui existe sous plusieurs versions appelées allèles (par exemple « yeux bleus » et « yeux marron »). Chaque parent possède deux allèles pour ce gène, mais n'en transmet qu'un seul à chaque enfant, au hasard. Les deux frères n'ont donc pas forcément reçu la même combinaison d'allèles de leurs parents. C'est pourquoi ils peuvent avoir des couleurs d'yeux différentes tout en ayant les mêmes parents.","mention":"La couleur des yeux est un caractère héréditaire, déterminé par un gène, c'est-à-dire une portion d'ADN. Ce gène existe sous plusieurs versions, appelées allèles : par exemple un allèle « yeux marron » et un allèle « yeux bleus ».\n\nChaque personne possède deux allèles pour ce gène, un hérité de sa mère et un hérité de son père. Or, lors de la formation des cellules reproductrices, chaque parent ne transmet qu'un seul de ses deux allèles à chaque enfant, et ce de façon aléatoire.\n\nAinsi, deux frères issus des mêmes parents ne reçoivent pas nécessairement la même combinaison d'allèles : l'un peut recevoir deux allèles « yeux marron », l'autre un allèle « yeux marron » et un allèle « yeux bleus », par exemple. C'est ce qui explique qu'ils puissent avoir des couleurs d'yeux différentes. Ce brassage des allèles à chaque génération est aussi ce qui rend chaque individu unique, en dehors des vrais jumeaux."},"ecritRedige":{"min":"Chaque parent possède deux allèles pour la couleur des yeux et n'en transmet qu'un. Les deux frères n'ont pas reçu les mêmes allèles, donc ils n'ont pas la même couleur des yeux.","solide":"La couleur des yeux est déterminée par un gène, qui existe sous plusieurs versions appelées allèles (par exemple « yeux bleus » et « yeux marron »). Chaque parent possède deux allèles pour ce gène, mais n'en transmet qu'un seul à chaque enfant, au hasard. Les deux frères n'ont donc pas forcément reçu la même combinaison d'allèles de leurs parents. C'est pourquoi ils peuvent avoir des couleurs d'yeux différentes tout en ayant les mêmes parents.","mention":"La couleur des yeux est un caractère héréditaire, déterminé par un gène, c'est-à-dire une portion d'ADN. Ce gène existe sous plusieurs versions, appelées allèles : par exemple un allèle « yeux marron » et un allèle « yeux bleus ».\n\nChaque personne possède deux allèles pour ce gène, un hérité de sa mère et un hérité de son père. Or, lors de la formation des cellules reproductrices, chaque parent ne transmet qu'un seul de ses deux allèles à chaque enfant, et ce de façon aléatoire.\n\nAinsi, deux frères issus des mêmes parents ne reçoivent pas nécessairement la même combinaison d'allèles : l'un peut recevoir deux allèles « yeux marron », l'autre un allèle « yeux marron » et un allèle « yeux bleus », par exemple. C'est ce qui explique qu'ils puissent avoir des couleurs d'yeux différentes. Ce brassage des allèles à chaque génération est aussi ce qui rend chaque individu unique, en dehors des vrais jumeaux."},"carte":"Carte mémoire : au centre « GÉNÉTIQUE », branches : noyau → chromosomes → ADN, gène (caractère), allèle (version d'un gène), 46 chromosomes, mutation (nouvel allèle, diversité).","motscles":"ADN, noyau, chromosome, 46 chromosomes, gène, allèle, caractère héréditaire, transmission, mutation, diversité génétique","vid":"","vidlab":""}},{"id":"S4","matiere":"svt","titre":"Système nerveux et immunité","objectif":"À la fin, tu sais expliquer le trajet d'un message nerveux et comment l'organisme se défend contre les microbes.","qcm":[{"q":"Quand on touche un objet brûlant, on retire la main avant d'avoir réfléchi. Par quel centre nerveux passe ce réflexe ?","good":"La moelle épinière, sans passer d'abord par le cerveau","choices":["Le cerveau, qui décide consciemment","La moelle épinière, sans passer d'abord par le cerveau","Le muscle directement, sans nerf","Le cœur"],"explain":"Dans un réflexe, le message passe par la moelle épinière, qui renvoie aussitôt l'ordre au muscle. C'est ce court-circuit, sans passer d'abord par le cerveau, qui rend la réaction très rapide.","verif":"Réflexe : récepteur → nerf → moelle épinière → nerf → muscle (rapide)."},{"q":"Lors d'une seconde infection par le même microbe, le taux d'anticorps augmente beaucoup plus vite que la première fois. Pourquoi ?","good":"Grâce à la mémoire immunitaire acquise lors de la première infection","choices":["Parce que le sang circule plus vite","Parce que le microbe est devenu plus faible","Grâce à la mémoire immunitaire acquise lors de la première infection","Parce que les anticorps se fabriquent dans l'estomac"],"explain":"Après une première rencontre, l'organisme garde des cellules mémoire. Lors d'une seconde infection, elles reconnaissent le microbe et produisent vite beaucoup d'anticorps. C'est le principe du vaccin.","verif":"Mémoire immunitaire = réaction plus rapide et plus forte la 2e fois."},{"q":"Comment un vaccin protège-t-il l'organisme ?","good":"Il entraîne le corps à fabriquer des anticorps et à garder la mémoire du microbe","choices":["Il bloque la respiration des microbes","Il entraîne le corps à fabriquer des anticorps et à garder la mémoire du microbe","Il tue instantanément tous les microbes du corps","Il remplace le sang malade"],"explain":"Le vaccin provoque une première réaction immunitaire sans danger, ce qui crée une mémoire. En cas d'infection réelle, le corps réagit alors vite et efficacement.","verif":"Vaccin = entraînement du système immunitaire qui crée une mémoire."},{"q":"Quelles cellules du sang fabriquent les anticorps ?","good":"Les lymphocytes (des globules blancs)","choices":["Les spermatozoïdes","Les lymphocytes (des globules blancs)","Les globules rouges","Les neurones"],"explain":"Les anticorps sont fabriqués par certains globules blancs, les lymphocytes. Les globules rouges, eux, transportent le dioxygène.","verif":"Lymphocytes = globules blancs qui produisent les anticorps."}],"court":[],"paper":{"consigne":"Question type brevet. Explique comment un vaccin permet de protéger une personne contre une maladie, en utilisant les mots anticorps et lymphocytes.","grille":["Un vaccin contient une forme inoffensive du microbe. Le corps fabrique des anticorps grâce aux lymphocytes. Plus tard, si le vrai microbe arrive, le corps sait déjà se défendre.","Un vaccin contient le microbe sous une forme inoffensive (affaibli ou inactivé), qui ne rend pas malade. En le recevant, l'organisme réagit comme face à une vraie infection : les lymphocytes fabriquent des anticorps dirigés spécifiquement contre ce microbe. Le corps garde ensuite la mémoire de cette défense. Ainsi, si la personne rencontre plus tard le vrai microbe, ses lymphocytes produisent très vite des anticorps et la maladie est évitée.","Un vaccin permet de protéger une personne en entraînant son système immunitaire à l'avance, sans la rendre malade.\n\nLe vaccin contient le microbe responsable de la maladie sous une forme inoffensive, par exemple affaibli ou inactivé. Lorsqu'on l'injecte, l'organisme réagit comme s'il faisait face à une véritable infection : des globules blancs particuliers, les lymphocytes, reconnaissent le microbe et fabriquent des anticorps, des protéines capables de neutraliser ce microbe précis.\n\nL'élément essentiel est que l'organisme conserve ensuite une mémoire de cette réaction. Il garde des cellules capables de reconnaître ce microbe.\n\nAinsi, si la personne rencontre plus tard le véritable microbe, ses lymphocytes réagissent beaucoup plus rapidement et fabriquent massivement les bons anticorps avant que la maladie ne se développe. La personne est donc protégée : c'est le principe de l'immunité acquise par la vaccination."],"type":"svtdoc","minutes":15,"vid":""},"exos":[{"consigne":"Question type brevet. Explique comment un vaccin permet de protéger une personne contre une maladie, en utilisant les mots anticorps et lymphocytes.","min":"Un vaccin contient une forme inoffensive du microbe. Le corps fabrique des anticorps grâce aux lymphocytes. Plus tard, si le vrai microbe arrive, le corps sait déjà se défendre.","solide":"Un vaccin contient le microbe sous une forme inoffensive (affaibli ou inactivé), qui ne rend pas malade. En le recevant, l'organisme réagit comme face à une vraie infection : les lymphocytes fabriquent des anticorps dirigés spécifiquement contre ce microbe. Le corps garde ensuite la mémoire de cette défense. Ainsi, si la personne rencontre plus tard le vrai microbe, ses lymphocytes produisent très vite des anticorps et la maladie est évitée.","mention":"Un vaccin permet de protéger une personne en entraînant son système immunitaire à l'avance, sans la rendre malade.\n\nLe vaccin contient le microbe responsable de la maladie sous une forme inoffensive, par exemple affaibli ou inactivé. Lorsqu'on l'injecte, l'organisme réagit comme s'il faisait face à une véritable infection : des globules blancs particuliers, les lymphocytes, reconnaissent le microbe et fabriquent des anticorps, des protéines capables de neutraliser ce microbe précis.\n\nL'élément essentiel est que l'organisme conserve ensuite une mémoire de cette réaction. Il garde des cellules capables de reconnaître ce microbe.\n\nAinsi, si la personne rencontre plus tard le véritable microbe, ses lymphocytes réagissent beaucoup plus rapidement et fabriquent massivement les bons anticorps avant que la maladie ne se développe. La personne est donc protégée : c'est le principe de l'immunité acquise par la vaccination."},{"consigne":"Question type brevet. Quand on touche un objet brûlant, on retire la main très vite, avant même d'avoir réfléchi. Explique le trajet du message nerveux lors de ce réflexe.","min":"Un récepteur de la peau détecte la chaleur. Le message nerveux part par un nerf jusqu'à la moelle épinière, qui renvoie aussitôt un message par un autre nerf vers le muscle, qui retire la main.","solide":"Lorsqu'on touche un objet brûlant, un récepteur sensoriel de la peau détecte la chaleur et crée un message nerveux. Ce message part par un nerf sensitif jusqu'à la moelle épinière, qui joue le rôle de centre nerveux. La moelle épinière renvoie immédiatement un message par un nerf moteur vers le muscle du bras, qui se contracte et retire la main. Comme le message ne passe pas d'abord par le cerveau pour réfléchir, la réaction est très rapide : c'est un réflexe.","mention":"La situation décrit un réflexe : une réaction automatique et très rapide, ici le retrait de la main. On demande le trajet du message nerveux, appelé arc réflexe.\n\nLe trajet se fait en plusieurs étapes :\n1. Un récepteur sensoriel situé dans la peau détecte le stimulus, ici la forte chaleur, et déclenche un message nerveux.\n2. Ce message circule par un nerf sensitif jusqu'à la moelle épinière.\n3. La moelle épinière, qui sert ici de centre nerveux, traite le message et en renvoie aussitôt un autre.\n4. Ce nouveau message part par un nerf moteur jusqu'au muscle du bras.\n5. Le muscle se contracte et retire la main.\n\nL'élément clé est que ce trajet passe par la moelle épinière sans attendre l'intervention du cerveau. C'est précisément ce qui rend la réaction extrêmement rapide et permet de limiter la brûlure.\n\nConclusion : lors de ce réflexe, le message nerveux suit le trajet récepteur de la peau, nerf sensitif, moelle épinière, nerf moteur, muscle. La rapidité s'explique par le passage direct par la moelle épinière, sans passer d'abord par la réflexion."},{"consigne":"Question type brevet. Un graphique montre que, lors d'une première infection par un microbe, le taux d'anticorps met du temps à augmenter, alors que lors d'une seconde infec
